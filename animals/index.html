<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Magic Animal Holes</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Telegram Web Apps SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Monetag SDK Installation -->
  <script src='//libtl.com/sdk.js' data-zone='11108267' data-sdk='show_11108267'></script>
  
  <link rel="icon" type="image/png" href="index.png">
  <link rel="shortcut icon" href="index.png">
  <link rel="apple-touch-icon" href="index.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'Comic Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .screen {
      display: none;
      width: 100%;
      min-height: 100vh;
      padding: 15px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .screen.active {
      display: flex;
    }

    #welcomeScreen {
      background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%);
      overflow-y: auto;
    }

    .welcome-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 6vw, 3rem);
      color: white;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
    }

    .welcome-subtitle {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: white;
      text-align: center;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .choose-title {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      color: white;
      text-align: center;
      margin: 10px 0;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.2);
      background: rgba(255, 255, 255, 0.2);
      padding: 6px 15px;
      border-radius: 20px;
      border: 2px solid white;
      width: 90%;
      max-width: 400px;
    }

    .difficulty-selector,
    .character-selector {
      width: 90%;
      max-width: 400px;
      margin-bottom: 15px;
    }

    .dropdown-container {
      position: relative;
      width: 100%;
    }

    .dropdown-header {
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 15px;
      border-radius: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 1.1rem;
      border: 3px solid #FFD700;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .selected-difficulty,
    .selected-character {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .selected-emoji {
      font-size: 1.5rem;
    }
    
    .selected-name {
      color: #333;
      font-weight: bold;
    }

    .dropdown-arrow {
      transition: transform 0.3s ease;
    }

    .dropdown-arrow.open {
      transform: rotate(180deg);
    }

    .dropdown-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border-radius: 12px;
      margin-top: 5px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      z-index: 1000;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .dropdown-list.open {
      max-height: 200px;
      overflow-y: auto;
    }

    .difficulty-option,
    .character-option {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .difficulty-option:hover,
    .character-option:hover {
      background: #f0f0f0;
    }

    .difficulty-option .emoji,
    .character-option .emoji {
      font-size: 1.3rem;
      margin-right: 10px;
    }

    .difficulty-option .name,
    .character-option .name {
      color: #333;
      font-weight: bold;
    }

    .start-game-btn {
      background: linear-gradient(45deg, #00b894, #00ced1);
      border: none;
      padding: 15px;
      border-radius: 40px;
      font-size: 1.3rem;
      color: white;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      margin-top: 15px;
      width: 90%;
      max-width: 400px;
      transition: transform 0.1s;
    }

    .start-game-btn:active {
      transform: scale(0.98);
    }

    .start-game-btn:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: not-allowed;
    }

    .target-animal {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 10px 15px;
      margin-bottom: 15px;
      text-align: center;
      border: 4px solid #FF6B6B;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 340px;
    }

    .target-title {
      font-size: 1.1rem;
      color: #FF6B6B;
      font-weight: bold;
    }

    .target-display {
      font-size: 3rem;
      margin: 5px 0;
    }

    .game-info {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      width: 90%;
      max-width: 340px;
    }

    .info-box {
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 1rem;
      font-weight: bold;
      flex: 1;
    }

    .time-left { color: #e17055; }
    .score { color: #00b894; }

    .holes-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
      max-width: 340px;
      width: 90%;
    }

    .hole {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
    }

    .hole::before {
      content: '';
      position: absolute;
      width: 90%;
      height: 90%;
      background: radial-gradient(circle at 50% 40%, #8B5E3C, #5C3A21 80%, #3D2414 100%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: inset 0 8px 15px rgba(0, 0, 0, 0.7), 0 0 0 4px #3d2414, 0 8px 20px rgba(0,0,0,0.3);
      z-index: 1;
    }

    /* 3D ANIMAL STYLE */
    .animal {
      position: absolute;
      width: 80%;
      height: 80%;
      background: radial-gradient(circle at 35% 35%, #ffffff, #e8e8e8 70%, #c0c0c0 100%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -30%) scale(0);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.2rem;
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2;
      box-shadow: 
        0 6px 0 #999,
        0 8px 15px rgba(0, 0, 0, 0.4),
        inset 0 -3px 6px rgba(0,0,0,0.1),
        inset 0 3px 6px rgba(255,255,255,0.6);
      border: 3px solid #ffd700;
      cursor: pointer;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .animal::after {
      content: '';
      position: absolute;
      top: 8%;
      left: 15%;
      width: 30%;
      height: 20%;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      transform: rotate(-15deg);
    }

    .animal.pop-up {
      transform: translate(-50%, -85%) scale(1);
    }

    .animal.hit {
      background: radial-gradient(circle at 35% 35%, #5eff6e, #20bf6b 70%, #0d8a3e 100%) !important;
      transform: translate(-50%, -85%) scale(0);
      transition: transform 0.2s ease-in;
    }

    .animal.wrong {
      background: radial-gradient(circle at 35% 35%, #ff6b6b, #eb3b5a 70%, #b91c1c 100%) !important;
      transform: translate(-50%, -85%) scale(0);
      transition: transform 0.2s ease-in;
    }

    .controls {
      display: flex;
      gap: 10px;
      max-width: 340px;
      width: 90%;
    }

    .control-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid white;
      padding: 10px;
      border-radius: 12px;
      font-size: 0.95rem;
      color: white;
      cursor: pointer;
      font-weight: bold;
      flex: 1;
    }

    .game-over {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.95);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .game-over-content {
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      padding: 25px;
      border-radius: 24px;
      text-align: center;
      max-width: 340px;
      width: 90%;
      color: white;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .final-score {
      font-size: 3rem;
      color: #ffd700;
      font-weight: bold;
      margin: 10px 0;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .double-btn {
      background: linear-gradient(135deg, #eab308, #ca8a04);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .new-game-btn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .play-again-btn {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      display: none;
    }

    .more-games-btn {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 1px dashed rgba(255, 255, 255, 0.6);
      padding: 9px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <!-- WELCOME SCREEN -->
  <div class="screen active" id="welcomeScreen">
    <h1 class="welcome-title">Magic Animal Holes!</h1>
    <p class="welcome-subtitle">Catch the target animals before time runs out!</p>

    <h2 class="choose-title">🟢 Step 1: Difficulty</h2>
    <div class="difficulty-selector">
      <div class="dropdown-container">
        <div class="dropdown-header" id="difficultyDropdownHeader">
          <div class="selected-difficulty">
            <span class="selected-name" id="selectedDifficultyName">Choose difficulty...</span>
          </div>
          <span class="dropdown-arrow">▼</span>
        </div>
        <div class="dropdown-list" id="difficultyDropdownList"></div>
      </div>
    </div>

    <h2 class="choose-title">🐵 Step 2: Your Character</h2>
    <div class="character-selector">
      <div class="dropdown-container">
        <div class="dropdown-header" id="dropdownHeader">
          <div class="selected-character">
            <span class="selected-emoji" id="mainSelectedEmoji">❓</span>
            <span class="selected-name" id="mainSelectedName">Choose character...</span>
          </div>
          <span class="dropdown-arrow">▼</span>
        </div>
        <div class="dropdown-list" id="dropdownList"></div>
      </div>
    </div>

    <button class="start-game-btn" id="startGameBtn" disabled>🚀 Start Game</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="gameScreen">
    <div class="target-animal">
      <div class="target-title">🎯 TARGET ANIMAL:</div>
      <div class="target-display" id="targetAnimal">🐵</div>
      <div style="font-size:0.9rem; font-weight:bold; color:#475569;">+<span id="targetPoints">10</span> Points per hit!</div>
    </div>

    <div class="game-info">
      <div class="info-box time-left">⏰ Time: <span id="timeLeft">45</span>s</div>
      <div class="info-box score">⭐ Score: <span id="score">0</span></div>
    </div>

    <div class="holes-container" id="holesContainer"></div>

    <div class="controls">
      <button class="control-btn" onclick="restartGame()">🔄 Reset</button>
      <button class="control-btn" onclick="showWelcomeScreen()">🏠 Home</button>
    </div>
  </div>

  <!-- GAME OVER OVERLAY -->
  <div class="game-over" id="gameOver">
    <div class="game-over-content">
      <h2>🎯 Game Over!</h2>
      <div class="final-score" id="finalScore">0</div>
      <p id="gameMessage" style="font-weight:bold; margin-bottom:10px;"></p>
      
      <div class="action-buttons">
        <button class="double-btn" id="doubleScoreBtn">Double Score ⚡ (Watch Ad)</button>
        <button class="new-game-btn" id="newGameBtn">New Game 🔄</button>
        <button class="play-again-btn" id="playAgainBtn">Play Again 🎮</button>
        <button class="more-games-btn" id="moreGamesBtn">More Games 🕹️</button>
      </div>
    </div>
  </div>

  <script>
    // ========== API CONFIG (HUB BACKEND) ==========
    const API_ENDPOINT = "https://franklymadear-games.hf.space";
    const API_KEY = "m0n3t4g_s3cur3_k3y_2026";

    // ========== USER ID MANAGEMENT ==========
    let userId = localStorage.getItem('franklymadear_userId');
    console.log('🐵 Animals initial userId from localStorage:', userId);

    if (!userId && window.Telegram && window.Telegram.WebApp) {
        const initData = window.Telegram.WebApp.initDataUnsafe;
        if (initData && initData.user) {
            userId = 'tg_' + initData.user.id;
            localStorage.setItem('franklymadear_userId', userId);
            console.log('🐵 Created userId from Telegram:', userId);
        }
    }

    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'setUserId') {
            userId = event.data.userId;
            localStorage.setItem('franklymadear_userId', userId);
            console.log('🐵 Received userId via postMessage:', userId);
        }
    });

    // ========== SEND SCORE DIRECTLY TO BACKEND ==========
    async function sendScoreToBackend(finalScore) {
        console.log('🐵 Sending score to backend:', { score: finalScore, userId });
        if (!userId) { console.log('🐵 No userId available'); return; }
        try {
            const pointsRes = await fetch(API_ENDPOINT + '/add-points', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                body: JSON.stringify({ userId: userId, game: 'Animals', points: finalScore })
            });
            const pointsData = await pointsRes.json();
            console.log('🐵 Points added:', pointsData);

            const missionRes = await fetch(API_ENDPOINT + '/missions/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                body: JSON.stringify({ userId: userId, game: 'Animals', score: finalScore, playtime: 1, words: 0 })
            });
            const missionData = await missionRes.json();
            console.log('🐵 Missions updated:', missionData);

            if (window.opener) {
                window.opener.postMessage({ type: 'gameScore', score: finalScore, game: 'Animals' }, '*');
            }
        } catch(e) { console.log('🐵 Error sending score:', e); }
    }

    // ========== GAME CODE ==========
    if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    }

    const config = {
      difficulties: {
        easy: { name: 'Easy', emoji: '🟢', time: 45, animalSpeed: 2200, animalVisible: 1800, count: 2 },
        medium: { name: 'Medium', emoji: '🟡', time: 45, animalSpeed: 1600, animalVisible: 1200, count: 3 },
        hard: { name: 'Hard', emoji: '🔴', time: 45, animalSpeed: 1100, animalVisible: 850, count: 4 }
      },
      animals: [
        { emoji: '🐵', name: 'Monkey', points: 10 },
        { emoji: '🦊', name: 'Fox', points: 12 },
        { emoji: '🦄', name: 'Unicorn', points: 20 },
        { emoji: '🦁', name: 'Lion', points: 15 },
        { emoji: '🐼', name: 'Panda', points: 10 },
        { emoji: '🐶', name: 'Dog', points: 8 },
        { emoji: '🐱', name: 'Cat', points: 8 },
        { emoji: '🐻', name: 'Bear', points: 14 },
        { emoji: '🐨', name: 'Koala', points: 12 }
      ]
    };
    
    let selectedAnimal = null;
    let selectedDifficulty = null;
    let score = 0;
    let timeLeft = 45;
    let timerInterval, spawnInterval;
    let gameActive = false;
    let hasWatchedAd = false;
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);

      if (type === 'correct') {
        osc.frequency.setValueAtTime(587.33, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
        osc.type = 'sine'; gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      } else {
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.linearRampToValueAtTime(110, now + 0.15);
        osc.type = 'sawtooth'; gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      }
    }

    function initializeDropdowns() {
      const diffList = document.getElementById('difficultyDropdownList');
      diffList.innerHTML = '';
      Object.keys(config.difficulties).forEach(key => {
        const item = config.difficulties[key];
        const row = document.createElement('div');
        row.className = 'difficulty-option';
        row.innerHTML = `<span class="emoji">${item.emoji}</span><span class="name">${item.name}</span>`;
        row.addEventListener('click', (e) => {
          e.stopPropagation();
          selectedDifficulty = key;
          document.getElementById('selectedDifficultyName').textContent = item.name;
          diffList.classList.remove('open');
          checkStartButton();
        });
        diffList.appendChild(row);
      });

      document.getElementById('difficultyDropdownHeader').addEventListener('click', (e) => {
        e.stopPropagation();
        diffList.classList.toggle('open');
        document.getElementById('dropdownList').classList.remove('open');
      });

      const charList = document.getElementById('dropdownList');
      charList.innerHTML = '';
      config.animals.forEach(animal => {
        const row = document.createElement('div');
        row.className = 'character-option';
        row.innerHTML = `<span class="emoji">${animal.emoji}</span><span class="name">${animal.name}</span>`;
        row.addEventListener('click', (e) => {
          e.stopPropagation();
          selectedAnimal = animal;
          document.getElementById('mainSelectedEmoji').textContent = animal.emoji;
          document.getElementById('mainSelectedName').textContent = animal.name;
          charList.classList.remove('open');
          checkStartButton();
        });
        charList.appendChild(row);
      });

      document.getElementById('dropdownHeader').addEventListener('click', (e) => {
        e.stopPropagation();
        charList.classList.toggle('open');
        document.getElementById('difficultyDropdownList').classList.remove('open');
      });

      document.addEventListener('click', () => {
        diffList.classList.remove('open');
        charList.classList.remove('open');
      });
    }

    function checkStartButton() {
      document.getElementById('startGameBtn').disabled = !(selectedAnimal && selectedDifficulty);
    }

    function showWelcomeScreen() {
      stopGame();
      document.getElementById('welcomeScreen').classList.add('active');
      document.getElementById('gameScreen').classList.remove('active');
      document.getElementById('gameOver').style.display = 'none';
    }

    function setupGameArea() {
      const container = document.getElementById('holesContainer');
      container.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const hole = document.createElement('div');
        hole.className = 'hole';
        const animal = document.createElement('div');
        animal.className = 'animal';
        animal.addEventListener('pointerdown', (e) => handleHit(e, animal));
        hole.appendChild(animal);
        container.appendChild(hole);
      }
    }

    function startGame() {
      initAudio();
      document.getElementById('welcomeScreen').classList.remove('active');
      document.getElementById('gameScreen').classList.add('active');
      document.getElementById('gameOver').style.display = 'none';

      hasWatchedAd = false;
      doubleScoreBtn.style.display = 'block';
      doubleScoreBtn.disabled = false;
      newGameBtn.style.display = 'block';
      playAgainBtn.style.display = 'none';

      score = 0;
      timeLeft = config.difficulties[selectedDifficulty].time;
      gameActive = true;

      document.getElementById('targetAnimal').textContent = selectedAnimal.emoji;
      document.getElementById('targetPoints').textContent = selectedAnimal.points;
      document.getElementById('score').textContent = score;
      document.getElementById('timeLeft').textContent = timeLeft;

      setupGameArea();

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timeLeft').textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);

      clearInterval(spawnInterval);
      spawnInterval = setInterval(spawnLogic, config.difficulties[selectedDifficulty].animalSpeed);
      spawnLogic();
    }

    function spawnLogic() {
      if (!gameActive) return;
      const animals = Array.from(document.querySelectorAll('.animal'));
      animals.forEach(a => a.classList.remove('pop-up', 'hit', 'wrong'));

      const settings = config.difficulties[selectedDifficulty];
      const availableIndices = Array.from({length: 9}, (_, i) => i);
      const countToSpawn = settings.count;

      for (let k = 0; k < countToSpawn; k++) {
        if (availableIndices.length === 0) break;
        const randKey = Math.floor(Math.random() * availableIndices.length);
        const holeIndex = availableIndices.splice(randKey, 1)[0];
        const targetAnimalEl = animals[holeIndex];
        
        let chosen;
        if (Math.random() < 0.4) {
          chosen = selectedAnimal;
        } else {
          const fillers = config.animals.filter(a => a.emoji !== selectedAnimal.emoji);
          chosen = fillers[Math.floor(Math.random() * fillers.length)];
        }

        targetAnimalEl.textContent = chosen.emoji;
        targetAnimalEl.dataset.isTarget = (chosen.emoji === selectedAnimal.emoji) ? "true" : "false";
        targetAnimalEl.classList.add('pop-up');

        setTimeout(() => {
          if (targetAnimalEl.classList.contains('pop-up') && !targetAnimalEl.classList.contains('hit') && !targetAnimalEl.classList.contains('wrong')) {
            targetAnimalEl.classList.remove('pop-up');
          }
        }, settings.animalVisible);
      }
    }

    function handleHit(e, element) {
      if (!gameActive || !element.classList.contains('pop-up')) return;
      e.preventDefault();

      if (element.dataset.isTarget === "true") {
        element.classList.add('hit');
        score += selectedAnimal.points;
        playSound('correct');
      } else {
        element.classList.add('wrong');
        score = Math.max(0, score - 5);
        playSound('wrong');
      }
      document.getElementById('score').textContent = score;
    }

    function stopGame() {
      gameActive = false;
      clearInterval(timerInterval);
      clearInterval(spawnInterval);
    }

    function endGame() {
      stopGame();
      document.getElementById('finalScore').textContent = score;
      
      // Αποστολή αρχικού σκορ στο backend
      sendScoreToBackend(score);
      
      const msg = document.getElementById('gameMessage');
      if (score >= 120) msg.textContent = "🏆 Incredible work! Super Reflexes!";
      else if (score >= 60) msg.textContent = "👍 Great job! Keep practicing!";
      else msg.textContent = "💪 Good attempt! Try again!";

      document.getElementById('gameOver').style.display = 'flex';
    }

    function restartGame() {
      document.getElementById('gameOver').style.display = 'none';
      startGame();
    }

    const doubleScoreBtn = document.getElementById('doubleScoreBtn');
    const newGameBtn = document.getElementById('newGameBtn');
    const playAgainBtn = document.getElementById('playAgainBtn');
    const moreGamesBtn = document.getElementById('moreGamesBtn');

    doubleScoreBtn.addEventListener('click', () => {
      doubleScoreBtn.disabled = true;
      show_11108267().then(() => { processDouble(); }).catch(() => { processDouble(); });
    });

    function processDouble() {
      score = score * 2;
      hasWatchedAd = true;
      document.getElementById('finalScore').textContent = score;
      
      // Αποστολή διπλασιασμένου σκορ στο backend
      sendScoreToBackend(score);
      
      doubleScoreBtn.style.display = 'none';
      newGameBtn.style.display = 'none';
      playAgainBtn.style.display = 'block';
    }

    newGameBtn.addEventListener('click', () => {
      show_11108267().then(() => { triggerNewGame(); }).catch(() => { triggerNewGame(); });
    });

    function triggerNewGame() {
      document.getElementById('gameOver').style.display = 'none';
      startGame();
    }

    playAgainBtn.addEventListener('click', () => {
      document.getElementById('gameOver').style.display = 'none';
      startGame();
    });

    moreGamesBtn.addEventListener('click', () => {
      if (!hasWatchedAd) {
        show_11108267().then(() => { goToBot(); }).catch(() => { goToBot(); });
      } else {
        goToBot();
      }
    });

    function goToBot() {
      if (window.Telegram && window.Telegram.WebApp) {
        Telegram.WebApp.openTelegramLink('https://t.me/Franklygames_bot');
      } else {
        window.open('https://t.me/Franklygames_bot', '_blank');
      }
    }

    document.getElementById('startGameBtn').addEventListener('click', startGame);
    window.addEventListener('DOMContentLoaded', initializeDropdowns);
  </script>
</body>
</html>
