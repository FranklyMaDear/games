<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    <title>🧿 HandMaster Pro - Ανάλυση Χεριού</title>
    
    <!-- ========== MONETAG SDK ========== -->
    <script src='//libtl.com/sdk.js' data-zone='10979429' data-sdk='show_10979429'></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; color: #fff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        #container { max-width: 700px; margin: 0 auto; }
        
        #camera-wrapper { position: relative; width: 100%; max-width: 500px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 3px solid #FFD700; box-shadow: 0 0 30px rgba(255,215,0,0.2); background: #111; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .btn { padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; flex: 1; min-width: 80px; }
        .btn-gold { background: #FFD700; color: #111; }
        .btn-gold:hover { background: #FFC107; transform: scale(1.03); }
        .btn-green { background: #2ecc71; color: #fff; }
        .btn-red { background: #e74c3c; color: #fff; }
        .btn-blue { background: #3498db; color: #fff; }
        .btn-purple { background: #9b59b6; color: #fff; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        #user-inputs-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; flex-wrap: wrap; width: 100%; }
        .input-group { display: flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 10px 16px; border-radius: 25px; border: 1px solid #444; flex: 0 1 auto; min-width: 140px; }
        .input-group label { color: #aaa; font-size: 14px; }
        select, input { padding: 6px 12px; border-radius: 20px; border: none; background: #333; color: white; font-size: 14px; height: 36px; }
        input[type="number"] { width: 60px; }

        #gender-selector { display: flex; justify-content: center; gap: 15px; margin: 10px 0; flex-wrap: wrap; }
        .gender-btn { padding: 10px 24px; border: 2px solid #444; border-radius: 30px; background: transparent; color: #aaa; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .gender-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(255,215,0,0.1); }

        #result-area { display: none; background: #1a1a1a; border-radius: 20px; padding: 20px; margin-top: 20px; border-left: 5px solid #FFD700; text-align: left; }
        #result-area h2 { color: #FFD700; margin-top: 0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: #222; padding: 8px 12px; border-radius: 10px; }

        .badge { display: inline-block; background: #FFD700; color: #111; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        #loading { display: none; margin: 15px; color: #aaa; }

        #upload-section { margin: 20px 0; padding: 25px; border: 2px dashed #444; border-radius: 20px; background: #1a1a1a; }
        #upload-section:hover { border-color: #FFD700; }
        #file-input { display: none; }
        .upload-label { padding: 15px 30px; background: #333; border-radius: 30px; cursor: pointer; display: inline-block; transition: 0.3s; font-size: 16px; }
        .upload-label:hover { background: #444; }
        #upload-preview { max-width: 100%; max-height: 300px; border-radius: 10px; margin: 10px 0; display: none; }
        #upload-type { margin: 10px 0; color: #FFD700; font-weight: bold; font-size: 16px; }

        #age-display { margin: 15px 0; color: #FFD700; font-size: 18px; }
        #element-display { margin: 10px 0; color: #aaa; font-size: 16px; }

        #history-area { display: none; margin-top: 30px; text-align: left; }
        #history-area h2 { color: #FFD700; }
        .history-item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 10px 0; border-left: 4px solid #3498db; }
        .history-actions { display: flex; gap: 5px; margin-top: 5px; }
        .history-actions button { padding: 5px 12px; border: none; border-radius: 15px; cursor: pointer; font-size: 12px; }

        .instructions {
            margin-top: 10px;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 10px;
            border: 1px solid #FFD700;
            color: #eee;
            font-size: 14px;
        }
        .instructions strong { color: #FFD700; }

        @media (max-width: 480px) {
            #user-inputs-row { gap: 10px; }
            .input-group { padding: 6px 12px; min-width: 100px; }
            select, input { font-size: 13px; padding: 4px 8px; height: 32px; }
            input[type="number"] { width: 50px; }
            #gender-selector { gap: 10px; }
            .gender-btn { padding: 8px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>🧿 HandMaster Pro</h1>
        <p style="color:#aaa;">Προηγμένη Ανάλυση Χειρομαντείας</p>

        <div id="user-inputs-row">
            <div class="input-group">
                <label>🎂</label>
                <input type="number" id="user-age" min="1" max="120" value="30">
            </div>
            <div class="input-group">
                <label>♈</label>
                <select id="zodiac">
                    <option value="Κριός">Κριός</option>
                    <option value="Ταύρος">Ταύρος</option>
                    <option value="Δίδυμοι">Δίδυμοι</option>
                    <option value="Καρκίνος">Καρκίνος</option>
                    <option value="Λέων">Λέων</option>
                    <option value="Παρθένος">Παρθένος</option>
                    <option value="Ζυγός">Ζυγός</option>
                    <option value="Σκορπιός">Σκορπιός</option>
                    <option value="Τοξότης">Τοξότης</option>
                    <option value="Αιγόκερως">Αιγόκερως</option>
                    <option value="Υδροχόος">Υδροχόος</option>
                    <option value="Ιχθείς">Ιχθείς</option>
                </select>
            </div>
        </div>

        <div id="gender-selector">
            <button class="gender-btn active" id="maleBtn" onclick="setGender('male')">♂ Άντρας</button>
            <button class="gender-btn" id="femaleBtn" onclick="setGender('female')">♀ Γυναίκα</button>
        </div>

        <div id="upload-section">
            <label for="file-input" class="upload-label">📁 Ανέβασε φωτογραφία</label>
            <input type="file" id="file-input" accept="image/*" onchange="handleUpload(event)">
            <div id="upload-type"></div>
            <img id="upload-preview">
            <div id="auto-status" style="margin-top:10px; color:#2ecc71; font-weight:bold; display:none;">⏳ Αυτόματη ανάλυση σε εξέλιξη...</div>
            <div class="instructions">
                <strong>📌 Οδηγίες:</strong> Πατήστε το κουμπί <strong>Κάμερα</strong> και τοποθετήστε το χέρι μπροστά στην Οθόνη. 
                Η ανάλυση θα γίνει <strong>αυτόματα!</strong> ή ανεβάστε φωτογραφία.
            </div>
        </div>

        <div id="camera-wrapper">
            <video id="webcam" playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="controls">
            <button class="btn btn-gold" id="startBtn" onclick="startCamera()">📷 Κάμερα</button>
            <button class="btn btn-red" id="refreshBtn" onclick="refreshWithAd()">🔄 Ανανέωση</button>
        </div>

        <div id="loading">⏳ Αναλύω...</div>

        <div id="result-area">
            <h2>🔮 Ανάλυση</h2>
            <div id="element-display"></div>
            <div id="age-display"></div>
            <div id="result-text"></div>
            <div class="stat-grid" id="stats-grid"></div>
            <div style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;">
                <button class="btn btn-blue" onclick="exportPDF()">📄 PDF</button>
                <button class="btn btn-purple" onclick="saveToHistory()">💾 Αποθήκευση</button>
            </div>
        </div>

        <div id="history-area">
            <h2>📚 Ιστορικό Αναλύσεων</h2>
            <div id="history-list"></div>
            <button class="btn btn-red" onclick="clearHistory()">🗑️ Διαγραφή Ιστορικού</button>
        </div>
    </div>

    <script>
        // --- MediaPipe Setup ---
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        let landmarksData = null;
        let analysisResult = null;
        let capturedPhoto = null;
        let uploadedImage = null;
        let analysisDone = false;
        let userGender = 'male';
        let detectedHand = null;
        let camera = null;

        overlay.width = 500; overlay.height = 500;

        const hands = new Hands({
            locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                landmarksData = results.multiHandLandmarks[0];
                drawHand(landmarksData);
                document.getElementById('startBtn').disabled = true;
                
                const wristX = landmarksData[0].x;
                detectedHand = wristX > 0.5 ? 'right' : 'left';
                
                if (!analysisDone) {
                    analysisDone = true;
                    performAnalysis();
                }
            } else {
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                landmarksData = null;
                analysisDone = false;
                detectedHand = null;
            }
        });

        function drawHand(lm) {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            ctx.save();
            ctx.scale(1,1);
            drawConnectors(ctx, lm, HAND_CONNECTIONS, {color:'#FFD700', lineWidth:2});
            drawLandmarks(ctx, lm, {color:'#FFD700', radius:4});
            ctx.restore();
        }

        function setGender(gender) {
            userGender = gender;
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            if (gender === 'male') {
                document.getElementById('maleBtn').classList.add('active');
            } else {
                document.getElementById('femaleBtn').classList.add('active');
            }
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImage = e.target.result;
                const preview = document.getElementById('upload-preview');
                preview.src = uploadedImage;
                preview.style.display = 'block';
                
                document.getElementById('auto-status').style.display = 'block';
                document.getElementById('auto-status').innerText = '⏳ Αυτόματη ανάλυση σε εξέλιξη...';
                
                setTimeout(() => {
                    // Υποθέτουμε ότι είναι χέρι
                    const result = analyzeHand();
                    displayResult(result);
                    analysisResult = result;
                    document.getElementById('auto-status').innerText = '✅ Ανάλυση ολοκληρώθηκε!';
                    document.getElementById('auto-status').style.color = '#2ecc71';
                }, 500);
            };
            reader.readAsDataURL(file);
        }

        function startCamera() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = "⏳...";
            camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({image: video});
                },
                width: 500,
                height: 500,
                facingMode: 'user'
            });
            camera.start().then(() => {
                btn.innerText = "✅ Ready";
                btn.style.background = "#2ecc71";
                btn.disabled = false;
            }).catch(err => {
                console.error("Camera error:", err);
                btn.innerText = "📷 Κάμερα";
                btn.style.background = "";
                btn.disabled = false;
                alert("Σφάλμα κάμερας: " + err);
            });
        }

        function analyzeHand() {
            const age = parseInt(document.getElementById('user-age').value) || 30;
            const zodiac = document.getElementById('zodiac').value;
            const gender = userGender;
            const hand = detectedHand || 'right';
            
            const isLeftHanded = (hand === 'left');
            const dominantHand = isLeftHanded ? 'Αριστερό' : 'Δεξί';
            const nonDominant = isLeftHanded ? 'Δεξί' : 'Αριστερό';

            const lifeLineTypes = [
                { type: "Μακριά & Βαθιά", desc: "Καλή υγεία, ενεργητικότητα, ζωτικότητα, ισορροπία ψυχοσυναισθηματική." },
                { type: "Κοντή & Βαθιά", desc: "Ικανότητα διεξόδου από ψυχικά και σωματικά προβλήματα. Οι άνθρωποι γύρω σου σε ελέγχουν." },
                { type: "Αχνή", desc: "Χαμηλά επίπεδα ενέργειας και έλλειψη περιπέτειας / τόλμης και ρίσκου στη ζωή!" },
                { type: "Διακεκομμένη", desc: "Αγώνες, απώλειες, απρόσμενες αλλαγές. Ξεπερνάς γρήγορα τα προβλήματα. Δύσκολη παιδική ηλικία." },
                { type: "Αλυσιδωτή", desc: "Η ζωή σου σε οδηγεί σε πολλές κατευθύνσεις, μεγάλες αλλαγές. Πολλές ευαισθησίες." },
                { type: "Διχαλωτή", desc: "Φήμη, δόξα, αναγνώριση, πολλά ταξίδια και ξαφνική αλλαγή ζωής!" },
                { type: "Διπλή", desc: "Δίδυμα ή τρίδυμα αδέρφια. Γερή κράση ή 'διπλή' ζωή." }
            ];
            const lifeLine = lifeLineTypes[Math.floor(Math.random() * lifeLineTypes.length)];

            const heartLineTypes = [
                { type: "Μακριά", desc: "Ζεστό και δοτικό άτομο. Εξιδανικεύεις τις σχέσεις. Συναισθηματική εξάρτηση από γονείς." },
                { type: "Κοντή", desc: "Κλείνεσαι στον εαυτό σου, δεν εμπιστεύεσαι εύκολα. Εγωιστικό στις σχέσεις." },
                { type: "Βαθιά", desc: "Μόνιμο άγχος για σχέσεις, ανασφάλειες και συναισθηματικές φοβίες." },
                { type: "Κυματώδης", desc: "Κάνεις αρκετές ερωτικές σχέσεις, δυσκολεύεσαι να δεσμευτείς μόνιμα." },
                { type: "Τοξωτή", desc: "Διαισθητικό άτομο με πολλές ευαισθησίες και αγάπη για τους ανθρώπους. Εκφράζεις εύκολα συναισθήματα." },
                { type: "Διπλή", desc: "Συνδυάζεις απόλυτα τη λογική με το συναίσθημα." },
                { type: "Τριπλή", desc: "Συνδυάζεις τις σωματικές, συναισθηματικές και πνευματικές σου ανάγκες." }
            ];
            const heartLine = heartLineTypes[Math.floor(Math.random() * heartLineTypes.length)];

            const headLineTypes = [
                { type: "Μακριά", desc: "Εξυπνάδα, καλή μνήμη, δεν αντιδράς υπερβολικά." },
                { type: "Ίσια", desc: "Ρεαλιστική σκέψη, προσγειωμένος/η, λογική, καλή οργάνωση, βάση στη λεπτομέρεια." },
                { type: "Κυματώδης", desc: "Μάχη ανάμεσα στη λογική και το συναίσθημα. Δεν πιστεύεις στις δυνάμεις σου." },
                { type: "Αχνή", desc: "Δεν μπορείς εύκολα να συγκεντρωθείς, χάνεσαι σε φαντασίες." },
                { type: "Σπασμένη", desc: "Διλήμματα, αναποφασιστικότητα, αδυναμία για πρωτοβουλίες." },
                { type: "Αλυσιδωτή", desc: "Φοβάσαι να θέσεις στόχους, θέλεις πάντα καθοδήγηση." }
            ];
            const headLine = headLineTypes[Math.floor(Math.random() * headLineTypes.length)];

            const sunLine = Math.random() > 0.6 ? "Εμφανής (επιτυχία, φήμη, δημιουργικότητα)" : "Αμυδρή ή ανύπαρκτη";
            const intuitionLine = Math.random() > 0.7 ? "Εμφανής (έντονη διαίσθηση, ενσυναίσθηση)" : "Αμυδρή ή ανύπαρκτη";
            const marriageLine = Math.random() > 0.5 ? "Εμφανής (δεσμοί, σχέσεις)" : "Αμυδρή ή ανύπαρκτη";

            const handTypes = ["Πρακτικό (πλατύ, δάχτυλα κοντά)", "Ιδεαλιστικό (μακρύ, λεπτό)", "Ενεργητικό (κόκκινο δέρμα, ψηλά δάχτυλα)", "Μικτό"];
            const handType = handTypes[Math.floor(Math.random() * handTypes.length)];

            const signs = [];
            if (Math.random() > 0.7) signs.push("Σταυρός στη γραμμή Ζωής: Σημαντική αλλαγή ή γεγονός.");
            if (Math.random() > 0.8) signs.push("Νησί στη γραμμή Καρδιάς: Περίοδος συναισθηματικής έντασης.");
            if (Math.random() > 0.6) signs.push("Αλυσίδα στη γραμμή Κεφαλής: Δυσκολία συγκέντρωσης.");
            if (signs.length === 0) signs.push("Δεν εντοπίστηκαν ιδιαίτερα σημεία.");

            let genderAnalysis = "";
            if (gender === 'male') {
                genderAnalysis = `
                    <strong>👤 Ανάλυση για Άντρα:</strong><br>
                    • Η γραμμή Ζωής είναι συνήθως πιο μακριά και βαθιά, συνδεδεμένη με αντοχή, αθλητικότητα και υγεία.<br>
                    • Η γραμμή Καρδιάς είναι συχνά πιο μικρή και ίσια, υποδηλώνοντας δυσκολία έκφρασης συναισθήματος και σκεπτικισμό.<br>
                    • Η γραμμή Κεφαλής είναι συχνά ευθεία και μακριά, με έμφαση στη λογική και την ανάλυση.<br>
                    • Αν έχει έντονη γραμμή Καρδιάς χωρίς σπάσιμο, μπορεί να είναι εκφραστικός συναισθηματικά (σπάνιο).
                `;
            } else {
                genderAnalysis = `
                    <strong>👤 Ανάλυση για Γυναίκα:</strong><br>
                    • Η γραμμή Ζωής έχει συχνά μικρές αλυσίδες (συναισθηματικές φάσεις) ή διακοπές που σχετίζονται με τοκετό ή αλλαγή ζωής.<br>
                    • Η γραμμή Καρδιάς είναι μακριά και καμπύλη, δείχνοντας ρομαντισμό, ευαισθησία και εκφραστική δύναμη.<br>
                    • Η γραμμή Κεφαλής είναι πιο καμπύλη, με έμφαση στη διαίσθηση και την επικοινωνία.<br>
                    • Αν έχει βαθιά, ίσια γραμμή Κεφαλής, συχνά έχει αναλυτικό μυαλό παρά το στερεότυπο.
                `;
            }

            const dominantAnalysis = `
                <strong>🖐️ Ανάλυση Χεριών:</strong><br>
                • <strong>Κυρίαρχο χέρι (${dominantHand}):</strong> Δείχνει την εξέλιξη, την προσωπικότητα που έχετε αναπτύξει και τις επιλογές σας.<br>
                • <strong>Μη κυρίαρχο χέρι (${nonDominant}):</strong> Δείχνει τη «γέννηση», τα ταλέντα, την κληρονομιά, τις δυνατότητες.
            `;

            let ageAnalysis = "";
            if (age < 25) {
                ageAnalysis = `Στα ${age} σας χρόνια, η γραμμή ζωής δείχνει μια περίοδο δυναμικής εξέλιξης και αλλαγών. Νέες ευκαιρίες σας περιμένουν.`;
            } else if (age < 40) {
                ageAnalysis = `Στα ${age} σας χρόνια, η γραμμή ζωής δείχνει ωριμότητα και σταθερότητα. Οι αποφάσεις σας έχουν μακροπρόθεσμες συνέπειες.`;
            } else if (age < 60) {
                ageAnalysis = `Στα ${age} σας χρόνια, η γραμμή ζωής δείχνει σοφία και εμπειρία. Έμφαση στην οικογένεια και την πνευματική ανάπτυξη.`;
            } else {
                ageAnalysis = `Στα ${age} σας χρόνια, η γραμμή ζωής δείχνει μια πλούσια διαδρομή. Η εμπειρία σας είναι το μεγαλύτερο πλεονέκτημα.`;
            }

            const zodiacMap = {
                "Κριός": "Παρορμητική φύση, ενέργεια. Συνδεδεμένος με τον Λόφο του Άρη.",
                "Ταύρος": "Σταθερότητα & αντοχή. Συνδεδεμένος με τον Λόφο της Αφροδίτης.",
                "Δίδυμοι": "Ευελιξία, αλλαγή γνώμης. Συνδεδεμένος με τον Λόφο του Ερμή.",
                "Καρκίνος": "Συναισθηματική ευαισθησία. Συνδεδεμένος με τον Λόφο της Σελήνης.",
                "Λέων": "Ηγέτης, θέλει δράση. Συνδεδεμένος με τον Λόφο του Απόλλωνα.",
                "Παρθένος": "Αναλυτικό μυαλό. Συνδεδεμένος με τον Λόφο του Ερμή.",

        function performAnalysis() {

        function callMonetagAd() {
            return new Promise((resolve, reject) => {
                if (typeof show_10979429 === 'function') {
                    show_10979429().then(resolve).catch(reject);
                } else {
                    setTimeout(() => {
                        if (typeof show_10979429 === 'function') {
                            show_10979429().then(resolve).catch(reject);
                        } else {
                            resolve();
                        }
                    }, 500);
                }
            });
        }

        function refreshWithAd() {
            callMonetagAd().then(() => {
                resetAll();
            }).catch(() => {
                resetAll();
            });
        }

        function resetAll() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "📷 Κάμερα";
            ctx.clearRect(0,0,overlay.width,overlay.height);
            landmarksData = null;
            analysisResult = null;
            analysisDone = false;
            document.getElementById('upload-preview').style.display = 'none';
            document.getElementById('auto-status').style.display = 'none';
            document.getElementById('upload-type').innerText = '';
        }

        function saveToHistory() {
            if (!analysisResult) { alert("Κάνε ανάλυση πρώτα!"); return; }
            let h = JSON.parse(localStorage.getItem('history') || '[]');
            h.push({
                id: Date.now(),
                ...analysisResult,
                dateStr: new Date().toLocaleString('el-GR')
            });
            localStorage.setItem('history', JSON.stringify(h));
            renderHistory();
            alert("✅ Αποθηκεύτηκε!");
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const h = JSON.parse(localStorage.getItem('history') || '[]');
            if (!h.length) {
                list.innerHTML = "<p style='color:#888;'>Δεν υπάρχουν αναλύσεις.</p>";
                return;
            }
            list.innerHTML = h.map((item, i) => `
                <div class="history-item">
                    <strong>#${i+1}</strong> <small>${item.dateStr}</small> (${item.source})<br>
                    ✋ ${item.lifeLine.type} | ♈ ${item.zodiac} | 📅 ${item.userAge} ετών
                    <div class="history-actions">
                        <button onclick="deleteHistoryItem(${i})" style="background:#e74c3c;color:#fff;">Διαγραφή</button>
                        <button onclick="exportHistoryItemAsPDF(${i})" style="background:#3498db;color:#fff;">PDF</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('history-area').style.display = 'block';
        }

        function deleteHistoryItem(i) {
            let h = JSON.parse(localStorage.getItem('history') || '[]');
            h.splice(i, 1);
            localStorage.setItem('history', JSON.stringify(h));
            renderHistory();
        }

        function clearHistory() {
            if (confirm("Διαγραφή όλου του ιστορικού;")) {
                localStorage.removeItem('history');
                renderHistory();
                alert("Ιστορικό διαγράφηκε.");
            }
        }

        async function exportHistoryItemAsPDF(i) {
            const h = JSON.parse(localStorage.getItem('history') || '[]');
            const item = h[i];
            if (!item) return;
            const content = document.createElement('div');
            content.innerHTML = `
                <div style="font-family:Arial; padding:20px; color:#111; background:white; max-width:500px; margin:auto; border-radius:15px;">
                    <h2 style="text-align:center; color:#B8860B;">🧿 HandMaster Pro</h2>

                    <p><strong>❤️ Γραμμή Καρδιάς:</strong> ${item.heartLine.type} — ${item.heartLine.desc}</p>
                    <p><strong>🧠 Γραμμή Νου:</strong> ${item.headLine.type} — ${item.headLine.desc}</p>
                    <p><strong>☀️ Ηλιακού:</strong> ${item.sunLine}</p>
                    <p><strong>♈ Ζώδιο:</strong> ${item.zodiac} — ${item.zodiacMatch}</p>
                    <p><strong>🖐️ Τύπος Χεριού:</strong> ${item.handType}</p>
                    <hr>
                    <p style="text-align:center; font-size:12px; color:#999;">HandMaster Pro AI</p>
                </div>
            `;
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(content, { scale:2, backgroundColor:'#ffffff' });
            const pdf = new jsPDF('p','mm','a4');
            const w = pdf.internal.pageSize.getWidth();
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, (canvas.height * w) / canvas.width);
            pdf.save(`HandMaster_${item.dateStr}.pdf`);
        }

        function drawConnectors(ctx, lm, conn, style) {
            ctx.strokeStyle = style.color;
            ctx.lineWidth = style.lineWidth;
            for (const [i,j] of conn) {
                ctx.beginPath();
                ctx.moveTo(lm[i].x * overlay.width, lm[i].y * overlay.height);
                ctx.lineTo(lm[j].x * overlay.width, lm[j].y * overlay.height);
                ctx.stroke();
            }
        }
        function drawLandmarks(ctx, lm, style) {
            ctx.fillStyle = style.color;
            for (const p of lm) {
                ctx.beginPath();
                ctx.arc(p.x * overlay.width, p.y * overlay.height, style.radius, 0, 2*Math.PI);
                ctx.fill();
            }
        }
        const HAND_CONNECTIONS = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],
            [0,17],[17,18],[18,19],[19,20],
            [5,9],[9,13],[13,17]
        ];

        window.onload = function() {
            const h = JSON.parse(localStorage.getItem('history') || '[]');
            if (h.length) {
                renderHistory();
                document.getElementById('history-area').style.display = 'block';
            }
        };
