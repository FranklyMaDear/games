        /* ========== SPLASH SCREEN ========== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;

            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 20px;
            padding: 20px;
            animation: fadeInSplash 0.8s ease;
            overflow: hidden;
        }

        .splash-screen::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255,215,0,0.3), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,215,0,0.2), transparent),
                radial-gradient(3px 3px at 60% 20%, rgba(255,215,0,0.4), transparent),
                radial-gradient(2px 2px at 80% 50%, rgba(255,215,0,0.3), transparent),
                radial-gradient(2px 2px at 10% 80%, rgba(255,215,0,0.2), transparent),
                radial-gradient(3px 3px at 70% 90%, rgba(255,215,0,0.3), transparent),
                radial-gradient(2px 2px at 30% 50%, rgba(255,215,0,0.2), transparent),
                radial-gradient(2px 2px at 90% 10%, rgba(255,215,0,0.3), transparent);
            animation: particlesFloat 8s ease-in-out infinite;
            pointer-events: none;
        }

        .splash-screen::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes particlesFloat {
            0%, 100% { opacity: 0.5; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-15px); }
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        @keyframes fadeInSplash {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .splash-screen.hidden {
            display: none !important;
        }

        .splash-logo-wrapper {
            position: relative;
            z-index: 2;

        .splash-logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;

            width: clamp(220px, 48vw, 340px);
            height: clamp(220px, 48vw, 340px);
            border-color: rgba(255,215,0,0.08);

    <!-- SPLASH SCREEN -->

    <script src="words.js"></script>
    <script>
        (function() {
            // Fallback words
            if (typeof SECRET_WORDS === 'undefined') {
                window.SECRET_WORDS = [
                    { word: "CRACK", hint: "It can be found on a wall or a code" },
                    { word: "CODE", hint: "It is written by programmers" },
                    { word: "PUZZLE", hint: "A game that needs solving" },
                    { word: "BRAIN", hint: "You use it to think" },
                    { word: "LEVEL", hint: "A stage in a game" }
                ];
            }

            const ADSGRAM_BLOCK_ID = '32267';
            const AD_REWARD_POINTS = 150;
            const MILESTONES = [3, 6, 12, 24, 48];

            const KEYBOARD_ROWS = ["QWERTYUIOP".split(""), "ASDFGHJKL".split(""), "ZXCVBNM".split("")];
            const START_TIME = 180;
            const MAX_ATTEMPTS = 8;
            const POINTS_PER_LETTER = 5;
            const POINTS_FULL_WORD = 50;
            const POINTS_PENALTY_LOSS = 50;
            const POINTS_PENALTY_WRONG_LETTER = 5;
            const XP_PER_LEVEL = 1000;

            let currentWord, currentHint, gameActive, timeSeconds, timerInterval;
            let usedLetters, wrongAttempts, revealedLetters, usedWordIndices, isSpinning;
            let currentScore, highScore, currentLevel, currentXP, correctLettersInCurrentWord;
            let rollupShown = false;

            let totalGamesCompleted = 0;
            let currentMilestoneIndex = 0;
            let adButtonEnabled = false;

            const elements = {
                splashScreen: document.getElementById("splashScreen"),
                gameContainer: document.getElementById("gameContainer"),
                startGameBtn: document.getElementById("startGameBtn"),
                timerDisplay: document.getElementById("timerDisplay"),
                hintText: document.getElementById("hintText"),
                wordDisplay: document.getElementById("wordDisplay"),
                alphabetContainer: document.getElementById("alphabetContainer"),
                attemptsDots: document.getElementById("attemptsDots"),
                guessInput: document.getElementById("guessInput"),
                submitBtn: document.getElementById("submitGuess"),
                newGameBtn: document.getElementById("newGameBtn"),
                messageBox: document.getElementById("messageBox"),
                resultPanel: document.getElementById("resultPanel"),
                resultEmoji: document.getElementById("resultEmoji"),
                resultText: document.getElementById("resultText"),
                scoreDisplay: document.getElementById("scoreDisplay"),
                highScoreDisplay: document.getElementById("highScoreDisplay"),
                confettiContainer: document.getElementById("confettiContainer"),
                levelText: document.getElementById("levelText"),
                levelPoints: document.getElementById("levelPoints"),
                levelBar: document.getElementById("levelBar"),
                helpBtn: document.getElementById("helpBtn"),
                helpBtnContainer: document.getElementById("helpBtnContainer"),
                refreshBtn: document.getElementById("refreshBtn"),
                rollupBanner: document.getElementById("rollupBanner"),
                rollupClose: document.getElementById("rollupClose"),
                adBtn: document.getElementById("adBtn"),
                competitionBtn: document.getElementById("competitionBtn")
            };

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            let audioCtx;

            // ========== ADSGRAM ==========
            function callAdsgramAd() {
                return new Promise((resolve) => {
                    if (window.adsgram && typeof window.adsgram.show === 'function') {
                        window.adsgram.show({ blockId: ADSGRAM_BLOCK_ID })
                            .then(() => resolve(true))
                            .catch(() => resolve(false));
                    } else {
                        resolve(false);
                    }
                });
            }

            // ========== ΑΠΟΘΗΚΕΥΣΗ / ΦΟΡΤΩΣΗ ==========
            function loadGameData() {
                try {
                    totalGamesCompleted = parseInt(localStorage.getItem('crackTheCode_gamesCompleted') || '0');
                    currentMilestoneIndex = parseInt(localStorage.getItem('crackTheCode_milestoneIndex') || '0');
                } catch (e) {}
                updateAdButtonState();
            }

            function saveGameData() {
                try {
                    localStorage.setItem('crackTheCode_gamesCompleted', totalGamesCompleted);
                    localStorage.setItem('crackTheCode_milestoneIndex', currentMilestoneIndex);
                } catch (e) {}
            }

            function incrementGamesCompleted() {
                totalGamesCompleted++;
                saveGameData();
                updateAdButtonState();
            }

            function updateAdButtonState() {
                if (currentMilestoneIndex >= MILESTONES.length) {
                    elements.adBtn.style.display = 'none';
                    adButtonEnabled = false;
                    return;
                }
                const next = MILESTONES[currentMilestoneIndex];
                if (totalGamesCompleted >= next) {
                    elements.adBtn.style.display = 'flex';
                    elements.adBtn.disabled = false;
                    adButtonEnabled = true;
                } else {
                    elements.adBtn.style.display = 'none';
                    adButtonEnabled = false;
                }
            }

            function claimAdReward() {
                if (!adButtonEnabled) return;
                callAdsgramAd().then((success) => {
                    if (success) {
                        currentScore += AD_REWARD_POINTS;
                        addXP(AD_REWARD_POINTS);
                        updateScoreDisplay();
                        saveAllData();
                        showScorePop('+150', window.innerWidth/2, window.innerHeight/3);
                        elements.messageBox.textContent = '✅ +150 points & XP!';
                        elements.messageBox.style.color = '#ffd700';
                        currentMilestoneIndex++;
                        saveGameData();
                        updateAdButtonState();
                    } else {
                        elements.messageBox.textContent = '⚠️ Ad not completed.';
                        elements.messageBox.style.color = '#f87171';
                    }
                });
            }

            // ========== BUTTONS ==========
            elements.newGameBtn.addEventListener('click', (e) => {
                e.preventDefault();
                initAudio();
                rewardNewGame();
            });

            elements.helpBtn.addEventListener('click', (e) => {
                e.preventDefault();
                initAudio();
                if (!gameActive) return;
                if (wrongAttempts > 0) {
                    wrongAttempts--;
                    updateAttemptDots();
                    elements.messageBox.textContent = `🎉 +1 attempt (${MAX_ATTEMPTS - wrongAttempts} left)`;
                    elements.messageBox.style.color = '#4ade80';
                }
            });

            elements.refreshBtn.addEventListener('click', (e) => {
                e.preventDefault();
                elements.gameContainer.classList.add('hidden');
                elements.splashScreen.classList.remove('hidden');
                stopTimer();
                gameActive = false;
            });

            elements.adBtn.addEventListener('click', (e) => {
                e.preventDefault();
                initAudio();
                claimAdReward();
            });

            elements.competitionBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showRollupBanner(true);
            });

            function showRollupBanner(force = false) {
                if (!rollupShown || force) {
                    elements.rollupBanner.classList.add('active');
                    rollupShown = true;
                }
            }

            elements.rollupClose.addEventListener('click', () => {
                elements.rollupBanner.classList.remove('active');
            });

            // ========== GAME LOGIC (ίδια με πριν) ==========
            function initAudio() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function getRandomWord() {
                if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = [];
                let idx;
                do { idx = Math.floor(Math.random() * SECRET_WORDS.length); } while (usedWordIndices.includes(idx));
                usedWordIndices.push(idx);
                return SECRET_WORDS[idx];
            }

            function normalizeEnglish(text) {
                return text.toUpperCase().replace(/[^A-Z\s]/g, "").trim();
            }

            function formatTime(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function stopTimer() {
                if (timerInterval) clearInterval(timerInterval);
            }

            function createAttemptDots() {
                elements.attemptsDots.innerHTML = '';
                for (let i = 0; i < MAX_ATTEMPTS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'attempt-dot';
                    if (i < wrongAttempts) dot.classList.add('lost');
                    elements.attemptsDots.appendChild(dot);
                }
            }

            function updateAttemptDots() {
                [...elements.attemptsDots.children].forEach((dot, i) => {
                    dot.classList.toggle('lost', i < wrongAttempts);
                });
            }

            function createAlphabetButtons() {
                elements.alphabetContainer.innerHTML = '';
                KEYBOARD_ROWS.forEach(row => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'keyboard-row';
                    row.forEach(letter => {
                        const btn = document.createElement('button');
                        btn.className = 'letter-btn';
                        btn.textContent = letter;
                        btn.addEventListener('click', () => handleLetterClick(letter, btn));
                        rowDiv.appendChild(btn);
                    });
                    elements.alphabetContainer.appendChild(rowDiv);
                });
            }

            function updateAlphabetButtons() {
                const nw = normalizeEnglish(currentWord);
                elements.alphabetContainer.querySelectorAll('.letter-btn').forEach(btn => {
                    const l = btn.textContent;
                    btn.classList.remove('used-correct', 'used-wrong');
                    if (usedLetters.includes(l)) {
                        btn.classList.add(nw.includes(l) ? 'used-correct' : 'used-wrong');
                    }
                });
            }

            function updateWordDisplay() {
                elements.wordDisplay.innerHTML = '';
                const displayWord = currentWord.toUpperCase();
                const words = displayWord.split(' ');
                const nw = normalizeEnglish(currentWord);
                let globalIndex = 0;
                words.forEach((word, wi) => {
                    const row = document.createElement('div');
                    row.className = 'word-row';
                    if (wi > 0) {
                        const space = document.createElement('span');
                        space.className = 'word-slot space';
                        row.appendChild(space);
                        globalIndex++;
                    }
                    for (let i = 0; i < word.length; i++) {
                        const slot = document.createElement('span');
                        slot.className = 'word-slot';
                        slot.textContent = revealedLetters[globalIndex] || '_';
                        row.appendChild(slot);
                        globalIndex++;
                    }
                    elements.wordDisplay.appendChild(row);
                });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive || usedLetters.includes(letter)) return;
                usedLetters.push(letter);
                const nw = normalizeEnglish(currentWord);
                const positions = [];
                for (let i = 0; i < nw.length; i++) {
                    if (nw[i] === letter) positions.push(i);
                }

                if (positions.length > 0) {
                    positions.forEach(pos => revealedLetters[pos] = letter);
                    updateWordDisplay();
                    updateAlphabetButtons();
                    const points = positions.length * POINTS_PER_LETTER;
                    currentScore += points;
                    addXP(points);
                    elements.messageBox.textContent = `✅ "${letter}" found! +${points}`;
                    elements.messageBox.style.color = '#4ade80';
                    correctLettersInCurrentWord += positions.length;
                    if (revealedLetters.join('') === nw) {
                        currentScore += POINTS_FULL_WORD;
                        addXP(POINTS_FULL_WORD);
                        updateScoreDisplay();
                        saveAllData();
                        endGame(true);
                    }
                } else {
                    wrongAttempts++;
                    updateAttemptDots();
                    updateAlphabetButtons();
                    currentScore = Math.max(0, currentScore - POINTS_PENALTY_WRONG_LETTER);
                    elements.messageBox.textContent = `❌ "${letter}" wrong! ${wrongAttempts}/${MAX_ATTEMPTS}`;
                    elements.messageBox.style.color = '#f87171';
                    if (wrongAttempts >= MAX_ATTEMPTS) endGame(false, 'attempts');
                }
                updateScoreDisplay();
                saveAllData();
            }

            function checkFullGuess() {
                if (!gameActive) return;
                const guess = normalizeEnglish(elements.guessInput.value.trim());
                const nw = normalizeEnglish(currentWord);
                if (guess === nw) {
                    for (let i = 0; i < nw.length; i++) {
                        revealedLetters[i] = nw[i];
                        if (!usedLetters.includes(nw[i])) usedLetters.push(nw[i]);
                    }
                    currentScore += POINTS_FULL_WORD + (nw.length - correctLettersInCurrentWord) * POINTS_PER_LETTER;
                    addXP(POINTS_FULL_WORD);
                    updateWordDisplay();
                    updateAlphabetButtons();
                    updateScoreDisplay();
                    saveAllData();
                    endGame(true);
                } else {
                    wrongAttempts++;
                    updateAttemptDots();
                    elements.messageBox.textContent = `Wrong! ${wrongAttempts}/${MAX_ATTEMPTS}`;
                    elements.messageBox.style.color = '#f87171';
                    if (wrongAttempts >= MAX_ATTEMPTS) endGame(false, 'attempts');
                }
            }

            function endGame(won, reason) {
                if (!gameActive) return;
                gameActive = false;
                stopTimer();
                if (!won) {
                    currentScore = Math.max(0, currentScore - POINTS_PENALTY_LOSS);
                }
                updateScoreDisplay();
                saveAllData();
                elements.resultPanel.classList.remove('hidden');
                elements.resultEmoji.textContent = won ? '🎉' : '💔';
                elements.resultText.textContent = won ? 'YOU FOUND IT!' : 'GAME OVER';
                incrementGamesCompleted();
            }

            function rewardNewGame() {
                stopTimer();
                const obj = getRandomWord();
                currentWord = obj.word;
                currentHint = obj.hint;
                gameActive = true;
                timeSeconds = START_TIME;
                wrongAttempts = 0;
                usedLetters = [];
                isSpinning = false;
                correctLettersInCurrentWord = 0;
                revealedLetters = new Array(normalizeEnglish(currentWord).length).fill('');
                
                elements.timerDisplay.textContent = formatTime(timeSeconds);
                elements.hintText.textContent = '💡 ' + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                createAttemptDots();
                elements.guessInput.value = '';
                elements.guessInput.disabled = false;
                elements.submitBtn.disabled = false;
                elements.resultPanel.classList.add('hidden');
                elements.messageBox.textContent = '';
                elements.helpBtnContainer.style.display = 'flex';
                elements.rollupBanner.classList.remove('active');
                rollupShown = false;
                
                timerInterval = setInterval(() => {
                    if (!gameActive) return;
                    timeSeconds--;
                    elements.timerDisplay.textContent = formatTime(timeSeconds);
                    elements.timerDisplay.style.color = timeSeconds <= 30 ? '#f87171' : '#fff';
                    if (timeSeconds <= 0) endGame(false, 'time');
                }, 1000);
            }

            function startGame() {
                elements.splashScreen.classList.add('hidden');
                elements.gameContainer.classList.remove('hidden');
                initAudio();
                rewardNewGame();
            }

            elements.startGameBtn.addEventListener('click', startGame);
            elements.submitBtn.addEventListener('click', checkFullGuess);
            elements.guessInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkFullGuess();
            });

            // ========== SCORE & XP ==========
            function updateScoreDisplay() {
                elements.scoreDisplay.textContent = currentScore;
                if (currentScore > highScore) highScore = currentScore;
                elements.highScoreDisplay.textContent = highScore;
            }

            function addXP(amount) {
                currentXP += amount;
                while (currentXP >= XP_PER_LEVEL) {
                    currentXP -= XP_PER_LEVEL;
                    currentLevel++;
                    elements.levelText.textContent = '🏅 LEVEL ' + currentLevel;
                    elements.messageBox.textContent = '🎉 LEVEL UP! You are now LEVEL ' + currentLevel;
                    elements.messageBox.style.color = '#ffd700';
                    showRollupBanner(); // άνοιγμα φόρμας
                }
                const progress = Math.min((currentXP / XP_PER_LEVEL) * 100, 100);
                elements.levelBar.style.width = progress + '%';
                elements.levelPoints.textContent = currentXP + ' / ' + XP_PER_LEVEL + ' XP';
                saveAllData();
            }

            function saveAllData() {
                try {
                    localStorage.setItem('crackTheCode_highScore', highScore);
                    localStorage.setItem('crackTheCode_score', currentScore);
                    localStorage.setItem('crackTheCode_level', currentLevel);
                    localStorage.setItem('crackTheCode_xp', currentXP);
                } catch(e) {}
            }

            function showScorePop(text, x, y) {
                const pop = document.createElement('span');
                pop.className = 'score-pop';
                pop.textContent = text;
                pop.style.left = x + 'px';
                pop.style.top = y + 'px';
                document.body.appendChild(pop);
                setTimeout(() => pop.remove(), 1200);
            }

            // Αρχικοποίηση
            try {
                highScore = parseInt(localStorage.getItem('crackTheCode_highScore') || '0');
                currentScore = parseInt(localStorage.getItem('crackTheCode_score') || '0');
                currentLevel = parseInt(localStorage.getItem('crackTheCode_level') || '1');
                currentXP = parseInt(localStorage.getItem('crackTheCode_xp') || '0');
            } catch(e) {}
            updateScoreDisplay();
            elements.levelText.textContent = '🏅 LEVEL ' + currentLevel;
            elements.levelPoints.textContent = currentXP + ' / ' + XP_PER_LEVEL + ' XP';
            loadGameData();
        })();
    </script>
</body>
</html>
