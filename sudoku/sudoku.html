<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Sudoku - Galactic Edition</title>
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { overflow: hidden; height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: var(--bg-skin, #000010);
            position: relative; touch-action: manipulation;
            transition: background 0.4s ease;
        }
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .shooting-star { position: fixed; width: 3px; height: 80px; background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0)); border-radius: 50%; z-index: 1; pointer-events: none; animation: shoot linear forwards; transform-origin: top center; }
        @keyframes shoot { 0% { opacity: 1; transform: translate(0,0) rotate(-35deg); } 70% { opacity: 1; } 100% { opacity: 0; transform: translate(-400px,600px) rotate(-35deg); } }
        .nebula-particle { position: fixed; border-radius: 50%; z-index: 0; pointer-events: none; animation: nebulaFloat linear infinite; filter: blur(2px); }
        @keyframes nebulaFloat { 0% { transform: translate(0,0) scale(1); opacity: 0.6; } 50% { transform: translate(30px,-40px) scale(1.5); opacity: 0.2; } 100% { transform: translate(-20px,20px) scale(1); opacity: 0.6; } }

        .game-wrapper {
            display: flex; width: 100%; height: 100vh; height: 100dvh;
            justify-content: center; align-items: center;
            padding: 4px; position: relative; z-index: 50; overflow: hidden;
        }
        .game-container {
            text-align: center; background: rgba(14,16,39,0.92);
            border-radius: 22px; padding: 10px 12px 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 100%; max-width: 440px;
            max-height: calc(100vh - 8px); max-height: calc(100dvh - 8px);
            overflow-y: auto; overflow-x: hidden;
            border: 2px solid rgba(132,204,22,0.3); backdrop-filter: blur(10px);
        }

        /* ---- Level HUD ---- */
        .hud-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 4px; flex-wrap: wrap; }
        .hud-level { font-size: 0.65rem; font-weight: 800; color: #84cc16; text-shadow: 0 0 10px rgba(132,204,22,0.6); background: rgba(132,204,22,0.1); border: 1px solid rgba(132,204,22,0.3); padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
        .hud-zone { font-size: 0.6rem; font-weight: 700; color: rgba(255,255,255,0.55); flex: 1; text-align: center; }
        .hud-puzzles { font-size: 0.6rem; font-weight: 800; color: #e8e8ed; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 20px; white-space: nowrap; }

        /* level progress line */
        .level-progress-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; margin: 2px 0 6px; border: 1px solid rgba(132,204,22,0.15); }
        .level-progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #65a30d, #a3e635); border-radius: 20px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1); }

        h1 { color: #84cc16; margin-bottom: 4px; font-size: 1.35rem; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 20px rgba(132,204,22,0.5); }

        /* ---- Game bar ---- */
        .game-bar { display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 0.72rem; font-weight: 700; }
        .bar-chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(132,204,22,0.2); border-radius: 8px; padding: 4px 8px; color: #e8e8ed; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .bar-chip .lbl { color: rgba(255,255,255,0.45); font-weight: 600; }
        #mistakeChip.warn { color: #f87171; border-color: rgba(248,113,113,0.5); }
        #statusText { flex: 1; text-align: center; color: #a3e635; font-weight: 700; min-width: 60px; }
        #statusText.bad { color: #f87171; }

        /* ---- Board ---- */
        .board-wrap { position: relative; width: 100%; margin: 0 auto; }
        .sudoku-board {
            display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr);
            aspect-ratio: 1 / 1; width: 100%; max-width: 420px; margin: 0 auto;
            background: rgba(0,0,20,0.55); border: 3px solid #84cc16; border-radius: 10px;
            overflow: hidden; box-shadow: 0 0 22px rgba(132,204,22,0.25), inset 0 0 30px rgba(0,0,0,0.5);
        }
        .cell {
            display: flex; align-items: center; justify-content: center; position: relative;
            border: 1px solid rgba(132,204,22,0.13);
            cursor: pointer; user-select: none; overflow: hidden;
            transition: background 0.12s ease;
        }
        .cell.box-right  { border-right: 2px solid rgba(132,204,22,0.55); }
        .cell.box-bottom { border-bottom: 2px solid rgba(132,204,22,0.55); }
        .cell-val { font-size: var(--cell-font, clamp(0.9rem, 5vw, 1.5rem)); font-weight: 700; line-height: 1; }
        .cell.given .cell-val { color: #ffffff; font-weight: 800; text-shadow: 0 0 6px rgba(200,220,255,0.3); }
        .cell.user  .cell-val { color: #a3e635; }
        .cell.hintc .cell-val { color: #22d3ee; }
        .cell.error .cell-val { color: #fca5a5; }
        .cell.error { background: rgba(248,113,113,0.16) !important; }
        .cell.related { background: rgba(132,204,22,0.07); }
        .cell.same { background: rgba(34,211,238,0.16); }
        .cell.selected { background: rgba(132,204,22,0.30) !important; box-shadow: inset 0 0 0 2px rgba(163,230,53,0.7); }

        .board-loading { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 8px; background: rgba(10,14,39,0.82); border-radius: 10px; z-index: 5; }
        .board-loading.show { display: flex; }
        .spinner { width: 34px; height: 34px; border: 3px solid rgba(132,204,22,0.25); border-top-color: #84cc16; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .board-loading span { font-size: 0.75rem; color: #84cc16; font-weight: 700; letter-spacing: 1px; }

        /* ---- Number pad ---- */
        .num-pad { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; margin: 10px 0 4px; }
        .num-btn {
            aspect-ratio: 3 / 4; display: flex; align-items: center; justify-content: center; position: relative;
            background: linear-gradient(135deg, rgba(132,204,22,0.18), rgba(101,163,13,0.12));
            border: 1.5px solid rgba(132,204,22,0.4); border-radius: 8px;
            color: #e8e8ed; font-size: var(--num-font, clamp(0.85rem, 4.5vw, 1.25rem)); font-weight: 800;
            cursor: pointer; transition: all 0.12s; font-family: inherit;
        }
        .num-btn:active { transform: scale(0.92); background: rgba(132,204,22,0.35); }
        .num-btn.done { opacity: 0.28; pointer-events: none; }
        .num-btn .remain { position: absolute; bottom: 1px; right: 3px; font-size: 0.5rem; color: rgba(255,255,255,0.5); font-weight: 600; }

        /* ---- Tools ---- */
        .tool-row { display: flex; gap: 6px; margin-top: 2px; }
        .tool-btn {
            flex: 1; padding: 9px 4px; border-radius: 10px; cursor: pointer; font-family: inherit;
            background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.15);
            color: #e8e8ed; font-size: 0.66rem; font-weight: 700; transition: all 0.15s;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .tool-btn:active { transform: scale(0.94); }
        .tool-btn:disabled { opacity: 0.35; pointer-events: none; }
        .tool-btn .ico { font-size: 1.05rem; }
        .tool-btn .badge { font-size: 0.5rem; color: #fbbf24; }

        /* ---- Bottom buttons ---- */
        .game-buttons { display: flex; justify-content: center; align-items: stretch; gap: 5px; margin-top: 8px; }
        .game-btn { border: none; color: white; padding: 9px 6px; font-size: 0.72rem; border-radius: 24px; cursor: pointer; transition: all 0.2s; font-family: inherit; font-weight: 800; flex: 1; letter-spacing: 0.5px; }
        .game-btn:active { transform: translateY(3px); }
        .game-btn.restart { background: linear-gradient(135deg, #f39c12, #d35400); border: 2px solid #f1c40f; box-shadow: 0 4px 0 #b9770e; }
        .game-btn.newp    { background: linear-gradient(135deg, #84cc16, #65a30d); border: 2px solid #a3e635; box-shadow: 0 4px 0 #4d7c0f; }
        .game-btn.scores  { background: linear-gradient(135deg, #7b1fa2, #4a148c); border: 2px solid #ce93d8; box-shadow: 0 4px 0 #38006b; }
        .game-btn:active.restart { box-shadow: 0 1px 0 #b9770e; }
        .game-btn:active.newp    { box-shadow: 0 1px 0 #4d7c0f; }
        .game-btn:active.scores  { box-shadow: 0 1px 0 #38006b; }

        /* ---- Confetti ---- */
        @keyframes confettiFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .confetti { position: fixed; width: 7px; height: 7px; top: -10px; animation: confettiFall 3s linear forwards; z-index: 700; border-radius: 2px; }

        /* ---- Modals ---- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 600; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #0b0e26; border: 2px solid rgba(132,204,22,0.4); border-radius: 22px; padding: 20px; width: 92%; max-width: 380px; max-height: 88vh; overflow-y: auto; position: relative; box-shadow: 0 0 50px rgba(132,204,22,0.15); animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { transform: scale(0.85) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .modal-galaxy-title { font-size: 1.3rem; font-weight: 800; letter-spacing: 1px; text-align: center; margin-bottom: 6px; text-shadow: 0 0 14px currentColor; }
        .modal-galaxy-title.win { color: #84cc16; }
        .modal-sub { text-align: center; font-size: 0.72rem; color: rgba(255,255,255,0.55); margin-bottom: 8px; }

        .levelup-banner { display: none; text-align: center; margin: 10px 0; padding: 10px; border-radius: 14px; background: linear-gradient(135deg, rgba(232,28,255,0.18), rgba(132,204,22,0.18)); border: 1px solid rgba(206,147,216,0.5); }
        .levelup-banner.show { display: block; animation: pop 0.5s ease; }
        @keyframes pop { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
        .levelup-banner .big { font-size: 1rem; font-weight: 800; color: #f0abfc; letter-spacing: 1px; }
        .levelup-banner .small { font-size: 0.7rem; color: #a3e635; margin-top: 3px; font-weight: 700; }

        .progress-wrap { margin: 12px 0 8px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-bottom: 5px; font-weight: 700; }
        .progress-track { background: rgba(255,255,255,0.08); border-radius: 20px; height: 14px; overflow: hidden; border: 1px solid rgba(132,204,22,0.2); }
        .progress-bar { height: 100%; border-radius: 20px; background: linear-gradient(90deg, #65a30d, #a3e635); width: 0%; transition: width 0.9s cubic-bezier(0.22,1,0.36,1); }

        .battle-stats { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 14px; margin: 12px 0; text-align: left; }
        .battle-stats-title { font-size: 0.62rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.78rem; }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: rgba(255,255,255,0.45); font-weight: 600; }
        .stat-value { color: #e8e8ed; font-weight: 700; }
        .stat-value.gold { color: #fbbf24; }

        .modal-action-btn { display: block; width: 100%; margin-top: 8px; padding: 13px; border-radius: 30px; border: none; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 800; letter-spacing: 1px; transition: all 0.2s; background: linear-gradient(135deg, #84cc16, #65a30d); color: #fff; box-shadow: 0 4px 0 #4d7c0f; }
        .modal-action-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4d7c0f; }
        .modal-action-btn:disabled { opacity: 0.6; pointer-events: none; }

        .score-modal-box { background: #0e1027; border: 2px solid rgba(132,204,22,0.4); border-radius: 20px; padding: 20px 16px; width: 92%; max-width: 400px; max-height: 82vh; overflow-y: auto; box-shadow: 0 0 40px rgba(132,204,22,0.15); }
        .modal-title { color: #84cc16; font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; text-align: center; margin-bottom: 14px; text-shadow: 0 0 12px rgba(132,204,22,0.5); }
        .modal-back-btn { display: block; width: 100%; margin-top: 14px; padding: 12px; background: linear-gradient(135deg, #84cc16, #65a30d); border: none; border-radius: 30px; color: #fff; font-size: 0.9rem; font-weight: 800; font-family: inherit; cursor: pointer; box-shadow: 0 4px 0 #4d7c0f; transition: all 0.2s; letter-spacing: 1px; }
        .modal-back-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4d7c0f; }

        @media (max-width: 600px) {
            h1 { font-size: 1.15rem; }
            .tool-btn { font-size: 0.6rem; }
        }
        @media (max-width: 380px) {
            .hud-zone { font-size: 0.55rem; }
            .game-bar { font-size: 0.65rem; }
        }
    </style>

<body>
    <canvas id="starCanvas"></canvas>
    <div class="game-wrapper">
        <div class="game-container">

            <div class="hud-top">
                <div class="hud-level" id="hudLevel">LEVEL 1</div>
                <div class="hud-zone" id="hudZone">🌱 Very Easy · 4×4</div>
                <div class="hud-puzzles" id="hudPuzzles">Puzzle 1/10</div>
            </div>
            <div class="level-progress-track"><div class="level-progress-bar" id="levelProgressBar"></div></div>

            <h1>🪐 SUDOKU</h1>

            <div class="game-bar">
                <div class="bar-chip"><span class="lbl">⏱</span><span id="timeDisplay">0:00</span></div>
                <div id="statusText">Good luck!</div>
                <div class="bar-chip" id="mistakeChip"><span class="lbl">❌</span><span id="mistakeDisplay">0</span></div>
            </div>

            <div class="board-wrap">
                <div class="sudoku-board" id="sudokuBoard"></div>
                <div class="board-loading" id="boardLoading"><div class="spinner"></div><span>Generating puzzle…</span></div>
            </div>

            <div class="num-pad" id="numPad"></div>

            <div class="tool-row">
                <button class="tool-btn" id="undoBtn"><span class="ico">↶</span>Undo</button>
                <button class="tool-btn" id="hintBtn"><span class="ico">💡</span>Hint<span class="badge" id="hintBadge">3</span></button>
            </div>

            <div class="game-buttons">
                <button class="game-btn restart" id="restartBtn">↺ Restart</button>
                <button class="game-btn newp" id="newPuzzleBtn">✨ New Puzzle</button>
                <button class="game-btn scores" id="openScoreboardBtn">📊 Stats</button>
            </div>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div class="modal-overlay" id="endModal">
        <div class="modal-box">
            <div class="modal-galaxy-title win" id="endTitle">🎉 Puzzle Solved!</div>
            <div class="modal-sub" id="endSub"></div>

            <div class="levelup-banner" id="levelupBanner">
                <div class="big" id="levelupBig">🚀 LEVEL UP!</div>
                <div class="small" id="levelupSmall"></div>
            </div>

            <div class="progress-wrap">
                <div class="progress-label">
                    <span id="progressLabelLeft">Level Progress</span>
                    <span id="progressLabelRight"></span>
                </div>
                <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
            </div>

            <div class="battle-stats">
                <div class="battle-stats-title">📊 Stats</div>
                <div class="stat-row"><span class="stat-label">Time</span><span class="stat-value" id="statTime">0s</span></div>
                <div class="stat-row"><span class="stat-label">Mistakes</span><span class="stat-value" id="statMistakes">0</span></div>
                <div class="stat-row"><span class="stat-label">Hints used</span><span class="stat-value" id="statHints">0</span></div>
            </div>

            <button class="modal-action-btn" id="endActionBtn">▶ Next Puzzle</button>
        </div>
    </div>

    <!-- STATS MODAL -->
    <div class="modal-overlay" id="scoreModal">
        <div class="score-modal-box">
            <div class="modal-title">📊 Your Stats</div>
            <div class="battle-stats" style="margin-top:0;">
                <div class="stat-row"><span class="stat-label">🧩 Puzzles solved</span><span class="stat-value" id="stSolved">0</span></div>
                <div class="stat-row"><span class="stat-label">🌌 Current level</span><span class="stat-value" id="stLevel">1</span></div>
                <div class="stat-row"><span class="stat-label">🏆 Highest level</span><span class="stat-value" id="stMax">1</span></div>
            </div>
            <div class="battle-stats">
                <div class="battle-stats-title">⚡ Best Times</div>
                <div class="stat-row"><span class="stat-label">4×4 grid</span><span class="stat-value" id="bt4">—</span></div>
                <div class="stat-row"><span class="stat-label">6×6 grid</span><span class="stat-value" id="bt6">—</span></div>
                <div class="stat-row"><span class="stat-label">9×9 grid</span><span class="stat-value" id="bt9">—</span></div>
            </div>
            <button class="modal-back-btn" id="closeScoreboardBtn">← Back to game</button>
        </div>
    </div>

    <script>
    (function() {
        // ============================================================
        // STARFIELD BACKGROUND
        // ============================================================
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [], _bgPaused = false, _rafId = null, _shootTimer = null;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function createStars(count) {
            stars = [];
            for (let i = 0; i < count; i++) stars.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                radius: Math.random()*2.5+0.5, baseBrightness: Math.random()*0.7+0.3,
                twinkleSpeed: Math.random()*0.02+0.005, twinkleOffset: Math.random()*Math.PI*2,
                driftX: (Math.random()-0.5)*0.3, driftY: (Math.random()-0.5)*0.3
            });
        }
        function drawStars(timestamp) {
            if (_bgPaused) { _rafId = null; return; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                const twinkle = Math.sin(timestamp * star.twinkleSpeed + star.twinkleOffset) * 0.3 + 0.7;
                const alpha = star.baseBrightness * twinkle;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2); ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
                if (star.radius > 1.5) { ctx.beginPath(); ctx.arc(star.x, star.y, star.radius*2.5, 0, Math.PI*2); ctx.fillStyle = `rgba(180,200,255,${alpha*0.3})`; ctx.fill(); }
                star.x += star.driftX; star.y += star.driftY;
                if (star.x < 0) star.x = canvas.width; if (star.x > canvas.width) star.x = 0;
                if (star.y < 0) star.y = canvas.height; if (star.y > canvas.height) star.y = 0;
            });
            _rafId = requestAnimationFrame(drawStars);
        }
        function createShootingStar() {
            const s = document.createElement('div'); s.classList.add('shooting-star');
            s.style.left = Math.random()*80+'%'; s.style.top = Math.random()*40+'%';
            s.style.animationDuration = (Math.random()*1.5+1.5)+'s';
            document.body.appendChild(s); s.addEventListener('animationend', () => s.remove());
        }
        function scheduleShootingStar() {
            _shootTimer = setTimeout(() => { if (_bgPaused) { _shootTimer = null; return; } createShootingStar(); scheduleShootingStar(); }, Math.random()*5000+3000);
        }
        function createNebulaParticles(count) {
            const colors = ['rgba(132,204,22,0.15)','rgba(25,118,210,0.15)','rgba(255,64,129,0.1)','rgba(156,39,176,0.12)','rgba(34,211,238,0.1)'];
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div'); p.classList.add('nebula-particle');
                const size = Math.random()*120+60; p.style.width = size+'px'; p.style.height = size+'px';
                p.style.left = Math.random()*100+'%'; p.style.top = Math.random()*100+'%';
                p.style.background = colors[Math.floor(Math.random()*colors.length)];
                p.style.animationDuration = (Math.random()*12+8)+'s'; p.style.animationDelay = Math.random()*5+'s';
                document.body.appendChild(p);
            }
        }
        function initBackgroundEffects() {
            resizeCanvas(); createStars(200); _rafId = requestAnimationFrame(drawStars);
            createNebulaParticles(15); scheduleShootingStar(); setTimeout(createShootingStar, 600);
        }
        window.addEventListener('resize', () => { resizeCanvas(); createStars(200); });

        // ============================================================
        // AUDIO
        // ============================================================
        class GameAudio {
            constructor() { this.audioCtx = null; this.initialized = false; }
            init() { if (this.initialized) return; try { this.audioCtx = new (window.AudioContext||window.webkitAudioContext)(); this.initialized = true; } catch(e) {} }
            _run() { this.init(); if (this.audioCtx && this.audioCtx.state === 'suspended') { try { this.audioCtx.resume(); } catch(e) {} } }
            tick(freq) {
                this._run(); if (!this.audioCtx) return;
                try {
                    const now = this.audioCtx.currentTime;
                    const o = this.audioCtx.createOscillator(); const g = this.audioCtx.createGain();
                    o.connect(g); g.connect(this.audioCtx.destination); o.type = 'sine';
                    o.frequency.setValueAtTime(freq, now);
                    g.gain.setValueAtTime(0.18, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.09);
                    o.start(now); o.stop(now+0.1);
                } catch(e) {}
            }
            place() { this.tick(440); }
            hint()  { this.tick(680); }
            wrong() {
                this._run(); if (!this.audioCtx) return;
                try {
                    const now = this.audioCtx.currentTime;
                    const o = this.audioCtx.createOscillator(); const g = this.audioCtx.createGain();
                    o.connect(g); g.connect(this.audioCtx.destination); o.type = 'square';
                    o.frequency.setValueAtTime(160, now); o.frequency.exponentialRampToValueAtTime(80, now+0.15);
                    g.gain.setValueAtTime(0.12, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.18);
                    o.start(now); o.stop(now+0.18);
                } catch(e) {}
            }
            victory() {
                this._run(); if (!this.audioCtx) return;
                try {
                    const now = this.audioCtx.currentTime;
                    [{f:523.25,t:0},{f:659.25,t:0.13},{f:783.99,t:0.26},{f:1046.50,t:0.39,d:0.4}].forEach(n => {
                        const o = this.audioCtx.createOscillator(); const g = this.audioCtx.createGain();
                        o.connect(g); g.connect(this.audioCtx.destination); o.type = 'sine';
                        o.frequency.setValueAtTime(n.f, now+n.t);
                        g.gain.setValueAtTime(0.2, now+n.t); g.gain.exponentialRampToValueAtTime(0.01, now+n.t+(n.d||0.2));
                        o.start(now+n.t); o.stop(now+n.t+(n.d||0.2));
                    });
                } catch(e) {}
            }
        }

        // ============================================================
        // SUDOKU ENGINE (parametric: any N with boxH x boxW sub-boxes)
        // ============================================================
        const BIT_TO_NUM = {};
        for (let i = 1; i <= 16; i++) BIT_TO_NUM[1 << i] = i;
        function popcount(x){ let n=0; while(x){ x&=x-1; n++; } return n; }
        function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

        function makeSpec(N, boxH, boxW){
            return { N, boxH, boxW, boxCols:(N/boxW)|0, FULL_MASK:(((1<<N)-1)<<1) };
        }
        function boxIdx(spec, r, c){ return ((r/spec.boxH)|0)*spec.boxCols + ((c/spec.boxW)|0); }

        function isValid(spec, grid, r, c, num){
            const N=spec.N;
            for(let i=0;i<N;i++){ if(grid[r][i]===num||grid[i][c]===num) return false; }
            const br=((r/spec.boxH)|0)*spec.boxH, bc=((c/spec.boxW)|0)*spec.boxW;
            for(let i=0;i<spec.boxH;i++) for(let j=0;j<spec.boxW;j++) if(grid[br+i][bc+j]===num) return false;
            return true;
        }

        function fillGrid(spec, grid){
            const N=spec.N;
            for(let r=0;r<N;r++) for(let c=0;c<N;c++){
                if(grid[r][c]===0){
                    const nums=shuffle(Array.from({length:N},(_,i)=>i+1));
                    for(const n of nums){
                        if(isValid(spec,grid,r,c,n)){
                            grid[r][c]=n;
                            if(fillGrid(spec,grid)) return true;
                            grid[r][c]=0;
                        }
                    }
                    return false;
                }
            }
            return true;
        }

        function generateSolution(spec){
            const N=spec.N;
            const grid=Array.from({length:N},()=>new Array(N).fill(0));
            fillGrid(spec,grid);
            return grid;
        }

        // Counts solutions up to `limit`, MRV heuristic, restores grid on exit.
        function countSolutions(spec, grid, limit){
            const N=spec.N;
            const rows=new Array(N).fill(0), cols=new Array(N).fill(0), boxes=new Array(N).fill(0);
            for(let r=0;r<N;r++) for(let c=0;c<N;c++){
                const v=grid[r][c];
                if(v){ const bit=1<<v; rows[r]|=bit; cols[c]|=bit; boxes[boxIdx(spec,r,c)]|=bit; }
            }
            let count=0;
            function rec(){
                let bR=-1,bC=-1,bMask=0,bCnt=99;
                outer:
                for(let r=0;r<N;r++){
                    for(let c=0;c<N;c++){
                        if(grid[r][c]===0){
                            const used=rows[r]|cols[c]|boxes[boxIdx(spec,r,c)];
                            const avail=spec.FULL_MASK & ~used;
                            const cnt=popcount(avail);
                            if(cnt===0) return;
                            if(cnt<bCnt){ bCnt=cnt; bR=r; bC=c; bMask=avail; if(cnt===1) break outer; }
                        }
                    }
                }
                if(bR===-1){ count++; return; }
                let m=bMask;
                while(m){
                    const bit=m&(-m); m^=bit; const num=BIT_TO_NUM[bit];
                    grid[bR][bC]=num; rows[bR]|=bit; cols[bC]|=bit; boxes[boxIdx(spec,bR,bC)]|=bit;
                    rec();
                    grid[bR][bC]=0; rows[bR]^=bit; cols[bC]^=bit; boxes[boxIdx(spec,bR,bC)]^=bit;
                    if(count>=limit) return;
                }
            }
            rec();
            return count;
        }

        // Remove cells while keeping a unique solution, aiming for `targetClues` givens.
        function makePuzzle(spec, solution, targetClues){
            const N=spec.N;
            const puzzle=solution.map(row=>[...row]);
            const cells=[];
            for(let r=0;r<N;r++) for(let c=0;c<N;c++) cells.push([r,c]);
            shuffle(cells);
            let clues=N*N;
            for(const [r,c] of cells){
                if(clues<=targetClues) break;
                const backup=puzzle[r][c];
                puzzle[r][c]=0;
                if(countSolutions(spec,puzzle,2)!==1){ puzzle[r][c]=backup; }
                else { clues--; }
            }
            return { puzzle, clues };
        }

        // ============================================================
        // LEVEL / DIFFICULTY SYSTEM
        //   Grid grows small -> big as levels rise (4x4 -> 6x6 -> 9x9),
        //   then difficulty keeps climbing by giving fewer numbers.
        // ============================================================
        const PUZZLES_PER_LEVEL = 10;
        const HINTS_FREE = 3;

        const TIERS = [
            { min:1,  max:2,    label:'Very Easy', emoji:'🌱', N:4, boxH:2, boxW:2, clues:8,  t:1 },
            { min:3,  max:4,    label:'Easy',      emoji:'🚀', N:6, boxH:2, boxW:3, clues:18, t:2 },
            { min:5,  max:6,    label:'Medium',    emoji:'🛸', N:9, boxH:3, boxW:3, clues:40, t:3 },
            { min:7,  max:8,    label:'Hard',      emoji:'⭐', N:9, boxH:3, boxW:3, clues:34, t:4 },
            { min:9,  max:10,   label:'Expert',    emoji:'⚔️', N:9, boxH:3, boxW:3, clues:30, t:5 },
            { min:11, max:9999, label:'Master',    emoji:'👑', N:9, boxH:3, boxW:3, clues:26, t:6 },
        ];
        function getTier(level) {
            for (const z of TIERS) if (level >= z.min && level <= z.max) return z;
            return TIERS[TIERS.length - 1];
        }

        // ---- persistence ----
        const SAVE_KEY = 'sudoku_galactic_v2';
        const DEFAULT_SAVE = { level:1, puzzlesInLevel:0, totalSolved:0, maxLevel:1, bestTimes:{} };
        function loadSave() {
            try { const d = JSON.parse(localStorage.getItem(SAVE_KEY)); return d ? { ...DEFAULT_SAVE, ...d, bestTimes:{...(d.bestTimes||{})} } : { ...DEFAULT_SAVE, bestTimes:{} }; }
            catch { return { ...DEFAULT_SAVE, bestTimes:{} }; }
        }
        function writeSave(s) { try { localStorage.setItem(SAVE_KEY, JSON.stringify(s)); } catch(e) {} }

        // ============================================================
        // SUDOKU GAME
        // ============================================================
        class SudokuGame {
            constructor() {
                this.gameData = loadSave();
                this.audio = new GameAudio(); this.audio.init();

                this.boardEl   = document.getElementById('sudokuBoard');
                this.numPadEl  = document.getElementById('numPad');
                this.loadingEl = document.getElementById('boardLoading');

                this.spec = null;
                this.solution = null;   // N x N
                this.puzzle = null;     // N x N (0 = empty), the current values
                this.given = null;      // N x N boolean
                this.hintCells = null;  // N x N boolean
                this.cellEls = [];

                this.selected = null;   // {r,c}
                this.mistakes = 0;
                this.hintsUsed = 0;
                this.freeHintsLeft = HINTS_FREE;
                this.undoStack = [];
                this.timer = null; this.elapsed = 0; this._won = false;

                this.bindUI();
                this.updateHUD();
                this.startNewPuzzle();
                document.addEventListener('click', () => this.audio._run(), { once:true });
                document.addEventListener('keydown', () => this.audio._run(), { once:true });
            }

            // ---------- helpers ----------
            get N() { return this.spec.N; }

            setLoading(on) { this.loadingEl.classList.toggle('show', on); }

            fmtTime(sec) { const m = Math.floor(sec/60), s = sec%60; return `${m}:${s.toString().padStart(2,'0')}`; }

            // ---------- UI wiring ----------
            bindUI() {
                document.getElementById('undoBtn').addEventListener('click', () => this.undo());
                document.getElementById('hintBtn').addEventListener('click', () => this.requestHint());
                document.getElementById('restartBtn').addEventListener('click', () => this.restartPuzzle());
                document.getElementById('newPuzzleBtn').addEventListener('click', () => this.startNewPuzzle());

                // WIN modal -> play ad, THEN next puzzle
                const endBtn = document.getElementById('endActionBtn');
                endBtn.addEventListener('click', () => {
                    endBtn.disabled = true;
                    endBtn.textContent = '⏳ Loading ad…';
                    this.showAdAndExecute(() => {
                        document.getElementById('endModal').classList.remove('open');
                        endBtn.disabled = false;
                        endBtn.textContent = '▶ Next Puzzle';
                        this.startNewPuzzle();
                    });
                });

                // Stats modal
                const sModal = document.getElementById('scoreModal');
                document.getElementById('openScoreboardBtn').addEventListener('click', () => { this.renderStats(); sModal.classList.add('open'); });
                document.getElementById('closeScoreboardBtn').addEventListener('click', () => sModal.classList.remove('open'));
                sModal.addEventListener('click', e => { if (e.target === sModal) sModal.classList.remove('open'); });

                // Keyboard (desktop). No erase key (erase feature removed).
                document.addEventListener('keydown', (e) => {
                    if (document.getElementById('endModal').classList.contains('open')) return;
                    const N = this.spec ? this.spec.N : 9;
                    if (e.key >= '1' && e.key <= '9' && (+e.key) <= N) { this.inputNumber(+e.key); }
                    else if (this.selected && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                        let {r,c} = this.selected;
                        if (e.key==='ArrowUp') r=Math.max(0,r-1);
                        if (e.key==='ArrowDown') r=Math.min(N-1,r+1);
                        if (e.key==='ArrowLeft') c=Math.max(0,c-1);
                        if (e.key==='ArrowRight') c=Math.min(N-1,c+1);
                        this.selectCell(r,c); e.preventDefault();
                    }
                });
            }

            // ---------- Monetag ad ----------
            showAdAndExecute(callback) {
                if (typeof show_11108267 === 'function') {
                    show_11108267()
                        .then(() => { if (callback) callback(); })
                        .catch((err) => {
                            console.warn('Ad blocked or failed:', err);
                            if (callback) callback(); // don't block the game if the ad fails
                        });
                } else {
                    if (callback) callback(); // fallback if the SDK didn't load
                }
            }

            // ---------- new / restart puzzle ----------
            startNewPuzzle() {
                const tier = getTier(this.gameData.level);
                this.spec = makeSpec(tier.N, tier.boxH, tier.boxW);
                this.tier = tier;

                this._won = false; this.selected = null;
                this.mistakes = 0; this.hintsUsed = 0; this.freeHintsLeft = HINTS_FREE;
                this.hintCells = null; this.undoStack = [];
                this.stopTimer();
                this.setLoading(true);
                this.setStatus('Good luck!', false);

                // small delay so the loading spinner paints before generation
                setTimeout(() => {
                    try {
                        const sol = generateSolution(this.spec);
                        const { puzzle } = makePuzzle(this.spec, sol, this.tier.clues);
                        const N = this.spec.N;
                        this.solution = sol;
                        this.puzzle = puzzle.map(r => [...r]);
                        this.given  = puzzle.map(row => row.map(v => v !== 0));
                        this.hintCells = Array.from({length:N},()=>new Array(N).fill(false));
                    } catch (err) {
                        console.error(err);
                    }
                    this.setLoading(false);
                    this.buildBoard();
                    this.buildNumPad();
                    this.updateHUD();
                    this.updateToolButtons();
                    this.elapsed = 0; this.updateTimeDisplay();
                    this.startTimer();
                }, 30);
            }

            restartPuzzle() {
                if (!this.puzzle) return;
                const N = this.spec.N;
                for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
                    if (!this.given[r][c]) { this.puzzle[r][c] = 0; this.hintCells[r][c] = false; }
                }
                this.selected = null; this.mistakes = 0; this.hintsUsed = 0;
                this.freeHintsLeft = HINTS_FREE; this.undoStack = [];
                this._won = false;
                this.setStatus('Good luck!', false);
                this.renderCells(); this.updateNumPad(); this.updateHUD(); this.updateToolButtons();
                this.elapsed = 0; this.updateTimeDisplay(); this.startTimer();
            }

            // ---------- board build ----------
            buildBoard() {
                const N = this.spec.N;
                const b = this.boardEl;
                b.innerHTML = '';
                b.style.gridTemplateColumns = `repeat(${N}, 1fr)`;
                b.style.gridTemplateRows = `repeat(${N}, 1fr)`;
                // font scaling per size
                const cellFont = N <= 4 ? '2rem' : N <= 6 ? '1.7rem' : '1.35rem';
                const numFont  = N <= 4 ? '1.6rem' : N <= 6 ? '1.4rem' : '1.2rem';
                b.style.setProperty('--cell-font', `clamp(1rem, ${Math.round(60/N)}vw, ${cellFont})`);
                this.numPadEl.style.setProperty('--num-font', `clamp(0.9rem, ${Math.round(55/N)}vw, ${numFont})`);

                this.cellEls = [];
                for (let r=0;r<N;r++){
                    const rowArr = [];
                    for (let c=0;c<N;c++){
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if ((c+1) % this.spec.boxW === 0 && c < N-1) cell.classList.add('box-right');
                        if ((r+1) % this.spec.boxH === 0 && r < N-1) cell.classList.add('box-bottom');
                        const val = document.createElement('span');
                        val.className = 'cell-val';
                        cell.appendChild(val);
                        cell.addEventListener('click', () => this.selectCell(r,c));
                        b.appendChild(cell);
                        rowArr.push(cell);
                    }
                    this.cellEls.push(rowArr);
                }
                this.renderCells();
            }

            buildNumPad() {
                const N = this.spec.N;
                const pad = this.numPadEl;
                pad.innerHTML = '';
                pad.style.gridTemplateColumns = `repeat(${N}, 1fr)`;
                this.numBtns = [];
                for (let n=1;n<=N;n++){
                    const btn = document.createElement('button');
                    btn.className = 'num-btn';
                    btn.innerHTML = `${n}<span class="remain" id="remain-${n}"></span>`;
                    btn.addEventListener('click', () => this.inputNumber(n));
                    pad.appendChild(btn);
                    this.numBtns.push(btn);
                }
                this.updateNumPad();
            }

            // ---------- rendering ----------
            renderCells() {
                const N = this.spec.N;
                for (let r=0;r<N;r++) for (let c=0;c<N;c++) this.renderCell(r,c);
                this.applyHighlights();
            }

            renderCell(r,c) {
                const cell = this.cellEls[r][c];
                const v = this.puzzle[r][c];
                const val = cell.querySelector('.cell-val');
                cell.classList.remove('given','user','hintc','error');
                if (this.given[r][c]) {
                    cell.classList.add('given');
                    val.textContent = v || '';
                } else if (v) {
                    if (this.hintCells[r][c]) cell.classList.add('hintc');
                    else cell.classList.add('user');
                    if (v !== this.solution[r][c]) cell.classList.add('error');
                    val.textContent = v;
                } else {
                    val.textContent = '';
                }
            }

            applyHighlights() {
                const N = this.spec.N;
                const sel = this.selected;
                const selVal = sel ? this.puzzle[sel.r][sel.c] : 0;
                for (let r=0;r<N;r++) for (let c=0;c<N;c++){
                    const cell = this.cellEls[r][c];
                    cell.classList.remove('related','same','selected');
                    if (!sel) continue;
                    if (r===sel.r && c===sel.c) { cell.classList.add('selected'); continue; }
                    const sameBox = boxIdx(this.spec,r,c) === boxIdx(this.spec,sel.r,sel.c);
                    if (r===sel.r || c===sel.c || sameBox) cell.classList.add('related');
                    if (selVal && this.puzzle[r][c] === selVal) cell.classList.add('same');
                }
            }

            // ---------- interaction ----------
            selectCell(r,c) {
                this.selected = { r, c };
                this.applyHighlights();
            }

            inputNumber(n) {
                if (this._won || !this.selected) return;
                const { r, c } = this.selected;
                if (this.given[r][c]) return;             // can't edit givens
                if (this.puzzle[r][c] === n) return;      // already there
                this.undoStack.push({ r, c, prev: this.puzzle[r][c], prevHint: this.hintCells[r][c] });
                this.puzzle[r][c] = n;
                this.hintCells[r][c] = false;
                if (n !== this.solution[r][c]) {
                    this.mistakes++;
                    this.audio.wrong();
                    this.setStatus('Not quite — try another', true);
                } else {
                    this.audio.place();
                    this.setStatus('Nice!', false);
                }
                this.renderCell(r,c);
                this.applyHighlights();
                this.updateNumPad();
                this.updateHUD();
                this.updateToolButtons();
                this.checkWin();
            }

            undo() {
                if (this._won || this.undoStack.length === 0) return;
                const last = this.undoStack.pop();
                this.puzzle[last.r][last.c] = last.prev;
                this.hintCells[last.r][last.c] = last.prevHint;
                this.selectCell(last.r, last.c);
                this.renderCell(last.r,last.c);
                this.applyHighlights();
                this.updateNumPad();
                this.updateToolButtons();
                this.setStatus('Good luck!', false);
            }

            // ---------- hints ----------
            requestHint() {
                if (this._won) return;
                if (this.freeHintsLeft > 0) {
                    this.freeHintsLeft--;
                    this.doHint();
                    this.updateToolButtons();
                } else {
                    // out of free hints -> watch an ad for one more
                    const hb = document.getElementById('hintBtn');
                    hb.disabled = true;
                    this.showAdAndExecute(() => {
                        hb.disabled = false;
                        this.doHint();
                        this.updateToolButtons();
                    });
                }
            }

            doHint() {
                const N = this.spec.N;
                // fill the selected empty cell, else a random empty cell
                let target = null;
                if (this.selected && !this.given[this.selected.r][this.selected.c]
                    && this.puzzle[this.selected.r][this.selected.c] !== this.solution[this.selected.r][this.selected.c]) {
                    target = { r:this.selected.r, c:this.selected.c };
                } else {
                    const empties = [];
                    for (let r=0;r<N;r++) for (let c=0;c<N;c++)
                        if (this.puzzle[r][c] !== this.solution[r][c]) empties.push({r,c});
                    if (empties.length === 0) return;
                    target = empties[(Math.random()*empties.length)|0];
                }
                const { r, c } = target;
                this.undoStack.push({ r, c, prev: this.puzzle[r][c], prevHint: this.hintCells[r][c] });
                this.puzzle[r][c] = this.solution[r][c];
                this.hintCells[r][c] = true;
                this.hintsUsed++;
                this.audio.hint();
                this.selectCell(r,c);
                this.renderCell(r,c);
                this.applyHighlights();
                this.updateNumPad();
                this.updateHUD();
                this.setStatus('Hint placed', false);
                this.checkWin();
            }

            // ---------- number pad state ----------
            updateNumPad() {
                if (!this.numBtns) return;
                const N = this.spec.N;
                const correctCount = new Array(N+1).fill(0);
                for (let r=0;r<N;r++) for (let c=0;c<N;c++){
                    const v = this.puzzle[r][c];
                    if (v && v === this.solution[r][c]) correctCount[v]++;
                }
                for (let n=1;n<=N;n++){
                    const remain = N - correctCount[n];
                    const rem = document.getElementById(`remain-${n}`);
                    if (rem) rem.textContent = remain > 0 ? remain : '';
                    this.numBtns[n-1].classList.toggle('done', remain <= 0);
                }
            }

            updateToolButtons() {
                const undoBtn = document.getElementById('undoBtn');
                undoBtn.disabled = this.undoStack.length === 0;
                const badge = document.getElementById('hintBadge');
                if (this.freeHintsLeft > 0) { badge.textContent = this.freeHintsLeft; badge.style.color = '#fbbf24'; }
                else { badge.textContent = '🎬'; badge.style.color = '#e81cff'; }
            }

            // ---------- win ----------
            checkWin() {
                const N = this.spec.N;
                for (let r=0;r<N;r++) for (let c=0;c<N;c++){
                    if (this.puzzle[r][c] !== this.solution[r][c]) {
                        // if the grid is full but wrong, nudge the player
                        let full = true;
                        for (let rr=0;rr<N;rr++) for (let cc=0;cc<N;cc++) if (this.puzzle[rr][cc]===0) full=false;
                        if (full) this.setStatus('Some numbers are wrong', true);
                        return;
                    }
                }
                this.onWin();
            }

            onWin() {
                if (this._won) return;
                this._won = true;

                // DAILY REWARDS: count this win so Sudoku Daily Rewards unlock in the app
                try {
                    const sudokuWins = parseInt(localStorage.getItem('FRANKLY_SUDOKU_WINS') || '0', 10) + 1;
                    localStorage.setItem('FRANKLY_SUDOKU_WINS', sudokuWins.toString());
                } catch (e) {}

                this.stopTimer();
                this.audio.victory();
                this.launchConfetti();

                const N = this.spec.N;
                // best time
                const bt = this.gameData.bestTimes || (this.gameData.bestTimes = {});
                if (!bt[N] || this.elapsed < bt[N]) bt[N] = this.elapsed;

                // progress + level up
                this.gameData.totalSolved++;
                this.gameData.puzzlesInLevel++;
                let leveledUp = false, sizeChanged = false, newTier = null;
                if (this.gameData.puzzlesInLevel >= PUZZLES_PER_LEVEL) {
                    const oldTier = getTier(this.gameData.level);
                    this.gameData.level++;
                    this.gameData.puzzlesInLevel = 0;
                    this.gameData.maxLevel = Math.max(this.gameData.maxLevel, this.gameData.level);
                    leveledUp = true;
                    newTier = getTier(this.gameData.level);
                    sizeChanged = newTier.N !== oldTier.N;
                }
                writeSave(this.gameData);
                this.updateHUD();
                this.showWinModal(leveledUp, sizeChanged, newTier);
            }

            showWinModal(leveledUp, sizeChanged, newTier) {
                document.getElementById('statTime').textContent = this.fmtTime(this.elapsed);
                document.getElementById('statMistakes').textContent = this.mistakes;
                document.getElementById('statHints').textContent = this.hintsUsed;

                document.getElementById('endSub').textContent =
                    `${this.tier.emoji} ${this.tier.label} · ${this.spec.N}×${this.spec.N}`;

                const banner = document.getElementById('levelupBanner');
                if (leveledUp) {
                    banner.classList.add('show');
                    document.getElementById('levelupBig').textContent = `🚀 LEVEL ${this.gameData.level}!`;
                    document.getElementById('levelupSmall').textContent = sizeChanged
                        ? `Bigger grid unlocked: ${newTier.N}×${newTier.N} — ${newTier.label}!`
                        : `Difficulty: ${newTier.label}`;
                } else {
                    banner.classList.remove('show');
                }

                const inLevel = this.gameData.puzzlesInLevel;
                const pct = Math.round((inLevel / PUZZLES_PER_LEVEL) * 100);
                document.getElementById('progressLabelRight').textContent = `${inLevel}/${PUZZLES_PER_LEVEL}`;
                const bar = document.getElementById('progressBar');
                bar.style.width = '0%';
                setTimeout(() => { bar.style.width = pct + '%'; }, 60);

                document.getElementById('endModal').classList.add('open');
            }

            launchConfetti() {
                const colors = ['#84cc16','#a3e635','#fbbf24','#22d3ee','#e81cff','#ffffff'];
                for (let i=0;i<70;i++){
                    const conf = document.createElement('div');
                    conf.className = 'confetti';
                    conf.style.left = Math.random()*100+'vw';
                    conf.style.background = colors[(Math.random()*colors.length)|0];
                    conf.style.animationDelay = Math.random()*0.6+'s';
                    conf.style.animationDuration = (Math.random()*1.5+2)+'s';
                    document.body.appendChild(conf);
                    conf.addEventListener('animationend', () => conf.remove());
                }
            }

            // ---------- HUD ----------
            setStatus(txt, bad) {
                const el = document.getElementById('statusText');
                el.textContent = txt;
                el.classList.toggle('bad', !!bad);
            }

            updateHUD() {
                const g = this.gameData;
                const tier = getTier(g.level);
                document.getElementById('hudLevel').textContent = `LEVEL ${g.level}`;
                document.getElementById('hudZone').textContent = `${tier.emoji} ${tier.label} · ${tier.N}×${tier.N}`;
                document.getElementById('hudPuzzles').textContent = `Puzzle ${g.puzzlesInLevel+1}/${PUZZLES_PER_LEVEL}`;
                document.getElementById('levelProgressBar').style.width =
                    Math.round((g.puzzlesInLevel / PUZZLES_PER_LEVEL) * 100) + '%';
                document.getElementById('mistakeDisplay').textContent = this.mistakes;
                document.getElementById('mistakeChip').classList.toggle('warn', this.mistakes > 0);
            }

            renderStats() {
                const g = this.gameData;
                document.getElementById('stSolved').textContent = g.totalSolved;
                document.getElementById('stLevel').textContent = g.level;
                document.getElementById('stMax').textContent = g.maxLevel;
                const bt = g.bestTimes || {};
                document.getElementById('bt4').textContent = bt[4] != null ? this.fmtTime(bt[4]) : '—';
                document.getElementById('bt6').textContent = bt[6] != null ? this.fmtTime(bt[6]) : '—';
                document.getElementById('bt9').textContent = bt[9] != null ? this.fmtTime(bt[9]) : '—';
            }

            // ---------- timer ----------
            startTimer() {
                this.stopTimer();
                this.timer = setInterval(() => { this.elapsed++; this.updateTimeDisplay(); }, 1000);
            }
            stopTimer() { if (this.timer) { clearInterval(this.timer); this.timer = null; } }
            updateTimeDisplay() { document.getElementById('timeDisplay').textContent = this.fmtTime(this.elapsed); }
        }

        // ============================================================
        // INIT
        // ============================================================
        window.addEventListener('DOMContentLoaded', () => {
            initBackgroundEffects();
            new SudokuGame();
        });
        // pause heavy background animation when tab hidden
        document.addEventListener('visibilitychange', () => {
            _bgPaused = document.hidden;
            if (!_bgPaused && !_rafId) _rafId = requestAnimationFrame(drawStars);
            if (!_bgPaused && !_shootTimer) scheduleShootingStar();
        });
    })();
    </script>
</body>
</html>
