<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e27">
    <title>FranklyGames - Board</title>
    
    <script src="//libtl.com/sdk.js" data-zone="11108267" data-sdk="show_11108267"></script>
    
    <style>
        :root {
            --tile-size: 75px;
            --gap: 14px;
            --step: calc(var(--tile-size) + var(--gap));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a14;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 1;
        }

        .board-area {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: visible;
            z-index: 20;
            margin-bottom: 90px;
        }

        .world {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            z-index: 5;
            perspective: 800px;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(25deg) rotateZ(45deg);
            transition: all 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .tile-top {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .player {
            position: absolute;
            width: 36px;
            height: 36px;
            background: #fff;
            border-radius: 50%;
            z-index: 100;
            transition: left 0.3s ease, top 0.3s ease;
            box-shadow: 0 0 15px #84cc16;
        }

        .controls-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(10,10,20,1), rgba(10,10,20,0));
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
        }

        .roll-btn {
            background: linear-gradient(135deg, #ff4081, #c51162);
            border: none;
            border-radius: 40px;
            padding: 16px 36px;
            color: white;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 64, 129, 0.5);
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="bg-layer" id="bgLayer"></div>
        
        <div class="game-container">
            <div class="board-area" id="boardArea">
                <div class="world" id="world"></div>
                <div class="player" id="player"></div>
            </div>

            <div class="controls-panel">
                <div style="color:white; font-weight:bold; align-self:center;" id="spinsDisplay">Γύροι: 10</div>
                <button class="roll-btn" id="rollBtn" onclick="rollDice()">ΖΑΡΙ 🎲</button>
            </div>
        </div>
    </div>

    <script>
        let gameState = { points: 0, stars: 0, spins: 10 };
        let currentIdx = 0;
        let isRolling = false;

        const pathPoints = [
            {x: 100, y: 300}, {x: 180, y: 300}, {x: 260, y: 300},
            {x: 260, y: 220}, {x: 260, y: 140}, {x: 180, y: 140}
        ];

        function sendToParent(data) {
            window.parent.postMessage(data, '*');
        }

        function updateSpinsDisplay() {
            document.getElementById('spinsDisplay').textContent = `Γύροι: ${gameState.spins}`;
        }

        function rollDice() {
            if (isRolling || gameState.spins <= 0) return;
            isRolling = true;
            gameState.spins--;
            updateSpinsDisplay();

            let steps = Math.floor(Math.random() * 3) + 1;
            currentIdx = (currentIdx + steps) % pathPoints.length;

            setTimeout(() => {
                const targetPos = pathPoints[currentIdx];
                const player = document.getElementById('player');
                player.style.left = targetPos.x + 'px';
                player.style.top = targetPos.y + 'px';
                
                gameState.points += 10;
                localStorage.setItem('mariza_points', gameState.points);
                sendToParent({ type: 'updatePoints', points: gameState.points });
                
                isRolling = false;
            }, 600);
        }

        function buildPath() {
            const world = document.getElementById('world');
            pathPoints.forEach((pt, idx) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.left = pt.x + 'px';
                tile.style.top = pt.y + 'px';
                tile.innerHTML = `<div class="tile-inner"><div class="tile-top">✨</div></div>`;
                world.appendChild(tile);
            });
        }

        // Initialize
        buildPath();
        updateSpinsDisplay();
        // Τοποθέτηση παίκτη στην αφετηρία
        document.getElementById('player').style.left = pathPoints[0].x + 'px';
        document.getElementById('player').style.top = pathPoints[0].y + 'px';
    </script>
</body>
</html>
