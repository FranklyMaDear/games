<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e27">
    <title>Board Game</title>
    
    <script src="//libtl.com/sdk.js" data-zone="11108267" data-sdk="show_11108267"></script>

    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        :root {
            --tile-size: 100px;
            --gap: 0px; /* Μηδενίστηκε το κενό για ενιαίο μονοπάτι */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a14;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0e27 0%, #000000 100%);
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .bg-orb.orb1 { width: 300px; height: 300px; background: radial-gradient(circle, #6366f1, transparent); top: -10%; left: -10%; }
        .bg-orb.orb2 { width: 250px; height: 250px; background: radial-gradient(circle, #06b6d4, transparent); bottom: 10%; right: -5%; animation-delay: -4s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.1); }
            50% { transform: translate(-20px, 30px) scale(0.9); }
            75% { transform: translate(-40px, -10px) scale(1.05); }
        }

        .bg-float {
            position: absolute;
            font-size: 24px;
            animation: floatUp 15s linear infinite;
            opacity: 0.4;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(120vh) rotate(0deg) scale(0.6); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        .game-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 1;
        }

        .board-area {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: visible;
            z-index: 20;
            margin-bottom: 100px;
        }

        .world {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
        }

        .path-tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            z-index: 5;
            perspective: 800px;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(45deg) rotateZ(45deg);
            transition: transform 0.2s ease;
            will-change: transform;
        }

        .path-tile.active .tile-inner {
            transform: rotateX(45deg) rotateZ(45deg) translateZ(12px) scale(1.05);
        }

        .tile-top {
            width: 100%; height: 100%; border-radius: 16px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4); position: relative; border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2), inset 0 2px 4px rgba(255,255,255,0.1); backface-visibility: hidden;
        }

        .tile-bottom {
            position: absolute; width: 100%; height: 100%; border-radius: 16px; top: 0; left: 0;
            transform: translateZ(-6px); filter: brightness(0.6); z-index: -1;
        }

        .path-tile.blue .tile-top { background: linear-gradient(145deg, #1a237e, #0d47a1); border-color: rgba(6, 182, 212, 0.5); }
        .path-tile.blue .tile-bottom { background: #0a3270; }
        .path-tile.special .tile-top { background: linear-gradient(145deg, #1b5e20, #2e7d32); border-color: #84cc16; box-shadow: 0 0 30px rgba(132, 204, 22, 0.4); }
        .path-tile.special .tile-bottom { background: #0d3b0f; }
        .path-tile.xp .tile-top { background: linear-gradient(145deg, #4a148c, #6a1b9a); border-color: #d946ef; }
        .path-tile.xp .tile-bottom { background: #3a0a7a; }
        .path-tile.energy .tile-top { background: linear-gradient(145deg, #f57f17, #f9a825); border-color: #fbbf24; }
        .path-tile.energy .tile-bottom { background: #c46b0a; }

        .tile-icon { font-size: 36px; margin-bottom: 2px; filter: drop-shadow(0 0 12px rgba(255,255,255,0.4)); }
        .tile-label { font-size: 12px; font-weight: 700; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 8px; }

        /* ΕΥΘΥΓΡΑΜΜΙΣΗ ΠΙΟΝΙΟΥ */
        .player {
            position: absolute;
            width: 60px;
            height: 70px;
            z-index: 60;
            pointer-events: none;
            transition: left 0.35s ease, top 0.35s ease;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.6));
            will-change: left, top;
            transform: translate(-50%, -60%); /* Διορθώθηκε για να κάθεται στο κέντρο */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pawn-emoji {
            font-size: 55px;
            line-height: 1;
            animation: colorShift 4s infinite;
            text-shadow: 0 0 15px currentColor;
        }

        @keyframes colorShift {
            0% { color: #ffd700; } 25% { color: #00b4d8; } 50% { color: #ff4081; } 75% { color: #84cc16; } 100% { color: #ffd700; }
        }

        .dice-popup {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.7);
            background: rgba(0, 0, 0, 0.95); border: 4px solid #ffd54f; border-radius: 20px;
            padding: 20px 28px; z-index: 200; opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 0 60px rgba(255,215,0,0.6);
        }
        .dice-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .dice-display { font-size: 80px; font-weight: 900; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #ffd700; color: #000; padding: 12px 26px; border-radius: 30px;
            font-weight: 900; font-size: 16px; z-index: 500; transition: transform 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* REWARD MODAL */
        .reward-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000;
            display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .reward-modal.show { opacity: 1; pointer-events: auto; }
        .reward-box {
            background: rgba(20, 20, 35, 0.95); border: 2px solid #ffd700; border-radius: 24px;
            padding: 30px 24px; text-align: center; max-width: 360px; width: 90%;
            box-shadow: 0 0 60px rgba(255,215,0,0.3); animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; }
        }
        .reward-title { font-size: 1.6rem; font-weight: 900; color: #fff; margin-bottom: 6px; }
        .reward-icon { font-size: 4rem; display: block; margin: 6px auto; }
        .reward-value { font-size: 2rem; font-weight: 900; color: #ffd700; margin: 6px 0 16px; }
        .reward-btn {
            display: block; width: 100%; margin: 6px 0; padding: 14px; border: none; border-radius: 50px;
            font-weight: 900; font-size: 1rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        }
        .reward-btn.claim { background: linear-gradient(135deg, #84cc16, #a3e635); color: #000; }
        .reward-btn.double { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.95));
            backdrop-filter: blur(12px); border-top: 2px solid rgba(255, 255, 255, 0.1);
            padding: 8px 8px max(8px, env(safe-area-inset-bottom)) 8px; display: flex; flex-direction: column; align-items: center; gap: 6px;
        }

        .energy-row { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 2px 0; }
        .energy-bar { display: flex; align-items: center; gap: 4px; font-weight: 900; color: #ffd700; }
        .energy-bar .boxes { display: flex; gap: 2px; }
        .energy-bar .box { width: 14px; height: 14px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 3px; }
        .energy-bar .box.filled { background: #ffd700; border-color: #ffd700; box-shadow: 0 0 8px rgba(255, 215, 0, 0.5); }
        .energy-bar .count { font-size: 14px; margin-left: 4px; }

        .actions-row { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 0 4px; }
        .roll-btn {
            background: linear-gradient(135deg, #ff4081, #c51162); border: 2px solid #ff69b4; border-radius: 40px;
            padding: 12px 20px; color: #fff; font-size: 16px; font-weight: 900; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 6px 0 #880e4f, 0 12px 28px rgba(0, 0, 0, 0.5); cursor: pointer; flex: 1; max-width: 160px; height: 48px;
        }
        .roll-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 #880e4f, 0 6px 14px rgba(0, 0, 0, 0.4); }
        .roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .watch-ad-btn {
            background: linear-gradient(135deg, #ff9800, #e65100); border: 2px solid #ffb74d; border-radius: 30px;
            padding: 10px 12px; color: #fff; font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 4px;
            cursor: pointer; box-shadow: 0 4px 0 #bf360c, 0 6px 12px rgba(0, 0, 0, 0.4); flex: 1; max-width: 140px; height: 48px;
        }
        .watch-ad-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #bf360c, 0 3px 6px rgba(0, 0, 0, 0.3); }

        /* ΙΠΤΑΜΕΝΗ ΕΝΕΡΓΕΙΑ */
        .flying-energy {
            position: absolute;
            left: -100px;
            font-size: 34px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #f9a825, 0 0 20px #f57f17;
            cursor: pointer;
            z-index: 1000;
            animation: flyAcross 5s linear forwards;
            padding: 15px;
        }

        @keyframes flyAcross {
            0% { transform: translateX(0) scale(1) rotate(-15deg); }
            50% { transform: translateX(50vw) scale(1.3) rotate(15deg); }
            100% { transform: translateX(120vw) scale(1) rotate(-15deg); }
        }

        @media (max-width: 480px) {
            :root { --tile-size: 78px; }
            .player { width: 45px; height: 55px; }
            .pawn-emoji { font-size: 46px; }
            .roll-btn, .watch-ad-btn { height: 42px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="bg-orb orb1"></div>
        <div class="bg-orb orb2"></div>
        <div class="bg-float" style="left: 5%; top: 20%;">🪙</div>
        <div class="bg-float" style="left: 85%; top: 10%;">⚡</div>
        <div class="bg-float" style="left: 15%; top: 70%;">♟</div>
    </div>

    <div class="game-wrapper">
        <div class="game-container">
            <div class="board-area" id="boardArea">
                <div class="world" id="world"></div>
                <div class="player" id="player">
                    <div class="pawn-emoji">♟️</div>
                </div>
                <div class="dice-popup" id="dicePopup">
                    <div class="dice-display" id="diceDisplay">🎲</div>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="energy-row" id="energyRow">
                    <div class="energy-bar" id="energyBar">
                        <div class="boxes" id="energyBoxes"></div>
                        <span class="count" id="energyCount">⚡ 0</span>
                    </div>
                </div>
                <div class="actions-row">
                    <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 ROLL</button>
                    <button class="watch-ad-btn" onclick="watchAdForRolls()">📢 +5 Rolls</button>
                </div>
            </div>
        </div>
    </div>

    <div class="reward-modal" id="rewardModal">
        <div class="reward-box">
            <span class="reward-icon" id="rewardIcon">🪙</span>
            <div class="reward-title" id="rewardTitle">You Won!</div>
            <div class="reward-value" id="rewardValue">+5 Points</div>
            <button class="reward-btn claim" id="rewardClaimBtn">Claim</button>
            <button class="reward-btn double" id="rewardDoubleBtn">Double! (Ad)</button>
        </div>
    </div>

    <script>
        'use strict';

        // ΗΧΗΤΙΚΑ ΕΦΕ (Web Audio API)
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playDiceSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [800, 600, 1000].forEach((freq, i) => {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.08);
                gain.gain.setValueAtTime(0.15, now + i * 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.15);
            });
        }

        function playMoveSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.05);
        }

        function playRewardSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.12);
                gain.gain.setValueAtTime(0.2, now + i * 0.12);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.4);
            });
        }

        // MONETAG ADS INTEGRATION
        function showMonetagAd() {
            return new Promise((resolve, reject) => {
                if (typeof show_11108267 === 'function') {
                    show_11108267().then(() => resolve(true)).catch(() => reject('Ad failed'));
                } else {
                    setTimeout(() => {
                        if (typeof show_11108267 === 'function') show_11108267().then(resolve).catch(reject);
                        else resolve(true);
                    }, 800);
                }
            });
        }

        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const boardArea = document.getElementById('boardArea');
        const dicePopup = document.getElementById('dicePopup');
        const diceDisplay = document.getElementById('diceDisplay');
        const rollBtn = document.getElementById('rollBtn');
        const energyBoxes = document.getElementById('energyBoxes');
        const energyCount = document.getElementById('energyCount');
        const rewardModal = document.getElementById('rewardModal');
        const rewardIcon = document.getElementById('rewardIcon');
        const rewardTitle = document.getElementById('rewardTitle');
        const rewardValue = document.getElementById('rewardValue');
        const rewardClaimBtn = document.getElementById('rewardClaimBtn');
        const rewardDoubleBtn = document.getElementById('rewardDoubleBtn');

        let gameState = { energy: 10, points: 0 };
        let isRolling = false;
        let currentIdx = 0;
        let pendingReward = null;

        const tileSize = 100, gap = 0; // Το gap έγινε 0
        let pathPoints = [];

        function sendToParent(msg) {
            if (window.parent !== window) window.parent.postMessage(msg, '*');
        }

        function generateLinearZigZagPath(count) {
            const path = [{x: 0, y: 0}];
            let stepCount = 0, dir = 0;
            while (path.length < count) {
                const last = path[path.length - 1];
                let nx = last.x, ny = last.y;
                if (dir === 0) { nx++; ny--; } else { nx--; ny--; }
                path.push({x: nx, y: ny});
                stepCount++;
                if (stepCount === 4) { stepCount = 0; dir = (dir + 1) % 2; }
            }
            return path;
        }

        function buildPath() { if (pathPoints.length === 0) pathPoints = generateLinearZigZagPath(250); }

        function getRewardType(idx) {
            if (idx <= 0) return { type: 'empty', icon: '', label: '', value: 0 };
            const mod = idx % 10;
            if (mod === 1) return { type: 'points5', icon: '🪙', label: '+5 Points', value: 5 };
            if (mod === 4) return { type: 'points10', icon: '🪙', label: '+10 Points', value: 10 };
            if (mod === 5) return { type: 'energy2', icon: '⚡', label: '+2 Rolls', value: 2 };
            if (mod === 8) return { type: 'energy3', icon: '⚡', label: '+3 Rolls', value: 3 };
            if (mod === 7) return { type: 'points15', icon: '🪙', label: '+15 Points', value: 15 };
            return { type: 'empty', icon: '', label: '', value: 0 };
        }

        function getPlayerScreenPos() {
            const r = boardArea.getBoundingClientRect();
            return { x: r.width / 2, y: r.height * 0.55 };
        }

        function renderAllTiles() {
            world.innerHTML = '';
            const sp = getPlayerScreenPos(), pp = pathPoints[currentIdx];
            const start = Math.max(0, currentIdx - 15), end = Math.min(pathPoints.length - 1, currentIdx + 25);
            
            for (let i = start; i <= end; i++) {
                const pt = pathPoints[i], rew = getRewardType(i);
                const tile = document.createElement('div');
                let tileClass = 'path-tile';
                if (i === currentIdx) tileClass += ' active';

                if (rew.type === 'empty') {
                    if (i % 10 === 7) tileClass += ' special'; else tileClass += ' blue';
                } else if (rew.type.startsWith('energy')) tileClass += ' energy';
                else if (rew.type.startsWith('points')) tileClass += ' xp';

                tile.className = tileClass;

                let icon = '', label = '';
                if (rew.type === 'empty' && i % 10 === 7) { icon = '📦'; label = '⚡'; }
                else if (rew.type === 'energy2') { icon = '⚡'; label = '+2'; }
                else if (rew.type === 'energy3') { icon = '⚡'; label = '+3'; }
                else if (rew.type === 'points5') { icon = '🪙'; label = '+5'; }
                else if (rew.type === 'points10') { icon = '🪙'; label = '+10'; }
                else if (rew.type === 'points15') { icon = '🪙'; label = '+15'; }

                tile.innerHTML = `
                    <div class="tile-inner">
                        <div class="tile-top">
                            ${icon ? `<span class="tile-icon">${icon}</span>` : ''}
                            ${label ? `<span class="tile-label">${label}</span>` : ''}
                        </div>
                        <div class="tile-bottom"></div>
                    </div>
                `;

                const rx = (pt.x - pp.x) * (tileSize + gap);
                const ry = (pt.y - pp.y) * (tileSize + gap);
                tile.style.left = (sp.x + rx - tileSize / 2) + 'px';
                tile.style.top = (sp.y + ry - tileSize / 2) + 'px';
                world.appendChild(tile);
            }
            player.style.left = sp.x + 'px';
            player.style.top = sp.y + 'px';
        }

        function movePlayer(steps) {
            return new Promise(resolve => {
                let remaining = steps;
                function step() {
                    if (remaining <= 0) { resolve(); return; }
                    currentIdx++; buildPath(); renderAllTiles();
                    playMoveSound(); // Ήχος βήματος
                    remaining--;
                    setTimeout(step, 400);
                }
                step();
            });
        }

        function showDice(n) {
            const diceFaces = ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            let i = 0;
            const interval = setInterval(() => { diceDisplay.textContent = diceFaces[i % diceFaces.length]; i++; }, 60);

            setTimeout(() => {
                clearInterval(interval);
                const icons = ['🎲', '1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣']; // Διορθώθηκε για 1-6
                diceDisplay.textContent = icons[n] || '🎲';
                dicePopup.classList.add('show');
                playDiceSound(); // Ήχος ζαριού
                setTimeout(() => dicePopup.classList.remove('show'), 550);
            }, 300);
        }

        function showToast(msg) {
            const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg;
            document.body.appendChild(toast); requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2000);
        }

        function updateEnergyUI() {
            const maxDisplay = 10, filled = Math.min(gameState.energy, maxDisplay);
            let html = '';
            for (let i = 0; i < maxDisplay; i++) html += `<div class="box ${i < filled ? 'filled' : ''}"></div>`;
            energyBoxes.innerHTML = html;
            energyCount.textContent = '⚡ ' + gameState.energy;
            rollBtn.disabled = gameState.energy <= 0;
        }

        function applyReward(reward, multiplier = 1) {
            const value = reward.value * multiplier;
            if (reward.type.startsWith('points')) {
                gameState.points += value;
                sendToParent({ type: 'addPoints', value: value });
            } else if (reward.type.startsWith('energy')) {
                gameState.energy += value;
                sendToParent({ type: 'addEnergy', value: value });
            }
            playRewardSound(); // Ήχος νίκης
            updateEnergyUI();
            saveProgress();
            showToast(`+${value} ${reward.label.split(' ')[1]}!`);
        }

        function showRewardModal(reward) {
            pendingReward = reward;
            rewardIcon.textContent = reward.icon || '🎁';
            rewardTitle.textContent = 'You Won!';
            rewardValue.textContent = `${reward.label}`;
            rewardModal.classList.add('show');
        }

        function claimReward() {
            if (pendingReward) { applyReward(pendingReward, 1); pendingReward = null; rewardModal.classList.remove('show'); }
        }

        async function doubleReward() {
            if (pendingReward) {
                try {
                    await showMonetagAd(); // Διαφήμιση για διπλασιασμό
                    applyReward(pendingReward, 2);
                    pendingReward = null;
                    rewardModal.classList.remove('show');
                } catch (e) {
                    showToast('Ad not completed. Claiming normal reward.');
                    claimReward();
                }
            }
        }

        function handleReward(reward) { if (reward.type !== 'empty') showRewardModal(reward); }

        async function watchAdForRolls() {
            initAudio();
            try {
                await showMonetagAd(); // Διαφήμιση για +5 Rolls
                gameState.energy += 5;
                updateEnergyUI();
                playRewardSound();
                showToast('+5 Rolls! 🎉');
                sendToParent({ type: 'watchAdForEnergy', value: 5 });
                saveProgress();
            } catch (e) {
                showToast('Ad not completed');
            }
        }

        function rollDice() {
            if (isRolling) return;
            initAudio(); // Ενεργοποίηση ήχου με το πρώτο κλικ
            if (gameState.energy <= 0) {
                showToast('No energy! Watch an ad for +5 Rolls.');
                return;
            }
            isRolling = true;
            rollBtn.disabled = true;
            gameState.energy--;
            updateEnergyUI();
            sendToParent({ type: 'useEnergy' });

            const dice = Math.floor(Math.random() * 6) + 1; // Τυχαίο από 1 έως 6
            showDice(dice);

            setTimeout(async () => {
                await movePlayer(dice);
                const rew = getRewardType(currentIdx);
                handleReward(rew);
                isRolling = false;
                updateEnergyUI();
                saveProgress();
            }, 600);
        }

        // ΜΗΧΑΝΙΣΜΟΣ ΙΠΤΑΜΕΝΗΣ ΕΝΕΡΓΕΙΑΣ (Κάθε 45 δευτερόλεπτα)
        let flyingInterval = null;
        function startFlyingEnergy() {
            if (flyingInterval) clearInterval(flyingInterval);
            flyingInterval = setInterval(spawnFlyingEnergy, 45000);
        }

        function spawnFlyingEnergy() {
            if (isRolling || document.querySelector('.reward-modal.show')) return;

            const el = document.createElement('div');
            el.className = 'flying-energy';
            el.textContent = '+1⚡️';
            el.style.top = (Math.floor(Math.random() * 50) + 20) + '%';

            el.onclick = () => {
                initAudio();
                el.remove();
                gameState.energy++;
                updateEnergyUI();
                playMoveSound(); // Παίζει έναν γρήγορο ήχο επιβεβαίωσης
                showToast('Caught +1⚡️!');
                saveProgress();
                sendToParent({ type: 'caughtFlyingEnergy', value: 1 });
            };

            document.body.appendChild(el);
            setTimeout(() => { if (document.body.contains(el)) el.remove(); }, 5000);
        }

        function saveProgress() {
            localStorage.setItem('board_energy', gameState.energy);
            localStorage.setItem('board_points', gameState.points);
            localStorage.setItem('board_currentIdx', currentIdx);
        }

        function loadProgress() {
            const savedEnergy = localStorage.getItem('board_energy'), savedPoints = localStorage.getItem('board_points'), savedIdx = localStorage.getItem('board_currentIdx');
            if (savedIdx !== null) { currentIdx = parseInt(savedIdx); buildPath(); }
            if (savedEnergy !== null) gameState.energy = parseInt(savedEnergy);
            if (savedPoints !== null) gameState.points = parseInt(savedPoints);
        }

        function init() {
            loadProgress();
            if (!localStorage.getItem('board_initialized_v5')) {
                gameState.energy = 10;
                localStorage.setItem('board_initialized_v5', '1');
                saveProgress();
                showToast('🎉 10 Free Rolls!');
            }
            updateEnergyUI();
            buildPath();
            renderAllTiles();
            startFlyingEnergy(); // Έναρξη ιπτάμενης ενέργειας

            rewardClaimBtn.addEventListener('click', claimReward);
            rewardDoubleBtn.addEventListener('click', doubleReward);
            window.addEventListener('beforeunload', saveProgress);
        }

        init();
    </script>
</body>
</html>
