<head>

    <script>
        (function fixTelegramLinks() {
            if (window.Telegram && window.Telegram.WebApp) {
                const originalOpen = window.open;
                window.open = function(url, target, features) {
                    try {
                        const link = document.createElement('a');
                        link.href = url;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    } catch (e) {
                        console.warn("Fallback to Telegram.WebApp.openLink:", e);
                        if (window.Telegram && window.Telegram.WebApp) {
                            Telegram.WebApp.openLink(url);
                        } else {
                            originalOpen(url, target, features);
                        }
                    }
                    return null;
                };
                console.log("✅ Επιδιορθώθηκε το window.open για το Board!");
            }
        })();
    </script>

    <style>
        :root {
            --tile-size: 100px;
            --gap: 0px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a14;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0e27 0%, #000000 100%);
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .bg-orb.orb1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #6366f1, transparent);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .bg-orb.orb2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #06b6d4, transparent);
            bottom: 10%;
            right: -5%;
            animation-delay: -4s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.1); }
            50% { transform: translate(-20px, 30px) scale(0.9); }
            75% { transform: translate(-40px, -10px) scale(1.05); }
        }

        .bg-float {
            position: absolute;
            font-size: 24px;
            animation: floatUp 15s linear infinite;
            opacity: 0.6;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.3));
            pointer-events: none;
        }

        .bg-float:nth-child(odd) { animation-duration: 18s; }
        .bg-float:nth-child(3n) { animation-duration: 12s; }
        .bg-float:nth-child(5n) { animation-duration: 9s; }

        .bg-float.coin { color: #ffd700; text-shadow: 0 0 15px #ffd700; font-size: 28px; }
        .bg-float.lightning { color: #84cc16; text-shadow: 0 0 15px #84cc16; font-size: 22px; }
        .bg-float.pawn { color: rgba(255, 255, 255, 0.15); font-size: 45px; filter: blur(4px); }

        @keyframes floatUp {
            0% { transform: translateY(120vh) rotate(0deg) scale(0.6); opacity: 0; }
            10% { opacity: 0.9; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.3); opacity: 0; }
        }

        .game-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 1;
        }

        .board-area {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: visible;
            z-index: 20;
            margin-bottom: 100px;
        }

        .world {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
        }

        .path-tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            z-index: 5;
            perspective: 800px;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(45deg) rotateZ(45deg);
            transition: transform 0.2s ease;
            will-change: transform;
        }

        .path-tile.active .tile-inner {
            transform: rotateX(45deg) rotateZ(45deg) translateZ(15px) scale(1.1);
        }

        .tile-top {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2), inset 0 2px 4px rgba(255,255,255,0.1);
            backface-visibility: hidden;
        }

        .tile-bottom {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            top: 0;
            left: 0;
            transform: translateZ(-6px);
            filter: brightness(0.6);
            z-index: -1;
        }

        .path-tile.blue .tile-top {
            background: linear-gradient(145deg, #1a237e, #0d47a1);
            border-color: rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.3), inset 0 2px 4px rgba(255,255,255,0.1);
        }
        .path-tile.blue .tile-bottom { background: #0a3270; }

        .path-tile.special .tile-top {
            background: linear-gradient(145deg, #1b5e20, #2e7d32);
            border-color: #84cc16;
            box-shadow: 0 0 30px rgba(132, 204, 22, 0.4);
        }
        .path-tile.special .tile-bottom { background: #0d3b0f; }

        .path-tile.xp .tile-top {
            background: linear-gradient(145deg, #4a148c, #6a1b9a);
            border-color: #d946ef;
            box-shadow: 0 0 25px rgba(217, 70, 239, 0.3);
        }
        .path-tile.xp .tile-bottom { background: #3a0a7a; }

        .path-tile.energy .tile-top {
            background: linear-gradient(145deg, #f57f17, #f9a825);
            border-color: #fbbf24;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.4);
        }
        .path-tile.energy .tile-bottom { background: #c46b0a; }

        .path-tile.empty .tile-top {
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        .path-tile.empty .tile-bottom { background: #1a252f; }

        .tile-icon {
            font-size: 38px;
            margin-bottom: 2px;
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.4));
            display: block;
        }
        .tile-label {
            font-size: 13px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            text-align: center;
            line-height: 1.2;
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        /* ===== PLAYER PAWN ===== */
        .player {
            position: absolute;
            width: 60px;
            height: 70px;
            z-index: 60;
            pointer-events: none;
            transition: left 0.35s ease, top 0.35s ease;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.7));
            will-change: left, top;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pawn-emoji {
            font-size: 60px;
            line-height: 1;
            animation: colorShift 4s infinite;
            text-shadow: 0 0 20px currentColor;
        }

        @keyframes colorShift {
            0% { color: #ffd700; }
            25% { color: #00b4d8; }
            50% { color: #ff4081; }
            75% { color: #84cc16; }
            100% { color: #ffd700; }
        }

        .dice-popup {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid #ffd54f;
            border-radius: 20px;
            padding: 20px 28px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 60px rgba(255,215,0,0.6);
        }

        .dice-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .dice-display { font-size: 80px; font-weight: 900; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #ffd700; color: #000; padding: 12px 26px; border-radius: 30px;
            font-weight: 900; font-size: 16px; z-index: 500; transition: transform 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .reward-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .reward-modal.show { opacity: 1; pointer-events: auto; }
        .reward-box {
            background: rgba(20, 20, 35, 0.95);
            border: 2px solid #ffd700;
            border-radius: 24px;
            padding: 30px 24px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 0 60px rgba(255,215,0,0.3);
            position: relative;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); opacity: 1; }
        }
        .reward-title { font-size: 1.6rem; font-weight: 900; color: #fff; margin-bottom: 6px; }
        .reward-icon { font-size: 4rem; display: block; margin: 6px auto; }
        .reward-value { font-size: 2rem; font-weight: 900; color: #ffd700; margin: 6px 0 16px; }
        .reward-btn {
            display: block; width: 100%; margin: 6px 0; padding: 14px; border: none;
            border-radius: 50px; font-weight: 900; font-size: 1rem; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .reward-btn.claim { background: linear-gradient(135deg, #84cc16, #a3e635); color: #000; box-shadow: 0 0 20px rgba(132,204,22,0.3); }
        .reward-btn.double { background: linear-gradient(135deg, #ff9800, #e65100); color: #fff; box-shadow: 0 0 20px rgba(255,152,0,0.3); border: 2px solid #ffb74d; }
        .reward-btn:hover { transform: scale(1.02); }
        .reward-btn:active { transform: scale(0.95); }

        /* ===== FLOATING ENERGY ===== */
        .floating-energy {
            position: fixed;
            z-index: 900;
            font-size: 22px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 25px #ffd700, 0 0 50px #ffaa00;
            left: 50%;
            bottom: -40px;
            transform: translateX(-50%);
            animation: floatUpwards 8s linear forwards;
            cursor: pointer;
            pointer-events: auto;
            user-select: none;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            padding: 5px 10px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,0,0.4);
            white-space: nowrap;
        }

        @keyframes floatUpwards {
            0%   { bottom: -40px; opacity: 0; transform: translateX(-50%) scale(0.8); }
            10%  { opacity: 1; transform: translateX(-50%) scale(1.2); }
            90%  { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { bottom: 110%; opacity: 0; transform: translateX(-50%) scale(0.8); }
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.95));
            backdrop-filter: blur(12px);
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            padding: 8px 8px max(8px, env(safe-area-inset-bottom)) 8px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }

        .energy-row { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 2px 0; }
        .energy-bar { display: flex; align-items: center; gap: 4px; font-weight: 900; color: #ffd700; }
        .energy-bar .boxes { display: flex; gap: 2px; }
        .energy-bar .box {
            width: 14px; height: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        .energy-bar .box.filled {
            background: #ffd700;
            border-color: #ffd700;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }
        .energy-bar .count { font-size: 14px; margin-left: 4px; }

        .actions-row { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 0 4px; }

        .roll-btn {
            background: linear-gradient(135deg, #ff4081, #c51162);
            border: 2px solid #ff69b4;
            border-radius: 40px;
            padding: 12px 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 6px 0 #880e4f, 0 12px 28px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.1s;
            letter-spacing: 2px;
            -webkit-appearance: none;
            font-family: inherit;
            flex: 1;
            max-width: 160px;
            height: 48px;
        }
        .roll-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 #880e4f, 0 6px 14px rgba(0, 0, 0, 0.4); }
        .roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .watch-ad-btn {
            background: linear-gradient(135deg, #ff9800, #e65100);
            border: 2px solid #ffb74d;
            border-radius: 30px;
            padding: 10px 12px;
            color: #fff;
            font-weight: 800;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 4px 0 #bf360c, 0 6px 12px rgba(0, 0, 0, 0.4);
            transition: all 0.1s;
            white-space: nowrap;
            flex: 1;
            max-width: 140px;
            height: 48px;
        }
        .watch-ad-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #bf360c, 0 3px 6px rgba(0, 0, 0, 0.3); }

        @media (max-width: 480px) {
            :root { --tile-size: 75px; --gap: 0px; }
            .board-area { margin-bottom: 90px; }
            .player { width: 40px; height: 50px; }
            .pawn-emoji { font-size: 45px; }
            .roll-btn { font-size: 14px; padding: 10px 14px; height: 42px; max-width: 140px; }
            .watch-ad-btn { font-size: 11px; padding: 8px 10px; height: 42px; max-width: 120px; }
            .energy-bar .box { width: 10px; height: 10px; }
            .tile-icon { font-size: 28px; }
            .tile-label { font-size: 11px; }
            .floating-energy { font-size: 18px; }
        }
        @media (max-width: 380px) {
            :root { --tile-size: 60px; --gap: 0px; }
            .roll-btn { font-size: 12px; padding: 8px 10px; height: 36px; max-width: 120px; }
            .watch-ad-btn { font-size: 10px; padding: 6px 8px; height: 36px; max-width: 100px; }
            .floating-energy { font-size: 16px; }
        }
    </style>
</head>

    <script>
        'use strict';

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function vibrate(duration) {
            if (navigator.vibrate) {
                navigator.vibrate(duration);
            }
        }

        function playDiceSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [800, 600, 1000].forEach((freq, i) => {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.08);
                gain.gain.setValueAtTime(0.15, now + i * 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.15);
            });
        }

        function playMoveSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.05);
        }

        function playRewardSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.12);
                gain.gain.setValueAtTime(0.2, now + i * 0.12);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.4);
            });
        }

        // --- ΝΕΟ ΣΥΣΤΗΜΑ ΔΙΑΦΗΜΙΣΕΩΝ ΜΕ PRELOAD & ΑΣΦΑΛΕΙΑ (ymid) ---
        const tg = window.Telegram?.WebApp;
        if (tg) tg.ready();
        const telegramUserId = tg?.initDataUnsafe?.user?.id || 'guest_user';
        
        let isAdPreloaded = false;

        // Συναρτηση για Προ-φορτωση διαφηprocess στο παρασκηνιο
        function preloadMonetagAd() {
            if (typeof show_11108267 === 'function') {
                show_11108267({ type: 'preload', ymid: telegramUserId })
                    .then(() => {
                        isAdPreloaded = true;
                        console.log("✅ Monetag Ad Preloaded & Cached.");
                    })
                    .catch((err) => {
                        isAdPreloaded = false;
                        console.warn("❌ Preload failed, retrying in 5 seconds...", err);
                        setTimeout(preloadMonetagAd, 5000);
                    });
            } else {
                // Αν δεν εχει φορτωσει ακομα το script, ξαναπροσπαθουμε σε 1 δευτερολεπτο
                setTimeout(preloadMonetagAd, 1000);
            }
        }

        // Η κεντρικη συναρτηση που εμφανιζει ακαριαια τη διαφημιση
        function showMonetagAd() {
            return new Promise((resolve, reject) => {
                if (typeof show_11108267 === 'function') {
                    // Εμφανιση της διαφημισης με περασμα του ymid
                    show_11108267({ ymid: telegramUserId })
                        .then(() => {
                            isAdPreloaded = false;
                            preloadMonetagAd(); // Φορτωνουμε αμεσως την επομενη για να ειναι ετοιμη
                            resolve(true);
                        })
                        .catch((err) => {
                            isAdPreloaded = false;
                            preloadMonetagAd(); // Προετοιμασια ξανα σε περιπτωση αποτυχιας
                            reject('Ad failed or skipped');
                        });
                } else {
                    reject('Monetag SDK not loaded yet');
                }
            });
        }
        // -----------------------------------------------------------

        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const boardArea = document.getElementById('boardArea');
        const dicePopup = document.getElementById('dicePopup');
        const diceDisplay = document.getElementById('diceDisplay');
        const rollBtn = document.getElementById('rollBtn');
        const watchAdBtn = document.getElementById('watchAdBtn');
        const energyBoxes = document.getElementById('energyBoxes');
        const energyCount = document.getElementById('energyCount');
        const rewardModal = document.getElementById('rewardModal');
        const rewardIcon = document.getElementById('rewardIcon');
        const rewardTitle = document.getElementById('rewardTitle');
        const rewardValue = document.getElementById('rewardValue');
        const rewardClaimBtn = document.getElementById('rewardClaimBtn');
        const rewardDoubleBtn = document.getElementById('rewardDoubleBtn');

        let gameState = { energy: 10, points: 0 };
        let isRolling = false;
        let currentIdx = 0;
        let pendingReward = null;

        const tileSize = 100, gap = 0;
        const spacing = (tileSize + gap) * 0.5;
        let pathPoints = [];

        function sendToParent(msg) {
            if (window.parent !== window) window.parent.postMessage(msg, '*');
        }

        function generateLinearZigZagPath(count) {
            const path = [{x: 0, y: 0}];
            let stepCount = 0;
            let dir = 0;

            while (path.length < count) {
                const last = path[path.length - 1];
                let nx = last.x, ny = last.y;
                if (dir === 0) { nx++; ny--; }
                else { nx--; ny--; }
                path.push({x: nx, y: ny});
                stepCount++;
                if (stepCount === 4) { stepCount = 0; dir = (dir + 1) % 2; }
            }
            return path;
        }

        function buildPath() {
            if (pathPoints.length === 0) pathPoints = generateLinearZigZagPath(10000);
        }

        function getRewardType(idx) {
            if (idx <= 0) return { type: 'empty', icon: '', label: '', value: 0 };
            const mod = idx % 10;
            if (mod === 1) return { type: 'points5', icon: '🪙', label: '+5 Points', value: 5 };
            if (mod === 4) return { type: 'points10', icon: '🪙', label: '+10 Points', value: 10 };
            if (mod === 5) return { type: 'energy2', icon: '⚡', label: '+2 Rolls', value: 2 };
            if (mod === 8) return { type: 'energy3', icon: '⚡', label: '+3 Rolls', value: 3 };
            if (mod === 7) return { type: 'points15', icon: '🪙', label: '+15 Points', value: 15 };
            return { type: 'empty', icon: '', label: '', value: 0 };
        }

        function getPlayerScreenPos() {
            const r = boardArea.getBoundingClientRect();
            return { x: r.width / 2, y: r.height * 0.55 };
        }

        function renderAllTiles() {
            world.innerHTML = '';
            const sp = getPlayerScreenPos(), pp = pathPoints[currentIdx];
            const start = Math.max(0, currentIdx - 15), end = Math.min(pathPoints.length - 1, currentIdx + 25);
            for (let i = start; i <= end; i++) {
                const pt = pathPoints[i], rew = getRewardType(i);
                const tile = document.createElement('div');
                let tileClass = 'path-tile';
                if (i === currentIdx) tileClass += ' active';

                if (rew.type === 'empty') {
                    tileClass += (i % 10 === 7) ? ' special' : ' blue';
                } else if (rew.type.startsWith('energy')) {
                    tileClass += ' energy';
                } else if (rew.type.startsWith('points')) {
                    tileClass += ' xp';
                } else {
                    tileClass += ' blue';
                }

                tile.className = tileClass;

                let icon = '', label = '';
                if (rew.type === 'empty' && i % 10 === 7) {
                    icon = '📦'; label = '⚡';
                } else if (rew.type === 'energy2') { icon = '⚡'; label = '+2'; }
                else if (rew.type === 'energy3') { icon = '⚡'; label = '+3'; }
                else if (rew.type === 'points5') { icon = '🪙'; label = '+5'; }
                else if (rew.type === 'points10') { icon = '🪙'; label = '+10'; }
                else if (rew.type === 'points15') { icon = '🪙'; label = '+15'; }

                tile.innerHTML = `
                    <div class="tile-inner">
                        <div class="tile-top">
                            ${icon ? `<span class="tile-icon">${icon}</span>` : ''}
                            ${label ? `<span class="tile-label">${label}</span>` : ''}
                        </div>
                        <div class="tile-bottom"></div>
                    </div>
                `;

                const rx = (pt.x - pp.x) * spacing;
                const ry = (pt.y - pp.y) * spacing;
                tile.style.left = (sp.x + rx - tileSize / 2) + 'px';
                tile.style.top = (sp.y + ry - tileSize / 2) + 'px';

                world.appendChild(tile);
            }

            const activeTile = world.querySelector('.path-tile.active');
            if (activeTile) {
                const boardRect = boardArea.getBoundingClientRect();
                const tileRect = activeTile.getBoundingClientRect();
                const centerX = tileRect.left + tileRect.width / 2 - boardRect.left;
                const centerY = tileRect.top + tileRect.height / 2 - boardRect.top;
                player.style.left = centerX + 'px';
                player.style.top = centerY + 'px';
            }
        }

        function movePlayer(steps) {
            return new Promise(resolve => {
                let remaining = steps;
                function step() {
                    if (remaining <= 0) { resolve(); return; }
                    currentIdx++; buildPath(); renderAllTiles();
                    playMoveSound();
                    vibrate(30);
                    remaining--;
                    setTimeout(step, 400);
                }
                step();
            });
        }

        function showDice(n) {
            const diceFaces = ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            let i = 0;
            const interval = setInterval(() => {
                diceDisplay.textContent = diceFaces[i % diceFaces.length];
                i++;
            }, 60);

            setTimeout(() => {
                clearInterval(interval);
                const icons = ['🎲', '1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣'];
                diceDisplay.textContent = icons[n] || '🎲';
                dicePopup.classList.add('show');
                playDiceSound();
                vibrate(100);
                setTimeout(() => dicePopup.classList.remove('show'), 550);
            }, 300);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2000);
        }

        function updateEnergyUI() {
            const maxDisplay = 10;
            const filled = Math.min(gameState.energy, maxDisplay);
            let html = '';
            for (let i = 0; i < maxDisplay; i++) {
                html += `<div class="box ${i < filled ? 'filled' : ''}"></div>`;
            }
            energyBoxes.innerHTML = html;
            energyCount.textContent = '⚡ ' + gameState.energy;
            rollBtn.disabled = gameState.energy <= 0;
        }

        function applyReward(reward, multiplier = 1) {
            const value = reward.value * multiplier;
            if (reward.type === 'points5' || reward.type === 'points10' || reward.type === 'points15') {
                gameState.points += value;
                sendToParent({ type: 'addPoints', value: value });
            } else if (reward.type === 'energy2' || reward.type === 'energy3') {
                gameState.energy += value;
                updateEnergyUI();
                sendToParent({ type: 'addEnergy', value: value });
            }
            playRewardSound();
            vibrate(150);
            updateEnergyUI();
            saveProgress();
            showToast(`+${value} ${reward.label.split(' ')[1]}!`);
        }

        function showRewardModal(reward) {
            pendingReward = reward;
            rewardIcon.textContent = reward.icon || '🎁';
            rewardTitle.textContent = 'You Won!';
            rewardValue.textContent = `${reward.label}`;
            rewardModal.classList.add('show');
        }

        function claimReward() {
            if (pendingReward) {
                applyReward(pendingReward, 1);
                pendingReward = null;
                rewardModal.classList.remove('show');
            }
        }

        // ΚΟΥΜΠΙ: Διπλασιασμός επιβράβευσης
        async function doubleReward() {
            if (!pendingReward) return;
            rewardDoubleBtn.disabled = true; // Αποφυγή spam κλικ
            try {
                await showMonetagAd();
                applyReward(pendingReward, 2);
                pendingReward = null;
                rewardModal.classList.remove('show');
            } catch (e) {
                showToast('Ad not completed. Reward not doubled.');
            } finally {
                rewardDoubleBtn.disabled = false;
            }
        }

        function handleReward(reward) {
            if (reward.type === 'empty') return;
            showRewardModal(reward);
        }

        // ΚΟΥΜΠΙ: +5 Δωρεάν Rolls
        async function watchAdForRolls() {
            initAudio();
            watchAdBtn.disabled = true; // Αποφυγή διπλοπατήματος
            try {
                await showMonetagAd();
                gameState.energy += 5;
                updateEnergyUI();
                vibrate(100);
                showToast('+5 Rolls! 🎉');
                sendToParent({ type: 'watchAdForEnergy', value: 5 });
                saveProgress();
            } catch (e) {
                showToast('Ad not completed');
            } finally {
                watchAdBtn.disabled = false;
            }
        }

        function rollDice() {
            if (isRolling) return;
            if (gameState.energy <= 0) {
                showToast('No energy! Watch an ad for +5 Rolls.');
                return;
            }
            isRolling = true;
            rollBtn.disabled = true;
            gameState.energy--;
            updateEnergyUI();
            sendToParent({ type: 'useEnergy' });

            vibrate(50);

            const dice = Math.floor(Math.random() * 6) + 1;
            showDice(dice);

            setTimeout(async () => {
                await movePlayer(dice);
                const rew = getRewardType(currentIdx);
                handleReward(rew);
                isRolling = false;
                updateEnergyUI();
                saveProgress();
            }, 600);
        }

        function saveProgress() {
            localStorage.setItem('board_energy', gameState.energy);
            localStorage.setItem('board_points', gameState.points);
            localStorage.setItem('board_currentIdx', currentIdx);
        }

        function loadProgress() {
            const savedEnergy = localStorage.getItem('board_energy');
            const savedPoints = localStorage.getItem('board_points');
            const savedIdx = localStorage.getItem('board_currentIdx');
            if (savedIdx !== null) {
                currentIdx = parseInt(savedIdx);
                buildPath();
            }
            if (savedEnergy !== null) gameState.energy = parseInt(savedEnergy);
            if (savedPoints !== null) gameState.points = parseInt(savedPoints);
        }

        function spawnFloatingEnergy() {
            const energyEl = document.createElement('div');
            energyEl.className = 'floating-energy';
            energyEl.textContent = '+1⚡️';
            energyEl.style.left = (10 + Math.random() * 80) + '%';
            document.body.appendChild(energyEl);

            let collected = false;
            const onClick = (e) => {
                e.stopPropagation();
                if (collected) return;
                if (isRolling || rewardModal.classList.contains('show')) return;
                collected = true;
                gameState.energy += 1;
                updateEnergyUI();
                vibrate(80);
                showToast('+1 Energy! ⚡');
                saveProgress();
                energyEl.remove();
                energyEl.removeEventListener('click', onClick);
                clearTimeout(autoRemove);
            };
            energyEl.addEventListener('click', onClick);

            const autoRemove = setTimeout(() => {
                if (!collected) {
                    energyEl.remove();
                    energyEl.removeEventListener('click', onClick);
                }
            }, 8000);
        }

        function startFloatingEnergyInterval() {
            setInterval(spawnFloatingEnergy, 45000);
        }

        function init() {
            loadProgress();
            if (!localStorage.getItem('board_initialized_v3')) {
                gameState.energy = 10;
                localStorage.setItem('board_initialized_v3', '1');
                saveProgress();
                showToast('🎉 10 Free Rolls!');
            } else if (gameState.energy === undefined || gameState.energy === null) {
                gameState.energy = 0;
            }

            updateEnergyUI();
            buildPath();
            renderAllTiles();
            startFloatingEnergyInterval();
            
            // Έναρξη προ-φόρτωσης της πρώτης διαφήμισης
            preloadMonetagAd();

            rewardClaimBtn.addEventListener('click', claimReward);
            rewardDoubleBtn.addEventListener('click', doubleReward);
            window.addEventListener('beforeunload', saveProgress);
        }

        init();
    </script>
</body>
</html>
