    <style>
        :root {
            --bg-dark: #1a0533;

        * {

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            touch-action: manipulation;

        body {
            background: #1a0533;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            height: 100dvh;

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;

        /* ========== ΟΘΟΝΗ ΕΝΑΡΞΗΣ - ΒΕΛΤΙΩΜΕΝΟΣ ΜΑΓΙΚΟΣ ΚΗΠΟΣ ========== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(180deg, 
                #4FC3F7 0%,
                #81D4FA 15%,
                #B3E5FC 35%,
                #E1F5FE 52%,
                #C8E6C9 62%,
                #81C784 75%,
                #66BB6A 88%,
                #4CAF50 100%
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 8px;
            padding: 15px;
            animation: fadeInSplash 1.5s ease;
            overflow: hidden;
            cursor: pointer;
        }

        .splash-screen.hidden {
            display: none !important;
        }

        @keyframes fadeInSplash {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ========== ΗΛΙΟΣ - ΠΙΟ ΡΕΑΛΙΣΤΙΚΟΣ ========== */
        .sun-container {
            position: absolute;
            top: 4%;
            right: 8%;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 0 40px rgba(255, 234, 0, 0.9));
        }

        .sun-wrapper {
            position: relative;
            animation: sunPulse 3s ease-in-out infinite;
        }

        .sun-core {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 40% 35%, 
                #FFFDE7 0%,
                #FFF9C4 15%,
                #FFEA00 35%,
                #FFD600 55%,
                #FFC400 75%,
                #FFAB00 100%
            );
            border-radius: 50%;
            position: relative;
            z-index: 3;
            box-shadow: 
                0 0 70px #FFEA00,
                0 0 120px #FFD600,
                0 0 180px rgba(255, 234, 0, 0.7),
                0 0 250px rgba(255, 214, 0, 0.4),
                inset 0 -5px 15px rgba(255, 171, 0, 0.3);
        }

        .sun-face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            pointer-events: none;
        }

        .sun-eye {
            position: absolute;
            width: 14px;
            height: 16px;
            background: #5D4037;
            border-radius: 50%;
            top: -10px;
            animation: sunBlink 4s ease-in-out infinite;
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.3);
        }

        .sun-eye::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 2px;
        }

        .sun-eye.left {
            left: -18px;
        }

        .sun-eye.right {
            left: 8px;
        }

        .sun-mouth {
            position: absolute;
            width: 22px;
            height: 10px;
            border-bottom: 3px solid #5D4037;
            border-radius: 0 0 50% 50%;
            top: 6px;
            left: -8px;
        }

        .sun-cheek {
            position: absolute;
            width: 10px;
            height: 6px;
            background: rgba(255, 138, 101, 0.5);
            border-radius: 50%;
            top: 2px;
        }

        .sun-cheek.left {
            left: -22px;
        }

        .sun-cheek.right {
            left: 12px;
        }

        @keyframes sunBlink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .sun-ray {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        .ray {
            position: absolute;
            background: linear-gradient(180deg, #FFEA00, #FFD600, transparent);
            border-radius: 50%;
            opacity: 0.7;
            animation: rayGlow 2s ease-in-out infinite;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }

        .ray:nth-child(1) { width: 10px; height: 40px; transform: translate(-50%, -50%) rotate(0deg) translateY(-65px); animation-delay: 0s; }
        .ray:nth-child(2) { width: 8px; height: 35px; transform: translate(-50%, -50%) rotate(45deg) translateY(-62px); animation-delay: 0.2s; }
        .ray:nth-child(3) { width: 10px; height: 40px; transform: translate(-50%, -50%) rotate(90deg) translateY(-65px); animation-delay: 0.4s; }
        .ray:nth-child(4) { width: 8px; height: 35px; transform: translate(-50%, -50%) rotate(135deg) translateY(-62px); animation-delay: 0.6s; }
        .ray:nth-child(5) { width: 10px; height: 40px; transform: translate(-50%, -50%) rotate(180deg) translateY(-65px); animation-delay: 0.8s; }
        .ray:nth-child(6) { width: 8px; height: 35px; transform: translate(-50%, -50%) rotate(225deg) translateY(-62px); animation-delay: 1.0s; }
        .ray:nth-child(7) { width: 10px; height: 40px; transform: translate(-50%, -50%) rotate(270deg) translateY(-65px); animation-delay: 1.2s; }
        .ray:nth-child(8) { width: 8px; height: 35px; transform: translate(-50%, -50%) rotate(315deg) translateY(-62px); animation-delay: 1.4s; }

        @keyframes rayGlow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) rotate(var(--r, 0deg)) translateY(-62px) scale(1); }
            50% { opacity: 0.9; transform: translate(-50%, -50%) rotate(var(--r, 0deg)) translateY(-62px) scale(1.4); }
        }

        /* ========== ΣΥΝΝΕΦΑ ========== */
        .cloud {
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
            z-index: 8;
            pointer-events: none;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.12));
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.05), inset 5px 5px 15px rgba(255,255,255,0.8);
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
            box-shadow: inset -3px -3px 10px rgba(0,0,0,0.05), inset 3px 3px 10px rgba(255,255,255,0.8);
        }

        .cloud-1 {
            width: 110px;
            height: 50px;
            top: 10%;
            left: 3%;
            animation: cloudFloat1 14s ease-in-out infinite;
        }
        .cloud-1::before {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 18px;
        }
        .cloud-1::after {
            width: 50px;
            height: 50px;
            top: -22px;
            left: 55px;
        }

        .cloud-2 {
            width: 95px;
            height: 42px;
            top: 6%;
            left: 50%;
            animation: cloudFloat2 11s ease-in-out infinite;
        }
        .cloud-2::before {
            width: 55px;
            height: 55px;
            top: -28px;
            left: 12px;
        }
        .cloud-2::after {
            width: 45px;
            height: 45px;
            top: -18px;
            left: 50px;
        }

        .cloud-3 {
            width: 100px;
            height: 48px;
            top: 16%;
            left: 75%;
            animation: cloudFloat3 13s ease-in-out infinite;
        }
        .cloud-3::before {
            width: 58px;
            height: 58px;
            top: -30px;
            left: 15px;
        }
        .cloud-3::after {
            width: 48px;
            height: 48px;
            top: -20px;
            left: 52px;
        }

        .cloud-4 {
            width: 80px;
            height: 38px;
            top: 18%;
            left: 28%;
            animation: cloudFloat4 16s ease-in-out infinite;
        }
        .cloud-4::before {
            width: 48px;
            height: 48px;
            top: -24px;
            left: 10px;
        }
        .cloud-4::after {
            width: 38px;
            height: 38px;
            top: -14px;
            left: 42px;
        }

        @keyframes cloudFloat1 {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(25px); }
            50% { transform: translateX(-10px); }
            75% { transform: translateX(18px); }
        }
        @keyframes cloudFloat2 {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-18px); }
            50% { transform: translateX(22px); }
            75% { transform: translateX(-12px); }
        }
        @keyframes cloudFloat3 {
            0%, 100% { transform: translateX(0); }
            33% { transform: translateX(28px); }
            66% { transform: translateX(-18px); }
        }
        @keyframes cloudFloat4 {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-30px); }
        }

        /* ========== ΠΟΥΛΙΑ ========== */
        .bird {
            position: absolute;
            z-index: 12;
            pointer-events: none;
            animation: birdFlyPath 8s ease-in-out infinite;
        }

        .bird-body {
            width: 24px;
            height: 14px;
            background: linear-gradient(180deg, #FF6B6B 0%, #E55555 50%, #C44444 100%);
            border-radius: 50% 50% 40% 40%;
            position: relative;
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.2);
        }

        .bird-head {
            width: 14px;
            height: 14px;
            background: linear-gradient(180deg, #FF6B6B 0%, #E55555 100%);
            border-radius: 50%;
            position: absolute;
            top: -6px;
            left: -4px;
        }

        .bird-eye {
            width: 4px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 4px;
        }

        .bird-eye::after {
            content: '';
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 0px;
            left: 1px;
        }

        .bird-beak {
            width: 0;
            height: 0;
            border-left: 5px solid #FF8F00;
            border-top: 3px solid transparent;
            border-bottom: 3px solid transparent;
            position: absolute;
            top: 6px;
            left: -7px;
        }

        .bird-wing-top {
            position: absolute;
            width: 20px;
            height: 8px;
            background: linear-gradient(180deg, #FF8A80 0%, #E55555 100%);
            border-radius: 50% 50% 50% 50%;
            top: -4px;
            left: 2px;
            transform-origin: bottom center;
            animation: birdWingFlapUp 0.4s ease-in-out infinite;
        }

        .bird-wing-bottom {
            position: absolute;
            width: 16px;
            height: 6px;
            background: linear-gradient(180deg, #E55555 0%, #C44444 100%);
            border-radius: 50% 50% 50% 50%;
            top: 0px;
            left: 4px;
            transform-origin: bottom center;
            animation: birdWingFlapDown 0.4s ease-in-out infinite;
        }

        .bird-tail {
            width: 12px;
            height: 5px;
            background: #C44444;
            border-radius: 0 50% 50% 0;
            position: absolute;
            top: 4px;
            right: -10px;
            transform: rotate(-10deg);
        }

        @keyframes birdWingFlapUp {
            0%, 100% { transform: rotate(-30deg); }
            50% { transform: rotate(30deg); }
        }

        @keyframes birdWingFlapDown {
            0%, 100% { transform: rotate(20deg); }
            50% { transform: rotate(-20deg); }
        }

        @keyframes birdFlyPath {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(40px, -20px) rotate(3deg); }
            40% { transform: translate(80px, -35px) rotate(-2deg); }
            60% { transform: translate(120px, -25px) rotate(1deg); }
            80% { transform: translate(60px, -15px) rotate(-1deg); }
        }

        .bird-1 {
            top: 12%;
            left: 20%;
            animation-delay: 0s;
            transform: scale(1.1);
        }

        .bird-2 {
            top: 8%;
            left: 55%;
            animation-delay: 4s;
            transform: scale(0.9);
        }

        .bird-3 {
            top: 15%;
            left: 70%;
            animation-delay: 2s;
            transform: scale(1);
        }

        /* ========== ΠΑΙΔΙΑ - ΑΓΟΡΙ ΚΑΙ ΚΟΡΙΤΣΙ ========== */

            left: 50%;
            transform: translateX(-50%);

            height: 14px;

            left: 50%;
            transform: translateX(-50%);

            height: 20px;
            background: #FFCC80;
            border-radius: 0 0 4px 4px;
        }

        .girl-shoe {
            width: 14px;
            height: 8px;
            background: #FF4081;
            border-radius: 4px 4px 2px 2px;
            position: absolute;
            top: 18px;
            left: -2px;
        }

        .girl-arm-left {
            width: 10px;
            height: 28px;
            background: #FFCC80;
            border-radius: 5px;
            position: absolute;
            top: 38px;
            left: 30px;
            transform-origin: top center;
            animation: girlArmWave 2.5s ease-in-out infinite;
        }

        .girl-arm-right {
            width: 10px;
            height: 28px;
            background: #FFCC80;
            border-radius: 5px;
            position: absolute;
            top: 38px;
            right: 30px;
            transform-origin: top center;
            animation: girlArmWave 2.5s ease-in-out 0.4s infinite;
        }

        @keyframes girlJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes girlArmWave {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(25deg); }
        }

        @keyframes girlHairSway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* ========== ΛΟΥΛΟΥΔΙΑ ========== */
        .flower {
            position: absolute;
            z-index: 6;
            pointer-events: none;
            animation: flowerSway 3.5s ease-in-out infinite;
        }

        .flower-center {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #FFD54F 0%, #FFC107 50%, #FF8F00 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            box-shadow: 0 0 10px rgba(255,193,7,0.6), inset 0 2px 3px rgba(255,255,255,0.4);
        }

        .flower-petal {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50% 50% 50% 0;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.1);
        }

        .petal-1 { transform: translate(-50%, -50%) rotate(0deg) translateY(-14px); }
        .petal-2 { transform: translate(-50%, -50%) rotate(45deg) translateY(-14px); }
        .petal-3 { transform: translate(-50%, -50%) rotate(90deg) translateY(-14px); }
        .petal-4 { transform: translate(-50%, -50%) rotate(135deg) translateY(-14px); }
        .petal-5 { transform: translate(-50%, -50%) rotate(180deg) translateY(-14px); }
        .petal-6 { transform: translate(-50%, -50%) rotate(225deg) translateY(-14px); }
        .petal-7 { transform: translate(-50%, -50%) rotate(270deg) translateY(-14px); }
        .petal-8 { transform: translate(-50%, -50%) rotate(315deg) translateY(-14px); }

        .flower-stem {
            position: absolute;
            width: 5px;
            height: 45px;
            background: linear-gradient(180deg, #66BB6A, #4CAF50, #388E3C);
            top: 50%;
            left: 50%;
            transform: translate(-50%, 0);
            border-radius: 3px;
            z-index: 1;
        }

        .flower-leaf {
            position: absolute;
            width: 14px;
            height: 7px;
            background: linear-gradient(90deg, #4CAF50, #66BB6A);
            border-radius: 0 50% 50% 0;
            z-index: 2;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.3);
        }

        .flower-1 {
            bottom: 16%;
            left: 6%;
            animation-delay: 0s;
        }
        .flower-1 .flower-petal { background: linear-gradient(135deg, #FF4081, #F50057); }
        .flower-1 .flower-leaf { top: 55%; left: 55%; transform: rotate(-30deg); }

        .flower-2 {
            bottom: 19%;
            left: 20%;
            animation-delay: 0.7s;
        }
        .flower-2 .flower-petal { background: linear-gradient(135deg, #FF6E40, #DD2C00); }
        .flower-2 .flower-leaf { top: 60%; left: 50%; transform: rotate(25deg); }

        .flower-3 {
            bottom: 13%;
            right: 10%;
            animation-delay: 1.4s;
        }
        .flower-3 .flower-petal { background: linear-gradient(135deg, #E040FB, #AA00FF); }
        .flower-3 .flower-leaf { top: 52%; left: 48%; transform: rotate(-20deg); }

        .flower-4 {
            bottom: 17%;
            right: 25%;
            animation-delay: 2.1s;
        }
        .flower-4 .flower-petal { background: linear-gradient(135deg, #FF5252, #D50000); }
        .flower-4 .flower-leaf { top: 58%; left: 52%; transform: rotate(35deg); }

        .flower-5 {
            bottom: 18%;
            left: 36%;
            animation-delay: 2.8s;
        }
        .flower-5 .flower-petal { background: linear-gradient(135deg, #FFD740, #FFC400); }
        .flower-5 .flower-leaf { top: 54%; left: 54%; transform: rotate(-15deg); }

        .flower-6 {
            bottom: 20%;
            left: 50%;
            animation-delay: 3.5s;
        }
        .flower-6 .flower-petal { background: linear-gradient(135deg, #69F0AE, #00E676); }
        .flower-6 .flower-leaf { top: 56%; left: 46%; transform: rotate(30deg); }

        @keyframes flowerSway {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            25% { transform: rotate(5deg) translateY(-4px); }
            50% { transform: rotate(-4deg) translateY(0); }
            75% { transform: rotate(6deg) translateY(-3px); }
        }

        /* ========== ΠΕΤΑΛΟΥΔΕΣ ========== */
        .butterfly {
            position: absolute;
            z-index: 9;
            pointer-events: none;
            animation: butterflyFly 5s ease-in-out infinite;
        }

        .butterfly-body {
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #5D4037, #3E2723);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .butterfly-antenna {
            width: 1px;
            height: 8px;
            background: #5D4037;
            position: absolute;
            top: -6px;
        }

        .butterfly-antenna.left {
            left: 0px;
            transform: rotate(-20deg);
        }

        .butterfly-antenna.right {
            right: 0px;
            transform: rotate(20deg);
        }

        .butterfly-wing {
            position: absolute;
            width: 18px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.9;
            animation: wingFlap 0.4s ease-in-out infinite;
            top: 50%;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2);
        }

        .wing-left {
            right: 2px;
            transform-origin: right center;
            border-radius: 50% 0 0 50%;
        }

        .wing-right {
            left: 2px;
            transform-origin: left center;
            border-radius: 0 50% 50% 0;
        }

        @keyframes wingFlap {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(70deg); }
        }

        .butterfly-1 {
            top: 30%;
            left: 16%;
            animation-delay: 0s;
        }
        .butterfly-1 .butterfly-wing { background: linear-gradient(135deg, #FF80AB, #F50057); }

        .butterfly-2 {
            top: 35%;
            right: 18%;
            animation-delay: 1.5s;
        }
        .butterfly-2 .butterfly-wing { background: linear-gradient(135deg, #80D8FF, #0091EA); }

        .butterfly-3 {
            top: 40%;
            left: 52%;
            animation-delay: 3s;
        }
        .butterfly-3 .butterfly-wing { background: linear-gradient(135deg, #FFE57F, #FFD600); }

        .butterfly-4 {
            top: 44%;
            left: 33%;
            animation-delay: 4.5s;
        }
        .butterfly-4 .butterfly-wing { background: linear-gradient(135deg, #B388FF, #6200EA); }

        @keyframes butterflyFly {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(30px, -20px) rotate(5deg); }
            40% { transform: translate(60px, -35px) rotate(-3deg); }
            60% { transform: translate(25px, -25px) rotate(4deg); }
            80% { transform: translate(-15px, -15px) rotate(-4deg); }
        }

        /* ========== ΧΟΡΤΑΡΑΚΙΑ ========== */
        .grass-patch {
            position: absolute;
            bottom: 0;
            z-index: 5;
            pointer-events: none;
            display: flex;
            gap: 1px;
        }

        .grass-blade {
            background: linear-gradient(180deg, #81C784 0%, #4CAF50 40%, #388E3C 100%);
            border-radius: 40% 40% 0 0;
            animation: grassWave 2.5s ease-in-out infinite;
            transform-origin: bottom center;
            box-shadow: inset 2px 0 3px rgba(255,255,255,0.2);
        }

        @keyframes grassWave {
            0%, 100% { transform: rotate(-4deg) scaleY(1); }
            25% { transform: rotate(5deg) scaleY(1.1); }
            50% { transform: rotate(-3deg) scaleY(0.95); }
            75% { transform: rotate(6deg) scaleY(1.08); }
        }

        /* ========== ΛΟΓΟΤΥΠΟ ========== */
        .logo-wrapper {
            position: relative;
            z-index: 20;
            width: clamp(180px, 42vw, 230px);
            height: clamp(180px, 42vw, 230px);
            background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 50%, transparent 75%);
            border-radius: 50%;
            padding: 12px;
            backdrop-filter: blur(8px);
            box-shadow: 
                0 0 50px rgba(255,255,255,0.5),
                0 0 100px rgba(255, 234, 0, 0.3);
        }

        .splash-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            box-shadow:
                0 0 60px rgba(255,159,243,0.6),
                0 0 100px rgba(72,219,251,0.4),
                0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
            animation: logoFastSpinStop 1.5s cubic-bezier(0.25, 0.1, 0.1, 1) forwards;
        }

        @keyframes logoFastSpinStop {
            0% {
                transform: rotate(0deg) scale(0.1);
                opacity: 0;
                filter: blur(10px);
            }
            20% {
                transform: rotate(0deg) scale(1);
                opacity: 1;
                filter: blur(0);
            }
            50% {
                transform: rotate(1260deg) scale(1.1);
                opacity: 1;
                filter: blur(0);
            }
            70% {
                transform: rotate(720deg) scale(0.9);
                opacity: 1;
                filter: blur(0);
            }
            85% {
                transform: rotate(725deg) scale(1.05);
                opacity: 1;
                filter: blur(0);
            }
            100% {
                transform: rotate(720deg) scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }

        .splash-title {
            font-size: clamp(1.2rem, 4.5vw, 1.8rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #E91E63 0%, #9C27B0 50%, #3F51B5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 8px rgba(255,255,255,0.6));
            text-align: center;
            line-height: 1.2;
            position: relative;
            z-index: 20;
            animation: titleShine 2.5s ease-in-out infinite;
        }

        @keyframes titleShine {
            0%, 100% { filter: drop-shadow(0 4px 8px rgba(255,255,255,0.6)); }
            50% { filter: drop-shadow(0 4px 20px rgba(255,234,0,0.9)) drop-shadow(0 0 35px rgba(255,255,255,0.8)); }
        }

        .splash-subtitle {
            font-size: clamp(0.65rem, 2vw, 0.85rem);
            color: #E91E63;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-align: center;
            position: relative;
            z-index: 20;
            text-shadow: 0 2px 6px rgba(255,255,255,0.7);
        }

        .splash-btn {
            padding: 18px 55px;
            background: linear-gradient(180deg, #FFD740 0%, #FFC107 30%, #FF8F00 80%, #FF6D00 100%);
            border: 4px solid #FFF9C4;
            color: #4A148C;
            border-radius: 50px;
            font-weight: 900;
            font-size: clamp(1.1rem, 3.8vw, 1.5rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow:
                0 12px 0 #E65100,
                0 14px 35px rgba(0,0,0,0.35),
                0 0 50px rgba(255,215,64,0.7),
                inset 0 4px 0 rgba(255,255,255,0.5);
            position: relative;
            z-index: 20;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            animation: btnBounce 2.5s ease-in-out infinite;
        }

        @keyframes btnBounce {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); box-shadow: 0 18px 0 #E65100, 0 20px 40px rgba(0,0,0,0.35), 0 0 65px rgba(255,215,64,0.9), inset 0 4px 0 rgba(255,255,255,0.5); }
            50% { transform: translateY(0); box-shadow: 0 12px 0 #E65100, 0 14px 35px rgba(0,0,0,0.35), 0 0 50px rgba(255,215,64,0.7), inset 0 4px 0 rgba(255,255,255,0.5); }
            70% { transform: translateY(-5px); box-shadow: 0 15px 0 #E65100, 0 16px 30px rgba(0,0,0,0.35), 0 0 55px rgba(255,215,64,0.8), inset 0 4px 0 rgba(255,255,255,0.5); }
        }

        .splash-btn:active {
            top: 8px;
            box-shadow:
                0 4px 0 #E65100,
                0 6px 20px rgba(0,0,0,0.3),
                0 0 60px rgba(255,215,64,0.95),
                inset 0 4px 0 rgba(255,255,255,0.5);
            animation: none;
        }

        .splash-footer {
            font-size: clamp(0.55rem, 1.8vw, 0.65rem);
            color: rgba(74,20,140,0.8);
            letter-spacing: 2px;
            position: absolute;
            bottom: 15px;
            z-index: 20;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(255,255,255,0.6);
        }

        .sparkle {
            position: absolute;
            z-index: 11;
            pointer-events: none;
            animation: sparkleAnimation 2.5s ease-in-out infinite;
        }

        @keyframes sparkleAnimation {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
        }

        /* ========== ΚΥΡΙΟ ΠΑΙΧΝΙΔΙ ========== */
        .game-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 100%;
            background: linear-gradient(180deg, #2d1b69 0%, #1a0533 100%);
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .game-container.hidden {
            display: none !important;
        }

        .game-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(72,219,251,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,107,157,0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(254,202,87,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .title-section {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            padding-top: env(safe-area-inset-top, 4px);
            flex-shrink: 0;
        }

        .title {
            font-size: clamp(1.1rem, 4.8vw, 1.6rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ff9ff3 0%, #feca57 40%, #48dbfb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 3px 6px rgba(72,219,251,0.5));
            line-height: 1.1;
        }

        .subtitle {
            font-size: clamp(0.55rem, 2vw, 0.65rem);
            color: #48dbfb;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(72,219,251,0.5);
        }

        .hint-box {
            background: rgba(72,219,251,0.14);
            border: 2px solid rgba(72,219,251,0.55);
            color: #ffffff;
            padding: 10px 12px;
            border-radius: 14px;
            font-style: italic;
            font-size: clamp(0.85rem, 3.2vw, 1.15rem);
            font-weight: 600;
            text-align: center;
            width: 100%;
            box-shadow: 0 3px 18px rgba(72,219,251,0.25);
            position: relative;
            z-index: 1;
            line-height: 1.4;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .level-bar-container {
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .level-text {
            font-size: clamp(0.7rem, 2.4vw, 0.85rem);
            font-weight: 800;
            color: #feca57;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(254,202,87,0.6);
        }

        .level-points {
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            color: #48dbfb;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 600;
        }

        .level-bar-outer {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.35);
            border-radius: 5px;
            border: 1px solid rgba(72,219,251,0.35);
            overflow: hidden;
        }

        .level-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d 0%, #ff9ff3 30%, #feca57 60%, #48dbfb 100%);
            border-radius: 5px;
            transition: width 0.5s ease;
            box-shadow: 0 0 14px rgba(255,159,243,0.7);

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .stat-box {
            flex: 1;
            background: rgba(255,255,255,0.09);
            border: 2px solid rgba(72,219,251,0.45);
            border-radius: 12px;
            padding: 6px 5px;
            text-align: center;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.25);
        }

        .stat-label {
            font-size: clamp(0.5rem, 1.6vw, 0.6rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #48dbfb;
            font-weight: 700;
            margin-bottom: 3px;

        .stat-value {
            font-size: clamp(0.9rem, 3.8vw, 1.3rem);

            color: #ffffff;
            font-family: 'SF Mono', 'Courier New', monospace;

        .score-highlight {
            color: #feca57 !important;
            text-shadow: 0 0 14px rgba(254,202,87,0.8);

        .attempts-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .attempt-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2ed573;
            box-shadow: 0 0 8px rgba(46,213,115,0.8);
            transition: all 0.35s ease;
        }

        .attempt-dot.lost {
            background: #ff6b6b;
            box-shadow: 0 0 10px rgba(255,107,107,0.9);
            animation: pulseDot 0.4s ease;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.6); }
        }

        .word-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255,255,255,0.07);
            padding: 16px 12px;
            border-radius: 18px;
            border: 2px solid rgba(72,219,251,0.55);
            width: 100%;
            flex: 1;
            min-height: 150px;
            position: relative;
            z-index: 1;
        }

        .word-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 7px;
            width: 100%;
            flex-wrap: nowrap;
        }

        .word-slot {
            background: linear-gradient(180deg, #3d2a7a 0%, #2d1b69 100%);
            border: 2px solid #5b3ea8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-transform: uppercase;
            color: #feca57;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.45), 0 0 14px rgba(72,219,251,0.25);
            text-shadow: 0 0 12px rgba(254,202,87,0.6);
            transition: all 0.35s ease;
            font-family: 'SF Mono', 'Courier New', monospace;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .word-slot.spinning .slot-inner { animation: spinSlot 0.6s ease-in-out; }
        @keyframes spinSlot {
            0% { transform: rotateX(0deg); opacity: 1; }
            25% { transform: rotateX(90deg); opacity: 0.3; }
            50% { transform: rotateX(180deg); opacity: 0.1; }
            75% { transform: rotateX(270deg); opacity: 0.3; }
            100% { transform: rotateX(360deg); opacity: 1; }
        }

        .word-slot.revealed {

            <div class="level-bar-outer"><div class="level-bar-inner" id="levelBar"></div></div>
        </div>
        <div class="hint-box" id="hintText">💡 Φόρτωση...</div>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-label">⏳ ΧΡΟΝΟΣ</div><div class="stat-value" id="timerDisplay">3:00</div></div>
            <div class="stat-box"><div class="stat-label">⭐ ΣΚΟΡ</div><div class="stat-value score-highlight" id="scoreDisplay">0</div></div>
            <div class="stat-box"><div class="stat-label">🏆 ΡΕΚΟΡ</div><div class="stat-value score-highlight" id="highScoreDisplay">0</div></div>
        </div>
        <div class="attempts-dots" id="attemptsDots"></div>
        <div class="word-display" id="wordDisplay"></div>
        <div class="alphabet-container" id="alphabetContainer"></div>
        <div class="guess-section">
            <input type="text" class="guess-input" id="guessInput" placeholder="Γράψε ολόκληρη τη λέξη..." autocomplete="off" inputmode="text" enterkeyhint="done">
            <div class="btn-row">
                <button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
                <button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
            </div>
        </div>
        <div class="message" id="messageBox"></div>
        <div id="resultPanel" class="result-panel hidden"><span class="result-emoji" id="resultEmoji">🏆</span><span class="result-text" id="resultText"></span></div>
        <hr><div class="footer"><span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span><span>🔔 SUBSCRIBE</span></div>
    </div>
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- ========== JAVASCRIPT ========== -->
    <script>
        // Δεδομένα λέξεων
        const SECRET_WORDS = [
            { word: "ΗΛΙΟΣ", hint: "Λάμπει στον ουρανό την ημέρα" },
            { word: "ΓΑΤΑ", hint: "Ένα μικρό κατοικίδιο που νιαουρίζει" },
            { word: "ΠΑΙΔΙ", hint: "Ένα μικρό αγόρι ή κορίτσι" },
            { word: "ΝΕΡΟ", hint: "Το πίνουμε για να ξεδιψάσουμε" },
            { word: "ΣΠΙΤΙ", hint: "Εκεί που μένουμε" },
            { word: "ΔΕΝΤΡΟ", hint: "Έχει κορμό και φύλλα" },
            { word: "ΘΑΛΑΣΣΑ", hint: "Είναι αλμυρή και γαλάζια" },
            { word: "ΣΚΥΛΟΣ", hint: "Ο καλύτερος φίλος του ανθρώπου" },
            { word: "ΧΡΩΜΑ", hint: "Το βλέπουμε με τα μάτια μας" },
            { word: "ΜΟΥΣΙΚΗ", hint: "Την ακούμε με τα αυτιά μας" }
        ];

        (function() {
            // ========== ΣΤΑΘΕΡΕΣ ==========
            const KEYBOARD_ROWS = ["ΑΒΓΔΕΖΗΘ".split(""), "ΙΚΛΜΝΞΟΠΡ".split(""), "ΣΤΥΦΧΨΩ".split("")];
            const START_TIME = 180;
            const MAX_ATTEMPTS = 8;
            const POINTS_PER_LETTER = 5;
            const POINTS_FULL_WORD = 50;
            const POINTS_PENALTY_WRONG_LETTER = 5;
            const POINTS_PENALTY_LOSS = 50;
            const XP_PER_LEVEL = 1000;
            
            const STORAGE_KEY_HIGHSCORE = 'codeKids_highScore';
            const STORAGE_KEY_LEVEL = 'codeKids_level';
            const STORAGE_KEY_XP = 'codeKids_xp';
            const STORAGE_KEY_SCORE = 'codeKids_score';
            
            const MAX_LETTERS_PER_ROW = 10;
            const FONT_RATIO = 0.55;

            // ========== ΕΠΙΛΟΓΗ DOM ΣΤΟΙΧΕΙΩΝ ==========
            const splashScreen = document.getElementById("splashScreen");
            const gameContainer = document.getElementById("gameContainer");
            const startGameBtn = document.getElementById("startGameBtn");
            const timerDisplay = document.getElementById("timerDisplay");
            const hintText = document.getElementById("hintText");
            const wordDisplay = document.getElementById("wordDisplay");
            const alphabetContainer = document.getElementById("alphabetContainer");
            const attemptsDots = document.getElementById("attemptsDots");
            const guessInput = document.getElementById("guessInput");
            const submitBtn = document.getElementById("submitGuess");
            const newGameBtn = document.getElementById("newGameBtn");
            const messageBox = document.getElementById("messageBox");
            const resultPanel = document.getElementById("resultPanel");
            const resultEmoji = document.getElementById("resultEmoji");
            const resultText = document.getElementById("resultText");
            const scoreDisplay = document.getElementById("scoreDisplay");
            const highScoreDisplay = document.getElementById("highScoreDisplay");
            const confettiContainer = document.getElementById("confettiContainer");
            const levelText = document.getElementById("levelText");
            const levelPoints = document.getElementById("levelPoints");
            const levelBar = document.getElementById("levelBar");

            // ========== ΜΕΤΑΒΛΗΤΕΣ ΠΑΙΧΝΙΔΙΟΥ ==========
            let currentWord = "";
            let currentHint = "";
            let gameActive = false;
            let timeSeconds = START_TIME;
            let timerInterval = null;
            let usedLetters = [];
            let wrongAttempts = 0;
            let revealedLetters = [];
            let usedWordIndices = [];
            let isSpinning = false;
            let currentScore = 0;
            let highScore = 0;
            let currentLevel = 1;
            let currentXP = 0;
            let correctLettersInCurrentWord = 0;
            let audioCtx;
            let gardenSoundActive = false;

            // ========== ΔΙΑΧΕΙΡΙΣΗ ΗΧΟΥ ==========
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            
            function initAudio() { 
                if (!audioCtx) audioCtx = new AudioContext(); 
                if (audioCtx.state === 'suspended') audioCtx.resume(); 
            }

            function playTone(freq, type = 'sine', vol = 0.2, startOffset = 0, duration = 0.3) {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime + startOffset;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + duration);
                } catch(e) {}
            }

            function playSequence(notes, type = 'sine', vol = 0.2, noteLen = 0.3) {
                notes.forEach((freq, i) => playTone(freq, type, vol, i * 0.12, noteLen));
            }

            function playStartSound() { initAudio(); playSequence([261.63, 329.63, 392, 523.25, 659.25]); }
            function playCorrectLetterSound() { if (!audioCtx) return; playTone(523.25, 'sine', 0.3, 0, 0.15); playTone(659.25, 'sine', 0.3, 0.1, 0.15); }
            function playWrongLetterSound() { if (!audioCtx) return; playTone(150, 'sawtooth', 0.15, 0, 0.3); }
            function playWordCorrectSound() { initAudio(); playSequence([523.25, 659.25, 783.99, 1046.5]); }
            function playWordWrongSound() { if (!audioCtx) return; playTone(150, 'square', 0.15, 0, 0.3); playTone(100, 'square', 0.15, 0.2, 0.3); }
            function playWinFanfare() { initAudio(); playSequence([523.25, 659.25, 783.99, 1046.5, 1318.5], 'sine', 0.25, 0.35); }
            function playSpinSound() { if (!audioCtx) return; for (let i = 0; i < 6; i++) playTone(200 + Math.random() * 400, 'triangle', 0.06, i * 0.04, 0.06); }
            function playLevelUpSound() { initAudio(); playSequence([523.25, 659.25, 783.99, 1046.5], 'triangle', 0.3, 0.3); }

            // ========== ΑΠΟΘΗΚΕΥΣΗ ΔΕΔΟΜΕΝΩΝ ==========
            function loadSavedData() { 
                try { 
                    highScore = parseInt(localStorage.getItem(STORAGE_KEY_HIGHSCORE), 10) || 0; 
                    currentLevel = parseInt(localStorage.getItem(STORAGE_KEY_LEVEL), 10) || 1; 
                    currentXP = parseInt(localStorage.getItem(STORAGE_KEY_XP), 10) || 0; 
                    currentScore = parseInt(localStorage.getItem(STORAGE_KEY_SCORE), 10) || 0; 
                } catch(e) { 
                    highScore = 0; currentLevel = 1; currentXP = 0; currentScore = 0; 
                } 
                highScoreDisplay.textContent = highScore; 
                updateScoreDisplay(); 
                updateLevelDisplay(); 
            }

            function saveAllData() { 
                try { 
                    localStorage.setItem(STORAGE_KEY_HIGHSCORE, highScore); 
                    localStorage.setItem(STORAGE_KEY_LEVEL, currentLevel); 
                    localStorage.setItem(STORAGE_KEY_XP, currentXP); 
                    localStorage.setItem(STORAGE_KEY_SCORE, currentScore); 
                } catch(e) {} 
            }

            // ========== ENHMEΡΩΣΗ ΟΘΟΝΗΣ ==========
            function updateScoreDisplay() { 
                scoreDisplay.textContent = currentScore; 
                if (currentScore > highScore) { 
                    highScore = currentScore; 
                    highScoreDisplay.textContent = highScore; 
                } 
            }

            function updateLevelDisplay() { 
                levelText.textContent = '🌟 LEVEL ' + currentLevel; 
                const progress = Math.min((currentXP / XP_PER_LEVEL) * 100, 100); 
                levelBar.style.width = progress + '%'; 
                levelPoints.textContent = currentXP + ' / ' + XP_PER_LEVEL + ' ⭐'; 
            }

            function addXP(amount) { 
                currentXP += amount; 
                let leveledUp = false; 
                while (currentXP >= XP_PER_LEVEL) { 
                    currentXP -= XP_PER_LEVEL; 
                    currentLevel++; 
                    leveledUp = true; 
                } 
                // Χειρισμός αρνητικού XP
                if (currentXP < 0) currentXP = 0;
                updateLevelDisplay(); 
                if (leveledUp) { 
                    playLevelUpSound(); 
                    showScorePop('⬆ LEVEL ' + currentLevel + '!', gameContainer.clientWidth/2, gameContainer.clientHeight/3); 
                    messageBox.textContent = '🎉 ΑΝΕΒΗΚΕΣ LEVEL ' + currentLevel + '! ΜΠΡΑΒΟ!'; 
                    messageBox.style.color = '#feca57'; 
                } 
                saveAllData(); 
            }

            function showScorePop(text, x, y) { 
                const pop = document.createElement('span'); 
                pop.className = 'score-pop'; 
                pop.textContent = text; 
                pop.style.left = x + 'px'; 
                pop.style.top = y + 'px'; 
                gameContainer.appendChild(pop); 
                setTimeout(() => pop.remove(), 1200); 
            }

            function spawnConfetti() { 
                const colors = ['#ff9ff3','#feca57','#48dbfb','#ff6b9d','#2ed573','#a55eea','#ffa502','#ff6b6b']; 
                const fragment = document.createDocumentFragment(); 
                for (let i = 0; i < 60; i++) { 
                    const piece = document.createElement('div'); 
                    piece.className = 'confetti-piece'; 
                    piece.style.left = Math.random() * 100 + '%'; 
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)]; 
                    piece.style.animationDelay = Math.random() * 1.5 + 's'; 
                    piece.style.animationDuration = (Math.random() * 2.5 + 2) + 's'; 
                    piece.style.width = (Math.random() * 10 + 6) + 'px'; 
                    piece.style.height = (Math.random() * 10 + 6) + 'px'; 
                    fragment.appendChild(piece); 
                } 
                confettiContainer.appendChild(fragment); 
                setTimeout(() => { confettiContainer.innerHTML = ''; }, 4000); 
            }

            // ========== ΒΟΗΘΗΤΙΚΕΣ ΣΥΝΑΡΤΗΣΕΙΣ ==========
            function getRandomWord() { 
                if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = []; 
                let randomIndex; 
                do { 
                    randomIndex = Math.floor(Math.random() * SECRET_WORDS.length); 
                } while (usedWordIndices.includes(randomIndex)); 
                usedWordIndices.push(randomIndex); 
                return SECRET_WORDS[randomIndex]; 
            }

            function normalizeGreek(text) { 
                return text.toUpperCase()
                    .replace(/Ά/g,"Α").replace(/Έ/g,"Ε").replace(/Ή/g,"Η")
                    .replace(/Ί/g,"Ι").replace(/Ό/g,"Ο").replace(/Ύ/g,"Υ")
                    .replace(/Ώ/g,"Ω").replace(/Ϊ/g,"Ι").replace(/Ϋ/g,"Υ")
                    .replace(/\s+/g,""); 
            }

            function formatTime(sec) { 
                const m = Math.floor(sec / 60); 
                const s = sec % 60; 
                return `${m}:${s < 10 ? '0' : ''}${s}`; 
            }

            function stopTimer() { 
                if (timerInterval) { 
                    clearInterval(timerInterval); 
                    timerInterval = null; 
                } 
            }

            // ========== ΔΗΜΙΟΥΡΓΙΑ ΤΕΛΕΙΩΝ ΠΡΟΣΠΑΘΕΙΩΝ ==========
            function createAttemptDots() { 
                attemptsDots.innerHTML = ""; 
                for (let i = 0; i < MAX_ATTEMPTS; i++) { 
                    const dot = document.createElement("span"); 
                    dot.className = "attempt-dot"; 
                    if (i < wrongAttempts) dot.classList.add("lost"); 
                    attemptsDots.appendChild(dot); 
                } 
            }

            function updateAttemptDots() { 
                const dots = attemptsDots.querySelectorAll(".attempt-dot"); 
                dots.forEach((dot, index) => { 
                    if (index < wrongAttempts) dot.classList.add("lost"); 
                    else dot.classList.remove("lost"); 
                }); 
            }

            // ========== ΠΕΡΙΣΤΡΟΦΗ SLOTS ==========
            function spinAllSlots(callback) { 
                if (isSpinning) return; 
                isSpinning = true; 
                playSpinSound(); 
                const allSlots = wordDisplay.querySelectorAll(".word-slot:not(.space)"); 
                const allLetters = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ"; 
                allSlots.forEach((slot) => { 
                    const inner = slot.querySelector(".slot-inner"); 
                    if (!inner) return; 
                    slot.classList.add("spinning"); 
                    let spinCount = 0; 
                    const maxSpins = 8; 
                    const spinInterval = setInterval(() => { 
                        inner.textContent = allLetters[Math.floor(Math.random() * allLetters.length)]; 
                        spinCount++; 
                        if (spinCount >= maxSpins) { 
                            clearInterval(spinInterval); 
                            slot.classList.remove("spinning"); 
                        } 
                    }, 50); 
                }); 
                setTimeout(() => { 
                    isSpinning = false; 
                    updateWordDisplay(); 
                    if (callback) callback(); 
                }, 500); 
            }

            // ========== ΠΛΗΚΤΡΟΛΟΓΙΟ ==========
            function createAlphabetButtons() { 
                alphabetContainer.innerHTML = ""; 
                KEYBOARD_ROWS.forEach((row) => { 
                    const rowDiv = document.createElement("div"); 
                    rowDiv.className = "keyboard-row"; 
                    row.forEach(letter => { 
                        const btn = document.createElement("button"); 
                        btn.className = "letter-btn"; 
                        btn.textContent = letter; 
                        btn.setAttribute("type", "button"); 
                        btn.addEventListener("touchstart", function(e) { 
                            e.preventDefault(); e.stopPropagation(); 
                            btn.classList.add("pressed"); 
                            initAudio(); 
                            handleLetterClick(letter, btn); 
                        }, { passive: false }); 
                        btn.addEventListener("touchend", function(e) { e.preventDefault(); btn.classList.remove("pressed"); }); 
                        btn.addEventListener("touchcancel", function(e) { btn.classList.remove("pressed"); }); 
                        btn.addEventListener("mousedown", function(e) { 
                            e.preventDefault(); 
                            btn.classList.add("pressed"); 
                            initAudio(); 
                            handleLetterClick(letter, btn); 
                        }); 
                        btn.addEventListener("mouseup", function(e) { btn.classList.remove("pressed"); }); 
                        btn.addEventListener("mouseleave", function(e) { btn.classList.remove("pressed"); }); 
                        btn.addEventListener("click", function(e) { e.preventDefault(); e.stopPropagation(); }); 
                        rowDiv.appendChild(btn); 
                    }); 
                    alphabetContainer.appendChild(rowDiv); 
                }); 
            }

            function updateAlphabetButtons() { 
                const allButtons = alphabetContainer.querySelectorAll(".letter-btn"); 
                const nw = normalizeGreek(currentWord); 
                allButtons.forEach(btn => { 
                    const l = btn.textContent; 
                    btn.classList.remove("used-correct", "used-wrong", "pressed"); 
                    if (usedLetters.includes(l)) 
                        btn.classList.add(nw.includes(l) ? "used-correct" : "used-wrong"); 
                }); 
            }

            function handleLetterClick(letter, btn) { 
                if (!gameActive || usedLetters.includes(letter) || isSpinning) return; 
                usedLetters.push(letter); 
                const nw = normalizeGreek(currentWord); 
                const positions = []; 
                for (let i = 0; i < nw.length; i++) { 
                    if (nw[i] === letter) positions.push(i); 
                } 
                spinAllSlots(() => { 
                    if (positions.length > 0) { 
                        playCorrectLetterSound(); 
                        const pointsEarned = positions.length * POINTS_PER_LETTER; 
                        currentScore += pointsEarned; 
                        addXP(pointsEarned); 
                        correctLettersInCurrentWord += positions.length; 
                        positions.forEach(pos => { revealedLetters[pos] = letter; }); 
                        updateWordDisplay(true, positions); 
                        updateAlphabetButtons(); 
                        updateScoreDisplay(); 
                        saveAllData(); 
                        const rect = btn.getBoundingClientRect(); 
                        const containerRect = gameContainer.getBoundingClientRect(); 
                        showScorePop('+' + pointsEarned, rect.left - containerRect.left + rect.width/2, rect.top - containerRect.top); 
                        messageBox.textContent = `✅ Το "${letter}" βρέθηκε! +${pointsEarned} πόντοι! 🎉`; 
                        messageBox.style.color = "#2ed573"; 
                        const allRevealed = revealedLetters.map(l => l || '').join(''); 
                        if (allRevealed === nw) { 
                            setTimeout(() => { 
                                currentScore += POINTS_FULL_WORD; 
                                addXP(POINTS_FULL_WORD); 
                                updateScoreDisplay(); 
                                saveAllData(); 
                                const wdRect = wordDisplay.getBoundingClientRect(); 
                                showScorePop('+50 ΛΕΞΗ! 🏆', wdRect.left - containerRect.left + wdRect.width/2, wdRect.top - containerRect.top); 
                                playWordCorrectSound(); 
                                setTimeout(() => playWinFanfare(), 600); 
                                spawnConfetti(); 
                                endGame(true); 
                            }, 400); 
                        } 
                    } else { 
                        playWrongLetterSound(); 
                        wrongAttempts++; 
                        currentScore = Math.max(0, currentScore - POINTS_PENALTY_WRONG_LETTER); 
                        addXP(-POINTS_PENALTY_WRONG_LETTER); 
                        updateScoreDisplay(); 
                        saveAllData(); 
                        updateAttemptDots(); 
                        updateAlphabetButtons(); 
                        flashAllSlots(); 
                        const containerRect = gameContainer.getBoundingClientRect(); 
                        const rect = btn.getBoundingClientRect(); 
                        showScorePop('-' + POINTS_PENALTY_WRONG_LETTER, rect.left - containerRect.left + rect.width/2, rect.top - containerRect.top); 
                        messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`; 
                        messageBox.style.color = "#ff6b6b"; 
                        if (wrongAttempts >= MAX_ATTEMPTS) setTimeout(() => endGame(false, "attempts"), 400); 
                    } 
                }); 
            }

            function flashAllSlots() { 
                wordDisplay.querySelectorAll(".word-slot:not(.space)").forEach(slot => { 
                    slot.classList.add("wrong-flash"); 
                    setTimeout(() => slot.classList.remove("wrong-flash"), 500); 
                }); 
            }

            // ========== ΕΜΦΑΝΙΣΗ ΛΕΞΗΣ ==========
            function updateWordDisplay(animate = false, highlightPositions = []) { 
                wordDisplay.innerHTML = ""; 
                const displayWord = currentWord.toUpperCase(); 
                const words = displayWord.split(" "); 
                const wordLengths = words.map(w => normalizeGreek(w).length); 
                const maxWordLength = Math.max(...wordLengths); 
                const containerWidth = wordDisplay.clientWidth - 16; 
                const gapPerSlot = 6; 
                let slotSize; 
                if (maxWordLength > MAX_LETTERS_PER_ROW) { 
                    slotSize = Math.floor((containerWidth - (maxWordLength - 1) * gapPerSlot) / maxWordLength); 
                    slotSize = Math.max(slotSize, 24); 
                    slotSize = Math.min(slotSize, 52); 
                } else { 
                    slotSize = Math.floor((containerWidth - (MAX_LETTERS_PER_ROW - 1) * gapPerSlot) / MAX_LETTERS_PER_ROW); 
                    slotSize = Math.max(slotSize, 30); 
                    slotSize = Math.min(slotSize, 52); 
                } 
                const fontSize = Math.floor(slotSize * FONT_RATIO); 
                const rows = []; 
                let currentRow = []; 
                let currentRowLetters = 0; 
                for (let w = 0; w < words.length; w++) { 
                    const wordLen = normalizeGreek(words[w]).length; 
                    const spaceNeeded = currentRow.length > 0 ? 1 : 0; 
                    const totalNeeded = currentRowLetters + spaceNeeded + wordLen; 
                    if (totalNeeded <= MAX_LETTERS_PER_ROW && wordLen <= MAX_LETTERS_PER_ROW) { 
                        if (currentRow.length > 0) { 
                            currentRow.push({ type: "space" }); 
                            currentRowLetters += 1; 
                        } 
                        currentRow.push({ type: "word", wordIndex: w }); 
                        currentRowLetters += wordLen; 
                    } else { 
                        if (currentRow.length > 0) rows.push(currentRow); 
                        currentRow = [{ type: "word", wordIndex: w }]; 
                        currentRowLetters = wordLen; 
                    } 
                } 
                if (currentRow.length > 0) rows.push(currentRow); 
                let globalLetterIndex = 0; 
                const wordStartIndices = []; 
                for (let w = 0; w < words.length; w++) { 
                    wordStartIndices[w] = globalLetterIndex; 
                    globalLetterIndex += normalizeGreek(words[w]).length; 
                } 
                rows.forEach((rowItems) => { 
                    let rowMaxLen = 0; 
                    let totalLettersInRow = 0; 
                    let spaceCount = 0; 
                    rowItems.forEach(item => { 
                        if (item.type === "word") { 
                            rowMaxLen = Math.max(rowMaxLen, normalizeGreek(words[item.wordIndex]).length); 
                            totalLettersInRow += normalizeGreek(words[item.wordIndex]).length; 
                        } else spaceCount++; 
                    }); 
                    const totalSlots = totalLettersInRow + spaceCount; 
                    let rowSlotSize = slotSize; 
                    if (rowMaxLen > MAX_LETTERS_PER_ROW || totalSlots > MAX_LETTERS_PER_ROW) { 
                        rowSlotSize = Math.floor((containerWidth - (rowMaxLen - 1) * gapPerSlot) / rowMaxLen); 
                        rowSlotSize = Math.max(rowSlotSize, 24); 
                        rowSlotSize = Math.min(rowSlotSize, 52); 
                    } 
                    const rowFontSize = Math.floor(rowSlotSize * FONT_RATIO); 
                    const rowDiv = document.createElement("div"); 
                    rowDiv.className = "word-row"; 
                    rowItems.forEach((item) => { 
                        if (item.type === "space") { 
                            const spaceEl = document.createElement("span"); 
                            spaceEl.className = "word-slot space"; 
                            rowDiv.appendChild(spaceEl); 
                        } else { 
                            const w = item.wordIndex; 
                            const word = words[w]; 
                            const startIdx = wordStartIndices[w]; 
                            for (let i = 0; i < word.length; i++) { 
                                const letterIndex = startIdx + i; 
                                const slot = document.createElement("span"); 
                                slot.className = "word-slot"; 
                                slot.style.width = rowSlotSize + "px"; 
                                slot.style.height = (rowSlotSize * 1.35) + "px"; 
                                slot.style.fontSize = rowFontSize + "px"; 
                                slot.style.minWidth = rowSlotSize + "px"; 
                                const inner = document.createElement("span"); 
                                inner.className = "slot-inner"; 
                                inner.textContent = revealedLetters[letterIndex] || "_"; 
                                slot.appendChild(inner); 
                                if (animate && highlightPositions.includes(letterIndex)) { 
                                    slot.classList.add("revealed"); 
                                    setTimeout(() => slot.classList.remove("revealed"), 400); 
                                } 
                                rowDiv.appendChild(slot); 
                            } 
                        } 
                    }); 
                    wordDisplay.appendChild(rowDiv); 
                }); 
            }

            // ========== ΥΠΟΒΟΛΗ ΛΕΞΗΣ ==========
            function checkFullGuess() { 
                if (!gameActive || isSpinning) return; 
                initAudio(); 
                const guess = normalizeGreek(guessInput.value.trim()); 
                const nw = normalizeGreek(currentWord); 
                if (guess === "") { 
                    messageBox.textContent = "Γράψε μια λέξη! ✏️"; 
                    messageBox.style.color = "#feca57"; 
                    return; 
                } 
                spinAllSlots(() => { 
                    if (guess === nw) { 
                        const remaining = nw.length - correctLettersInCurrentWord; 
                        const totalPoints = remaining * POINTS_PER_LETTER + POINTS_FULL_WORD; 
                        currentScore += totalPoints; 
                        addXP(totalPoints); 
                        updateScoreDisplay(); saveAllData(); 
                        for (let i = 0; i < nw.length; i++) { 
                            if (!revealedLetters[i]) { 
                                revealedLetters[i] = nw[i]; 
                                if (!usedLetters.includes(nw[i])) usedLetters.push(nw[i]); 
                            } 
                        } 
                        updateWordDisplay(true); updateAlphabetButtons(); 
                        const wdRect = wordDisplay.getBoundingClientRect(); 
                        showScorePop('+' + totalPoints + ' 🏆', wdRect.left + wdRect.width/2, wdRect.top); 
                        playWordCorrectSound(); setTimeout(() => playWinFanfare(), 600); 
                        spawnConfetti(); endGame(true); 
                    } else { 
                        playWordWrongSound(); 
                        wrongAttempts++; 
                        currentScore = Math.max(0, currentScore - POINTS_PENALTY_WRONG_LETTER); 
                        addXP(-POINTS_PENALTY_WRONG_LETTER); 
                        updateScoreDisplay(); 
                        saveAllData(); 
                        updateAttemptDots(); 
                        flashAllSlots(); 
                        const wdRect = wordDisplay.getBoundingClientRect(); 
                        showScorePop('-' + POINTS_PENALTY_WRONG_LETTER, wdRect.left + wdRect.width/2, wdRect.top); 
                        messageBox.textContent = `Λάθος! Προσπάθησε ξανά! (${wrongAttempts}/${MAX_ATTEMPTS}) 💪`; 
                        messageBox.style.color = "#ff6b6b"; 
                        guessInput.value = ""; guessInput.focus(); 
                        if (wrongAttempts >= MAX_ATTEMPTS) setTimeout(() => endGame(false, "attempts"), 400); 
                    } 
                }); 
            }

            // ========== ΤΕΛΟΣ ΠΑΙΧΝΙΔΙΟΥ ==========
            function endGame(won, reason = "time") { 
                if (!gameActive) return; 
                gameActive = false; stopTimer(); 
                if (!won) { 
                    currentScore = Math.max(0, currentScore - POINTS_PENALTY_LOSS); 
                    addXP(-POINTS_PENALTY_LOSS); 
                    updateScoreDisplay(); saveAllData(); 
                    const wdRect = wordDisplay.getBoundingClientRect(); 
                    showScorePop('-' + POINTS_PENALTY_LOSS + ' 😢', wdRect.left + wdRect.width/2, wdRect.top); 
                } 
                const nw = normalizeGreek(currentWord); 
                for (let i = 0; i < nw.length; i++) revealedLetters[i] = nw[i]; 
                updateWordDisplay(); updateAlphabetButtons(); 
                guessInput.disabled = true; submitBtn.disabled = true; 
                resultPanel.classList.remove("hidden"); saveAllData(); 
                resultEmoji.textContent = won ? "🌟" : (reason === "attempts" ? "💪" : "⏰"); 
                resultText.textContent = won ? "ΤΟ ΒΡΗΚΕΣ! ΜΠΡΑΒΟ!" : (reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ"); 
                messageBox.textContent = won ? "Συγχαρητήρια! Πάτα ΝΕΟ ΠΑΙΧΝΙΔΙ! 🎉" : `Η λέξη ήταν: ${currentWord}. Πάτα ΝΕΟ ΠΑΙΧΝΙΔΙ! 😊`; 
                messageBox.style.color = won ? "#2ed573" : "#feca57"; 
            }

            // ========== ΕΝΑΡΞΗ/ΕΠΑΝΕΚΚΙΝΗΣΗ ΠΑΙΧΝΙΔΙΟΥ ==========
            function resetGame() { 
                stopTimer(); 
                const obj = getRandomWord(); 
                currentWord = obj.word; 
                currentHint = obj.hint; 
                gameActive = true; timeSeconds = START_TIME; wrongAttempts = 0; usedLetters = []; 
                isSpinning = false; correctLettersInCurrentWord = 0; 
                const nw = normalizeGreek(currentWord); 
                revealedLetters = new Array(nw.length).fill(""); 
                timerDisplay.textContent = formatTime(timeSeconds); timerDisplay.style.color = "#ffffff"; 
                hintText.textContent = "💡 " + currentHint; 
                updateWordDisplay(); createAlphabetButtons(); updateAlphabetButtons(); 
                createAttemptDots(); guessInput.value = ""; guessInput.disabled = false; submitBtn.disabled = false; 
                resultPanel.classList.add("hidden"); messageBox.textContent = ""; messageBox.style.color = "#feca57"; 
                confettiContainer.innerHTML = ""; 
                stopTimer();
                timerInterval = setInterval(() => { 
                    if (!gameActive) return; 
                    timeSeconds--; 
                    timerDisplay.textContent = formatTime(timeSeconds); 
                    timerDisplay.style.color = timeSeconds <= 30 ? "#ff6b6b" : "#ffffff"; 
                    if (timeSeconds <= 0) { 
                        timeSeconds = 0; 
                        timerDisplay.textContent = "0:00"; 
                        endGame(false, "time"); 
                    } 
                }, 1000); 
                window.scrollTo(0, 0); guessInput.blur(); setTimeout(() => guessInput.focus(), 100); 
            }

            function startGame() {
                initAudio();
                playStartSound();
                splashScreen.classList.add("hidden");
                gameContainer.classList.remove("hidden");
                resetGame();
            }

            // ========== EVENT LISTENERS ==========
            startGameBtn.addEventListener("touchstart", function(e) { e.preventDefault(); startGame(); });
            startGameBtn.addEventListener("mousedown", function(e) { e.preventDefault(); startGame(); });
            startGameBtn.addEventListener("click", function(e) { e.preventDefault(); startGame(); });

            submitBtn.addEventListener("touchstart", function(e) { e.preventDefault(); initAudio(); checkFullGuess(); }); 
            submitBtn.addEventListener("mousedown", function(e) { e.preventDefault(); initAudio(); checkFullGuess(); }); 
            submitBtn.addEventListener("click", function(e) { e.preventDefault(); }); 
            
            newGameBtn.addEventListener("touchstart", function(e) { e.preventDefault(); initAudio(); guessInput.blur(); resetGame(); }); 
            newGameBtn.addEventListener("mousedown", function(e) { e.preventDefault(); initAudio(); guessInput.blur(); resetGame(); }); 
            newGameBtn.addEventListener("click", function(e) { e.preventDefault(); }); 
            
            guessInput.addEventListener("keydown", function(e) { 
                if (e.key === "Enter") { e.preventDefault(); initAudio(); checkFullGuess(); } 
            }); 
            guessInput.addEventListener("input", function(e) { 
                e.target.value = e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, ""); 
            }); 
            guessInput.addEventListener("focus", function() { window.scrollTo(0, 0); }); 

            window.addEventListener('resize', () => { 
                if (!gameContainer.classList.contains("hidden")) updateWordDisplay(); 
            }); 
            
            document.addEventListener('touchmove', function(e) { 
                if (e.target.tagName !== 'INPUT') e.preventDefault(); 
            }, { passive: false }); 

            // ========== ΑΡΧΙΚΟΠΟΙΗΣΗ ==========
            loadSavedData(); 
            createAttemptDots(); 
            createAlphabetButtons(); 
            
            setTimeout(() => { 
                if (!splashScreen.classList.contains('hidden')) { 
                    initAudio(); 
                } 
            }, 500); 
        })(); 
    </script>
</body>
</html>
