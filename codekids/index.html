    <style>
        :root {
            --bg-kid: #f5e9d8;
            --card-kid: #fff5e6;
            --border-kid: #f0c27f;
            --primary: #ffb347;
            --secondary: #ff6b6b;
            --accent: #4ecdc4;
            --purple: #a29bfe;
            --pink: #fd79a8;
            --gold: #fdcb6e;
            --shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            touch-action: manipulation;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #fceabb 0%, #f8b500 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Quicksand', sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            color: #2d1b0e;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ========== ΟΘΟΝΗ ΕΝΑΡΞΗΣ (KIDS SPLASH) ========== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: radial-gradient(ellipse at 50% 50%, #ffeaa7 0%, #fab1a0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 15px;
            padding: 20px;
            animation: splashPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            border: 8px solid #fd79a8;
            box-shadow: inset 0 0 60px rgba(255, 215, 0, 0.5);
        }

        .splash-screen::before {
            content: '';
            position: absolute;
            top: -20%; left: -20%; width: 140%; height: 140%;
            background-image: radial-gradient(circle at 30% 40%, rgba(255, 215, 0, 0.3) 0%, transparent 30%),
                              radial-gradient(circle at 70% 60%, rgba(255, 107, 107, 0.3) 0%, transparent 30%),
                              radial-gradient(circle at 20% 80%, rgba(78, 205, 196, 0.3) 0%, transparent 30%),
                              radial-gradient(circle at 80% 20%, rgba(162, 155, 254, 0.3) 0%, transparent 30%);
            animation: floatBubbles 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatBubbles {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
            50% { transform: translate(30px, -20px) scale(1.1); opacity: 1; }
        }

        @keyframes splashPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .splash-logo-wrapper {
            position: relative;
            z-index: 2;
        }

        .splash-logo-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(160px, 40vw, 250px);
            height: clamp(160px, 40vw, 250px);
            border-radius: 50%;
            border: 4px dashed #fd79a8;
            animation: ringSpin 8s linear infinite;
            pointer-events: none;
        }

        .splash-logo-ring:nth-child(2) {
            width: clamp(180px, 44vw, 280px);
            height: clamp(180px, 44vw, 280px);
            border-color: #a29bfe;
            animation-duration: 12s;
            animation-direction: reverse;
        }

        .splash-logo-ring:nth-child(3) {
            width: clamp(200px, 48vw, 310px);
            height: clamp(200px, 48vw, 310px);
            border-color: #4ecdc4;
            animation-duration: 16s;
            border-style: dotted;
        }

        @keyframes ringSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .splash-logo {
            width: clamp(130px, 35vw, 220px);
            height: clamp(130px, 35vw, 220px);
            border-radius: 40px;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.8), 0 0 120px rgba(255, 180, 0, 0.4);
            animation: bounceLogo 2.5s ease-in-out infinite;
            object-fit: contain;
            position: relative;
            z-index: 3;
            border: 6px solid #fff;
        }

        @keyframes bounceLogo {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        .splash-title {
            font-size: clamp(2.2rem, 9vw, 4rem);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #2d1b0e;
            text-shadow: 4px 4px 0 #fdcb6e, 8px 8px 0 rgba(0,0,0,0.1);
            background: linear-gradient(45deg, #ff6b6b, #fdcb6e, #4ecdc4, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            text-align: center;
            line-height: 1.2;
            z-index: 2;
            animation: rainbowText 4s linear infinite;
        }

        @keyframes rainbowText {
            0% { filter: drop-shadow(0 0 10px #ff6b6b); }
            25% { filter: drop-shadow(0 0 10px #fdcb6e); }
            50% { filter: drop-shadow(0 0 10px #4ecdc4); }
            75% { filter: drop-shadow(0 0 10px #a29bfe); }
            100% { filter: drop-shadow(0 0 10px #ff6b6b); }
        }

        .splash-subtitle {
            font-size: clamp(1rem, 4vw, 1.8rem);
            color: #2d1b0e;
            font-weight: 800;
            text-align: center;
            z-index: 2;
            background: rgba(255,255,255,0.4);
            padding: 10px 30px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            border: 3px solid #fff;
            box-shadow: 0 4px 0 #fdcb6e;
        }

        .splash-btn {
            padding: 20px 60px;
            background: linear-gradient(145deg, #fdcb6e, #f6b93b);
            border: 5px solid #fff;
            color: #2d1b0e;
            border-radius: 60px;
            font-weight: 900;
            font-size: clamp(1.4rem, 5vw, 2rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 8px 0 #e58e26, 0 12px 30px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            z-index: 2;
            animation: btnWiggle 1.5s infinite alternate;
            position: relative;
        }

        @keyframes btnWiggle {
            0% { transform: rotate(-2deg) scale(1); }
            100% { transform: rotate(2deg) scale(1.02); }
        }

        .splash-btn:active {
            transform: scale(0.9) !important;
            box-shadow: 0 4px 0 #e58e26, 0 6px 15px rgba(0,0,0,0.3);
            animation: none;
        }

        .splash-footer {
            font-size: clamp(0.5rem, 1.5vw, 0.7rem);
            color: #2d1b0e;
            position: absolute;
            bottom: 20px;
            z-index: 2;
            font-weight: 700;
            background: rgba(255,255,255,0.3);
            padding: 6px 18px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
        }

        /* ========== ΚΥΡΙΟ ΠΑΙΧΝΙΔΙ (KIDS VERSION) ========== */
        .game-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 100%;
            background: radial-gradient(circle at 20% 30%, #fff5e6, #fee3b8);
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            border: 8px solid #fdcb6e;
            box-shadow: inset 0 0 80px rgba(255, 215, 0, 0.3);
        }

        .game-container.hidden {
            display: none !important;
        }

        /* Title Section */
        .title-section {
            text-align: center;
            width: 100%;
            padding: 4px 0;
            background: rgba(255,255,255,0.3);
            border-radius: 40px;
            border: 3px solid #fff;
            backdrop-filter: blur(4px);
        }

        .title {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #2d1b0e;
            text-shadow: 2px 2px 0 #fdcb6e;
            background: linear-gradient(135deg, #ff6b6b, #fdcb6e, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            color: #2d1b0e;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Hint Box */
        .hint-box {
            background: rgba(255, 255, 255, 0.7);
            border: 4px solid #fdcb6e;
            border-radius: 30px;
            padding: 10px 14px;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            font-weight: 700;
            text-align: center;
            width: 100%;
            color: #2d1b0e;
            backdrop-filter: blur(6px);
            box-shadow: 0 4px 0 #e58e26;
        }

        /* Level Bar */
        .level-bar-container {
            width: 100%;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }

        .level-text {
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 800;
            color: #2d1b0e;
            background: #fdcb6e;
            padding: 4px 16px;
            border-radius: 30px;
            border: 2px solid #fff;
        }

        .level-points {
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            color: #2d1b0e;
            font-weight: 700;
        }

        .level-bar-outer {
            width: 100%;
            height: 12px;
            background: #ffeaa7;
            border-radius: 20px;
            border: 2px solid #fff;
            overflow: hidden;
        }

        .level-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #fdcb6e, #4ecdc4, #a29bfe);
            border-radius: 20px;
            transition: width 0.4s ease;
            width: 0%;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            width: 100%;
        }

        .stat-box {
            flex: 1;
            background: rgba(255,255,255,0.6);
            border: 3px solid #fff;
            border-radius: 20px;
            padding: 6px 2px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .stat-label {
            font-size: clamp(0.5rem, 1.8vw, 0.7rem);
            font-weight: 800;
            color: #2d1b0e;
        }

        .stat-value {
            font-size: clamp(0.9rem, 3.5vw, 1.3rem);
            font-weight: 900;
            color: #2d1b0e;
        }

        .score-highlight {
            color: #e58e26 !important;
            text-shadow: 0 0 10px #fdcb6e;
        }

        /* Attempts Dots */
        .attempts-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .attempt-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4ecdc4;
            border: 2px solid #fff;
            transition: all 0.3s ease;
        }

        .attempt-dot.lost {
            background: #ff6b6b;
            animation: popDot 0.4s ease;
        }

        @keyframes popDot {
            0% { transform: scale(1); }
            50% { transform: scale(1.8); }
            100% { transform: scale(1); }
        }

        /* Word Display */
        .word-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255,255,255,0.5);
            padding: 12px 8px;
            border-radius: 30px;
            border: 5px solid #fff;
            width: 100%;
            flex: 1;
            min-height: 140px;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .word-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            width: 100%;
            flex-wrap: wrap;
        }

        .word-slot {
            background: linear-gradient(145deg, #ffffff, #ffeaa7);
            border: 4px solid #fdcb6e;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-transform: uppercase;
            color: #2d1b0e;
            box-shadow: 0 4px 0 #e58e26;
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', sans-serif;
            flex-shrink: 0;
            min-width: 28px;
        }

        .word-slot.spinning .slot-inner {
            animation: spinKid 0.5s ease-in-out;
        }

        @keyframes spinKid {
            0% { transform: scale(0.8) rotateX(0deg); }
            50% { transform: scale(1.2) rotateX(180deg); }
            100% { transform: scale(1) rotateX(360deg); }
        }

        .word-slot.revealed {
            border-color: #4ecdc4;
            background: linear-gradient(145deg, #b8f0e8, #4ecdc4) !important;
            box-shadow: 0 0 20px #4ecdc4;
            color: #0d3b34 !important;
            animation: popReveal 0.4s ease;
        }

        @keyframes popReveal {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .word-slot.wrong-flash {
            animation: shakeKid 0.5s ease;
            border-color: #ff6b6b !important;
            background: linear-gradient(145deg, #ffb3b3, #ff6b6b) !important;
        }

        @keyframes shakeKid {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .word-slot.space {
            background: transparent;
            border: none;
            box-shadow: none;
            width: 16px;
            min-width: 16px;
        }

        /* Alphabet Keyboard */
        .alphabet-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.3);
            padding: 8px 4px;
            border-radius: 30px;
            border: 3px solid #fff;
            width: 100%;
            backdrop-filter: blur(4px);
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            width: 100%;
        }

        .letter-btn {
            flex: 1;
            max-width: 60px;
            height: clamp(40px, 9vw, 56px);
            background: linear-gradient(145deg, #ffeaa7, #fdcb6e);
            border: 3px solid #fff;
            border-radius: 16px;
            font-size: clamp(0.9rem, 3vw, 1.3rem);
            font-weight: 700;
            color: #2d1b0e;
            cursor: pointer;
            box-shadow: 0 4px 0 #e58e26;
            transition: all 0.08s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letter-btn:active, .letter-btn.pressed {
            top: 4px !important;
            box-shadow: 0 1px 0 #e58e26 !important;
            transform: scale(0.94);
        }

        .letter-btn.used-correct {
            background: linear-gradient(145deg, #b8f0e8, #4ecdc4) !important;
            border-color: #4ecdc4 !important;
            opacity: 0.9;
            pointer-events: none;
        }

        .letter-btn.used-wrong {
            background: linear-gradient(145deg, #ffb3b3, #ff6b6b) !important;
            border-color: #ff6b6b !important;
            opacity: 0.7;
            pointer-events: none;
            text-decoration: line-through;
        }

        /* Guess Section */
        .guess-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 100%;
        }

        .guess-input {
            width: 100%;
            padding: 12px 14px;
            background: #ffffff;
            border: 5px solid #fdcb6e;
            border-radius: 30px;
            color: #2d1b0e;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            text-align: center;
            font-family: 'Comic Sans MS', sans-serif;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .guess-input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 20px #4ecdc4;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 14px 8px;
            border-radius: 30px;
            font-weight: 800;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.08s ease;
            border: 4px solid #fff;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-submit {
            background: linear-gradient(145deg, #4ecdc4, #2eaf9e);
            color: #fff;
            box-shadow: 0 4px 0 #1b7a6e;
        }

        .btn-submit:active {
            transform: scale(0.94);
            box-shadow: 0 1px 0 #1b7a6e;
        }

        .btn-new {
            background: linear-gradient(145deg, #a29bfe, #6c5ce7);
            color: #fff;
            box-shadow: 0 4px 0 #4a3cb5;
        }

        .btn-new:active {
            transform: scale(0.94);
            box-shadow: 0 1px 0 #4a3cb5;
        }

        /* Message */
        .message {
            font-weight: 700;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            min-height: 20px;
            color: #2d1b0e;
            text-align: center;
            width: 100%;
            background: rgba(255,255,255,0.5);
            padding: 4px 10px;
            border-radius: 30px;
        }

        /* Result Panel */
        .result-panel {
            background: rgba(255,255,255,0.8);
            border: 5px solid #fdcb6e;
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideUp 0.5s ease;
            width: 100%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-emoji { font-size: 2rem; }
        .result-text { font-weight: 800; font-size: 1.2rem; color: #2d1b0e; }

        /* Help button */
        .help-btn-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 2px 0;
        }

        .help-btn {
            padding: 12px 30px;
            background: linear-gradient(145deg, #fd79a8, #e84393);
            border: 4px solid #fff;
            border-radius: 40px;
            color: #fff;
            font-weight: 800;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 0 #b71c6b;
            transition: all 0.08s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .help-btn:active {
            transform: scale(0.94);
            box-shadow: 0 1px 0 #b71c6b;
        }

        /* Footer */
        .footer {
            display: flex;
            gap: 8px;
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            color: #2d1b0e;
            justify-content: center;
            font-weight: 700;
            padding: 4px 0;
            background: rgba(255,255,255,0.3);
            border-radius: 30px;
            width: 100%;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            width: 10px; height: 10px;
            top: -20px;
            animation: confettiFall 3s ease-in forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .score-pop {
            position: absolute;
            color: #e84393;

    <div class="confetti-container" id="confettiContainer"></div>

    <script src="words.js"></script>

    <script>
        (function() {
            if (typeof SECRET_WORDS === 'undefined') {
                alert('Σφάλμα: Το αρχείο words.js δεν φορτώθηκε σωστά!');
                return;
            }

            const KEYBOARD_ROWS = ["ΑΒΓΔΕΖΗΘ".split(""), "ΙΚΛΜΝΞΟΠΡ".split(""), "ΣΤΥΦΧΨΩ".split("")];
            const START_TIME = 180;
            const MAX_ATTEMPTS = 8;
            const POINTS_PER_LETTER = 5;
            const POINTS_FULL_WORD = 50;
            const POINTS_PENALTY_LOSS = 50;
            const POINTS_PENALTY_WRONG_LETTER = 5;
            const STORAGE_KEY_HIGHSCORE = 'crackTheCodeKids_highScore';
            const STORAGE_KEY_LEVEL = 'crackTheCodeKids_level';
            const STORAGE_KEY_XP = 'crackTheCodeKids_xp';
            const STORAGE_KEY_SCORE = 'crackTheCodeKids_score';
            const XP_PER_LEVEL = 1000;
            const MAX_LETTERS_PER_ROW = 10;
            const FONT_RATIO = 0.55;

            let currentWord = "", currentHint = "", gameActive = false, timeSeconds = START_TIME;
            let timerInterval = null, usedLetters = [], wrongAttempts = 0, revealedLetters = [];
            let usedWordIndices = [], isSpinning = false, currentScore = 0, highScore = 0, currentLevel = 1, currentXP = 0;
            let correctLettersInCurrentWord = 0, rollupShown = false;

            const splashScreen = document.getElementById("splashScreen");
            const gameContainer = document.getElementById("gameContainer");
            const startGameBtn = document.getElementById("startGameBtn");
            const timerDisplay = document.getElementById("timerDisplay");
            const hintText = document.getElementById("hintText");
            const wordDisplay = document.getElementById("wordDisplay");
            const alphabetContainer = document.getElementById("alphabetContainer");
            const attemptsDots = document.getElementById("attemptsDots");
            const guessInput = document.getElementById("guessInput");
            const submitBtn = document.getElementById("submitGuess");
            const newGameBtn = document.getElementById("newGameBtn");
            const messageBox = document.getElementById("messageBox");
            const resultPanel = document.getElementById("resultPanel");
            const resultEmoji = document.getElementById("resultEmoji");
            const resultText = document.getElementById("resultText");
            const scoreDisplay = document.getElementById("scoreDisplay");
            const highScoreDisplay = document.getElementById("highScoreDisplay");
            const confettiContainer = document.getElementById("confettiContainer");
            const levelText = document.getElementById("levelText");
            const levelPoints = document.getElementById("levelPoints");
            const levelBar = document.getElementById("levelBar");
            const helpBtn = document.getElementById("helpBtn");
            const helpBtnContainer = document.getElementById("helpBtnContainer");
            const rollupBanner = document.getElementById("rollupBanner");
            const rollupClose = document.getElementById("rollupClose");

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            let audioCtx;

            function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

            // --- ROLL-UP BANNER (kids) ---
            function showRollupBanner() {
                if (rollupShown) return;
                rollupShown = true;
                rollupBanner.classList.add('active');
                var tallyScript = document.createElement('script');
                tallyScript.src = 'https://tally.so/widgets/embed.js';
                tallyScript.async = true;
                document.body.appendChild(tallyScript);
            }

            rollupClose.addEventListener('click', function(e) {
                e.preventDefault();
                rollupBanner.classList.remove('active');
                rollupShown = false;
            });

            // --- START GAME ---
            function startGame() {
                splashScreen.classList.add("hidden");
                gameContainer.classList.remove("hidden");
                initAudio();
                resetGame();
            }

            startGameBtn.addEventListener("click", function(e) { e.preventDefault(); startGame(); });
            startGameBtn.addEventListener("touchstart", function(e) { e.preventDefault(); startGame(); });

            // --- SAVE / LOAD ---
            function loadSavedData() {
                try { highScore = parseInt(localStorage.getItem(STORAGE_KEY_HIGHSCORE), 10) || 0; currentLevel = parseInt(localStorage.getItem(STORAGE_KEY_LEVEL), 10) || 1; currentXP = parseInt(localStorage.getItem(STORAGE_KEY_XP), 10) || 0; currentScore = parseInt(localStorage.getItem(STORAGE_KEY_SCORE), 10) || 0; } catch(e) {}
                highScoreDisplay.textContent = highScore;
                updateScoreDisplay(); updateLevelDisplay();
            }

            function saveAllData() {
                try { localStorage.setItem(STORAGE_KEY_HIGHSCORE, highScore); localStorage.setItem(STORAGE_KEY_LEVEL, currentLevel); localStorage.setItem(STORAGE_KEY_XP, currentXP); localStorage.setItem(STORAGE_KEY_SCORE, currentScore); } catch(e) {}
            }

            function updateScoreDisplay() {
                scoreDisplay.textContent = currentScore;
                if (currentScore > highScore) { highScore = currentScore; highScoreDisplay.textContent = highScore; }
            }

            function updateLevelDisplay() {
                levelText.textContent = '🏅 LEVEL ' + currentLevel;
                const progress = Math.min((currentXP / XP_PER_LEVEL) * 100, 100);
                levelBar.style.width = progress + '%';
                levelPoints.textContent = currentXP + ' / ' + XP_PER_LEVEL + ' XP';
            }

            function addXP(amount) {
                currentXP += amount;
                let leveledUp = false;
                while (currentXP >= XP_PER_LEVEL) { currentXP -= XP_PER_LEVEL; currentLevel++; leveledUp = true; }
                updateLevelDisplay();
                if (leveledUp) { showRollupBanner(); }
                saveAllData();
            }

            function spawnConfetti() {
                const colors = ['#ff6b6b','#fdcb6e','#4ecdc4','#a29bfe','#fd79a8','#fdcb6e','#e84393','#6c5ce7'];
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < 70; i++) {
                    const piece = document.createElement('div'); piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.animationDelay = Math.random() * 1.5 + 's';
                    piece.style.animationDuration = (Math.random() * 2.5 + 2.5) + 's';
                    fragment.appendChild(piece);
                }
                confettiContainer.appendChild(fragment);
                setTimeout(() => { confettiContainer.innerHTML = ''; }, 4000);
            }

            function getRandomWord() {
                if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = [];
                let randomIndex;
                do { randomIndex = Math.floor(Math.random() * SECRET_WORDS.length); } while (usedWordIndices.includes(randomIndex));
                usedWordIndices.push(randomIndex);
                return SECRET_WORDS[randomIndex];
            }

            function normalizeGreek(text) {
                return text.toUpperCase().replace(/Ά/g,"Α").replace(/Έ/g,"Ε").replace(/Ή/g,"Η").replace(/Ί/g,"Ι").replace(/Ό/g,"Ο").replace(/Ύ/g,"Υ").replace(/Ώ/g,"Ω").replace(/Ϊ/g,"Ι").replace(/Ϋ/g,"Υ").replace(/\s+/g,"");
            }

            function formatTime(sec) { const m = Math.floor(sec / 60); const s = sec % 60; return `${m}:${s < 10 ? '0' : ''}${s}`; }

            function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

            function createAttemptDots() {
                attemptsDots.innerHTML = "";
                for (let i = 0; i < MAX_ATTEMPTS; i++) { const dot = document.createElement("span"); dot.className = "attempt-dot"; if (i < wrongAttempts) dot.classList.add("lost"); attemptsDots.appendChild(dot); }
            }

            function updateAttemptDots() {
                const dots = attemptsDots.querySelectorAll(".attempt-dot");
                dots.forEach((dot, index) => { if (index < wrongAttempts) dot.classList.add("lost"); else dot.classList.remove("lost"); });
            }

            function spinAllSlots(callback) {
                if (isSpinning) return; isSpinning = true;
                const allSlots = wordDisplay.querySelectorAll(".word-slot:not(.space)");
                const allLetters = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ";
                allSlots.forEach((slot) => {
                    const inner = slot.querySelector(".slot-inner"); if (!inner) return;
                    slot.classList.add("spinning");
                    let spinCount = 0; const maxSpins = 10;
                    const spinInterval = setInterval(() => { inner.textContent = allLetters[Math.floor(Math.random() * allLetters.length)]; spinCount++; if (spinCount >= maxSpins) { clearInterval(spinInterval); slot.classList.remove("spinning"); } }, 40);
                });
                setTimeout(() => { isSpinning = false; updateWordDisplay(); if (callback) callback(); }, 500);
            }

            function createAlphabetButtons() {
                alphabetContainer.innerHTML = "";
                KEYBOARD_ROWS.forEach((row) => {
                    const rowDiv = document.createElement("div"); rowDiv.className = "keyboard-row";
                    row.forEach(letter => {
                        const btn = document.createElement("button"); btn.className = "letter-btn"; btn.textContent = letter;
                        btn.addEventListener("click", function(e) { e.preventDefault(); initAudio(); handleLetterClick(letter, btn); });
                        btn.addEventListener("touchstart", function(e) { e.preventDefault(); initAudio(); handleLetterClick(letter, btn); }, { passive: false });
                        rowDiv.appendChild(btn);
                    });
                    alphabetContainer.appendChild(rowDiv);
                });
            }

            function updateAlphabetButtons() {
                const allButtons = alphabetContainer.querySelectorAll(".letter-btn"); const nw = normalizeGreek(currentWord);
                allButtons.forEach(btn => { const l = btn.textContent; btn.classList.remove("used-correct","used-wrong"); if (usedLetters.includes(l)) btn.classList.add(nw.includes(l) ? "used-correct" : "used-wrong"); });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive || usedLetters.includes(letter) || isSpinning) return;
                usedLetters.push(letter);
                const nw = normalizeGreek(currentWord);
                const positions = [];
                for (let i = 0; i < nw.length; i++) { if (nw[i] === letter) positions.push(i); }
                spinAllSlots(() => {
                    if (positions.length > 0) {
                        const pointsEarned = positions.length * POINTS_PER_LETTER;
                        currentScore += pointsEarned; addXP(pointsEarned); correctLettersInCurrentWord += positions.length;
                        positions.forEach(pos => revealedLetters[pos] = letter);
                        updateWordDisplay(true, positions); updateAlphabetButtons(); updateScoreDisplay(); saveAllData();
                        messageBox.textContent = `✅ Το "${letter}" βρέθηκε! +${pointsEarned}`; messageBox.style.color = "#0d3b34";
                        const allRevealed = revealedLetters.map(l => l || '').join('');
                        if (allRevealed === nw) {
                            setTimeout(() => { currentScore += POINTS_FULL_WORD; addXP(POINTS_FULL_WORD); updateScoreDisplay(); saveAllData(); spawnConfetti(); endGame(true); }, 400);
                        }
                    } else {
                        wrongAttempts++; updateAttemptDots(); updateAlphabetButtons(); flashAllSlots();
                        currentScore = Math.max(0, currentScore - POINTS_PENALTY_WRONG_LETTER); updateScoreDisplay(); saveAllData();
                        messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! -5 πόντοι (${wrongAttempts}/${MAX_ATTEMPTS})`; messageBox.style.color = "#b71c1c";
                        if (wrongAttempts >= MAX_ATTEMPTS) setTimeout(() => endGame(false, "attempts"), 400);
                    }
                });
            }

            function flashAllSlots() {
                wordDisplay.querySelectorAll(".word-slot:not(.space)").forEach(slot => { slot.classList.add("wrong-flash"); setTimeout(() => slot.classList.remove("wrong-flash"), 500); });
            }

            function updateWordDisplay(animate = false, highlightPositions = []) {
                wordDisplay.innerHTML = "";
                const displayWord = currentWord.toUpperCase();
                const words = displayWord.split(" ");
                const wordLengths = words.map(w => normalizeGreek(w).length);
                const maxWordLength = Math.max(...wordLengths);
                const containerWidth = wordDisplay.clientWidth - 16;
                const gapPerSlot = 6;
                let slotSize = Math.floor((containerWidth - (MAX_LETTERS_PER_ROW-1)*gapPerSlot) / MAX_LETTERS_PER_ROW);
                slotSize = Math.max(slotSize, 30); slotSize = Math.min(slotSize, 60);
                const fontSize = Math.floor(slotSize * FONT_RATIO);

                const rows = []; let currentRow = [], currentRowLetters = 0;
                for (let w = 0; w < words.length; w++) {
                    const wordLen = normalizeGreek(words[w]).length;
                    if (currentRowLetters + (currentRow.length>0?1:0) + wordLen <= MAX_LETTERS_PER_ROW) {
                        if (currentRow.length > 0) { currentRow.push({type:"space"}); currentRowLetters += 1; }
                        currentRow.push({type:"word", wordIndex:w}); currentRowLetters += wordLen;
                    } else { if (currentRow.length > 0) rows.push(currentRow); currentRow = [{type:"word", wordIndex:w}]; currentRowLetters = wordLen; }
                }
                if (currentRow.length > 0) rows.push(currentRow);

                let globalLetterIndex = 0; const wordStartIndices = [];
                for (let w = 0; w < words.length; w++) { wordStartIndices[w] = globalLetterIndex; globalLetterIndex += normalizeGreek(words[w]).length; }

                rows.forEach((rowItems) => {
                    let totalLetters = 0; rowItems.forEach(item => { if (item.type === "word") totalLetters += normalizeGreek(words[item.wordIndex]).length; });
                    let rowSlotSize = slotSize;
                    if (totalLetters > MAX_LETTERS_PER_ROW) { rowSlotSize = Math.floor((containerWidth - (totalLetters-1)*gapPerSlot) / totalLetters); rowSlotSize = Math.max(rowSlotSize, 24); rowSlotSize = Math.min(rowSlotSize, 56); }
                    const rowFontSize = Math.floor(rowSlotSize * FONT_RATIO);
                    const rowDiv = document.createElement("div"); rowDiv.className = "word-row";
                    rowItems.forEach((item) => {
                        if (item.type === "space") { const spaceEl = document.createElement("span"); spaceEl.className = "word-slot space"; rowDiv.appendChild(spaceEl); }
                        else {
                            const w = item.wordIndex; const word = words[w]; const startIdx = wordStartIndices[w];
                            for (let i=0; i<word.length; i++) {
                                const letterIndex = startIdx + i;
                                const slot = document.createElement("span"); slot.className = "word-slot";
                                slot.style.width = rowSlotSize + "px"; slot.style.height = (rowSlotSize * 1.35) + "px";
                                slot.style.fontSize = rowFontSize + "px"; slot.style.minWidth = rowSlotSize + "px";
                                const inner = document.createElement("span"); inner.className = "slot-inner";
                                inner.textContent = revealedLetters[letterIndex] || "_"; slot.appendChild(inner);
                                if (animate && highlightPositions.includes(letterIndex)) { slot.classList.add("revealed"); setTimeout(() => slot.classList.remove("revealed"), 400); }
                                rowDiv.appendChild(slot);
                            }
                        }
                    });
                    wordDisplay.appendChild(rowDiv);
                });
            }

            function checkFullGuess() {
                if (!gameActive || isSpinning) return; initAudio();
                const guess = normalizeGreek(guessInput.value.trim()); const nw = normalizeGreek(currentWord);
                if (guess === "") { messageBox.textContent = "Γράψε μια λέξη!"; messageBox.style.color = "#2d1b0e"; return; }
                spinAllSlots(() => {
                    if (guess === nw) {
                        const remaining = nw.length - correctLettersInCurrentWord;
                        const totalPoints = remaining * POINTS_PER_LETTER + POINTS_FULL_WORD;
                        currentScore += totalPoints; addXP(totalPoints); updateScoreDisplay(); saveAllData();
                        for (let i=0; i<nw.length; i++) { if (!revealedLetters[i]) { revealedLetters[i] = nw[i]; if (!usedLetters.includes(nw[i])) usedLetters.push(nw[i]); } }
                        updateWordDisplay(true); updateAlphabetButtons(); spawnConfetti(); endGame(true);
                    } else {
                        wrongAttempts++; updateAttemptDots(); flashAllSlots();
                        messageBox.textContent = `Λάθος! (${wrongAttempts}/${MAX_ATTEMPTS})`; messageBox.style.color = "#b71c1c";
                        guessInput.value = ""; guessInput.focus();
                        if (wrongAttempts >= MAX_ATTEMPTS) setTimeout(() => endGame(false, "attempts"), 400);
                    }
                });
            }

            function endGame(won, reason = "time") {
                if (!gameActive) return; gameActive = false; stopTimer();
                if (!won) { currentScore = Math.max(0, currentScore - POINTS_PENALTY_LOSS); updateScoreDisplay(); saveAllData(); }
                const nw = normalizeGreek(currentWord);
                for (let i=0; i<nw.length; i++) revealedLetters[i] = nw[i];
                updateWordDisplay(); updateAlphabetButtons();
                guessInput.disabled = true; submitBtn.disabled = true;
                resultPanel.classList.remove("hidden");
                resultEmoji.textContent = won ? "🎉" : (reason === "attempts" ? "💔" : "⏰");
                resultText.textContent = won ? "ΤΟ ΒΡΗΚΕΣ!" : (reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ");
                messageBox.textContent = won ? "Συγχαρητήρια! Πάτα ΝΕΟ ΠΑΙΧΝΙΔΙ" : `Λέξη: ${currentWord} (-50 πόντοι)`;
                messageBox.style.color = won ? "#0d3b34" : "#b71c1c";
                helpBtnContainer.style.display = 'none';
            }

            // --- HELP BUTTON ---
            function handleHelpClick(e) {
                e.preventDefault(); if (!gameActive) return;
                window.open('https://omg10.com/4/10274068', '_blank');
                setTimeout(function() {
                    if (wrongAttempts > 0) { wrongAttempts--; updateAttemptDots(); messageBox.textContent = `🎉 Κέρδισες +1 προσπάθεια! (${MAX_ATTEMPTS - wrongAttempts} απομένουν)`; messageBox.style.color = "#0d3b34"; if (!gameActive) { gameActive = true; guessInput.disabled = false; submitBtn.disabled = false; } }
                    else { messageBox.textContent = "⚠️ Έχεις ήδη όλες τις προσπάθειες!"; messageBox.style.color = "#2d1b0e"; }
                }, 1500);
            }
            helpBtn.addEventListener("click", handleHelpClick);
            helpBtn.addEventListener("touchstart", handleHelpClick, { passive: false });

            // --- RESET GAME ---
            function resetGame() {
                stopTimer(); const obj = getRandomWord(); currentWord = obj.word; currentHint = obj.hint;
                gameActive = true; timeSeconds = START_TIME; wrongAttempts = 0; usedLetters = []; isSpinning = false; correctLettersInCurrentWord = 0;
                const nw = normalizeGreek(currentWord); revealedLetters = new Array(nw.length).fill("");
                timerDisplay.textContent = formatTime(timeSeconds); timerDisplay.style.color = "#2d1b0e";
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay(); createAlphabetButtons(); updateAlphabetButtons(); createAttemptDots();
                guessInput.value = ""; guessInput.disabled = false; submitBtn.disabled = false;
                resultPanel.classList.add("hidden"); messageBox.textContent = ""; messageBox.style.color = "#2d1b0e"; confettiContainer.innerHTML = "";
                helpBtnContainer.style.display = 'flex';
                rollupBanner.classList.remove('active'); rollupShown = false;
                timerInterval = setInterval(() => { if (!gameActive) return; timeSeconds--; timerDisplay.textContent = formatTime(timeSeconds); timerDisplay.style.color = timeSeconds <= 30 ? "#b71c1c" : "#2d1b0e"; if (timeSeconds <= 0) { timeSeconds = 0; timerDisplay.textContent = "0:00"; endGame(false, "time"); } }, 1000);
                guessInput.focus();
            }

            // --- EVENT LISTENERS ---
            submitBtn.addEventListener("click", function(e) { e.preventDefault(); initAudio(); checkFullGuess(); });
            submitBtn.addEventListener("touchstart", function(e) { e.preventDefault(); initAudio(); checkFullGuess(); });

            newGameBtn.addEventListener("click", function(e) { e.preventDefault(); window.open('https://omg10.com/4/10274068', '_blank'); resetGame(); });
            newGameBtn.addEventListener("touchstart", function(e) { e.preventDefault(); window.open('https://omg10.com/4/10274068', '_blank'); resetGame(); });

            guessInput.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); initAudio(); checkFullGuess(); } });
            guessInput.addEventListener("input", function(e) { e.target.value = e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, ""); });

            loadSavedData(); createAttemptDots(); createAlphabetButtons();
            window.addEventListener('resize', () => { if (!gameContainer.classList.contains("hidden")) updateWordDisplay(); });
            document.addEventListener('touchmove', function(e) { if (e.target.tagName !== 'INPUT') e.preventDefault(); }, { passive: false });
        })();
    </script>
</body>
</html>
