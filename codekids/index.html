<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRACK THE CODE KIDS | ΒΡΕΣ ΤΗΝ ΛΕΞΗ</title>
    
    <style>
        :root {
            --sky-top: #87CEEB;
            --sky-bottom: #E0F7FA;
            --cloud: #ffffff;
            --rainbow-red: #FF6B6B;
            --rainbow-orange: #FFA502;
            --rainbow-yellow: #FECA57;
            --rainbow-green: #2ED573;
            --rainbow-blue: #48DBFB;
            --rainbow-purple: #A55EEA;
            --grass: #7BED9F;
            --sun: #FFD93D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: manipulation;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', -apple-system, sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            background: #87CEEB;
        }

        /* ========== ΟΘΟΝΗ ΕΝΑΡΞΗΣ - ΠΑΙΔΙΚΟΣ ΚΗΠΟΣ ========== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(180deg, 
                #87CEEB 0%, 
                #98D8F0 15%,
                #B8E6F8 30%,
                #D4F0FB 45%,
                #E8F8E8 60%,
                #C8F0C8 75%,
                #98E898 90%,
                #7BED9F 100%
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 10px;
            padding: 15px;
            overflow: hidden;
        }

        .splash-screen.hidden {
            display: none !important;
        }

        /* ========== ΗΛΙΟΣ ========== */
        .sun {
            position: absolute;
            top: 8%;
            right: 12%;
            width: clamp(70px, 18vw, 120px);
            height: clamp(70px, 18vw, 120px);
            background: radial-gradient(circle, #FFF9C4 0%, #FFE082 30%, #FFD93D 60%, #FFC107 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 40px #FFD93D,
                0 0 80px rgba(255,217,61,0.6),
                0 0 120px rgba(255,217,61,0.3),
                0 0 200px rgba(255,217,61,0.15);
            z-index: 1;
            animation: sunPulse 4s ease-in-out infinite;
        }

        .sun::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 
                0 0 60px rgba(255,217,61,0.5),
                0 0 100px rgba(255,235,59,0.3);
            animation: sunGlow 3s ease-in-out infinite alternate;
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes sunGlow {
            0% { box-shadow: 0 0 60px rgba(255,217,61,0.5), 0 0 100px rgba(255,235,59,0.3); }
            100% { box-shadow: 0 0 80px rgba(255,217,61,0.7), 0 0 140px rgba(255,235,59,0.5); }
        }

        /* Ακτίνες ήλιου */
        .sun-ray {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            background: rgba(255,217,61,0.6);
            border-radius: 2px;
            transform-origin: bottom center;
            animation: rayRotate 20s linear infinite;
            z-index: 0;
        }

        @keyframes rayRotate {
            from { transform: translate(-50%, -100%) rotate(0deg); }
            to { transform: translate(-50%, -100%) rotate(360deg); }
        }

        /* ========== ΣΥΝΝΕΦΑ ========== */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 
                0 4px 15px rgba(0,0,0,0.05),
                inset 0 -10px 20px rgba(0,0,0,0.03);
            z-index: 2;
        }

        .cloud-group {
            position: absolute;
            z-index: 2;
            animation: cloudFloat 12s ease-in-out infinite;
        }

        .cloud-group:nth-child(1) { top: 12%; left: 5%; animation-delay: 0s; animation-duration: 14s; }
        .cloud-group:nth-child(2) { top: 20%; left: 55%; animation-delay: -4s; animation-duration: 16s; }
        .cloud-group:nth-child(3) { top: 8%; left: 30%; animation-delay: -8s; animation-duration: 13s; }
        .cloud-group:nth-child(4) { top: 25%; left: 75%; animation-delay: -6s; animation-duration: 15s; }

        @keyframes cloudFloat {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(30px); }
            50% { transform: translateX(15px); }
            75% { transform: translateX(-20px); }
        }

        /* ========== ΟΥΡΑΝΙΟ ΤΟΞΟ ========== */
        .rainbow-container {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(280px, 90vw, 500px);
            height: clamp(180px, 50vw, 320px);
            z-index: 3;
            pointer-events: none;
        }

        .rainbow-arc {
            position: absolute;
            width: 100%;
            height: 200%;
            border-radius: 50%;
            border: 12px solid transparent;
            left: 0;
            bottom: 0;
        }

        .rainbow-arc:nth-child(1) { border-color: #FF6B6B; height: 200%; width: 100%; bottom: 0; }
        .rainbow-arc:nth-child(2) { border-color: #FFA502; height: 190%; width: 94%; bottom: -3%; left: 3%; }
        .rainbow-arc:nth-child(3) { border-color: #FECA57; height: 180%; width: 88%; bottom: -6%; left: 6%; }
        .rainbow-arc:nth-child(4) { border-color: #2ED573; height: 170%; width: 82%; bottom: -9%; left: 9%; }
        .rainbow-arc:nth-child(5) { border-color: #48DBFB; height: 160%; width: 76%; bottom: -12%; left: 12%; }
        .rainbow-arc:nth-child(6) { border-color: #A55EEA; height: 150%; width: 70%; bottom: -15%; left: 15%; }

        /* ========== ΛΟΥΛΟΥΔΙΑ ΣΤΟ ΓΡΑΣΙΔΙ ========== */
        .flower {
            position: absolute;
            z-index: 4;
            pointer-events: none;
        }

        .flower-center {
            width: 12px;
            height: 12px;
            background: #FFD93D;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px rgba(255,217,61,0.5);
        }

        .flower-petal {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
        }

        .flower-stem {
            position: absolute;
            width: 3px;
            height: 25px;
            background: #4CAF50;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .flower-leaf {
            position: absolute;
            width: 8px;
            height: 5px;
            background: #66BB6A;
            border-radius: 50%;
            top: 70%;
        }

        /* ========== ΠΕΤΑΛΟΥΔΕΣ ========== */
        .butterfly {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            animation: butterflyFly 8s ease-in-out infinite;
        }

        .butterfly:nth-child(1) { top: 30%; left: 10%; animation-delay: 0s; }
        .butterfly:nth-child(2) { top: 40%; left: 70%; animation-delay: -3s; animation-duration: 10s; }
        .butterfly:nth-child(3) { top: 20%; left: 40%; animation-delay: -6s; animation-duration: 9s; }

        @keyframes butterflyFly {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(60px, -30px) rotate(5deg); }
            50% { transform: translate(30px, -60px) rotate(-3deg); }
            75% { transform: translate(-20px, -20px) rotate(2deg); }
        }

        .butterfly-wing {
            display: inline-block;
            font-size: clamp(20px, 6vw, 35px);
            animation: wingFlap 0.3s ease-in-out infinite alternate;
        }

        .butterfly-wing:nth-child(2) {
            animation-direction: alternate-reverse;
        }

        @keyframes wingFlap {
            0% { transform: scaleX(1); }
            100% { transform: scaleX(-1); }
        }

        /* ========== ΜΠΑΛΟΝΙΑ ========== */
        .balloon {
            position: absolute;
            z-index: 6;
            pointer-events: none;
            animation: balloonFloat 6s ease-in-out infinite;
        }

        .balloon:nth-child(1) { top: 15%; left: 8%; animation-delay: 0s; }
        .balloon:nth-child(2) { top: 25%; right: 10%; animation-delay: -2s; animation-duration: 7s; }
        .balloon:nth-child(3) { top: 10%; left: 50%; animation-delay: -4s; animation-duration: 8s; }

        @keyframes balloonFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-25px) rotate(3deg); }
            66% { transform: translateY(-10px) rotate(-2deg); }
        }

        .balloon-string {
            width: 2px;
            height: 40px;
            background: rgba(255,255,255,0.7);
            margin: 0 auto;
            border-radius: 1px;
            animation: stringWave 3s ease-in-out infinite;
        }

        @keyframes stringWave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        /* ========== ΑΣΤΕΡΙΑ ΠΟΥ ΠΕΦΤΟΥΝ ========== */
        .falling-star {
            position: absolute;
            font-size: clamp(14px, 4vw, 22px);
            pointer-events: none;
            z-index: 3;
            animation: starFall 3s linear infinite;
            opacity: 0;
        }

        @keyframes starFall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* ========== ΛΟΓΟΤΥΠΟ ΣΕ ΒΑΘΡΟ ========== */
        .logo-stage {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Βάθρο-σκαμπό για το λογότυπο */
        .logo-pedestal {
            position: relative;
            width: clamp(160px, 40vw, 240px);
            height: clamp(160px, 40vw, 240px);
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 30px rgba(255,255,255,0.6),
                0 0 60px rgba(255,159,243,0.4),
                0 10px 30px rgba(0,0,0,0.1);
            animation: pedestalFloat 4s ease-in-out infinite;
        }

        @keyframes pedestalFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* Στεφάνι από λουλούδια γύρω από το λογότυπο */
        .flower-crown {
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
            border: 4px dashed rgba(255,107,157,0.4);
            animation: crownRotate 20s linear infinite;
            pointer-events: none;
        }

        .flower-crown-dot {
            position: absolute;
            font-size: 18px;
            animation: crownDotBounce 2s ease-in-out infinite;
        }

        @keyframes crownRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes crownDotBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .splash-logo {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 
                0 0 40px rgba(255,159,243,0.5),
                0 0 80px rgba(72,219,251,0.3),
                0 8px 25px rgba(0,0,0,0.15);
            position: relative;
            z-index: 2;
            animation: logoEntrance 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        }

        @keyframes logoEntrance {
            0% { 
                transform: scale(0) rotate(-180deg); 
                opacity: 0;
                filter: blur(8px);
            }
            60% { 
                transform: scale(1.1) rotate(10deg); 
                opacity: 1;
                filter: blur(0);
            }
            80% { 
                transform: scale(0.95) rotate(-3deg); 
            }
            100% { 
                transform: scale(1) rotate(0deg); 
                opacity: 1;
                filter: blur(0);
            }
        }

        /* ========== ΑΣΤΡΑΚΙΑ ΓΥΡΩ ΑΠΟ ΤΟ ΛΟΓΟΤΥΠΟ ========== */
        .orbit-star {
            position: absolute;
            font-size: 16px;
            animation: orbitAround 5s linear infinite;
            pointer-events: none;
        }

        @keyframes orbitAround {
            0% { transform: rotate(0deg) translateX(100px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
        }

        /* ========== ΤΙΤΛΟΣ ========== */
        .splash-title {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.2;
            position: relative;
            z-index: 10;
            color: #5B2C8E;
            text-shadow: 
                2px 2px 0 rgba(255,255,255,0.8),
                0 0 20px rgba(165,94,234,0.4),
                0 0 40px rgba(255,159,243,0.3);
            animation: titleBounce 3s ease-in-out infinite;
        }

        @keyframes titleBounce {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
            50% { transform: translateY(0); }
            70% { transform: translateY(-3px); }
        }

        .splash-subtitle {
            font-size: clamp(0.7rem, 2.5vw, 0.95rem);
            color: #FF6B9D;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-align: center;
            position: relative;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255,107,157,0.5);
            background: rgba(255,255,255,0.7);
            padding: 6px 20px;
            border-radius: 25px;
        }

        /* ========== ΚΟΥΜΠΙ START ========== */
        .splash-btn-wrapper {
            position: relative;
            z-index: 10;
            margin-top: 5px;
        }

        .splash-btn {
            padding: 16px 45px;
            background: linear-gradient(180deg, #FF9FF3 0%, #FF6B9D 30%, #FF4081 70%, #E91E63 100%);
            border: 4px solid #FFE082;
            color: white;
            border-radius: 50px;
            font-weight: 900;
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 
                0 8px 0 #C44569,
                0 10px 25px rgba(0,0,0,0.15),
                0 0 30px rgba(255,159,243,0.5),
                inset 0 3px 0 rgba(255,255,255,0.3);
            position: relative;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            animation: btnHop 2.5s ease-in-out infinite;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .splash-btn::before {
            content: '⭐';
            position: absolute;
            left: -8px;
            top: -12px;
            font-size: 20px;
            animation: starSpin 2s linear infinite;
        }

        .splash-btn::after {
            content: '🌟';
            position: absolute;
            right: -8px;
            top: -12px;
            font-size: 20px;
            animation: starSpin 2s linear infinite reverse;
        }

        @keyframes starSpin {
            from { transform: rotate(0deg) scale(0.8); }
            50% { transform: rotate(180deg) scale(1.2); }
            to { transform: rotate(360deg) scale(0.8); }
        }

        @keyframes btnHop {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-7px); box-shadow: 0 14px 0 #C44569, 0 16px 30px rgba(0,0,0,0.15), 0 0 45px rgba(255,159,243,0.7), inset 0 3px 0 rgba(255,255,255,0.3); }
            50% { transform: translateY(0); box-shadow: 0 8px 0 #C44569, 0 10px 25px rgba(0,0,0,0.15), 0 0 30px rgba(255,159,243,0.5), inset 0 3px 0 rgba(255,255,255,0.3); }
            75% { transform: translateY(-3px); box-shadow: 0 11px 0 #C44569, 0 13px 22px rgba(0,0,0,0.15), 0 0 38px rgba(255,159,243,0.6), inset 0 3px 0 rgba(255,255,255,0.3); }
        }

        .splash-btn:active {
            top: 6px;
            box-shadow: 
                0 2px 0 #C44569,
                0 4px 12px rgba(0,0,0,0.15),
                0 0 50px rgba(255,159,243,0.8),
                inset 0 3px 0 rgba(255,255,255,0.3);
            animation: none;
        }

        /* ========== ΕMOJI ΒΡΟΧΗ ========== */
        .emoji-rain {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            animation: emojiDrop 5s linear infinite;
            opacity: 0;
            font-size: clamp(16px, 5vw, 28px);
        }

        @keyframes emojiDrop {
            0% { transform: translateY(-60px) rotate(0deg); opacity: 0; }
            5% { opacity: 1; }
            85% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* ========== ΓΡΑΣΙΔΙ ========== */
        .grass-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: clamp(40px, 12vw, 80px);
            background: linear-gradient(180deg, #7BED9F 0%, #4CAF50 50%, #388E3C 100%);
            border-radius: 50% 50% 0 0 / 20px 20px 0 0;
            z-index: 4;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .grass-blade {
            position: absolute;
            bottom: 80%;
            width: 4px;
            background: #66BB6A;
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
            animation: grassWave 3s ease-in-out infinite;
        }

        @keyframes grassWave {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* ========== ΣΥΝΝΕΦΑΚΙΑ-ΟΜΙΛΙΕΣ ========== */
        .speech-bubble {
            position: absolute;
            background: white;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            font-weight: 700;
            color: #5B2C8E;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            z-index: 8;
            animation: bubbleTalk 5s ease-in-out infinite;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid white;
        }

        @keyframes bubbleTalk {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        /* Footer */
        .splash-footer {
            font-size: clamp(0.5rem, 1.8vw, 0.6rem);
            color: rgba(91,44,142,0.5);
            letter-spacing: 2px;
            position: absolute;
            bottom: clamp(50px, 14vw, 90px);
            z-index: 10;
            text-align: center;
            font-weight: 600;
        }

        /* Confetti burst για το κλικ */
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            pointer-events: none;
            z-index: 20;
            animation: confettiBurst 1.2s ease-out forwards;
        }

        @keyframes confettiBurst {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(720deg) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- ΟΘΟΝΗ ΕΝΑΡΞΗΣ -->
    <div class="splash-screen" id="splashScreen">
        <!-- ΗΛΙΟΣ -->
        <div class="sun" id="sun"></div>
        
        <!-- ΣΥΝΝΕΦΑ -->
        <div class="cloud-group" style="top: 10%; left: 3%;">
            <div class="cloud" style="width: 60px; height: 40px; position: relative;"></div>
            <div class="cloud" style="width: 45px; height: 30px; position: absolute; top: -15px; left: 15px;"></div>
            <div class="cloud" style="width: 40px; height: 25px; position: absolute; top: -5px; left: 35px;"></div>
        </div>
        <div class="cloud-group" style="top: 18%; left: 50%;">
            <div class="cloud" style="width: 70px; height: 45px; position: relative;"></div>
            <div class="cloud" style="width: 50px; height: 35px; position: absolute; top: -18px; left: 18px;"></div>
            <div class="cloud" style="width: 45px; height: 30px; position: absolute; top: -8px; left: 42px;"></div>
        </div>
        <div class="cloud-group" style="top: 6%; left: 28%;">
            <div class="cloud" style="width: 50px; height: 35px; position: relative;"></div>
            <div class="cloud" style="width: 38px; height: 25px; position: absolute; top: -12px; left: 12px;"></div>
        </div>
        <div class="cloud-group" style="top: 22%; left: 72%;">
            <div class="cloud" style="width: 55px; height: 38px; position: relative;"></div>
            <div class="cloud" style="width: 42px; height: 28px; position: absolute; top: -14px; left: 14px;"></div>
            <div class="cloud" style="width: 35px; height: 22px; position: absolute; top: -4px; left: 35px;"></div>
        </div>

        <!-- ΟΥΡΑΝΙΟ ΤΟΞΟ -->
        <div class="rainbow-container">
            <div class="rainbow-arc"></div>
            <div class="rainbow-arc"></div>
            <div class="rainbow-arc"></div>
            <div class="rainbow-arc"></div>
            <div class="rainbow-arc"></div>
            <div class="rainbow-arc"></div>
        </div>

        <!-- ΤΙΤΛΟΣ -->
        <div class="splash-title">CRACK THE CODE<br>FOR KIDS</div>
        <div class="splash-subtitle">ΒΡΕΣ ΤΗΝ ΛΕΞΗ!</div>

        <!-- ΚΟΥΜΠΙ START -->
        <div class="splash-btn-wrapper">
            <button class="splash-btn" id="startGameBtn">▶ START</button>
        </div>

        <div class="splash-footer">🎮 ΓΙΑ ΠΑΙΔΙΑ 🎮</div>

    <script>
        (function() {
            const splashScreen = document.getElementById('splashScreen');
            const startGameBtn = document.getElementById('startGameBtn');
            const grassArea = document.getElementById('grassArea');
            const sun = document.getElementById('sun');
            
            // ========== ΑΚΤΙΝΕΣ ΗΛΙΟΥ ==========
            for (let i = 0; i < 12; i++) {
                const ray = document.createElement('div');
                ray.className = 'sun-ray';
                ray.style.height = (Math.random() * 20 + 15) + 'px';
                ray.style.transform = `translate(-50%, -100%) rotate(${i * 30}deg)`;
                ray.style.animationDelay = -(Math.random() * 20) + 's';
                sun.appendChild(ray);
            }

            // ========== ΓΡΑΣΙΔΙ - ΛΕΠΙΔΕΣ ==========
            for (let i = 0; i < 40; i++) {
                const blade = document.createElement('div');
                blade.className = 'grass-blade';
                blade.style.left = (Math.random() * 98) + '%';
                blade.style.height = (Math.random() * 20 + 10) + 'px';
                blade.style.animationDelay = -(Math.random() * 3) + 's';
                blade.style.animationDuration = (Math.random() * 2 + 2) + 's';
                grassArea.appendChild(blade);
            }

            // ========== EMOJI ΒΡΟΧΗ ==========
            const emojiRainContainer = document.getElementById('emojiRainContainer');
            const emojis = ['⭐', '🌟', '✨', '💫', '🎀', '💖', '🎵', '🍭', '🧁', '🎪', '🎠', '🎡', '🦄', '🌈', '💝', '🎯'];
            
            function createEmojiRain() {
                const emoji = document.createElement('span');
                emoji.className = 'emoji-rain';
                emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 95 + '%';
                emoji.style.animationDuration = (Math.random() * 4 + 3) + 's';
                emoji.style.animationDelay = Math.random() * 5 + 's';
                emojiRainContainer.appendChild(emoji);
                
                emoji.addEventListener('animationend', () => {
                    emoji.remove();
                });
            }

            // Δημιουργία emoji βροχής κάθε 0.8 δευτερόλεπτα
            for (let i = 0; i < 8; i++) {
                setTimeout(createEmojiRain, i * 600);
            }
            setInterval(createEmojiRain, 3000);

            // ========== ΑΣΤΕΡΙΑ ΠΟΥ ΠΕΦΤΟΥΝ ==========
            function createFallingStar() {
                const star = document.createElement('span');
                star.className = 'falling-star';
                star.textContent = '⭐';
                star.style.left = Math.random() * 90 + '%';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                star.style.animationDelay = Math.random() * 4 + 's';
                splashScreen.appendChild(star);
                
                star.addEventListener('animationend', () => {
                    star.remove();
                });
            }

            for (let i = 0; i < 6; i++) {
                setTimeout(createFallingStar, i * 1500);
            }
            setInterval(createFallingStar, 4000);

            // ========== ORBIT STARS ΓΥΡΩ ΑΠΟ ΤΟ ΛΟΓΟΤΥΠΟ ==========
            const logoStage = document.getElementById('logoStage');
            for (let i = 0; i < 6; i++) {
                const orbitStar = document.createElement('span');
                orbitStar.className = 'orbit-star';
                orbitStar.textContent = '✨';
                orbitStar.style.animationDelay = -(i * 0.8) + 's';
                orbitStar.style.animationDuration = (4 + i * 0.5) + 's';
                logoStage.appendChild(orbitStar);
            }

            // ========== ΗΧΗΤΙΚΟ ΕΦΕ (ΠΑΙΔΙΚΟ ΚΑΙ ΧΑΡΟΥΜΕΝΟ) ==========
            let audioCtx = null;
            
            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playStartSound() {
                initAudio();
                if (!audioCtx) return;
                
                try {
                    const now = audioCtx.currentTime;
                    
                    // Χαρούμενη μελωδία - σαν παιδικό μουσικό κουτί
                    const melody = [
                        { note: 523.25, time: 0, dur: 0.15 },     // C5
                        { note: 587.33, time: 0.12, dur: 0.15 },  // D5
                        { note: 659.25, time: 0.24, dur: 0.15 },  // E5
                        { note: 783.99, time: 0.36, dur: 0.2 },   // G5
                        { note: 659.25, time: 0.52, dur: 0.15 },  // E5
                        { note: 783.99, time: 0.64, dur: 0.25 },  // G5
                        { note: 1046.5, time: 0.8, dur: 0.4 },    // C6 (ψηλά!)
                    ];
                    
                    melody.forEach(({note, time, dur}) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        
                        // Χρησιμοποιώ triangle wave για απαλό, παιδικό ήχο
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(note, now + time);
                        
                        gain.gain.setValueAtTime(0, now + time);
                        gain.gain.linearRampToValueAtTime(0.25, now + time + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + time + dur);
                        
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(now + time);
                        osc.stop(now + time + dur);
                    });

                    // Sparkle εφέ (ψηλές νότες που αστράφτουν)
                    for (let i = 0; i < 10; i++) {
                        const spOsc = audioCtx.createOscillator();
                        const spGain = audioCtx.createGain();
                        
                        spOsc.type = 'sine';
                        spOsc.frequency.setValueAtTime(1200 + Math.random() * 800, now + 0.5 + i * 0.05);
                        
                        spGain.gain.setValueAtTime(0.06, now + 0.5 + i * 0.05);
                        spGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5 + i * 0.05 + 0.1);
                        
                        spOsc.connect(spGain);
                        spGain.connect(audioCtx.destination);
                        spOsc.start(now + 0.5 + i * 0.05);
                        spOsc.stop(now + 0.5 + i * 0.05 + 0.1);
                    }

                    // Μαλακό κουδούνισμα (bell-like)
                    const bellFreqs = [1046.5, 1318.5, 1568, 2093];
                    bellFreqs.forEach((freq, i) => {
                        const bellOsc = audioCtx.createOscillator();
                        const bellGain = audioCtx.createGain();
                        
                        bellOsc.type = 'sine';
                        bellOsc.frequency.setValueAtTime(freq, now + 0.2 + i * 0.08);
                        
                        bellGain.gain.setValueAtTime(0.2, now + 0.2 + i * 0.08);
                        bellGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2 + i * 0.08 + 0.35);
                        
                        bellOsc.connect(bellGain);
                        bellGain.connect(audioCtx.destination);
                        bellOsc.start(now + 0.2 + i * 0.08);
                        bellOsc.stop(now + 0.2 + i * 0.08 + 0.35);
                    });
                    
                } catch(e) {
                    console.log('Audio:', e);
                }
            }

            // ========== CONFETTI BURST ΣΤΟ ΚΛΙΚ ==========
            function createConfettiBurst(x, y) {
                const colors = ['#FF6B6B', '#FFA502', '#FECA57', '#2ED573', '#48DBFB', '#A55EEA', '#FF9FF3', '#FF4081'];
                
                for (let i = 0; i < 50; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 200 + 80;
                    piece.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                    piece.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                    piece.style.left = x + 'px';
                    piece.style.top = y + 'px';
                    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
                    piece.style.width = (Math.random() * 10 + 5) + 'px';
                    piece.style.height = (Math.random() * 10 + 5) + 'px';
                    piece.style.animationDuration = (Math.random() * 1 + 0.8) + 's';
                    
                    splashScreen.appendChild(piece);
                    setTimeout(() => piece.remove(), 1500);
                }
            }

            // ========== EVENT LISTENERS ==========
            function handleStart(e) {
                e.preventDefault();
                initAudio();
                playStartSound();
                
                // Βρες τη θέση του κλικ για confetti
                const rect = startGameBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                createConfettiBurst(centerX, centerY);
                
                // Δεύτερο burst μετά από λίγο
                setTimeout(() => {
                    createConfettiBurst(centerX + Math.random() * 60 - 30, centerY + Math.random() * 60 - 30);
                }, 200);
                
                // Εξαφάνιση οθόνης έναρξης
                setTimeout(() => {
                    splashScreen.classList.add('hidden');
                    // Εδώ μπαίνει το κυρίως παιχνίδι
                    alert('🎉 Το παιχνίδι ξεκινά! 🎉\n\nΕδώ φορτώνει το κυρίως παιχνίδι Crack The Code Kids!');
                }, 500);
            }

            startGameBtn.addEventListener('touchstart', handleStart, { passive: false });
            startGameBtn.addEventListener('mousedown', handleStart);
            startGameBtn.addEventListener('click', (e) => e.preventDefault());

            // Ενεργοποίηση audio στο πρώτο άγγιγμα
            document.addEventListener('touchstart', initAudio, { once: true });
            document.addEventListener('click', initAudio, { once: true });

            console.log('🌈 CRACK THE CODE KIDS - Μαγικός Παιδικός Κήπος! 🌈');
            console.log('🌞 Χαρακτηριστικά:');
            console.log('  ☀️  Ήλιος με ακτίνες που περιστρέφονται');
            console.log('  ☁️  Σύννεφα που αιωρούνται');
            console.log('  🌈  Ουράνιο τόξο');
            console.log('  🦋  Πεταλούδες που πετούν');
            console.log('  🎈  Μπαλόνια που χορεύουν');
            console.log('  🌸  Λουλούδια στο γρασίδι');
            console.log('  ⭐  Emoji βροχή & αστέρια που πέφτουν');
            console.log('  💬  Συννεφάκια ομιλίας');
            console.log('  🎪  Λογότυπο σε μαγικό βάθρο');
            console.log('  🎵  Χαρούμενη παιδική μελωδία');
            console.log('  🎊  Confetti έκρηξη στο START');
        })();
    </script>
