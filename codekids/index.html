<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRACK THE CODE KIDS | ΒΡΕΣ ΤΗΝ ΛΕΞΗ</title>
    
    <style>
        :root {
            --bg-dark: #1a0533;
            --pink: #ff6b9d;
            --blue: #48dbfb;
            --green: #2ed573;
            --orange: #ffa502;
            --purple: #a55eea;
            --yellow: #feca57;
            --red: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: manipulation;
        }

        body {
            background: #1a0533;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', -apple-system, sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ========== ΟΘΟΝΗ ΕΝΑΡΞΗΣ ========== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: radial-gradient(ellipse at 50% 30%, #4a1a8a 0%, #2d1050 30%, #1a0533 70%, #0d0220 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 15px;
            padding: 20px;
            overflow: hidden;
        }

        .splash-screen.hidden {
            display: none !important;
        }

        /* Κινούμενο φόντο με κύκλους */
        .splash-bg-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatCircle 10s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) { width: 200px; height: 200px; background: #ff9ff3; top: 5%; left: -50px; animation-delay: 0s; }
        .bg-circle:nth-child(2) { width: 150px; height: 150px; background: #48dbfb; top: 50%; right: -30px; animation-delay: -2s; }
        .bg-circle:nth-child(3) { width: 130px; height: 130px; background: #feca57; bottom: 10%; left: 10%; animation-delay: -4s; }
        .bg-circle:nth-child(4) { width: 180px; height: 180px; background: #2ed573; top: 30%; left: 60%; animation-delay: -6s; }
        .bg-circle:nth-child(5) { width: 100px; height: 100px; background: #ff6b9d; top: 2%; right: 20%; animation-delay: -3s; }
        .bg-circle:nth-child(6) { width: 140px; height: 140px; background: #a55eea; bottom: 5%; right: 30%; animation-delay: -5s; }
        .bg-circle:nth-child(7) { width: 90px; height: 90px; background: #ffa502; top: 40%; left: 5%; animation-delay: -1s; }
        .bg-circle:nth-child(8) { width: 160px; height: 160px; background: #ff4757; bottom: 20%; right: 10%; animation-delay: -7s; }

        @keyframes floatCircle {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.15; }
            25% { transform: translate(20px, -25px) scale(1.15); opacity: 0.25; }
            50% { transform: translate(-15px, 15px) scale(0.9); opacity: 0.1; }
            75% { transform: translate(-25px, -10px) scale(1.1); opacity: 0.2; }
        }

        /* Αστέρια */
        .splash-stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        .star.shooting {
            position: absolute;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            border-radius: 1px;
            animation: shoot 1.5s linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); box-shadow: 0 0 3px rgba(255,255,255,0.3); }
            50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        }

        @keyframes shoot {
            0% { transform: translateY(-100px) translateX(200px) rotate(-45deg); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateY(100vh) translateX(-200px) rotate(-45deg); opacity: 0; }
        }

        /* Φλόγες */
        .flames-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            pointer-events: none;
            z-index: 0;
        }

        .flame {
            position: absolute;
            bottom: -20px;
            border-radius: 50% 50% 0 0;
            animation: flicker 1.5s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        @keyframes flicker {
            0% { 
                transform: scaleY(1) scaleX(1);
                opacity: 0.7;
            }
            25% {
                transform: scaleY(1.3) scaleX(0.85);
                opacity: 0.9;
            }
            50% {
                transform: scaleY(0.9) scaleX(1.1);
                opacity: 0.6;
            }
            75% {
                transform: scaleY(1.5) scaleX(0.8);
                opacity: 0.95;
            }
            100% {
                transform: scaleY(1) scaleX(1);
                opacity: 0.7;
            }
        }

        /* Σωματίδια (particles) */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp 4s ease-in infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        /* Bubble particles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.2);
            animation: bubbleFloat 6s ease-in infinite;
        }

        @keyframes bubbleFloat {
            0% {
                transform: translateY(120vh) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-20vh) scale(1.8);
                opacity: 0;
            }
        }

        /* Sparkles */
        .sparkle {
            position: absolute;
            background: white;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: sparkleFloat 3s ease-in-out infinite;
        }

        @keyframes sparkleFloat {
            0%, 100% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            50% {
                transform: scale(1) rotate(180deg);
                opacity: 1;
            }
        }

        /* ΛΟΓΟΤΥΠΟ */
        .logo-wrapper {
            position: relative;
            z-index: 2;
            width: clamp(180px, 45vw, 280px);
            height: clamp(180px, 45vw, 280px);
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,159,243,0.4) 0%, rgba(72,219,251,0.3) 30%, transparent 70%);
            animation: logoGlowPulse 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes logoGlowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .splash-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 
                0 0 60px rgba(255,159,243,0.6),
                0 0 100px rgba(72,219,251,0.4),
                0 0 150px rgba(254,202,87,0.3),
                0 12px 40px rgba(0,0,0,0.5);
            position: relative;
            z-index: 2;
            animation: logoSpinStop 1.5s cubic-bezier(0.25, 0.1, 0.1, 1) forwards;
        }

        @keyframes logoSpinStop {
            0% { 
                transform: rotate(0deg) scale(0.2); 
                opacity: 0;
                filter: blur(10px);
            }
            20% { 
                transform: rotate(0deg) scale(1.05); 
                opacity: 1;
                filter: blur(0);
            }
            50% { 
                transform: rotate(1080deg) scale(1.1); 
                opacity: 1;
            }
            70% { 
                transform: rotate(720deg) scale(0.9); 
                opacity: 1;
            }
            85% { 
                transform: rotate(725deg) scale(1.04); 
                opacity: 1;
            }
            100% { 
                transform: rotate(720deg) scale(1); 
                opacity: 1;
            }
        }

        /* Δαχτυλίδι γύρω από το λογότυπο */
        .orbiting-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            height: 110%;
            border-radius: 50%;
            border: 3px dashed rgba(254,202,87,0.4);
            animation: orbitSpin 10s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .orbiting-ring:nth-child(2) {
            width: 125%;
            height: 125%;
            border-color: rgba(72,219,251,0.3);
            animation-duration: 15s;
            animation-direction: reverse;
        }

        .orbiting-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #feca57;
            box-shadow: 0 0 15px #feca57, 0 0 30px #ff9ff3;
            animation: dotOrbit 10s linear infinite;
            z-index: 3;
        }

        .orbiting-dot:nth-child(3) {
            background: #48dbfb;
            box-shadow: 0 0 15px #48dbfb, 0 0 30px #48dbfb;
            animation-duration: 15s;
            animation-direction: reverse;
        }

        @keyframes orbitSpin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes dotOrbit {
            0% { 
                top: -6px;
                left: calc(50% - 6px);
            }
            25% { 
                top: calc(50% - 6px);
                left: calc(100% - 6px);
            }
            50% { 
                top: calc(100% - 6px);
                left: calc(50% - 6px);
            }
            75% { 
                top: calc(50% - 6px);
                left: -6px;
            }
            100% { 
                top: -6px;
                left: calc(50% - 6px);
            }
        }

        /* Τίτλος */
        .splash-title {
            font-size: clamp(1.3rem, 5.5vw, 2.2rem);
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ff9ff3 0%, #feca57 35%, #48dbfb 65%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 8px rgba(255,107,157,0.5));
            text-align: center;
            line-height: 1.15;
            position: relative;
            z-index: 2;
            animation: titleShine 3s ease-in-out infinite;
        }

        @keyframes titleShine {
            0%, 100% { filter: drop-shadow(0 4px 8px rgba(255,107,157,0.5)); }
            50% { filter: drop-shadow(0 4px 25px rgba(72,219,251,0.9)) drop-shadow(0 0 40px rgba(255,159,243,0.7)); }
        }

        .splash-subtitle {
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            color: #feca57;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            text-align: center;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 20px rgba(254,202,87,0.7), 0 0 40px rgba(255,159,243,0.4);
            animation: subtitlePulse 2s ease-in-out infinite;
        }

        @keyframes subtitlePulse {
            0%, 100% { text-shadow: 0 0 20px rgba(254,202,87,0.7), 0 0 40px rgba(255,159,243,0.4); }
            50% { text-shadow: 0 0 35px rgba(254,202,87,1), 0 0 60px rgba(255,159,243,0.8), 0 0 80px rgba(72,219,251,0.5); }
        }

        /* Κουμπί START */
        .splash-btn-wrapper {
            position: relative;
            z-index: 2;
        }

        .btn-sparkles {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            pointer-events: none;
        }

        .btn-sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #feca57;
            border-radius: 50%;
            box-shadow: 0 0 10px #feca57, 0 0 20px #ff9ff3;
            animation: btnSparkleFloat 1.5s ease-in-out infinite;
        }

        @keyframes btnSparkleFloat {
            0%, 100% { transform: translate(0, 0) scale(0); opacity: 0; }
            50% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 1; }
        }

        .splash-btn {
            padding: 18px 55px;
            background: linear-gradient(180deg, #ff9ff3 0%, #ff6b9d 40%, #ff4081 100%);
            border: 4px solid #feca57;
            color: #1a0533;
            border-radius: 60px;
            font-weight: 900;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 
                0 10px 0 #c44569, 
                0 12px 30px rgba(0,0,0,0.4),
                0 0 40px rgba(255,159,243,0.5),
                0 0 80px rgba(255,159,243,0.3),
                inset 0 3px 0 rgba(255,255,255,0.3);
            position: relative;
            z-index: 3;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            animation: btnBounce 2s ease-in-out infinite;
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
        }

        @keyframes btnBounce {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); box-shadow: 0 16px 0 #c44569, 0 18px 35px rgba(0,0,0,0.4), 0 0 55px rgba(255,159,243,0.7), 0 0 90px rgba(255,159,243,0.4), inset 0 3px 0 rgba(255,255,255,0.3); }
            50% { transform: translateY(0); box-shadow: 0 10px 0 #c44569, 0 12px 30px rgba(0,0,0,0.4), 0 0 40px rgba(255,159,243,0.5), 0 0 80px rgba(255,159,243,0.3), inset 0 3px 0 rgba(255,255,255,0.3); }
            70% { transform: translateY(-4px); box-shadow: 0 13px 0 #c44569, 0 15px 28px rgba(0,0,0,0.4), 0 0 48px rgba(255,159,243,0.6), 0 0 85px rgba(255,159,243,0.35), inset 0 3px 0 rgba(255,255,255,0.3); }
        }

        .splash-btn:active {
            top: 6px;
            box-shadow: 
                0 4px 0 #c44569, 
                0 6px 18px rgba(0,0,0,0.4),
                0 0 50px rgba(255,159,243,0.8),
                0 0 100px rgba(255,159,243,0.5),
                inset 0 3px 0 rgba(255,255,255,0.3);
            animation: none;
        }

        /* Footer */
        .splash-footer {
            font-size: clamp(0.5rem, 1.8vw, 0.65rem);
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            position: absolute;
            bottom: 25px;
            z-index: 2;
            text-align: center;
        }

        /* Rainbow trail particles */
        .rainbow-trail {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: trailFade 2s ease-out forwards;
        }

        @keyframes trailFade {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Glow burst effect */
        .glow-burst {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,159,243,0.4) 20%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: burstExpand 2s ease-out infinite;
        }

        @keyframes burstExpand {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- ΟΘΟΝΗ ΕΝΑΡΞΗΣ -->
    <div class="splash-screen" id="splashScreen">
        <!-- Glow burst -->
        <div class="glow-burst"></div>
        <div class="glow-burst" style="animation-delay: 1s;"></div>
        
        <!-- Κινούμενοι κύκλοι φόντου -->
        <div class="splash-bg-circles">
            <div class="bg-circle"></div><div class="bg-circle"></div><div class="bg-circle"></div>
            <div class="bg-circle"></div><div class="bg-circle"></div><div class="bg-circle"></div>
            <div class="bg-circle"></div><div class="bg-circle"></div>
        </div>
        
        <!-- Αστέρια -->
        <div class="splash-stars" id="splashStars"></div>
        
        <!-- Φλόγες στο κάτω μέρος -->
        <div class="flames-container" id="flamesContainer"></div>
        
        <!-- Σωματίδια -->
        <div class="particles-container" id="particlesContainer"></div>
        
        <!-- Bubbles -->
        <div class="particles-container" id="bubblesContainer"></div>
        
        <!-- Sparkles -->
        <div class="particles-container" id="sparklesContainer"></div>

        <!-- ΛΟΓΟΤΥΠΟ ΜΕ ΠΕΡΙΣΤΡΟΦΗ, ΔΑΧΤΥΛΙΔΙΑ ΚΑΙ ΚΟΥΚΚΙΔΕΣ -->
        <div class="logo-wrapper" id="logoWrapper">
            <div class="logo-glow"></div>
            <div class="orbiting-ring"></div>
            <div class="orbiting-ring"></div>
            <div class="orbiting-dot"></div>
            <div class="orbiting-dot"></div>
            <img src="code1.png" alt="CRACK THE CODE KIDS Logo" class="splash-logo" id="splashLogo">
        </div>
        
        <div class="splash-title">CRACK THE CODE<br>FOR KIDS</div>
        <div class="splash-subtitle">ΒΡΕΣ ΤΗΝ ΛΕΞΗ!</div>
        
        <!-- Κουμπί START με sparkles -->
        <div class="splash-btn-wrapper">
            <div class="btn-sparkles" id="btnSparkles"></div>
            <button class="splash-btn" id="startGameBtn">▶ START</button>
        </div>
        
        <div class="splash-footer">🎮 ΓΙΑ ΠΑΙΔΙΑ 🎮</div>
    </div>

    <script>
        (function() {
            const splashScreen = document.getElementById('splashScreen');
            const startGameBtn = document.getElementById('startGameBtn');
            
            // Audio Context για ήχους
            let audioCtx = null;
            
            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            // ========== ΔΗΜΙΟΥΡΓΙΑ ΑΣΤΕΡΙΩΝ ==========
            const starsContainer = document.getElementById('splashStars');
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 5 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                starsContainer.appendChild(star);
            }
            
            // Διάττοντες αστέρες
            for (let i = 0; i < 3; i++) {
                const shooting = document.createElement('div');
                shooting.className = 'star shooting';
                shooting.style.left = Math.random() * 80 + '%';
                shooting.style.top = Math.random() * 30 + '%';
                shooting.style.animationDelay = (Math.random() * 5 + i * 3) + 's';
                shooting.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                starsContainer.appendChild(shooting);
            }

            // ========== ΦΛΟΓΕΣ ==========
            const flamesContainer = document.getElementById('flamesContainer');
            const flameColors = [
                '#ff4500', '#ff6347', '#ff7f50', '#ffa500', '#ffd700',
                '#ff1493', '#ff69b4', '#ff6b6b', '#ff4757', '#ff9ff3'
            ];
            
            for (let i = 0; i < 25; i++) {
                const flame = document.createElement('div');
                flame.className = 'flame';
                flame.style.left = (Math.random() * 90) + '%';
                flame.style.width = (Math.random() * 60 + 20) + 'px';
                flame.style.height = (Math.random() * 80 + 40) + 'px';
                flame.style.background = `radial-gradient(ellipse at bottom, ${flameColors[Math.floor(Math.random() * flameColors.length)]}, transparent)`;
                flame.style.animationDelay = (Math.random() * 2) + 's';
                flame.style.animationDuration = (Math.random() * 1.5 + 0.8) + 's';
                flame.style.opacity = Math.random() * 0.5 + 0.3;
                flamesContainer.appendChild(flame);
            }

            // ========== ΣΩΜΑΤΙΔΙΑ (PARTICLES) ==========
            const particlesContainer = document.getElementById('particlesContainer');
            const particleColors = ['#ff9ff3', '#48dbfb', '#feca57', '#2ed573', '#ff6b9d', '#a55eea', '#ffa502'];
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 8 + 3) + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
                particle.style.animationDelay = (Math.random() * 4) + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particle.style.boxShadow = `0 0 ${Math.random() * 10 + 5}px ${particle.style.background}`;
                particlesContainer.appendChild(particle);
            }

            // ========== BUBBLES ==========
            const bubblesContainer = document.getElementById('bubblesContainer');
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.width = (Math.random() * 30 + 10) + 'px';
                bubble.style.height = bubble.style.width;
                bubble.style.animationDelay = (Math.random() * 6) + 's';
                bubble.style.animationDuration = (Math.random() * 4 + 4) + 's';
                bubblesContainer.appendChild(bubble);
            }

            // ========== SPARKLES ==========
            const sparklesContainer = document.getElementById('sparklesContainer');
            for (let i = 0; i < 20; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.width = (Math.random() * 15 + 5) + 'px';
                sparkle.style.height = sparkle.style.width;
                sparkle.style.animationDelay = (Math.random() * 3) + 's';
                sparkle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                sparkle.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
                sparkle.style.boxShadow = `0 0 ${Math.random() * 15 + 5}px ${sparkle.style.background}`;
                sparklesContainer.appendChild(sparkle);
            }

            // ========== SPARKLES ΓΥΡΩ ΑΠΟ ΤΟ ΚΟΥΜΠΙ ==========
            const btnSparkles = document.getElementById('btnSparkles');
            for (let i = 0; i < 12; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'btn-sparkle';
                sparkle.style.setProperty('--tx', (Math.random() * 80 - 40) + 'px');
                sparkle.style.setProperty('--ty', (Math.random() * 80 - 40) + 'px');
                sparkle.style.animationDelay = (Math.random() * 1.5) + 's';
                sparkle.style.animationDuration = (Math.random() * 1 + 1) + 's';
                btnSparkles.appendChild(sparkle);
            }

            // ========== RAINBOW TRAIL ΣΤΟ ΛΟΓΟΤΥΠΟ ==========
            const logoWrapper = document.getElementById('logoWrapper');
            let trailInterval;
            
            function createTrailParticle(x, y) {
                const trail = document.createElement('div');
                trail.className = 'rainbow-trail';
                trail.style.left = x + 'px';
                trail.style.top = y + 'px';
                trail.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
                trail.style.boxShadow = `0 0 8px ${trail.style.background}`;
                logoWrapper.appendChild(trail);
                setTimeout(() => trail.remove(), 2000);
            }

            logoWrapper.addEventListener('mousemove', (e) => {
                const rect = logoWrapper.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                createTrailParticle(x, y);
            });

            logoWrapper.addEventListener('touchmove', (e) => {
                const rect = logoWrapper.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                const y = e.touches[0].clientY - rect.top;
                createTrailParticle(x, y);
            }, { passive: true });

            // Αυτόματα trail particles
            function autoTrail() {
                const rect = logoWrapper.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const angle = Date.now() / 500;
                const radius = rect.width * 0.4;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                createTrailParticle(x, y);
                trailInterval = setTimeout(autoTrail, 150);
            }
            autoTrail();

            // ========== ΗΧΗΤΙΚΟ ΕΦΕ ΕΚΚΙΝΗΣΗΣ (START BUTTON SOUND) ==========
            function playStartSound() {
                initAudio();
                if (!audioCtx) return;
                
                try {
                    const now = audioCtx.currentTime;
                    
                    // Synth sweep up - εντυπωσιακό ανέβασμα
                    const sweepOsc = audioCtx.createOscillator();
                    const sweepGain = audioCtx.createGain();
                    sweepOsc.type = 'sawtooth';
                    sweepOsc.frequency.setValueAtTime(100, now);
                    sweepOsc.frequency.exponentialRampToValueAtTime(800, now + 0.8);
                    sweepGain.gain.setValueAtTime(0.15, now);
                    sweepGain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    sweepOsc.connect(sweepGain);
                    sweepGain.connect(audioCtx.destination);
                    sweepOsc.start(now);
                    sweepOsc.stop(now + 0.8);

                    // Χορδές - φανφάρα
                    const notes = [261.63, 329.63, 392, 523.25, 659.25, 783.99, 1046.5];
                    notes.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + 0.15 + i * 0.08);
                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(0.2, now + 0.15 + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15 + i * 0.08 + 0.4);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(now + 0.15 + i * 0.08);
                        osc.stop(now + 0.15 + i * 0.08 + 0.4);
                    });

                    // Bass hit
                    const bassOsc = audioCtx.createOscillator();
                    const bassGain = audioCtx.createGain();
                    bassOsc.type = 'triangle';
                    bassOsc.frequency.setValueAtTime(55, now);
                    bassOsc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
                    bassGain.gain.setValueAtTime(0.3, now);
                    bassGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    bassOsc.connect(bassGain);
                    bassGain.connect(audioCtx.destination);
                    bassOsc.start(now);
                    bassOsc.stop(now + 0.5);

                    // Sparkle sounds
                    for (let i = 0; i < 8; i++) {
                        const spOsc = audioCtx.createOscillator();
                        const spGain = audioCtx.createGain();
                        spOsc.type = 'sine';
                        spOsc.frequency.setValueAtTime(800 + Math.random() * 1200, now + 0.3 + i * 0.06);
                        spGain.gain.setValueAtTime(0.08, now + 0.3 + i * 0.06);
                        spGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3 + i * 0.06 + 0.15);
                        spOsc.connect(spGain);
                        spGain.connect(audioCtx.destination);
                        spOsc.start(now + 0.3 + i * 0.06);
                        spOsc.stop(now + 0.3 + i * 0.06 + 0.15);
                    }

                    // Cymbal-like noise burst
                    const bufferSize = audioCtx.sampleRate * 0.3;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.05));
                    }
                    const noise = audioCtx.createBufferSource();
                    const noiseGain = audioCtx.createGain();
                    noise.buffer = buffer;
                    noiseGain.gain.setValueAtTime(0.12, now + 0.1);
                    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    noise.connect(noiseGain);
                    noiseGain.connect(audioCtx.destination);
                    noise.start(now + 0.1);
                    
                } catch(e) {
                    console.log('Audio error:', e);
                }
            }

            // ========== ΕΚΡΗΚΤΙΚΟ EFFECT ΟΤΑΝ ΠΑΤΗΘΕΙ ΤΟ START ==========
            function createExplosionEffect() {
                const container = document.getElementById('splashScreen');
                const btnRect = startGameBtn.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const centerX = btnRect.left - containerRect.left + btnRect.width / 2;
                const centerY = btnRect.top - containerRect.top + btnRect.height / 2;
                
                const colors = ['#ff9ff3', '#feca57', '#48dbfb', '#ff6b9d', '#2ed573', '#a55eea', '#ffa502', '#ff4757'];
                
                // Δημιουργία πολλών σωματιδίων έκρηξης
                for (let i = 0; i < 80; i++) {
                    const particle = document.createElement('div');
                    particle.style.cssText = `
                        position: absolute;
                        left: ${centerX}px;
                        top: ${centerY}px;
                        width: ${Math.random() * 12 + 4}px;
                        height: ${Math.random() * 12 + 4}px;
                        border-radius: 50%;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        box-shadow: 0 0 ${Math.random() * 15 + 5}px ${colors[Math.floor(Math.random() * colors.length)]};
                        pointer-events: none;
                        z-index: 10;
                        transition: all ${Math.random() * 1 + 0.5}s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                        opacity: 1;
                    `;
                    container.appendChild(particle);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 300 + 100;
                    const targetX = centerX + Math.cos(angle) * distance;
                    const targetY = centerY + Math.sin(angle) * distance;
                    
                    requestAnimationFrame(() => {
                        particle.style.transform = `translate(${targetX - centerX}px, ${targetY - centerY}px) scale(${Math.random() * 1.5 + 0.5})`;
                        particle.style.opacity = '0';
                    });
                    
                    setTimeout(() => particle.remove(), 1500);
                }
                
                // Κύματα shockwave
                for (let i = 0; i < 3; i++) {
                    const ring = document.createElement('div');
                    ring.style.cssText = `
                        position: absolute;
                        left: ${centerX}px;
                        top: ${centerY}px;
                        width: 20px;
                        height: 20px;
                        border-radius: 50%;
                        border: 3px solid rgba(255,255,255,0.6);
                        pointer-events: none;
                        z-index: 9;
                        transform: translate(-50%, -50%);
                        opacity: 1;
                    `;
                    container.appendChild(ring);
                    
                    setTimeout(() => {
                        ring.style.transition = `all 0.8s ease-out`;
                        ring.style.width = '400px';
                        ring.style.height = '400px';
                        ring.style.opacity = '0';
                        ring.style.borderWidth = '0px';
                    }, i * 100);
                    
                    setTimeout(() => ring.remove(), 1000);
                }
            }

            // ========== EVENT LISTENERS ==========
            function handleStart(e) {
                e.preventDefault();
                initAudio();
                playStartSound();
                createExplosionEffect();
                
                // Μικρή καθυστέρηση για να φανεί το effect πριν την εξαφάνιση
                setTimeout(() => {
                    splashScreen.classList.add('hidden');
                    clearTimeout(trailInterval);
                    // Εδώ θα μπορούσες να εμφανίσεις το κυρίως παιχνίδι
                    alert('Το παιχνίδι ξεκινά! 🎉\n\nΕδώ θα φορτώσει το κυρίως παιχνίδι.');
                }, 600);
            }

            startGameBtn.addEventListener('touchstart', handleStart, { passive: false });
            startGameBtn.addEventListener('mousedown', handleStart);
            startGameBtn.addEventListener('click', (e) => e.preventDefault());

            // Ενεργοποίηση audio στο πρώτο άγγιγμα
            document.addEventListener('touchstart', initAudio, { once: true });
            document.addEventListener('click', initAudio, { once: true });

            console.log('🚀 CRACK THE CODE KIDS - Splash Screen Ready!');
            console.log('🎨 Χαρακτηριστικά:');
            console.log('  ✨ 60+ αστέρια + διάττοντες');
            console.log('  🔥 25 φλόγες στο κάτω μέρος');
            console.log('  💫 30 σωματίδια που αιωρούνται');
            console.log('  🫧 15 bubbles');
            console.log('  ⭐ 20 sparkles');
            console.log('  💍 Δαχτυλίδια γύρω από το λογότυπο');
            console.log('  🌈 Rainbow trail στο λογότυπο');
            console.log('  💥 Εκρηκτικό effect στο START');
            console.log('  🎵 Εντυπωσιακός ήχος εκκίνησης');
        })();
    </script>
</body>
