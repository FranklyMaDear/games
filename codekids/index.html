            const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
            let gardenSoundInterval = null;
            let gardenSoundActive = false;

            function initAudio() { 
                if (!audioCtx) audioCtx = new AudioContext(); 
                if (audioCtx.state === 'suspended') audioCtx.resume(); 
            }

            function playGardenAmbient() {
                if (!audioCtx || gardenSoundActive) return;
                gardenSoundActive = true;
                
                // Συνεχής ήχος αέρα
                const playWind = () => {
                    if (!gardenSoundActive || !audioCtx) return;
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    const noise = audioCtx.createOscillator();
                    const noiseGain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(200 + Math.random() * 300, now);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.03, now + 0.5);
                    gain.gain.linearRampToValueAtTime(0.01, now + 2);
                    gain.gain.linearRampToValueAtTime(0, now + 3);
                    
                    noise.type = 'sawtooth';
                    noise.frequency.setValueAtTime(100 + Math.random() * 200, now);
                    noiseGain.gain.setValueAtTime(0, now);
                    noiseGain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    noiseGain.gain.linearRampToValueAtTime(0, now + 1.5);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    noise.connect(noiseGain);
                    noiseGain.connect(audioCtx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 3);
                    noise.start(now);
                    noise.stop(now + 1.5);
                    
                    setTimeout(playWind, 2500 + Math.random() * 2000);
                };

                // Περιστασιακό κελάηδισμα πουλιών
                const playBird = () => {
                    if (!gardenSoundActive || !audioCtx) return;
                    const now = audioCtx.currentTime;
                    const notes = [800, 900, 1000, 1100, 1200, 1300, 1400];

            loadSavedData(); createAttemptDots(); createAlphabetButtons();
            window.addEventListener('resize', () => { if (!gameContainer.classList.contains("hidden")) updateWordDisplay(); });
            document.addEventListener('touchmove', function(e) { if (e.target.tagName !== 'INPUT') e.preventDefault(); }, { passive: false });

            // Αυτόματη έναρξη ήχων κήπου
            setTimeout(() => {
                if (!splashScreen.classList.contains('hidden')) {
                    initAudio();
                    playGardenAmbient();
                }
            }, 500);
        })();
    </script>
</body>
</html>
