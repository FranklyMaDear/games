            function createAlphabetButtons() { alphabetContainer.innerHTML = ""; KEYBOARD_ROWS.forEach((row) => { const rowDiv = document.createElement("div"); rowDiv.className = "keyboard-row"; row.forEach(letter => { const btn = document.createElement("button"); btn.className = "letter-btn"; btn.textContent = letter; btn.setAttribute("type", "button"); btn.addEventListener("touchstart", function(e) { e.preventDefault(); e.stopPropagation(); btn.classList.add("pressed"); initAudio(); handleLetterClick(letter, btn); }, { passive: false }); btn.addEventListener("touchend", function(e) { e.preventDefault(); btn.classList.remove("pressed"); }); btn.addEventListener("touchcancel", function(e) { btn.classList.remove("pressed"); }); btn.addEventListener("mousedown", function(e) { e.preventDefault(); btn.classList.add("pressed"); initAudio(); handleLetterClick(letter, btn); }); btn.addEventListener("mouseup", function(e) { btn.classList.remove("pressed"); }); btn.addEventListener("mouseleave", function(e) { btn.classList.remove("pressed"); }); btn.addEventListener("click", function(e) { e.preventDefault(); e.stopPropagation(); }); rowDiv.appendChild(btn); }); alphabetContainer.appendChild(rowDiv); }); }

            function updateAlphabetButtons() { const allButtons = alphabetContainer.querySelectorAll(".letter-btn"); const nw = normalizeGreek(currentWord); allButtons.forEach(btn => { const l = btn.textContent; btn.classList.remove("used-correct", "used-wrong", "pressed"); if (usedLetters.includes(l)) btn.classList.add(nw.includes(l) ? "used-correct" : "used-wrong"); }); }

            function handleLetterClick(letter, btn) { if (!gameActive || usedLetters.includes(letter) || isSpinning) return; usedLetters.push(letter); const nw = normalizeGreek(currentWord); const positions = []; for (let i = 0; i < nw.length; i++) { if (nw[i] === letter) positions.push(i); } spinAllSlots(() => { if (positions.length > 0) { playCorrectLetterSound(); const pointsEarned = positions.length * POINTS_PER_LETTER; currentScore += pointsEarned; addXP(pointsEarned); correctLettersInCurrentWord += positions.length; positions.forEach(pos => { revealedLetters[pos] = letter; }); updateWordDisplay(true, positions); updateAlphabetButtons(); updateScoreDisplay(); saveAllData(); const rect = btn.getBoundingClientRect(); const containerRect = gameContainer.getBoundingClientRect(); showScorePop('+' + pointsEarned, rect.left - containerRect.left + rect.width/2, rect.top - containerRect.top); messageBox.textContent = `✅ Το "${letter}" βρέθηκε! +${pointsEarned} πόντοι! 🎉`; messageBox.style.color = "#2ed573"; const allRevealed = revealedLetters.map(l => l || '').join(''); if (allRevealed === nw) { setTimeout(() => { currentScore += POINTS_FULL_WORD; addXP(POINTS_FULL_WORD); updateScoreDisplay(); saveAllData(); const wdRect = wordDisplay.getBoundingClientRect(); showScorePop('+100 ΛΕΞΗ! 🏆', wdRect.left - containerRect.left + wdRect.width/2, wdRect.top - containerRect.top); playWordCorrectSound(); setTimeout(() => playWinFanfare(), 600); spawnConfetti(); endGame(true); }, 400); } } else { playWrongLetterSound(); wrongAttempts++; updateAttemptDots(); updateAlphabetButtons(); flashAllSlots(); messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`; messageBox.style.color = "#ff6b6b"; if (wrongAttempts >= MAX_ATTEMPTS) setTimeout(() => endGame(false, "attempts"), 400); } }); }

            function flashAllSlots() { wordDisplay.querySelectorAll(".word-slot:not(.space)").forEach(slot => { slot.classList.add("wrong-flash"); setTimeout(() => slot.classList.remove("wrong-flash"), 500); }); }

            function updateWordDisplay(animate = false, highlightPositions = []) { wordDisplay.innerHTML = ""; const displayWord = currentWord.toUpperCase(); const words = displayWord.split(" "); const wordLengths = words.map(w => normalizeGreek(w).length); const maxWordLength = Math.max(...wordLengths); const containerWidth = wordDisplay.clientWidth - 16; const gapPerSlot = 6; let slotSize; if (maxWordLength > MAX_LETTERS_PER_ROW) { slotSize = Math.floor((containerWidth - (maxWordLength - 1) * gapPerSlot) / maxWordLength); slotSize = Math.max(slotSize, 24); slotSize = Math.min(slotSize, 52); } else { slotSize = Math.floor((containerWidth - (MAX_LETTERS_PER_ROW - 1) * gapPerSlot) / MAX_LETTERS_PER_ROW); slotSize = Math.max(slotSize, 30); slotSize = Math.min(slotSize, 52); } const fontSize = Math.floor(slotSize * FONT_RATIO); const rows = []; let currentRow = []; let currentRowLetters = 0; for (let w = 0; w < words.length; w++) { const wordLen = normalizeGreek(words[w]).length; const spaceNeeded = currentRow.length > 0 ? 1 : 0; const totalNeeded = currentRowLetters + spaceNeeded + wordLen; if (totalNeeded <= MAX_LETTERS_PER_ROW && wordLen <= MAX_LETTERS_PER_ROW) { if (currentRow.length > 0) { currentRow.push({ type: "space" }); currentRowLetters += 1; } currentRow.push({ type: "word", wordIndex: w }); currentRowLetters += wordLen; } else { if (currentRow.length > 0) rows.push(currentRow); currentRow = [{ type: "word", wordIndex: w }]; currentRowLetters = wordLen; } } if (currentRow.length > 0) rows.push(currentRow); let globalLetterIndex = 0; const wordStartIndices = []; for (let w = 0; w < words.length; w++) { wordStartIndices[w] = globalLetterIndex; globalLetterIndex += normalizeGreek(words[w]).length; } rows.forEach((rowItems) => { let rowMaxLen = 0; let totalLettersInRow = 0; let spaceCount = 0; rowItems.forEach(item => { if (item.type === "word") { rowMaxLen = Math.max(rowMaxLen, normalizeGreek(words[item.wordIndex]).length); totalLettersInRow += normalizeGreek(words[item.wordIndex]).length; } else spaceCount++; }); const totalSlots = totalLettersInRow + spaceCount; let rowSlotSize = slotSize; if (rowMaxLen > MAX_LETTERS_PER_ROW || totalSlots > MAX_LETTERS_PER_ROW) { rowSlotSize = Math.floor((containerWidth - (rowMaxLen - 1) * gapPerSlot) / rowMaxLen); rowSlotSize = Math.max(rowSlotSize, 24); rowSlotSize = Math.min(rowSlotSize, 52); } const rowFontSize = Math.floor(rowSlotSize * FONT_RATIO); const rowDiv = document.createElement("div"); rowDiv.className = "word-row"; rowItems.forEach((item) => { if (item.type === "space") { const spaceEl = document.createElement("span"); spaceEl.className = "word-slot space"; rowDiv.appendChild(spaceEl); } else { const w = item.wordIndex; const word = words[w]; const startIdx = wordStartIndices[w]; for (let i = 0; i < word.length; i++) { const letterIndex = startIdx + i; const slot = document.createElement("span"); slot.className = "word-slot"; slot.style.width = rowSlotSize + "px"; slot.style.height = (rowSlotSize * 1.35) + "px"; slot.style.fontSize = rowFontSize + "px"; slot.style.minWidth = rowSlotSize + "px"; const inner = document.createElement("span"); inner.className = "slot-inner"; inner.textContent = revealedLetters[letterIndex] || "_"; slot.appendChild(inner); if (animate && highlightPositions.includes(letterIndex)) { slot.classList.add("revealed"); setTimeout(() => slot.classList.remove("revealed"), 400); } rowDiv.appendChild(slot); } } }); wordDisplay.appendChild(rowDiv); }); }

            function checkFullGuess() { if (!gameActive || isSpinning) return; initAudio(); const guess = normalizeGreek(guessInput.value.trim()); const nw = normalizeGreek(currentWord); if (guess === "") { messageBox.textContent = "Γράψε μια λέξη! ✏️"; messageBox.style.color = "#feca57"; return; } spinAllSlots(() => { if (guess === nw) { const remaining = nw.length - correctLettersInCurrentWord; const totalPoints = remaining * POINTS_PER_LETTER + POINTS_FULL_WORD; currentScore += totalPoints; addXP(totalPoints); updateScoreDisplay(); saveAllData(); for (let i = 0; i < nw.length; i++) { if (!revealedLetters[i]) { revealedLetters[i] = nw[i]; if (!usedLetters.includes(nw[i])) usedLetters.push(nw[i]); } } updateWordDisplay(true); updateAlphabetButtons(); const wdRect = wordDisplay.getBoundingClientRect(); showScorePop('+' + totalPoints + ' 🏆', wdRect.left + wdRect.width/2, wdRect.top); playWordCorrectSound(); setTimeout(() => playWinFanfare(), 600); spawnConfetti(); endGame(true); } else { playWordWrongSound(); wrongAttempts++; updateAttemptDots(); flashAllSlots(); messageBox.textContent = `Λάθος! Προσπάθησε ξανά! (${wrongAttempts}/${MAX_ATTEMPTS}) 💪`; messageBox.style.color = "#ff6b6b"; guessInput.value = ""; guessInput.focus(); if (wrongAttempts >= MAX_ATTEMPTS) setTimeout(() => endGame(false, "attempts"), 400); } }); }

            function endGame(won, reason = "time") { if (!gameActive) return; gameActive = false; stopTimer(); if (!won) { currentScore = Math.max(0, currentScore - POINTS_PENALTY_LOSS); updateScoreDisplay(); saveAllData(); showScorePop('-100 😢', wordDisplay.getBoundingClientRect().left, wordDisplay.getBoundingClientRect().top); } const nw = normalizeGreek(currentWord); for (let i = 0; i < nw.length; i++) revealedLetters[i] = nw[i]; updateWordDisplay(); updateAlphabetButtons(); guessInput.disabled = true; submitBtn.disabled = true; resultPanel.classList.remove("hidden"); saveAllData(); resultEmoji.textContent = won ? "🌟" : (reason === "attempts" ? "💪" : "⏰"); resultText.textContent = won ? "ΤΟ ΒΡΗΚΕΣ! ΜΠΡΑΒΟ!" : (reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ"); messageBox.textContent = won ? "Συγχαρητήρια! Πάτα ΝΕΟ ΠΑΙΧΝΙΔΙ! 🎉" : `Η λέξη ήταν: ${currentWord}. Πάτα ΝΕΟ ΠΑΙΧΝΙΔΙ! 😊`; messageBox.style.color = won ? "#2ed573" : "#feca57"; }

            function resetGame() { stopTimer(); const obj = getRandomWord(); currentWord = obj.word; currentHint = obj.hint; gameActive = true; timeSeconds = START_TIME; wrongAttempts = 0; usedLetters = []; isSpinning = false; correctLettersInCurrentWord = 0; const nw = normalizeGreek(currentWord); revealedLetters = new Array(nw.length).fill(""); timerDisplay.textContent = formatTime(timeSeconds); timerDisplay.style.color = "#ffffff"; hintText.textContent = "💡 " + currentHint; updateWordDisplay(); createAlphabetButtons(); updateAlphabetButtons(); createAttemptDots(); guessInput.value = ""; guessInput.disabled = false; submitBtn.disabled = false; resultPanel.classList.add("hidden"); messageBox.textContent = ""; messageBox.style.color = "#feca57"; confettiContainer.innerHTML = ""; timerInterval = setInterval(() => { if (!gameActive) return; timeSeconds--; timerDisplay.textContent = formatTime(timeSeconds); timerDisplay.style.color = timeSeconds <= 30 ? "#ff6b6b" : "#ffffff"; if (timeSeconds <= 0) { timeSeconds = 0; timerDisplay.textContent = "0:00"; endGame(false, "time"); } }, 1000); window.scrollTo(0, 0); guessInput.blur(); setTimeout(() => guessInput.focus(), 100); }

            submitBtn.addEventListener("touchstart", function(e) { e.preventDefault(); initAudio(); checkFullGuess(); });
            submitBtn.addEventListener("mousedown", function(e) { e.preventDefault(); initAudio(); checkFullGuess(); });
            submitBtn.addEventListener("click", function(e) { e.preventDefault(); });
            newGameBtn.addEventListener("touchstart", function(e) { e.preventDefault(); initAudio(); guessInput.blur(); resetGame(); });
            newGameBtn.addEventListener("mousedown", function(e) { e.preventDefault(); initAudio(); guessInput.blur(); resetGame(); });
            newGameBtn.addEventListener("click", function(e) { e.preventDefault(); });
            guessInput.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); initAudio(); checkFullGuess(); } });
            guessInput.addEventListener("input", function(e) { e.target.value = e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, ""); });
            guessInput.addEventListener("focus", function() { window.scrollTo(0, 0); });

            loadSavedData(); createAttemptDots(); createAlphabetButtons();
            window.addEventListener('resize', () => { if (!gameContainer.classList.contains("hidden")) updateWordDisplay(); });
            document.addEventListener('touchmove', function(e) { if (e.target.tagName !== 'INPUT') e.preventDefault(); }, { passive: false });
        })();
    </script>
</body>
