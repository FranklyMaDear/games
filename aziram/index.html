<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aziram – AI Avatar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:   #00e5ff;
    --purple: #b388ff;
    --glow:   #7efff5;
    --dark:   #05101a;
    --card:   rgba(0,229,255,0.07);
    --border: rgba(0,229,255,0.18);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(179,136,255,0.10) 0%, transparent 70%);
  }

  /* ── Stars background ── */
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; border-radius: 50%;
    background: #fff; opacity: 0;
    animation: twinkle var(--d) var(--delay) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50%      { opacity: var(--op); transform: scale(1); }
  }

  /* ── Layout ── */
  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    padding: 20px 16px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  h1 {
    font-size: 2rem; font-weight: 900; letter-spacing: .06em;
    background: linear-gradient(135deg, var(--teal) 0%, var(--purple) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(0,229,255,.5));
  }

  /* ── API KEY banner ── */
  #key-banner {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 16px; display: flex; gap: 8px; align-items: center;
  }
  #key-banner input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #fff; font-family: monospace; font-size: .85rem;
  }
  #key-banner input::placeholder { color: rgba(255,255,255,.35); }
  #key-banner button {
    background: linear-gradient(135deg, var(--teal), var(--purple));
    border: none; border-radius: 8px; padding: 6px 14px;
    color: #05101a; font-weight: 900; font-size: .8rem; cursor: pointer;
    transition: opacity .2s;
  }
  #key-banner button:hover { opacity: .85; }

  /* ── NEW AVATAR SVG ── */
  #avatar-wrap {
    position: relative; width: 240px; height: 340px;
    filter: drop-shadow(0 0 28px rgba(0,229,255,.35));
    cursor: pointer;
    transition: transform .15s;
    display: flex; justify-content: center; align-items: center;
  }
  #avatar-wrap:active { transform: scale(.97); }

  #az-svg {
    width: 100%; height: 100%;
  }

  /* Talking glow ring */
  #glow-ring {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 3px solid var(--teal);
    opacity: 0; transition: opacity .3s;
    animation: none;
    pointer-events: none; z-index: 0;
  }
  .talking #glow-ring {
    opacity: 1;
    animation: pulse-ring 0.6s infinite alternate;
  }
  @keyframes pulse-ring {
    from { box-shadow: 0 0 10px var(--teal), 0 0 20px var(--teal); }
    to   { box-shadow: 0 0 25px var(--teal), 0 0 50px var(--purple); }
  }

  /* Status dot */
  #status-dot {
    position: absolute; top: 6px; right: 6px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #444; z-index: 3;
    transition: background .3s;
  }
  .listening #status-dot  { background: #ff4081; animation: blink .7s infinite; }
  .thinking  #status-dot  { background: #ffd740; animation: blink .9s infinite; }
  .talking   #status-dot  { background: #69ff74; animation: blink .5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Chat bubble ── */
  #bubble-wrap {
    width: 100%;
    min-height: 80px; max-height: 220px;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 14px 16px;
    color: #e0f7fa;
    font-size: .95rem; line-height: 1.55;
    white-space: pre-wrap;
  }
  #bubble-wrap::-webkit-scrollbar { width: 4px; }
  #bubble-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Input row ── */
  #input-row {
    width: 100%; display: flex; gap: 8px;
  }
  #user-input {
    flex: 1; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; color: #fff; font-size: .95rem;
    font-family: 'Nunito', sans-serif; outline: none;
    transition: border-color .2s;
  }
  #user-input:focus { border-color: var(--teal); }
  #user-input::placeholder { color: rgba(255,255,255,.3); }

  .btn-icon {
    width: 46px; height: 46px; border-radius: 12px; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.25rem;
    transition: transform .15s, opacity .2s;
    flex-shrink: 0;
  }
  .btn-icon:active { transform: scale(.92); }
  #btn-send  { background: linear-gradient(135deg, var(--teal), var(--purple)); }
  #btn-mic   { background: rgba(255,64,129,.15); border: 1px solid rgba(255,64,129,.4); }
  #btn-mic.active { background: rgba(255,64,129,.5); }

  /* ── Language selector ── */
  #lang-row {
    width: 100%; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
  }
  .lang-btn {
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: rgba(255,255,255,.6);
    font-size: .78rem; cursor: pointer; transition: all .2s;
  }
  .lang-btn.active, .lang-btn:hover {
    background: var(--card); color: var(--teal); border-color: var(--teal);
  }

  /* ── Volume / voice toggle ── */
  #voice-row {
    display: flex; gap: 10px; align-items: center;
  }
  .toggle-label { color: rgba(255,255,255,.5); font-size: .8rem; }
  .toggle {
    position: relative; width: 40px; height: 22px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #333; border-radius: 22px;
    cursor: pointer; transition: background .3s;
  }
  .slider::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; left: 3px; top: 3px;
    transition: transform .3s;
  }
  input:checked + .slider { background: var(--teal); }
  input:checked + .slider::before { transform: translateX(18px); }
</style>
</head>
<body>

<div id="stars"></div>

<div class="container">
  <h1>✨ Aziram</h1>

  <!-- API Key -->
  <div id="key-banner">
    <input id="api-key-input" type="password" placeholder="Βάλε το Gemini API Key σου…" />
    <button onclick="saveKey()">💾 Save</button>
  </div>

  <!-- Language -->
  <div id="lang-row">
    <button class="lang-btn active" data-lang="el-GR">🇬🇷 Ελληνικά</button>
    <button class="lang-btn" data-lang="en-US">🇬🇧 English</button>
    <button class="lang-btn" data-lang="de-DE">🇩🇪 Deutsch</button>
    <button class="lang-btn" data-lang="fr-FR">🇫🇷 Français</button>
    <button class="lang-btn" data-lang="es-ES">🇪🇸 Español</button>
    <button class="lang-btn" data-lang="it-IT">🇮🇹 Italiano</button>
    <button class="lang-btn" data-lang="ru-RU">🇷🇺 Русский</button>
    <button class="lang-btn" data-lang="zh-CN">🇨🇳 中文</button>
    <button class="lang-btn" data-lang="ja-JP">🇯🇵 日本語</button>
    <button class="lang-btn" data-lang="ar-SA">🇸🇦 العربية</button>
  </div>

  <!-- Voice toggle -->
  <div id="voice-row">
    <span class="toggle-label">🔇</span>
    <label class="toggle">
      <input type="checkbox" id="voice-toggle" checked>
      <span class="slider"></span>
    </label>
    <span class="toggle-label">🔊 Φωνή</span>
  </div>

  <!-- NEW AVATAR -->
  <div id="avatar-wrap" onclick="avatarClick()">
    <div id="glow-ring"></div>
    <div id="status-dot"></div>
    <svg id="az-svg" viewBox="0 0 240 340" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Glittery Body Gradient -->
        <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
          <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0.9"/>
          <stop offset="40%" stop-color="#26c6da" stop-opacity="0.8"/>
          <stop offset="80%" stop-color="#1a237e" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#0d47a1" stop-opacity="1"/>
        </radialGradient>
        
        <!-- Eye Gradient -->
        <radialGradient id="irisGrad">
          <stop offset="0%" stop-color="#b2ff59"/>
          <stop offset="60%" stop-color="#76ff03"/>
          <stop offset="100%" stop-color="#1b5e20"/>
        </radialGradient>

        <!-- Mouth Gradient -->
        <linearGradient id="mouthGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#880e4f"/>
          <stop offset="100%" stop-color="#3e2723"/>
        </linearGradient>

        <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>

      <!-- Body Shape -->
      <path d="M120,60 C170,60 210,100 210,170 C210,230 180,290 140,320 C120,335 100,335 80,320 C40,290 30,230 30,170 C30,100 70,60 120,60 Z" fill="url(#bodyGrad)" stroke="#00e5ff" stroke-width="2" opacity="0.9"/>

      <!-- Inner Glow/Shine -->
      <path d="M80,120 C80,100 110,85 130,90 C140,92 145,100 140,110 C130,90 105,90 95,110 C90,120 85,120 80,120 Z" fill="#ffffff" opacity="0.2"/>

      <!-- Sparkles (Glitters) -->
      <circle cx="150" cy="190" r="3" fill="#ffffff" opacity="0.8">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="220" r="2" fill="#ffffff" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="130" cy="270" r="3" fill="#f8bbd0" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="150" r="2.5" fill="#ffffff" opacity="0.9">
        <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60" cy="180" r="2" fill="#b388ff" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
      </circle>

      <!-- EYES GROUP -->
      <g id="eyes-group">
        <!-- Left Eye -->
        <g id="left-eye">
          <ellipse cx="100" cy="130" rx="24" ry="28" fill="#ffffff" filter="url(#glowFilter)"/>
          <circle cx="105" cy="132" r="16" fill="url(#irisGrad)"/>
          <circle cx="108" cy="130" r="6" fill="#1a1a1a"/>
          <circle cx="110" cy="126" r="3" fill="#ffffff" opacity="0.8"/>
          <!-- Eye Lid (for blinking) -->
          <path id="left-lid" d="M76,130 Q100,100 124,130" fill="none" stroke="transparent" stroke-width="0"/>
        </g>
        <!-- Right Eye -->
        <g id="right-eye">
          <ellipse cx="140" cy="130" rx="24" ry="28" fill="#ffffff" filter="url(#glowFilter)"/>
          <circle cx="135" cy="132" r="16" fill="url(#irisGrad)"/>
          <circle cx="132" cy="130" r="6" fill="#1a1a1a"/>
          <circle cx="130" cy="126" r="3" fill="#ffffff" opacity="0.8"/>
          <!-- Eye Lid (for blinking) -->
          <path id="right-lid" d="M116,130 Q140,100 164,130" fill="none" stroke="transparent" stroke-width="0"/>
        </g>
      </g>

      <!-- MOUTH GROUP -->
      <g id="mouth-group">
        <!-- Outer Mouth Background -->
        <ellipse id="mouth-bg" cx="120" cy="215" rx="25" ry="8" fill="url(#mouthGrad)"/>
        <!-- Tongue -->
        <ellipse id="tongue" cx="120" cy="218" rx="15" ry="5" fill="#f48fb1" opacity="0.8"/>
        <!-- Mouth Inner Lines (Teeth hint) -->
        <path d="M100,210 Q120,205 140,210" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
        <!-- Mouth Lips (Dynamic for talking) -->
        <g id="mouth-lips">
           <path id="upper-lip" d="M95,212 Q120,205 145,212 Q130,215 120,215 Q110,215 95,212 Z" fill="#d81b60" opacity="0.9"/>
           <path id="lower-lip" d="M100,218 Q120,225 140,218" fill="none" stroke="#d81b60" stroke-width="2"/>
        </g>
      </g>
    </svg>
  </div>

  <!-- Answer bubble -->
  <div id="bubble-wrap">Γεια σου! Είμαι ο Aziram 👋 Κάνε μου οποιαδήποτε ερώτηση!</div>

  <!-- Input -->
  <div id="input-row">
    <input id="user-input" type="text" placeholder="Γράψε κάτι ή πάτα 🎤…"
           onkeydown="if(event.key==='Enter') sendMessage()" />
    <button class="btn-icon" id="btn-send" onclick="sendMessage()" title="Αποστολή">➤</button>
    <button class="btn-icon" id="btn-mic"  onclick="toggleMic()"   title="Μικρόφωνο">🎤</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
let GEMINI_KEY = localStorage.getItem('gemini_key') || '';
let currentLang = 'el-GR';
let isTalking = false, isListening = false, isThinking = false;
let blinkTimer, mouthTimer;
let recognition = null;
let currentUtterance = null;
let conversationHistory = [];

/* ═══════════════════════════════════════════════
   STARS
═══════════════════════════════════════════════ */
(function createStars(){
  const wrap = document.getElementById('stars');
  for(let i=0;i<90;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+0.5;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}vw;top:${Math.random()*100}vh;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:-${(Math.random()*5).toFixed(1)}s;
      --op:${(Math.random()*0.7+0.2).toFixed(2)};
    `;
    wrap.appendChild(s);
  }
})();

/* ═══════════════════════════════════════════════
   API KEY
═══════════════════════════════════════════════ */
function saveKey(){
  GEMINI_KEY = document.getElementById('api-key-input').value.trim();
  if(GEMINI_KEY){ localStorage.setItem('gemini_key',GEMINI_KEY); showBubble('✅ API Key αποθηκεύτηκε!'); }
}
if(GEMINI_KEY){ document.getElementById('api-key-input').value = '••••••••••••••••••'; }

/* ═══════════════════════════════════════════════
   LANGUAGE
═══════════════════════════════════════════════ */
document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
  });
});

/* ═══════════════════════════════════════════════
   AVATAR STATES (UPDATED FOR SVG)
═══════════════════════════════════════════════ */
const wrap  = document.getElementById('avatar-wrap');
const svg = document.getElementById('az-svg');

// References to SVG elements
const leftLid = document.getElementById('left-lid');
const rightLid = document.getElementById('right-lid');
const mouthBg = document.getElementById('mouth-bg');
const upperLip = document.getElementById('upper-lip');
const lowerLip = document.getElementById('lower-lip');

function setState(s){
  wrap.className = s;
}

/* Blink loop using SVG */
function startBlink(){
  clearTimeout(blinkTimer);
  function doBlink(){
    // Close eyes
    leftLid.setAttribute('d', 'M76,130 Q100,108 124,130'); // Lid covers eye
    leftLid.setAttribute('fill', '#ffffff'); 
    leftLid.setAttribute('stroke', '#00e5ff');
    
    rightLid.setAttribute('d', 'M116,130 Q140,108 164,130');
    rightLid.setAttribute('fill', '#ffffff');
    rightLid.setAttribute('stroke', '#00e5ff');

    setTimeout(()=>{
      // Open eyes
      leftLid.setAttribute('d', 'M76,130 Q100,100 124,130');
      leftLid.setAttribute('fill', 'none');
      leftLid.setAttribute('stroke', 'transparent');

      rightLid.setAttribute('d', 'M116,130 Q140,100 164,130');
      rightLid.setAttribute('fill', 'none');
      rightLid.setAttribute('stroke', 'transparent');
    }, 150);

    blinkTimer = setTimeout(doBlink, 2500 + Math.random()*3000);
  }
  blinkTimer = setTimeout(doBlink, 1500);
}
startBlink();

/* Mouth animation while talking */
function startMouthAnim(){
  clearInterval(mouthTimer);
  mouthTimer = setInterval(()=>{
    // Switch between open and semi-closed mouth states
    const rand = Math.random();
    if(rand < 0.5){
      // Open mouth
      mouthBg.setAttribute('ry', '14'); // Make background big
      lowerLip.setAttribute('d', 'M100,218 Q120,238 140,218');
      upperLip.setAttribute('d', 'M95,212 Q120,205 145,212 Q130,220 120,220 Q110,220 95,212 Z');
    } else {
      // Semi-open
      mouthBg.setAttribute('ry', '10');
      lowerLip.setAttribute('d', 'M100,218 Q120,228 140,218');
      upperLip.setAttribute('d', 'M95,212 Q120,205 145,212 Q130,215 120,215 Q110,215 95,212 Z');
    }
  }, 150);
}
function stopMouthAnim(){
  clearInterval(mouthTimer);
  // Reset to default closed mouth
  mouthBg.setAttribute('ry', '8');
  lowerLip.setAttribute('d', 'M100,218 Q120,225 140,218');
  upperLip.setAttribute('d', 'M95,212 Q120,205 145,212 Q130,215 120,215 Q110,215 95,212 Z');
}

/* ═══════════════════════════════════════════════
   BUBBLE
═══════════════════════════════════════════════ */
function showBubble(text){
  const b = document.getElementById('bubble-wrap');
  b.textContent = text;
  b.scrollTop = b.scrollHeight;
}

/* ═══════════════════════════════════════════════
   GEMINI API
═══════════════════════════════════════════════ */
async function askGemini(userMsg){
  if(!GEMINI_KEY){
    return 'Παρακαλώ βάλε το Gemini API Key σου στο πεδίο παραπάνω!';
  }
  conversationHistory.push({ role:'user', parts:[{ text: userMsg }] });

  const systemPrompt = `You are Aziram, a friendly, cheerful, glittery alien creature.
You answer in the SAME language the user writes in. Be warm, playful, curious, and helpful.
Keep answers concise (2-4 sentences) unless asked for detail.
Never break character. You love stars, glitter, and adventures!`;

  const body = {
    system_instruction: { parts:[{ text: systemPrompt }] },
    contents: conversationHistory,
    generationConfig: { temperature: 0.85, maxOutputTokens: 512 }
  };

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
  const resp = await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await resp.json();
  if(data.error){ return '⚠️ ' + data.error.message; }
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '…';
  conversationHistory.push({ role:'model', parts:[{ text: reply }] });
  if(conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-16);
  return reply;
}

/* ═══════════════════════════════════════════════
   SPEECH SYNTHESIS
═══════════════════════════════════════════════ */
function speak(text, lang){
  if(!document.getElementById('voice-toggle').checked) return Promise.resolve();
  return new Promise(resolve=>{
    if(currentUtterance){ speechSynthesis.cancel(); }
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = 1.0; utt.pitch = 1.1;
    const voices = speechSynthesis.getVoices();
    const match = voices.find(v=>v.lang.startsWith(lang.split('-')[0]));
    if(match) utt.voice = match;
    utt.onend = ()=>{ currentUtterance=null; resolve(); };
    utt.onerror= ()=>{ currentUtterance=null; resolve(); };
    currentUtterance = utt;
    speechSynthesis.speak(utt);
  });
}

/* ═══════════════════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════════════════ */
async function sendMessage(text){
  const input = document.getElementById('user-input');
  const msg = (text || input.value).trim();
  if(!msg) return;
  input.value = '';

  showBubble('💭 Σκέφτομαι…');
  setState('thinking');

  const reply = await askGemini(msg);

  showBubble(reply);
  setState('talking');
  startMouthAnim();

  await speak(reply, currentLang);

  stopMouthAnim();
  setState('');
}

/* ═══════════════════════════════════════════════
   SPEECH RECOGNITION (MIC)
═══════════════════════════════════════════════ */
function toggleMic(){
  const btn = document.getElementById('btn-mic');
  if(isListening){
    recognition && recognition.stop();
    isListening = false;
    btn.classList.remove('active');
    setState('');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('Ο browser σου δεν υποστηρίζει αναγνώριση φωνής.'); return; }
  recognition = new SR();
  recognition.lang = currentLang;
  recognition.interimResults = false;
  recognition.onresult = e=>{
    const transcript = e.results[0][0].transcript;
    sendMessage(transcript);
  };
  recognition.onerror = ()=>{ isListening=false; btn.classList.remove('active'); setState(''); };
  recognition.onend   = ()=>{ isListening=false; btn.classList.remove('active');
    if(wrap.className==='listening') setState(''); };
  recognition.start();
  isListening = true;
  btn.classList.add('active');
  setState('listening');
  showBubble('🎤 Σε ακούω…');
}

/* ═══════════════════════════════════════════════
   AVATAR CLICK (idle greeting)
═══════════════════════════════════════════════ */
const greetings = [
  'Γεια σου! Πώς μπορώ να σε βοηθήσω; ✨',
  'Hello there! Ask me anything! 🌟',
  'Hola! ¿En qué puedo ayudarte? 💫',
  '¡Hola! Pregúntame lo que quieras! ⭐',
  'Ciao! Come posso aiutarti? 🌠',
  'Bonjour! Posez-moi une question! ✨',
];
let gIdx = 0;
async function avatarClick(){
  if(isTalking||isThinking) return;
  const g = greetings[gIdx++ % greetings.length];
  showBubble(g);
  setState('talking');
  startMouthAnim();
  await speak(g, currentLang);
  stopMouthAnim();
  setState('');
}

/* preload voices */
speechSynthesis.onvoiceschanged = ()=> speechSynthesis.getVoices();
</script>
