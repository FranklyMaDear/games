<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATTI - Pocket Pet Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --tg-theme-bg-color: #eff6ff;
            --screen-bg: #e0f2fe;
            --screen-bg-dark: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--tg-theme-bg-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .tamagotchi-console {
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            width: 90%;
            max-width: 360px;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), inset 0 -8px 0px rgba(0,0,0,0.15);
            border: 4px solid #f0fdf4;
            text-align: center;
            box-sizing: border-box;
        }

        .tamagotchi-screen {
            background: var(--screen-bg);
            border-radius: 20px;
            border: 8px solid #0284c7;
            padding: 20px 10px;
            height: 280px;
            position: relative;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.15);
            transition: background 0.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .avatar-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
        }

        .matti-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Paths προσαρμοσμένα ακριβώς στο GitHub screenshot σου */
        #layer-body { background-image: url('body.png'); z-index: 1; }
        #layer-eyes { background-image: url('assets/eyes_open.png'); z-index: 2; }
        #layer-mouth { background-image: url('mouth.png'); z-index: 3; }
        #layer-hearts { background-image: url('assets/hearts.png'); z-index: 4; }

        /* ====== ANIMATIONS ====== */
        @keyframes mattiIdle { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03) translateY(-2px); } }
        .ani-idle { animation: mattiIdle 3s ease-in-out infinite; }

        @keyframes mattiEat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08) translateY(3px); } }
        .ani-eat { animation: mattiEat 0.2s ease-in-out infinite; }

        @keyframes mattiTalk { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .ani-talk { animation: mattiTalk 0.15s ease-in-out infinite; }

        @keyframes mattiSleep { 0%, 100% { transform: scale(0.97) translateY(2px); } 50% { transform: scale(1) translateY(0); } }
        .ani-sleep { animation: mattiSleep 3.5s ease-in-out infinite; }

        #zzz-fx {
            position: absolute;
            top: 15%;
            right: 15%;
            font-weight: bold;
            color: #6366f1;
            font-size: 1.5rem;
            display: none;
        }

        .hardware-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            gap: 12px;
        }

        .hw-btn {
            background: #f43f5e;
            color: white;
            border: none;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 6px 0px #be123c, 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hw-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #be123c, 0 4px 8px rgba(0,0,0,0.3);
        }

        .hw-btn span {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 2px;
        }

        .btn-blue { background: #3b82f6; box-shadow: 0 6px 0px #1d4ed8, 0 8px 15px rgba(0,0,0,0.3); }
        .btn-blue:active { box-shadow: 0 2px 0px #1d4ed8; }

        .status-banner {
            margin-top: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #0c4a6e;
            background: rgba(255,255,255,0.4);
            padding: 4px 12px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="tamagotchi-console">
    <div class="tamagotchi-screen" id="screen">
        <div id="zzz-fx">zZz</div>
        
        <div class="avatar-wrapper ani-idle" id="mattiCharacter">
            <div class="matti-layer" id="layer-body"></div>
            <div class="matti-layer" id="layer-eyes"></div>
            <div class="matti-layer" id="layer-mouth"></div>
            <div class="matti-layer" id="layer-hearts"></div>
        </div>
        
        <div class="status-banner" id="statusLabel">MATTI IS READY</div>
    </div>

    <div class="hardware-buttons">
        <button class="hw-btn" onclick="petFeed()"><i class="fas fa-utensils"></i><span>Feed</span></button>
        <button class="hw-btn btn-blue" onclick="petTalk()"><i class="fas fa-comment"></i><span>Talk</span></button>
        <button class="hw-btn" style="background:#10b981; box-shadow:0 6px 0px #047857;" onclick="petSleep()"><i class="fas fa-moon"></i><span>Sleep</span></button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    let isSleeping = false;
    const matti = document.getElementById('mattiCharacter');
    const screen = document.getElementById('screen');
    const statusLabel = document.getElementById('statusLabel');
    const zzz = document.getElementById('zzz-fx');
    const layerEyes = document.getElementById('layer-eyes');
    const layerMouth = document.getElementById('layer-mouth');

    const username = tg.initDataUnsafe?.user?.first_name || "PLAYER";

    function petFeed() {
        if (isSleeping) return;
        tg.HapticFeedback.impactOccurred('medium');
        matti.className = "avatar-wrapper ani-eat";
        statusLabel.textContent = "NOM NOM NOM! 🌟";
        layerMouth.style.backgroundImage = "url('mouth.png')"; 
        setTimeout(() => { resetToIdle(); }, 1200);
    }

    function petTalk() {
        if (isSleeping) return;
        tg.HapticFeedback.impactOccurred('light');
        matti.className = "avatar-wrapper ani-talk";
        statusLabel.textContent = "MATTI IS TALKING...";

        const utterance = new SpeechSynthesisUtterance("Hello " + username + "! I love being inside Franklygames!");
        utterance.pitch = 2.2;
        window.speechSynthesis.speak(utterance);
        utterance.onend = () => { resetToIdle(); };
    }

    function petSleep() {
        isSleeping = !isSleeping;
        tg.HapticFeedback.impactOccurred('heavy');

        if (isSleeping) {
            matti.className = "avatar-wrapper ani-sleep";
            screen.style.backgroundColor = "var(--screen-bg-dark)";
            statusLabel.textContent = "ZZZ... SLEEPING";
            zzz.style.display = "block";
            layerEyes.style.backgroundImage = "url('eyes_closed.png')";
            layerMouth.style.display = "none";
        } else {
            screen.style.backgroundColor = "var(--screen-bg)";
            zzz.style.display = "none";
            layerEyes.style.backgroundImage = "url('assets/eyes_open.png')";
            layerMouth.style.display = "block";
            resetToIdle();
        }
    }

    function resetToIdle() {
        if (isSleeping) return;
        matti.className = "avatar-wrapper ani-idle";
        statusLabel.textContent = "MATTI IS HAPPY";
        layerMouth.style.backgroundImage = "url('mouth.png')";
    }
</script>
</body>
</html>
