<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZIRAM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Καθαρό φόντο χωρίς περιττά πλαίσια */
        body { 
            margin: 0; 
            padding: 0;
            background: #eff6ff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: space-between;
            min-height: 100vh; 
            overflow: hidden; 
        }

        /* Μεγάλωμα του Avatar - 50% της οθόνης */
        .avatar-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding-top: 50px;
        }

        .avatar-wrapper { 
            position: relative; 
            width: 300px; 
            height: 300px; 
        }

        .matti-layer { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
        }

        /* Σειρά και θέση */
        #layer-body { z-index: 1; }
        #layer-eyes { z-index: 2; }
        #layer-mouth { z-index: 3; }
        /* Το καπέλο είναι τώρα ρυθμισμένο να κάθεται ακριβώς πάνω */
        #layer-hearts { z-index: 4; transform: translateY(-90px) scale(1.2); }

        /* Κουμπιά στο κάτω μέρος */
        .controls {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding-bottom: 40px;
        }

        .hw-btn { 
            width: 75px; height: 75px; 
            border-radius: 50%; border: none; 
            font-size: 1.6rem; color: white; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="avatar-container">
        <div class="avatar-wrapper">
            <div class="matti-layer" id="layer-body"></div>
            <div class="matti-layer" id="layer-eyes"></div>
            <div class="matti-layer" id="layer-mouth"></div>
            <div class="matti-layer" id="layer-hearts"></div>
        </div>
    </div>

    <div class="controls">
        <button class="hw-btn" style="background:#f43f5e" onclick="petFeed()"><i class="fas fa-utensils"></i></button>
        <button class="hw-btn" style="background:#3b82f6" onclick="petTalk()"><i class="fas fa-comment"></i></button>
        <button class="hw-btn" style="background:#10b981" onclick="petSleep()"><i class="fas fa-moon"></i></button>
    </div>

<script>
    // URL των εικόνων
    document.getElementById('layer-body').style.backgroundImage = "url('https://i.postimg.cc/q63hfMQL/body.png')";
    document.getElementById('layer-eyes').style.backgroundImage = "url('https://i.postimg.cc/CBtB6fC6/eyes-open.png')";
    document.getElementById('layer-mouth').style.backgroundImage = "url('https://i.postimg.cc/N9V9Pr8b/mouth-closed.png')";
    document.getElementById('layer-hearts').style.backgroundImage = "url('https://i.postimg.cc/R686bn1Y/hearts.png')";

    function petTalk() {
        document.getElementById('layer-mouth').style.backgroundImage = "url('https://i.postimg.cc/MfQMkKt5/mouth.png')";
        setTimeout(() => { document.getElementById('layer-mouth').style.backgroundImage = "url('https://i.postimg.cc/N9V9Pr8b/mouth-closed.png')"; }, 1500);
    }
</script>
</body>
</html>
