<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATTI - Pocket Pet Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --tg-theme-bg-color: #eff6ff;
            --tamagotchi-frame: #7dd3fc;
            --screen-bg: #e0f2fe;
            --screen-bg-dark: #0f172a;
        }

        /* Reset για σωστή εμφάνιση σε κινητά Telegram */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--tg-theme-bg-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Το Σώμα της Κονσόλας (Εμπνευσμένο από το Pocket Pet) */
        .tamagotchi-console {
            background: linear-gradient(145deg, #38bdf8, #0284c7);
            width: 90%;
            max-width: 360px;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), inset 0 -8px 0px rgba(0,0,0,0.15);
            border: 4px solid #f0fdf4;
            text-align: center;
            box-sizing: border-box;
        }

        /* Η Ψηφιακή Οθόνη */
        .tamagotchi-screen {
            background: var(--screen-bg);
            border-radius: 20px;
            border: 8px solid #0284c7;
            padding: 20px 10px;
            height: 260px;
            position: relative;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.15);
            transition: background 0.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 💡 LAYERED AVATAR STRUCTURE */
        .avatar-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .matti-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Διαφορετικά Layers Γραφικών */
        #layer-body { background-image: url('https://placehold.co/140x140/7dd3fc/ffffff?text=STAR'); z-index: 1; }
        #layer-eyes { background-image: url('https://placehold.co/140x140/transparent/334155?text=EYES'); z-index: 2; }
        #layer-mouth { background-image: url('https://placehold.co/140x140/transparent/000000?text=MOUTH'); z-index: 3; }
        #layer-hearts { background-image: url('https://placehold.co/140x140/transparent/ef4444?text=HEARTS'); z-index: 4; }

        /* ====== ANIMATIONS ====== */
        @keyframes mattiIdle { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04) translateY(-3px); } }
        .ani-idle { animation: mattiIdle 3s ease-in-out infinite; }

        @keyframes mattiEat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12) translateY(4px); } }
        .ani-eat { animation: mattiEat 0.25s ease-in-out infinite; }

        @keyframes mattiTalk { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .ani-talk { animation: mattiTalk 0.18s ease-in-out infinite; }

        @keyframes mattiSleep { 0%, 100% { transform: scale(0.96) translateY(2px); opacity: 0.8; } 50% { transform: scale(1) translateY(0); opacity: 1; } }
        .ani-sleep { animation: mattiSleep 3.5s ease-in-out infinite; }

        /* Zzz FX */
        #zzz-fx {
            position: absolute;
            top: 15%;
            right: 15%;
            font-weight: bold;
            color: #4338ca;
            font-size: 1.3rem;
            display: none;
        }

        /* Κουμπιά Κονσόλας (Στυλ Φυσικών Κουμπιών) */
        .hardware-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            gap: 12px;
        }

        .hw-btn {
            background: #f43f5e;
            color: white;
            border: none;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 6px 0px #be123c, 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hw-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #be123c, 0 4px 8px rgba(0,0,0,0.3);
        }

        .hw-btn span {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 2px;
        }

        .btn-blue { background: #3b82f6; box-shadow: 0 6px 0px #1d4ed8, 0 8px 15px rgba(0,0,0,0.3); }
        .btn-blue:active { box-shadow: 0 2px 0px #1d4ed8; }

        .status-banner {
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #0c4a6e;
            background: rgba(255,255,255,0.4);
            padding: 4px 12px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="tamagotchi-console">
    <div class="tamagotchi-screen" id="screen">
        <div id="zzz-fx">zZz</div>
        
        <div class="avatar-wrapper ani-idle" id="mattiCharacter">
            <div class="matti-layer" id="layer-body"></div>
            <div class="matti-layer" id="layer-eyes"></div>
            <div class="matti-layer" id="layer-mouth"></div>
            <div class="matti-layer" id="layer-hearts"></div>
        </div>
        
        <div class="status-banner" id="statusLabel">MATTI IS READY</div>
    </div>

    <div class="hardware-buttons">
        <button class="hw-btn" onclick="petFeed()">
            <i class="fas fa-utensils"></i>
            <span>Feed</span>
        </button>
        <button class="hw-btn btn-blue" onclick="petTalk()">
            <i class="fas fa-comment"></i>
            <span>Talk</span>
        </button>
        <button class="hw-btn" style="background:#10b981; box-shadow:0 6px 0px #047857;" onclick="petSleep()">
            <i class="fas fa-moon"></i>
            <span>Sleep</span>
        </button>
    </div>
</div>

<script>
    // Αρχικοποίηση Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); // Άνοιγμα σε πλήρη οθόνη στο Telegram

    let isSleeping = false;
    const matti = document.getElementById('mattiCharacter');
    const screen = document.getElementById('screen');
    const statusLabel = document.getElementById('statusLabel');
    const zzz = document.getElementById('zzz-fx');
    
    const layerEyes = document.getElementById('layer-eyes');
    const layerMouth = document.getElementById('layer-mouth');

    // Λήψη Telegram User Data (Προαιρετικό για το μέλλον)
    const username = tg.initDataUnsafe?.user?.first_name || "Player";

    // 1. FEED ACTION
    function petFeed() {
        if (isSleeping) { tg.HapticFeedback.notificationOccurred('error'); return; }
        
        tg.HapticFeedback.impactOccurred('medium'); // Δόνηση στο κινητό!
        matti.className = "avatar-wrapper ani-eat";
        statusLabel.textContent = "YUM YUM, " + username.toUpperCase() + "!";
        
        layerMouth.style.backgroundImage = "url('https://placehold.co/140x140/transparent/000000?text=NOM')";

        setTimeout(() => { resetToIdle(); }, 1200);
    }

    // 2. TALK ACTION (AI Chat Ready)
    function petTalk() {
        if (isSleeping) { tg.HapticFeedback.notificationOccurred('error'); return; }
        
        tg.HapticFeedback.impactOccurred('light');
        matti.className = "avatar-wrapper ani-talk";
        statusLabel.textContent = "MATTI IS TALKING...";

        // Web Speech API (High pitch Tom voice)
        const utterance = new SpeechSynthesisUtterance("Hi " + username + "! Let's play a game inside Franklygames!");
        utterance.pitch = 2.3;
        utterance.rate = 1.1;
        window.speechSynthesis.speak(utterance);

        utterance.onend = () => { resetToIdle(); };
    }

    // 3. SLEEP ACTION
    function petSleep() {
        isSleeping = !isSleeping;
        tg.HapticFeedback.impactOccurred('heavy');

        if (isSleeping) {
            matti.className = "avatar-wrapper ani-sleep";
            screen.style.backgroundColor = "var(--screen-bg-dark)";
            statusLabel.textContent = "ZZZ... SLEEPING";
            statusLabel.style.color = "#94a3b8";
            zzz.style.display = "block";
            
            layerEyes.style.backgroundImage = "url('https://placehold.co/140x140/transparent/334155?text=CLOSED')";
            layerMouth.style.display = "none";
        } else {
            screen.style.backgroundColor = "var(--screen-bg)";
            statusLabel.style.color = "#0c4a6e";
            zzz.style.display = "none";
            layerEyes.style.backgroundImage = "url('https://placehold.co/140x140/transparent/334155?text=EYES')";
            layerMouth.style.display = "block";
            resetToIdle();
        }
    }

    function resetToIdle() {
        if (isSleeping) return;
        matti.className = "avatar-wrapper ani-idle";
        statusLabel.textContent = "MATTI IS HAPPY";
        layerMouth.style.backgroundImage = "url('https://placehold.co/140x140/transparent/000000?text=MOUTH')";
    }
</script>

</body>
</html>
