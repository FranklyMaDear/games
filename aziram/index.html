<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZIRAM Board</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: white;
            padding: 10px;
        }

        /* Stats */
        .stats-container {
            display: flex; gap: 10px; width: 100%; max-width: 500px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 10px 15px;
            margin-bottom: 10px;
        }
        .stat {
            flex: 1; display: flex; align-items: center; gap: 5px;
            font-size: 0.7rem; font-weight: bold;
        }
        .bar-bg { flex: 1; height: 6px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.5s ease; }
        .hunger-fill { background: #f43f5e; }
        .energy-fill { background: #3b82f6; }
        .mood-fill { background: #fbbf24; }

        /* Board */
        .board-container {
            width: 100%; max-width: 500px;
            position: relative;
            aspect-ratio: 1 / 1;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 10px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            height: 100%;
        }
        .tile {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tile.special {
            background: rgba(251,191,36,0.2);
            border-color: #fbbf24;
        }
        .tile .reward {
            position: absolute; bottom: 2px; right: 2px;
            font-size: 0.6rem; background: #fbbf24; border-radius: 50%;
            padding: 2px 4px; color: #1e293b; font-weight: bold;
        }

        /* Avatar Pawn */
        .avatar-pawn {
            position: absolute;
            width: 60%;
            height: 60%;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .avatar-pawn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(59,130,246,0.5));
        }
        .avatar-pawn.bounce {
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* Roll Button */
        .roll-btn {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white; border: none; border-radius: 50px;
            padding: 18px 40px; font-size: 1.5rem; font-weight: bold;
            box-shadow: 0 8px 30px rgba(228, 45, 74, 0.4);
            cursor: pointer; transition: 0.2s;
            width: 100%; max-width: 300px;
            margin: 15px 0;
        }
        .roll-btn:active { transform: scale(0.95); }

        /* Bottom Buttons */
        .bottom-bar {
            display: flex; gap: 15px; width: 100%; max-width: 500px;
            padding-bottom: 20px;
        }
        .action-btn {
            flex: 1; padding: 12px; border: none; border-radius: 16px;
            font-weight: bold; font-size: 0.9rem; cursor: pointer;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            color: white; transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.95); }

        /* Stars display */
        .stars-display {
            background: rgba(255,215,0,0.2);
            padding: 5px 20px; border-radius: 20px;
            font-weight: bold; color: #fbbf24;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- Stats -->
    <div class="stats-container">
        <div class="stat"><i class="fas fa-utensils"></i><div class="bar-bg"><div class="bar-fill hunger-fill" id="hungerBar"></div></div></div>
        <div class="stat"><i class="fas fa-bolt"></i><div class="bar-bg"><div class="bar-fill energy-fill" id="energyBar"></div></div></div>
        <div class="stat"><i class="fas fa-heart"></i><div class="bar-bg"><div class="bar-fill mood-fill" id="moodBar"></div></div></div>
    </div>

    <!-- Stars -->
    <div class="stars-display">⭐ <span id="starCount">0</span></div>

    <!-- Board -->
    <div class="board-container">
        <div class="board" id="board"></div>
        <!-- Το Avatar θα τοποθετηθεί εδώ από το JS -->
        <div class="avatar-pawn" id="avatarPawn">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/body.png" id="pawnBody">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png" id="pawnEyes" style="position:absolute;width:80%;top:10%;">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png" id="pawnMouth" style="position:absolute;width:80%;top:35%;">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/hearts.png" id="pawnHearts" style="position:absolute;width:80%;top:-20%;">
        </div>
    </div>

    <!-- Roll -->
    <button class="roll-btn" id="rollBtn">🎲 ROLL</button>

    <!-- Bottom Actions -->
    <div class="bottom-bar">
        <button class="action-btn" id="btnFeed"><i class="fas fa-utensils"></i> Feed</button>
        <button class="action-btn" id="btnTalk"><i class="fas fa-comment"></i> Talk</button>
        <button class="action-btn" id="btnSleep"><i class="fas fa-moon"></i> Sleep</button>
    </div>

    <script>
        // ─── STATE ───
        let position = 0; // 0-24
        let stars = 0;
        let hunger = 100, energy = 100, mood = 80;
        let isSleeping = false;
        let isRolling = false;

        // ─── DOM ───
        const board = document.getElementById('board');
        const pawn = document.getElementById('avatarPawn');
        const starDisplay = document.getElementById('starCount');
        const hungerBar = document.getElementById('hungerBar');
        const energyBar = document.getElementById('energyBar');
        const moodBar = document.getElementById('moodBar');
        const eyesLayer = document.getElementById('pawnEyes');
        const mouthLayer = document.getElementById('pawnMouth');

        const TOTAL_TILES = 25;
        const COLS = 5;

        // ─── BUILD BOARD ───
        function buildBoard() {
            board.innerHTML = '';
            for (let i = 0; i < TOTAL_TILES; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (i > 0 && i % 4 === 0) {
                    tile.classList.add('special');
                    const reward = document.createElement('span');
                    reward.className = 'reward';
                    reward.textContent = '⭐';
                    tile.appendChild(reward);
                }
                board.appendChild(tile);
            }
            updatePawnPosition();
        }

        // ─── MOVE PAWN ───
        function updatePawnPosition() {
            const row = Math.floor(position / COLS);
            const col = position % COLS;
            const tileSize = 100 / COLS;
            pawn.style.left = (col * tileSize + tileSize/2 - 30) + '%';
            pawn.style.top = (row * tileSize + tileSize/2 - 30) + '%';
        }

        function movePawn(steps) {
            position = (position + steps) % TOTAL_TILES;
            // Bounce animation
            pawn.classList.remove('bounce');
            void pawn.offsetWidth; // force reflow
            pawn.classList.add('bounce');
            updatePawnPosition();

            // Check rewards
            if (position > 0 && position % 4 === 0) {
                stars += 5;
                showBubble('+5 ⭐!');
            }
            // Bonus for passing start
            if (position < steps) {
                stars += 3;
                showBubble('+3 ⭐ Bonus!');
            }
            updateStars();
            saveData();
        }

        // ─── ROLL ───
        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            const btn = document.getElementById('rollBtn');
            btn.disabled = true;
            btn.textContent = '🎲 ...';

            let count = 0;
            const interval = setInterval(() => {
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    const result = Math.floor(Math.random() * 6) + 1;
                    btn.textContent = `🎲 ${result}`;
                    movePawn(result);
                    isRolling = false;
                    btn.disabled = false;
                }
            }, 100);
        }

        // ─── STATS ───
        function updateBars() {
            hungerBar.style.width = hunger + '%';
            energyBar.style.width = energy + '%';
            moodBar.style.width = mood + '%';
        }

        function updateStars() {
            starDisplay.textContent = stars;
        }

        // ─── BUBBLE ───
        function showBubble(text, duration = 2000) {
            const el = document.createElement('div');
            el.style.cssText = `
                position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
                background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
                border-radius: 20px; font-size: 1.2rem; font-weight: bold;
                z-index: 100; backdrop-filter: blur(10px);
                animation: fadeInOut ${duration}ms ease forwards;
            `;
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), duration);
        }

        // ─── ACTIONS ───
        document.getElementById('btnFeed').addEventListener('click', () => {
            if(isSleeping) return;
            hunger = Math.min(100, hunger + 20);
            mood = Math.min(100, mood + 5);
            updateBars();
            showBubble('Μμμ! Νόστιμο 🍎');
        });

        document.getElementById('btnTalk').addEventListener('click', () => {
            if(isSleeping) return;
            mood = Math.min(100, mood + 10);
            updateBars();
            showBubble('Γεια σου! 💬');
            // Ανοιγοκλείνει το στόμα
            let open = false;
            const interval = setInterval(() => {
                open = !open;
                mouthLayer.src = open ? 
                    "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth.png" : 
                    "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png";
            }, 200);
            setTimeout(() => {
                clearInterval(interval);
                mouthLayer.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png";
            }, 2000);
        });

        document.getElementById('btnSleep').addEventListener('click', () => {
            if (isSleeping) {
                isSleeping = false;
                eyesLayer.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png";
                showBubble('Καλημέρα! ☀️');
            } else {
                isSleeping = true;
                eyesLayer.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_closed.png";
                showBubble('Ζζζζ... Καληνύχτα 🌙');
            }
        });

        document.getElementById('rollBtn').addEventListener('click', rollDice);

        // ─── SAVE / LOAD ───
        function saveData() {
            localStorage.setItem('aziramBoard', JSON.stringify({position, stars, hunger, energy, mood, isSleeping}));
        }

        function loadData() {
            const saved = localStorage.getItem('aziramBoard');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    position = data.position || 0;
                    stars = data.stars || 0;
                    hunger = data.hunger || 100;
                    energy = data.energy || 100;
                    mood = data.mood || 80;
                    isSleeping = data.isSleeping || false;
                    updateBars();
                    updateStars();
                    updatePawnPosition();
                    if (isSleeping) {
                        eyesLayer.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_closed.png";
                    }
                } catch(e) {}
            }
        }

        // ─── ANIMATION STYLE ───
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
                20% { opacity: 1; transform: translateX(-50%) scale(1); }
                80% { opacity: 1; transform: translateX(-50%) scale(1); }
                100% { opacity: 0; transform: translateX(-50%) scale(0.8); }
            }
        `;
        document.head.appendChild(style);

        // ─── INIT ───
        loadData();
        buildBoard();

        // Auto save every 10s
        setInterval(saveData, 10000);
    </script>
</body>
</html>
