<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Franklygames - AZIRAM World</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #070b19 0%, #0f172a 50%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 10px;
            padding-bottom: 90px; /* Χώρος για το Bottom Nav */
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* --- Top Header & Stats --- */
        .top-header {
            width: 100%; max-width: 500px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px; padding: 0 5px;
        }
        .brand-title { font-weight: 900; font-size: 1.3rem; color: #fbbf24; letter-spacing: 0.5px; }
        .currency { background: rgba(251, 191, 36, 0.2); border: 1px solid rgba(251, 191, 36, 0.4); padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        .stats-container {
            display: flex; gap: 12px; width: 100%; max-width: 500px;
            background: rgba(255,255,255,0.06); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 12px 15px; margin-bottom: 15px;
        }
        .stat { flex: 1; display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: bold; }
        .bar-bg { flex: 1; height: 8px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.5s ease; border-radius: 10px; }
        .hunger-fill { background: linear-gradient(90deg, #ef4444, #f43f5e); }
        .energy-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .mood-fill { background: linear-gradient(90deg, #eab308, #fbbf24); }

        /* --- Screens --- */
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ΑΠΟΛΥΤΗ ΔΙΟΡΘΩΣΗ AVATAR (IMAGE.PNG) --- */
        .avatar-container { 
            position: relative; 
            width: 280px; 
            height: 280px; 
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Επειδή είναι διάφανες, γίνονται 100% και κουμπώνουν αυτόματα pixel-perfect */
        .avatar-container img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        .action-panel {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 24px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
        }
        .action-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); padding: 16px;
            border-radius: 18px; color: white; font-weight: bold; cursor: pointer;
            transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .action-btn:active { transform: scale(0.96); }
        .action-btn i { font-size: 1.4rem; }
        .action-btn span.cost { font-size: 0.7rem; color: #fbbf24; background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 10px; }
        .action-btn.feed-btn { background: linear-gradient(135deg, #e11d48, #be123c); border: none; }

        /* --- ΝΕΟ ROLL UP BOARD GAME (IMAGE_2.PNG STYLE) --- */
        .board-viewport { 
            width: 100%; 
            height: 55vh; 
            background: radial-gradient(circle at center, #1e1b4b 0%, #090d16 100%);
            border-radius: 28px; 
            border: 2px solid rgba(255,255,255,0.08);
            position: relative; 
            overflow: hidden; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        /* Το κανάλι που περιέχει τα κουτάκια και κινείται κατακόρυφα */
        .vertical-track { 
            position: absolute; 
            width: 100%; 
            display: flex; 
            flex-direction: column-reverse; /* Το 1 κάτω, το 36 πάνω */
            align-items: center; 
            top: 0;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); /* Εφέ ελατηρίου στην κίνηση */
        }
        /* Σχεδιασμός 3D κουτιών στυλ GAMEE */
        .tile {
            width: 85px; height: 65px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
            border-bottom: 6px solid #1e40af;
            border-radius: 16px; display: flex; justify-content: center;
            align-items: center; position: relative; margin: 14px 0;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4); transition: 0.3s;
            font-size: 1.5rem; color: rgba(255,255,255,0.9);
        }
        .tile.start { background: linear-gradient(135deg, #16a34a, #15803d); border-bottom-color: #166534; }
        .tile.finish { background: linear-gradient(135deg, #dc2626, #b91c1c); border-bottom-color: #991b1b; }
        .tile.reward { background: linear-gradient(135deg, #ca8a04, #a16207); border-bottom-color: #854d0e; color: #fef08a; }
        .tile.bonus { background: linear-gradient(135deg, #2563eb, #1d4ed8); border-bottom-color: #1e40af; color: #60a5fa; }
        .tile.xp { background: linear-gradient(135deg, #7c3aed, #6d28d9); border-bottom-color: #5b21b6; }
        
        .tile-number { position: absolute; bottom: -18px; font-size: 0.65rem; font-weight: bold; color: #64748b; }
        .xp-text { font-size: 0.85rem; font-weight: 900; letter-spacing: -0.5px; }

        /* Πιόνι Avatar πάνω στο ταμπλό */
        .pawn-on-board { 
            position: absolute; width: 55px; height: 55px; 
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 50; pointer-events: none;
        }
        .pawn-on-board img { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .pawn-on-board.bounce { animation: pawnJump 0.5s ease-in-out; }
        @keyframes pawnJump {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.15); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Controls */
        .roll-btn {
            background: linear-gradient(135deg, #ec4899, #d946ef); color: white; border: none; border-radius: 50px;
            padding: 16px; font-size: 1.25rem; font-weight: 900; margin-top: 15px; letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(217,70,239,0.4); cursor: pointer; transition: 0.2s; width: 100%;
        }
        .roll-btn:disabled { background: #334155; box-shadow: none; opacity: 0.6; cursor: not-allowed; }
        .roll-cost { text-align: center; font-size: 0.8rem; margin-top: 6px; color: #94a3b8; font-weight: 500; }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(7, 11, 25, 0.96);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-around; padding: 12px 6px 22px 6px; z-index: 100;
        }
        .nav-item {
            color: #64748b; display: flex; flex-direction: column; align-items: center;
            gap: 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1;
        }
        .nav-item i { font-size: 1.25rem; }
        .nav-item.active { color: #fbbf24; transform: translateY(-2px); }

        /* --- Popups & Placeholders --- */
        .bubble-msg {
            position: fixed; top: 25%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 24px;
            border-radius: 20px; font-size: 1rem; font-weight: bold; z-index: 200;
            backdrop-filter: blur(10px); animation: fadeInOut 2s ease forwards; text-align: center;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
            15% { opacity: 1; transform: translateX(-50%) scale(1); }
            85% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.8); }
        }
        .placeholder-screen { text-align: center; padding: 60px 20px; color: #64748b; }
        .placeholder-screen i { font-size: 3.5rem; margin-bottom: 15px; color: #334155; }
    </style>
</head>
<body>

    <!-- Header & Stars -->
    <div class="top-header">
        <div class="brand-title">Franklygames</div>
        <div class="currency">⭐ <span id="starCount">20</span></div>
    </div>

    <!-- Stats Bars -->
    <div class="stats-container">
        <div class="stat"><i class="fas fa-utensils" style="color:#ef4444;"></i><div class="bar-bg"><div class="bar-fill hunger-fill" id="hungerBar"></div></div></div>
        <div class="stat"><i class="fas fa-bolt" style="color:#3b82f6;"></i><div class="bar-bg"><div class="bar-fill energy-fill" id="energyBar"></div></div></div>
        <div class="stat"><i class="fas fa-heart" style="color:#eab308;"></i><div class="bar-bg"><div class="bar-fill mood-fill" id="moodBar"></div></div></div>
    </div>

    <!-- SCREEN: GAMES (Avatar) -->
    <div id="screen-games" class="screen active">
        <!-- ΕΔΩ ΚΟΥΜΠΩΝΟΥΝ ΟΛΑ ΤΕΛΕΙΑ ΧΩΡΙΣ ΠΟΣΟΣΤΑ ΣΤΑ ΙΝLINE STYLES -->
        <div class="avatar-container" id="avatarDisplay">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/body.png" id="avBody">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png" id="avEyes">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png" id="avMouth">
        </div>
        
        <div class="action-panel">
            <button class="action-btn feed-btn" id="btnFeed">
                <i class="fas fa-pizza-slice"></i>
                Feed AZIRAM
                <span class="cost">Cost: 5 ⭐</span>
            </button>
            <button class="action-btn" id="btnTalk">
                <i class="fas fa-comment-dots"></i>
                Talk
                <span class="cost">Free</span>
            </button>
            <button class="action-btn" id="btnSleep" style="grid-column: span 2; background: rgba(59,130,246,0.15);">
                <i class="fas fa-bed" style="color:#60a5fa;"></i>
                <span id="sleepText" style="font-weight:bold;">Sleep (Regain Energy)</span>
            </button>
        </div>
    </div>

    <!-- SCREEN: BOARD (ROLL UP GAMEE STYLE) -->
    <div id="screen-board" class="screen">
        <div class="board-viewport" id="boardViewport">
            <div class="vertical-track" id="verticalTrack">
                <!-- Το πιόνι βρίσκεται ΜΕΣΑ στο κανάλι για να ρολάρει μαζί του -->
                <div class="pawn-on-board" id="pawnOnBoard">
                    <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/body.png">
                    <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png">
                    <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png">
                </div>
            </div>
        </div>
        <div style="width: 100%;">
            <button class="roll-btn" id="rollBtn">🎲 ROLL THE DICE</button>
            <div class="roll-cost">Κοστίζει 5 ⚡ Ενέργεια</div>
        </div>
    </div>

    <!-- OTHER SCREENS (Placeholders) -->
    <div id="screen-missions" class="screen placeholder-screen">
        <i class="fas fa-tasks"></i>
        <h2>Missions</h2>
        <p>Σύντομα διαθέσιμες καθημερινές αποστολές!</p>
    </div>
    <div id="screen-ads" class="screen placeholder-screen">
        <i class="fas fa-video"></i>
        <h2>Rewarded Ads</h2>
        <p>Δες διαφήμιση για να γεμίσεις την ενέργεια του AZIRAM.</p>
    </div>
    <div id="screen-wheel" class="screen placeholder-screen">
        <i class="fas fa-dharmachakra"></i>
        <h2>Lucky Wheel</h2>
        <p>Ο τροχός της τύχης έρχεται σύντομα!</p>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item" data-target="screen-board" id="navBoard"><i class="fas fa-chess-board"></i>Board</div>
        <div class="nav-item active" data-target="screen-games" id="navGames"><i class="fas fa-gamepad"></i>Games</div>
        <div class="nav-item" data-target="screen-missions"><i class="fas fa-tasks"></i>Missions</div>
        <div class="nav-item" data-target="screen-ads"><i class="fas fa-play-circle"></i>Ads</div>
        <div class="nav-item" data-target="screen-wheel"><i class="fas fa-dharmachakra"></i>Wheel</div>
    </div>

    <script>
        // ─── TELEGRAM API ───
        const tg = window.Telegram.WebApp;
        tg.expand();
        const playerName = tg.initDataUnsafe?.user?.first_name || "Φίλε";

        // ─── STATE ───
        let hunger = 100, energy = 100, mood = 80, isSleeping = false;
        let stars = 20;
        let position = 0;
        let isRolling = false;
        const TOTAL_TILES = 36;

        // ─── DOM ELEMENTS ───
        const avatarEyes = document.getElementById('avEyes');
        const avatarMouth = document.getElementById('avMouth');
        const trackEl = document.getElementById('verticalTrack');
        const pawn = document.getElementById('pawnOnBoard');
        const starDisplay = document.getElementById('starCount');
        const hungerBar = document.getElementById('hungerBar');
        const energyBar = document.getElementById('energyBar');
        const moodBar = document.getElementById('moodBar');
        const viewportEl = document.getElementById('boardViewport');

        // ─── NAVIGATION LOGIC ───
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                const targetId = this.getAttribute('data-target');
                
                if(targetId === 'screen-board' && isSleeping) {
                    showMsg('Ο AZIRAM κοιμάται! 🌙<br>Ξύπνησέ τον στην καρτέλα Games.', 3000);
                    return;
                }

                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
                
                this.classList.add('active');
                document.getElementById(targetId).classList.add('active');

                if(targetId === 'screen-board') {
                    setTimeout(updatePawnPosition, 50); // Επαναϋπολογισμός scroll μόλις ανοίξει το Board
                }
            });
        });

        // ─── ΔΗΜΙΟΥΡΓΙΑ ZIK-ZAK ΜΟΝΟΠΑΤΙΟΥ (IMAGE_2.PNG STYLE) ───
        function buildBoard() {
            // Κύμα μετατόπισης X για το εφέ ζικ-ζακ φιδιού
            const waveOffsets = [0, 40, 80, 40, 0, -40, -80, -40];
            
            for (let i = 0; i < TOTAL_TILES; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                
                // Ανάθεση εικονιδίων βάσει ιδιότητας κουτιού
                if (i === 0) {
                    tile.classList.add('start');
                    tile.innerHTML = '<i class="fas fa-flag-checkered"></i>';
                } else if (i === 35) {
                    tile.classList.add('finish');
                    tile.innerHTML = '<i class="fas fa-trophy"></i>';
                } else if (i % 6 === 0) {
                    tile.classList.add('reward');
                    tile.innerHTML = '<i class="fas fa-gift"></i>';
                } else if (i % 4 === 0) {
                    tile.classList.add('bonus');
                    tile.innerHTML = '<i class="fas fa-bolt"></i>';
                } else if (i % 5 === 0) {
                    tile.classList.add('xp');
                    tile.innerHTML = '<span class="xp-text">XP</span>';
                } else {
                    tile.innerHTML = '<i class="fas fa-star" style="font-size:0.7rem; opacity:0.3;"></i>';
                }
                
                const num = document.createElement('span');
                num.className = 'tile-number';
                num.textContent = i + 1;
                tile.appendChild(num);
                
                // Εφαρμογή μετατόπισης με Margin Left για να ενημερώνεται σωστά το offsetLeft του πιονιού
                tile.style.marginLeft = waveOffsets[i % waveOffsets.length] + 'px';
                
                trackEl.appendChild(tile);
            }
        }

        // ─── ΜΗΧΑΝΙΣΜΟΣ ROLL UP ΚΑΙ ΚΕΝΤΡΑΡΙΣΜΑΤΟΣ ΠΙΟΝΙΟΥ ───
        function updatePawnPosition() {
            const currentTile = document.getElementById(`tile-${position}`);
            if (!currentTile) return;

            // 1. Τοποθέτηση πιονιού ακριβώς πάνω στο τρέχον κουτάκι
            pawn.style.left = (currentTile.offsetLeft + currentTile.clientWidth / 2 - pawn.clientWidth / 2) + 'px';
            pawn.style.top = (currentTile.offsetTop + currentTile.clientHeight / 2 - pawn.clientHeight / 2 - 8) + 'px';

            // 2. Roll Up Σκρολάρισμα: Υπολογισμός μετατόπισης ώστε το κουτάκι να έρθει στο κέντρο του Viewport
            const viewportHeight = viewportEl.clientHeight;
            const tileTopInTrack = currentTile.offsetTop;
            const tileHeight = currentTile.clientHeight;

            const scrollTarget = tileTopInTrack - (viewportHeight / 2) + (tileHeight / 2);
            
            // Μετακινούμε όλο το verticalTrack αντίθετα, στυλ roll-up
            trackEl.style.transform = `translateY(${-scrollTarget}px)`;
        }

        // ─── ROLL DICE ───
        function rollDice() {
            if (isRolling || isSleeping) return;
            if (energy < 5) {
                showMsg('Χρειάζεσαι ενέργεια! ⚡<br>Βάλε τον AZIRAM να κοιμηθεί.');
                return;
            }

            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            energy -= 5;
            updateBars();
            
            isRolling = true;
            const btn = document.getElementById('rollBtn');
            btn.disabled = true;
            btn.textContent = '🎲 ...';

            let count = 0;
            const interval = setInterval(() => {
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    const result = Math.floor(Math.random() * 6) + 1;
                    btn.textContent = `🎲 Έφερες ${result}!`;
                    
                    pawn.classList.add('bounce');
                    movePawn(result);
                    
                    isRolling = false;
                    btn.disabled = false;
                    setTimeout(() => { 
                        if (!isRolling) btn.textContent = '🎲 ROLL THE DICE'; 
                        pawn.classList.remove('bounce');
                    }, 1500);
                }
            }, 80);
        }

        function movePawn(steps) {
            const oldPos = position;
            position = (position + steps) % TOTAL_TILES;
            
            updatePawnPosition();

            // Ανταμοιβές πατήματος κουτιών
            setTimeout(() => {
                if (position > 0 && position % 6 === 0) { stars += 8; showMsg('🎁 Βρήκες Δώρο! +8 ⭐'); }
                else if (position > 0 && position % 4 === 0) { energy = Math.min(100, energy + 15); showMsg('⚡ Μπόνους Ενέργεια! +15 ⚡'); }
                else if (position > 0 && position % 5 === 0) { stars += 4; showMsg('✨ XP Bonus! +4 ⭐'); }
                
                if (position === 35) { stars += 25; showMsg('🏁 Έφτασες στο Τέρμα! +25 ⭐'); }
                if (position < oldPos) { stars += 5; showMsg('🔄 Νέος Γύρος! +5 ⭐'); }
                
                updateBars(); updateStars(); saveData();
            }, 500);
        }

        // ─── UI UPDATES ───
        function updateBars() {
            hungerBar.style.width = hunger + '%';
            energyBar.style.width = energy + '%';
            moodBar.style.width = mood + '%';
        }
        function updateStars() { starDisplay.textContent = stars; }
        
        function showMsg(text, duration = 2200) {
            const el = document.createElement('div');
            el.className = 'bubble-msg';
            el.innerHTML = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), duration);
        }

        // ─── ACTIONS (PET LOGIC) ───
        document.getElementById('btnFeed').addEventListener('click', () => {
            if(isSleeping) { showMsg('Shhh! Κοιμάται.'); return; }
            if(hunger >= 100) { showMsg('Είμαι γεμάτος! 🍕'); return; }
            if(stars < 5) { showMsg('Χρειάζεσαι 5 ⭐ για φαγητό!'); return; }
            
            stars -= 5;
            hunger = Math.min(100, hunger + 25);
            mood = Math.min(100, mood + 5);
            
            updateBars(); updateStars();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            showMsg('Μμμμ! Νόστιμο 🍕');
            saveData();
        });

        document.getElementById('btnTalk').addEventListener('click', () => {
            if(isSleeping) { showMsg('Ζζζζ...'); return; }
            mood = Math.min(100, mood + 12);
            updateBars();
            
            const greetings = [`Γεια σου ${playerName}!`, "Πάμε να παίξουμε;", "Franklygames rulez! 🔥"];
            showMsg(greetings[Math.floor(Math.random() * greetings.length)]);
            
            let open = false;
            const interval = setInterval(() => {
                open = !open;
                avatarMouth.src = open ? 
                    "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth.png" : 
                    "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png";
            }, 180);
            setTimeout(() => {
                clearInterval(interval);
                avatarMouth.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png";
            }, 1400);
            saveData();
        });

        document.getElementById('btnSleep').addEventListener('click', () => {
            const btnText = document.getElementById('sleepText');
            if (isSleeping) {
                isSleeping = false;
                energy = Math.min(100, energy + 35);
                avatarEyes.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png";
                btnText.textContent = "Sleep (Regain Energy)";
                showMsg('Καλημέρα! ☀️');
            } else {
                isSleeping = true;
                avatarEyes.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_closed.png";
                btnText.textContent = "Wake Up";
                showMsg('Ζζζζ... Καληνύχτα 🌙');
            }
            updateBars(); saveData();
        });

        document.getElementById('rollBtn').addEventListener('click', rollDice);

        // ─── SAVE / LOAD ───
        function saveData() {
            localStorage.setItem('franklyAziramV2', JSON.stringify({
                position, stars, hunger, energy, mood, isSleeping
            }));
        }

        function loadData() {
            const saved = localStorage.getItem('franklyAziramV2');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    position = data.position || 0;
                    stars = data.stars !== undefined ? data.stars : 20;
                    hunger = data.hunger !== undefined ? data.hunger : 100;
                    energy = data.energy !== undefined ? data.energy : 100;
                    mood = data.mood !== undefined ? data.mood : 80;
                    isSleeping = data.isSleeping || false;
                    
                    if (isSleeping) {
                        avatarEyes.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_closed.png";
                        document.getElementById('sleepText').textContent = "Wake Up";
                    }
                } catch(e) {}
            }
            updateBars(); updateStars(); 
            setTimeout(updatePawnPosition, 150);
        }

        // ─── BACKGROUND DRAIN ───
        setInterval(() => {
            if (!isSleeping) {
                hunger = Math.max(0, hunger - 2);
                energy = Math.max(0, energy - 2);
                mood = Math.max(0, mood - 1);
            } else {
                energy = Math.min(100, energy + 4);
                mood = Math.min(100, mood + 1);
            }
            updateBars(); saveData();
        }, 30000);

        // ─── INIT ───
        buildBoard();
        loadData();
    </script>
</body>
</html>
