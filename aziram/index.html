<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aziram – AI Avatar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:   #00e5ff;
    --purple: #b388ff;
    --glow:   #7efff5;
    --dark:   #05101a;
    --card:   rgba(0,229,255,0.07);
    --border: rgba(0,229,255,0.18);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(179,136,255,0.10) 0%, transparent 70%);
  }

  /* ── Stars background ── */
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; border-radius: 50%;
    background: #fff; opacity: 0;
    animation: twinkle var(--d) var(--delay) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50%      { opacity: var(--op); transform: scale(1); }
  }

  /* ── Layout ── */
  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    padding: 20px 16px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  h1 {
    font-size: 2rem; font-weight: 900; letter-spacing: .06em;
    background: linear-gradient(135deg, var(--teal) 0%, var(--purple) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(0,229,255,.5));
  }

  /* ── Avatar stage ── */
  #avatar-wrap {
    position: relative; width: 240px; height: 340px;
    filter: drop-shadow(0 0 28px rgba(0,229,255,.35));
    cursor: grab;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    touch-action: none;
    will-change: transform;
  }
  #avatar-wrap:active { cursor: grabbing; }

  #avatar-wrap img { position: absolute; }

  #avatar-img  { width: 240px; height: 340px; left: 0; top: 0; z-index: 1; } /* Ολόκληρο το ανθρωπάκι */
  #eyes-img    { width: 108px; left: 66px; top: 78px; z-index: 2; transition: opacity .1s; } /* Μάτια (10px κάτω) */

  /* Talking glow ring */
  #glow-ring {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 3px solid var(--teal);
    opacity: 0; transition: opacity .3s;
    animation: none;
    pointer-events: none; z-index: 0;
  }
  .talking #glow-ring {
    opacity: 1;
    animation: pulse-ring 0.6s infinite alternate;
  }
  @keyframes pulse-ring {
    from { box-shadow: 0 0 10px var(--teal), 0 0 20px var(--teal); }
    to   { box-shadow: 0 0 25px var(--teal), 0 0 50px var(--purple); }
  }

  /* Status dot */
  #status-dot {
    position: absolute; top: 6px; right: 6px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #444; z-index: 3;
    transition: background .3s;
  }
  .listening #status-dot  { background: #ff4081; animation: blink .7s infinite; }
  .thinking  #status-dot  { background: #ffd740; animation: blink .9s infinite; }
  .talking   #status-dot  { background: #69ff74; animation: blink .5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Chat bubble ── */
  #bubble-wrap {
    width: 100%;
    min-height: 80px; max-height: 220px;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 14px 16px;
    color: #e0f7fa;
    font-size: .95rem; line-height: 1.55;
    white-space: pre-wrap;
  }
  #bubble-wrap::-webkit-scrollbar { width: 4px; }
  #bubble-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Input row ── */
  #input-row {
    width: 100%; display: flex; gap: 8px;
  }
  #user-input {
    flex: 1; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; color: #fff; font-size: .95rem;
    font-family: 'Nunito', sans-serif; outline: none;
    transition: border-color .2s;
  }
  #user-input:focus { border-color: var(--teal); }
  #user-input::placeholder { color: rgba(255,255,255,.3); }

  .btn-icon {
    width: 46px; height: 46px; border-radius: 12px; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.25rem;
    transition: transform .15s, opacity .2s;
    flex-shrink: 0;
  }
  .btn-icon:active { transform: scale(.92); }
  #btn-send  { background: linear-gradient(135deg, var(--teal), var(--purple)); }
  #btn-mic   { background: rgba(255,64,129,.15); border: 1px solid rgba(255,64,129,.4); }
  #btn-mic.active { background: rgba(255,64,129,.5); }

  /* ── Volume / voice toggle ── */
  #voice-row {
    display: flex; gap: 10px; align-items: center;
  }
  .toggle-label { color: rgba(255,255,255,.5); font-size: .8rem; }
  .toggle {
    position: relative; width: 40px; height: 22px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #333; border-radius: 22px;
    cursor: pointer; transition: background .3s;
  }
  .slider::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; left: 3px; top: 3px;
    transition: transform .3s;
  }
  input:checked + .slider { background: var(--teal); }
  input:checked + .slider::before { transform: translateX(18px); }
</style>
</head>
<body>

<div id="stars"></div>

<div class="container">
  <h1>✨ Aziram</h1>

  <!-- Voice toggle -->
  <div id="voice-row">
    <span class="toggle-label">🔇</span>
    <label class="toggle">
      <input type="checkbox" id="voice-toggle" checked>
      <span class="slider"></span>
    </label>
    <span class="toggle-label">🔊 Φωνή</span>
  </div>

  <!-- Avatar -->
  <div id="avatar-wrap">
    <div id="glow-ring"></div>
    <div id="status-dot"></div>
    <img id="avatar-img" src="mouth.png" alt="avatar" /> <!-- Ολόκληρο το ανθρωπάκι (κλειστό στόμα) -->
    <img id="eyes-img"   src="eyes_open.png"  alt="eyes" /> <!-- Μάτια -->
  </div>

  <!-- Answer bubble -->
  <div id="bubble-wrap">Γεια σου! Είμαι ο Aziram 👋 Κάνε μου οποιαδήποτε ερώτηση!</div>

  <!-- Input -->
  <div id="input-row">
    <input id="user-input" type="text" placeholder="Γράψε κάτι ή πάτα 🎤…"
           onkeydown="if(event.key==='Enter') sendMessage()" />
    <button class="btn-icon" id="btn-send" onclick="sendMessage()" title="Αποστολή">➤</button>
    <button class="btn-icon" id="btn-mic"  onclick="toggleMic()"   title="Μικρόφωνο">🎤</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   STARS
═══════════════════════════════════════════════ */
(function createStars(){
  const wrap = document.getElementById('stars');
  for(let i=0;i<90;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+0.5;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}vw;top:${Math.random()*100}vh;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:-${(Math.random()*5).toFixed(1)}s;
      --op:${(Math.random()*0.7+0.2).toFixed(2)};
    `;
    wrap.appendChild(s);
  }
})();

/* ═══════════════════════════════════════════════
   AVATAR HELPERS
═══════════════════════════════════════════════ */
const wrap  = document.getElementById('avatar-wrap');
const avatarEl = document.getElementById('avatar-img');
const eyeEl = document.getElementById('eyes-img');
const bubble = document.getElementById('bubble-wrap');
const input = document.getElementById('user-input');
const statusDot = document.getElementById('status-dot');

let currentUtterance = null;
let conversationHistory = [];
let recognition = null;
let isListening = false;
let mouthTimer = null;
let blinkTimer = null;
let isTalking = false;
let isThinking = false;

/* Blink loop */
function startBlink(){
  clearTimeout(blinkTimer);
  function doBlink(){
    eyeEl.src = 'eyes_closed.png';
    setTimeout(()=>{ eyeEl.src = 'eyes_open.png'; }, 120);
    blinkTimer = setTimeout(doBlink, 2500 + Math.random()*3000);
  }
  blinkTimer = setTimeout(doBlink, 1500);
}
startBlink();

/* Mouth animation (εναλλαγή mouth.png - mouth1.png) */
function startMouthAnim() {
  clearInterval(mouthTimer);
  let state = 0;
  mouthTimer = setInterval(()=>{
    state = (state + 1) % 2;
    avatarEl.src = state === 0 ? 'mouth.png' : 'mouth1.png';
  }, 200);
}
function stopMouthAnim() {
  clearInterval(mouthTimer);
  avatarEl.src = 'mouth.png';
}

/* Play pop sound */
function playPopSound() {
  try {
    const audio = new Audio('pop.mp3');
    audio.volume = 0.4;
    audio.play().catch(() => {});
  } catch(e) {}
}

/* Avatar click */
async function avatarClick() {
  if(isTalking || isThinking) return;
  
  playPopSound();
  
  // Ανοίγει το στόμα
  avatarEl.src = 'mouth1.png';
  
  setTimeout(() => {
    avatarEl.src = 'mouth.png';
  }, 600);

  const greetings = [
    'Γεια σου! Πώς μπορώ να σε βοηθήσω; ✨',
    'Γεια σου! Θέλεις να μιλήσουμε; 🌟',
    'Έλα, ρώτα με ό,τι θες! 💫',
    'Πώς είσαι σήμερα; 😊',
    'Είμαι εδώ για σένα! 🌠'
  ];
  const g = greetings[Math.floor(Math.random() * greetings.length)];
  bubble.textContent = g;
  
  // Μιλάει
  isTalking = true;
  wrap.classList.add('talking');
  startMouthAnim();
  await speak(g);
  stopMouthAnim();
  wrap.classList.remove('talking');
  isTalking = false;
}

/* Speech Synthesis */
function speak(text) {
  if(!document.getElementById('voice-toggle').checked) return Promise.resolve();
  return new Promise(resolve=>{
    if(currentUtterance){ speechSynthesis.cancel(); }
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'el-GR';
    utt.rate = 1.0; utt.pitch = 1.1;
    const voices = speechSynthesis.getVoices();
    const match = voices.find(v=>v.lang.startsWith('el'));
    if(match) utt.voice = match;
    utt.onend = ()=>{ currentUtterance=null; resolve(); };
    utt.onerror= ()=>{ currentUtterance=null; resolve(); };
    currentUtterance = utt;
    speechSynthesis.speak(utt);
  });
}

/* ═══════════════════════════════════════════════
   SEND MESSAGE (Θα το συνδέσεις με Hugging Face)
═══════════════════════════════════════════════ */
async function sendMessage() {
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';

  bubble.textContent = '💭 Σκέφτομαι…';
  wrap.classList.add('thinking');

  // ⚠️ ΠΡΟΣΘΕΣΕ ΤΟ HUGGING FACE API ΕΔΩ
  // Π.χ.:
  // const response = await fetch('https://your-hf-space.hf.space/api/generate', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify({ inputs: msg, history: conversationHistory })
  // });
  // const data = await response.json();
  // const reply = data.generated_text || 'Δεν έλαβα απάντηση.';

  // Προσομοίωση απάντησης
  const reply = `Η απάντησή μου στο "${msg}" είναι: Αυτό είναι πολύ ενδιαφέρον!`;

  // Διάβασε την απάντηση
  conversationHistory.push({ role: 'user', content: msg });
  conversationHistory.push({ role: 'assistant', content: reply });

  bubble.textContent = reply;
  wrap.classList.remove('thinking');
  wrap.classList.add('talking');
  startMouthAnim();
  await speak(reply);
  stopMouthAnim();
  wrap.classList.remove('talking');
}

/* ═══════════════════════════════════════════════
   SPEECH RECOGNITION (MIC)
═══════════════════════════════════════════════ */
function toggleMic() {
  const btn = document.getElementById('btn-mic');
  if(isListening){
    recognition && recognition.stop();
    isListening = false;
    btn.classList.remove('active');
    wrap.classList.remove('listening');
    stopMouthAnim();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('Ο browser σου δεν υποστηρίζει αναγνώριση φωνής.'); return; }
  recognition = new SR();
  recognition.lang = 'el-GR';
  recognition.interimResults = false;
  recognition.onresult = e=>{
    const transcript = e.results[0][0].transcript;
    sendMessage();
  };
  recognition.onerror = ()=>{
    isListening = false;
    btn.classList.remove('active');
    wrap.classList.remove('listening');
    stopMouthAnim();
  };
  recognition.onend   = ()=>{
    isListening = false;
    btn.classList.remove('active');
    wrap.classList.remove('listening');
    stopMouthAnim();
  };
  recognition.start();
  isListening = true;
  btn.classList.add('active');
  wrap.classList.add('listening');
  startMouthAnim(); // Ανοίγει το στόμα όσο ακούει
  bubble.textContent = '🎤 Σε ακούω…';
}

/* ═══════════════════════════════════════════════
   JELLY / ELASTIC DRAG SYSTEM
═══════════════════════════════════════════════ */
let isDragging = false;
let startX, startY;

wrap.addEventListener('mousedown', (e) => {
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
  wrap.style.transition = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const deltaX = e.clientX - startX;
  const deltaY = e.clientY - startY;
  const limit = 30;
  const limitedX = Math.min(limit, Math.max(-limit, deltaX));
  const limitedY = Math.min(limit, Math.max(-limit, deltaY));
  const stretchX = 1 + limitedX / 100;
  const stretchY = 1 + limitedY / 100;
  const rot = limitedX / 8;
  wrap.style.transform = `translate(${limitedX}px, ${limitedY}px) scale(${stretchX}, ${stretchY}) rotate(${rot}deg)`;
});

document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  wrap.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
  wrap.style.transform = '';
});

/* preload voices */
speechSynthesis.onvoiceschanged = ()=> speechSynthesis.getVoices();
</script>
</body>
</html>
