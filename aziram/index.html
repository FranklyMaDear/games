<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZIRAM Game Board</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: white;
            padding: 10px;
        }

        /* Header */
        .header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 15px;
        }
        .header h1 { font-size: 1.3rem; font-weight: bold; }
        .header .stars {
            background: rgba(255,215,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #fbbf24;
        }

        /* Board */
        .board-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .tile {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            position: relative;
            aspect-ratio: 1 / 1;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tile.occupied {
            background: rgba(59,130,246,0.4);
            border: 2px solid #3b82f6;
            box-shadow: 0 0 20px rgba(59,130,246,0.3);
        }
        .tile .pawn {
            position: absolute;
            font-size: 1.8rem;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }
        .tile .reward {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 0.6rem;
            background: rgba(255,215,0,0.8);
            border-radius: 50%;
            padding: 2px 4px;
            color: #1e293b;
            font-weight: bold;
        }
        .tile.special {
            background: rgba(251,191,36,0.2);
            border-color: #fbbf24;
        }

        /* Roll Button */
        .roll-btn {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 18px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 8px 30px rgba(228, 45, 74, 0.4);
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            max-width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .roll-btn:active { transform: scale(0.95); }
        .roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            width: 100%;
            max-width: 500px;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 16px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: white;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn i { margin-right: 8px; }

        /* Dice animation */
        .dice-result {
            font-size: 3rem;
            margin: 10px 0;
            text-align: center;
            min-height: 60px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .board { gap: 5px; padding: 10px; }
            .tile { font-size: 0.6rem; }
            .tile .pawn { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>✨ AZIRAM</h1>
        <div class="stars"><i class="fas fa-star"></i> <span id="starCount">0</span></div>
    </div>

    <!-- Board -->
    <div class="board-container">
        <div class="board" id="board"></div>
    </div>

    <!-- Dice & Roll -->
    <div class="dice-result" id="diceDisplay">🎲</div>
    <button class="roll-btn" id="rollBtn"><i class="fas fa-dice"></i> ROLL</button>

    <!-- Navigation -->
    <div class="action-buttons">
        <button class="action-btn" id="avatarBtn"><i class="fas fa-arrow-left"></i> Avatar</button>
        <button class="action-btn" id="shopBtn"><i class="fas fa-store"></i> Shop</button>
    </div>

    <script>
        // ─── GAME STATE ───
        const TOTAL_TILES = 25;
        let playerPosition = 0; // 0-based
        let stars = 0;
        let isRolling = false;
        let positions = [];

        // ─── DOM ───
        const boardEl = document.getElementById('board');
        const starDisplay = document.getElementById('starCount');
        const diceDisplay = document.getElementById('diceDisplay');
        const rollBtn = document.getElementById('rollBtn');

        // ─── LOAD SAVED DATA ───
        function loadData() {
            const saved = localStorage.getItem('aziramGameData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    stars = data.stars || 0;
                    playerPosition = data.position || 0;
                } catch(e) {}
            }
            updateStars();
        }

        function saveData() {
            const data = { stars, position: playerPosition };
            localStorage.setItem('aziramGameData', JSON.stringify(data));
            // Sync with Telegram Cloud if available
            if (window.Telegram && Telegram.WebApp && Telegram.WebApp.CloudStorage) {
                Telegram.WebApp.CloudStorage.setItem('aziramGameData', JSON.stringify(data));
            }
        }

        function updateStars() {
            starDisplay.textContent = stars;
        }

        // ─── BUILD BOARD ───
        function buildBoard() {
            boardEl.innerHTML = '';
            for (let i = 0; i < TOTAL_TILES; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = i;

                // Random reward (1-5 stars) for some tiles
                if (i > 0 && i < TOTAL_TILES - 1 && Math.random() < 0.3) {
                    const reward = Math.floor(Math.random() * 5) + 1;
                    tile.classList.add('special');
                    const rewardSpan = document.createElement('span');
                    rewardSpan.className = 'reward';
                    rewardSpan.textContent = `⭐${reward}`;
                    tile.appendChild(rewardSpan);
                    tile.dataset.reward = reward;
                }

                // Pawn
                if (i === playerPosition) {
                    tile.classList.add('occupied');
                    const pawn = document.createElement('span');
                    pawn.className = 'pawn';
                    pawn.textContent = '🧸';
                    tile.appendChild(pawn);
                }

                // Tile number
                const num = document.createElement('span');
                num.style.position = 'absolute';
                num.style.top = '4px';
                num.style.left = '4px';
                num.style.fontSize = '0.5rem';
                num.style.opacity = '0.5';
                num.textContent = i + 1;
                tile.appendChild(num);

                boardEl.appendChild(tile);
            }
        }

        // ─── MOVE PAWN ───
        function movePawn(steps) {
            const oldPos = playerPosition;
            playerPosition = (playerPosition + steps) % TOTAL_TILES;
            
            // Update board
            const tiles = boardEl.querySelectorAll('.tile');
            tiles.forEach(t => t.classList.remove('occupied'));
            
            // Remove old pawn
            const oldPawn = boardEl.querySelector('.pawn');
            if (oldPawn) oldPawn.remove();

            // Add new pawn
            const newTile = tiles[playerPosition];
            newTile.classList.add('occupied');
            const pawn = document.createElement('span');
            pawn.className = 'pawn';
            pawn.textContent = '🧸';
            newTile.appendChild(pawn);

            // Check reward
            const reward = parseInt(newTile.dataset.reward);
            if (reward) {
                stars += reward;
                updateStars();
                showBubble(`+${reward} ⭐!`);
                saveData();
            }

            // Check if passed start
            if (playerPosition < oldPos) {
                // Passed start -> bonus
                stars += 5;
                updateStars();
                showBubble('Πέρασες την αφετηρία! +5 ⭐');
                saveData();
            }

            saveData();
        }

        // ─── ROLL ───
        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            rollBtn.disabled = true;
            diceDisplay.textContent = '🎲';

            let count = 0;
            const interval = setInterval(() => {
                const rand = Math.floor(Math.random() * 6) + 1;
                const emojis = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
                diceDisplay.textContent = emojis[rand-1];
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    const result = Math.floor(Math.random() * 6) + 1;
                    diceDisplay.textContent = `🎲 ${result}`;
                    movePawn(result);
                    isRolling = false;
                    rollBtn.disabled = false;
                }
            }, 80);
        }

        // ─── BUBBLE NOTIFICATION ───
        function showBubble(text, duration = 2000) {
            const existing = document.querySelector('.bubble-notification');
            if (existing) existing.remove();
            const bubble = document.createElement('div');
            bubble.className = 'bubble-notification';
            bubble.style.cssText = `
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8); color: white; padding: 20px 30px;
                border-radius: 20px; font-size: 1.5rem; font-weight: bold;
                z-index: 100; backdrop-filter: blur(10px);
                animation: fadeInOut ${duration}ms ease forwards;
            `;
            bubble.textContent = text;
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), duration);
        }

        // ─── ANIMATION ───
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
                20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            }
        `;
        document.head.appendChild(style);

        // ─── EVENTS ───
        rollBtn.addEventListener('click', rollDice);
        document.getElementById('avatarBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        document.getElementById('shopBtn').addEventListener('click', () => {
            window.location.href = 'index.html?shop=1';
        });

        // ─── TELEGRAM CLOUD SYNC ───
        if (window.Telegram && Telegram.WebApp && Telegram.WebApp.CloudStorage) {
            Telegram.WebApp.CloudStorage.getItem('aziramGameData', (err, value) => {
                if (!err && value) {
                    try {
                        const data = JSON.parse(value);
                        stars = data.stars || 0;
                        playerPosition = data.position || 0;
                        updateStars();
                        buildBoard();
                    } catch(e) {}
                } else {
                    loadData();
                    buildBoard();
                }
            });
        } else {
            loadData();
            buildBoard();
        }

        // Auto save every 10 seconds
        setInterval(saveData, 10000);
    </script>
</body>
</html>
