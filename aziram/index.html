<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Franklygames - AZIRAM World</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #070b19 0%, #0f172a 50%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 10px;
            padding-bottom: 90px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* --- Top Header & Stats --- */
        .top-header {
            width: 100%; max-width: 500px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px; padding: 0 5px;
        }
        .brand-title { font-weight: 900; font-size: 1.3rem; color: #fbbf24; letter-spacing: 0.5px; }
        .currency { background: rgba(251, 191, 36, 0.2); border: 1px solid rgba(251, 191, 36, 0.4); padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        .stats-container {
            display: flex; gap: 12px; width: 100%; max-width: 500px;
            background: rgba(255,255,255,0.06); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 12px 15px; margin-bottom: 15px;
        }
        .stat { flex: 1; display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: bold; }
        .bar-bg { flex: 1; height: 8px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.5s ease; border-radius: 10px; }
        .hunger-fill { background: linear-gradient(90deg, #ef4444, #f43f5e); }
        .energy-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .mood-fill { background: linear-gradient(90deg, #eab308, #fbbf24); }

        /* --- Screens --- */
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ΑΠΟΛΥΤΗ ΔΙΟΡΘΩΣΗ AVATAR (IMAGE_3.PNG) --- */
        .avatar-container { 
            position: relative; 
            width: 280px; 
            height: 280px; 
            margin: 20px 0;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Χρήση object-fit: fill με κοινό bounding box για απόλυτη στοίχιση των στρώσεων */
        .avatar-container img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: fill; 
            pointer-events: none;
        }
        
        /* Εφέ Γαργαλητού / Γέλιου */
        .avatar-container.tickling {
            animation: tickleShake 0.15s infinite alternate;
        }
        @keyframes tickleShake {
            0% { transform: rotate(-3deg) scale(1.02); }
            100% { transform: rotate(3deg) scale(1.02); }
        }

        .action-panel {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 24px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
        }
        .action-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); padding: 16px;
            border-radius: 18px; color: white; font-weight: bold; cursor: pointer;
            transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .action-btn:active { transform: scale(0.96); }
        .action-btn i { font-size: 1.4rem; }
        .action-btn span.cost { font-size: 0.7rem; color: #fbbf24; background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 10px; }
        .action-btn.feed-btn { background: linear-gradient(135deg, #e11d48, #be123c); border: none; }

        /* --- ΕΞΕΛΙΓΜΕΝΟ BOARD GAME (IMAGE_4.PNG STYLE - ΦΕΤΕΣ ΑΝΑ 3) --- */
        .board-viewport { 
            width: 100%; 
            height: 52vh; 
            background: radial-gradient(circle at center, #1e1b4b 0%, #090d16 100%);
            border-radius: 28px; 
            border: 2px solid rgba(255,255,255,0.08);
            position: relative; 
            overflow: hidden; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        .vertical-track { 
            position: absolute; 
            width: 100%; 
            height: 3000px; /* Επαρκές ύψος για την τοποθέτηση των σκαλιών */
            top: 0;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        /* 3D Στυλ Πλακιδίων */
        .tile {
            position: absolute;
            width: 75px; height: 55px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
            border-bottom: 6px solid #1e40af;
            border-radius: 14px; display: flex; justify-content: center;
            align-items: center; box-shadow: 0 6px 12px rgba(0,0,0,0.4); 
            transition: 0.3s; font-size: 1.3rem; color: rgba(255,255,255,0.9);
        }
        .tile.start { background: linear-gradient(135deg, #16a34a, #15803d); border-bottom-color: #166534; }
        .tile.finish { background: linear-gradient(135deg, #dc2626, #b91c1c); border-bottom-color: #991b1b; }
        .tile.star-reward { background: linear-gradient(135deg, #ca8a04, #a16207); border-bottom-color: #854d0e; color: #fef08a; }
        .tile.roll-reward { background: linear-gradient(135deg, #7c3aed, #6d28d9); border-bottom-color: #5b21b6; color: #f3e8ff; }
        
        .tile-number { position: absolute; bottom: -16px; font-size: 0.6rem; font-weight: bold; color: #475569; }

        /* Ανθρωπάκι / Πιόνι πάνω στο ταμπλό */
        .pawn-on-board { 
            position: absolute; width: 45px; height: 45px; 
            transition: left 0.4s ease, top 0.4s ease;
            z-index: 50; pointer-events: none;
        }
        .pawn-on-board img { position: absolute; width: 100%; height: 100%; object-fit: fill; }
        .pawn-on-board.bounce { animation: pawnJump 0.4s ease-in-out; }
        @keyframes pawnJump {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-35px) scale(1.2); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Controls */
        .roll-btn {
            background: linear-gradient(135deg, #ec4899, #d946ef); color: white; border: none; border-radius: 50px;
            padding: 16px; font-size: 1.25rem; font-weight: 900; margin-top: 15px; letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(217,70,239,0.4); cursor: pointer; transition: 0.2s; width: 100%;
        }
        .roll-btn:disabled { background: #334155; box-shadow: none; opacity: 0.6; cursor: not-allowed; }
        .roll-cost { text-align: center; font-size: 0.8rem; margin-top: 6px; color: #94a3b8; font-weight: 500; }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(7, 11, 25, 0.96);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-around; padding: 12px 6px 22px 6px; z-index: 100;
        }
        .nav-item {
            color: #64748b; display: flex; flex-direction: column; align-items: center;
            gap: 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; transition: 0.2s; flex: 1;
        }
        .nav-item i { font-size: 1.25rem; }
        .nav-item.active { color: #fbbf24; transform: translateY(-2px); }

        /* --- Popups --- */
        .bubble-msg {
            position: fixed; top: 25%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 14px 28px;
            border-radius: 20px; font-size: 1rem; font-weight: bold; z-index: 200; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); animation: fadeInOut 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; text-align: center;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) scale(0.7); }
            15% { opacity: 1; transform: translateX(-50%) scale(1); }
            85% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.7); }
        }
        .placeholder-screen { text-align: center; padding: 60px 20px; color: #64748b; }
        .placeholder-screen i { font-size: 3.5rem; margin-bottom: 15px; color: #334155; }
    </style>
</head>
<body>

    <!-- Header & Stats -->
    <div class="top-header">
        <div class="brand-title">Franklygames</div>
        <div class="currency">⭐ <span id="starCount">20</span></div>
    </div>

    <!-- Stats Bars -->
    <div class="stats-container">
        <div class="stat"><i class="fas fa-utensils" style="color:#ef4444;"></i><div class="bar-bg"><div class="bar-fill hunger-fill" id="hungerBar"></div></div></div>
        <div class="stat"><i class="fas fa-bolt" style="color:#3b82f6;"></i><div class="bar-bg"><div class="bar-fill energy-fill" id="energyBar"></div></div></div>
        <div class="stat"><i class="fas fa-heart" style="color:#eab308;"></i><div class="bar-bg"><div class="bar-fill mood-fill" id="moodBar"></div></div></div>
    </div>

    <!-- SCREEN: GAMES (Avatar) -->
    <div id="screen-games" class="screen active">
        <!-- Διορθωμένο container για pixel perfect στοίχιση -->
        <div class="avatar-container" id="avatarDisplay" title="Κάνε μου γαργαλητό!">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/body.png" id="avBody">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png" id="avEyes">
            <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png" id="avMouth">
        </div>
        
        <div class="action-panel">
            <button class="action-btn feed-btn" id="btnFeed">
                <i class="fas fa-pizza-slice"></i>
                Feed AZIRAM
                <span class="cost">Cost: 5 ⭐</span>
            </button>
            <button class="action-btn" id="btnTalk">
                <i class="fas fa-comment-dots"></i>
                Talk
                <span class="cost">Free</span>
            </button>
            <button class="action-btn" id="btnSleep" style="grid-column: span 2; background: rgba(59,130,246,0.15);">
                <i class="fas fa-bed" style="color:#60a5fa;"></i>
                <span id="sleepText" style="font-weight:bold;">Sleep (Regain Energy)</span>
            </button>
        </div>
    </div>

    <!-- SCREEN: BOARD (ΦΕΤΕΣ ΑΝΑ 3 STYLE) -->
    <div id="screen-board" class="screen">
        <div class="board-viewport" id="boardViewport">
            <div class="vertical-track" id="verticalTrack">
                <!-- Το Ανθρωπάκι κινείται ελεύθερα μέσα στο Track -->
                <div class="pawn-on-board" id="pawnOnBoard">
                    <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/body.png">
                    <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png">
                    <img src="https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png">
                </div>
            </div>
        </div>
        <div style="width: 100%;">
            <button class="roll-btn" id="rollBtn">🎲 ROLL THE DICE</button>
            <div class="roll-cost">Κοστίζει 5 ⚡ Ενέργεια</div>
        </div>
    </div>

    <!-- OTHER SCREENS -->
    <div id="screen-missions" class="screen placeholder-screen">
        <i class="fas fa-tasks"></i>
        <h2>Missions</h2>
        <p>Σύντομα διαθέσιμες αποστολές!</p>
    </div>
    <div id="screen-ads" class="screen placeholder-screen">
        <i class="fas fa-video"></i>
        <h2>Rewarded Ads</h2>
        <p>Δες διαφημίσεις για δώρα.</p>
    </div>
    <div id="screen-wheel" class="screen placeholder-screen">
        <i class="fas fa-dharmachakra"></i>
        <h2>Lucky Wheel</h2>
        <p>Ο τροχός της τύχης έρχεται σύντομα!</p>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item" data-target="screen-board" id="navBoard"><i class="fas fa-chess-board"></i>Board</div>
        <div class="nav-item active" data-target="screen-games" id="navGames"><i class="fas fa-gamepad"></i>Games</div>
        <div class="nav-item" data-target="screen-missions"><i class="fas fa-tasks"></i>Missions</div>
        <div class="nav-item" data-target="screen-ads"><i class="fas fa-play-circle"></i>Ads</div>
        <div class="nav-item" data-target="screen-wheel"><i class="fas fa-dharmachakra"></i>Wheel</div>
    </div>

    <script>
        // ─── SYNTHESIZED AUDIO ENGINE (WEB AUDIO API) ───
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'tickle') {
                // Ήχος γέλιου (γρήγορα pulses)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'roll') {
                // Ήχος ζαριού που κυλάει
                osc.type = 'square';
                osc.frequency.setValueAtTime(150 + Math.random() * 100, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'jump') {
                // Ήχος άλματος πιονιού
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(500, now + 0.2);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'win') {
                // Πανηγυρικό fanfare κέρδους
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(523.25, now + 0.1); // Νότα C5
                osc.frequency.setValueAtTime(659.25, now + 0.2); // Νότα E5
                osc.frequency.setValueAtTime(783.99, now + 0.3); // Νότα G5
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        // ─── STATE ───
        let hunger = 100, energy = 100, mood = 80, isSleeping = false;
        let stars = 20;
        let position = 0;
        let isRolling = false;
        const TOTAL_TILES = 36;
        const tileCoords = []; // Αποθήκευση XY συντεταγμένων των κουτιών

        // ─── DOM ───
        const avatarDisplay = document.getElementById('avatarDisplay');
        const avatarEyes = document.getElementById('avEyes');
        const avatarMouth = document.getElementById('avMouth');
        const trackEl = document.getElementById('verticalTrack');
        const pawn = document.getElementById('pawnOnBoard');
        const starDisplay = document.getElementById('starCount');
        const hungerBar = document.getElementById('hungerBar');
        const energyBar = document.getElementById('energyBar');
        const moodBar = document.getElementById('moodBar');
        const viewportEl = document.getElementById('boardViewport');

        // ─── NAVIGATION ───
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if(window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                const targetId = this.getAttribute('data-target');
                
                if(targetId === 'screen-board' && isSleeping) {
                    showMsg('Ο AZIRAM κοιμάται! 🌙<br>Ξύπνησέ τον στα Games.', 3000);
                    return;
                }

                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
                
                this.classList.add('active');
                document.getElementById(targetId).classList.add('active');

                if(targetId === 'screen-board') {
                    setTimeout(updatePawnPosition, 50);
                }
            });
        });

        // ─── ΛΕΙΤΟΥΡΓΙΑ ΓΑΡΓΑΛΗΤΟΥ (TICKLE EFFECT) ───
        avatarDisplay.addEventListener('click', () => {
            if (isSleeping) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Ενεργοποίηση animation & ήχων γέλιου
            avatarDisplay.classList.add('tickling');
            avatarEyes.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_closed.png";
            avatarMouth.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth.png"; // Ανοιχτό στόμα (γέλιο)
            
            // Παίξε επαναλαμβανόμενα γέλια
            playSound('tickle');
            setTimeout(() => playSound('tickle'), 120);
            setTimeout(() => playSound('tickle'), 240);

            mood = Math.min(100, mood + 5);
            updateBars();
            saveData();

            setTimeout(() => {
                avatarDisplay.classList.remove('tickling');
                avatarEyes.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png";
                avatarMouth.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png";
            }, 600);
        });

        // ─── ΔΗΜΙΟΥΡΓΙΑ ΠΙΣΤΑΣ: ΦΕΤΕΣ ΑΝΑ 3 (IMAGE_4.PNG STYLE) ───
        function buildBoard() {
            let currentX = 160; // Ξεκινάμε από τη μέση περίπου
            let currentY = 50;  // Ξεκινάμε από χαμηλά στο track
            
            // Κατευθύνσεις: 0 = Οριζόντια Δεξιά, 1 = Κάθετα/Διαγώνια Πάνω, 2 = Οριζόντια Αριστερά, 3 = Κάθετα/Διαγώνια Πάνω
            let currentDir = 0; 
            
            for (let i = 0; i < TOTAL_TILES; i++) {
                // Κάθε 3 πλακίδια (φέτα), αλλάζουμε κατεύθυνση
                if (i > 0 && i % 3 === 0) {
                    currentDir = (currentDir + 1) % 4;
                }

                // Υπολογισμός θέσης επόμενου κουτιού βάσει κατεύθυνσης της φέτας
                if (i > 0) {
                    if (currentDir === 0) { currentX += 65; currentY += 5; }       // Φέτα: Οριζόντια Δεξιά
                    else if (currentDir === 1) { currentX -= 25; currentY += 65; }  // Φέτα: Διαγώνια/Κάθετα Πάνω
                    else if (currentDir === 2) { currentX -= 65; currentY += 5; }   // Φέτα: Οριζόντια Αριστερά
                    else if (currentDir === 3) { currentX += 25; currentY += 65; }  // Φέτα: Διαγώνια/Κάθετα Πάνω
                }

                // Αποθήκευση συντεταγμένων
                tileCoords.push({ x: currentX, y: currentY });

                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                tile.style.left = currentX + 'px';
                tile.style.bottom = currentY + 'px'; // Τοποθέτηση από κάτω προς τα πάνω
                
                // Ανάθεση ιδιοτήτων και σχεδίων στα κουτάκια
                if (i === 0) {
                    tile.classList.add('start');
                    tile.innerHTML = '<i class="fas fa-flag-checkered"></i>';
                } else if (i === TOTAL_TILES - 1) {
                    tile.classList.add('finish');
                    tile.innerHTML = '<i class="fas fa-trophy"></i>';
                } else if (i % 6 === 0) {
                    tile.classList.add('star-reward');
                    tile.innerHTML = '⭐'; // Κουτάκι για 5 Αστέρια
                } else if (i % 5 === 0) {
                    tile.classList.add('roll-reward');
                    tile.innerHTML = '🎲'; // Κουτάκι για 2 Ελεύθερες Ζαριές
                } else {
                    tile.innerHTML = '<i class="fas fa-circle" style="font-size:0.5rem; opacity:0.25;"></i>';
                }
                
                const num = document.createElement('span');
                num.className = 'tile-number';
                num.textContent = i + 1;
                tile.appendChild(num);
                
                trackEl.appendChild(tile);
            }
        }

        // ─── ΜΗΧΑΝΙΣΜΟΣ ROLL UP & ΚΕΝΤΡΑΡΙΣΜΑ ───
        function updatePawnPosition() {
            const coords = tileCoords[position];
            if (!coords) return;

            // Τοποθέτηση πιονιού (ανθρωπάκι) στο κέντρο του τρέχοντος πλακιδίου
            pawn.style.left = (coords.x + 15) + 'px';
            pawn.style.bottom = (coords.y + 12) + 'px';

            // Roll Up Σκρολάρισμα: Φέρνει το τρέχον σκαλί στο κέντρο του viewport κατακόρυφα
            const viewportHeight = viewportEl.clientHeight;
            const scrollTarget = coords.y - (viewportHeight / 2) + 30;
            
            trackEl.style.transform = `translateY(${scrollTarget}px)`; // Μετακίνηση προς τα κάτω στυλ roll up
        }

        // ─── ROLL THE DICE ───
        function rollDice() {
            if (isRolling || isSleeping) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (energy < 5) {
                showMsg('Χρειάζεσαι ενέργεια! ⚡<br>Βάλε τον AZIRAM να κοιμηθεί.');
                return;
            }

            if(window.Telegram?.WebApp?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            energy -= 5;
            updateBars();
            
            isRolling = true;
            const btn = document.getElementById('rollBtn');
            btn.disabled = true;
            btn.textContent = '🎲 ...';

            let count = 0;
            const interval = setInterval(() => {
                count++;
                playSound('roll');
                if (count > 10) {
                    clearInterval(interval);
                    const result = Math.floor(Math.random() * 6) + 1;
                    btn.textContent = `🎲 Έφερες ${result}!`;
                    
                    pawn.classList.add('bounce');
                    playSound('jump');
                    movePawn(result);
                    
                    isRolling = false;
                    btn.disabled = false;
                    setTimeout(() => { 
                        if (!isRolling) btn.textContent = '🎲 ROLL THE DICE'; 
                        pawn.classList.remove('bounce');
                    }, 1400);
                }
            }, 90);
        }

        function movePawn(steps) {
            const oldPos = position;
            position = (position + steps);
            
            // Αν ξεπεράσει το τέρμα, κάνει κύκλο
            if (position >= TOTAL_TILES) {
                position = position % TOTAL_TILES;
                stars += 10;
                playSound('win');
                showMsg('🏁 Ολοκλήρωσες τον γύρο! +10 ⭐');
            }
            
            updatePawnPosition();

            // Έλεγχος ειδικών επάθλων στα κουτάκια
            setTimeout(() => {
                if (position > 0 && position % 6 === 0) { 
                    stars += 5; 
                    playSound('win');
                    showMsg('🎁 Κέρδισες +5 Αστέρια! ⭐'); 
                }
                else if (position > 0 && position % 5 === 0) { 
                    energy = Math.min(100, energy + 10); // 2 δωρεάν ζαριές = 10 ενέργεια πίσω
                    playSound('win');
                    showMsg('🎲 Κέρδισες 2 Ελεύθερες Ζαριές!'); 
                }
                
                updateBars(); updateStars(); saveData();
            }, 450);
        }

        // ─── UI UPDATES ───
        function updateBars() {
            hungerBar.style.width = hunger + '%';
            energyBar.style.width = energy + '%';
            moodBar.style.width = mood + '%';
        }
        function updateStars() { starDisplay.textContent = stars; }
        
        function showMsg(text, duration = 2200) {
            const el = document.createElement('div');
            el.className = 'bubble-msg';
            el.innerHTML = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), duration);
        }

        // ─── PET ACTIONS ───
        document.getElementById('btnFeed').addEventListener('click', () => {
            if(isSleeping) { showMsg('Shhh! Κοιμάται.'); return; }
            if(hunger >= 100) { showMsg('Είμαι γεμάτος! 🍕'); return; }
            if(stars < 5) { showMsg('Χρειάζεσαι 5 ⭐ για φαγητό!'); return; }
            
            if (audioCtx.state === 'suspended') audioCtx.resume();
            stars -= 5;
            hunger = Math.min(100, hunger + 25);
            mood = Math.min(100, mood + 5);
            
            updateBars(); updateStars();
            playSound('win');
            showMsg('Μμμμ! Νόστιμο 🍕');
            saveData();
        });

        document.getElementById('btnTalk').addEventListener('click', () => {
            if(isSleeping) { showMsg('Ζζζζ...'); return; }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            mood = Math.min(100, mood + 10);
            updateBars();
            
            showMsg("Πάμε να παίξουμε στο Board! 🔥");
            playSound('tickle');
            
            let open = false;
            const interval = setInterval(() => {
                open = !open;
                avatarMouth.src = open ? 
                    "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth.png" : 
                    "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png";
            }, 150);
            setTimeout(() => {
                clearInterval(interval);
                avatarMouth.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/mouth_closed.png";
            }, 1200);
            saveData();
        });

        document.getElementById('btnSleep').addEventListener('click', () => {
            const btnText = document.getElementById('sleepText');
            if (isSleeping) {
                isSleeping = false;
                energy = Math.min(100, energy + 30);
                avatarEyes.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_open.png";
                btnText.textContent = "Sleep (Regain Energy)";
                showMsg('Καλημέρα! ☀️');
            } else {
                isSleeping = true;
                avatarEyes.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_closed.png";
                btnText.textContent = "Wake Up";
                showMsg('Ζζζζ... Καληνύχτα 🌙');
            }
            updateBars(); saveData();
        });

        document.getElementById('rollBtn').addEventListener('click', rollDice);

        // ─── SAVE / LOAD ───
        function saveData() {
            localStorage.setItem('franklyAziramV3', JSON.stringify({
                position, stars, hunger, energy, mood, isSleeping
            }));
        }

        function loadData() {
            const saved = localStorage.getItem('franklyAziramV3');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    position = data.position || 0;
                    stars = data.stars !== undefined ? data.stars : 20;
                    hunger = data.hunger !== undefined ? data.hunger : 100;
                    energy = data.energy !== undefined ? data.energy : 100;
                    mood = data.mood !== undefined ? data.mood : 80;
                    isSleeping = data.isSleeping || false;
                    
                    if (isSleeping) {
                        avatarEyes.src = "https://raw.githubusercontent.com/FranklyMaDear/games/main/aziram/eyes_closed.png";
                        document.getElementById('sleepText').textContent = "Wake Up";
                    }
                } catch(e) {}
            }
            updateBars(); updateStars(); 
            setTimeout(updatePawnPosition, 150);
        }

        // ─── AUTO DRAIN ───
        setInterval(() => {
            if (!isSleeping) {
                hunger = Math.max(0, hunger - 1);
                energy = Math.max(0, energy - 1);
            } else {
                energy = Math.min(100, energy + 3);
            }
            updateBars(); saveData();
        }, 20000);

        // ─── INIT ───
        buildBoard();
        loadData();
    </script>
</body>
</html>
