<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZIRAM - Pocket Pet Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --tg-theme-bg-color: #eff6ff; --screen-bg: #e0f2fe; --screen-bg-dark: #0f172a; }

        body { margin: 0; padding: 0; background-color: var(--tg-theme-bg-color); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; user-select: none; }

        .tamagotchi-console { background: linear-gradient(145deg, #38bdf8, #0284c7); width: 90%; max-width: 360px; border-radius: 40px; padding: 25px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 4px solid #f0fdf4; text-align: center; box-sizing: border-box; }

        .tamagotchi-screen { background: var(--screen-bg); border-radius: 20px; border: 8px solid #0284c7; padding: 20px 10px; height: 280px; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* ΔΙΟΡΘΩΣΗ 2 & 3: Αυξημένο μέγεθος και διατήρηση κεντραρίσματος */
        .avatar-wrapper { position: relative; width: 250px; height: 250px; display: flex; justify-content: center; align-items: center; }

        .matti-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }

        /* ΔΙΟΡΘΩΣΗ 4: Σωστή σειρά layering */
        #layer-body { z-index: 1; }
        #layer-eyes { z-index: 2; }
        #layer-mouth { z-index: 3; }
        
        /* ΔΙΟΡΘΩΣΗ 1: Καπέλο ανεβαίνει ψηλότερα και μεγαλώνει λίγο */
        #layer-hearts { z-index: 4; transform: translateY(-70px) scale(1.1); }

        @keyframes mattiIdle { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03) translateY(-2px); } }
        .ani-idle { animation: mattiIdle 3s ease-in-out infinite; }

        .hardware-buttons { display: flex; justify-content: space-around; margin-top: 25px; gap: 12px; }
        .hw-btn { background: #f43f5e; color: white; border: none; width: 65px; height: 65px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-blue { background: #3b82f6; }
        
        .status-banner { margin-top: 15px; font-size: 0.8rem; font-weight: bold; color: #0c4a6e; background: rgba(255,255,255,0.4); padding: 4px 12px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="tamagotchi-console">
    <div class="tamagotchi-screen" id="screen">
        <div class="avatar-wrapper ani-idle" id="mattiCharacter">
            <div class="matti-layer" id="layer-body"></div>
            <div class="matti-layer" id="layer-eyes"></div>
            <div class="matti-layer" id="layer-mouth"></div>
            <div class="matti-layer" id="layer-hearts"></div>
        </div>
        <div class="status-banner" id="statusLabel">AZIRAM IS READY</div>
    </div>

    <div class="hardware-buttons">
        <button class="hw-btn" onclick="petFeed()"><i class="fas fa-utensils"></i></button>
        <button class="hw-btn btn-blue" onclick="petTalk()"><i class="fas fa-comment"></i></button>
        <button class="hw-btn" style="background:#10b981" onclick="petSleep()"><i class="fas fa-moon"></i></button>
    </div>
</div>

<script>
    const BODY_URL = "https://i.postimg.cc/q63hfMQL/body.png";
    const EYES_OPEN_URL = "https://i.postimg.cc/CBtB6fC6/eyes-open.png";
    const EYES_CLOSED_URL = "https://i.postimg.cc/G8N8SsPg/eyes-closed.png";
    const MOUTH_CLOSED_URL = "https://i.postimg.cc/N9V9Pr8b/mouth-closed.png";
    const MOUTH_OPEN_URL = "https://i.postimg.cc/MfQMkKt5/mouth.png";
    const HEARTS_HAT_URL = "https://i.postimg.cc/R686bn1Y/hearts.png";

    document.getElementById('layer-body').style.backgroundImage = `url('${BODY_URL}')`;
    document.getElementById('layer-eyes').style.backgroundImage = `url('${EYES_OPEN_URL}')`;
    document.getElementById('layer-mouth').style.backgroundImage = `url('${MOUTH_CLOSED_URL}')`;
    document.getElementById('layer-hearts').style.backgroundImage = `url('${HEARTS_HAT_URL}')`;

    function petTalk() {
        document.getElementById('layer-mouth').style.backgroundImage = `url('${MOUTH_OPEN_URL}')`;
        setTimeout(() => { document.getElementById('layer-mouth').style.backgroundImage = `url('${MOUTH_CLOSED_URL}')`; }, 2000);
    }
</script>
</body>
</html>
