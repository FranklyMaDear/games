<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Δύο Aziram – AI Avatars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:   #00e5ff;
    --purple: #b388ff;
    --glow:   #7efff5;
    --dark:   #05101a;
    --card:   rgba(0,229,255,0.07);
    --border: rgba(0,229,255,0.18);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(179,136,255,0.10) 0%, transparent 70%);
  }

  /* ── Stars background ── */
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; border-radius: 50%;
    background: #fff; opacity: 0;
    animation: twinkle var(--d) var(--delay) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50%      { opacity: var(--op); transform: scale(1); }
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 900px;
    padding: 20px 16px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  h1 {
    font-size: 2rem; font-weight: 900; letter-spacing: .06em;
    background: linear-gradient(135deg, var(--teal) 0%, var(--purple) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(0,229,255,.5));
  }

  /* ── Δύο Avatars ── */
  .avatars-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    width: 100%;
  }

  .avatar-column {
    flex: 1 1 300px;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 10px;
    background: rgba(0,229,255,0.03);
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ── Avatar stage ── */
  .avatar-wrap {
    position: relative; width: 180px; height: 260px;
    filter: drop-shadow(0 0 28px rgba(0,229,255,.35));
    cursor: grab;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    touch-action: none;
    will-change: transform;
    flex-shrink: 0;
  }
  .avatar-wrap:active { cursor: grabbing; }

  .avatar-wrap img { position: absolute; }
  
  .avatar-body   { width: 180px; height: 260px; left: 0; top: 0; z-index: 1; }
  .avatar-eyes   { width: 80px; left: 50px; top: 58px; z-index: 2; transition: opacity .1s; }
  .avatar-mouth  { width: 72px; left: 54px; top: 142px; z-index: 2; transition: opacity .1s; }

  /* Talking glow ring */
  .glow-ring {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 3px solid var(--teal);
    opacity: 0; transition: opacity .3s;
    animation: none;
    pointer-events: none; z-index: 0;
  }
  .talking .glow-ring {
    opacity: 1;
    animation: pulse-ring 0.6s infinite alternate;
  }
  @keyframes pulse-ring {
    from { box-shadow: 0 0 10px var(--teal), 0 0 20px var(--teal); }
    to   { box-shadow: 0 0 25px var(--teal), 0 0 50px var(--purple); }
  }

  /* Status dot */
  .status-dot {
    position: absolute; top: 6px; right: 6px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #444; z-index: 3;
    transition: background .3s;
  }
  .listening .status-dot  { background: #ff4081; animation: blink .7s infinite; }
  .thinking  .status-dot  { background: #ffd740; animation: blink .9s infinite; }
  .talking   .status-dot  { background: #69ff74; animation: blink .5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Chat bubble ── */
  .bubble-wrap {
    width: 100%;
    min-height: 60px; max-height: 120px;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    color: #e0f7fa;
    font-size: .9rem; line-height: 1.5;
    white-space: pre-wrap;
    flex-shrink: 0;
  }
  .bubble-wrap::-webkit-scrollbar { width: 4px; }
  .bubble-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Input row ── */
  .input-row {
    width: 100%; display: flex; gap: 6px;
    flex-shrink: 0;
  }
  .user-input {
    flex: 1; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; color: #fff; font-size: .9rem;
    font-family: 'Nunito', sans-serif; outline: none;
    transition: border-color .2s;
  }
  .user-input:focus { border-color: var(--teal); }
  .user-input::placeholder { color: rgba(255,255,255,.3); }

  .btn-icon {
    width: 40px; height: 40px; border-radius: 10px; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem;
    transition: transform .15s, opacity .2s;
    flex-shrink: 0;
  }
  .btn-icon:active { transform: scale(.92); }
  .btn-send  { background: linear-gradient(135deg, var(--teal), var(--purple)); }
  .btn-mic   { background: rgba(255,64,129,.15); border: 1px solid rgba(255,64,129,.4); }
  .btn-mic.active { background: rgba(255,64,129,.5); }

  /* ── Volume / voice toggle (κοινό) ── */
  #voice-row {
    display: flex; gap: 10px; align-items: center;
    width: 100%; justify-content: center;
    padding: 6px 0;
  }
  .toggle-label { color: rgba(255,255,255,.5); font-size: .8rem; }
  .toggle {
    position: relative; width: 40px; height: 22px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #333; border-radius: 22px;
    cursor: pointer; transition: background .3s;
  }
  .slider::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; left: 3px; top: 3px;
    transition: transform .3s;
  }
  input:checked + .slider { background: var(--teal); }
  input:checked + .slider::before { transform: translateX(18px); }

  @media (max-width: 700px) {
    .avatar-column { flex: 1 1 100%; max-width: 400px; }
    .avatar-wrap { width: 160px; height: 230px; }
    .avatar-body { width: 160px; height: 230px; }
    .avatar-eyes { width: 70px; left: 45px; top: 52px; }
    .avatar-mouth { width: 64px; left: 48px; top: 126px; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="container">
  <h1>✨ Δύο Aziram</h1>

  <!-- Voice toggle (κοινό) -->
  <div id="voice-row">
    <span class="toggle-label">🔇</span>
    <label class="toggle">
      <input type="checkbox" id="voice-toggle" checked>
      <span class="slider"></span>
    </label>
    <span class="toggle-label">🔊 Φωνή</span>
  </div>

  <div class="avatars-container">
    <!-- AVATAR 1 (Αριστερά) -->
    <div class="avatar-column">
      <div id="avatar1" class="avatar-wrap" onclick="avatarClick('1')">
        <div class="glow-ring"></div>
        <div class="status-dot"></div>
        <img class="avatar-body"  src="body.png"       alt="body" />
        <img class="avatar-eyes"  src="eyes_open.png"  alt="eyes" />
        <img class="avatar-mouth" src="mouth.png"      alt="mouth"/>
      </div>
      <div id="bubble1" class="bubble-wrap">Γεια! Είμαι ο Aziram 1 ✨</div>
      <div class="input-row">
        <input id="input1" class="user-input" type="text" placeholder="Γράψε…" onkeydown="if(event.key==='Enter') sendMessage('1')" />
        <button class="btn-icon btn-send" onclick="sendMessage('1')" title="Αποστολή">➤</button>
        <button class="btn-icon btn-mic" onclick="toggleMic('1')" title="Μικρόφωνο">🎤</button>
      </div>
    </div>

    <!-- AVATAR 2 (Δεξιά) -->
    <div class="avatar-column">
      <div id="avatar2" class="avatar-wrap" onclick="avatarClick('2')">
        <div class="glow-ring"></div>
        <div class="status-dot"></div>
        <img class="avatar-body"  src="body.png"       alt="body" />
        <img class="avatar-eyes"  src="eyes_open.png"  alt="eyes" />
        <img class="avatar-mouth" src="mouth.png"      alt="mouth"/>
      </div>
      <div id="bubble2" class="bubble-wrap">Γεια! Είμαι ο Aziram 2 ✨</div>
      <div class="input-row">
        <input id="input2" class="user-input" type="text" placeholder="Γράψε…" onkeydown="if(event.key==='Enter') sendMessage('2')" />
        <button class="btn-icon btn-send" onclick="sendMessage('2')" title="Αποστολή">➤</button>
        <button class="btn-icon btn-mic" onclick="toggleMic('2')" title="Μικρόφωνο">🎤</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   STARS
═══════════════════════════════════════════════ */
(function createStars(){
  const wrap = document.getElementById('stars');
  for(let i=0;i<90;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+0.5;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}vw;top:${Math.random()*100}vh;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:-${(Math.random()*5).toFixed(1)}s;
      --op:${(Math.random()*0.7+0.2).toFixed(2)};
    `;
    wrap.appendChild(s);
  }
})();

/* ═══════════════════════════════════════════════
   AVATAR HELPERS
═══════════════════════════════════════════════ */
function getElements(id) {
  const wrap = document.getElementById('avatar' + id);
  return {
    wrap,
    body: wrap.querySelector('.avatar-body'),
    eyes: wrap.querySelector('.avatar-eyes'),
    mouth: wrap.querySelector('.avatar-mouth'),
    bubble: document.getElementById('bubble' + id),
    input: document.getElementById('input' + id),
    statusDot: wrap.querySelector('.status-dot')
  };
}

let currentUtterance = null;
const conversationHistory = { '1': [], '2': [] };
let recognition = { '1': null, '2': null };
let isListening = { '1': false, '2': false };
let mouthTimers = { '1': null, '2': null };
let blinkTimers = { '1': null, '2': null };
let isTalking = { '1': false, '2': false };
let isThinking = { '1': false, '2': false };

/* Blink loop */
function startBlink(id) {
  const el = getElements(id);
  clearTimeout(blinkTimers[id]);
  function doBlink(){
    el.eyes.src = 'eyes_closed.png';
    setTimeout(()=>{ el.eyes.src = 'eyes_open.png'; }, 120);
    blinkTimers[id] = setTimeout(doBlink, 2500 + Math.random()*3000);
  }
  blinkTimers[id] = setTimeout(doBlink, 1500);
}
startBlink('1');
startBlink('2');

/* Mouth animation */
function startMouthAnim(id) {
  clearInterval(mouthTimers[id]);
  const el = getElements(id);
  let state = 0;
  mouthTimers[id] = setInterval(()=>{
    state = (state + 1) % 2;
    el.mouth.src = state === 0 ? 'mouth.png' : 'mouth1.png';
  }, 200);
}
function stopMouthAnim(id) {
  clearInterval(mouthTimers[id]);
  const el = getElements(id);
  el.mouth.src = 'mouth.png';
}

/* Play pop sound */
function playPopSound() {
  try {
    const audio = new Audio('pop.mp3');
    audio.volume = 0.4;
    audio.play().catch(() => {});
  } catch(e) {}
}

/* Avatar click */
async function avatarClick(id) {
  if(isTalking[id] || isThinking[id]) return;
  
  const el = getElements(id);
  playPopSound();
  
  // Σηκώνει χέρια (body_hands_up.png)
  const bodySrc = el.body.src;
  el.body.src = 'body_hands_up.png';
  el.mouth.src = 'mouth1.png';
  
  setTimeout(() => {
    el.body.src = 'body.png';
    el.mouth.src = 'mouth.png';
  }, 600);

  const greetings = [
    'Γεια σου! Πώς μπορώ να σε βοηθήσω; ✨',
    'Γεια σου! Θέλεις να μιλήσουμε; 🌟',
    'Έλα, ρώτα με ό,τι θες! 💫',
    'Πώς είσαι σήμερα; 😊',
    'Είμαι εδώ για σένα! 🌠'
  ];
  const g = greetings[Math.floor(Math.random() * greetings.length)];
  el.bubble.textContent = g;
  
  // Μιλάει
  isTalking[id] = true;
  el.wrap.classList.add('talking');
  startMouthAnim(id);
  await speak(g);
  stopMouthAnim(id);
  el.wrap.classList.remove('talking');
  isTalking[id] = false;
}

/* Speech Synthesis */
function speak(text) {
  if(!document.getElementById('voice-toggle').checked) return Promise.resolve();
  return new Promise(resolve=>{
    if(currentUtterance){ speechSynthesis.cancel(); }
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'el-GR';
    utt.rate = 1.0; utt.pitch = 1.1;
    const voices = speechSynthesis.getVoices();
    const match = voices.find(v=>v.lang.startsWith('el'));
    if(match) utt.voice = match;
    utt.onend = ()=>{ currentUtterance=null; resolve(); };
    utt.onerror= ()=>{ currentUtterance=null; resolve(); };
    currentUtterance = utt;
    speechSynthesis.speak(utt);
  });
}

/* ═══════════════════════════════════════════════
   SEND MESSAGE (Θα το συνδέσεις με Hugging Face)
═══════════════════════════════════════════════ */
async function sendMessage(id) {
  const el = getElements(id);
  const msg = el.input.value.trim();
  if(!msg) return;
  el.input.value = '';

  el.bubble.textContent = '💭 Σκέφτομαι…';
  el.wrap.classList.add('thinking');

  // ⚠️ ΠΡΟΣΘΕΣΕ ΤΟ HUGGING FACE API ΕΔΩ
  // Π.χ.:
  // const response = await fetch('https://your-hf-space.hf.space/api/generate', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify({ inputs: msg, history: conversationHistory[id] })
  // });
  // const data = await response.json();
  // const reply = data.generated_text || 'Δεν έλαβα απάντηση.';

  // Προς το παρόν, προσομοίωση απάντησης
  const reply = `Είμαι ο Aziram ${id}. Η απάντησή μου στο "${msg}" είναι: Αυτό είναι ενδιαφέρον!`; 
  // Διάβασε την απάντηση
  conversationHistory[id].push({ role: 'user', content: msg });
  conversationHistory[id].push({ role: 'assistant', content: reply });

  el.bubble.textContent = reply;
  el.wrap.classList.remove('thinking');
  el.wrap.classList.add('talking');
  startMouthAnim(id);
  await speak(reply);
  stopMouthAnim(id);
  el.wrap.classList.remove('talking');
}

/* ═══════════════════════════════════════════════
   SPEECH RECOGNITION (MIC)
═══════════════════════════════════════════════ */
function toggleMic(id) {
  const btn = document.querySelector(`#avatar${id} + .input-row .btn-mic`);
  if(isListening[id]){
    recognition[id] && recognition[id].stop();
    isListening[id] = false;
    btn.classList.remove('active');
    const el = getElements(id);
    el.wrap.classList.remove('listening');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('Ο browser σου δεν υποστηρίζει αναγνώριση φωνής.'); return; }
  recognition[id] = new SR();
  recognition[id].lang = 'el-GR';
  recognition[id].interimResults = false;
  recognition[id].onresult = e=>{
    const transcript = e.results[0][0].transcript;
    sendMessage(id);
  };
  recognition[id].onerror = ()=>{
    isListening[id] = false;
    btn.classList.remove('active');
    const el = getElements(id);
    el.wrap.classList.remove('listening');
  };
  recognition[id].onend   = ()=>{
    isListening[id] = false;
    btn.classList.remove('active');
    const el = getElements(id);
    el.wrap.classList.remove('listening');
  };
  recognition[id].start();
  isListening[id] = true;
  btn.classList.add('active');
  const el = getElements(id);
  el.wrap.classList.add('listening');
  el.bubble.textContent = '🎤 Σε ακούω…';
}

/* ═══════════════════════════════════════════════
   JELLY / ELASTIC DRAG SYSTEM
═══════════════════════════════════════════════ */
document.querySelectorAll('.avatar-wrap').forEach(wrap => {
  let isDragging = false;
  let startX, startY;

  wrap.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    wrap.style.transition = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const deltaX = e.clientX - startX;
    const deltaY = e.clientY - startY;
    const limit = 30;
    const limitedX = Math.min(limit, Math.max(-limit, deltaX));
    const limitedY = Math.min(limit, Math.max(-limit, deltaY));
    const stretchX = 1 + limitedX / 100;
    const stretchY = 1 + limitedY / 100;
    const rot = limitedX / 8;
    wrap.style.transform = `translate(${limitedX}px, ${limitedY}px) scale(${stretchX}, ${stretchY}) rotate(${rot}deg)`;
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    wrap.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
    wrap.style.transform = '';
  });
});

/* preload voices */
speechSynthesis.onvoiceschanged = ()=> speechSynthesis.getVoices();
</script>
</body>
</html>
