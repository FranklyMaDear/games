<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZIRAM - Full Experience</title>
    
    <!-- Σύνδεση με το ξεχωριστό style.css -->
    <link rel="stylesheet" href="style.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="day-mode" id="mainBody">

    <!-- Stats -->
    <div class="stats-container">
        <div class="stat"><i class="fas fa-utensils"></i><div class="bar-bg"><div class="bar-fill hunger-fill" id="hungerBar"></div></div></div>
        <div class="stat"><i class="fas fa-bolt"></i><div class="bar-bg"><div class="bar-fill energy-fill" id="energyBar"></div></div></div>
        <div class="stat"><i class="fas fa-heart"></i><div class="bar-bg"><div class="bar-fill mood-fill" id="moodBar"></div></div></div>
    </div>

    <!-- Avatar Area -->
    <div class="avatar-container" id="avatarContainer">
        <div class="thought-bubble" id="thoughtBubble"></div>
        <div class="avatar-wrapper ani-idle" id="mattiCharacter">
            <!-- ΤΩΡΑ ΧΡΗΣΙΜΟΠΟΙΟΥΜΕ img ΑΝΤΙ ΓΙΑ background-image -->
            <!-- Τα src δείχνουν στο φάκελο assets/ που έχεις ανεβάσει στο GitHub -->
            <img src="assets/body.png" class="matti-layer" id="layer-body" alt="body">
            <img src="assets/eyes_open.png" class="matti-layer" id="layer-eyes" alt="eyes">
            <img src="assets/mouth_closed.png" class="matti-layer" id="layer-mouth" alt="mouth">
            <img src="assets/hearts.png" class="matti-layer" id="layer-hearts" alt="hearts">
        </div>
    </div>

    <!-- Buttons -->
    <div class="buttons-bar" id="buttonsBar">
        <button class="action-btn btn-feed" id="btnFeed"><i class="fas fa-utensils"></i><span>Feed</span></button>
        <button class="action-btn btn-talk" id="btnTalk"><i class="fas fa-comment"></i><span>Talk</span></button>
        <button class="action-btn btn-sleep" id="btnSleep"><i class="fas fa-moon"></i><span>Sleep</span></button>
    </div>

    <button class="share-btn" id="shareBtn"><i class="fas fa-share-alt"></i></button>

    <!-- Μην ξεχάσεις να αντιγράψεις το JavaScript από το προηγούμενο μήνυμα -->
    <script>
        // ... (το script σου εδώ)
    </script>
</body>
</html>
