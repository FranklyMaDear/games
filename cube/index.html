<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Merge Cubes 3D Pro - Top Down Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;}
body{background:#000;font-family:'Inter','Segoe UI',system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;user-select:none;color:#fff;}

#hud{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;background:linear-gradient(180deg,rgba(20,20,40,0.95),rgba(15,15,30,0.85));
  backdrop-filter:blur(10px);border-bottom:1px solid rgba(140,100,255,0.2);
  flex-shrink:0;gap:10px;z-index:10;position:relative;}
#next-area{display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);
  border-radius:14px;padding:6px 12px;}
#next-label{color:#888;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
#next-cnv{display:block;}
#combo-col{display:flex;flex-direction:column;gap:4px;}
#mult-row{display:flex;align-items:center;gap:6px;}
#mult-val{color:#f0a030;font-size:14px;font-weight:800;min-width:30px;
  text-shadow:0 0 8px rgba(240,160,48,0.5);transition:color .2s;}
#mult-track{width:74px;height:6px;background:rgba(255,255,255,0.08);
  border-radius:3px;overflow:hidden;}
#mult-fill{height:100%;background:linear-gradient(90deg,#f0a030,#ff5555);
  width:0%;transition:width 0.3s;border-radius:3px;
  box-shadow:0 0 8px rgba(255,140,80,0.5);}
#score-box{text-align:center;flex:1;}
#score-lbl{color:#666;font-size:9px;font-weight:700;letter-spacing:2px;}
#score-val{color:#fff;font-size:26px;font-weight:900;line-height:1;letter-spacing:-1px;
  text-shadow:0 0 16px rgba(140,100,255,0.5);font-variant-numeric:tabular-nums;}
#hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.hud-btn{width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:#aaa;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s;}
.hud-btn:active{background:rgba(255,255,255,0.12);}

#canvas-wrap{flex:1;width:100%;position:relative;overflow:hidden;}
#three-canvas{display:block;width:100%;height:100%;cursor:crosshair;}

#fx-layer{position:absolute;inset:0;pointer-events:none;z-index:20;overflow:hidden;}
.float-text{position:absolute;font-weight:900;letter-spacing:0.5px;
  text-shadow:0 2px 8px rgba(0,0,0,0.7);pointer-events:none;
  animation:floatUp 1.2s cubic-bezier(.2,.7,.3,1) forwards;}
.float-text.milestone{font-size:34px;color:#FFD700;
  text-shadow:0 0 20px rgba(255,180,0,0.9), 0 0 40px rgba(255,140,0,0.6);
  animation:milestoneFloat 1.8s cubic-bezier(.2,.7,.3,1) forwards;}
.float-text.points{font-size:18px;color:#FFD700;
  text-shadow:0 2px 10px rgba(0,0,0,0.9), 0 0 12px rgba(255,180,0,0.5);}
.float-text.points-big{font-size:24px;}
.float-text.points-mega{font-size:30px;color:#FFA500;}
@keyframes floatUp{0%{transform:translate(-50%,0) scale(0.7);opacity:0;}
  15%{transform:translate(-50%,-8px) scale(1.15);opacity:1;}
  100%{transform:translate(-50%,-60px) scale(1);opacity:0;}}
@keyframes milestoneFloat{0%{transform:translate(-50%,10px) scale(0.5) rotate(-5deg);opacity:0;}
  20%{transform:translate(-50%,-10px) scale(1.3) rotate(2deg);opacity:1;}
  80%{transform:translate(-50%,-30px) scale(1) rotate(0);opacity:1;}
  100%{transform:translate(-50%,-60px) scale(0.9);opacity:0;}}

#boosters{width:100%;display:flex;justify-content:center;gap:16px;
  padding:10px 0 14px;
  background:linear-gradient(0deg,rgba(20,20,40,0.95),rgba(15,15,30,0.85));
  backdrop-filter:blur(10px);border-top:1px solid rgba(140,100,255,0.2);
  flex-shrink:0;z-index:10;position:relative; flex-wrap:wrap;}
.boost-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.boost-circle{width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#4a3a80,#1a1a3a);
  border:2px solid #6655bb;display:flex;align-items:center;justify-content:center;
  font-size:28px;position:relative;
  box-shadow:0 0 16px rgba(100,80,200,0.5),inset 0 2px 0 rgba(255,255,255,0.15),inset 0 -2px 4px rgba(0,0,0,0.3);
  transition:transform 0.12s, box-shadow 0.15s;}
.boost-circle:active{transform:scale(0.85);
  box-shadow:0 0 24px rgba(140,100,255,0.8),inset 0 2px 0 rgba(255,255,255,0.15);}
.ad-badge{position:absolute;top:-4px;right:-4px;background:#dc2626;color:#fff;
  font-size:7px;padding:2px 5px;border-radius:5px;font-weight:800;letter-spacing:0.5px;
  box-shadow:0 2px 6px rgba(220,38,38,0.5);}
.boost-name{color:#888;font-size:9px;font-weight:700;letter-spacing:0.5px;}

/* Hammer inside boosters */
#hammer-btn {display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;}
#hammer-circle {width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#4a3a80,#1a1a3a);
  border:2px solid #ff8800;display:flex;align-items:center;justify-content:center;
  font-size:28px;position:relative;
  box-shadow:0 0 16px rgba(255,140,0,0.5),inset 0 2px 0 rgba(255,255,255,0.15),inset 0 -2px 4px rgba(0,0,0,0.3);}
#hammer-fill-wrap {width:30px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; margin-top:2px; overflow:hidden;}
#hammer-fill {height:100%; width:0%; background:linear-gradient(90deg,#ff9900,#ff3300); border-radius:3px; transition:width 0.3s;}

#overlay{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(40,20,80,0.5),rgba(8,8,20,0.95));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;z-index:200;backdrop-filter:blur(8px);}
#overlay.hidden{display:none;}
#overlay h1{color:#fff;font-size:38px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,#a855f7,#ec4899,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(168,85,247,0.5);}
#overlay p{color:#aaa;font-size:13px;text-align:center;line-height:1.8;max-width:280px;}
.score-big{color:#FFD700;font-size:54px;font-weight:900;
  text-shadow:0 0 30px rgba(255,200,0,0.6);}
.play-btn{background:linear-gradient(135deg,#7b3fcc,#a855f7);color:#fff;border:none;
  border-radius:18px;padding:14px 50px;font-size:18px;font-weight:800;
  cursor:pointer;letter-spacing:1.5px;
  box-shadow:0 6px 24px rgba(168,85,247,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform 0.12s; margin-top:10px;}
.play-btn:active{transform:scale(0.94);}
.hub-btn{background:transparent; color:#00EAFF; border:1px solid #00EAFF;
  border-radius:18px; padding:10px 40px; font-size:14px; font-weight:700;
  cursor:pointer; transition:all 0.15s;}
.hub-btn:active{background:rgba(0,234,255,0.2);}

@media (max-width: 600px) {
  #hud { padding: 8px 10px 6px; }
  #score-val { font-size: 20px; }
  .boost-circle, #hammer-circle { width: 50px; height: 50px; font-size: 24px; }
  #boosters { gap: 12px; padding: 8px 0 10px; }
}
</style>
</head>
<body>

<div id="hud">
  <div id="next-area">
    <div>
      <div id="next-label">Next</div>
      <canvas id="next-cnv" width="44" height="44"></canvas>
    </div>
    <div id="combo-col">
      <div id="mult-row">
        <span id="mult-val">1×</span>
        <div id="mult-track"><div id="mult-fill"></div></div>
      </div>
    </div>
  </div>
  <div id="score-box">
    <div id="score-lbl">SCORE</div>
    <div id="score-val">0</div>
  </div>
  <div id="hud-right">
    <div class="hud-btn" id="btn-sound">🔊</div>
    <div class="hud-btn" id="btn-pause">⏸</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="three-canvas"></canvas>
  <div id="fx-layer"></div>
  <div id="overlay">
    <h1>MERGE CUBES 3D</h1>
    <p>Shoot cubes to merge matching numbers<br>
       Chain merges for big <b style="color:#f0a030">multipliers</b><br>
       Don't let cubes cross the <b style="color:#ff4444">red line</b>!</p>
    <button class="play-btn" id="startBtn">PLAY</button>
  </div>
</div>

<div id="boosters">
  <div class="boost-btn" id="boost-rainbow">
    <div class="boost-circle"><span>🌈</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">Wildcard</div>
  </div>
  <div class="boost-btn" id="boost-swap">
    <div class="boost-circle"><span>🔄</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">Swap</div>
  </div>
  <div class="boost-btn" id="boost-bomb">
    <div class="boost-circle"><span>💣</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">TNT</div>
  </div>
  <!-- Hammer booster -->
  <div id="hammer-btn">
    <div id="hammer-circle">🔨</div>
    <div id="hammer-fill-wrap"><div id="hammer-fill"></div></div>
    <div class="boost-name">SMASH</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// CONFIG
const CUBE_SEQ = [2,4,8,16,32,64,128,256,512,1024,2048];
const PAL = {
  2:    {hex:0x3ecf5a, glow:0x2aff5a},
  4:    {hex:0x8b5cf6, glow:0xa070ff},
  8:    {hex:0xf97316, glow:0xffaa44},
  16:   {hex:0xe11d48, glow:0xff3366},
  32:   {hex:0x0ea5e9, glow:0x44ccff},
  64:   {hex:0xf59e0b, glow:0xffcc44},
  128:  {hex:0xec4899, glow:0xff66bb},
  256:  {hex:0x14b8a6, glow:0x44e0c8},
  512:  {hex:0xa16207, glow:0xddaa44},
  1024: {hex:0x7c3aed, glow:0xaa66ff},
  2048: {hex:0xFFD700, glow:0xffee44},
  wildcard:{hex:0xff44cc, glow:0xff88dd},
  bomb:   {hex:0x333333, glow:0xff5500},
  rainbow:{hex:0xffffff, glow:0xffdd00}
};
function getPal(v){ return PAL[v] || {hex:0xcc44ff, glow:0xff88ff}; }
function nextVal(v){
  const i = CUBE_SEQ.indexOf(v);
  return i>=0 && i+1<CUBE_SEQ.length ? CUBE_SEQ[i+1] : v*2;
}

const TRACK_W = 12;     
const TRACK_L = 16;     
const COLS    = 7;      
const COL_W   = TRACK_W / COLS;
const CUBE_SZ = 1.15;   
const DANGER_Z = 6.5;   

// THREE.JS SETUP
const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0815);
scene.fog = new THREE.Fog(0x0a0815, 12, 35); 
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
camera.position.set(0, 16, 2); 
camera.lookAt(0, 0, 2);
let cameraBaseY = 16;

const ambient = new THREE.AmbientLight(0x4a3aaa, 0.5); scene.add(ambient);
const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(4, 15, 6); keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 1024; keyLight.shadow.mapSize.height = 1024;
keyLight.shadow.camera.left = -12; keyLight.shadow.camera.right = 12;
keyLight.shadow.camera.top = 12; keyLight.shadow.camera.bottom = -12;
keyLight.shadow.camera.near = 0.5; keyLight.shadow.camera.far = 30;
keyLight.shadow.bias = -0.0005; scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x8866ff, 0.4); fillLight.position.set(-4, 10, 3); scene.add(fillLight);
const rimLight = new THREE.PointLight(0x8844cc, 1.5, 25); rimLight.position.set(0, 4, -8); scene.add(rimLight);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.65, 0.7, 0.85);
composer.addPass(bloomPass);

// TRACK
function buildTrack(){
  const group = new THREE.Group();
  const floorGeo = new THREE.PlaneGeometry(TRACK_W, TRACK_L);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a1a55, roughness: 0.4, metalness: 0.3, emissive: 0x1a0a44, emissiveIntensity: 0.3 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2; floor.position.set(0,0,0); floor.receiveShadow = true; group.add(floor);

  const gridMat = new THREE.LineBasicMaterial({ color: 0x6644aa, transparent: true, opacity: 0.3 });
  for (let i = 0; i <= COLS; i++){
    const x = -TRACK_W/2 + i*COL_W;
    const pts = [new THREE.Vector3(x, 0.01, -TRACK_L/2), new THREE.Vector3(x, 0.01, TRACK_L/2)];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
  }
  for (let i = 0; i <= 16; i++){ 
    const z = -TRACK_L/2 + (i/16)*TRACK_L;
    const pts = [new THREE.Vector3(-TRACK_W/2, 0.01, z), new THREE.Vector3(TRACK_W/2, 0.01, z)];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
  }

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x6644aa, roughness: 0.35, metalness: 0.5, emissive: 0x3322aa, emissiveIntensity: 0.4 });
  const wallGeo = new THREE.BoxGeometry(0.3, 1.4, TRACK_L);
  const leftW = new THREE.Mesh(wallGeo, wallMat); leftW.position.set(-TRACK_W/2 - 0.15, 0.7, 0); leftW.castShadow = leftW.receiveShadow = true; group.add(leftW);
  const rightW = new THREE.Mesh(wallGeo, wallMat); rightW.position.set(TRACK_W/2 + 0.15, 0.7, 0); rightW.castShadow = rightW.receiveShadow = true; group.add(rightW);
  const backGeo = new THREE.BoxGeometry(TRACK_W + 0.6, 1.4, 0.3);
  const back = new THREE.Mesh(backGeo, wallMat); back.position.set(0, 0.7, -TRACK_L/2 - 0.15); back.castShadow = back.receiveShadow = true; group.add(back);

  const dangerGeo = new THREE.PlaneGeometry(TRACK_W, 0.15);
  const dangerMat = new THREE.MeshBasicMaterial({ color: 0xff2222, transparent: true, opacity: 0.9 });
  const danger = new THREE.Mesh(dangerGeo, dangerMat); danger.rotation.x = -Math.PI/2; danger.position.set(0, 0.03, DANGER_Z); group.add(danger);
  const dangerGlowGeo = new THREE.PlaneGeometry(TRACK_W, 0.6);
  const dangerGlowMat = new THREE.MeshBasicMaterial({ color: 0xff2222, transparent: true, opacity: 0.25 });
  const dangerGlow = new THREE.Mesh(dangerGlowGeo, dangerGlowMat); dangerGlow.rotation.x = -Math.PI/2; dangerGlow.position.set(0, 0.04, DANGER_Z); group.add(dangerGlow);
  return group;
}
scene.add(buildTrack());

// CANNON PHYSICS
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.8, 0) });
world.broadphase = new CANNON.NaiveBroadphase(); world.solver.iterations = 8; world.allowSleep = false;
const cubeMaterial = new CANNON.Material('cube');
const floorMaterial = new CANNON.Material('floor');
const wallMaterial = new CANNON.Material('wall');
world.addContactMaterial(new CANNON.ContactMaterial(cubeMaterial, floorMaterial, { friction: 0.3, restitution: 0.2 }));
world.addContactMaterial(new CANNON.ContactMaterial(cubeMaterial, cubeMaterial, { friction: 0.2, restitution: 0.35 }));
world.addContactMaterial(new CANNON.ContactMaterial(cubeMaterial, wallMaterial, { friction: 0.3, restitution: 0.4 }));

const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: floorMaterial });
floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2); world.addBody(floorBody);
function addWall(x, y, z, sx, sy, sz){
  const b = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(sx, sy, sz)), material: wallMaterial });
  b.position.set(x, y, z); world.addBody(b);
}
addWall(-TRACK_W/2 - 0.1, 1, 0, 0.1, 2, TRACK_L/2 + 1); 
addWall( TRACK_W/2 + 0.1, 1, 0, 0.1, 2, TRACK_L/2 + 1); 
addWall(0, 1, -TRACK_L/2 - 0.1, TRACK_W/2 + 0.5, 2, 0.1); 

// CUBE TEXTURES & MATERIALS
function makeNumberTexture(value, palette){
  const sz = 256; const cv = document.createElement('canvas'); cv.width = sz; cv.height = sz; const c = cv.getContext('2d');
  c.fillStyle = '#' + palette.hex.toString(16).padStart(6, '0'); c.fillRect(0, 0, sz, sz);
  const grad = c.createRadialGradient(sz/2, sz/2, sz*0.2, sz/2, sz/2, sz*0.7);
  grad.addColorStop(0, 'rgba(255,255,255,0.18)'); grad.addColorStop(1, 'rgba(0,0,0,0.25)');
  c.fillStyle = grad; c.fillRect(0, 0, sz, sz);
  c.strokeStyle = 'rgba(0,0,0,0.3)'; c.lineWidth = 8; c.strokeRect(4, 4, sz-8, sz-8);
  c.fillStyle = '#fff';
  c.font = `900 ${value>=1000?100:value>=100?130:value>=10?160:180}px 'Inter',system-ui`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.shadowColor = 'rgba(0,0,0,0.5)'; c.shadowBlur = 8; c.shadowOffsetY = 4;
  c.fillText(value === 'wildcard' ? '★' : value, sz/2, sz/2 + 6);
  const tex = new THREE.CanvasTexture(cv); tex.colorSpace = THREE.SRGBColorSpace; return tex;
}
const matCache = new Map();
function getCubeMaterials(value){
  if (matCache.has(value)) return matCache.get(value);
  const pal = getPal(value); const tex = makeNumberTexture(value, pal);
  const baseProps = { color: 0xffffff, roughness: 0.35, metalness: 0.15, emissive: pal.glow, emissiveIntensity: 0.15 };
  const mNum = new THREE.MeshStandardMaterial({ ...baseProps, map: tex });
  const mPlain = new THREE.MeshStandardMaterial({ color: pal.hex, roughness: 0.35, metalness: 0.15, emissive: pal.glow, emissiveIntensity: 0.15 });
  const mats = [mNum, mNum, mNum, mPlain, mNum, mNum];
  matCache.set(value, mats); return mats;
}

const cubeGeo = new THREE.BoxGeometry(CUBE_SZ, CUBE_SZ, CUBE_SZ);
let uid = 1; function pid(){ return uid++; }
const cubes = []; 

function spawnCube(x, y, z, value, opts = {}){
  const mats = getCubeMaterials(value);
  const mesh = new THREE.Mesh(cubeGeo, mats); mesh.castShadow = true; mesh.receiveShadow = true;
  mesh.position.set(x, y, z); scene.add(mesh);
  const body = new CANNON.Body({
    mass: opts.fixed ? 0 : 1,
    shape: new CANNON.Box(new CANNON.Vec3(CUBE_SZ/2, CUBE_SZ/2, CUBE_SZ/2)),
    material: cubeMaterial, position: new CANNON.Vec3(x, y, z),
    linearDamping: 0.18, angularDamping: 0.6,
  });
  if (opts.fixed) body.mass = 0;
  body.angularVelocity.set(0,0,0);
  world.addBody(body);
  const cube = {
    id: pid(), mesh, body, value,
    special: opts.special || null,
    isShot: !!opts.isShot,
    flash: 0, born: performance.now(),
  };
  cubes.push(cube); return cube;
}

function removeCube(cube){
  scene.remove(cube.mesh); world.removeBody(cube.body);
  const i = cubes.indexOf(cube); if (i >= 0) cubes.splice(i, 1);
}

// ROWS
function spawnRow(z){
  const vals = [[2,4,2,8,4,2,4],[4,2,8,2,4,2,2],[2,8,4,4,2,4,8],[4,2,4,8,2,4,2],[2,4,8,2,4,2,4]][Math.floor(Math.random()*5)];
  for (let i = 0; i < COLS; i++){
    spawnCube(-TRACK_W/2 + COL_W/2 + i*COL_W, CUBE_SZ/2, z, vals[i]);
  }
}
function spawnInitial(){
  spawnRow(-TRACK_L/2 + 1.2);
}

// AUDIO (Loud shoot sound)
const audio = (() => {
  let ctx = null, muted = false, masterGain = null, musicGain = null, musicNodes = [];
  function ensureCtx(){
    if (ctx) { if (ctx.state === 'suspended') ctx.resume(); return; }
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(ctx.destination);
    musicGain = ctx.createGain(); musicGain.gain.value = 0.12; musicGain.connect(masterGain);
    if (ctx.state === 'suspended') ctx.resume();
  }
  function playTone(freq, type, vol, attack, release, dur, detune=0){
    if (muted) return; ensureCtx();
    const t = ctx.currentTime; const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = type; osc.frequency.value = freq; if (detune) osc.detune.value = detune;
    osc.connect(gain).connect(masterGain);
    gain.gain.setValueAtTime(0.0001, t); gain.gain.exponentialRampToValueAtTime(vol, t + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + release); osc.start(t); osc.stop(t + dur);
  }
  function playChord(freqs, type, vol, attack, release, dur){
    freqs.forEach(f => playTone(f, type, vol, attack, release, dur));
  }
  function shoot(){
    playTone(80, 'triangle', 0.9, 0.01, 0.5, 0.6); // loud deep boom
    playTone(150, 'sine', 0.7, 0.01, 0.4, 0.5, 10);
  }
  function merge(value){
    const base = 220 * Math.pow(1.06, Math.log2(value));
    playChord([base, base*1.25, base*1.5], 'sine', 0.16, 0.02, 0.3, 0.4);
    if (value >= 64) playChord([base*2, base*2.5], 'triangle', 0.1, 0.01, 0.25, 0.35);
  }
  function bigMerge(value){ merge(value); setTimeout(() => merge(value*1.3), 60); }
  function bounce(){ playTone(150, 'triangle', 0.18, 0.01, 0.08, 0.1); }
  function milestone(){ [523, 659, 784, 1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.25,0.03,0.25,0.4),i*80)); }
  function boom(){ playTone(60, 'sine', 0.5, 0.02, 0.5, 0.8); playTone(55, 'triangle', 0.4, 0.01, 0.4, 0.7, -10); }
  function gameOver(){ [330,277,220,175].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.3,0.03,0.3,0.5),i*120)); }
  function startMusic(){
    if (muted) return; ensureCtx(); stopMusic();
    [220,261,329,392].forEach((freq,i)=>{
      const osc = ctx.createOscillator(); const g = ctx.createGain(); osc.type = 'sine'; osc.frequency.value = freq*0.5;
      const lfo = ctx.createOscillator(); const lfoGain = ctx.createGain(); lfo.frequency.value = 0.15+i*0.07; lfoGain.gain.value = 4;
      lfo.connect(lfoGain).connect(osc.frequency); osc.connect(g).connect(musicGain); g.gain.value = 0.06;
      osc.start(); lfo.start(); musicNodes.push(osc, lfo);
    });
  }
  function stopMusic(){ musicNodes.forEach(n=>{try{n.stop()}catch(e){}}); musicNodes = []; }
  function toggleMute(){ muted = !muted; if(masterGain) masterGain.gain.value = muted ? 0 : 0.5; return muted; }
  return { shoot, merge, bigMerge, bounce, milestone, boom, gameOver, startMusic, stopMusic, toggleMute, ensureCtx };
})();

// PARTICLES
const particles = [];
const particleGeo = new THREE.SphereGeometry(0.08, 6, 6);
function spawnParticles(x, y, z, color, count=14, speed=3.5){
  for (let i=0;i<count;i++){
    const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:1 });
    const mesh = new THREE.Mesh(particleGeo, mat); mesh.position.set(x,y,z); scene.add(mesh);
    const ang = Math.random()*Math.PI*2, alt = (Math.random()-0.3)*Math.PI, sp = speed*(0.5+Math.random());
    particles.push({mesh,mat, vx:Math.cos(ang)*Math.cos(alt)*sp, vy:Math.abs(Math.sin(alt))*sp+1, vz:Math.sin(ang)*Math.cos(alt)*sp, life:1, decay:0.018+Math.random()*0.01});
  }
}
function updateParticles(dt){
  for (let i=particles.length-1;i>=0;i--){
    const p = particles[i]; p.mesh.position.x += p.vx*dt; p.mesh.position.y += p.vy*dt; p.mesh.position.z += p.vz*dt; p.vy -= 9*dt; p.life -= p.decay;
    if (p.life <= 0){ scene.remove(p.mesh); p.mat.dispose(); particles.splice(i,1); }
    else { p.mat.opacity = p.life; p.mesh.scale.setScalar(0.5 + p.life*0.5); }
  }
}

// MERGE LOGIC
const mergeQueue = [];
function tryMerge(a, b){
  if (a.special || b.special) return false; // special cubes don't merge
  const sameVal = a.value === b.value;
  const hasWild = a.value === 'wildcard' || b.value === 'wildcard';
  if (!sameVal && !hasWild) return false;

  const baseV = a.value === 'wildcard' ? b.value : (b.value === 'wildcard' ? a.value : a.value);
  const nv = nextVal(baseV);
  const px = (a.body.position.x + b.body.position.x)/2;
  const py = Math.max(CUBE_SZ/2+0.1, (a.body.position.y + b.body.position.y)/2);
  const pz = (a.body.position.z + b.body.position.z)/2;

  removeCube(a); removeCube(b);
  const nc = spawnCube(px, py, pz, nv);
  nc.flash = 12; nc.body.velocity.set(0,4,0);
  nc.body.angularVelocity.set((Math.random()-0.5)*5,(Math.random()-0.5)*5,(Math.random()-0.5)*5);

  for (const c of cubes){
    if (c.id === nc.id) continue;
    const dx = c.body.position.x - px, dy = c.body.position.y - py, dz = c.body.position.z - pz;
    const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if (dist < 3 && dist > 0){
      const f = 6/(dist+0.5);
      c.body.applyImpulse(new CANNON.Vec3((dx/dist)*f, 1.5, (dz/dist)*f), new CANNON.Vec3(0,0,0));
    }
  }

  const pal = getPal(nv);
  spawnParticles(px, py, pz, pal.hex, 18, 4);
  if (nv >= 16) spawnParticles(px, py, pz, 0xFFD700, 10, 5);

  const pts = nv * mult;
  score += pts;
  comboBar = Math.min(100, comboBar + 40);
  comboTimer = 2.5;
  mult = comboBar >= 90 ? 4 : comboBar >= 60 ? 3 : comboBar >= 30 ? 2 : 1;
  hammerChg = Math.min(100, hammerChg + 18);

  const labelType = nv >= 64 ? 'points-mega' : nv >= 16 ? 'points-big' : 'points';
  floatText(px, py + 0.5, pz, `+${mult>1?mult+'×':''}${pts}`, labelType);
  shakeAmt = Math.min(0.4, 0.08 + Math.log2(nv) * 0.025);

  if (CUBE_SEQ.includes(nv) && !seenMS.has(nv)){
    seenMS.add(nv); floatText(0, 3, 0, `✦ ${nv} REACHED! ✦`, 'milestone'); audio.milestone();
  }

  // Special cube spawn every 500 points
  if (score >= specialSpawnScore) {
    spawnSpecialCube();
    specialSpawnScore += 500;
  }

  if (nv >= 64) audio.bigMerge(nv); else audio.merge(nv);
  return nc;
}

function sweepChainMerges(){
  let iter = 0;
  while (iter < 6){
    iter++; let merged = false;
    outer: for (let i=0;i<cubes.length;i++){
      for (let j=i+1;j<cubes.length;j++){
        const a = cubes[i], b = cubes[j];
        if (a.special || b.special) continue;
        const dx = a.body.position.x - b.body.position.x, dy = a.body.position.y - b.body.position.y, dz = a.body.position.z - b.body.position.z;
        if (dx*dx+dy*dy+dz*dz < (CUBE_SZ*1.3)*(CUBE_SZ*1.3)){
          if (tryMerge(a, b)){ merged = true; break outer; }
        }
      }
    }
    if (!merged) break;
  }
}

world.addEventListener('beginContact', e => {
  const ca = cubes.find(c => c.body === e.bodyA);
  const cb = cubes.find(c => c.body === e.bodyB);
  if (!ca || !cb) return;
  if (ca.special && cb.isShot) { triggerSpecial(ca, cb); return; }
  if (cb.special && ca.isShot) { triggerSpecial(cb, ca); return; }
  if (!ca.isShot && !cb.isShot && !ca.special && !cb.special && (ca.value === cb.value || ca.value==='wildcard' || cb.value==='wildcard')){
    const pairId = ca.id < cb.id ? `${ca.id}-${cb.id}` : `${cb.id}-${ca.id}`;
    if (!mergeQueue.some(p => p.id === pairId)) mergeQueue.push({ a: ca, b: cb, id: pairId });
  }
});

function checkMerges(){
  for (let i=mergeQueue.length-1;i>=0;i--){
    const item = mergeQueue[i];
    if (cubes.includes(item.a) && cubes.includes(item.b)) tryMerge(item.a, item.b);
    mergeQueue.splice(i,1);
  }
  for (let i=activeShots.length-1;i>=0;i--){
    const shot = activeShots[i];
    let merged = false;
    for (const c of cubes){
      if (c === shot || c.special || c.isShot) continue;
      const dx = shot.body.position.x - c.body.position.x, dy = shot.body.position.y - c.body.position.y, dz = shot.body.position.z - c.body.position.z;
      if (dx*dx+dy*dy+dz*dz < (CUBE_SZ*1.5)*(CUBE_SZ*1.5)){
        if (tryMerge(shot, c)){
          activeShots.splice(i,1);
          sweepChainMerges();
          merged = true; break;
        } else {
          if (performance.now() - shot.born > 60) audio.bounce();
        }
      }
    }
  }
  if (Math.random() < 0.05) sweepChainMerges();
}

// SPECIAL CUBES (bomb / rainbow)
function spawnSpecialCube(){
  const types = ['bomb', 'rainbow'];
  const type = types[Math.floor(Math.random()*2)];
  const x = -TRACK_W/2 + COL_W/2 + Math.floor(Math.random()*COLS)*COL_W;
  const z = -TRACK_L/2 + 1.0;
  const cube = spawnCube(x, CUBE_SZ/2, z, type, { special: type, fixed: true });
  cube.mesh.material = getCubeMaterials(type); // distinct texture
  cube.body.mass = 0;
  cube.body.updateMassProperties();
}

function triggerSpecial(specialCube, shotCube){
  const type = specialCube.special;
  removeCube(shotCube);
  removeCube(specialCube);
  if (type === 'bomb') {
    const normalCubes = cubes.filter(c => !c.special && !c.isShot);
    const toDestroy = [];
    for (let i=0; i<5 && normalCubes.length>0; i++){
      const idx = Math.floor(Math.random() * normalCubes.length);
      toDestroy.push(normalCubes[idx]);
      normalCubes.splice(idx,1);
    }
    toDestroy.forEach(c => {
      spawnParticles(c.body.position.x, c.body.position.y, c.body.position.z, 0xff4400, 12, 4);
      removeCube(c);
    });
    floatText(specialCube.body.position.x, specialCube.body.position.y+1, specialCube.body.position.z, '💥', 'points-big');
    audio.boom();
  } else if (type === 'rainbow') {
    const rowZ = specialCube.body.position.z;
    const rowCubes = cubes.filter(c => c.body.position.z > rowZ-0.5 && c.body.position.z < rowZ+0.5 && !c.special && !c.isShot);
    rowCubes.forEach(c => {
      spawnParticles(c.body.position.x, c.body.position.y, c.body.position.z, 0xffdd00, 10, 3);
      removeCube(c);
    });
    floatText(specialCube.body.position.x, specialCube.body.position.y+1, specialCube.body.position.z, '🌈', 'milestone');
    audio.bigMerge(64);
  }
}

// RESIZE
function resize(){
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false); composer.setSize(w, h); bloomPass.setSize(w, h);
  camera.aspect = w/h;
  if (w < h) { camera.position.set(0, 18 + (h/w)*3, 4 + (h/w)*2); cameraBaseY = 18 + (h/w)*3; }
  else { camera.position.set(0, 16, 2); cameraBaseY = 16; }
  camera.lookAt(0, 0, 2); camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// UPDATE LOOP
let lastT = performance.now(), shakeAmt = 0;
function update(){
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT)/1000);
  lastT = now;

  if (gameOn && !paused){
    for (const c of cubes){
      if (c.isShot || c.fixed) continue;
      if (c.body.position.z < DANGER_Z + 1 && c.body.velocity.z < conveyorSpeed) c.body.velocity.z += conveyorSpeed*dt*4;
      if (c.flash > 0) c.flash--;
    }
    rowTimer += dt;
    if (rowTimer >= ROW_INTERVAL){ rowTimer = 0; spawnRow(-TRACK_L/2 + 0.8); }

    world.step(1/60, dt, 3);

    for (const c of cubes){
      c.mesh.position.copy(c.body.position); c.mesh.quaternion.copy(c.body.quaternion);
      if (c.flash > 0){
        const intensity = 0.15 + (c.flash/12)*1.5;
        c.mesh.material.forEach(m => { if (m.emissiveIntensity !== undefined) m.emissiveIntensity = intensity; });
      } else {
        c.mesh.material.forEach(m => { if (m.emissiveIntensity !== undefined && m.emissiveIntensity > 0.16) m.emissiveIntensity = 0.15; });
      }
    }

    checkMerges();

    if (comboTimer > 0) comboTimer -= dt;
    else { comboBar = Math.max(0, comboBar - dt*14); mult = comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1; }

    if (shakeAmt > 0){
      camera.position.x = (Math.random()-0.5)*shakeAmt;
      camera.position.y = cameraBaseY + (Math.random()-0.5)*shakeAmt*0.5;
      shakeAmt *= 0.85;
      if (shakeAmt < 0.005){ shakeAmt = 0; camera.position.x = 0; camera.position.y = cameraBaseY; }
    }

    for (let i=activeShots.length-1;i>=0;i--){
      const shot = activeShots[i];
      if (shot.body.position.y < -3 || shot.body.position.z > DANGER_Z + 4){ removeCube(shot); activeShots.splice(i,1); }
    }

    for (const c of cubes){
      if (c.isShot || c.special) continue;
      if (c.body.position.z > DANGER_Z + 0.2){ triggerGameOver(); return; }
    }
  }

  updateParticles(dt);
  updateShooterIndicator();
  updateHUD();
  composer.render();
  requestAnimationFrame(update);
}
resize(); update();
</script>
</body>
</html>
