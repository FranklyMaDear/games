<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Straight Shooter Merge</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
            background: #222;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-top {
            position: absolute;
            top: 10px; left: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 15px; z-index: 10;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px; border-radius: 8px;
            font-size: 20px; font-weight: bold;
        }
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20;
        }
        #game-over h1 { color: #ff4757; margin-bottom: 10px; }
        button {
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            background: #00cec9; border: none; border-radius: 8px;
            color: white; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-top">
        <div class="score-box">Score: <span id="score">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Έφτασες στην κόκκινη γραμμή!</p>
        <button onclick="resetGame()">Ξανά Μανά</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const gameOverScreen = document.getElementById('game-over');

    // Canvas Setup
    let width, height;
    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        width = canvas.width;
        height = canvas.height;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game Variables
    const CUBE_SIZE = width / 5.5; // Χωράνε περίπου 5 κύβοι στη σειρά
    const LAUNCH_Y = height - 80;
    const DANGER_Y = height - 120;
    
    let score = 0;
    let cubes = [];
    let ceilingY = 50; 
    let ceilingDropRate = 0.05; // Πόσο γρήγορα κατεβαίνει το ταβάνι (pixels ανά frame)
    let isGameOver = false;

    // Player/Launcher State
    let player = {
        x: width / 2,
        y: LAUNCH_Y,
        value: 2,
        isShooting: false
    };

    const colors = {
        2: '#2ecc71', 4: '#3498db', 8: '#9b59b6', 16: '#f1c40f',
        32: '#e67e22', 64: '#e74c3c', 128: '#1abc9c', 256: '#fd79a8',
        512: '#6c5ce7', 1024: '#00cec9', 2048: '#d63031'
    };

    function getNextValue() {
        const vals = [2, 4, 8, 16];
        return vals[Math.floor(Math.random() * vals.length)];
    }

    // Input Handling (Σύρσιμο αριστερά-δεξιά & Άφημα για βολή)
    let isDragging = false;
    
    function setPlayerX(clientX) {
        const rect = canvas.getBoundingClientRect();
        let x = clientX - rect.left;
        // Περιορισμός στα όρια της οθόνης
        if (x < CUBE_SIZE/2) x = CUBE_SIZE/2;
        if (x > width - CUBE_SIZE/2) x = width - CUBE_SIZE/2;
        player.x = x;
    }

    canvas.addEventListener('touchstart', (e) => {
        isDragging = true;
        setPlayerX(e.touches[0].clientX);
    }, {passive: true});
    
    canvas.addEventListener('touchmove', (e) => {
        if(isDragging) setPlayerX(e.touches[0].clientX);
    }, {passive: true});
    
    canvas.addEventListener('touchend', () => {
        isDragging = false;
        shoot();
    });

    // Mouse support για PC testing
    canvas.addEventListener('mousedown', (e) => { isDragging = true; setPlayerX(e.clientX); });
    canvas.addEventListener('mousemove', (e) => { if(isDragging) setPlayerX(e.clientX); });
    canvas.addEventListener('mouseup', () => { isDragging = false; shoot(); });

    function shoot() {
        if (isGameOver) return;
        
        // Ρίχνει τον κύβο ΠΡΟΣ ΤΑ ΠΑΝΩ (vy αρνητικό, vx μηδέν)
        cubes.push({
            id: Math.random(),
            x: player.x,
            y: player.y,
            vx: 0,
            vy: -15, // Ταχύτητα βολής
            value: player.value,
            isActive: true // Μόλις χτυπήσει κάπου, γίνεται false
        });
        
        player.value = getNextValue();
        
        // Κάθε βολή κατεβάζει το ταβάνι λιγάκι σαν ποινή
        ceilingY += 5; 
    }

    // AABB Collision Physics (Απλοποιημένη μηχανή για τετράγωνα)
    function checkCollisions() {
        // 1. Σύγκρουση με ταβάνι και τοίχους
        cubes.forEach(c => {
            // Τοίχοι
            if (c.x - CUBE_SIZE/2 < 0) c.x = CUBE_SIZE/2;
            if (c.x + CUBE_SIZE/2 > width) c.x = width - CUBE_SIZE/2;
            
            // Ταβάνι
            if (c.y - CUBE_SIZE/2 < ceilingY) {
                c.y = ceilingY + CUBE_SIZE/2;
                c.vy = 0;
                c.isActive = false;
            }
        });

        // Πολλαπλά περάσματα (iterations) για σταθερότητα όταν στοιβάζονται
        for(let iter=0; iter<3; iter++) {
            for (let i = 0; i < cubes.length; i++) {
                for (let j = i + 1; j < cubes.length; j++) {
                    let a = cubes[i];
                    let b = cubes[j];

                    let dx = b.x - a.x;
                    let dy = b.y - a.y;
                    let absDx = Math.abs(dx);
                    let absDy = Math.abs(dy);

                    if (absDx < CUBE_SIZE && absDy < CUBE_SIZE) {
                        // Merge αν έχουν ίδια αξία
                        if (a.value === b.value && !a.markedForDeath && !b.markedForDeath) {
                            a.markedForDeath = true;
                            b.value *= 2;
                            score += b.value;
                            scoreEl.innerText = score;
                            
                            // Ώθηση κατά το merge (εφέ αλυσιδωτής αντίδρασης)
                            b.vy -= 2;
                            continue;
                        }

                        // Αν δεν κάνουν merge, τα σπρώχνουμε για να μην μπαίνουν το ένα μέσα στο άλλο (Resolution)
                        let overlapX = CUBE_SIZE - absDx;
                        let overlapY = CUBE_SIZE - absDy;

                        if (overlapX < overlapY) { // Οριζόντια σύγκρουση
                            let pushX = overlapX / 2 * (dx > 0 ? 1 : -1);
                            a.x -= pushX; b.x += pushX;
                            a.vx = 0; b.vx = 0;
                        } else { // Κάθετη σύγκρουση
                            let pushY = overlapY / 2 * (dy > 0 ? 1 : -1);
                            a.y -= pushY; b.y += pushY;
                            
                            // Αν χτυπήσει κάθετα, σταματάει η βολή
                            if (a.vy < 0) { a.vy = 0; a.isActive = false; }
                            if (b.vy < 0) { b.vy = 0; b.isActive = false; }
                        }
                    }
                }
            }
        }
    }

    function update() {
        if (isGameOver) return;

        // Το ταβάνι κατεβαίνει συνεχώς
        ceilingY += ceilingDropRate;

        // Ενημέρωση θέσης κύβων
        cubes.forEach(c => {
            // Αν δεν είναι στην πτήση, του ασκείται βαρύτητα προς τα ΚΑΤΩ 
            // ώστε να ακουμπάει στο ταβάνι ή στους από κάτω του
            if (!c.isActive) {
                c.vy += 0.5; // Βαρύτητα
            }
            
            c.x += c.vx;
            c.y += c.vy;

            // Τριβή
            c.vx *= 0.8;
            c.vy *= 0.9;
        });

        checkCollisions();

        // Εκκαθάριση νεκρών κύβων από merges
        cubes = cubes.filter(c => !c.markedForDeath);

        // Έλεγχος Game Over: Αν έστω και ΕΝΑΣ αδρανής κύβος ακουμπήσει την κόκκινη γραμμή κάτω
        let lowestPoint = 0;
        cubes.forEach(c => {
            let bottomEdge = c.y + CUBE_SIZE/2;
            if (bottomEdge > lowestPoint) lowestPoint = bottomEdge;
        });

        if (lowestPoint > DANGER_Y) {
            isGameOver = true;
            gameOverScreen.style.display = 'flex';
        }
    }

    function drawRect(x, y, size, value) {
        let color = colors[value] || '#95a5a6';
        
        ctx.save();
        ctx.translate(x, y);
        
        // Σκιά / Βάθος (3D Fake effect)
        ctx.fillStyle = '#111';
        ctx.fillRect(-size/2 + 2, -size/2 + 4, size, size);
        
        // Κυρίως Σώμα
        ctx.fillStyle = color;
        ctx.fillRect(-size/2, -size/2, size, size);
        
        // Border
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 2;
        ctx.strokeRect(-size/2, -size/2, size, size);

        // Κείμενο
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${size * 0.4}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(value, 0, 0);
        
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Ζωγραφίζουμε το Ταβάνι (Pusher)
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(0, 0, width, ceilingY);
        ctx.fillStyle = '#e74c3c'; // Προειδοποιητική γραμμή ταβανιού
        ctx.fillRect(0, ceilingY - 4, width, 4);

        // Ζωγραφίζουμε τη Γραμμή Κινδύνου (Κάτω)
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(0, DANGER_Y);
        ctx.lineTo(width, DANGER_Y);
        ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.fillStyle = 'rgba(231, 76, 60, 0.1)';
        ctx.fillRect(0, DANGER_Y, width, height - DANGER_Y);

        // Ζωγραφίζουμε τους κύβους
        cubes.forEach(c => drawRect(c.x, c.y, CUBE_SIZE - 2, c.value));

        // Ζωγραφίζουμε τον Παίκτη (Εκτοξευτή)
        if (!isGameOver) {
            ctx.globalAlpha = isDragging ? 1.0 : 0.6; // Πιο φωτεινό όταν το πιάνεις
            drawRect(player.x, player.y, CUBE_SIZE - 2, player.value);
            ctx.globalAlpha = 1.0;
            
            // Γραμμή στόχευσης
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - CUBE_SIZE/2);
            ctx.lineTo(player.x, ceilingY);
            ctx.stroke();
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function resetGame() {
        cubes = [];
        score = 0;
        scoreEl.innerText = score;
        ceilingY = 50;
        isGameOver = false;
        gameOverScreen.style.display = 'none';
        player.value = getNextValue();
    }

    resetGame();
    loop();
</script>
</body>
</html>
