<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Merge Cubes 3D Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;}
body{background:#000;font-family:'Inter','Segoe UI',system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;user-select:none;color:#fff;}

/* TOP HUD */
#hud{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;background:linear-gradient(180deg,rgba(20,20,40,0.95),rgba(15,15,30,0.85));
  backdrop-filter:blur(10px);border-bottom:1px solid rgba(140,100,255,0.2);
  flex-shrink:0;gap:10px;z-index:10;position:relative;}
#next-area{display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);
  border-radius:14px;padding:6px 12px;}
#next-label{color:#888;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
#next-cnv{display:block;}
#combo-col{display:flex;flex-direction:column;gap:4px;}
#mult-row{display:flex;align-items:center;gap:6px;}
#mult-val{color:#f0a030;font-size:14px;font-weight:800;min-width:30px;
  text-shadow:0 0 8px rgba(240,160,48,0.5);transition:color .2s;}
#mult-track{width:74px;height:6px;background:rgba(255,255,255,0.08);
  border-radius:3px;overflow:hidden;}
#mult-fill{height:100%;background:linear-gradient(90deg,#f0a030,#ff5555);
  width:0%;transition:width 0.3s;border-radius:3px;
  box-shadow:0 0 8px rgba(255,140,80,0.5);}
#score-box{text-align:center;flex:1;}
#score-lbl{color:#666;font-size:9px;font-weight:700;letter-spacing:2px;}
#score-val{color:#fff;font-size:26px;font-weight:900;line-height:1;letter-spacing:-1px;
  text-shadow:0 0 16px rgba(140,100,255,0.5);font-variant-numeric:tabular-nums;}
#hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.hud-btn{width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:#aaa;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s;}
.hud-btn:active{background:rgba(255,255,255,0.12);}

/* HAMMER */
#hammer-wrap{position:absolute;left:8px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;z-index:10;}
#hammer-icon{font-size:24px;cursor:pointer;
  filter:drop-shadow(0 0 6px rgba(255,140,40,0.6));transition:transform .15s;}
#hammer-icon.ready{animation:pulse 1s ease-in-out infinite;cursor:pointer;}
#hammer-icon:active{transform:scale(0.85);}
@keyframes pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 6px rgba(255,200,0,0.8));}
  50%{transform:scale(1.15);filter:drop-shadow(0 0 14px rgba(255,200,0,1));}}
#hammer-track{width:14px;height:90px;background:rgba(20,20,40,0.8);
  border-radius:7px;overflow:hidden;border:1px solid rgba(140,100,255,0.3);position:relative;}
#hammer-fill{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,#ff9900,#ff3300);
  transition:height 0.5s cubic-bezier(.4,0,.2,1);border-radius:7px;
  box-shadow:0 0 8px rgba(255,140,0,0.6);}
#hammer-label{color:#ff8800;font-size:7px;font-weight:800;letter-spacing:0.5px;}

/* CANVAS */
#canvas-wrap{flex:1;width:100%;position:relative;overflow:hidden;}
#three-canvas{display:block;width:100%;height:100%;cursor:crosshair;}

/* FLOATING TEXTS */
#fx-layer{position:absolute;inset:0;pointer-events:none;z-index:20;overflow:hidden;}
.float-text{position:absolute;font-weight:900;letter-spacing:0.5px;
  text-shadow:0 2px 8px rgba(0,0,0,0.7);pointer-events:none;
  animation:floatUp 1.2s cubic-bezier(.2,.7,.3,1) forwards;}
.float-text.milestone{font-size:34px;color:#FFD700;
  text-shadow:0 0 20px rgba(255,180,0,0.9), 0 0 40px rgba(255,140,0,0.6);
  animation:milestoneFloat 1.8s cubic-bezier(.2,.7,.3,1) forwards;}
.float-text.points{font-size:18px;color:#FFD700;
  text-shadow:0 2px 10px rgba(0,0,0,0.9), 0 0 12px rgba(255,180,0,0.5);}
.float-text.points-big{font-size:24px;}
.float-text.points-mega{font-size:30px;color:#FFA500;}
@keyframes floatUp{0%{transform:translate(-50%,0) scale(0.7);opacity:0;}
  15%{transform:translate(-50%,-8px) scale(1.15);opacity:1;}
  100%{transform:translate(-50%,-60px) scale(1);opacity:0;}}
@keyframes milestoneFloat{0%{transform:translate(-50%,10px) scale(0.5) rotate(-5deg);opacity:0;}
  20%{transform:translate(-50%,-10px) scale(1.3) rotate(2deg);opacity:1;}
  80%{transform:translate(-50%,-30px) scale(1) rotate(0);opacity:1;}
  100%{transform:translate(-50%,-60px) scale(0.9);opacity:0;}}

/* BOSS WARNING */
#boss-warn{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);
  font-size:24px;font-weight:900;color:#ff3300;letter-spacing:2px;
  text-shadow:0 0 20px rgba(255,50,0,0.8);pointer-events:none;
  display:none;animation:bossBlink 0.6s ease infinite;z-index:25;}
@keyframes bossBlink{0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:0.3;transform:translate(-50%,-50%) scale(0.95);}}

/* TILT BANNER */
#tilt-banner{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,40,60,0.85);border:1px solid rgba(0,200,255,0.5);
  border-radius:14px;padding:14px 24px;text-align:center;color:#00EAFF;
  pointer-events:none;display:none;z-index:25;
  box-shadow:0 0 30px rgba(0,180,255,0.4);}
#tilt-banner.show{display:block;animation:tiltShow 3s ease forwards;}
@keyframes tiltShow{0%{opacity:0;transform:translate(-50%,-50%) scale(0.7);}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  85%{opacity:1;}100%{opacity:0;}}

/* BOOSTERS */
#boosters{width:100%;display:flex;justify-content:center;gap:22px;
  padding:10px 0 14px;
  background:linear-gradient(0deg,rgba(20,20,40,0.95),rgba(15,15,30,0.85));
  backdrop-filter:blur(10px);border-top:1px solid rgba(140,100,255,0.2);
  flex-shrink:0;z-index:10;position:relative;}
.boost-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.boost-circle{width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#4a3a80,#1a1a3a);
  border:2px solid #6655bb;display:flex;align-items:center;justify-content:center;
  font-size:28px;position:relative;
  box-shadow:0 0 16px rgba(100,80,200,0.5),inset 0 2px 0 rgba(255,255,255,0.15),inset 0 -2px 4px rgba(0,0,0,0.3);
  transition:transform 0.12s, box-shadow 0.15s;}
.boost-circle:active{transform:scale(0.85);
  box-shadow:0 0 24px rgba(140,100,255,0.8),inset 0 2px 0 rgba(255,255,255,0.15);}
.ad-badge{position:absolute;top:-4px;right:-4px;background:#dc2626;color:#fff;
  font-size:7px;padding:2px 5px;border-radius:5px;font-weight:800;letter-spacing:0.5px;
  box-shadow:0 2px 6px rgba(220,38,38,0.5);}
.boost-name{color:#888;font-size:9px;font-weight:700;letter-spacing:0.5px;}

/* OVERLAY */
#overlay{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(40,20,80,0.5),rgba(8,8,20,0.95));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;z-index:200;backdrop-filter:blur(8px);}
#overlay.hidden{display:none;}
#overlay h1{color:#fff;font-size:38px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,#a855f7,#ec4899,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(168,85,247,0.5);}
#overlay p{color:#aaa;font-size:13px;text-align:center;line-height:1.8;max-width:280px;}
.score-big{color:#FFD700;font-size:54px;font-weight:900;
  text-shadow:0 0 30px rgba(255,200,0,0.6);}
.play-btn{background:linear-gradient(135deg,#7b3fcc,#a855f7);color:#fff;border:none;
  border-radius:18px;padding:14px 50px;font-size:18px;font-weight:800;
  cursor:pointer;letter-spacing:1.5px;
  box-shadow:0 6px 24px rgba(168,85,247,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform 0.12s;}
.play-btn:active{transform:scale(0.94);}
</style>
</head>
<body>

<div id="hud">
  <div id="next-area">
    <div>
      <div id="next-label">Next</div>
      <canvas id="next-cnv" width="44" height="44"></canvas>
    </div>
    <div id="combo-col">
      <div id="mult-row">
        <span id="mult-val">1×</span>
        <div id="mult-track"><div id="mult-fill"></div></div>
      </div>
    </div>
  </div>
  <div id="score-box">
    <div id="score-lbl">SCORE</div>
    <div id="score-val">0</div>
  </div>
  <div id="hud-right">
    <div class="hud-btn" id="btn-sound">🔊</div>
    <div class="hud-btn" id="btn-pause">⏸</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="three-canvas"></canvas>
  <div id="fx-layer"></div>
  <div id="boss-warn">⚠ BOSS INCOMING ⚠</div>
  <div id="tilt-banner">
    📱 <b>Tilt Control Unlocked!</b><br>
    <small style="color:rgba(0,234,255,0.7);font-size:11px">Tilt device to slide cubes</small>
  </div>
  <div id="hammer-wrap">
    <div id="hammer-icon">🔨</div>
    <div id="hammer-track"><div id="hammer-fill" style="height:0%"></div></div>
    <div id="hammer-label">SMASH</div>
  </div>
  <div id="overlay">
    <h1>MERGE CUBES 3D</h1>
    <p>Shoot cubes to merge matching numbers<br>
       Chain merges for big <b style="color:#f0a030">multipliers</b><br>
       Don't let cubes cross the <b style="color:#ff4444">red line</b>!</p>
    <button class="play-btn" id="startBtn">PLAY</button>
  </div>
</div>

<div id="boosters">
  <div class="boost-btn" id="boost-rainbow">
    <div class="boost-circle"><span>🌈</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">Wildcard</div>
  </div>
  <div class="boost-btn" id="boost-swap">
    <div class="boost-circle"><span>🔄</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">Swap</div>
  </div>
  <div class="boost-btn" id="boost-bomb">
    <div class="boost-circle"><span>💣</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">TNT</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ═══════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════
const CUBE_SEQ = [2,4,8,16,32,64,128,256,512,1024,2048];
const PAL = {
  2:    {hex:0x3ecf5a, glow:0x2aff5a},
  4:    {hex:0x8b5cf6, glow:0xa070ff},
  8:    {hex:0xf97316, glow:0xffaa44},
  16:   {hex:0xe11d48, glow:0xff3366},
  32:   {hex:0x0ea5e9, glow:0x44ccff},
  64:   {hex:0xf59e0b, glow:0xffcc44},
  128:  {hex:0xec4899, glow:0xff66bb},
  256:  {hex:0x14b8a6, glow:0x44e0c8},
  512:  {hex:0xa16207, glow:0xddaa44},
  1024: {hex:0x7c3aed, glow:0xaa66ff},
  2048: {hex:0xFFD700, glow:0xffee44},
  wildcard:{hex:0xff44cc, glow:0xff88dd},
};
function getPal(v){ return PAL[v] || {hex:0xcc44ff, glow:0xff88ff}; }
function nextVal(v){
  const i = CUBE_SEQ.indexOf(v);
  return i>=0 && i+1<CUBE_SEQ.length ? CUBE_SEQ[i+1] : v*2;
}

// Track dimensions (world units)
const TRACK_W = 8;     // x: -4..4
const TRACK_L = 14;    // z: -7 (far/back) .. 7 (near/front)
const COLS    = 5;
const COL_W   = TRACK_W / COLS;
const CUBE_SZ = 1.15;  // size of one cube — bigger for visibility
const DANGER_Z = 5.5;  // z value past which = game over

// ═══════════════════════════════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════════
const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('three-canvas');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0815);
scene.fog = new THREE.Fog(0x0a0815, 12, 22);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
camera.position.set(0, 5.5, 9.5);
camera.lookAt(0, 1, -1);

// ── Lights ──
const ambient = new THREE.AmbientLight(0x4a3aaa, 0.5);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(4, 10, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 1024;
keyLight.shadow.mapSize.height = 1024;
keyLight.shadow.camera.left = -8;
keyLight.shadow.camera.right = 8;
keyLight.shadow.camera.top = 10;
keyLight.shadow.camera.bottom = -10;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 25;
keyLight.shadow.bias = -0.0005;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8866ff, 0.4);
fillLight.position.set(-4, 5, 3);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0x8844cc, 1.5, 18);
rimLight.position.set(0, 4, -6);
scene.add(rimLight);

// ── Post-processing (bloom) ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.65, 0.7, 0.85);
composer.addPass(bloomPass);

// ═══════════════════════════════════════════════════════════════════
// TRACK GEOMETRY
// ═══════════════════════════════════════════════════════════════════
function buildTrack(){
  const group = new THREE.Group();

  // Floor
  const floorGeo = new THREE.PlaneGeometry(TRACK_W, TRACK_L);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x2a1a55, roughness: 0.4, metalness: 0.3,
    emissive: 0x1a0a44, emissiveIntensity: 0.3,
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.position.set(0, 0, 0);
  floor.receiveShadow = true;
  group.add(floor);

  // Grid lines on floor (etched look)
  const gridMat = new THREE.LineBasicMaterial({ color: 0x6644aa, transparent: true, opacity: 0.3 });
  for (let i = 0; i <= COLS; i++){
    const x = -TRACK_W/2 + i*COL_W;
    const pts = [new THREE.Vector3(x, 0.01, -TRACK_L/2), new THREE.Vector3(x, 0.01, TRACK_L/2)];
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    group.add(new THREE.Line(g, gridMat));
  }
  for (let i = 0; i <= 14; i++){
    const z = -TRACK_L/2 + (i/14)*TRACK_L;
    const pts = [new THREE.Vector3(-TRACK_W/2, 0.01, z), new THREE.Vector3(TRACK_W/2, 0.01, z)];
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    group.add(new THREE.Line(g, gridMat));
  }

  // Side walls
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x6644aa, roughness: 0.35, metalness: 0.5,
    emissive: 0x3322aa, emissiveIntensity: 0.4,
  });
  const wallGeo = new THREE.BoxGeometry(0.3, 1.4, TRACK_L);
  const leftW = new THREE.Mesh(wallGeo, wallMat);
  leftW.position.set(-TRACK_W/2 - 0.15, 0.7, 0);
  leftW.castShadow = true; leftW.receiveShadow = true;
  group.add(leftW);
  const rightW = new THREE.Mesh(wallGeo, wallMat);
  rightW.position.set(TRACK_W/2 + 0.15, 0.7, 0);
  rightW.castShadow = true; rightW.receiveShadow = true;
  group.add(rightW);

  // Back wall (far)
  const backGeo = new THREE.BoxGeometry(TRACK_W + 0.6, 1.4, 0.3);
  const back = new THREE.Mesh(backGeo, wallMat);
  back.position.set(0, 0.7, -TRACK_L/2 - 0.15);
  back.castShadow = true; back.receiveShadow = true;
  group.add(back);

  // Danger line (red glowing strip)
  const dangerGeo = new THREE.PlaneGeometry(TRACK_W, 0.15);
  const dangerMat = new THREE.MeshBasicMaterial({
    color: 0xff2222, transparent: true, opacity: 0.9,
  });
  const danger = new THREE.Mesh(dangerGeo, dangerMat);
  danger.rotation.x = -Math.PI/2;
  danger.position.set(0, 0.03, DANGER_Z);
  group.add(danger);

  // Danger glow line above floor
  const dangerGlowGeo = new THREE.PlaneGeometry(TRACK_W, 0.6);
  const dangerGlowMat = new THREE.MeshBasicMaterial({
    color: 0xff2222, transparent: true, opacity: 0.25,
  });
  const dangerGlow = new THREE.Mesh(dangerGlowGeo, dangerGlowMat);
  dangerGlow.rotation.x = -Math.PI/2;
  dangerGlow.position.set(0, 0.04, DANGER_Z);
  group.add(dangerGlow);

  // Ambient particles in background
  const ambGeo = new THREE.BufferGeometry();
  const ambPos = [];
  for (let i = 0; i < 80; i++){
    ambPos.push((Math.random()-0.5)*16, Math.random()*6+1, -Math.random()*10-2);
  }
  ambGeo.setAttribute('position', new THREE.Float32BufferAttribute(ambPos, 3));
  const ambMat = new THREE.PointsMaterial({
    color: 0xaa66ff, size: 0.08, transparent: true, opacity: 0.6,
  });
  const ambPts = new THREE.Points(ambGeo, ambMat);
  group.add(ambPts);

  return group;
}
scene.add(buildTrack());

// ═══════════════════════════════════════════════════════════════════
// CANNON PHYSICS
// ═══════════════════════════════════════════════════════════════════
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.8, 0) });
world.broadphase = new CANNON.NaiveBroadphase();
world.solver.iterations = 8;
world.allowSleep = false;

const cubeMaterial = new CANNON.Material('cube');
const floorMaterial = new CANNON.Material('floor');
const wallMaterial = new CANNON.Material('wall');
world.addContactMaterial(new CANNON.ContactMaterial(cubeMaterial, floorMaterial, {
  friction: 0.3, restitution: 0.2,
}));
world.addContactMaterial(new CANNON.ContactMaterial(cubeMaterial, cubeMaterial, {
  friction: 0.2, restitution: 0.35,
}));
world.addContactMaterial(new CANNON.ContactMaterial(cubeMaterial, wallMaterial, {
  friction: 0.3, restitution: 0.4,
}));

// Physical floor
const floorBody = new CANNON.Body({
  mass: 0, shape: new CANNON.Plane(), material: floorMaterial,
});
floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
world.addBody(floorBody);

// Walls (left, right, back)
function addWall(x, y, z, sx, sy, sz){
  const b = new CANNON.Body({
    mass: 0, shape: new CANNON.Box(new CANNON.Vec3(sx, sy, sz)),
    material: wallMaterial,
  });
  b.position.set(x, y, z);
  world.addBody(b);
}
addWall(-TRACK_W/2 - 0.1, 1, 0, 0.1, 2, TRACK_L/2 + 1); // left
addWall( TRACK_W/2 + 0.1, 1, 0, 0.1, 2, TRACK_L/2 + 1); // right
addWall(0, 1, -TRACK_L/2 - 0.1, TRACK_W/2 + 0.5, 2, 0.1); // back

// ═══════════════════════════════════════════════════════════════════
// CUBE CREATION
// ═══════════════════════════════════════════════════════════════════
// Procedurally make a canvas texture for cube face with number
function makeNumberTexture(value, palette){
  const sz = 256;
  const cv = document.createElement('canvas');
  cv.width = sz; cv.height = sz;
  const c = cv.getContext('2d');

  // background
  c.fillStyle = '#' + palette.hex.toString(16).padStart(6, '0');
  c.fillRect(0, 0, sz, sz);

  // soft inner shadow
  const grad = c.createRadialGradient(sz/2, sz/2, sz*0.2, sz/2, sz/2, sz*0.7);
  grad.addColorStop(0, 'rgba(255,255,255,0.18)');
  grad.addColorStop(1, 'rgba(0,0,0,0.25)');
  c.fillStyle = grad;
  c.fillRect(0, 0, sz, sz);

  // border accent
  c.strokeStyle = 'rgba(0,0,0,0.3)';
  c.lineWidth = 8;
  c.strokeRect(4, 4, sz-8, sz-8);

  // number
  c.fillStyle = '#fff';
  c.font = `900 ${value>=1000?100:value>=100?130:value>=10?160:180}px 'Inter',system-ui`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.shadowColor = 'rgba(0,0,0,0.5)';
  c.shadowBlur = 8;
  c.shadowOffsetY = 4;
  c.fillText(value === 'wildcard' ? '★' : value, sz/2, sz/2 + 6);

  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// Cache materials per value
const matCache = new Map();
function getCubeMaterials(value){
  if (matCache.has(value)) return matCache.get(value);
  const pal = getPal(value);
  const tex = makeNumberTexture(value, pal);

  // 6 face materials, only top/front/sides show the number
  const baseProps = {
    color: 0xffffff, roughness: 0.35, metalness: 0.15,
    emissive: pal.glow, emissiveIntensity: 0.15,
  };
  const mNum = new THREE.MeshStandardMaterial({ ...baseProps, map: tex });
  const mPlain = new THREE.MeshStandardMaterial({
    color: pal.hex, roughness: 0.35, metalness: 0.15,
    emissive: pal.glow, emissiveIntensity: 0.15,
  });
  // BoxGeometry face order: +x, -x, +y, -y, +z, -z
  const mats = [mNum, mNum, mNum, mPlain, mNum, mNum];
  matCache.set(value, mats);
  return mats;
}

// Geometry cache (one box shared by all cubes)
const cubeGeo = new THREE.BoxGeometry(CUBE_SZ, CUBE_SZ, CUBE_SZ);
cubeGeo.computeVertexNormals();

let uid = 1;
function pid(){ return uid++; }

const cubes = []; // { id, mesh, body, value, special, isShot, isBoss, hp, maxHp, flash }

function spawnCube(x, y, z, value, opts = {}){
  const mats = getCubeMaterials(value);
  const mesh = new THREE.Mesh(cubeGeo, mats);
  mesh.castShadow = true; mesh.receiveShadow = true;
  mesh.position.set(x, y, z);
  scene.add(mesh);

  const body = new CANNON.Body({
    mass: opts.isShot ? 1.5 : 1,
    shape: new CANNON.Box(new CANNON.Vec3(CUBE_SZ/2, CUBE_SZ/2, CUBE_SZ/2)),
    material: cubeMaterial,
    position: new CANNON.Vec3(x, y, z),
    linearDamping: 0.18,
    angularDamping: 0.25,
  });
  if (opts.fixed){
    body.mass = 0;
    body.updateMassProperties();
  }
  world.addBody(body);

  const cube = {
    id: pid(), mesh, body, value,
    special: opts.special || null,
    isShot: !!opts.isShot,
    isBoss: !!opts.isBoss,
    hp: opts.hp || null,
    maxHp: opts.hp || null,
    flash: 0,
    born: performance.now(),
  };
  cubes.push(cube);
  return cube;
}

function removeCube(cube){
  scene.remove(cube.mesh);
  cube.mesh.geometry = null; // shared, don't dispose
  // materials are cached, don't dispose
  world.removeBody(cube.body);
  const i = cubes.indexOf(cube);
  if (i >= 0) cubes.splice(i, 1);
}

// SPAWN ROWS
// ═══════════════════════════════════════════════════════════════════
function spawnRow(z){
  const vals = [
    [2,4,2,8,4],
    [4,2,8,2,4],
    [2,8,4,4,2],
    [4,2,4,8,2],
    [2,4,8,2,4],
  ][Math.floor(Math.random()*5)];
  for (let i = 0; i < COLS; i++){
    const x = -TRACK_W/2 + COL_W/2 + i*COL_W;
    spawnCube(x, CUBE_SZ/2, z, vals[i]);
  }
}

function spawnInitial(){
  spawnRow(-TRACK_L/2 + 1.2);
  spawnRow(-TRACK_L/2 + 1.2 + CUBE_SZ * 1.3);
}

// ═══════════════════════════════════════════════════════════════════
// AUDIO (procedural, Web Audio API)
// ═══════════════════════════════════════════════════════════════════
const audio = (() => {
  let ctx = null;
  let muted = false;
  let masterGain = null;
  let musicGain = null;
  let musicNodes = [];

  function ensureCtx(){
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(ctx.destination);
    musicGain = ctx.createGain();
    musicGain.gain.value = 0.15;
    musicGain.connect(masterGain);
  }

  function envelope(node, peak, attack, decay, sustain, release, dur){
    const t = ctx.currentTime;
    node.gain.cancelScheduledValues(t);
    node.gain.setValueAtTime(0.0001, t);
    node.gain.exponentialRampToValueAtTime(peak, t + attack);
    node.gain.exponentialRampToValueAtTime(Math.max(0.0001, peak*sustain), t + attack + decay);
    node.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  }

  function blip(freq, dur=0.12, type='sine', vol=0.4){
    if (muted) return;
    ensureCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.connect(gain).connect(masterGain);
    envelope(gain, vol, 0.005, 0.04, 0.3, 0.08, dur);
    osc.start();
    osc.stop(ctx.currentTime + dur + 0.05);
  }

  function shoot(){
    if (muted) return;
    ensureCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(380, ctx.currentTime + 0.15);
    osc.connect(gain).connect(masterGain);
    envelope(gain, 0.18, 0.005, 0.04, 0.4, 0.1, 0.18);
    osc.start();
    osc.stop(ctx.currentTime + 0.22);
  }

  function merge(value){
    if (muted) return;
    ensureCtx();
    // base note rises with value
    const baseFreq = 220 * Math.pow(1.06, Math.log2(value));
    // chord-like merge sound
    [1, 1.5, 2].forEach((mul, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = i === 0 ? 'square' : 'sine';
      osc.frequency.value = baseFreq * mul;
      osc.connect(gain).connect(masterGain);
      envelope(gain, 0.16 / (i+1), 0.005, 0.05, 0.4, 0.15, 0.25);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
    });
    // click/impact
    const noise = ctx.createBufferSource();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 3);
    noise.buffer = buf;
    const ng = ctx.createGain();
    ng.gain.value = 0.3;
    noise.connect(ng).connect(masterGain);
    noise.start();
  }

  function bigMerge(value){
    merge(value);
    setTimeout(() => merge(value*1.3), 60);
    setTimeout(() => merge(value*1.6), 120);
  }

  function bounce(){
    if (muted) return;
    ensureCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 120;
    osc.connect(gain).connect(masterGain);
    envelope(gain, 0.12, 0.003, 0.03, 0.1, 0.05, 0.08);
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  }

  function milestone(){
    if (muted) return;
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => blip(f, 0.18, 'square', 0.25), i*80);
    });
  }

  function boom(){
    if (muted) return;
    ensureCtx();
    const noise = ctx.createBufferSource();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++)
      data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 2) * 0.8;
    noise.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    const g = ctx.createGain();
    g.gain.value = 0.5;
    noise.connect(filter).connect(g).connect(masterGain);
    noise.start();
  }

  function gameOver(){
    if (muted) return;
    [330, 277, 220, 175].forEach((f, i) => {
      setTimeout(() => blip(f, 0.3, 'triangle', 0.3), i*120);
    });
  }

  function startMusic(){
    if (muted) return;
    ensureCtx();
    stopMusic();
    // simple background pad
    const bpm = 110;
    const beat = 60/bpm;
    const notes = [220, 261, 329, 392]; // A minor pad
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq * 0.5;
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.frequency.value = 0.15 + i*0.07;
      lfoGain.gain.value = 4;
      lfo.connect(lfoGain).connect(osc.frequency);
      osc.connect(g).connect(musicGain);
      g.gain.value = 0.08;
      osc.start();
      lfo.start();
      musicNodes.push(osc, lfo);
    });
  }

  function stopMusic(){
    musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
    musicNodes = [];
  }

  function toggleMute(){
    muted = !muted;
    if (masterGain){
      masterGain.gain.value = muted ? 0 : 0.4;
    }
    return muted;
  }

  return { shoot, merge, bigMerge, bounce, milestone, boom, gameOver, startMusic, stopMusic, toggleMute, ensureCtx };
})();

// ═══════════════════════════════════════════════════════════════════
// PARTICLES (Three.js sprites)
// ═══════════════════════════════════════════════════════════════════
const particles = [];
const particleGeo = new THREE.SphereGeometry(0.08, 6, 6);

function spawnParticles(x, y, z, color, count=14, speed=3.5){
  for (let i = 0; i < count; i++){
    const mat = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 1,
    });
    const mesh = new THREE.Mesh(particleGeo, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    const ang = Math.random() * Math.PI * 2;
    const alt = (Math.random() - 0.3) * Math.PI;
    const sp = speed * (0.5 + Math.random());
    particles.push({
      mesh, mat,
      vx: Math.cos(ang) * Math.cos(alt) * sp,
      vy: Math.abs(Math.sin(alt)) * sp + 1,
      vz: Math.sin(ang) * Math.cos(alt) * sp,
      life: 1,
      decay: 0.018 + Math.random() * 0.01,
    });
  }
}

function updateParticles(dt){
  for (let i = particles.length-1; i >= 0; i--){
    const p = particles[i];
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.vy -= 9 * dt; // gravity
    p.life -= p.decay;
    if (p.life <= 0){
      scene.remove(p.mesh);
      p.mat.dispose();
      particles.splice(i, 1);
    } else {
      p.mat.opacity = p.life;
      p.mesh.scale.setScalar(0.5 + p.life * 0.5);
    }
  }
}

// FLOATING TEXTS (HTML layer for crisp text)
// ═══════════════════════════════════════════════════════════════════
const fxLayer = document.getElementById('fx-layer');

function project3DToScreen(pos){
  const v = pos.clone().project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * canvas.clientWidth,
    y: (-v.y * 0.5 + 0.5) * canvas.clientHeight,
  };
}

function floatText(x, y, z, label, type='points'){
  const v = project3DToScreen(new THREE.Vector3(x, y, z));
  const el = document.createElement('div');
  el.className = 'float-text ' + type;
  el.textContent = label;
  el.style.left = v.x + 'px';
  el.style.top  = v.y + 'px';
  fxLayer.appendChild(el);
  setTimeout(() => el.remove(), type === 'milestone' ? 1800 : 1200);
}

// ═══════════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════════
let gameOn   = false;
let paused   = false;
let score    = 0;
let mult     = 1;
let comboBar = 0;
let comboTimer = 0;
let hammerChg = 0;
let curVal   = 2;
let nxtVal   = 2;
let shotCube = null;
let aimX     = 0;
let aimZ     = 7; // shooter z position
let conveyorSpeed = 0.3; // world units per second
let rowTimer = 0;
let ROW_INTERVAL = 9; // seconds
let seenMS   = new Set();
let wildcardNext = false;
let bossCube = null;
let bossWarnTimer = 0;
let nextBossAt = 1000;
let gyroOn   = false;
let gyroX    = 0;
let tiltShown = false;

function rndStart(){ return [2,2,2,4,4,8][Math.floor(Math.random()*6)]; }

// ═══════════════════════════════════════════════════════════════════
// MERGE LOGIC
// ═══════════════════════════════════════════════════════════════════
function tryMerge(a, b){
  if (a.isBoss || b.isBoss) return false;
  const sameVal = a.value === b.value;
  const hasWild = a.value === 'wildcard' || b.value === 'wildcard';
  if (!sameVal && !hasWild) return false;

  const baseV = a.value === 'wildcard' ? b.value : (b.value === 'wildcard' ? a.value : a.value);
  const nv = nextVal(baseV);
  const px = (a.body.position.x + b.body.position.x) / 2;
  const py = Math.max(CUBE_SZ/2 + 0.1, (a.body.position.y + b.body.position.y) / 2);
  const pz = (a.body.position.z + b.body.position.z) / 2;

  removeCube(a);
  removeCube(b);

  const nc = spawnCube(px, py, pz, nv);
  nc.flash = 12;
  nc.body.velocity.set(0, 4, 0); // pop up
  nc.body.angularVelocity.set((Math.random()-0.5)*5, (Math.random()-0.5)*5, (Math.random()-0.5)*5);

  // Blast impulse on neighbors
  for (const c of cubes){
    if (c.id === nc.id) continue;
    const dx = c.body.position.x - px;
    const dy = c.body.position.y - py;
    const dz = c.body.position.z - pz;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (dist < 3 && dist > 0){
      const f = 6 / (dist + 0.5);
      c.body.applyImpulse(
        new CANNON.Vec3((dx/dist)*f, 1.5, (dz/dist)*f),
        new CANNON.Vec3(0, 0, 0)
      );
    }
  }

  // Particles
  const pal = getPal(nv);
  spawnParticles(px, py, pz, pal.hex, 18, 4);
  if (nv >= 16) spawnParticles(px, py, pz, 0xFFD700, 10, 5);

  // Score
  const pts = nv * mult;
  score += pts;
  comboBar = Math.min(100, comboBar + 40);
  comboTimer = 2.5;
  mult = comboBar >= 90 ? 4 : comboBar >= 60 ? 3 : comboBar >= 30 ? 2 : 1;
  hammerChg = Math.min(100, hammerChg + 18);

  const labelType = nv >= 64 ? 'points-mega' : nv >= 16 ? 'points-big' : 'points';
  floatText(px, py + 0.5, pz, `+${mult>1?mult+'×':''}${pts}`, labelType);

  // Camera shake
  shakeAmt = Math.min(0.4, 0.08 + Math.log2(nv) * 0.025);

  // Milestone
  if (CUBE_SEQ.includes(nv) && !seenMS.has(nv)){
    seenMS.add(nv);
    floatText(0, 3, 0, `✦ ${nv} REACHED! ✦`, 'milestone');
    audio.milestone();
  }

  // Boss check
  if (score >= nextBossAt && !bossCube && bossWarnTimer <= 0){
    bossWarnTimer = 2.0;
    nextBossAt += 1000;
  }

  // Sound
  if (nv >= 64) audio.bigMerge(nv);
  else audio.merge(nv);

  return nc;
}

// Sweep for chain merges
function sweepChainMerges(){
  let iter = 0;
  while (iter < 6){
    iter++;
    let merged = false;
    outer: for (let i = 0; i < cubes.length; i++){
      for (let j = i+1; j < cubes.length; j++){
        const a = cubes[i], b = cubes[j];
        if (a.isBoss || b.isBoss) continue;
        const dx = a.body.position.x - b.body.position.x;
        const dy = a.body.position.y - b.body.position.y;
        const dz = a.body.position.z - b.body.position.z;
        const dist2 = dx*dx + dy*dy + dz*dz;
        if (dist2 < (CUBE_SZ * 1.15) * (CUBE_SZ * 1.15)){
          if (tryMerge(a, b)){ merged = true; break outer; }
        }
      }
    }
    if (!merged) break;
  }
}

// Collision listener — used to trigger merges
world.addEventListener('beginContact', e => {
  // Find cubes by body
  const ca = cubes.find(c => c.body === e.bodyA);
  const cb = cubes.find(c => c.body === e.bodyB);
  if (!ca || !cb) return;
  if (ca.isBoss && cb.isShot){
    damageBoss(ca, cb);
  } else if (cb.isBoss && ca.isShot){
    damageBoss(cb, ca);
  }
});

// We do merge detection in update loop (Cannon's beginContact can be flaky for our needs)
function checkMerges(){
  // Only worry about shot cube + neighbors
  if (shotCube){
    for (const c of cubes){
      if (c === shotCube || c.isBoss) continue;
      const dx = shotCube.body.position.x - c.body.position.x;
      const dy = shotCube.body.position.y - c.body.position.y;
      const dz = shotCube.body.position.z - c.body.position.z;
      const dist2 = dx*dx + dy*dy + dz*dz;
      if (dist2 < (CUBE_SZ * 1.1) * (CUBE_SZ * 1.1)){
        const old = shotCube;
        if (tryMerge(shotCube, c)){
          shotCube = null;
          // Sweep for chains
          sweepChainMerges();
          curVal = nxtVal;
          nxtVal = rndStart();
          drawNextHUD();
        } else {
          // Hard collision → bounce sound
          if (performance.now() - old.born > 60) audio.bounce();
        }
        break;
      }
    }
  }
  // Periodic chain check for landed cubes
  if (Math.random() < 0.05) sweepChainMerges();
}

function damageBoss(boss, shot){
  const dmg = shot.value === 'wildcard' ? 8 : shot.value;
  boss.hp -= dmg;
  boss.flash = 10;
  spawnParticles(boss.body.position.x, boss.body.position.y, boss.body.position.z, 0xff4400, 14, 4);
  floatText(boss.body.position.x, boss.body.position.y + 1, boss.body.position.z, `-${dmg}`, 'points-big');
  removeCube(shot);
  if (shot === shotCube) shotCube = null;
  shakeAmt = 0.2;
  audio.bounce();
  if (boss.hp <= 0) killBoss(boss);
  curVal = nxtVal;
  nxtVal = rndStart();
  drawNextHUD();
}

function killBoss(boss){
  const bx = boss.body.position.x;
  const by = boss.body.position.y;
  const bz = boss.body.position.z;
  spawnParticles(bx, by, bz, 0xFFD700, 40, 8);
  spawnParticles(bx, by, bz, 0xff4400, 30, 7);
  shakeAmt = 0.6;
  score += boss.maxHp * 12;
  // Blast nearby cubes
  for (let i = cubes.length-1; i >= 0; i--){
    const c = cubes[i];
    if (c === boss) continue;
    const dx = c.body.position.x - bx;
    const dz = c.body.position.z - bz;
    if (dx*dx + dz*dz < 4){
      c.body.applyImpulse(new CANNON.Vec3((Math.random()-0.5)*8, 6, (Math.random()-0.5)*8), new CANNON.Vec3(0,0,0));
      // Some get destroyed
      if (Math.random() < 0.6) removeCube(c);
    }
  }
  removeCube(boss);
  if (boss === bossCube) bossCube = null;
  floatText(0, 3, 0, `BOSS SLAIN! +${boss.maxHp*12}`, 'milestone');
  audio.boom();
}

// ═══════════════════════════════════════════════════════════════════
// SHOOT
// ═══════════════════════════════════════════════════════════════════
function shoot(){
  if (!gameOn || paused || shotCube) return;
  const v = wildcardNext ? 'wildcard' : curVal;
  wildcardNext = false;
  const sx = aimX;
  const sz = aimZ;
  // Direction: from shooter (near, +z) toward back (-z), aimed at front of cluster
  const target = findAimTarget(sx);
  const dirX = (target.x - sx);
  const dirZ = (target.z - sz);
  const len = Math.sqrt(dirX*dirX + dirZ*dirZ);
  const speed = 18;
  const vx = (dirX/len) * speed * 0.15; // less horizontal
  const vz = (dirZ/len) * speed;
  shotCube = spawnCube(sx, CUBE_SZ/2 + 0.4, sz, v, { isShot: true, special: v === 'wildcard' ? 'wildcard' : null });
  shotCube.body.velocity.set(vx, 3, vz);
  audio.shoot();
}

function findAimTarget(x){
  // Find lowest-z (farthest) cube on similar x lane, else default
  let best = null;
  for (const c of cubes){
    if (c.isShot) continue;
    if (Math.abs(c.body.position.x - x) < COL_W){
      if (!best || c.body.position.z < best.body.position.z) best = c;
    }
  }
  if (best) return { x: best.body.position.x, z: best.body.position.z };
  return { x, z: -TRACK_L/2 + 1 };
}

// ═══════════════════════════════════════════════════════════════════
// UPDATE LOOP
// ═══════════════════════════════════════════════════════════════════
let lastT = performance.now();
let shakeAmt = 0;

function update(){
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  if (gameOn && !paused){
    // Conveyor — apply gentle forward velocity to non-shot cubes
    for (const c of cubes){
      if (c.isShot) continue;
      // Push toward player (positive z)
      const cur = c.body.position.z;
      if (cur < DANGER_Z + 1){
        // Apply small impulse if velocity z is below threshold
        if (c.body.velocity.z < conveyorSpeed){
          c.body.velocity.z += conveyorSpeed * dt * 4;
        }
      }
      if (c.flash > 0) c.flash--;
    }
    // Boss conveyor
    if (bossCube && bossCube.body.velocity.z < conveyorSpeed * 1.4){
      bossCube.body.velocity.z += conveyorSpeed * 1.4 * dt * 4;
    }

    // Row spawn
    rowTimer += dt;
    if (rowTimer >= ROW_INTERVAL){
      rowTimer = 0;
      spawnRow(-TRACK_L/2 + 0.8);
    }

    // Gyro tilt
    if (gyroOn){
      for (const c of cubes){
        if (c.isShot) continue;
        c.body.velocity.x += gyroX * dt * 12;
      }
    }

    // Boss warn
    if (bossWarnTimer > 0){
      bossWarnTimer -= dt;
      document.getElementById('boss-warn').style.display = 'block';
      if (bossWarnTimer <= 0 && !bossCube){
        spawnBoss();
        document.getElementById('boss-warn').style.display = 'none';
      }
    }

    // Gyro unlock
    if (score >= 500 && !gyroOn){
      gyroOn = true;
      showTiltBanner();
    }

    // Step physics
    world.step(1/60, dt, 3);

    // Sync mesh to body + handle flash
    for (const c of cubes){
      c.mesh.position.copy(c.body.position);
      c.mesh.quaternion.copy(c.body.quaternion);
      if (c.flash > 0){
        const pal = getPal(c.value);
        const intensity = 0.15 + (c.flash / 12) * 1.5;
        c.mesh.material.forEach(m => { if (m.emissiveIntensity !== undefined) m.emissiveIntensity = intensity; });
      } else {
        c.mesh.material.forEach(m => {
          if (m.emissiveIntensity !== undefined && m.emissiveIntensity > 0.16) m.emissiveIntensity = 0.15;
        });
      }
    }

    // Collision-based merge detection
    checkMerges();

    // Combo decay
    if (comboTimer > 0) comboTimer -= dt;
    else {
      comboBar = Math.max(0, comboBar - dt * 14);
      mult = comboBar >= 90 ? 4 : comboBar >= 60 ? 3 : comboBar >= 30 ? 2 : 1;
    }

    // Camera shake
    if (shakeAmt > 0){
      camera.position.x = (Math.random()-0.5) * shakeAmt;
      camera.position.y = 5.5 + (Math.random()-0.5) * shakeAmt * 0.5;
      shakeAmt *= 0.85;
      if (shakeAmt < 0.005){ shakeAmt = 0; camera.position.set(0, 5.5, 9.5); }
    }

    // Shot cube cleanup if falls off
    if (shotCube && (shotCube.body.position.y < -3 || shotCube.body.position.z > DANGER_Z + 4)){
      removeCube(shotCube);
      shotCube = null;
      curVal = nxtVal;
      nxtVal = rndStart();
      drawNextHUD();
    }

    // Game over check
    for (const c of cubes){
      if (c.isShot) continue;
      if (c.body.position.z > DANGER_Z + 0.2){
        triggerGameOver();
        return;
      }
    }
  }

  // Particles
  updateParticles(dt);

  // Shooter cube visual position (just a hint at the bottom)
  updateShooterIndicator();

  // HUD update
  updateHUD();

  // Render
  composer.render();
  requestAnimationFrame(update);
}

// ═══════════════════════════════════════════════════════════════════
// SHOOTER INDICATOR — render a "ghost" cube at the shooter position
// ═══════════════════════════════════════════════════════════════════
let shooterMesh = null;
let shooterAimLine = null;

function makeShooterMesh(){
  // Reuse cube geometry
  const mats = getCubeMaterials(curVal);
  shooterMesh = new THREE.Mesh(cubeGeo, mats);
  shooterMesh.position.set(0, CUBE_SZ/2 + 0.4, aimZ);
  scene.add(shooterMesh);

  // Aim line
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.5, aimZ),
    new THREE.Vector3(0, 0.5, -TRACK_L/2 + 1),
  ]);
  const lineMat = new THREE.LineDashedMaterial({
    color: 0xffffff, dashSize: 0.2, gapSize: 0.2, opacity: 0.4, transparent: true,
  });
  shooterAimLine = new THREE.Line(lineGeo, lineMat);
  shooterAimLine.computeLineDistances();
  scene.add(shooterAimLine);
}

function updateShooterIndicator(){
  if (!shooterMesh) return;
  if (!gameOn || shotCube){
    shooterMesh.visible = false;
    shooterAimLine.visible = false;
    return;
  }
  shooterMesh.visible = true;
  shooterAimLine.visible = true;
  shooterMesh.position.x = aimX;
  shooterMesh.position.z = aimZ;
  // Slight bob
  shooterMesh.position.y = CUBE_SZ/2 + 0.4 + Math.sin(performance.now() * 0.004) * 0.06;
  shooterMesh.rotation.y += 0.01;

  // Update material to match current value
  const targetMats = getCubeMaterials(wildcardNext ? 'wildcard' : curVal);
  if (shooterMesh.material !== targetMats){
    shooterMesh.material = targetMats;
  }

  // Update aim line
  shooterAimLine.geometry.setFromPoints([
    new THREE.Vector3(aimX, 0.5, aimZ),
    new THREE.Vector3(aimX, 0.5, -TRACK_L/2 + 1),
  ]);
  shooterAimLine.computeLineDistances();
}

// ═══════════════════════════════════════════════════════════════════
// BOSS
// ═══════════════════════════════════════════════════════════════════
function spawnBoss(){
  const bv = score < 3000 ? 32 : 64;
  const x = 0;
  const z = -TRACK_L/2 + 1.5;
  const mats = getCubeMaterials(bv);
  // Bigger
  const geo = new THREE.BoxGeometry(CUBE_SZ*1.8, CUBE_SZ*1.8, CUBE_SZ*1.8);
  const mesh = new THREE.Mesh(geo, mats);
  mesh.castShadow = true;
  mesh.position.set(x, CUBE_SZ*0.9, z);
  scene.add(mesh);

  const body = new CANNON.Body({
    mass: 5,
    shape: new CANNON.Box(new CANNON.Vec3(CUBE_SZ*0.9, CUBE_SZ*0.9, CUBE_SZ*0.9)),
    material: cubeMaterial,
    position: new CANNON.Vec3(x, CUBE_SZ*0.9, z),
    linearDamping: 0.3,
    angularDamping: 0.4,
  });
  world.addBody(body);

  bossCube = {
    id: pid(), mesh, body, value: bv, isBoss: true,
    hp: bv, maxHp: bv, flash: 0, special: null, isShot: false,
    born: performance.now(),
  };
  cubes.push(bossCube);
}

// ═══════════════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════════════
const scoreEl = document.getElementById('score-val');
const multEl  = document.getElementById('mult-val');
const multFillEl = document.getElementById('mult-fill');
const hammerFillEl = document.getElementById('hammer-fill');
const hammerIconEl = document.getElementById('hammer-icon');
const overlayEl = document.getElementById('overlay');
const nextCnv = document.getElementById('next-cnv');
const nextCtx = nextCnv.getContext('2d');

function drawMiniCube(mc, cx, cy, sz, value){
  const pal = getPal(value);
  const d = sz * 0.22;
  // Top
  mc.fillStyle = '#' + (pal.glow).toString(16).padStart(6, '0');
  mc.beginPath();
  mc.moveTo(cx - sz/2, cy);
  mc.lineTo(cx - sz/2 + d, cy - d);
  mc.lineTo(cx + sz/2 + d, cy - d);
  mc.lineTo(cx + sz/2, cy);
  mc.closePath(); mc.fill();
  // Side
  mc.fillStyle = 'rgba(0,0,0,0.4)';
  mc.beginPath();
  mc.moveTo(cx + sz/2, cy);
  mc.lineTo(cx + sz/2 + d, cy - d);
  mc.lineTo(cx + sz/2 + d, cy + sz - d);
  mc.lineTo(cx + sz/2, cy + sz);
  mc.closePath(); mc.fill();
  // Front
  mc.fillStyle = '#' + pal.hex.toString(16).padStart(6, '0');
  mc.beginPath();
  mc.roundRect(cx - sz/2, cy, sz, sz, sz*0.12);
  mc.fill();
  // Number
  mc.fillStyle = '#fff';
  mc.font = `800 ${Math.max(8, sz*(value>=100?0.32:0.46))}px system-ui`;
  mc.textAlign = 'center';
  mc.textBaseline = 'middle';
  mc.fillText(value === 'wildcard' ? '★' : value, cx, cy + sz/2);
}

function drawNextHUD(){
  nextCtx.clearRect(0, 0, 44, 44);
  drawMiniCube(nextCtx, 22, 9, 26, wildcardNext ? 'wildcard' : nxtVal);
}

let hudFrame = 0;
function updateHUD(){
  hudFrame++;
  if (hudFrame % 3 !== 0) return; // throttle DOM writes
  scoreEl.textContent = score.toLocaleString();
  multEl.textContent  = mult + '×';
  multFillEl.style.width = comboBar + '%';
  hammerFillEl.style.height = hammerChg + '%';
  if (hammerChg >= 100) hammerIconEl.classList.add('ready');
  else hammerIconEl.classList.remove('ready');
}

function showTiltBanner(){
  if (tiltShown) return;
  tiltShown = true;
  const el = document.getElementById('tilt-banner');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3100);
}

// ═══════════════════════════════════════════════════════════════════
// GAME OVER / START
// ═══════════════════════════════════════════════════════════════════
function triggerGameOver(){
  gameOn = false;
  if (shotCube){ removeCube(shotCube); shotCube = null; }
  audio.gameOver();
  audio.stopMusic();
  overlayEl.innerHTML = `
    <h1>GAME OVER</h1>
    <div style="color:#888;font-size:13px">Final Score</div>
    <div class="score-big">${score.toLocaleString()}</div>
    <button class="play-btn" id="startBtn">PLAY AGAIN</button>
  `;
  overlayEl.classList.remove('hidden');
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame(){
  // Clean up
  while (cubes.length){
    removeCube(cubes[0]);
  }
  for (let i = particles.length-1; i >= 0; i--){
    scene.remove(particles[i].mesh);
    particles[i].mat.dispose();
  }
  particles.length = 0;

  if (!shooterMesh) makeShooterMesh();
  overlayEl.classList.add('hidden');
  score = 0; mult = 1; comboBar = 0; comboTimer = 0;
  hammerChg = 0;
  paused = false;
  bossCube = null;
  bossWarnTimer = 0;
  nextBossAt = 1000;
  document.getElementById('boss-warn').style.display = 'none';
  conveyorSpeed = 0.3;
  rowTimer = 0;
  seenMS = new Set();
  gyroOn = false; gyroX = 0;
  tiltShown = false;
  wildcardNext = false;
  curVal = rndStart();
  nxtVal = rndStart();
  aimX = 0;
  shakeAmt = 0;
  camera.position.set(0, 5.5, 9.5);

  spawnInitial();
  drawNextHUD();
  gameOn = true;

  audio.ensureCtx();
  audio.startMusic();
}

// ═══════════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

function updateAimFromClient(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane, target);
  if (target) aimX = Math.max(-TRACK_W/2 + CUBE_SZ/2, Math.min(TRACK_W/2 - CUBE_SZ/2, target.x));
}

canvas.addEventListener('mousemove', e => {
  if (gameOn && !paused) updateAimFromClient(e.clientX, e.clientY);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameOn && !paused) updateAimFromClient(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('click', e => {
  updateAimFromClient(e.clientX, e.clientY);
  shoot();
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  shoot();
}, { passive: false });

document.getElementById('hammer-icon').addEventListener('click', () => {
  if (!gameOn || hammerChg < 100) return;
  hammerChg = 0;
  shakeAmt = 0.5;
  audio.boom();
  // Find cubes closest to danger line, apply massive upward impulse to throw them off
  const sortedByZ = cubes.filter(c => !c.isShot && !c.isBoss).sort((a,b) => b.body.position.z - a.body.position.z);
  const toBlast = sortedByZ.slice(0, 8);
  for (const c of toBlast){
    spawnParticles(c.body.position.x, c.body.position.y, c.body.position.z, 0xff8800, 12, 5);
    c.body.applyImpulse(new CANNON.Vec3((Math.random()-0.5)*4, 12, -2), new CANNON.Vec3(0,0,0));
    // After a bit, remove
    setTimeout(() => { if (cubes.includes(c)) removeCube(c); }, 400);
  }
});

document.getElementById('boost-rainbow').addEventListener('click', () => {
  if (!gameOn || paused) return;
  wildcardNext = true;
  drawNextHUD();
});
document.getElementById('boost-swap').addEventListener('click', () => {
  if (!gameOn || paused) return;
  [curVal, nxtVal] = [nxtVal, curVal];
  drawNextHUD();
});
document.getElementById('boost-bomb').addEventListener('click', () => {
  if (!gameOn || paused) return;
  audio.boom();
  shakeAmt = 0.3;
  for (let i = cubes.length-1; i >= 0; i--){
    const c = cubes[i];
    if (c.isShot || c.isBoss) continue;
    if (Math.abs(c.body.position.x - aimX) < COL_W*1.3 && c.body.position.z > 0){
      spawnParticles(c.body.position.x, c.body.position.y, c.body.position.z, 0xff4400, 10, 4);
      score += c.value;
      removeCube(c);
    }
  }
});

document.getElementById('btn-pause').addEventListener('click', () => {
  if (!gameOn) return;
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶' : '⏸';
});
document.getElementById('btn-sound').addEventListener('click', () => {
  const muted = audio.toggleMute();
  document.getElementById('btn-sound').textContent = muted ? '🔇' : '🔊';
});

// Gyroscope (mobile)
window.addEventListener('deviceorientation', e => {
  if (!gyroOn) return;
  gyroX = Math.max(-1, Math.min(1, (e.gamma || 0) / 30));
});

document.getElementById('startBtn').addEventListener('click', startGame);

// ═══════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════
function resize(){
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  composer.setSize(w, h);
  bloomPass.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();
update();

</script>
