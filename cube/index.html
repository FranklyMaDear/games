<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Cube Merger</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050409;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 850px;
            background: radial-gradient(circle at center, #150f2e 0%, #050409 100%);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* UI Overlays */
        .ui-element {
            position: absolute;
            background: rgba(16, 12, 36, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px 14px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #score-box {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 100px;
        }
        .ui-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a85a5;
            margin-bottom: 2px;
            font-weight: 700;
        }
        .ui-value {
            font-size: 22px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }
        #next-box {
            top: 20px;
            left: 20px;
            min-width: 80px;
            height: 75px;
        }
        #next-preview {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            margin-top: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #combo-container {
            position: absolute;
            top: 105px;
            left: 20px;
            right: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        #combo-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 0.1s linear;
        }
        #combo-text {
            position: absolute;
            right: 15px;
            font-size: 11px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        /* Powerups Panel */
        #powerups-box {
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            flex-direction: row;
            padding: 6px;
        }
        .powerup-btn {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
        }
        .powerup-btn:active {
            background: rgba(255,255,255,0.2);
        }
        .powerup-btn.active {
            border-color: #f1c40f;
            background: rgba(241, 196, 15, 0.2);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.4);
        }
        /* Game Over Screen */
        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 4, 9, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #game-over-screen h1 {
            font-size: 32px;
            color: #e74c3c;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #game-over-screen p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #8a85a5;
        }
        #restart-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="next-box" class="ui-element">
        <span class="ui-label">Next</span>
        <div id="next-preview">2</div>
    </div>

    <div id="score-box" class="ui-element">
        <span class="ui-label">Score</span>
        <div id="score-value" class="ui-value">0</div>
    </div>

    <div id="powerups-box" class="ui-element">
        <div class="powerup-btn" id="btn-hammer" title="Hammer">🔨</div>
        <div class="powerup-btn" id="btn-bomb" title="Bomb">💣</div>
    </div>

    <div id="combo-container">
        <div id="combo-bar"></div>
        <div id="combo-text">1X</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="game-over-screen">
        <h1>Game Over</h1>
        <p>Τελικό Σκορ: <span id="final-score">0</span></p>
        <button id="restart-btn">Παίξε Ξανά</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreValEl = document.getElementById('score-value');
    const finalScoreEl = document.getElementById('final-score');
    const nextPreviewEl = document.getElementById('next-preview');
    const comboBarEl = document.getElementById('combo-bar');
    const comboTextEl = document.getElementById('combo-text');
    const gameOverScreen = document.getElementById('game-over-screen');
    const restartBtn = document.getElementById('restart-btn');

    // Powerup buttons
    const btnHammer = document.getElementById('btn-hammer');
    const btnBomb = document.getElementById('btn-bomb');

    // Game Variables
    let score = 0;
    let nextValue = 2;
    let comboMultiplier = 1;
    let comboProgress = 0; // 0 to 100
    let cubes = [];
    let particles = [];
    let floatingTexts = [];
    let isGameOver = false;
    let activePowerup = null; // 'hammer' or 'bomb'

    // Launcher Cube State
    let launcher = {
        x: 150,
        y: 640,
        value: 2,
        radius: 16,
        isAiming: false,
        aimX: 150,
        aimY: 300
    };

    // Color definitions per cube tier
    const cubeColors = {
        2:    { bg: '#2ecc71', side: '#27ae60', text: '#ffffff' },
        4:    { bg: '#3498db', side: '#2980b9', text: '#ffffff' },
        8:    { bg: '#e67e22', side: '#d35400', text: '#ffffff' },
        16:   { bg: '#9b59b6', side: '#8e44ad', text: '#ffffff' },
        32:   { bg: '#e74c3c', side: '#c0392b', text: '#ffffff' },
        64:   { bg: '#1abc9c', side: '#16a085', text: '#ffffff' },
        128:  { bg: '#f1c40f', side: '#f39c12', text: '#000000' },
        256:  { bg: '#fd79a8', side: '#e84393', text: '#ffffff' },
        512:  { bg: '#6c5ce7', side: '#a29bfe', text: '#ffffff' },
        1024: { bg: '#00cec9', side: '#00b894', text: '#000000' },
        2048: { bg: '#e84393', side: '#d63031', text: '#ffffff' }
    };

    // 2D Simulation Bounds (Logical Space)
    // The physics simulation runs on a flat rectangle: width 300, length 700.
    const WORLD_WIDTH = 300;
    const WORLD_HEIGHT = 700;
    const DANGER_ZONE_Y = 520; // Y line threshold for failure

    // Danger countdown tracking
    let dangerTimer = 0;

    // Resize handling to match parent container dynamically
    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);

    // Pseudo-3D Perspective Projection Function
    // Maps flat logical space coordinates (worldX, worldY) to the screen trapezoid
    function project(worldX, worldY) {
        const viewRect = canvas.getBoundingClientRect();
        const canvasW = viewRect.width;
        const canvasH = viewRect.height;

        // Normalizing coordinates
        let t = worldY / WORLD_HEIGHT; // 0 at top (horizon), 1 at bottom (near player)

        // Map perspective scaling factors
        let horizonY = canvasH * 0.22;
        let baseFloorY = canvasH * 0.88;
        let screenY = horizonY + t * (baseFloorY - horizonY);

        // Compute width of board at depth 't'
        let topWidth = canvasW * 0.45;
        let bottomWidth = canvasW * 0.88;
        let currentBoardWidth = topWidth + t * (bottomWidth - topWidth);

        let screenX = (canvasW / 2) + ((worldX / WORLD_WIDTH) - 0.5) * currentBoardWidth;
        let scaleFactor = currentBoardWidth / WORLD_WIDTH;

        return { x: screenX, y: screenY, scale: scaleFactor };
    }

    // Powerup selection event listeners
    btnHammer.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePowerup('hammer');
    });
    btnBomb.addEventListener('click', (e) => {
        e.stopPropagation();
        togglePowerup('bomb');
    });

    function togglePowerup(type) {
        if (activePowerup === type) {
            activePowerup = null;
            btnHammer.classList.remove('active');
            btnBomb.classList.remove('active');
        } else {
            activePowerup = type;
            btnHammer.classList.toggle('active', type === 'hammer');
            btnBomb.classList.toggle('active', type === 'bomb');
        }
    }

    // Initialize Game State
    function init() {
        score = 0;
        cubes = [];
        particles = [];
        floatingTexts = [];
        comboMultiplier = 1;
        comboProgress = 0;
        isGameOver = false;
        dangerTimer = 0;
        activePowerup = null;
        btnHammer.classList.remove('active');
        btnBomb.classList.remove('active');
        scoreValEl.innerText = '0';
        gameOverScreen.style.display = 'none';

        // Spawn a few initial random blocks at the top
        for (let i = 0; i < 6; i++) {
            let row = Math.floor(i / 3);
            let col = i % 3;
            cubes.push({
                id: Math.random(),
                x: 60 + col * 90,
                y: 100 + row * 80,
                vx: 0,
                vy: 0,
                value: [2, 4, 8][Math.floor(Math.random() * 3)],
                radius: 16,
                pulse: 1
            });
        }
        rollNextValue();
        updateNextPreview();
    }

    function rollNextValue() {
        launcher.value = nextValue;
        const choices = [2, 4, 8, 16, 32];
        // Dynamic tier selection based on performance
        let maxIdx = score > 1000 ? 5 : score > 400 ? 4 : 3;
        nextValue = choices[Math.floor(Math.random() * maxIdx)];
    }

    function updateNextPreview() {
        nextPreviewEl.innerText = nextValue;
        const colors = cubeColors[nextValue] || {bg: '#fff', text: '#000'};
        nextPreviewEl.style.backgroundColor = colors.bg;
        nextPreviewEl.style.color = colors.text;
    }

    // Input Events (Handles both Touch & Mouse smoothly)
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function handlePointerDown(e) {
        if (isGameOver) return;
        const coords = getCanvasCoords(e);

        if (activePowerup) {
            handlePowerupUsage(coords);
            return;
        }

        // Only allow launch interaction if drag starts reasonably low down the board
        const viewRect = canvas.getBoundingClientRect();
        if (coords.y > viewRect.height * 0.5) {
            launcher.isAiming = true;
            updateAim(coords);
        }
    }

    function handlePointerMove(e) {
        if (!launcher.isAiming) return;
        const coords = getCanvasCoords(e);
        updateAim(coords);
    }

    function handlePointerUp() {
        if (!launcher.isAiming) return;
        launcher.isAiming = false;

        // Vector translation from screen space to logical trajectory physics
        const viewRect = canvas.getBoundingClientRect();
        let projOrigin = project(launcher.x, launcher.y);
        
        let dx = launcher.aimX - projOrigin.x;
        let dy = launcher.aimY - projOrigin.y;
        let angle = Math.atan2(dy, dx);

        // Constrain extreme side shooting angles
        if (angle > -0.2) angle = -0.2;
        if (angle < -2.94) angle = -2.94;

        let speed = 14; 
        let vx = Math.cos(angle) * speed;
        let vy = Math.sin(angle) * speed;

        // Fire new active cube onto the board
        cubes.push({
            id: Math.random(),
            x: launcher.x,
            y: launcher.y,
            vx: vx,
            vy: vy,
            value: launcher.value,
            radius: launcher.radius,
            pulse: 1
        });

        rollNextValue();
        updateNextPreview();
    }

    function updateAim(coords) {
        launcher.aimX = coords.x;
        launcher.aimY = coords.y;
    }

    // Process Hammer & Bomb mechanics
    function handlePowerupUsage(coords) {
        // Find closest clicked cube based on screen projection mapping
        let closestCube = null;
        let minDist = 40; // Click radius target zone

        cubes.forEach(c => {
            let pt = project(c.x, c.y);
            let d = Math.hypot(coords.x - pt.x, coords.y - pt.y);
            if (d < minDist) {
                minDist = d;
                closestCube = c;
            }
        });

        if (closestCube) {
            if (activePowerup === 'hammer') {
                createExplosionParticles(closestCube.x, closestCube.y, closestCube.value, 15);
                cubes = cubes.filter(c => c.id !== closestCube.id);
            } else if (activePowerup === 'bomb') {
                // Radius explosion blast
                createExplosionParticles(closestCube.x, closestCube.y, closestCube.value, 30);
                cubes = cubes.filter(c => Math.hypot(c.x - closestCube.x, c.y - closestCube.y) > 75);
            }
            togglePowerup(activePowerup); // auto-deselect after single usage
        }
    }

    // Attach interaction handlers
    canvas.addEventListener('mousedown', handlePointerDown);
    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mouseup', handlePointerUp);

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, {passive: false});
    window.addEventListener('touchmove', handlePointerMove, {passive: true});
    window.addEventListener('touchend', handlePointerUp);

    // Spawn merge/destruction visual fx
    function createExplosionParticles(x, y, value, count = 12) {
        let colors = cubeColors[value] || {bg: '#fff'};
        for (let i = 0; i < count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = 1 + Math.random() * 5;
            particles.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: 4 + Math.random() * 5,
                color: colors.bg,
                alpha: 1,
                decay: 0.02 + Math.random() * 0.02
            });
        }
    }

    function spawnFloatingText(x, y, txt, color) {
        floatingTexts.push({
            x: x, y: y, text: txt, color: color, alpha: 1, vy: -0.8
        });
    }

    // Core Physics & Collision Pipeline
    function updatePhysics() {
        // 1. Move Cubes & Border checks
        cubes.forEach(c => {
            c.x += c.vx;
            c.y += c.vy;

            // Apply slight environmental simulation drag friction
            c.vx *= 0.985;
            c.vy *= 0.985;

            // Lateral Wall boundaries bounce mapping
            if (c.x - c.radius < 0) {
                c.x = c.radius;
                c.vx *= -0.6;
            } else if (c.x + c.radius > WORLD_WIDTH) {
                c.x = WORLD_WIDTH - c.radius;
                c.vx *= -0.6;
            }

            // Top boundary limit bounce mapping
            if (c.y - c.radius < 0) {
                c.y = c.radius;
                c.vy *= -0.6;
            }
            
            // Absolute bottom layout floor clamp preventing out of bounds falling
            if (c.y + c.radius > WORLD_HEIGHT) {
                c.y = WORLD_HEIGHT - c.radius;
                c.vy *= -0.5;
            }
        });

        // 2. Continuous Circular Physics Collision Resolve Sweep
        for (let i = 0; i < cubes.length; i++) {
            for (let j = i + 1; j < cubes.length; j++) {
                let c1 = cubes[i];
                let c2 = cubes[j];

                let dx = c2.x - c1.x;
                let dy = c2.y - c1.y;
                let dist = Math.hypot(dx, dy);
                let minDist = c1.radius + c2.radius;

                if (dist < minDist && dist > 0) {
                    if (c1.value === c2.value && !c1.markedForDeath && !c2.markedForDeath) {
                        // SUCCESSFUL TIER MERGE COLLISION
                        c1.markedForDeath = true;
                        c2.value *= 2;
                        c2.pulse = 1.5; // Trigger bounce pop visual sizing modifier

                        // Score multiplier updates
                        let pointsEarned = c2.value * comboMultiplier;
                        score += pointsEarned;
                        scoreValEl.innerText = score;

                        // Increment structural Combo layout metrics
                        comboProgress = Math.min(100, comboProgress + 25);
                        if (comboProgress >= 100 && comboMultiplier < 5) {
                            comboMultiplier++;
                            comboProgress = 0;
                        }

                        createExplosionParticles(c2.x, c2.y, c2.value, 14);
                        spawnFloatingText(c2.x, c2.y, `+${pointsEarned}`, cubeColors[c2.value]?.bg || '#fff');

                        // Subtle positional explosion thrust vector kick away
                        c2.vx += (Math.random() - 0.5) * 3;
                        c2.vy -= Math.random() * 2;
                    } else {
                        // Standard rigid body 2D elastic kinetic physics resolve bounce
                        let nx = dx / dist;
                        let ny = dy / dist;

                        // Separate overlapping nodes safely
                        let overlap = minDist - dist;
                        c1.x -= nx * overlap * 0.5;
                        c1.y -= ny * overlap * 0.5;
                        c2.x += nx * overlap * 0.5;
                        c2.y += ny * overlap * 0.5;

                        let rvx = c2.vx - c1.vx;
                        let rvy = c2.vy - c1.vy;
                        let speedNormal = rvx * nx + rvy * ny;

                        if (speedNormal < 0) {
                            let impulse = -(1.4) * speedNormal / 2; // Restitution bounce constant factor
                            c1.vx -= nx * impulse;
                            c1.vy -= ny * impulse;
                            c2.vx += nx * impulse;
                            c2.vy += ny * impulse;
                        }
                    }
                }
            }
        }

        // Clean dead entities
        cubes = cubes.filter(c => !c.markedForDeath);

        // Update active structural FX particle collections
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= p.decay;
        });
        particles = particles.filter(p => p.alpha > 0);

        // Update floating texts UI tags
        floatingTexts.forEach(f => {
            f.y += f.vy;
            f.alpha -= 0.015;
        });
        floatingTexts = floatingTexts.filter(f => f.alpha > 0);

        // Degrade structural continuous combo limits over time frames
        if (comboProgress > 0) {
            comboProgress -= 0.15;
        } else if (comboMultiplier > 1) {
            comboMultiplier--;
            comboProgress = 80;
        }
        comboBarEl.style.width = `${comboProgress}%`;
        comboTextEl.innerText = `${comboMultiplier}X`;

        // Check Danger Zone failure conditions
        let insideDanger = cubes.some(c => c.y > DANGER_ZONE_Y && Math.hypot(c.vx, c.vy) < 0.2);
        if (insideDanger) {
            dangerTimer += 1 / 60;
            if (dangerTimer >= 3.0) { // Failed to clear cubes within 3 seconds threshold rule
                endGame();
            }
        } else {
            dangerTimer = Math.max(0, dangerTimer - 1 / 60);
        }
    }

    function endGame() {
        isGameOver = true;
        finalScoreEl.innerText = score;
        gameOverScreen.style.display = 'flex';
    }

    // 3D Isometric Projection Cube Rendering Method
    function drawCube(worldX, worldY, value, scaleModifier = 1) {
        const pt = project(worldX, worldY);
        const colors = cubeColors[value] || { bg: '#95a5a6', side: '#7f8c8d', text: '#fff' };

        // Scale geometric sizing variables base matching camera perspective lines depth Matrix
        let baseSize = 46 * pt.scale * scaleModifier;
        let h = baseSize; // Height block profile sizing

        ctx.save();
        ctx.translate(pt.x, pt.y);

        // Setup drop pseudo lighting projection paths
        // FRONT FACE
        ctx.fillStyle = colors.side;
        ctx.beginPath();
        ctx.rect(-baseSize/2, 0, baseSize, h * 0.4);
        ctx.fill();

        // TOP TOP FACE Isometric perspective shift
        ctx.fillStyle = colors.bg;
        ctx.beginPath();
        ctx.moveTo(-baseSize/2, 0);
        ctx.lineTo(-baseSize/2 * 0.85, -h * 0.45);
        ctx.lineTo(baseSize/2 * 0.85, -h * 0.45);
        ctx.lineTo(baseSize/2, 0);
        ctx.closePath();
        ctx.fill();

        // Draw inner structural label string elements inside core profile paths
        ctx.fillStyle = colors.text;
        ctx.font = `bold ${Math.max(11, baseSize * 0.38)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Place text cleanly bounded slightly raised offset inside isometric plane mapping
        ctx.fillText(value, 0, -h * 0.18);

        ctx.restore();
    }

    // Canvas Frame Loop Rendering Architecture
    function draw() {
        const viewRect = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, viewRect.width, viewRect.height);

        // 1. Draw Linear Perspective Environment Grid Matrix Floor
        ctx.strokeStyle = 'rgba(78, 54, 186, 0.22)';
        ctx.lineWidth = 1;
        const totalGridLines = 8;
        for (let i = 0; i <= totalGridLines; i++) {
            let wx = (WORLD_WIDTH / totalGridLines) * i;
            let pTop = project(wx, 0);
            let pBottom = project(wx, WORLD_HEIGHT);
            ctx.beginPath();
            ctx.moveTo(pTop.x, pTop.y);
            ctx.lineTo(pBottom.x, pBottom.y);
            ctx.stroke();
        }
        
        // Depth horizontal segments
        const totalHorizLines = 10;
        for (let i = 0; i <= totalHorizLines; i++) {
            let wy = (WORLD_HEIGHT / totalHorizLines) * i;
            let pLeft = project(0, wy);
            let pRight = project(WORLD_WIDTH, wy);
            ctx.beginPath();
            ctx.moveTo(pLeft.x, pLeft.y);
            ctx.lineTo(pRight.x, pRight.y);
            ctx.stroke();
        }

        // 2. Draw Danger Zone Alarm threshold lines
        let dangerPtL = project(0, DANGER_ZONE_Y);
        let dangerPtR = project(WORLD_WIDTH, DANGER_ZONE_Y);
        ctx.strokeStyle = dangerTimer > 0 && Math.floor(Date.now() / 250) % 2 === 0 ? '#ff4757' : 'rgba(231, 76, 60, 0.45)';
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        ctx.moveTo(dangerPtL.x, dangerPtL.y);
        ctx.lineTo(dangerPtR.x, dangerPtR.y);
        ctx.stroke();
        ctx.setLineDash([]); // clear dash state tracking

        // 3. Render Simulated Static/Dynamic Entity Cubes inside layer ordering depth sort
        // Sorting items guarantees proper visual stacking front-to-back perspective representation
        cubes.sort((a, b) => a.y - b.y);
        cubes.forEach(c => {
            // Smoothly ease scale adjustments animation factors
            if (c.pulse > 1) c.pulse -= 0.04;
            drawCube(c.x, c.y, c.value, c.pulse);
        });

        // 4. Draw active particles system
        particles.forEach(p => {
            let pt = project(p.x, p.y);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            let sz = p.size * pt.scale;
            ctx.fillRect(pt.x - sz/2, pt.y - sz/2, sz, sz);
        });
        ctx.globalAlpha = 1.0; // reset transparency constraints

        // 5. Draw active floating textual score overlays
        floatingTexts.forEach(f => {
            let pt = project(f.x, f.y);
            ctx.fillStyle = f.color;
            ctx.globalAlpha = f.alpha;
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText(f.text, pt.x, pt.y);
        });
        ctx.globalAlpha = 1.0;

        // 6. Draw User Guide Pointer Aim Path Indicators
        if (launcher.isAiming) {
            let startPt = project(launcher.x, launcher.y);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 4;
            ctx.setLineDash([5, 8]);
            ctx.beginPath();
            ctx.moveTo(startPt.x, startPt.y);
            ctx.lineTo(launcher.aimX, launcher.aimY);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // 7. Draw Ready Launcher Base Cube visual indicators
        if (!isGameOver) {
            drawCube(launcher.x, launcher.y, launcher.value, 1.0);
        }
    }

    // Continuous System Ticker Controller Loop
    function loop() {
        if (!isGameOver) {
            updatePhysics();
        }
        draw();
        requestAnimationFrame(loop);
    }

    // System Startup Initializers execution triggers
    restartBtn.addEventListener('click', init);
    resizeCanvas();
    init();
    loop();
</script>

</body>
</html>
