<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Merge Cubes 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent}
body{background:#000;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;
  align-items:center;height:100dvh;overflow:hidden;user-select:none;color:#fff}

#hud{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;background:linear-gradient(180deg,rgba(20,20,40,.95),rgba(15,15,30,.85));
  backdrop-filter:blur(10px);border-bottom:1px solid rgba(140,100,255,.2);flex-shrink:0;gap:10px;z-index:10;
  display:none !important;}
#hud.active{display:flex !important;}

#next-area{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:6px 12px}
#next-label{color:#888;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
#combo-col{display:flex;flex-direction:column;gap:4px}
#mult-row{display:flex;align-items:center;gap:6px}
#mult-val{color:#f0a030;font-size:14px;font-weight:800;min-width:30px;text-shadow:0 0 8px rgba(240,160,48,.5)}
#mult-track{width:74px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
#mult-fill{height:100%;background:linear-gradient(90deg,#f0a030,#ff5555);width:0%;transition:width .3s;border-radius:3px;
  box-shadow:0 0 8px rgba(255,140,80,.5)}
#score-box{text-align:center;flex:1}
#score-lbl{color:#666;font-size:9px;font-weight:700;letter-spacing:2px}
#score-val{color:#fff;font-size:26px;font-weight:900;line-height:1;letter-spacing:-1px;
  text-shadow:0 0 16px rgba(140,100,255,.5);font-variant-numeric:tabular-nums}
.hbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);color:#aaa;font-size:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}

#hammer-wrap{position:absolute;left:8px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;z-index:10}
#hammer-icon{font-size:24px;cursor:pointer;filter:drop-shadow(0 0 6px rgba(255,140,40,.6));transition:transform .15s}
#hammer-icon.ready{animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 6px rgba(255,200,0,.8))}
  50%{transform:scale(1.15);filter:drop-shadow(0 0 14px rgba(255,200,0,1))}}
#hammer-track{width:14px;height:90px;background:rgba(20,20,40,.8);border-radius:7px;
  overflow:hidden;border:1px solid rgba(140,100,255,.3);position:relative}
#hammer-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#ff9900,#ff3300);
  transition:height .5s cubic-bezier(.4,0,.2,1);border-radius:7px;box-shadow:0 0 8px rgba(255,140,0,.6)}

#canvas-wrap{flex:1;width:100%;position:relative;overflow:hidden}
#three-canvas{display:block;width:100%;height:100%;cursor:crosshair}
#fx-layer{position:absolute;inset:0;pointer-events:none;z-index:20;overflow:hidden}

.float-text{position:absolute;font-weight:900;letter-spacing:.5px;
  text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none;animation:fup 1.2s cubic-bezier(.2,.7,.3,1) forwards}
.float-text.milestone{font-size:30px;color:#FFD700;text-shadow:0 0 20px rgba(255,180,0,.9);
  animation:msf 1.8s cubic-bezier(.2,.7,.3,1) forwards}
.float-text.points{font-size:18px;color:#FFD700;text-shadow:0 2px 10px rgba(0,0,0,.9),0 0 12px rgba(255,180,0,.5)}
.float-text.points-big{font-size:24px}
.float-text.points-mega{font-size:30px;color:#FFA500}
@keyframes fup{0%{transform:translate(-50%,0) scale(.7);opacity:0}12%{transform:translate(-50%,-8px) scale(1.15);opacity:1}
  100%{transform:translate(-50%,-60px) scale(1);opacity:0}}
@keyframes msf{0%{transform:translate(-50%,8px) scale(.5);opacity:0}20%{transform:translate(-50%,-10px) scale(1.3);opacity:1}
  80%{opacity:1}100%{transform:translate(-50%,-60px);opacity:0}}

/* OVERLAY - Space Background */
#overlay{position:absolute;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:transparent;}
#overlay.hidden{display:none}

#space-bg{position:absolute;inset:0;z-index:-1;
  background:radial-gradient(ellipse at 50% 40%, #1e1438 0%, #0d0820 60%, #060410 100%);
  overflow:hidden;pointer-events:none;}
#space-bg::before, #space-bg::after {
  content:'';position:absolute;width:300%;height:300%;top:-50%;left:-50%;
  background-image:
    radial-gradient(2px 2px at 10% 20%, #fff, transparent),
    radial-gradient(2px 2px at 25% 60%, rgba(255,255,255,.9), transparent),
    radial-gradient(1.5px 1.5px at 40% 30%, #ddd, transparent),
    radial-gradient(2.5px 2.5px at 55% 75%, #fff, transparent),
    radial-gradient(1px 1px at 65% 15%, #ccddff, transparent),
    radial-gradient(2px 2px at 78% 50%, rgba(255,255,255,.85), transparent),
    radial-gradient(1.5px 1.5px at 88% 80%, #eee, transparent),
    radial-gradient(2px 2px at 92% 25%, #fff, transparent),
    radial-gradient(1px 1px at 15% 85%, #bbccff, transparent),
    radial-gradient(2px 2px at 48% 95%, #fff, transparent);
  background-size: 100% 100%;
  animation: drift 90s linear infinite; opacity:.85;
}
#space-bg::after{animation-duration:130s;animation-direction:reverse;opacity:.55;transform:scale(1.4)}
@keyframes drift{0%{transform:translateY(0)}100%{transform:translateY(-30%)}}

#overlay h1{color:#fff;font-size:36px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,#a855f7,#ec4899,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#overlay p{color:#ccc;font-size:13px;text-align:center;line-height:1.8;max-width:280px;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.score-big{color:#FFD700;font-size:54px;font-weight:900;text-shadow:0 0 30px rgba(255,200,0,.6)}
.play-btn{background:linear-gradient(135deg,#7b3fcc,#a855f7);color:#fff;border:none;border-radius:18px;
  padding:14px 50px;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:1.5px;
  box-shadow:0 6px 24px rgba(168,85,247,.5),inset 0 1px 0 rgba(255,255,255,.2)}
.play-btn:active{transform:scale(.94)}
</style>
</head>
<body>
<div id="hud">
  <div id="next-area">
    <div><div id="next-label">Next</div><canvas id="next-cnv" width="44" height="44"></canvas></div>
    <div id="combo-col"><div id="mult-row"><span id="mult-val">1×</span>
      <div id="mult-track"><div id="mult-fill"></div></div></div></div>
  </div>
  <div id="score-box"><div id="score-lbl">SCORE</div><div id="score-val">0</div></div>
  <div style="display:flex;gap:6px"><div class="hbtn" id="btn-sound">🔊</div><div class="hbtn" id="btn-pause">⏸</div></div>
</div>

<div id="canvas-wrap">
  <canvas id="three-canvas"></canvas>
  <div id="fx-layer"></div>
  <div id="hammer-wrap">
    <div id="hammer-icon">🔨</div>
    <div id="hammer-track"><div id="hammer-fill" style="height:0%"></div></div>
  </div>

  <div id="overlay">
    <div id="space-bg"></div>
    <h1>MERGE CUBES 3D</h1>
    <p>Drag to aim, release to launch!<br>Match numbers to <b style="color:#f0a030">merge</b><br>
      Don't let cubes cross the <b style="color:#ff4444">red line</b>!</p>
    <button class="play-btn" id="startBtn">PLAY</button>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
  "cannon-es":"https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"}}</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';

// ═══ CONFIG ═══
const SEQ=[2,4,8,16,32,64,128,256,512,1024,2048];
const PAL={
  2:{hex:0x3ecf5a,glow:0x2aff5a},4:{hex:0x8b5cf6,glow:0xa070ff},8:{hex:0xf97316,glow:0xffaa44},
  16:{hex:0x14b8a6,glow:0x44e0c8},32:{hex:0x0ea5e9,glow:0x44ccff},64:{hex:0xf59e0b,glow:0xffcc44},
  128:{hex:0xec4899,glow:0xff66bb},256:{hex:0xe11d48,glow:0xff3366},512:{hex:0xa16207,glow:0xddaa44},
  1024:{hex:0x7c3aed,glow:0xaa66ff},2048:{hex:0xFFD700,glow:0xffee44},
};
function gp(v){return PAL[v]||{hex:0xcc44ff,glow:0xff88ff}}
function nextVal(v){const i=SEQ.indexOf(v);return i>=0&&i+1<SEQ.length?SEQ[i+1]:v*2}

// RECTANGULAR track sized so 5 cubes fit perfectly. Camera angle creates the trapezoid look.
const TRACK_W=9;          // width fits 5 columns
const TRACK_L=24;         // length of corridor
const COLS=5;
const COL_W=TRACK_W/COLS; // 1.8
const CUBE_SZ=1.5;        // fits inside column with margin
const X_LIMIT=TRACK_W/2-CUBE_SZ/2;  // hard clamp so cubes never exit
const DANGER_Z=6.5;       // cubes crossing toward shooter past this = game over
const SHOOTER_Z=10.5;     // shooter sits at near end
const SHOOTER_SCALE=1.0;  // same size as other cubes

// ═══ THREE.JS ═══
const wrap=document.getElementById('canvas-wrap');
const canvas=document.getElementById('three-canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x070512);
scene.fog=new THREE.Fog(0x070512,30,60);

// Camera angled to give the receding-perspective (trapezoid) look like the photo
const camera=new THREE.PerspectiveCamera(50,1,0.1,200);
camera.position.set(0, 12, 15);
camera.lookAt(0, 0.5, -1.5);

// Lights
const ambient=new THREE.AmbientLight(0x7766cc,0.65);scene.add(ambient);
const keyLight=new THREE.DirectionalLight(0xffffff,1.4);
keyLight.position.set(5,16,10);keyLight.castShadow=true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.camera.left=-12;keyLight.shadow.camera.right=12;
keyLight.shadow.camera.top=18;keyLight.shadow.camera.bottom=-18;
keyLight.shadow.camera.near=0.5;keyLight.shadow.camera.far=45;
keyLight.shadow.bias=-0.0005;scene.add(keyLight);
const fillLight=new THREE.DirectionalLight(0x9977ff,0.5);fillLight.position.set(-7,10,8);scene.add(fillLight);
const rimLight=new THREE.PointLight(0xaa88ff,2.5,45);rimLight.position.set(0,8,-14);scene.add(rimLight);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(1,1),0.7,0.85,0.85));

// ═══ SPACE BACKGROUND (3D stars all around) ═══
const spaceGeo=new THREE.BufferGeometry();
const starCount=1400;
const sp=new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  // distribute in a large sphere shell around the scene
  const r=40+Math.random()*70;
  const th=Math.random()*Math.PI*2;
  const ph=Math.acos(2*Math.random()-1);
  sp[i*3]=r*Math.sin(ph)*Math.cos(th);
  sp[i*3+1]=r*Math.cos(ph)*0.6+5;
  sp[i*3+2]=r*Math.sin(ph)*Math.sin(th);
}
spaceGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
const spaceMat=new THREE.PointsMaterial({color:0xccbbff,size:0.35,sizeAttenuation:true,
  transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,fog:false});
const spaceStars=new THREE.Points(spaceGeo,spaceMat);
scene.add(spaceStars);

// Distant nebula glow planes for "flying in space" feel
function addNebula(x,y,z,color,size,op){
  const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,fog:false});
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(size,size),m);
  mesh.position.set(x,y,z);mesh.lookAt(camera.position);scene.add(mesh);
}
addNebula(-22,8,-30,0x5522aa,40,0.18);
addNebula(25,12,-35,0xaa2266,46,0.14);
addNebula(0,20,-45,0x3344bb,60,0.12);

// ═══ TRACK (rectangular, purple glowing frame) ═══
function buildTrack(){
  const g=new THREE.Group();

  // Floor
  const fm=new THREE.MeshStandardMaterial({color:0x2e1c4f,roughness:0.55,metalness:0.15,
    emissive:0x180e30,emissiveIntensity:0.4});
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W,TRACK_L),fm);
  fl.rotation.x=-Math.PI/2;fl.receiveShadow=true;g.add(fl);

  // Column grid lines
  const gm=new THREE.LineBasicMaterial({color:0x8855dd,transparent:true,opacity:0.3});
  for(let i=0;i<=COLS;i++){
    const x=-TRACK_W/2+i*COL_W;
    const bg=new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x,.02,-TRACK_L/2),new THREE.Vector3(x,.02,TRACK_L/2)]);
    g.add(new THREE.Line(bg,gm));
  }

  // Purple side walls (rounded look via slightly beveled boxes)
  const wm=new THREE.MeshStandardMaterial({color:0x7a55dd,roughness:0.35,metalness:0.6,
    emissive:0x6644cc,emissiveIntensity:0.85});
  const wallH=1.6, wallT=0.5;
  const lw=new THREE.Mesh(new THREE.BoxGeometry(wallT,wallH,TRACK_L+wallT),wm);
  lw.position.set(-TRACK_W/2-wallT/2,wallH/2,0);lw.castShadow=true;g.add(lw);
  const rw=new THREE.Mesh(new THREE.BoxGeometry(wallT,wallH,TRACK_L+wallT),wm);
  rw.position.set(TRACK_W/2+wallT/2,wallH/2,0);rw.castShadow=true;g.add(rw);
  // Back wall (far end) with rounded top corners look
  const bw=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W+wallT*2,wallH,wallT),wm);
  bw.position.set(0,wallH/2,-TRACK_L/2-wallT/2);bw.castShadow=true;g.add(bw);
  // Rounded corner cylinders
  const cylMat=wm;
  [[-TRACK_W/2-wallT/2,-TRACK_L/2-wallT/2],[TRACK_W/2+wallT/2,-TRACK_L/2-wallT/2]].forEach(([cx,cz])=>{
    const cyl=new THREE.Mesh(new THREE.CylinderGeometry(wallT/2,wallT/2,wallH,16),cylMat);
    cyl.position.set(cx,wallH/2,cz);cyl.castShadow=true;g.add(cyl);
  });
  // Front low rail
  const fwm=new THREE.MeshStandardMaterial({color:0x6644cc,roughness:0.4,metalness:0.6,
    emissive:0x5533bb,emissiveIntensity:0.7});
  const fwr=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W+wallT*2,0.6,wallT),fwm);
  fwr.position.set(0,0.3,TRACK_L/2+wallT/2);g.add(fwr);

  // DANGER LINE (red)
  const dm=new THREE.MeshBasicMaterial({color:0xff2828,transparent:true,opacity:0.95});
  const dl=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W,.35),dm);
  dl.rotation.x=-Math.PI/2;dl.position.set(0,.05,DANGER_Z);g.add(dl);
  const dg=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W,1.0),
    new THREE.MeshBasicMaterial({color:0xff2828,transparent:true,opacity:0.18}));
  dg.rotation.x=-Math.PI/2;dg.position.set(0,.06,DANGER_Z);g.add(dg);

  return g;
}
scene.add(buildTrack());

// ═══ PHYSICS ═══
const world=new CANNON.World({gravity:new CANNON.Vec3(0,-12,0)});
world.broadphase=new CANNON.NaiveBroadphase();world.solver.iterations=12;
const cubeMat=new CANNON.Material('cube'),floorMat=new CANNON.Material('floor'),wallMat=new CANNON.Material('wall');
world.addContactMaterial(new CANNON.ContactMaterial(cubeMat,floorMat,{friction:.5,restitution:.05}));
world.addContactMaterial(new CANNON.ContactMaterial(cubeMat,cubeMat,{friction:.1,restitution:.05}));
world.addContactMaterial(new CANNON.ContactMaterial(cubeMat,wallMat,{friction:.2,restitution:.1}));
const floorBody=new CANNON.Body({mass:0,shape:new CANNON.Plane(),material:floorMat});
floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0),-Math.PI/2);world.addBody(floorBody);
function addWall(x,y,z,sx,sy,sz){
  const b=new CANNON.Body({mass:0,shape:new CANNON.Box(new CANNON.Vec3(sx,sy,sz)),material:wallMat});
  b.position.set(x,y,z);world.addBody(b);
}
addWall(-TRACK_W/2-0.25,1.5,0,0.25,3,TRACK_L/2+2);
addWall(TRACK_W/2+0.25,1.5,0,0.25,3,TRACK_L/2+2);
addWall(0,1.5,-TRACK_L/2-0.25,TRACK_W/2+1,3,0.25);
addWall(0,1.5,TRACK_L/2+0.6,TRACK_W/2+1,3,0.25);

// ═══ CUBES ═══
const cubeGeo=new THREE.BoxGeometry(CUBE_SZ,CUBE_SZ,CUBE_SZ);
const matCache=new Map();
function makeTexture(value,pal){
  const sz=256,cv=document.createElement('canvas');cv.width=sz;cv.height=sz;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#'+pal.hex.toString(16).padStart(6,'0');ctx.fillRect(0,0,sz,sz);
  const gr=ctx.createRadialGradient(sz/2,sz/2,sz*.15,sz/2,sz/2,sz*.75);
  gr.addColorStop(0,'rgba(255,255,255,.22)');gr.addColorStop(1,'rgba(0,0,0,.3)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,sz,sz);
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=10;ctx.strokeRect(5,5,sz-10,sz-10);
  ctx.fillStyle='#fff';
  ctx.font=`900 ${value>=1000?110:value>=100?140:value>=10?170:200}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=10;ctx.shadowOffsetY=5;
  ctx.fillText(value,sz/2,sz/2+8);
  const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;return t;
}
function getMats(value){
  if(matCache.has(value))return matCache.get(value);
  const pal=gp(value),tex=makeTexture(value,pal);
  const bp={color:0xffffff,roughness:.3,metalness:.2,emissive:pal.glow,emissiveIntensity:.25};
  const mn=new THREE.MeshStandardMaterial({...bp,map:tex});
  const mp=new THREE.MeshStandardMaterial({color:pal.hex,roughness:.3,metalness:.2,emissive:pal.glow,emissiveIntensity:.25});
  const ms=[mn,mn,mn,mp,mn,mn];matCache.set(value,ms);return ms;
}
let uid2=1;const pid2=()=>uid2++;
const cubes=[];
function spawnCube(x,y,z,value,opts={}){
  const mesh=new THREE.Mesh(cubeGeo,getMats(value));
  mesh.castShadow=true;mesh.receiveShadow=true;mesh.position.set(x,y,z);
  scene.add(mesh);
  const body=new CANNON.Body({mass:opts.isShot?2:1,
    shape:new CANNON.Box(new CANNON.Vec3(CUBE_SZ/2,CUBE_SZ/2,CUBE_SZ/2)),
    material:cubeMat,position:new CANNON.Vec3(x,y,z),linearDamping:.25,angularDamping:.4});
  world.addBody(body);
  const cube={id:pid2(),mesh,body,value,isShot:!!opts.isShot,flash:0};
  cubes.push(cube);return cube;
}
function removeCube(cube){
  scene.remove(cube.mesh);world.removeBody(cube.body);
  const i=cubes.indexOf(cube);if(i>=0)cubes.splice(i,1);
}
function spawnRow(z){
  const vals=[[2,4,2,8,4],[4,2,8,2,4],[2,8,4,4,2],[4,2,4,8,2],[2,4,8,2,4]][Math.floor(Math.random()*5)];
  for(let i=0;i<COLS;i++){
    const x=-TRACK_W/2+COL_W/2+i*COL_W;
    spawnCube(x,CUBE_SZ/2+0.05,z,vals[i]);
  }
}
function spawnInitial(){spawnRow(-TRACK_L/2+2.5);spawnRow(-TRACK_L/2+2.5+CUBE_SZ*1.6);}

// ═══ PARTICLES ═══
const particles=[];
const pGeo=new THREE.SphereGeometry(.1,6,6);
function spawnParticles(x,y,z,color,count=14,speed=3.5){
  for(let i=0;i<count;i++){
    const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:1});
    const mesh=new THREE.Mesh(pGeo,mat);mesh.position.set(x,y,z);scene.add(mesh);
    const a=Math.random()*Math.PI*2,alt=(Math.random()-.3)*Math.PI;
    const s=speed*(.4+Math.random());
    particles.push({mesh,mat,vx:Math.cos(a)*Math.cos(alt)*s,vy:Math.abs(Math.sin(alt))*s+1.2,
      vz:Math.sin(a)*Math.cos(alt)*s,life:1,decay:.02+Math.random()*.01});
  }
}

// ═══ FLOATS ═══
const fxLayer=document.getElementById('fx-layer');
function project3D(pos){const v=pos.clone().project(camera);
  return{x:(v.x*.5+.5)*canvas.clientWidth,y:(-v.y*.5+.5)*canvas.clientHeight}}
function floatText(x,y,z,label,type='points'){
  const v=project3D(new THREE.Vector3(x,y,z));
  const el=document.createElement('div');el.className='float-text '+type;el.textContent=label;
  el.style.left=v.x+'px';el.style.top=v.y+'px';fxLayer.appendChild(el);
  setTimeout(()=>el.remove(),type==='milestone'?1800:1200);
}

// ═══ AUDIO ═══
const audio=(()=>{
  let ctx=null,masterGain=null,muted=false;
  function init(){if(ctx)return;ctx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=ctx.createGain();masterGain.gain.value=.4;masterGain.connect(ctx.destination)}
  function env(g,pk,a,d,s,dur){const t=ctx.currentTime;g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(pk,t+a);g.gain.exponentialRampToValueAtTime(Math.max(.0001,pk*s),t+a+d);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur)}
  function blip(f,dur=.12,type='sine',vol=.4){if(muted)return;init();const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.frequency.value=f;o.connect(g).connect(masterGain);env(g,vol,.005,.04,.3,dur);o.start();o.stop(ctx.currentTime+dur+.05)}
  function shoot(){if(muted)return;init();const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(220,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(380,ctx.currentTime+.15);
    o.connect(g).connect(masterGain);env(g,.18,.005,.04,.4,.18);o.start();o.stop(ctx.currentTime+.22)}
  function merge(v){if(muted)return;init();const bf=220*Math.pow(1.06,Math.log2(v));
    [1,1.5,2].forEach((mul,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type=i===0?'square':'sine';
      o.frequency.value=bf*mul;o.connect(g).connect(masterGain);env(g,.16/(i+1),.005,.05,.4,.25);o.start();o.stop(ctx.currentTime+.3)})}
  function milestone(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,.18,'square',.25),i*80))}
  function boom(){if(muted)return;init();const n=ctx.createBufferSource(),buf=ctx.createBuffer(1,ctx.sampleRate*.5,ctx.sampleRate),
    data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,2)*.8;
    n.buffer=buf;const fi=ctx.createBiquadFilter();fi.type='lowpass';fi.frequency.value=400;
    const g=ctx.createGain();g.gain.value=.5;n.connect(fi).connect(g).connect(masterGain);n.start()}
  function gameOver(){[330,277,220,175].forEach((f,i)=>setTimeout(()=>blip(f,.3,'triangle',.3),i*120))}
  function toggleMute(){muted=!muted;if(masterGain)masterGain.gain.value=muted?0:.4;return muted}
  return{shoot,merge,milestone,boom,gameOver,toggleMute,init}
})();

// ═══ STATE ═══
let gameOn=false,paused=false,score=0,mult=1,comboBar=0,comboTimer=0;
let hammerChg=0,curVal=2,nxtVal=2,shotCube=null,aimX=0;
let conveyorSpeed=.32,rowTimer=0,ROW_INTERVAL=9;
let seenMS=new Set(),shakeAmt=0,isOverlayVisible=true;
function rndStart(){return[2,2,2,4,4,8][Math.floor(Math.random()*6)]}

// ═══ SHOOTER ═══
let shooterMesh=null,aimLine=null;
function makeShooter(){
  shooterMesh=new THREE.Mesh(cubeGeo,getMats(curVal));
  shooterMesh.castShadow=true;
  shooterMesh.position.set(0,CUBE_SZ/2+.1,SHOOTER_Z);scene.add(shooterMesh);
  const glow=new THREE.Mesh(new THREE.RingGeometry(.5,1.3,32),
    new THREE.MeshBasicMaterial({color:0x8855ff,transparent:true,opacity:.4,side:THREE.DoubleSide}));
  glow.rotation.x=-Math.PI/2;glow.position.set(0,.03,SHOOTER_Z);scene.add(glow);
  shooterMesh._glow=glow;
  const lg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,.5,SHOOTER_Z),new THREE.Vector3(0,.5,-TRACK_L/2+2)]);
  aimLine=new THREE.Line(lg,new THREE.LineDashedMaterial({color:0xffffff,dashSize:.3,gapSize:.3,opacity:.5,transparent:true}));
  aimLine.computeLineDistances();scene.add(aimLine);
}
function updateShooter(){
  if(!shooterMesh)return;
  if(!gameOn){shooterMesh.visible=false;aimLine.visible=false;shooterMesh._glow.visible=false;return}
  shooterMesh.visible=true;aimLine.visible=true;shooterMesh._glow.visible=true;
  shooterMesh.position.x=aimX;
  shooterMesh.position.y=CUBE_SZ/2+.1+Math.sin(performance.now()*.004)*.07;
  shooterMesh.rotation.y+=.01;
  shooterMesh._glow.position.x=aimX;
  const tm=getMats(curVal);if(shooterMesh.material!==tm)shooterMesh.material=tm;
  aimLine.geometry.setFromPoints([new THREE.Vector3(aimX,.5,SHOOTER_Z),new THREE.Vector3(aimX,.5,-TRACK_L/2+2)]);
  aimLine.computeLineDistances();
}

// ═══ MERGE ═══
function tryMerge(a,b){
  if(a.value!==b.value)return false;
  const nv=nextVal(a.value);
  const px=(a.body.position.x+b.body.position.x)/2;
  const py=Math.max(CUBE_SZ/2+.05,(a.body.position.y+b.body.position.y)/2);
  const pz=(a.body.position.z+b.body.position.z)/2;
  removeCube(a);removeCube(b);
  const nc=spawnCube(px,py,pz,nv);nc.flash=12;
  nc.body.velocity.set(0,3,0);
  const pal=gp(nv);
  spawnParticles(px,py,pz,pal.hex,20,5);
  if(nv>=16)spawnParticles(px,py,pz,0xFFD700,12,6);
  const pts=nv*mult;score+=pts;
  comboBar=Math.min(100,comboBar+45);comboTimer=2.8;
  mult=comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1;
  hammerChg=Math.min(100,hammerChg+20);
  shakeAmt=Math.min(.45,.08+Math.log2(nv)*.025);
  const lt=nv>=64?'points-mega':nv>=16?'points-big':'points';
  floatText(px,py+.6,pz,`+${mult>1?mult+'×':''}${pts}`,lt);
  if(SEQ.includes(nv)&&!seenMS.has(nv)){seenMS.add(nv);floatText(0,3,0,`✦ ${nv} REACHED! ✦`,'milestone');audio.milestone()}
  conveyorSpeed=Math.min(.6,.32+score*.000006);
  audio.merge(nv);
  return nc;
}
// Horizontal-distance merge: reliable when cubes touch (ignores small height diffs)
function sweepChainMerges(){
  let iter=0;
  while(iter<14){
    iter++;
    let merged=false;
    outer:for(let i=0;i<cubes.length;i++){
      for(let j=i+1;j<cubes.length;j++){
        const a=cubes[i],b=cubes[j];
        if(a.value!==b.value)continue;
        const dx=a.body.position.x-b.body.position.x;
        const dz=a.body.position.z-b.body.position.z;
        const dy=a.body.position.y-b.body.position.y;
        if(Math.abs(dy)>CUBE_SZ*1.3)continue;
        // touch threshold on the floor plane
        if(dx*dx+dz*dz<(CUBE_SZ*1.15)*(CUBE_SZ*1.15)){
          if(tryMerge(a,b)){
            if(a===shotCube||b===shotCube)shotCube=null;
            merged=true;break outer;
          }
        }
      }
    }
    if(!merged)break;
  }
}

// ═══ SHOOT ═══
function shoot(){
  if(!gameOn||paused)return;
  audio.init();audio.shoot();
  const target=findAimTarget(aimX);
  const sx=aimX,sz=SHOOTER_Z;
  const dirX=target.x-sx,dirZ=target.z-sz;const len=Math.sqrt(dirX*dirX+dirZ*dirZ);
  const speed=26;const vx=(dirX/len)*speed*.1,vz=(dirZ/len)*speed;
  shotCube=spawnCube(sx,CUBE_SZ/2+.3,sz,curVal,{isShot:true});
  shotCube.body.velocity.set(vx,1.5,vz);
  curVal=nxtVal;nxtVal=rndStart();drawNextHUD();
}
function findAimTarget(x){
  let best=null;
  for(const c2 of cubes){
    if(c2.isShot)continue;
    if(Math.abs(c2.body.position.x-x)<COL_W*0.8){if(!best||c2.body.position.z<best.body.position.z)best=c2}
  }
  return best?{x:best.body.position.x,z:best.body.position.z}:{x,z:-TRACK_L/2+2};
}

// ═══ UPDATE ═══
let lastT=performance.now();
function update(){
  if(isOverlayVisible){requestAnimationFrame(update);return;}
  const now=performance.now(),dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  spaceStars.rotation.y+=dt*0.01;

  if(gameOn&&!paused){
    for(const c2 of cubes){
      if(c2.isShot)continue;
      if(c2.body.velocity.z<conveyorSpeed)c2.body.velocity.z+=conveyorSpeed*dt*5;
      if(c2.flash>0)c2.flash--;
    }
    rowTimer+=dt;if(rowTimer>=ROW_INTERVAL){rowTimer=0;spawnRow(-TRACK_L/2+1.5)}
    if(cubes.filter(c=>!c.isShot).length<=4)spawnRow(-TRACK_L/2+1.5);

    world.step(1/60,dt,4);

    // HARD CLAMP so cubes never exit left/right
    for(const c2 of cubes){
      if(c2.body.position.x>X_LIMIT){c2.body.position.x=X_LIMIT;if(c2.body.velocity.x>0)c2.body.velocity.x=0;}
      else if(c2.body.position.x<-X_LIMIT){c2.body.position.x=-X_LIMIT;if(c2.body.velocity.x<0)c2.body.velocity.x=0;}
      c2.mesh.position.copy(c2.body.position);c2.mesh.quaternion.copy(c2.body.quaternion);
      const ei=c2.flash>0?.2+(c2.flash/12)*1.8:.25;
      c2.mesh.material.forEach(m=>{if(m.emissiveIntensity!==undefined)m.emissiveIntensity=ei});
    }

    sweepChainMerges();

    if(shotCube&&(!cubes.includes(shotCube)||shotCube.body.position.y<-4||shotCube.body.position.z>DANGER_Z+6)){
      if(cubes.includes(shotCube))removeCube(shotCube);
      shotCube=null;comboBar=Math.max(0,comboBar-25);
      mult=comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1;
    }
    if(comboTimer>0)comboTimer-=dt;else{comboBar=Math.max(0,comboBar-dt*16);
      mult=comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1}
    if(shakeAmt>0){camera.position.x=(Math.random()-.5)*shakeAmt*2;camera.position.y=12+(Math.random()-.5)*shakeAmt;
      shakeAmt*=.86;if(shakeAmt<.005){shakeAmt=0;camera.position.set(0,12,15)}}
    for(const c2 of cubes){if(c2.isShot)continue;if(c2.body.position.z>DANGER_Z+.3){triggerGameOver();return}}
  }

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    p.mesh.position.x+=p.vx*dt;p.mesh.position.y+=p.vy*dt;p.mesh.position.z+=p.vz*dt;
    p.vy-=10*dt;p.life-=p.decay;
    if(p.life<=0){scene.remove(p.mesh);p.mat.dispose();particles.splice(i,1)}
    else{p.mat.opacity=p.life;p.mesh.scale.setScalar(.6+p.life*.6)}}

  updateShooter();updateHUD();composer.render();requestAnimationFrame(update);
}

// ═══ HUD ═══
const scoreEl=document.getElementById('score-val'),multEl=document.getElementById('mult-val'),
  multFillEl=document.getElementById('mult-fill'),hammerFillEl=document.getElementById('hammer-fill'),
  hammerIconEl=document.getElementById('hammer-icon');
const nextCnv=document.getElementById('next-cnv'),nextCtx=nextCnv.getContext('2d');
function drawMiniCube(mc,cx,cy,sz,val){const pal=gp(val),d=sz*.22;
  mc.fillStyle='#'+pal.glow.toString(16).padStart(6,'0');mc.beginPath();
  mc.moveTo(cx-sz/2,cy);mc.lineTo(cx-sz/2+d,cy-d);mc.lineTo(cx+sz/2+d,cy-d);mc.lineTo(cx+sz/2,cy);
  mc.closePath();mc.fill();mc.fillStyle='rgba(0,0,0,.4)';mc.beginPath();
  mc.moveTo(cx+sz/2,cy);mc.lineTo(cx+sz/2+d,cy-d);mc.lineTo(cx+sz/2+d,cy+sz-d);mc.lineTo(cx+sz/2,cy+sz);
  mc.closePath();mc.fill();mc.fillStyle='#'+pal.hex.toString(16).padStart(6,'0');mc.beginPath();
  mc.roundRect(cx-sz/2,cy,sz,sz,sz*.12);mc.fill();mc.fillStyle='#fff';
  mc.font=`800 ${Math.max(8,sz*(val>=100?.32:.46))}px Arial`;mc.textAlign='center';mc.textBaseline='middle';
  mc.fillText(val,cx,cy+sz/2)}
function drawNextHUD(){nextCtx.clearRect(0,0,44,44);drawMiniCube(nextCtx,22,9,26,nxtVal)}
let hudFrame=0;
function updateHUD(){hudFrame++;if(hudFrame%3)return;scoreEl.textContent=score.toLocaleString();
  multEl.textContent=mult+'×';multFillEl.style.width=comboBar+'%';hammerFillEl.style.height=hammerChg+'%';
  if(hammerChg>=100)hammerIconEl.classList.add('ready');else hammerIconEl.classList.remove('ready')}

// ═══ GAME OVER / START ═══
function triggerGameOver(){
  gameOn=false;isOverlayVisible=true;
  if(shotCube){removeCube(shotCube);shotCube=null}audio.gameOver();
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div id="space-bg"></div><h1>GAME OVER</h1><div style="color:#aaa;font-size:13px">Final Score</div>
    <div class="score-big">${score.toLocaleString()}</div><button class="play-btn" id="startBtn">PLAY AGAIN</button>`;
  ov.classList.remove('hidden');
  document.getElementById('startBtn').addEventListener('click',startGame);
  document.getElementById('hud').classList.remove('active');
}
function startGame(){
  while(cubes.length)removeCube(cubes[0]);
  for(let i=particles.length-1;i>=0;i--){scene.remove(particles[i].mesh);particles[i].mat.dispose()}particles.length=0;
  if(!shooterMesh)makeShooter();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').classList.add('active');
  score=0;mult=1;comboBar=0;comboTimer=0;hammerChg=0;paused=false;shotCube=null;
  conveyorSpeed=.32;rowTimer=0;seenMS=new Set();shakeAmt=0;isOverlayVisible=false;
  camera.position.set(0,12,15);camera.lookAt(0,0.5,-1.5);
  curVal=rndStart();nxtVal=rndStart();aimX=0;spawnInitial();drawNextHUD();gameOn=true;audio.init();
}

// ═══ INPUT ═══
const raycaster=new THREE.Raycaster();const mouse=new THREE.Vector2();
const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
let dragging=false;
function updateAim(cx,cy){const rect=canvas.getBoundingClientRect();
  mouse.x=((cx-rect.left)/rect.width)*2-1;mouse.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);const target=new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane,target);
  if(target)aimX=Math.max(-X_LIMIT,Math.min(X_LIMIT,target.x))}
canvas.addEventListener('mousedown',e=>{dragging=true;updateAim(e.clientX,e.clientY)});
canvas.addEventListener('mousemove',e=>{if(dragging&&gameOn&&!paused)updateAim(e.clientX,e.clientY)});
canvas.addEventListener('mouseup',()=>{if(dragging){shoot();dragging=false}});
canvas.addEventListener('touchstart',e=>{dragging=true;updateAim(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(gameOn&&!paused)updateAim(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();shoot();dragging=false},{passive:false});

document.getElementById('hammer-icon').addEventListener('click',()=>{
  if(!gameOn||hammerChg<100)return;hammerChg=0;shakeAmt=.5;audio.boom();
  const sorted=cubes.filter(c=>!c.isShot).sort((a,b)=>b.body.position.z-a.body.position.z);
  sorted.slice(0,8).forEach(c=>{spawnParticles(c.body.position.x,c.body.position.y,c.body.position.z,0xff8800,14,6);removeCube(c)});
});
document.getElementById('btn-pause').addEventListener('click',()=>{if(!gameOn)return;paused=!paused;
  document.getElementById('btn-pause').textContent=paused?'▶':'⏸'});
document.getElementById('btn-sound').addEventListener('click',()=>{const m=audio.toggleMute();
  document.getElementById('btn-sound').textContent=m?'🔇':'🔊'});
document.getElementById('startBtn').addEventListener('click',startGame);

function resize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h,false);
  composer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()}
window.addEventListener('resize',resize);resize();update();
</script>
