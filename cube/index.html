<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Merge Cubes 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; -webkit-tap-highlight-color:transparent; }
body {
  background:#0e0e1c;
  font-family:'Segoe UI',system-ui,sans-serif;
  display:flex; flex-direction:column; align-items:center;
  height:100dvh; overflow:hidden; user-select:none;
}

/* ─── TOP HUD ─────────────────────────────────────────────────── */
#hud {
  width:100%; display:flex; align-items:center;
  justify-content:space-between; padding:8px 12px 6px;
  background:linear-gradient(180deg,#1c1c30,#161626);
  border-bottom:1px solid #2a2a45; flex-shrink:0; gap:8px;
}
#next-area {
  display:flex; align-items:center; gap:8px;
  background:#1e1e38; border-radius:14px; padding:6px 10px;
  border:1px solid #33336a;
}
#next-label { color:#666; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:2px; }
#next-cnv { display:block; }
#combo-area { display:flex; flex-direction:column; gap:4px; }
#mult-row { display:flex; align-items:center; gap:6px; }
#mult-val { color:#f0a030; font-size:14px; font-weight:800; min-width:28px; }
#mult-track { width:72px; height:5px; background:#252545; border-radius:3px; overflow:hidden; }
#mult-fill { height:100%; background:linear-gradient(90deg,#f0a030,#ff5555); width:0%; transition:width 0.3s; border-radius:3px; }
#score-box { text-align:center; flex:1; }
#score-lbl { color:#555; font-size:9px; font-weight:700; letter-spacing:2px; }
#score-val { color:#fff; font-size:24px; font-weight:900; line-height:1; letter-spacing:-1px; }
#hud-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.hud-btn {
  width:32px; height:32px; border-radius:50%;
  background:#1e1e38; border:1px solid #33336a;
  color:#888; font-size:14px; display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}

/* ─── HAMMER GAUGE (left side) ─────────────────────────────────── */
#hammer-wrap {
  position:absolute; left:6px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; align-items:center; gap:4px;
  z-index:10;
}
#hammer-icon { font-size:22px; cursor:pointer; filter:drop-shadow(0 0 4px #ff8800); }
#hammer-track {
  width:12px; height:80px; background:#1a1a30; border-radius:6px;
  overflow:hidden; border:1px solid #333360; position:relative;
}
#hammer-fill {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(180deg,#ff9900,#ff3300);
  transition:height 0.4s; border-radius:6px;
}
#hammer-label { color:#ff8800; font-size:7px; font-weight:800; letter-spacing:0.5px; }

/* ─── CANVAS AREA ───────────────────────────────────────────────── */
#canvas-wrap { flex:1; width:100%; position:relative; overflow:hidden; }
#gameCanvas { display:block; width:100%; height:100%; cursor:crosshair; }

/* ─── BOTTOM BOOSTERS ───────────────────────────────────────────── */
#boosters {
  width:100%; display:flex; justify-content:center; gap:18px;
  padding:8px 0 12px;
  background:linear-gradient(0deg,#1c1c30,#161626);
  border-top:1px solid #2a2a45; flex-shrink:0;
}
.boost-btn { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; }
.boost-circle {
  width:56px; height:56px; border-radius:50%;
  background:radial-gradient(circle at 35% 32%, #3a3a70, #16163a);
  border:2px solid #5555aa;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; position:relative;
  box-shadow:0 0 14px rgba(80,80,180,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  transition:transform 0.12s, box-shadow 0.12s;
}
.boost-circle:active { transform:scale(0.88); }
.boost-circle.glow { box-shadow:0 0 18px rgba(255,165,0,0.7); border-color:#ffaa00; }
.ad-badge {
  position:absolute; top:-3px; right:-3px;
  background:#cc2222; color:#fff; font-size:7px;
  padding:1px 4px; border-radius:4px; font-weight:800; letter-spacing:0.5px;
}
.boost-name { color:#666; font-size:9px; font-weight:600; }

/* ─── OVERLAYS ──────────────────────────────────────────────────── */
#overlay {
  position:absolute; inset:0;
  background:rgba(8,8,20,0.93);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; z-index:200; backdrop-filter:blur(6px);
}
#overlay.hidden { display:none; }
#overlay h1 { color:#fff; font-size:30px; font-weight:900; letter-spacing:1px; }
#overlay p  { color:#888; font-size:13px; text-align:center; line-height:1.7; max-width:260px; }
.score-big { color:#f0a030; font-size:48px; font-weight:900; }
.play-btn {
  background:linear-gradient(135deg,#6b3fcc,#a855f7);
  color:#fff; border:none; border-radius:16px;
  padding:13px 44px; font-size:17px; font-weight:800;
  cursor:pointer; letter-spacing:1px;
  box-shadow:0 4px 20px rgba(168,85,247,0.5);
  transition:transform 0.12s;
}
.play-btn:active { transform:scale(0.94); }

/* ─── MILESTONE FLASH ───────────────────────────────────────────── */
#milestone-flash {
  position:absolute; inset:0; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:150; opacity:0; transition:opacity 0.2s;
}
#milestone-flash.show { opacity:1; }
#milestone-inner {
  background:rgba(10,8,28,0.85); border-radius:20px;
  padding:20px 36px; text-align:center;
  border:2px solid rgba(255,215,0,0.4);
  box-shadow:0 0 40px rgba(255,180,0,0.25);
}
</style>
</head>
<body>

<!-- TOP HUD -->
<div id="hud">
  <div id="next-area">
    <div>
      <div id="next-label">Next</div>
      <canvas id="next-cnv" width="44" height="44"></canvas>
    </div>
    <div id="combo-area">
      <div id="mult-row">
        <span id="mult-val">1×</span>
        <div id="mult-track"><div id="mult-fill"></div></div>
      </div>
    </div>
  </div>
  <div id="score-box">
    <div id="score-lbl">SCORE</div>
    <div id="score-val">0</div>
  </div>
  <div id="hud-right">
    <div class="hud-btn" id="btn-sound" title="Sound">🔊</div>
    <div class="hud-btn" id="btn-pause" title="Pause">⏸</div>
  </div>
</div>

<!-- GAME CANVAS -->
<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>

  <!-- Left: Hammer gauge -->
  <div id="hammer-wrap">
    <div id="hammer-icon" title="Use Hammer">🔨</div>
    <div id="hammer-track"><div id="hammer-fill" style="height:0%"></div></div>
    <div id="hammer-label">SMASH</div>
  </div>

  <!-- Start / Game Over overlay -->
  <div id="overlay">
    <h1>🧊 MERGE CUBES</h1>
    <p>Shoot cubes upward to merge matching numbers!<br>
       Chain merges to max your <b style="color:#f0a030">multiplier</b>.<br>
       Don't let cubes past the <b style="color:#ff4444">red line</b>!</p>
    <button class="play-btn" id="startBtn">PLAY</button>
  </div>
</div>

<!-- BOTTOM BOOSTERS -->
<div id="boosters">
  <div class="boost-btn" id="boost-rainbow">
    <div class="boost-circle"><span style="font-size:28px">🌈</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">Wildcard</div>
  </div>
  <div class="boost-btn" id="boost-swap">
    <div class="boost-circle"><span style="font-size:28px">🔄</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">Swap</div>
  </div>
  <div class="boost-btn" id="boost-bomb">
    <div class="boost-circle"><span style="font-size:28px">💣</span><span class="ad-badge">AD</span></div>
    <div class="boost-name">TNT</div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════
//  CUBE VALUE SEQUENCE  (powers of 2, classic merge)
// ═══════════════════════════════════════════════════════════════════
const CUBE_SEQ = [2,4,8,16,32,64,128,256,512,1024,2048];
function nextVal(v) {
  const i = CUBE_SEQ.indexOf(v);
  return i >= 0 && i+1 < CUBE_SEQ.length ? CUBE_SEQ[i+1] : v*2;
}

// Color palette — vibrant, matching GAMEE screenshot
const PAL = {
  2:    {f:'#3ecf5a', t:'#70ff90', s:'#1f8034', tx:'#fff'},
  4:    {f:'#8b5cf6', t:'#b090ff', s:'#4e2a9e', tx:'#fff'},
  8:    {f:'#f97316', t:'#ffb060', s:'#a04808', tx:'#fff'},
  16:   {f:'#e11d48', t:'#ff5577', s:'#8a0028', tx:'#fff'},
  32:   {f:'#0ea5e9', t:'#55d0ff', s:'#0060a0', tx:'#fff'},
  64:   {f:'#f59e0b', t:'#ffe060', s:'#a06000', tx:'#fff'},
  128:  {f:'#ec4899', t:'#ff90cc', s:'#960044', tx:'#fff'},
  256:  {f:'#14b8a6', t:'#50e8d8', s:'#087060', tx:'#fff'},
  512:  {f:'#a16207', t:'#e0b040', s:'#603800', tx:'#fff'},
  1024: {f:'#7c3aed', t:'#b070ff', s:'#420080', tx:'#fff'},
  2048: {f:'#FFD700', t:'#FFF8AA', s:'#A07000', tx:'#333'},
  wildcard:{f:'#ff44cc',t:'#ffaaee',s:'#880066',tx:'#fff'},
};
function getColor(v) { return PAL[v] || {f:'#cc44ff',t:'#ee88ff',s:'#660099',tx:'#fff'}; }

// ═══════════════════════════════════════════════════════════════════
//  WORLD / PROJECTION SETUP
// ═══════════════════════════════════════════════════════════════════
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const nextCnv = document.getElementById('next-cnv');
const nextCtx = nextCnv.getContext('2d');

// Logical game grid (5 cols, 8 rows). Row 0 = back (top of track), row 7 = front (near player).
const COLS = 5, ROWS = 8;

// Perspective track geometry (in canvas pixels, recalculated on resize)
let TW, TH;           // canvas pixel size
let FAR_Y, NEAR_Y;    // track top/bottom in canvas px
let FAR_W, NEAR_W;    // track width at far/near end
let VPX;              // vanishing point x (center)
let CELL_FAR, CELL_NEAR; // cell size at far/near
let DANGER_ROW = 0;   // danger = row 0 (closest to shooter = bottom visually)

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  TW = canvas.width; TH = canvas.height;
  VPX = TW / 2;
  // Track near = bottom of canvas (shooter end), far = top
  NEAR_Y = TH * 0.88;
  FAR_Y  = TH * 0.06;
  NEAR_W = TW * 0.82;
  FAR_W  = TW * 0.28;
  CELL_NEAR = NEAR_W / COLS;
  CELL_FAR  = FAR_W  / COLS;
}

// Project grid cell (row, col) → canvas {x, y, cellW, cellH}
// row 0 = far (back), row ROWS-1 = near (front, closest to shooter)
function projCell(row, col) {
  const t  = row / (ROWS - 1);          // 0=far, 1=near
  const tw = FAR_W  + (NEAR_W - FAR_W)  * t;
  const py = FAR_Y  + (NEAR_Y - FAR_Y)  * t;
  const cw = tw / COLS;
  const lx = VPX - tw / 2;
  const ch_t = (FAR_W / COLS) * 0.9;
  const ch_b = (NEAR_W / COLS) * 0.9;
  const ch   = ch_t + (ch_b - ch_t) * t;
  return { x: lx + col * cw, y: py - ch * 0.5, cw, ch };
}

// ═══════════════════════════════════════════════════════════════════
//  DRAW 3D CUBE (isometric-ish, scaled to cell)
// ═══════════════════════════════════════════════════════════════════
function drawCube(cx, cy, cw, ch, value, alpha=1, flash=0, special=null, bossHp=null, bossMax=null) {
  const pad = 0.07;
  const w = cw * (1 - pad*2);
  const h = ch * (1 - pad*2);
  const x = cx + cw * pad;
  const y = cy + ch * pad;
  const d  = w * 0.20;  // depth offset
  const c  = getColor(value);

  ctx.save();
  ctx.globalAlpha = alpha;

  // Shadow
  ctx.globalAlpha = alpha * 0.18;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x + w/2 + d*0.5, y + h + d*0.4, w*0.42, h*0.10, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = alpha;

  // Flash glow
  if (flash > 0) {
    ctx.save();
    ctx.globalAlpha = alpha * (flash / 14) * 0.7;
    const g = ctx.createRadialGradient(x+w/2, y+h/2, 0, x+w/2, y+h/2, w*0.9);
    g.addColorStop(0,'#FFD700'); g.addColorStop(1,'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x+w/2, y+h/2, w*0.9, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Top face
  ctx.beginPath();
  ctx.moveTo(x,    y);
  ctx.lineTo(x+d,  y-d);
  ctx.lineTo(x+w+d,y-d);
  ctx.lineTo(x+w,  y);
  ctx.closePath();
  ctx.fillStyle = c.t; ctx.fill();

  // Right side face
  ctx.beginPath();
  ctx.moveTo(x+w,   y);
  ctx.lineTo(x+w+d, y-d);
  ctx.lineTo(x+w+d, y+h-d);
  ctx.lineTo(x+w,   y+h);
  ctx.closePath();
  ctx.fillStyle = c.s; ctx.fill();

  // Front face
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, Math.max(3, w*0.10));
  ctx.fillStyle = c.f; ctx.fill();

  // Highlight shine
  const shine = ctx.createLinearGradient(x, y, x+w*0.4, y+h*0.4);
  shine.addColorStop(0,'rgba(255,255,255,0.28)');
  shine.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.roundRect(x, y, w, h, w*0.10);
  ctx.fillStyle = shine; ctx.fill();

  // Special border
  if (special) {
    const bc = special==='wildcard'?'#ff44cc': special==='fire'?'#ff4400': special==='diamond'?'#FFD700':'#00EAFF';
    ctx.save();
    ctx.strokeStyle = bc; ctx.lineWidth = Math.max(1.5, w*0.05);
    ctx.shadowColor = bc; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.roundRect(x, y, w, h, w*0.10); ctx.stroke();
    ctx.restore();
  }

  // Boss armor overlay
  if (bossHp !== null) {
    ctx.save(); ctx.globalAlpha = alpha * 0.22;
    for (let i=0;i<5;i++) {
      ctx.fillStyle = i%2===0?'#222':'#555';
      ctx.fillRect(x+i*(w/5), y, w/5, h);
    }
    ctx.restore();
    // HP bar below cube
    const hpf = bossHp / bossMax;
    ctx.fillStyle = '#111'; ctx.fillRect(x, y+h+2, w, 5);
    ctx.fillStyle = hpf>0.6?'#44ff66':hpf>0.3?'#ffbb00':'#ff3333';
    ctx.fillRect(x, y+h+2, w*hpf, 5);
  }

  // Value label
  const fs = Math.max(7, w * (value>=1000?0.22:value>=100?0.28:value>=10?0.35:0.42));
  ctx.fillStyle = c.tx;
  ctx.font = `800 ${fs}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(value==='wildcard'?'★':value, x+w/2, y+h/2 + d*0.1);

  ctx.restore();
}

// Mini cube for HUD panels
function drawMiniCube(mCtx, x, y, w, h, value) {
  const d = w * 0.22;
  const c = getColor(value);
  mCtx.beginPath();
  mCtx.moveTo(x,y); mCtx.lineTo(x+d,y-d);
  mCtx.lineTo(x+w+d,y-d); mCtx.lineTo(x+w,y); mCtx.closePath();
  mCtx.fillStyle = c.t; mCtx.fill();
  mCtx.beginPath();
  mCtx.moveTo(x+w,y); mCtx.lineTo(x+w+d,y-d);
  mCtx.lineTo(x+w+d,y+h-d); mCtx.lineTo(x+w,y+h); mCtx.closePath();
  mCtx.fillStyle = c.s; mCtx.fill();
  mCtx.beginPath(); mCtx.roundRect(x,y,w,h,w*0.12); mCtx.fillStyle = c.f; mCtx.fill();
  mCtx.fillStyle = c.tx;
  mCtx.font = `800 ${Math.max(7,w*(value>=100?0.26:0.36))}px system-ui`;
  mCtx.textAlign='center'; mCtx.textBaseline='middle';
  mCtx.fillText(value==='wildcard'?'★':value, x+w/2, y+h/2);
}

// ═══════════════════════════════════════════════════════════════════
//  PHYSICS / WORLD STATE
// ═══════════════════════════════════════════════════════════════════
// Free-physics cubes — each has { x,y (world 0..1), vx,vy, value, flash, special }
// World: x=0..1 normalized across near-width, y=0(far)..1(near/bottom)
// NEAR end = row ROWS-1 projection, FAR end = row 0 projection

const PHYS_R    = 0.105; // cube half-size in world units — bigger cubes
const CONV_SPD  = 0.00006; // conveyor: cubes drift toward player each frame
const GRAV      = 0.0;    // no vertical gravity in corridor (cubes slide on "floor")
const FRIC      = 0.974;
const BOUN      = 0.32;
const SHOT_SPD  = 0.016;   // initial shot velocity (toward far)

let cubes      = [];   // free-physics cubes on board
let shotCube   = null; // the in-flight cube
let curVal     = 2;
let nxtVal     = 2;
let score      = 0;
let mult       = 1;
let comboBar   = 0;    // 0..100
let comboTimer = 0;
let hammerChg  = 0;    // 0..100
let hammerAnim = 0;
let particles  = [];
let floats     = [];   // floating score labels
let shakeAmt   = 0;
let paused     = false;
let soundOn    = true;
let gameOn     = false;
let boss       = null; // {x,y,vx,vy,hp,maxHp,flash}
let bossTimer  = 0;    // frames until next boss
let BOSS_INTERVAL = 800;
let convSpeed  = CONV_SPD;
let spawnTimer = 0;
let SPAWN_INTERVAL = 500; // frames between new back rows (~8s)
let seenMilestones = new Set();
let gyroX = 0;
let gyroUnlocked = false;
let tiltBanner = 0;
let wildcardNext = false;
let diamondMult = false;
let diamondTimer = 0;
let frameCount = 0;
let uid = 1;
function pid() { return uid++; }

function getCol(v) { return PAL[v] || {f:'#cc44ff',t:'#ee88ff',s:'#660099',tx:'#fff'}; }

// Spawn initial cubes clustered at far end — 5 cubes full width
function spawnInitial() {
  cubes = [];
  const row0vals = [2,4,2,8,4];
  const row1vals = [4,2,4,2,8];
  for (let ci = 0; ci < 5; ci++) {
    const x = 0.08 + (ci / 4) * 0.84;
    cubes.push(newCube(x, 0.03, 0, 0, row0vals[ci]));
    cubes.push(newCube(x, 0.03 + PHYS_R * 2.3, 0, 0, row1vals[ci]));
  }
}

function newCube(x,y,vx,vy,value,special=null) {
  return {id:pid(), x,y,vx,vy,value,special,flash:0,newborn:10};
}

function rndStart() {
  return [2,2,2,4,4,8][Math.floor(Math.random()*6)];
}

// ═══════════════════════════════════════════════════════════════════
//  MERGE LOGIC
// ═══════════════════════════════════════════════════════════════════
function doMerge(a, b) {
  const nv = nextVal(a.value==='wildcard'?b.value:b.value==='wildcard'?a.value:a.value);
  const nx = (a.x+b.x)/2, ny = (a.y+b.y)/2;
  cubes = cubes.filter(c=>c.id!==a.id && c.id!==b.id);

  const nc = newCube(nx, ny, (Math.random()-0.5)*0.002, -0.003, nv);
  nc.flash = 14;
  cubes.push(nc);

  // Blast impulse
  const blastR = PHYS_R * 5, blastF = 0.012;
  for (const cb of cubes) {
    if (cb.id===nc.id) continue;
    const dx=cb.x-nx, dy=cb.y-ny, d=Math.sqrt(dx*dx+dy*dy);
    if (d<blastR && d>0) { const f=blastF/(d*6+0.01); cb.vx+=(dx/d)*f; cb.vy+=(dy/d)*f*0.5; }
  }

  // Boss hit?
  if (boss) {
    const dx=shotCube?shotCube.x-boss.x:nx-boss.x;
    const dy=shotCube?shotCube.y-boss.y:ny-boss.y;
  }

  // Particles
  spawnParticles(nx,ny,getCol(nv).f,18,0.009);
  if (nv>=16) spawnParticles(nx,ny,'#FFD700',8,0.006);
  shakeAmt = Math.min(14, Math.log2(nv+1)*1.6);

  // Score
  const pts = nv * mult * (diamondMult?2:1);
  score += pts;
  comboBar = Math.min(100, comboBar+40);
  comboTimer = 170;
  const nm = comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1;
  mult = nm;
  hammerChg = Math.min(100, hammerChg+20);
  floats.push({x:nx,y:ny,label:`+${mult>1?mult+'×':''}${pts}`,life:10,big:nv>=16});

  // Milestone
  if (CUBE_SEQ.includes(nv) && !seenMilestones.has(nv)) {
    seenMilestones.add(nv);
    showMilestone(nv);
  }

  // Gyro unlock at 500
  if (score>=500 && !gyroUnlocked) { gyroUnlocked=true; tiltBanner=130; }

  // Boss spawn
  if (score>=1000 && !boss && bossTimer<=0) { bossTimer=120; }

  // Conveyor speed creep
  convSpeed = Math.min(CONV_SPD*3.5, CONV_SPD + score*0.00000005);

  // Chain check
  setTimeout(()=>chainCheck(nc), 80);
  return nc;
}

function chainCheck(src, depth=0) {
  if (depth>5) return;
  for (const c of cubes) {
    if (c.id===src.id) continue;
    const dx=src.x-c.x, dy=src.y-c.y;
    if (Math.sqrt(dx*dx+dy*dy)<PHYS_R*2.0 && (c.value===src.value||c.value==='wildcard'||src.value==='wildcard')) {
      const nc2 = doMerge(src, c);
      chainCheck(nc2, depth+1);
      return;
    }
  }
}

function spawnParticles(x,y,color,count=12,speed=0.007) {
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2, s=speed*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      color,r:0.009+Math.random()*0.009,life:24+Math.random()*12,maxLife:36});
  }
}

// ═══════════════════════════════════════════════════════════════════
//  MILESTONE — floating text only, no blocking overlay
// ═══════════════════════════════════════════════════════════════════
function showMilestone(v) {
  // Push a large floating label into the floats array — no overlay
  floats.push({
    x: 0.5, y: 0.45,
    label: `✦ ${v} REACHED! ✦`,
    life: 90,   // ~1.5s at 60fps
    maxLife: 90,
    milestone: true,
    big: true,
  });
}

// ═══════════════════════════════════════════════════════════════════
//  SHOOT
// ═══════════════════════════════════════════════════════════════════
let aimX = 0.5; // normalized 0..1

function shoot() {
  if (!gameOn || paused || shotCube) return;
  const vl = wildcardNext ? 'wildcard' : curVal;
  wildcardNext = false;
  const vx = (aimX-0.5)*0.006;
  shotCube = newCube(aimX, 0.96, vx, -SHOT_SPD, vl);
}

// ═══════════════════════════════════════════════════════════════════
//  PHYSICS TICK
// ═══════════════════════════════════════════════════════════════════
function tick() {
  if (!gameOn || paused) return;
  frameCount++;

  // ── Conveyor: push all cubes toward player ──
  for (const c of cubes) {
    if (c.newborn>0) { c.newborn--; continue; }
    c.y += convSpeed;
  }
  if (boss) boss.y += convSpeed * 1.5;

  // ── Spawn new back row — always 5 cubes full width ──
  spawnTimer++;
  if (spawnTimer >= SPAWN_INTERVAL) {
    spawnTimer=0;
    const vals2=[2,4,2,4,8,2,4,8,16];
    for (let ci=0;ci<5;ci++) {
      const x=0.08+(ci/4)*0.84;
      cubes.push(newCube(x, 0.01, 0, 0, vals2[Math.floor(Math.random()*vals2.length)]));
    }
  }

  // ── Boss spawn ──
  if (bossTimer>0) {
    bossTimer--;
    if (bossTimer===0 && !boss) {
      const bv = score<3000?32:64;
      boss={x:0.5,y:0.04,vx:0,vy:0,hp:bv,maxHp:bv,flash:0,value:bv};
    }
  }

  // ── Physics: cubes ──
  const gx = gyroX * 0.4;
  for (const c of cubes) {
    if (c.newborn>0) continue;
    c.vx += gx;
    c.x  += c.vx; c.y += c.vy;
    c.vx *= FRIC; c.vy *= FRIC;
    if (c.x<PHYS_R)    { c.x=PHYS_R;    c.vx= Math.abs(c.vx)*BOUN; }
    if (c.x>1-PHYS_R)  { c.x=1-PHYS_R;  c.vx=-Math.abs(c.vx)*BOUN; }
    if (c.y<PHYS_R*0.5){ c.y=PHYS_R*0.5; c.vy=Math.abs(c.vy)*BOUN*0.4; }
    if (c.flash>0) c.flash--;
  }

  // ── Cube-cube collisions ──
  const N=cubes.length;
  for (let i=0;i<N;i++) {
    for (let j=i+1;j<N;j++) {
      const a=cubes[i], b=cubes[j];
      if (a.newborn>0||b.newborn>0) continue;
      const dx=a.x-b.x, dy=a.y-b.y;
      const d2=Math.sqrt(dx*dx+dy*dy);
      const md=PHYS_R*2;
      if (d2<md&&d2>0.0001) {
        const nx2=dx/d2,ny2=dy/d2, ov=(md-d2)*0.5;
        a.x+=nx2*ov; a.y+=ny2*ov;
        b.x-=nx2*ov; b.y-=ny2*ov;
        const rv=(a.vx-b.vx)*nx2+(a.vy-b.vy)*ny2;
        if (rv<0) {
          a.vx-=rv*nx2*0.4; a.vy-=rv*ny2*0.4;
          b.vx+=rv*nx2*0.4; b.vy+=rv*ny2*0.4;
        }
      }
    }
  }

  // ── Boss physics ──
  if (boss) {
    boss.x+=boss.vx; boss.y+=boss.vy;
    boss.vx*=0.90; boss.vy*=0.90;
    if (boss.x<0.12){boss.x=0.12;boss.vx=Math.abs(boss.vx)*0.5;}
    if (boss.x>0.88){boss.x=0.88;boss.vx=-Math.abs(boss.vx)*0.5;}
    if (boss.flash>0) boss.flash--;
  }

  // ── Shot cube ──
  if (shotCube) {
    shotCube.x+=shotCube.vx;
    shotCube.y+=shotCube.vy;
    if (shotCube.x<PHYS_R)   {shotCube.x=PHYS_R;   shotCube.vx=Math.abs(shotCube.vx)*BOUN;}
    if (shotCube.x>1-PHYS_R) {shotCube.x=1-PHYS_R; shotCube.vx=-Math.abs(shotCube.vx)*BOUN;}
    if (shotCube.y<PHYS_R*0.3){shotCube.y=PHYS_R*0.3; shotCube.vy=Math.abs(shotCube.vy)*BOUN*0.5;}

    // Boss collision
    if (boss) {
      const dx=shotCube.x-boss.x, dy=shotCube.y-boss.y;
      if (Math.sqrt(dx*dx+dy*dy)<PHYS_R*2.6) {
        boss.hp -= shotCube.value==='wildcard'?8:shotCube.value;
        boss.flash=10; boss.vx+=(dx/Math.max(0.01,Math.sqrt(dx*dx+dy*dy)))*0.005;
        boss.vy-=0.007;
        shakeAmt=8;
        spawnParticles(boss.x,boss.y,'#FF4400',14,0.009);
        floats.push({x:boss.x,y:boss.y,label:`-${shotCube.value}`,life:9,big:true});
        shotCube=null;
        if (boss.hp<=0) killBoss();
      }
    }

    if (shotCube) {
      let merged=false;
      for (const c of cubes) {
        const dx=shotCube.x-c.x, dy=shotCube.y-c.y;
        const d2=Math.sqrt(dx*dx+dy*dy);
        if (d2<PHYS_R*1.92) {
          if (shotCube.value===c.value||shotCube.value==='wildcard'||c.value==='wildcard') {
            doMerge(shotCube, c);
            shotCube=null; merged=true; break;
          } else {
            // Physical bounce — feels like a real collision
            if (d2>0) {
              const nx2=dx/d2, ny2=dy/d2;
              const overlap=PHYS_R*1.92-d2;
              // Separate
              shotCube.x+=nx2*overlap*0.6; shotCube.y+=ny2*overlap*0.6;
              c.x-=nx2*overlap*0.4; c.y-=ny2*overlap*0.4;
              // Exchange momentum
              const sp=Math.sqrt(shotCube.vx**2+shotCube.vy**2);
              const relV=(shotCube.vx-c.vx)*nx2+(shotCube.vy-c.vy)*ny2;
              if (relV<0) {
                shotCube.vx-=relV*nx2*0.65; shotCube.vy-=relV*ny2*0.65;
                c.vx+=relV*nx2*0.65; c.vy+=relV*ny2*0.65;
              }
              shakeAmt=Math.max(shakeAmt,4);
              spawnParticles(c.x,c.y,getCol(c.value).f,5,0.004);
            }
          }
          break;
        }
      }
      // Shot settled — land as new static cube
      if (!merged && shotCube && Math.abs(shotCube.vy)<0.0007 && shotCube.y>0.07) {
        const land=shotCube; shotCube=null;
        land.vx=0; land.vy=0; cubes.push(land);
        comboBar=Math.max(0,comboBar-22);
        mult=comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1;
        chainCheck(land);
      }
    }

    if (!shotCube) {
      curVal=nxtVal; nxtVal=rndStart(); drawNextHUD();
    }
  }

  // ── Combo decay ──
  if (comboTimer>0) comboTimer--;
  else { comboBar=Math.max(0,comboBar-0.4); mult=comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1; }

  // ── Diamond timer ──
  if (diamondTimer>0) { diamondTimer--; if (!diamondTimer) diamondMult=false; }

  // ── Particles & floats ──
  particles=particles.filter(p=>p.life>0);
  for (const p of particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.0001; p.vx*=0.97; p.vy*=0.97; p.life--; }
  floats=floats.filter(f=>f.life>0);
  for (const f of floats) f.life--;

  // ── Shake decay ──
  shakeAmt*=0.76; if (shakeAmt<0.3) shakeAmt=0;

  // ── Tilt banner ──
  if (tiltBanner>0) tiltBanner--;
  if (hammerAnim>0) hammerAnim--;

  // ── Game over check ──
  for (const c of cubes) { if (c.y>0.92) { triggerGameOver(); return; } }
  if (boss && boss.y>0.92) { triggerGameOver(); return; }
}

function killBoss() {
  if (!boss) return;
  spawnParticles(boss.x,boss.y,'#FFD700',40,0.013);
  spawnParticles(boss.x,boss.y,'#FF4400',30,0.015);
  shakeAmt=20;
  score+=boss.maxHp*12;
  // Blast clear radius
  cubes=cubes.filter(c=>{
    const dx=c.x-boss.x, dy=c.y-boss.y;
    return Math.sqrt(dx*dx+dy*dy)>PHYS_R*5;
  });
  floats.push({x:0.5,y:0.45,label:`BOSS SLAIN! +${boss.maxHp*12}`,life:16,big:true});
  boss=null;
  bossTimer=BOSS_INTERVAL;
}

// ═══════════════════════════════════════════════════════════════════
//  DRAW FRAME
// ═══════════════════════════════════════════════════════════════════
function worldToCanvas(wx, wy) {
  // wy: 0=far(top), 1=near(bottom)
  const py = FAR_Y + (NEAR_Y-FAR_Y)*wy;
  const tw = FAR_W + (NEAR_W-FAR_W)*wy;
  const lx = VPX - tw/2;
  const px = lx + wx*tw;
  return {px,py,sc:tw/NEAR_W};
}

function drawFrame() {
  ctx.clearRect(0,0,TW,TH);

  const sh = shakeAmt>0?(Math.random()-0.5)*shakeAmt:0;
  const sv = shakeAmt>0?(Math.random()-0.5)*shakeAmt*0.55:0;
  ctx.save();
  if (shakeAmt>0) ctx.translate(sh,sv);

  // ── Background ──
  const bg=ctx.createLinearGradient(0,0,0,TH);
  bg.addColorStop(0,'#0a0a1a'); bg.addColorStop(1,'#161030');
  ctx.fillStyle=bg; ctx.fillRect(0,0,TW,TH);

  // ── 3D Track ──
  // Floor trapezoid
  ctx.beginPath();
  ctx.moveTo(VPX-FAR_W/2,FAR_Y); ctx.lineTo(VPX+FAR_W/2,FAR_Y);
  ctx.lineTo(VPX+NEAR_W/2,NEAR_Y); ctx.lineTo(VPX-NEAR_W/2,NEAR_Y);
  ctx.closePath();
  const flG=ctx.createLinearGradient(0,FAR_Y,0,NEAR_Y);
  flG.addColorStop(0,'#1a1440'); flG.addColorStop(0.5,'#1e1850'); flG.addColorStop(1,'#14102a');
  ctx.fillStyle=flG; ctx.fill();

  // Left wall
  ctx.beginPath();
  ctx.moveTo(VPX-FAR_W/2,FAR_Y); ctx.lineTo(VPX-NEAR_W/2,NEAR_Y);
  ctx.lineTo(VPX-NEAR_W/2-NEAR_W*0.06,NEAR_Y); ctx.lineTo(VPX-FAR_W/2-FAR_W*0.06,FAR_Y);
  ctx.closePath();
  const lwG=ctx.createLinearGradient(0,FAR_Y,0,NEAR_Y);
  lwG.addColorStop(0,'#4a2880'); lwG.addColorStop(1,'#6a3aaa');
  ctx.fillStyle=lwG; ctx.fill();
  // Left wall top edge
  ctx.beginPath();
  ctx.moveTo(VPX-FAR_W/2-FAR_W*0.06,FAR_Y-FAR_W*0.04);
  ctx.lineTo(VPX-FAR_W/2,FAR_Y);
  ctx.lineTo(VPX-NEAR_W/2,NEAR_Y);
  ctx.lineTo(VPX-NEAR_W/2-NEAR_W*0.06,NEAR_Y-NEAR_W*0.04);
  ctx.closePath(); ctx.fillStyle='#8855cc'; ctx.fill();

  // Right wall
  ctx.beginPath();
  ctx.moveTo(VPX+FAR_W/2,FAR_Y); ctx.lineTo(VPX+NEAR_W/2,NEAR_Y);
  ctx.lineTo(VPX+NEAR_W/2+NEAR_W*0.06,NEAR_Y); ctx.lineTo(VPX+FAR_W/2+FAR_W*0.06,FAR_Y);
  ctx.closePath(); ctx.fillStyle=lwG; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(VPX+FAR_W/2+FAR_W*0.06,FAR_Y-FAR_W*0.04);
  ctx.lineTo(VPX+FAR_W/2,FAR_Y);
  ctx.lineTo(VPX+NEAR_W/2,NEAR_Y);
  ctx.lineTo(VPX+NEAR_W/2+NEAR_W*0.06,NEAR_Y-NEAR_W*0.04);
  ctx.closePath(); ctx.fillStyle='#8855cc'; ctx.fill();

  // Top wall (back)
  ctx.beginPath();
  ctx.moveTo(VPX-FAR_W/2-FAR_W*0.06,FAR_Y-FAR_W*0.04);
  ctx.lineTo(VPX+FAR_W/2+FAR_W*0.06,FAR_Y-FAR_W*0.04);
  ctx.lineTo(VPX+FAR_W/2,FAR_Y);
  ctx.lineTo(VPX-FAR_W/2,FAR_Y);
  ctx.closePath(); ctx.fillStyle='#9966dd'; ctx.fill();

  // Track glow
  const tgG=ctx.createRadialGradient(VPX,FAR_Y,0,VPX,FAR_Y,120);
  tgG.addColorStop(0,'rgba(120,70,220,0.18)'); tgG.addColorStop(1,'transparent');
  ctx.fillStyle=tgG; ctx.fillRect(0,0,TW,TH);

  // Perspective grid lines
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(VPX-FAR_W/2,FAR_Y); ctx.lineTo(VPX+FAR_W/2,FAR_Y);
  ctx.lineTo(VPX+NEAR_W/2,NEAR_Y); ctx.lineTo(VPX-NEAR_W/2,NEAR_Y);
  ctx.closePath(); ctx.clip();
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for (let g=0;g<=COLS;g++) {
    const f=g/COLS, {px:px0,py:py0}=worldToCanvas(f,0.02), {px:px1,py:py1}=worldToCanvas(f,1.0);
    ctx.beginPath(); ctx.moveTo(px0,py0); ctx.lineTo(px1,py1); ctx.stroke();
  }
  for (let g=0;g<=10;g++) {
    const wy=g/10, {px:lx,py}=worldToCanvas(0,wy), {px:rx}=worldToCanvas(1,wy);
    ctx.beginPath(); ctx.moveTo(lx,py); ctx.lineTo(rx,py); ctx.stroke();
  }
  ctx.restore();

  // ── Danger line ──
  const DANGER_WY = 0.80; // world-y of danger
  const {px:dlx,py:dly}=worldToCanvas(0,DANGER_WY);
  const {px:drx}=worldToCanvas(1,DANGER_WY);
  ctx.save();
  ctx.strokeStyle='#ff2222'; ctx.lineWidth=3.5;
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=16;
  ctx.setLineDash([14,9]);
  ctx.beginPath(); ctx.moveTo(dlx,dly); ctx.lineTo(drx,dly); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,40,40,0.7)'; ctx.font='bold 9px system-ui';
  ctx.textAlign='right'; ctx.shadowBlur=0;
  ctx.fillText('▼ DANGER', drx-4, dly-5);
  ctx.textAlign='left'; ctx.restore();

  // ── Static cubes (sort far→near) ──
  const sorted=[...cubes].sort((a,b)=>a.y-b.y);
  for (const c of sorted) {
    const {px,py,sc}=worldToCanvas(c.x,c.y);
    const cw=PHYS_R*2*sc*NEAR_W*0.95, ch=cw;
    drawCube(px-cw/2, py-ch/2, cw, ch, c.value, 1, c.flash, c.special);
  }

  // ── Boss ──
  if (boss) {
    const {px,py,sc}=worldToCanvas(boss.x,boss.y);
    const cw=PHYS_R*2*sc*NEAR_W*1.65, ch=cw;
    ctx.save(); ctx.shadowColor='#FF2200'; ctx.shadowBlur=24;
    drawCube(px-cw/2,py-ch/2,cw,ch,boss.value,1,boss.flash,null,boss.hp,boss.maxHp);
    ctx.restore();
  }
  if (bossTimer>0 && bossTimer<90) {
    ctx.save();
    ctx.globalAlpha=bossTimer%18<9?0.9:0.3;
    ctx.fillStyle='#ff2200'; ctx.font='bold 17px system-ui'; ctx.textAlign='center';
    ctx.fillText('⚠ BOSS INCOMING ⚠',VPX,TH*0.45);
    ctx.textAlign='left'; ctx.restore();
  }

  // ── Shot cube (with trail) ──
  if (shotCube) {
    const {px,py,sc}=worldToCanvas(shotCube.x,shotCube.y);
    const cw=PHYS_R*2*sc*NEAR_W*0.95, ch=cw;
    // Trail
    for (let t=1;t<=4;t++) {
      const tx=shotCube.x-shotCube.vx*t*2.5, ty=shotCube.y-shotCube.vy*t*2.5;
      if (ty<0||ty>1) continue;
      const {px:tpx,py:tpy,sc:tsc}=worldToCanvas(tx,ty);
      const tw2=PHYS_R*2*tsc*NEAR_W*0.78;
      ctx.save(); ctx.globalAlpha=(0.5-t*0.1)*0.6;
      ctx.fillStyle=getCol(shotCube.value).f;
      ctx.beginPath(); ctx.arc(tpx,tpy,tw2*0.3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    drawCube(px-cw/2,py-ch/2,cw,ch,shotCube.value,1,0,shotCube.value==='wildcard'?'wildcard':null);
  }

  // ── Shooter (at bottom, with aim line) ──
  if (gameOn && !paused && !shotCube) {
    const {px:sx,py:sy,sc:ssc}=worldToCanvas(aimX,0.96);
    const cw=PHYS_R*2*ssc*NEAR_W*0.95, ch=cw;
    // Aim line
    const {px:tx2,py:ty2}=worldToCanvas(aimX,0.08);
    const lineG=ctx.createLinearGradient(sx,sy,tx2,ty2);
    lineG.addColorStop(0,'rgba(255,255,255,0.55)'); lineG.addColorStop(1,'rgba(255,255,255,0.03)');
    ctx.save(); ctx.strokeStyle=lineG; ctx.lineWidth=2.5;
    ctx.shadowColor='rgba(255,255,255,0.4)'; ctx.shadowBlur=8;
    ctx.setLineDash([0]); ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(tx2,ty2); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();
    // Dots on aim line
    for (let dt=1;dt<=5;dt++) {
      const dy2=0.96-dt*0.14;
      if (dy2<0.08) break;
      const {px:dpx,py:dpy}=worldToCanvas(aimX,dy2);
      ctx.save(); ctx.globalAlpha=0.5-dt*0.08;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(dpx,dpy,2.5-dt*0.3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    // Shooter cube
    drawCube(sx-cw/2,sy-ch/2,cw,ch,wildcardNext?'wildcard':curVal);
    // Glow ring
    const glR=ctx.createRadialGradient(sx,sy+8,2,sx,sy+8,24*ssc);
    glR.addColorStop(0,'rgba(94,231,223,0.22)'); glR.addColorStop(1,'transparent');
    ctx.fillStyle=glR; ctx.beginPath(); ctx.ellipse(sx,sy+10,26*ssc,7*ssc,0,0,Math.PI*2); ctx.fill();
  }

  // ── Particles ──
  for (const p of particles) {
    const {px,py,sc}=worldToCanvas(p.x,p.y);
    ctx.save(); ctx.globalAlpha=(p.life/p.maxLife)*0.85;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(px,py,Math.max(1,p.r*sc*NEAR_W),0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── Floating labels ──
  for (const f of floats) {
    const {px,py}=worldToCanvas(f.x,f.y);
    const maxL = f.maxLife || 10;
    const age = 1 - f.life / maxL;
    // fade in for first 10%, stay, fade out last 30%
    let alpha = 1;
    if (age < 0.1) alpha = age / 0.1;
    else if (age > 0.7) alpha = 1 - (age - 0.7) / 0.3;
    ctx.save(); ctx.globalAlpha = alpha;
    if (f.milestone) {
      ctx.fillStyle = '#FFD700';
      ctx.font = `900 ${Math.round(TW * 0.062)}px system-ui`;
      ctx.textAlign = 'center';
      ctx.shadowColor = '#FF8800'; ctx.shadowBlur = 18;
      ctx.fillText(f.label, px, py - age * 30);
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = f.label.startsWith('-') ? '#FF5555' : f.big ? '#FFD700' : '#fff';
      ctx.font = `800 ${f.big ? 16 : 13}px system-ui`;
      ctx.textAlign = 'center'; ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
      ctx.fillText(f.label, px, py - age * 42);
      ctx.shadowBlur = 0;
    }
    ctx.textAlign = 'left'; ctx.restore();
  }

  // ── Diamond active flash ──
  if (diamondMult) {
    ctx.save(); ctx.globalAlpha=0.08;
    ctx.fillStyle='#FFD700'; ctx.fillRect(0,0,TW,TH); ctx.restore();
    ctx.save(); ctx.fillStyle='rgba(255,215,0,0.6)'; ctx.font='bold 9px system-ui'; ctx.textAlign='center';
    ctx.fillText('💎 ×2 ACTIVE',VPX,FAR_Y-6); ctx.textAlign='left'; ctx.restore();
  }

  // ── Hammer animation ──
  if (hammerAnim>0) {
    const t2=1-hammerAnim/28;
    ctx.save(); ctx.globalAlpha=hammerAnim>14?1:hammerAnim/14;
    ctx.font=`${62+Math.sin(t2*Math.PI)*20}px serif`; ctx.textAlign='center';
    ctx.fillText('🔨',VPX,TH*0.18+t2*TH*0.42);
    ctx.textAlign='left'; ctx.restore();
  }

  // ── Tilt banner ──
  if (tiltBanner>0) {
    const op=Math.min(1,tiltBanner/15)*Math.min(1,tiltBanner/15);
    ctx.save(); ctx.globalAlpha=op;
    const bw=TW-40, bh=52, bx=20, by=TH/2-bh/2-30;
    ctx.fillStyle='rgba(10,6,30,0.92)';
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,12); ctx.fill();
    ctx.strokeStyle='rgba(0,200,255,0.5)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,12); ctx.stroke();
    ctx.fillStyle='#00EAFF'; ctx.font='bold 14px system-ui'; ctx.textAlign='center';
    ctx.fillText('📱 Tilt Control Unlocked!',VPX,by+20);
    ctx.fillStyle='rgba(0,200,255,0.6)'; ctx.font='11px system-ui';
    ctx.fillText('Tilt device to slide cubes',VPX,by+38);
    ctx.textAlign='left'; ctx.restore();
  }

  // ── Game over canvas text ──
  if (!gameOn) {
    ctx.save(); ctx.fillStyle='rgba(8,6,20,0.8)'; ctx.fillRect(0,0,TW,TH);
    ctx.fillStyle='#FF4444'; ctx.font='bold 38px system-ui'; ctx.textAlign='center';
    ctx.shadowColor='#FF0000'; ctx.shadowBlur=24;
    ctx.fillText('GAME OVER',VPX,TH/2-28);
    ctx.shadowBlur=0; ctx.fillStyle='#ccc'; ctx.font='17px system-ui';
    ctx.fillText('Score: '+score.toLocaleString(),VPX,TH/2+10);
    ctx.textAlign='left'; ctx.restore();
  }

  ctx.restore(); // shake
}

// ─── HUD UPDATE ───────────────────────────────────────────────────
function drawNextHUD() {
  nextCtx.clearRect(0,0,44,44);
  drawMiniCube(nextCtx,4,8,32,32,wildcardNext?'wildcard':nxtVal);
}

function updateHUD() {
  document.getElementById('score-val').textContent=score.toLocaleString();
  document.getElementById('mult-val').textContent=mult+'×';
  document.getElementById('mult-fill').style.width=comboBar+'%';
  document.getElementById('hammer-fill').style.height=hammerChg+'%';
}

// ═══════════════════════════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════════════════════════
function triggerGameOver() {
  gameOn=false; shotCube=null;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1>GAME OVER</h1>
    <div style="color:#888;font-size:13px">Final Score</div>
    <div class="score-big">${score.toLocaleString()}</div>
    <button class="play-btn" id="startBtn">PLAY AGAIN</button>
  `;
  ov.classList.remove('hidden');
  document.getElementById('startBtn').addEventListener('click',startGame);
}

// ═══════════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════════
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  resize();
  cubes=[]; particles=[]; floats=[];
  score=0; mult=1; comboBar=0; comboTimer=0;
  hammerChg=0; hammerAnim=0; shakeAmt=0;
  paused=false; shotCube=null; boss=null; bossTimer=0;
  convSpeed=CONV_SPD; spawnTimer=0; seenMilestones=new Set();
  gyroX=0; gyroUnlocked=false; tiltBanner=0;
  wildcardNext=false; diamondMult=false; diamondTimer=0;
  frameCount=0;
  curVal=rndStart(); nxtVal=rndStart();
  aimX=0.5;
  spawnInitial();
  drawNextHUD();
  gameOn=true;
}

// ═══════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════
function loop() {
  tick();
  drawFrame();
  if (frameCount%4===0) updateHUD();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════════
function getAimFromClient(clientX) {
  const rect=canvas.getBoundingClientRect();
  const mx=(clientX-rect.left)*(TW/rect.width);
  const lx=VPX-NEAR_W/2;
  return Math.max(0.04,Math.min(0.96,(mx-lx)/NEAR_W));
}

canvas.addEventListener('mousemove',e=>{ if(gameOn&&!paused) aimX=getAimFromClient(e.clientX); });
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); if(gameOn&&!paused) aimX=getAimFromClient(e.touches[0].clientX); },{passive:false});
canvas.addEventListener('click',e=>{ aimX=getAimFromClient(e.clientX); shoot(); });
canvas.addEventListener('touchend',e=>{ e.preventDefault(); shoot(); },{passive:false});

// Hammer icon click
document.getElementById('hammer-icon').addEventListener('click',()=>{
  if (!gameOn||hammerChg<100) return;
  hammerAnim=28; hammerChg=0; shakeAmt=16;
  const sorted2=[...cubes].sort((a,b)=>b.y-a.y);
  spawnParticles(0.5,0.75,'#FF8800',28,0.011);
  const toRemove=sorted2.slice(0,Math.min(8,cubes.length)).map(c=>c.id);
  cubes=cubes.filter(c=>!toRemove.includes(c.id));
});

// Boosters
document.getElementById('boost-rainbow').addEventListener('click',()=>{
  if (!gameOn||paused) return;
  wildcardNext=true; drawNextHUD();
});
document.getElementById('boost-swap').addEventListener('click',()=>{
  if (!gameOn||paused) return;
  [curVal,nxtVal]=[nxtVal,curVal]; drawNextHUD();
});
document.getElementById('boost-bomb').addEventListener('click',()=>{
  if (!gameOn||paused) return;
  const cx=aimX;
  const toKill=cubes.filter(c=>{
    const dx=c.x-cx;
    return Math.abs(dx)<PHYS_R*5 && c.y>0.5;
  });
  toKill.forEach(c=>{ spawnParticles(c.x,c.y,getCol(c.value).f,14,0.009); score+=c.value; });
  cubes=cubes.filter(c=>!toKill.includes(c));
  shakeAmt=10;
});

document.getElementById('btn-pause').addEventListener('click',()=>{
  if (!gameOn) return; paused=!paused;
  document.getElementById('btn-pause').textContent=paused?'▶':'⏸';
});
document.getElementById('btn-sound').addEventListener('click',()=>{
  soundOn=!soundOn;
  document.getElementById('btn-sound').textContent=soundOn?'🔊':'🔇';
});

// Gyroscope
window.addEventListener('deviceorientation',e=>{
  if (!gyroUnlocked) return;
  gyroX=Math.max(-1,Math.min(1,(e.gamma||0)/30))*0.00022;
});

document.getElementById('startBtn').addEventListener('click',startGame);
window.addEventListener('resize',()=>{ resize(); });

resize();
loop();
</script>
</body>
</html>
