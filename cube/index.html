<script type="module">
import * as THREE from 'three';

import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';

function buildStarfield(){
  const sf=document.getElementById('starfield');if(!sf)return;sf.innerHTML='';
  function layer(count,size,dur,op){
    const cv=document.createElement('canvas');cv.width=600;cv.height=600;const ctx=cv.getContext('2d');
    for(let i=0;i<count;i++){const x=Math.random()*600,y=Math.random()*600,r=Math.random()*size+0.3;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${0.4+Math.random()*0.6})`;ctx.fill();}
    const div=document.createElement('div');div.className='star-layer';
    div.style.backgroundImage=`url(${cv.toDataURL()})`;div.style.backgroundRepeat='repeat';
    div.style.backgroundSize='600px 600px';div.style.opacity=op;div.style.animation=`warpStars ${dur}s linear infinite`;
    sf.appendChild(div);
  }
  layer(160,1.6,38,0.9);layer(220,1.0,68,0.7);layer(300,0.6,105,0.5);
}
buildStarfield();

const SEQ=[2,4,8,16,32,64,128,256,512,1024,2048,4096];
const PAL={
  2:{hex:0x3ecf5a,glow:0x2aff5a},4:{hex:0x8b5cf6,glow:0xa070ff},8:{hex:0xf97316,glow:0xffaa44},
  16:{hex:0x14b8a6,glow:0x44e0c8},32:{hex:0xf5b50a,glow:0xffd24a},64:{hex:0x0ea5e9,glow:0x44ccff},
  128:{hex:0x3b82f6,glow:0x77aaff},256:{hex:0xe11d48,glow:0xff3366},512:{hex:0xec4899,glow:0xff66bb},
  1024:{hex:0x7c3aed,glow:0xaa66ff},2048:{hex:0xFFD700,glow:0xffee44},4096:{hex:0xff5500,glow:0xff8844},
};
function gp(v){return PAL[v]||{hex:0xcc44ff,glow:0xff88ff}}
function nextVal(v){const i=SEQ.indexOf(v);return i>=0&&i+1<SEQ.length?SEQ[i+1]:v*2}

const COLS=5;
const CUBE_SZ=1.6;
const COL_W=CUBE_SZ+0.3;
const TRACK_W=COLS*COL_W;
const TRACK_L=36;
const DANGER_Z=13.5;        // ★ κόκκινη γραμμή πολύ κοντά στον shooter
const SHOOTER_Z=16.0;
const X_LIMIT=TRACK_W/2-CUBE_SZ/2;
const Z_BACK=-TRACK_L/2 + CUBE_SZ/2;

const ROW_STEP    = CUBE_SZ + 0.06;
const RAMP_HOME_Z = -TRACK_L/2 + 0.3;
const SPAWN_Z     = RAMP_HOME_Z + 0.88;
const RAMP_PUSH_Z = SPAWN_Z + CUBE_SZ + 0.8;
const RAMP_SPEED  = 7.0;

const LS_KEY='mergeCubes3D_highscore';
let highScore=parseInt(localStorage.getItem(LS_KEY)||'0',10);
document.getElementById('highscore-val').textContent=highScore.toLocaleString();

function getISOWeek(d){
  const date=new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const week1=new Date(date.getFullYear(),0,4);
  return 1+Math.round(((date.getTime()-week1.getTime())/86400000-3+(week1.getDay()+6)%7)/7);
}
function getWeekKey(){
  const now=new Date();
  return `mergeCubes3D_weekly_${now.getFullYear()}_w${getISOWeek(now)}`;
}
function getWeeklyLeaderboard(){
  try{return JSON.parse(localStorage.getItem(getWeekKey())||'[]')}catch(e){return[]}
}
function saveWeeklyLeaderboard(lb){localStorage.setItem(getWeekKey(),JSON.stringify(lb));}
function addToWeeklyLeaderboard(s){
  const lb=getWeeklyLeaderboard();
  const now=new Date();
  const dateStr=now.toLocaleDateString('el-GR',{day:'2-digit',month:'2-digit',year:'2-digit'});
  const timeStr=now.toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'});
  lb.push({score:s,date:`${dateStr} ${timeStr}`});
  lb.sort((a,b)=>b.score-a.score);
  const top10=lb.slice(0,10);
  saveWeeklyLeaderboard(top10);
  return top10;
}
function saveHighScoreIfNeeded(s){
  if(s>highScore){highScore=s;localStorage.setItem(LS_KEY,highScore);
    document.getElementById('highscore-val').textContent=highScore.toLocaleString();}
}
function updateRankScoreDisplay(s){
  document.getElementById('rank-score-display').textContent='Score: '+s.toLocaleString();
}

function openLeaderboardModal(){
  const modal=document.getElementById('modal-leaderboard');
  const list=document.getElementById('modal-lb-list');
  document.getElementById('modal-current-score').textContent='Your Score: '+score.toLocaleString();
  const lb=getWeeklyLeaderboard();
  let html='';
  if(lb.length===0){html='<div class="lb-empty">No scores yet this week</div>';}
  else{lb.forEach((e,i)=>{html+=`<div class="lb-entry"><span class="lb-rank">#${i+1}</span><span class="lb-score">${e.score.toLocaleString()}</span><span class="lb-date">${e.date}</span></div>`});}
  list.innerHTML=html;modal.classList.add('active');
}
document.getElementById('btn-rank').addEventListener('click',openLeaderboardModal);
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal-leaderboard').classList.remove('active'));
document.getElementById('modal-leaderboard').addEventListener('click',(e)=>{if(e.target===document.getElementById('modal-leaderboard'))document.getElementById('modal-leaderboard').classList.remove('active')});

const wrap=document.getElementById('canvas-wrap');
const canvas=document.getElementById('three-canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080614);
scene.fog=new THREE.Fog(0x080614,46,92);

const camera=new THREE.PerspectiveCamera(70,1,0.1,250);
camera.position.set(0, 42, 0);
camera.lookAt(0, 0, 0);

const ambient=new THREE.AmbientLight(0x7766cc,0.65);scene.add(ambient);
const keyLight=new THREE.DirectionalLight(0xffffff,1.4);
keyLight.position.set(5,22,13);keyLight.castShadow=true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.camera.left=-12;keyLight.shadow.camera.right=12;
keyLight.shadow.camera.top=30;keyLight.shadow.camera.bottom=-30;
keyLight.shadow.camera.near=0.5;keyLight.shadow.camera.far=70;
keyLight.shadow.bias=-0.0005;scene.add(keyLight);
const fillLight=new THREE.DirectionalLight(0x9977ff,0.5);fillLight.position.set(-7,13,9);scene.add(fillLight);
const rimLight=new THREE.PointLight(0xaa88ff,2.8,60);rimLight.position.set(0,10,-20);scene.add(rimLight);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(1,1),0.65,0.85,0.85));

const starGeo=new THREE.BufferGeometry();
const starN=2600;const stp=new Float32Array(starN*3);
for(let i=0;i<starN;i++){const r=55+Math.random()*100,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
  stp[i*3]=r*Math.sin(ph)*Math.cos(th);stp[i*3+1]=r*Math.cos(ph)*0.7+6;stp[i*3+2]=r*Math.sin(ph)*Math.sin(th);}
starGeo.setAttribute('position',new THREE.BufferAttribute(stp,3));
const spaceStars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xddccff,size:0.4,sizeAttenuation:true,
  transparent:true,opacity:0.95,blending:THREE.AdditiveBlending,fog:false}));
scene.add(spaceStars);
function addNebula(x,y,z,color,size,op){const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,fog:false});
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(size,size),m);mesh.position.set(x,y,z);mesh.lookAt(camera.position);scene.add(mesh)}
addNebula(-30,9,-46,0x5522aa,56,0.16);addNebula(34,15,-52,0xaa2266,62,0.13);addNebula(0,27,-64,0x3344bb,78,0.11);

function buildTrack(){
  const g=new THREE.Group();
  const W=TRACK_W,L=TRACK_L,wallT=0.5,wallH=1.7;
  const floorMat=new THREE.MeshStandardMaterial({color:0x221c55,roughness:0.5,metalness:0.2});
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(W,L),floorMat);
  floor.rotation.x=-Math.PI/2;floor.position.y=0.01;floor.receiveShadow=true;g.add(floor);

  const lineMat=new THREE.LineBasicMaterial({color:0x6655aa,transparent:true,opacity:0.35});
  for(let i=0;i<=COLS;i++){
    const x=-W/2+i*(W/COLS);
    const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,0.02,-L/2),new THREE.Vector3(x,0.02,L/2)]);

function bumpCombo(){

function tryMerge(a,b){
  const nv=nextVal(a.value);
  if(nv>maxReached)maxReached=nv;
  const px=(a.body.position.x+b.body.position.x)/2;
  const py=Math.max(CUBE_SZ/2+.1,(a.body.position.y+b.body.position.y)/2);
  const pz=(a.body.position.z+b.body.position.z)/2;
  removeCube(a);removeCube(b);
  const nc=spawnCube(px,py,pz,nv);nc.flash=12;nc.mergeActive=true;nc.mergeCooldown=0.5;
  nc.body.velocity.set((Math.random()-.5)*3,6.5,(Math.random()-.5)*3);
  nc.body.angularVelocity.set((Math.random()-.5)*9,(Math.random()-.5)*9,(Math.random()-.5)*9);

  for(const c2 of cubes){if(c2.id===nc.id)continue;
    const dx=c2.body.position.x-px,dy=c2.body.position.y-py,dz=c2.body.position.z-pz;const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<3.5&&d>0.1){const f=7/(d+.3);c2.body.applyImpulse(new CANNON.Vec3((dx/d)*f,2.5,(dz/d)*f),new CANNON.Vec3(0,0,0))}}

  const pal=gp(nv);
  spawnShards(px,py,pz,gp(a.value).hex,16);
  spawnParticles(px,py,pz,pal.glow,24,7);
  spawnParticles(px,py,pz,0xff6600,18,5);
  if(nv>=16)spawnParticles(px,py,pz,0xFFD700,14,7);
  spawnFlashSphere(px,py,pz,pal.glow);spawnFlashSphere(px,py,pz,0xff8800);
  bumpCombo();
  const pts=nv*mult;addScore(pts);
  hammerChg=Math.min(100,hammerChg+18);
  shakeAmt=Math.min(.55,.1+Math.log2(nv)*.03);
  const lt=nv>=64?'points-mega':nv>=16?'points-big':'points';
  floatText(px,py+.6,pz,`+${mult>1?mult+'× ':''}${pts}`,lt);
  if(SEQ.includes(nv)&&!seenMS.has(nv)){seenMS.add(nv);floatText(0,3,0,`✦ ${nv} REACHED! ✦`,'milestone');audio.milestone()}
  audio.mergeBoom();
  return nc;
}

function sweepMerges(){
  let iter=0;
  const MERGE_THRESHOLD=(CUBE_SZ*1.7)*(CUBE_SZ*1.7);
  while(iter<16){iter++;let merged=false;
    outer:for(let i=0;i<cubes.length;i++){for(let j=i+1;j<cubes.length;j++){
      const a=cubes[i],b=cubes[j];
      if(a.value!==b.value)continue;
      if(a.mergeCooldown>0||b.mergeCooldown>0)continue;
      const dx=a.body.position.x-b.body.position.x,dy=a.body.position.y-b.body.position.y,dz=a.body.position.z-b.body.position.z;
      if(dx*dx+dy*dy+dz*dz<MERGE_THRESHOLD){
        const nc=tryMerge(a,b);
        if(a===shotCube||b===shotCube)shotCube=nc;
        merged=true;break outer;
      }
    }}if(!merged)break;
  }
}

    if(nextMilestone%2000===0){freeBomb++;floatText(0,3.2,DANGER_Z-3,'🎁 +💣 BOMB','gift');}
    if(nextMilestone%3000===0){freeRainbow++;floatText(0,3.2,DANGER_Z-3,'🎁 +🌈 RAINBOW','gift');}
    nextMilestone+=1000;audio.gift();updateBoosterBadges();
  }
}
function updateBoosterBadges(){
  const bb=document.getElementById('badge-bomb'),rb=document.getElementById('badge-rainbow');
  const bWrap=document.getElementById('boost-bomb'),rWrap=document.getElementById('boost-rainbow');
  if(freeBomb>0){bb.textContent='🎁 ×'+freeBomb;bb.classList.add('free');bWrap.classList.remove('locked');bWrap.classList.add('ready');}
  else{bb.textContent='▶ AD';bb.classList.remove('free');bWrap.classList.add('locked');bWrap.classList.remove('ready');}
  if(freeRainbow>0){rb.textContent='🎁 ×'+freeRainbow;rb.classList.add('free');rWrap.classList.remove('locked');rWrap.classList.add('ready');}
  else{rb.textContent='▶ AD';rb.classList.remove('free');rWrap.classList.add('locked');rWrap.classList.remove('ready');}
}

function shoot(){
  if(!gameOn||paused)return;
  // ★ Αν υπάρχει ήδη εκτοξευμένος κύβος, τον "ελευθερώνουμε" αμέσως
  if(shotCube){
    shotCube.isShot=false;
    shotCube.mergeCooldown=0.3;
    shotCube=null;
  }
  if(!gameStarted){gameStarted=true;}
  audio.init();audio.launch();
  const isRainbow=rainbowArmed;rainbowArmed=false;
  shotCube=spawnCube(aimX,CUBE_SZ/2+.3,SHOOTER_Z,curVal,{isShot:true,rainbow:isRainbow});
  shotCube._rainbow=isRainbow;shotCube.mergeActive=true;
  shotCube.body.velocity.set(0,2.5,-45);
  chainCount=0;
  curVal=nxtVal;nxtVal=rndStart();drawNextHUD();
}

function rainbowClear(refCube){
  audio.boom();shakeAmt=.5;
  const col=Math.round((refCube.body.position.x+TRACK_W/2-COL_W/2)/COL_W);
  const targetX=-TRACK_W/2+COL_W/2+col*COL_W;
  for(let i=cubes.length-1;i>=0;i--){const c=cubes[i];if(c.isShot)continue;
    if(Math.abs(c.body.position.x-targetX)<COL_W*0.9){spawnShards(c.body.position.x,c.body.position.y,c.body.position.z,gp(c.value).hex,8);addScore(c.value);removeCube(c)}}
  floatText(targetX,2,DANGER_Z-2,'CLEARED!','points-big');
}

function triggerRampSpawn(){
  if(rampState!=='idle'||!gameOn||paused||!rampBody)return;
  rampBody.position.set(0,0.55,RAMP_HOME_Z);
  rampBody.velocity.set(0,0,RAMP_SPEED);
  if(rampMesh){rampMesh.position.z=RAMP_HOME_Z;rampMesh.visible=true;}
  rampState='pushing';
  audio.thud();
}

let lastT=performance.now();
function update(){
  if(isOverlayVisible){requestAnimationFrame(update);return;}
  const now=performance.now(),dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  spaceStars.rotation.y+=dt*0.008;

  if(gameOn&&!paused&&gameStarted){

    for(const c of cubes){if(c.mergeCooldown>0)c.mergeCooldown-=dt}

    if(rampState==='idle'){
      rowTimer+=dt;
      const interval=Math.max(2.4,ROW_INTERVAL-score*0.000015);
      const liveCubes=cubes.filter(c=>!c.isShot).length;
      if(rowTimer>=interval||liveCubes<=2){rowTimer=0;triggerRampSpawn();}
    }

    if(rampBody){
      if(rampState==='pushing'){
        rampBody.velocity.set(0,0,RAMP_SPEED);
        if(rampBody.position.z>=RAMP_PUSH_Z){
          rampBody.position.z=RAMP_PUSH_Z;
          rampBody.velocity.set(0,0,-RAMP_SPEED*2);
          rampState='retracting';
        }
      } else if(rampState==='retracting'){
        if(rampBody.position.z<=RAMP_HOME_Z){
          rampBody.position.set(0,0.55,RAMP_HOME_Z);
          rampBody.velocity.set(0,0,0);
          rampState='idle';
          if(rampMesh)rampMesh.visible=false;
          spawnRow(SPAWN_Z);
        }
      }
    }

    world.step(1/60,dt,4);
    if(rampMesh&&rampBody)rampMesh.position.z=rampBody.position.z;

    const settling=(rampState==='idle');
    for(const c of cubes){
      if(c.flash>0)c.flash--;

      if(c.body.position.x>X_LIMIT){c.body.position.x=X_LIMIT;if(c.body.velocity.x>0)c.body.velocity.x*=-0.5;}
      else if(c.body.position.x<-X_LIMIT){c.body.position.x=-X_LIMIT;if(c.body.velocity.x<0)c.body.velocity.x*=-0.5;}
      if(c.body.position.z<Z_BACK){c.body.position.z=Z_BACK;if(c.body.velocity.z<0)c.body.velocity.z*=-0.5;}

      if(settling&&!c.isShot&&Math.abs(c.body.velocity.z)<0.6&&Math.abs(c.body.velocity.x)<0.6){
        let col=Math.round((c.body.position.x+TRACK_W/2-COL_W/2)/COL_W);
        col=Math.max(0,Math.min(COLS-1,col));
        const cx=-TRACK_W/2+COL_W/2+col*COL_W;
        c.body.position.x+=(cx-c.body.position.x)*0.18;c.body.velocity.x*=0.5;
      }
      c.mesh.position.copy(c.body.position);c.mesh.quaternion.copy(c.body.quaternion);
      const ei=c.flash>0?.28+(c.flash/12)*1.7:.28;
      c.mesh.material.forEach(m=>{if(m.emissiveIntensity!==undefined)m.emissiveIntensity=ei});
    }

    if(shotCube&&!shotCube._rainbow){
      const s=shotCube.body;
      const backDir=new THREE.Vector3(-s.velocity.x,-s.velocity.y,-s.velocity.z).normalize();
      const px=s.position.x+backDir.x*CUBE_SZ*0.7;
      const py=s.position.y+backDir.y*CUBE_SZ*0.7;
      const pz=s.position.z+backDir.z*CUBE_SZ*0.7;
      for(let i=0;i<3;i++){
        spawnTrailParticle(px+(Math.random()-.5)*0.5,py+(Math.random()-.5)*0.5,pz+(Math.random()-.5)*0.5,
          s.velocity.x*0.4,s.velocity.y*0.4,s.velocity.z*0.4);
      }
    }

    if(shotCube&&shotCube._rainbow){
      for(const c of cubes){if(c===shotCube||c.isShot)continue;
        const dx=c.body.position.x-shotCube.body.position.x,dz=c.body.position.z-shotCube.body.position.z;
        if(dx*dx+dz*dz<(CUBE_SZ*1.3)*(CUBE_SZ*1.3)){const ref=shotCube;removeCube(shotCube);shotCube=null;rainbowClear(ref);break;}
      }
      if(shotCube&&shotCube.body.position.z<-TRACK_L/2+2){const ref=shotCube;removeCube(shotCube);shotCube=null;rainbowClear(ref);}
    } else {
      sweepMerges();
      if(shotCube&&!cubes.includes(shotCube))shotCube=null;
      // ★ Δεν περιμένουμε πλέον να σταθεροποιηθεί για να ξαναρίξουμε – απλώς αν σταματήσει τελείως τον κάνουμε settle
      if(shotCube&&Math.abs(shotCube.body.velocity.z)<0.3&&shotCube.body.position.z>-TRACK_L/2+2){
        shotCube.isShot=false;shotCube.mergeCooldown=0.3;shotCube=null;
      }
      if(shotCube&&shotCube.body.position.z<-TRACK_L/2-1)shotCube=null;
    }

    if(comboTimer>0)comboTimer-=dt;
    else{comboBar=Math.max(0,comboBar-dt*16);mult=comboBar>=90?5:comboBar>=70?4:comboBar>=45?3:comboBar>=22?2:1}

    if(shakeAmt>0){
      camera.position.x=(Math.random()-.5)*shakeAmt*2;
      camera.position.y=42+(Math.random()-.5)*shakeAmt;
      shakeAmt*=.86;if(shakeAmt<.005){shakeAmt=0;camera.position.set(0,42,0);}
    }

    if(rampState==='idle'){
      for(const c of cubes){if(c.isShot)continue;
        if(c.body.position.z>DANGER_Z&&Math.abs(c.body.velocity.z)<1.2){triggerGameOver();return}
      }
    }
  }

  for(let i=flashSpheres.length-1;i>=0;i--){
    const fs=flashSpheres[i];fs.life-=dt;
    fs.mesh.scale.setScalar(fs.mesh.scale.x+fs.scaleSpeed*dt);
    fs.mat.opacity=Math.max(0,fs.life*1.8);
    if(fs.life<=0){scene.remove(fs.mesh);fs.mat.dispose();flashSpheres.splice(i,1)}
  }

  for(let i=trailParticles.length-1;i>=0;i--){
    const p=trailParticles[i];
    p.mesh.position.x+=p.vx*dt;p.mesh.position.y+=p.vy*dt;p.mesh.position.z+=p.vz*dt;
    p.vy+=1.5*dt;p.life-=p.decay*dt;
    p.mat.opacity=Math.max(0,p.life);p.mesh.scale.setScalar(0.3+p.life*0.7);
    if(p.life<=0){scene.remove(p.mesh);p.mat.dispose();trailParticles.splice(i,1)}
  }

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    p.mesh.position.x+=p.vx*dt;p.mesh.position.y+=p.vy*dt;p.mesh.position.z+=p.vz*dt;p.vy-=12*dt;p.life-=p.decay;
    if(p.shard){p.mesh.rotation.x+=p.rx*p.vrot*dt;p.mesh.rotation.y+=p.ry*p.vrot*dt;p.mesh.rotation.z+=p.rz*p.vrot*dt;
      if(p.mesh.position.y<0.15){p.mesh.position.y=0.15;p.vy*=-.4;p.vx*=.6;p.vz*=.6}}
    if(p.life<=0){scene.remove(p.mesh);p.mat.dispose();particles.splice(i,1)}
    else{p.mat.opacity=p.life;if(!p.shard)p.mesh.scale.setScalar(.6+p.life*.6)}}

  updateShooter();updateHUD();composer.render();requestAnimationFrame(update);
}

const scoreEl=document.getElementById('score-val'),multEl=document.getElementById('mult-val'),
  multFillEl=document.getElementById('mult-fill'),hammerFillEl=document.getElementById('hammer-fill'),
  hammerIconEl=document.getElementById('hammer-icon');
const nextCnv=document.getElementById('next-cnv'),nextCtx=nextCnv.getContext('2d');
function drawMiniCube(mc,cx,cy,sz,val){const pal=gp(val),d=sz*.22;
  mc.fillStyle='#'+pal.glow.toString(16).padStart(6,'0');mc.beginPath();
  mc.moveTo(cx-sz/2,cy);mc.lineTo(cx-sz/2+d,cy-d);mc.lineTo(cx+sz/2+d,cy-d);mc.lineTo(cx+sz/2,cy);
  mc.closePath();mc.fill();mc.fillStyle='rgba(0,0,0,.4)';mc.beginPath();
  mc.moveTo(cx+sz/2,cy);mc.lineTo(cx+sz/2+d,cy-d);mc.lineTo(cx+sz/2+d,cy+sz-d);mc.lineTo(cx+sz/2,cy+sz);
  mc.closePath();mc.fill();mc.fillStyle='#'+pal.hex.toString(16).padStart(6,'0');mc.beginPath();
  mc.roundRect(cx-sz/2,cy,sz,sz,sz*.12);mc.fill();mc.fillStyle='#fff';
  mc.font=`800 ${Math.max(8,sz*(val>=100?.32:.46))}px Arial`;mc.textAlign='center';mc.textBaseline='middle';
  mc.fillText(val,cx,cy+sz/2)}
function drawNextHUD(){nextCtx.clearRect(0,0,40,40);drawMiniCube(nextCtx,20,8,24,nxtVal)}
let hudFrame=0;
function updateHUD(){hudFrame++;if(hudFrame%3)return;scoreEl.textContent=score.toLocaleString();
  multEl.textContent=mult+'×';multFillEl.style.width=comboBar+'%';hammerFillEl.style.height=hammerChg+'%';
  if(hammerChg>=100)hammerIconEl.classList.add('ready');else hammerIconEl.classList.remove('ready')}

function triggerGameOver(){
  gameOn=false;gameStarted=false;isOverlayVisible=true;
  if(shotCube){removeCube(shotCube);shotCube=null}
  saveHighScoreIfNeeded(score);addToWeeklyLeaderboard(score);updateRankScoreDisplay(score);
  audio.gameOver();
  document.getElementById('boosters').classList.remove('active');
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div id="space-bg"></div><div id="starfield"></div><h1>GAME OVER</h1>
    <div style="color:#aaa;font-size:13px;position:relative">Final Score</div>
    <div class="score-big">${score.toLocaleString()}</div>
    <div style="color:#ffaa33;font-size:15px;position:relative">All-Time Best: ${highScore.toLocaleString()}</div>
    <button class="play-btn" id="startBtn">PLAY AGAIN</button>`;
  buildStarfield();ov.classList.remove('hidden');
  document.getElementById('startBtn').addEventListener('click',startGame);
  document.getElementById('hud').classList.remove('active');
}

function startGame(){
  while(cubes.length)removeCube(cubes[0]);
  shotCube=null;
  for(let i=particles.length-1;i>=0;i--){scene.remove(particles[i].mesh);particles[i].mat.dispose()}particles.length=0;
  for(let i=trailParticles.length-1;i>=0;i--){scene.remove(trailParticles[i].mesh);trailParticles[i].mat.dispose()}trailParticles.length=0;
  for(let i=flashSpheres.length-1;i>=0;i--){scene.remove(flashSpheres[i].mesh);flashSpheres[i].mat.dispose()}flashSpheres.length=0;

  if(rampBody){world.removeBody(rampBody);rampBody=null;}
  if(rampMesh){scene.remove(rampMesh);rampMesh=null;}
  rampState='idle';

  if(!shooterMesh)makeShooter();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').classList.add('active');
  document.getElementById('boosters').classList.add('active');
  score=0;mult=1;comboBar=0;comboTimer=0;chainCount=0;hammerChg=0;paused=false;rainbowArmed=false;maxReached=2;
  rowTimer=0;seenMS=new Set();shakeAmt=0;isOverlayVisible=false;gameStarted=false;
  lastGiftScore=0;freeBomb=0;freeRainbow=0;giftFlip=0;nextMilestone=2000;
  updateBoosterBadges();updateRankScoreDisplay(0);
  document.getElementById('highscore-val').textContent=highScore.toLocaleString();
  camera.position.set(0,42,0);camera.lookAt(0,0,0);
  curVal=rndStart();nxtVal=rndStart();aimX=0;gameOn=true;

  const rampWidth=TRACK_W+0.4;
  rampBody=new CANNON.Body({type:CANNON.Body.KINEMATIC,material:wallMat,
    shape:new CANNON.Box(new CANNON.Vec3(rampWidth/2,0.55,0.24))});
  rampBody.position.set(0,0.55,RAMP_HOME_Z);rampBody.velocity.set(0,0,0);
  rampBody.collisionFilterGroup=4;
  rampBody.collisionFilterMask=1;
  world.addBody(rampBody);

  rampMesh=new THREE.Mesh(new THREE.BoxGeometry(rampWidth,0.45,0.48),
    new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.92}));
  rampMesh.position.set(0,0.32,RAMP_HOME_Z);rampMesh.visible=false;scene.add(rampMesh);

  // ★ 5 αρχικοί κύβοι διασκορπισμένοι προς το βάθος (κοντά στο spawn)
  const startZ = SPAWN_Z - 0.8;
  const startVals = [2,4,2,8,4];
  const xOffsets = [-0.8, 0.4, -0.2, 0.9, -0.5]; // μικρές διασπορές στον x
  for(let i=0;i<COLS;i++){
    const cx = -TRACK_W/2+COL_W/2+i*COL_W + xOffsets[i];
    const cz = startZ + (Math.random()*0.6 - 0.3); // τυχαία μικρή διασπορά στο z
    spawnCube(cx, CUBE_SZ/2+0.05, cz, startVals[i]);
  }

  drawNextHUD();audio.init();
}

const raycaster=new THREE.Raycaster();const mouse=new THREE.Vector2();
const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
let dragging=false;
function updateAim(cx,cy){const rect=canvas.getBoundingClientRect();
  mouse.x=((cx-rect.left)/rect.width)*2-1;mouse.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);const target=new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane,target);
  if(target)aimX=Math.max(-X_LIMIT,Math.min(X_LIMIT,target.x))}
canvas.addEventListener('mousedown',e=>{dragging=true;updateAim(e.clientX,e.clientY)});
canvas.addEventListener('mousemove',e=>{if(dragging&&gameOn&&!paused)updateAim(e.clientX,e.clientY)});
canvas.addEventListener('mouseup',()=>{if(dragging){shoot();dragging=false}});
canvas.addEventListener('touchstart',e=>{dragging=true;updateAim(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(gameOn&&!paused)updateAim(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();shoot();dragging=false},{passive:false});

document.getElementById('hammer-icon').addEventListener('click',()=>{
  if(!gameOn||hammerChg<100)return;hammerChg=0;shakeAmt=.5;audio.boom();
  const sorted=cubes.filter(c=>!c.isShot).sort((a,b)=>b.body.position.z-a.body.position.z).slice(0,8);
  sorted.forEach(c=>{spawnShards(c.body.position.x,c.body.position.y,c.body.position.z,gp(c.value).hex,8);removeCube(c)})});

function useBomb(){
  audio.boom();shakeAmt=.5;
  const sorted=cubes.filter(c=>!c.isShot).sort((a,b)=>b.body.position.z-a.body.position.z).slice(0,9);
  sorted.forEach(c=>{spawnShards(c.body.position.x,c.body.position.y,c.body.position.z,0xff5500,10);addScore(c.value);removeCube(c)});
  floatText(0,2.5,DANGER_Z-2,'BOOM!','points-mega');
}
function useRainbow(){
  rainbowArmed=true;floatText(aimX,2,SHOOTER_Z-1,'RAINBOW READY!','points-big');
}

document.getElementById('boost-bomb').addEventListener('click',()=>{
  if(!gameOn||paused)return;
  if(freeBomb>0){freeBomb--;updateBoosterBadges();useBomb();}
  else{if(typeof show_11108267==='function'){show_11108267().then(()=>useBomb());}else alert('Ad not available');}
});
document.getElementById('boost-rainbow').addEventListener('click',()=>{
  if(!gameOn||paused)return;
  if(freeRainbow>0){freeRainbow--;updateBoosterBadges();useRainbow();}
  else{if(typeof show_11108267==='function'){show_11108267().then(()=>useRainbow());}else alert('Ad not available');}
});
document.getElementById('btn-newgames').addEventListener('click',()=>{
  if(typeof show_11108267==='function'){show_11108267().then(()=>startGame());}else startGame();
});
document.getElementById('btn-pause').addEventListener('click',()=>{if(!gameOn)return;paused=!paused;
  document.getElementById('btn-pause').textContent=paused?'▶':'⏸'});
document.getElementById('btn-sound').addEventListener('click',()=>{const m=audio.toggleMute();
  document.getElementById('btn-sound').textContent=m?'🔇':'🔊'});
document.getElementById('startBtn').addEventListener('click',startGame);

function resize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h,false);
  composer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()}
window.addEventListener('resize',resize);resize();update();
</script>
