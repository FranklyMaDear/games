<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Cubes 3D – Cosmic Survival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            user-select: none;
            color: #fff;
        }

        /* HUD – slim & modern */
        #hud {
            width: 100%;
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: linear-gradient(180deg, rgba(20, 20, 40, 0.92), rgba(15, 15, 30, 0.85));
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(140, 100, 255, 0.2);
            z-index: 20;
            gap: 12px;
            flex-shrink: 0;
        }
        #hud.active {
            display: flex;
        }

        .hud-section {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
        }
        .hud-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }
        .hud-value {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        #score-display {
            color: #FFD700;
            text-shadow: 0 0 14px rgba(255, 200, 0, 0.5);
        }
        #level-display {
            color: #c0aaff;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.6);
        }
        .xp-bar-wrap {
            width: 70px;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-left: 6px;
        }
        .xp-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a855f7, #7cfc00);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .hud-btns {
            display: flex;
            gap: 6px;
        }
        .hud-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ccc;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .hud-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        #canvas-wrap {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        #three-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* FX layer for floating texts */
        #fx-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 25;
            overflow: hidden;
        }
        .float-text {
            position: absolute;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
            pointer-events: none;
            animation: fup 1.2s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
        }
        .float-text.milestone {
            font-size: 26px;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 180, 0, 0.9);
            animation: msf 1.6s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
        }
        .float-text.points {
            font-size: 16px;
            color: #FFD700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9), 0 0 12px rgba(255, 180, 0, 0.5);
        }
        .float-text.points-big {
            font-size: 22px;
        }
        .float-text.points-mega {
            font-size: 28px;
            color: #FFA500;
        }
        .float-text.gift {
            font-size: 22px;
            color: #7CFC00;
            text-shadow: 0 0 18px rgba(120, 255, 80, 0.9);
        }

        @keyframes fup {
            0% {
                transform: translate(-50%, 0) scale(0.7);
                opacity: 0;
            }
            12% {
                transform: translate(-50%, -8px) scale(1.15);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -55px) scale(1);
                opacity: 0;
            }
        }
        @keyframes msf {
            0% {
                transform: translate(-50%, 8px) scale(0.5);
                opacity: 0;
            }
            20% {
                transform: translate(-50%, -10px) scale(1.3);
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -55px);
                opacity: 0;
            }
        }

        #danger-indicator {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, 0);
            font-size: 28px;
            font-weight: 900;
            color: #ff3333;
            text-shadow: 0 0 20px red;
            animation: blink 0.5s infinite;
            pointer-events: none;
            z-index: 30;
            display: none;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        #overlay {
            position: absolute;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: transparent;
            overflow: hidden;
        }
        #overlay.hidden {
            display: none;
        }
        #space-bg {
            position: absolute;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }
        #starfield {
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .star-layer {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
        }
        @keyframes warpStars {
            0% {
                transform: translateY(0) scale(1);
            }
            100% {
                transform: translateY(-50%) scale(1.1);
            }
        }
        @keyframes warpSpeed {
            0% {
                transform: translateY(0) scale(1);
            }
            100% {
                transform: translateY(-90%) scale(1.3);
            }
        }
        .overlay-title {
            color: #fff;
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #a855f7, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.5));
        }
        .play-btn {
            background: linear-gradient(135deg, #7b3fcc, #a855f7);
            color: #fff;
            border: none;
            border-radius: 18px;
            padding: 14px 50px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1.5px;
            box-shadow: 0 6px 24px rgba(168, 85, 247, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        .play-btn:active {
            transform: scale(0.94);
        }
        .score-big {
            color: #FFD700;
            font-size: 54px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 200, 0, 0.6);
        }

        /* Leaderboard modal */
        #modal-leaderboard {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
        }
        #modal-leaderboard.active {
            display: flex;
        }
        #modal-content {
            background: #111;
            border: 2px solid #ffaa33;
            border-radius: 18px;
            padding: 20px;
            width: 90%;
            max-width: 340px;
            max-height: 70vh;
            overflow-y: auto;
        }
        #modal-content h2 {
            color: #ffaa33;
            text-align: center;
            margin-bottom: 4px;
        }
        #modal-content .current-score {
            color: #FFD700;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        #modal-close {
            display: block;
            margin: 12px auto 0;
            background: #ffaa33;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 8px 24px;
            font-weight: 700;
            cursor: pointer;
        }
        .lb-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 12px;
            color: #ddd;
        }
        .lb-entry .lb-rank {
            color: #ffaa33;
            font-weight: 700;
            min-width: 24px;
        }
        .lb-entry .lb-score {
            color: #FFD700;
            font-weight: 700;
        }
        .lb-entry .lb-date {
            color: #888;
            font-size: 10px;
        }
        .lb-empty {
            color: #666;
            text-align: center;
            font-size: 12px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-section">
            <span class="hud-label">SCORE</span>
            <span class="hud-value" id="score-display">0</span>
        </div>
        <div class="hud-section">
            <span class="hud-label">LEVEL</span>
            <span class="hud-value" id="level-display">1</span>
            <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xp-bar-fill"></div></div>
        </div>
        <div class="hud-btns">
            <div class="hud-btn" id="btn-rank">🏆</div>
            <div class="hud-btn" id="btn-restart">🔄</div>
            <div class="hud-btn" id="btn-pause">⏸</div>
            <div class="hud-btn" id="btn-sound">🔊</div>
        </div>
    </div>

    <div id="canvas-wrap">
        <canvas id="three-canvas"></canvas>
        <div id="fx-layer"></div>
        <div id="danger-indicator">⚠️ DANGER ⚠️</div>
        <div id="overlay"></div>
    </div>

    <div id="modal-leaderboard">
        <div id="modal-content">
            <h2>🏆 WEEKLY TOP 10</h2>
            <div class="current-score" id="modal-current-score">Your Score: 0</div>
            <div id="modal-lb-list"></div>
            <button id="modal-close">CLOSE</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        /* ---------- STARFIELD ---------- */
        let starfieldContainer = document.getElementById('starfield');
        function buildStarfield(speedMultiplier = 1) {
            if (!starfieldContainer) return;
            starfieldContainer.innerHTML = '';
            function layer(count, size, dur, op) {
                const cv = document.createElement('canvas');
                cv.width = 600;
                cv.height = 600;
                const ctx = cv.getContext('2d');
                for (let i = 0; i < count; i++) {
                    const x = Math.random() * 600,
                        y = Math.random() * 600,
                        r = Math.random() * size + 0.3;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.random() * 0.6})`;
                    ctx.fill();
                }
                const div = document.createElement('div');
                div.className = 'star-layer';
                div.style.backgroundImage = `url(${cv.toDataURL()})`;
                div.style.backgroundRepeat = 'repeat';
                div.style.backgroundSize = '600px 600px';
                div.style.opacity = op;
                div.style.animation = `warpStars ${dur / speedMultiplier}s linear infinite`;
                starfieldContainer.appendChild(div);
            }
            layer(160, 1.6, 38, 0.9);
            layer(220, 1.0, 68, 0.7);
            layer(300, 0.6, 105, 0.5);
        }

        /* ---------- CONSTANTS ---------- */
        const SEQ = [2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048, 4096, 8192, 16384];
        const PAL = {
            2: { hex: 0x3ecf5a, glow: 0x2aff5a },
            4: { hex: 0x8b5cf6, glow: 0xa070ff },
            8: { hex: 0xf97316, glow: 0xffaa44 },
            16: { hex: 0x14b8a6, glow: 0x44e0c8 },
            32: { hex: 0xf5b50a, glow: 0xffd24a },
            64: { hex: 0x0ea5e9, glow: 0x44ccff },
            128: { hex: 0x3b82f6, glow: 0x77aaff },
            256: { hex: 0xe11d48, glow: 0xff3366 },
            512: { hex: 0xec4899, glow: 0xff66bb },
            1024: { hex: 0x7c3aed, glow: 0xaa66ff },
            2048: { hex: 0xFFD700, glow: 0xffee44 },
            4096: { hex: 0xff5500, glow: 0xff8844 },
            8192: { hex: 0x00ffff, glow: 0x00ffff },
            16384: { hex: 0xff00ff, glow: 0xff00ff },
        };
        function gp(v) { return PAL[v] || { hex: 0xcc44ff, glow: 0xff88ff }; }
        function nextVal(v) { const i = SEQ.indexOf(v); return i >= 0 && i + 1 < SEQ.length ? SEQ[i + 1] : v * 2; }

        const COLS = 5;
        const CUBE_SZ = 1.6;
        const COL_W = CUBE_SZ + 0.3;
        const TRACK_W = COLS * COL_W;
        const TRACK_L = 36;
        const DANGER_Z = 13.5;
        const SHOOTER_Z = 16.0;
        const X_LIMIT = TRACK_W / 2 - CUBE_SZ / 2;
        const Z_BACK = -TRACK_L / 2 + CUBE_SZ / 2;
        const BUFFER_ZONE = Z_BACK + 2.5;
        const RAMP_HOME_Z = -TRACK_L / 2 + 0.3;
        const SPAWN_Z = RAMP_HOME_Z + 0.88;
        const RAMP_PUSH_Z = SPAWN_Z + CUBE_SZ + 0.8;
        const RAMP_SPEED = 7.0;

        /* ---------- LOCAL STORAGE ---------- */
        const LS_HIGHSCORE = 'mergeCubes3D_highscore';
        const LS_LEVEL = 'mergeCubes3D_playerLevel';
        const LS_XP = 'mergeCubes3D_playerXP';

        let playerLevel = parseInt(localStorage.getItem(LS_LEVEL) || '1', 10);
        let playerXP = parseInt(localStorage.getItem(LS_XP) || '0', 10);
        let highScore = parseInt(localStorage.getItem(LS_HIGHSCORE) || '0', 10);

        function xpForLevel(lv) { return Math.floor(500 * Math.pow(lv, 1.5)); }
        function saveProgression() {
            localStorage.setItem(LS_LEVEL, playerLevel);
            localStorage.setItem(LS_XP, playerXP);
            localStorage.setItem(LS_HIGHSCORE, highScore);
        }

        /* ---------- UI ELEMENTS ---------- */
        function updateLevelDisplay() {
            document.getElementById('level-display').textContent = playerLevel;
        }
        function updateXPBar() {
            const needed = xpForLevel(playerLevel);
            const pct = Math.min(100, (playerXP / needed) * 100);
            document.getElementById('xp-bar-fill').style.width = pct + '%';
        }
        function refreshProgressionUI() {
            updateLevelDisplay();
            updateXPBar();
        }

        /* ---------- THEME & LEVEL-UP VISUALS ---------- */
        let currentTheme = 0;
        const THEMES = [
            { floor: 0x221c55, frame: 0x7d4bdd, line: 0x6655aa, emission: 0x4a25a8, bg: 'radial-gradient(ellipse at 50% 35%, #251a45 0%, #150f30 40%, #0a0720 70%, #050310 100%)',
                bloom: 0.65 },
            { floor: 0x1c3a44, frame: 0x22aacc, line: 0x1e8899, emission: 0x0a6688, bg: 'radial-gradient(ellipse at 50% 35%, #0a3344 0%, #052030 40%, #021018 70%, #010510 100%)',
                bloom: 0.8 },
            { floor: 0x332211, frame: 0xff8822, line: 0xcc6611, emission: 0x884400, bg: 'radial-gradient(ellipse at 50% 35%, #442200 0%, #331100 40%, #110500 70%, #050200 100%)',
                bloom: 0.95 },
            { floor: 0x111122, frame: 0xffffff, line: 0x888888, emission: 0x444444, bg: 'radial-gradient(ellipse at 50% 35%, #000000 0%, #050510 40%, #0a0a1a 70%, #000000 100%)',
                bloom: 0.55 },
            { floor: 0x2a1e3a, frame: 0xdd55cc, line: 0x9944aa, emission: 0x661188, bg: 'radial-gradient(ellipse at 50% 35%, #301830 0%, #1a0a22 40%, #0c0510 70%, #040208 100%)',
                bloom: 0.7 },
            { floor: 0x1d3a2a, frame: 0x44dd88, line: 0x228844, emission: 0x115522, bg: 'radial-gradient(ellipse at 50% 35%, #0a2818 0%, #051a10 40%, #020d08 70%, #010502 100%)',
                bloom: 0.75 },
            { floor: 0x3a2a1e, frame: 0xdd9944, line: 0x996622, emission: 0x553311, bg: 'radial-gradient(ellipse at 50% 35%, #28180a 0%, #1a0c05 40%, #0d0602 70%, #050201 100%)',
                bloom: 0.85 },
            { floor: 0x202040, frame: 0x6688ff, line: 0x3355cc, emission: 0x112288, bg: 'radial-gradient(ellipse at 50% 35%, #101030 0%, #08081a 40%, #03030a 70%, #010103 100%)',
                bloom: 0.6 },
        ];

        function applyTheme(themeIndex) {
            currentTheme = themeIndex % THEMES.length;
            const t = THEMES[currentTheme];
            const bg = document.getElementById('space-bg');
            if (bg) bg.style.background = t.bg;
            // Update track materials
            if (trackGroup) {
                trackGroup.children.forEach(child => {
                    if (child.material && child.material.color) {
                        if (child.name === 'floor') child.material.color.set(t.floor);
                        else if (child.name === 'frame') {
                            child.material.color.set(t.frame);
                            child.material.emissive.set(t.emission);
                        } else if (child.name === 'line') child.material.color.set(t.line);
                    }
                });
            }
            composer.passes[1].strength = t.bloom;
            buildStarfield(1.2);
        }

        function triggerLevelUpVisuals() {
            floatText(0, trackY + 5, 0, '⭐ LEVEL UP! ⭐', 'milestone');
            audio.milestone();
            applyTheme((playerLevel - 1) % THEMES.length);
            triggerWarpEffect();
        }

        function triggerWarpEffect() {
            const layers = document.querySelectorAll('.star-layer');
            layers.forEach(l => {
                l.style.animation = 'warpSpeed 1s ease-out forwards';
                setTimeout(() => { l.style.animation = ''; }, 1000);
            });
            const flash = document.createElement('div');
            flash.style.cssText =
                'position:fixed;inset:0;background:white;z-index:500;pointer-events:none;opacity:0.6;';
            document.body.appendChild(flash);
            setTimeout(() => { flash.style.opacity = '0';
                flash.style.transition = 'opacity 0.5s'; }, 50);
            setTimeout(() => { flash.remove(); }, 600);
        }

        /* ---------- WEEKLY LEADERBOARD ---------- */
        function getISOWeek(d) {
            const date = new Date(d);
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        }

        function getWeekKey() {
            const now = new Date();
            return `mergeCubes3D_weekly_${now.getFullYear()}_w${getISOWeek(now)}`;
        }

        function getWeeklyLeaderboard() {
            try { return JSON.parse(localStorage.getItem(getWeekKey()) || '[]'); } catch (e) { return []; }
        }

        function saveWeeklyLeaderboard(lb) { localStorage.setItem(getWeekKey(), JSON.stringify(lb)); }

        function addToWeeklyLeaderboard(s) {
            const lb = getWeeklyLeaderboard();
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { day: '2-digit', month: '2-digit', year: '2-digit' });
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            lb.push({ score: s, date: `${dateStr} ${timeStr}` });
            lb.sort((a, b) => b.score - a.score);
            const top10 = lb.slice(0, 10);
            saveWeeklyLeaderboard(top10);
            return top10;
        }

        function saveHighScoreIfNeeded(s) {
            if (s > highScore) {
                highScore = s;
                saveProgression();
            }
        }

        function openLeaderboardModal() {
            const modal = document.getElementById('modal-leaderboard');
            const list = document.getElementById('modal-lb-list');
            document.getElementById('modal-current-score').textContent = 'Your Score: ' + score.toLocaleString();
            const lb = getWeeklyLeaderboard();
            let html = '';
            if (lb.length === 0) {
                html = '<div class="lb-empty">No scores yet this week</div>';
            } else {
                lb.forEach((e, i) => {
                    html +=
                        `<div class="lb-entry"><span class="lb-rank">#${i+1}</span><span class="lb-score">${e.score.toLocaleString()}</span><span class="lb-date">${e.date}</span></div>`;
                });
            }
            list.innerHTML = html;
            modal.classList.add('active');
        }

        document.getElementById('btn-rank').addEventListener('click', openLeaderboardModal);
        document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal-leaderboard')
            .classList.remove('active'));
        document.getElementById('modal-leaderboard').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal-leaderboard')) document.getElementById('modal-leaderboard')
                .classList.remove('active');
        });

        /* ---------- 3D SETUP ---------- */
        const wrap = document.getElementById('canvas-wrap');
        const canvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080614);
        scene.fog = new THREE.Fog(0x080614, 46, 92);

        const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 250);
        const camDistance = 42;
        const phi = THREE.MathUtils.degToRad(45); // 45° pitch
        const camY = camDistance * Math.cos(phi);
        const camZ = camDistance * Math.sin(phi);
        camera.position.set(0, camY, camZ);
        const trackY = 3;
        camera.lookAt(0, trackY, 0);

        const ambient = new THREE.AmbientLight(0x7766cc, 0.65);
        scene.add(ambient);
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
        keyLight.position.set(5, 22, 13);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(2048, 2048);
        keyLight.shadow.camera.left = -12;
        keyLight.shadow.camera.right = 12;
        keyLight.shadow.camera.top = 30;
        keyLight.shadow.camera.bottom = -30;
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 70;
        keyLight.shadow.bias = -0.0005;
        scene.add(keyLight);
        const fillLight = new THREE.DirectionalLight(0x9977ff, 0.5);
        fillLight.position.set(-7, 13, 9);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xaa88ff, 2.8, 60);
        rimLight.position.set(0, 10, -20);
        scene.add(rimLight);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(1, 1), 0.65, 0.85, 0.85));

        const starGeo = new THREE.BufferGeometry();
        const starN = 2600;
        const stp = new Float32Array(starN * 3);
        for (let i = 0; i < starN; i++) {
            const r = 55 + Math.random() * 100,
                th = Math.random() * Math.PI * 2,
                ph = Math.acos(2 * Math.random() - 1);
            stp[i * 3] = r * Math.sin(ph) * Math.cos(th);
            stp[i * 3 + 1] = r * Math.cos(ph) * 0.7 + 6;
            stp[i * 3 + 2] = r * Math.sin(ph) * Math.sin(th);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(stp, 3));
        const spaceStars = new THREE.Points(starGeo, new THREE.PointsMaterial({
            color: 0xddccff,
            size: 0.4,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.95,
            blending: THREE.AdditiveBlending,
            fog: false,
        }));
        scene.add(spaceStars);

        function addNebula(x, y, z, color, size, op) {
            const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: op, blending: THREE
                .AdditiveBlending, depthWrite: false, fog: false });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(size, size), m);
            mesh.position.set(x, y, z);
            mesh.lookAt(camera.position);
            scene.add(mesh);
        }
        addNebula(-30, 9, -46, 0x5522aa, 56, 0.16);
        addNebula(34, 15, -52, 0xaa2266, 62, 0.13);
        addNebula(0, 27, -64, 0x3344bb, 78, 0.11);

        function buildTrack() {
            const g = new THREE.Group();
            const W = TRACK_W,
                L = TRACK_L,
                wallT = 0.5,
                wallH = 1.7;
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x221c55, roughness: 0.5, metalness: 0.2 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(W, L), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0.01;
            floor.receiveShadow = true;
            floor.name = 'floor';
            g.add(floor);

            const lineMat = new THREE.LineBasicMaterial({ color: 0x6655aa, transparent: true, opacity: 0.35 });
            for (let i = 0; i <= COLS; i++) {
                const x = -W / 2 + i * (W / COLS);
                const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x, 0.02, -L / 2), new THREE.Vector3(
                    x, 0.02, L / 2)]);
                const line = new THREE.Line(geo, lineMat);
                line.name = 'line';
                g.add(line);
            }

            const frameMat = new THREE.MeshStandardMaterial({ color: 0x7d4bdd, roughness: 0.25, metalness: 0.65,
                emissive: 0x4a25a8, emissiveIntensity: 1.2 });
            const addWallMesh = (x, z, w, h, d) => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), frameMat);
                wall.position.set(x, h / 2, z);
                wall.castShadow = true;
                wall.name = 'frame';
                g.add(wall);
            };
            addWallMesh(-W / 2 - wallT / 2, 0, wallT, wallH, L + wallT);
            addWallMesh(W / 2 + wallT / 2, 0, wallT, wallH, L + wallT);
            addWallMesh(0, -L / 2 - wallT / 2, W + wallT * 2, wallH, wallT);
            addWallMesh(0, L / 2 + wallT / 2, W + wallT * 2, wallH, wallT);

            const cornerMat = new THREE.MeshStandardMaterial({ color: 0x8d5bee, roughness: 0.2, metalness: 0.8,
                emissive: 0x6a41d4, emissiveIntensity: 1.5 });
            [
                [-W / 2 - wallT / 2, -L / 2 - wallT / 2],
                [W / 2 + wallT / 2, -L / 2 - wallT / 2],
                [-W / 2 - wallT / 2, L / 2 + wallT / 2],
                [W / 2 + wallT / 2, L / 2 + wallT / 2]
            ].forEach(([cx, cz]) => {
                const cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, wallH, 16), cornerMat);
                cyl.position.set(cx, wallH / 2, cz);
                cyl.castShadow = true;
                g.add(cyl);
            });

            const dangerLineMat = new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.9 });
            const dangerLine = new THREE.Mesh(new THREE.PlaneGeometry(W, 0.55), dangerLineMat);
            dangerLine.rotation.x = -Math.PI / 2;
            dangerLine.position.set(0, 0.05, DANGER_Z);
            dangerLine.name = 'dangerLine';
            g.add(dangerLine);
            const dangerGlowMat = new THREE.MeshBasicMaterial({ color: 0xff2222, transparent: true, opacity: 0.25 });
            const dangerGlow = new THREE.Mesh(new THREE.PlaneGeometry(W, 1.7), dangerGlowMat);
            dangerGlow.rotation.x = -Math.PI / 2;
            dangerGlow.position.set(0, 0.06, DANGER_Z);
            dangerGlow.name = 'dangerGlow';
            g.add(dangerGlow);

            const shooterZoneMat = new THREE.MeshBasicMaterial({ color: 0x4422aa, transparent: true, opacity: 0.18,
                depthWrite: false });
            const shooterZone = new THREE.Mesh(new THREE.PlaneGeometry(W, L / 2 - DANGER_Z + L / 2), shooterZoneMat);
            shooterZone.rotation.x = -Math.PI / 2;
            shooterZone.position.set(0, 0.04, (DANGER_Z + L / 2) / 2);
            g.add(shooterZone);

            return g;
        }
        const trackGroup = buildTrack();
        trackGroup.position.y = trackY;
        scene.add(trackGroup);

        /* ---------- PHYSICS ---------- */
        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -16, 0) });
        world.broadphase = new CANNON.NaiveBroadphase();
        world.solver.iterations = 16;
        const cubeMat = new CANNON.Material('cube');
        const bouncyCubeMat = new CANNON.Material('bouncyCube');
        const floorMatPhys = new CANNON.Material('floor');
        const wallMatPhys = new CANNON.Material('wall');

        world.addContactMaterial(new CANNON.ContactMaterial(bouncyCubeMat, floorMatPhys, { friction: .5,
        restitution: 0.7 }));
        world.addContactMaterial(new CANNON.ContactMaterial(bouncyCubeMat, bouncyCubeMat, { friction: .4,
            restitution: 0.55 }));
        world.addContactMaterial(new CANNON.ContactMaterial(bouncyCubeMat, wallMatPhys, { friction: .3,
        restitution: 0.75 }));
        world.addContactMaterial(new CANNON.ContactMaterial(bouncyCubeMat, cubeMat, { friction: .5, restitution: 0.5 }));
        world.addContactMaterial(new CANNON.ContactMaterial(cubeMat, floorMatPhys, { friction: .6, restitution: .05 }));
        world.addContactMaterial(new CANNON.ContactMaterial(cubeMat, cubeMat, { friction: .5, restitution: .05 }));
        world.addContactMaterial(new CANNON.ContactMaterial(cubeMat, wallMatPhys, { friction: .3, restitution: .15 }));

        const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: floorMatPhys });
        floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        floorBody.position.y = trackY;
        world.addBody(floorBody);

        function addPhysWall(x, y, z, sx, sy, sz) {
            const b = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(sx, sy, sz)),
            material: wallMatPhys });
            b.position.set(x, y + trackY, z);
            world.addBody(b);
        }
        addPhysWall(-TRACK_W / 2 - 0.25, 1.5, 0, 0.25, 3, TRACK_L / 2 + 2);
        addPhysWall(TRACK_W / 2 + 0.25, 1.5, 0, 0.25, 3, TRACK_L / 2 + 2);
        addPhysWall(0, 1.5, -TRACK_L / 2 - 0.25, TRACK_W / 2 + 1, 3, 0.25);
        addPhysWall(0, 1.5, TRACK_L / 2 + 0.25, TRACK_W / 2 + 1, 3, 0.25);

        /* ---------- CUBE RENDERING ---------- */
        const cubeGeo = new THREE.BoxGeometry(CUBE_SZ, CUBE_SZ, CUBE_SZ);
        const matCache = new Map();

        function makeTexture(value, pal) {
            const sz = 256,
                cv = document.createElement('canvas');
            cv.width = sz;
            cv.height = sz;
            const ctx = cv.getContext('2d');
            ctx.fillStyle = '#' + pal.hex.toString(16).padStart(6, '0');
            ctx.fillRect(0, 0, sz, sz);
            const gr = ctx.createRadialGradient(sz / 2, sz / 2, sz * .15, sz / 2, sz / 2, sz * .75);
            gr.addColorStop(0, 'rgba(255,255,255,.22)');
            gr.addColorStop(1, 'rgba(0,0,0,.3)');
            ctx.fillStyle = gr;
            ctx.fillRect(0, 0, sz, sz);
            ctx.strokeStyle = 'rgba(0,0,0,.4)';
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, sz - 10, sz - 10);
            let fontSize;
            if (value >= 10000) fontSize = 80;
            else if (value >= 1000) fontSize = 120;
            else if (value >= 100) fontSize = 150;
            else if (value >= 10) fontSize = 190;
            else fontSize = 230;
            ctx.fillStyle = '#fff';
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,.6)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 5;
            ctx.fillText(value, sz / 2, sz / 2 + 8);
            const t = new THREE.CanvasTexture(cv);
            t.colorSpace = THREE.SRGBColorSpace;
            return t;
        }

        function getMats(value) {
            if (matCache.has(value)) return matCache.get(value);
            const pal = gp(value),
                tex = makeTexture(value, pal);
            const emissiveIntensity = 0.28;
            const bp = { color: 0xffffff, roughness: .3, metalness: .2, emissive: pal.glow, emissiveIntensity };
            const mn = new THREE.MeshStandardMaterial({ ...bp, map: tex });
            const mp = new THREE.MeshStandardMaterial({ color: pal.hex, roughness: .3, metalness: .2,
            emissive: pal.glow, emissiveIntensity });
            const ms = [mn, mn, mn, mp, mn, mn];
            matCache.set(value, ms);
            return ms;
        }

        let uid = 1;
        const cubes = [];
        const flashSpheres = [];

        function spawnCube(x, y, z, value, opts = {}) {
            const mesh = new THREE.Mesh(cubeGeo, getMats(value));
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.set(x, y + trackY, z);
            scene.add(mesh);

            const isBouncy = opts.isShot && Math.random() < 0.8;
            const mat = isBouncy ? bouncyCubeMat : cubeMat;
            const linearDamping = isBouncy ? 0.3 : 0.5;
            const angularDamping = isBouncy ? 0.4 : 0.6;

            const body = new CANNON.Body({
                mass: opts.isShot ? 2 : 1.2,
                shape: new CANNON.Box(new CANNON.Vec3(CUBE_SZ / 2, CUBE_SZ / 2, CUBE_SZ / 2)),
                material: mat,
                position: new CANNON.Vec3(x, y + trackY, z),
                linearDamping,
                angularDamping,
            });

            if (opts.isShot) {
                body.collisionFilterGroup = 2;
                body.collisionFilterMask = 1 | 8;
            } else {
                body.collisionFilterGroup = 1;
                body.collisionFilterMask = ~0;
            }
            world.addBody(body);
            const cube = {
                id: uid++,
                mesh,
                body,
                value,
                isShot: !!opts.isShot,
                flash: 0,
                mergeActive: true,
                mergeCooldown: opts.mergeCooldown || 0,
            };
            cubes.push(cube);
            return cube;
        }

        function removeCube(c) {
            scene.remove(c.mesh);
            world.removeBody(c.body);
            const i = cubes.indexOf(c);
            if (i >= 0) cubes.splice(i, 1);
        }

        function createKinematicCube(x, y, z, value) {
            const mesh = new THREE.Mesh(cubeGeo, getMats(value));
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.set(x, y + trackY, z);
            scene.add(mesh);

            const body = new CANNON.Body({
                mass: 0,
                type: CANNON.Body.KINEMATIC,
                shape: new CANNON.Box(new CANNON.Vec3(CUBE_SZ / 2, CUBE_SZ / 2, CUBE_SZ / 2)),
                material: cubeMat,
                position: new CANNON.Vec3(x, y + trackY, z),
            });
            world.addBody(body);
            return { mesh, body, value };
        }

        function spawnRow(z) {
            const vals = [
                [2, 4, 2, 8, 4],
                [4, 2, 8, 2, 4],
                [2, 8, 4, 4, 2],
                [4, 2, 4, 8, 2],
                [2, 4, 8, 2, 4]
            ][Math.floor(Math.random() * 5)];
            for (let i = 0; i < COLS; i++) spawnCube(-TRACK_W / 2 + COL_W / 2 + i * COL_W, CUBE_SZ / 2 + 0.05, z, vals[i]);
        }

        /* ---------- PARTICLES & EFFECTS ---------- */
        const particles = [];
        const pGeo = new THREE.SphereGeometry(.08, 6, 6);
        const trailParticles = [];

        function spawnParticles(x, y, z, color, count = 16, speed = 4) {
            for (let i = 0; i < count; i++) {
                const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
                const mesh = new THREE.Mesh(pGeo, mat);
                mesh.position.set(x, y + trackY, z);
                scene.add(mesh);
                const a = Math.random() * Math.PI * 2,
                    alt = (Math.random() - .3) * Math.PI;
                const s = speed * (.4 + Math.random());
                particles.push({
                    mesh,
                    mat,
                    vx: Math.cos(a) * Math.cos(alt) * s,
                    vy: Math.abs(Math.sin(alt)) * s + 1.5,
                    vz: Math.sin(a) * Math.cos(alt) * s,
                    life: 1,
                    decay: .02 + Math.random() * .01,
                    shard: false,
                });
            }
        }
        const shardGeo = new THREE.BoxGeometry(.26, .26, .26);

        function spawnShards(x, y, z, color, count = 10) {
            for (let i = 0; i < count; i++) {
                const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: .4,
                    roughness: .4, metalness: .2, transparent: true, opacity: 1 });
                const mesh = new THREE.Mesh(shardGeo, mat);
                mesh.position.set(x, y + trackY, z);
                mesh.scale.setScalar(0.5 + Math.random() * 0.8);
                scene.add(mesh);
                const a = Math.random() * Math.PI * 2,
                    alt = Math.random() * Math.PI * 0.6;
                const s = 4 + Math.random() * 4;
                particles.push({
                    mesh,
                    mat,
                    vx: Math.cos(a) * Math.cos(alt) * s,
                    vy: Math.sin(alt) * s + 3,
                    vz: Math.sin(a) * Math.cos(alt) * s,
                    life: 1,
                    decay: .018 + Math.random() * .008,
                    shard: true,
                    vrot: (Math.random() - .5) * 12,
                    rx: Math.random(),
                    ry: Math.random(),
                    rz: Math.random(),
                });
            }
        }
        const flashGeo = new THREE.SphereGeometry(0.5, 32, 32);

        function spawnFlashSphere(x, y, z, color) {
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1, blending: THREE
                .AdditiveBlending, depthWrite: false });
            const mesh = new THREE.Mesh(flashGeo, mat);
            mesh.position.set(x, y + trackY, z);
            mesh.scale.setScalar(0.3);
            scene.add(mesh);
            flashSpheres.push({ mesh, mat, life: 0.55, decay: 1.8, scaleSpeed: 5.5 });
        }
        const trailGeo = new THREE.SphereGeometry(0.15, 6, 6);

        function spawnTrailParticle(worldPos, velocity, cubeQuat) {
            const backDir = new THREE.Vector3(0, 0, -1).applyQuaternion(cubeQuat);
            const offset = backDir.clone().multiplyScalar(CUBE_SZ / 2 + 0.1);
            const spawnPos = worldPos.clone().add(offset);
            const color = new THREE.Color().setHSL(0.08 + Math.random() * 0.1, 1, 0.4 + Math.random() * 0.5);
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9, blending: THREE
                .AdditiveBlending, depthWrite: false });
            const mesh = new THREE.Mesh(trailGeo, mat);
            mesh.position.copy(spawnPos);
            scene.add(mesh);
            trailParticles.push({
                mesh,
                mat,
                vx: velocity.x * 0.4 + (Math.random() - 0.5) * 3,
                vy: velocity.y * 0.4 + (Math.random() - 0.5) * 2,
                vz: velocity.z * 0.4 + (Math.random() - 0.5) * 3,
                life: 0.7 + Math.random() * 0.4,
                decay: 1.6 + Math.random() * 0.8,
            });
        }

        /* ---------- FLOATING TEXT ---------- */
        const fxLayer = document.getElementById('fx-layer');

        function project3D(p) {
            const v = p.clone().project(camera);
            return { x: (v.x * .5 + .5) * canvas.clientWidth, y: (-v.y * .5 + .5) * canvas.clientHeight };
        }

        function floatText(x, y, z, label, type = 'points') {
            const v = project3D(new THREE.Vector3(x, y + trackY, z));
            const el = document.createElement('div');
            el.className = 'float-text ' + type;
            el.textContent = label;
            el.style.left = v.x + 'px';
            el.style.top = v.y + 'px';
            fxLayer.appendChild(el);
            setTimeout(() => el.remove(), type === 'milestone' || type === 'gift' ? 1600 : 1200);
        }

        /* ---------- AUDIO ---------- */
        const audio = (() => {
            let ctx = null,
                mg = null,
                muted = false;

            function init() {
                if (ctx) return;
                ctx = new(window.AudioContext || window.webkitAudioContext)();
                mg = ctx.createGain();
                mg.gain.value = .45;
                mg.connect(ctx.destination);
            }

            function env(g, pk, a, d, s, dur) {
                const t = ctx.currentTime;
                g.gain.setValueAtTime(.0001, t);
                g.gain.exponentialRampToValueAtTime(pk, t + a);
                g.gain.exponentialRampToValueAtTime(Math.max(.0001, pk * s), t + a + d);
                g.gain.exponentialRampToValueAtTime(.0001, t + dur);
            }

            function noise(dur, vol, freq, type = 'lowpass') {
                const n = ctx.createBufferSource(),
                    buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate),
                    d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
                n.buffer = buf;
                const fi = ctx.createBiquadFilter();
                fi.type = type;
                fi.frequency.value = freq;
                const g = ctx.createGain();
                g.gain.value = vol;
                n.connect(fi).connect(g).connect(mg);
                n.start();
                return n;
            }

            function launch() {
                if (muted) return;
                init();
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(150, ctx.currentTime);
                o.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.12);
                o.connect(g).connect(mg);
                env(g, .18, .005, .02, .2, .16);
                o.start();
                o.stop(ctx.currentTime + .18);
                const o2 = ctx.createOscillator(),
                    g2 = ctx.createGain();
                o2.type = 'triangle';
                o2.frequency.setValueAtTime(80, ctx.currentTime);
                o2.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
                o2.connect(g2).connect(mg);
                env(g2, .12, .003, .02, .2, .14);
                o2.start();
                o2.stop(ctx.currentTime + .16);
                noise(.14, .28, 800, 'bandpass');
            }

            function boom() {
                if (muted) return;
                init();
                noise(.5, .55, 320, 'lowpass');
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(130, ctx.currentTime);
                o.frequency.exponentialRampToValueAtTime(38, ctx.currentTime + .4);
                o.connect(g).connect(mg);
                env(g, .55, .002, .1, .2, .5);
                o.start();
                o.stop(ctx.currentTime + .55);
                noise(.18, .35, 2600, 'bandpass');
            }

            function mergeBoom() {
                if (muted) return;
                init();
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(90, ctx.currentTime);
                o.frequency.exponentialRampToValueAtTime(22, ctx.currentTime + 0.35);
                o.connect(g).connect(mg);
                env(g, 0.7, 0.005, 0.08, 0.3, 0.45);
                o.start();
                o.stop(ctx.currentTime + 0.5);
                noise(0.3, 0.5, 400, 'bandpass');
                const o2 = ctx.createOscillator(),
                    g2 = ctx.createGain();
                o2.type = 'triangle';
                o2.frequency.setValueAtTime(160, ctx.currentTime);
                o2.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.25);
                o2.connect(g2).connect(mg);
                env(g2, 0.35, 0.003, 0.06, 0.2, 0.35);
                o2.start();
                o2.stop(ctx.currentTime + 0.4);
                noise(0.12, 0.25, 3200, 'highpass');
            }

            function thud() {
                if (muted) return;
                init();
                noise(.2, .32, 160, 'lowpass');
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(80, ctx.currentTime);
                o.frequency.exponentialRampToValueAtTime(45, ctx.currentTime + .16);
                o.connect(g).connect(mg);
                env(g, .32, .002, .06, .2, .2);
                o.start();
                o.stop(ctx.currentTime + .22);
            }

            function alarmSound() {
                if (muted) return;
                init();
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.type = 'square';
                o.frequency.value = 880;
                o.connect(g).connect(mg);
                g.gain.value = 0.3;
                o.start();
                setTimeout(() => { o.stop(); }, 200);
            }

            function blip(f, dur = .12, type = 'sine', vol = .4) {
                if (muted) return;
                init();
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.type = type;
                o.frequency.value = f;
                o.connect(g).connect(mg);
                env(g, vol, .005, .04, .3, dur);
                o.start();
                o.stop(ctx.currentTime + dur + .05);
            }

            function milestone() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, .2, 'square', .28),
                    i * 90)); }

            function gift() { [659, 880, 1175, 1568].forEach((f, i) => setTimeout(() => blip(f, .18, 'triangle', .3),
                    i * 80)); }

            function gameOver() { [330, 277, 220, 175].forEach((f, i) => setTimeout(() => blip(f, .3, 'triangle', .3),
                    i * 120)); }

            function toggleMute() {
                muted = !muted;
                if (mg) mg.gain.value = muted ? 0 : .45;
                return muted;
            }
            return { launch, boom, thud, mergeBoom, milestone, gift, gameOver, toggleMute, init, alarmSound };
        })();

        /* ---------- GAME STATE ---------- */
        let gameOn = false,
            paused = false,
            gameStarted = false;
        let score = 0;
        let curVal = 2,
            nxtVal = 2,
            aimX = 0,
            maxReached = 2;
        let rowTimer = 0,
            ROW_INTERVAL = 4.2;
        let shakeAmt = 0,
            isOverlayVisible = true,
            shotCube = null;
        let rampBody = null,
            rampMesh = null,
            rampState = 'idle';
        let shooterCube = null; // kinematic waiting cube

        /* ---------- DANGER ZONE ---------- */
        let dangerActive = false,
            dangerTimer = 0;
        const GRACE_DURATION = 3.0;

        /* ---------- ADD SCORE & XP ---------- */
        function addScore(points) {
            score += points;
            saveHighScoreIfNeeded(score);
            document.getElementById('score-display').textContent = score.toLocaleString();
        }

        function addXP(amount) {
            if (!gameOn) return;
            playerXP += amount;
            while (playerXP >= xpForLevel(playerLevel)) {
                playerXP -= xpForLevel(playerLevel);
                playerLevel++;
                triggerLevelUpVisuals();
            }
            refreshProgressionUI();
            saveProgression();
        }

        /* ---------- MERGE LOGIC ---------- */
        function tryMerge(a, b) {
            const nv = nextVal(a.value);
            if (nv > maxReached) maxReached = nv;
            const px = (a.body.position.x + b.body.position.x) / 2;
            const py = Math.max(trackY + CUBE_SZ / 2 + .1, (a.body.position.y + b.body.position.y) / 2);
            const pz = (a.body.position.z + b.body.position.z) / 2;
            removeCube(a);
            removeCube(b);
            const nc = spawnCube(px - trackY, py - trackY, pz, nv);
            nc.flash = 12;
            nc.mergeActive = true;
            nc.mergeCooldown = 0.5;
            nc.body.velocity.set((Math.random() - .5) * 3, 6.5, (Math.random() - .5) * 3);
            nc.body.angularVelocity.set((Math.random() - .5) * 9, (Math.random() - .5) * 9, (Math.random() - .5) * 9);

            for (const c2 of cubes) {
                if (c2.id === nc.id) continue;
                const dx = c2.body.position.x - px,
                    dy = c2.body.position.y - py,
                    dz = c2.body.position.z - pz;
                const d = Math.sqrt(dx * dx + dy * dy + dz * dz);
                if (d < 3.5 && d > 0.1) {
                    const f = 7 / (d + .3);
                    c2.body.applyImpulse(new CANNON.Vec3((dx / d) * f, 2.5, (dz / d) * f), new CANNON.Vec3(0, 0, 0));
                }
            }
            const pal = gp(nv);
            spawnShards(px - trackY, py - trackY, pz, gp(a.value).hex, 16);
            spawnParticles(px - trackY, py - trackY, pz, pal.glow, 24, 7);
            spawnParticles(px - trackY, py - trackY, pz, 0xff6600, 18, 5);
            if (nv >= 16) spawnParticles(px - trackY, py - trackY, pz, 0xFFD700, 14, 7);
            spawnFlashSphere(px - trackY, py - trackY, pz, pal.glow);
            spawnFlashSphere(px - trackY, py - trackY, pz, 0xff8800);

            addScore(nv);
            addXP(nv);
            shakeAmt = Math.min(.55, .1 + Math.log2(nv) * .03);
            const lt = nv >= 64 ? 'points-mega' : nv >= 16 ? 'points-big' : 'points';
            floatText(px - trackY, py - trackY + .6, pz, `+${nv}`, lt);
            audio.mergeBoom();
            return nc;
        }

        function sweepMerges() {
            let iter = 0;
            const MERGE_THRESHOLD = (CUBE_SZ * 1.7) * (CUBE_SZ * 1.7);
            while (iter < 16) {
                iter++;
                let merged = false;
                outer: for (let i = 0; i < cubes.length; i++) {
                    for (let j = i + 1; j < cubes.length; j++) {
                        const a = cubes[i],
                            b = cubes[j];
                        if (a.value !== b.value) continue;
                        if (a.mergeCooldown > 0 || b.mergeCooldown > 0) continue;
                        const dx = a.body.position.x - b.body.position.x,
                            dy = a.body.position.y - b.body.position.y,
                            dz = a.body.position.z - b.body.position.z;
                        if (dx * dx + dy * dy + dz * dz < MERGE_THRESHOLD) {
                            const nc = tryMerge(a, b);
                            if (a === shotCube || b === shotCube) shotCube = nc;
                            merged = true;
                            break outer;
                        }
                    }
                }
                if (!merged) break;
            }
        }

        /* ---------- SHOOTING & KINEMATIC WAITING CUBE ---------- */
        function shoot() {
            if (!gameOn || paused || !shooterCube) return;
            audio.init();
            audio.launch();

            // Convert waiting kinematic cube to dynamic
            const body = shooterCube.body;
            body.type = CANNON.Body.DYNAMIC;
            body.mass = 2;
            body.updateMassProperties();
            body.velocity.set(0, 2.5, -45);
            body.collisionFilterGroup = 2;
            body.collisionFilterMask = 1 | 8;

            // Add to cubes array as shot cube
            const cubeObj = {
                id: uid++,
                mesh: shooterCube.mesh,
                body,
                value: curVal,
                isShot: true,
                flash: 0,
                mergeActive: true,
                mergeCooldown: 0,
            };
            cubes.push(cubeObj);
            shotCube = cubeObj;

            // Create new waiting cube with next value
            curVal = nxtVal;
            nxtVal = rndStart();
            shooterCube = createKinematicCube(aimX, CUBE_SZ / 2 + 0.3, SHOOTER_Z, curVal);

            if (!gameStarted) gameStarted = true;
        }

        function updateShooter() {
            if (!shooterCube || !gameOn) return;
            // Position kinematic cube at aimX
            shooterCube.body.position.set(aimX, trackY + CUBE_SZ / 2 + 0.3, SHOOTER_Z);
            shooterCube.mesh.position.copy(shooterCube.body.position);
            shooterCube.mesh.material = getMats(curVal);
        }

        /* ---------- CONVEYOR & RAMP ---------- */
        function applyConveyorForce() {
            const forceStrength = 12;
            for (const c of cubes) {
                if (c.isShot) continue;
                if (c.body.position.z < BUFFER_ZONE) {
                    c.body.applyForce(new CANNON.Vec3(0, 0, forceStrength), c.body.position);
                }
            }
        }

        function triggerRampSpawn() {
            if (rampState !== 'idle' || !gameOn || paused || !rampBody) return;
            rampBody.position.set(0, 0.55 + trackY, RAMP_HOME_Z);
            rampBody.velocity.set(0, 0, RAMP_SPEED);
            if (rampMesh) { rampMesh.position.z = RAMP_HOME_Z;
                rampMesh.visible = true; }
            rampState = 'pushing';
            audio.thud();
        }

        /* ---------- DANGER CHECK ---------- */
        function checkDangerZone(dt) {
            const dangerEl = document.getElementById('danger-indicator');
            const dangerLine = trackGroup.children.find(c => c.name === 'dangerLine');
            const dangerGlow = trackGroup.children.find(c => c.name === 'dangerGlow');
            let anyInDanger = false;
            for (const c of cubes) {
                if (c.isShot) continue;
                if (c.body.position.z > DANGER_Z) { anyInDanger = true; break; }
            }
            if (anyInDanger && !dangerActive) {
                dangerActive = true;
                dangerTimer = GRACE_DURATION;
                if (dangerEl) dangerEl.style.display = 'block';
                if (dangerLine) dangerLine.material.color.set(0xff0000);
                if (dangerGlow) dangerGlow.material.opacity = 0.6;
                audio.alarmSound();
                floatText(0, trackY + 3, DANGER_Z, '⚠️ 3s GRACE!', 'gift');
            } else if (!anyInDanger && dangerActive) {
                dangerActive = false;
                dangerTimer = 0;
                if (dangerEl) dangerEl.style.display = 'none';
                if (dangerLine) dangerLine.material.color.set(0xff3333);
                if (dangerGlow) dangerGlow.material.opacity = 0.25;
                floatText(0, trackY + 3, DANGER_Z, 'SAFE!', 'gift');
            } else if (dangerActive) {
                dangerTimer -= dt;
                if (dangerEl) dangerEl.textContent = `⚠️ ${dangerTimer.toFixed(1)}s ⚠️`;
                if (dangerTimer <= 0) { triggerGameOver(); }
            }
        }

        /* ---------- GAME OVER ---------- */
        function triggerGameOver() {
            gameOn = false;
            gameStarted = false;
            isOverlayVisible = true;
            dangerActive = false;
            document.getElementById('danger-indicator').style.display = 'none';
            if (shotCube) { removeCube(shotCube);
                shotCube = null; }
            saveHighScoreIfNeeded(score);
            addToWeeklyLeaderboard(score);
            audio.gameOver();
            document.getElementById('hud').classList.remove('active');
            document.getElementById('overlay').innerHTML = `
                <div id="space-bg"></div>
                <div id="starfield"></div>
                <h1 class="overlay-title">GAME OVER</h1>
                <div style="color:#aaa;font-size:13px;">Final Score</div>
                <div class="score-big">${score.toLocaleString()}</div>
                <div style="color:#ffaa33;font-size:15px;">All-Time Best: ${highScore.toLocaleString()}</div>
                <div style="color:#c0aaff;font-size:16px;">Level: ${playerLevel} (XP ${playerXP}/${xpForLevel(playerLevel)})</div>
                <button class="play-btn" id="startBtn">PLAY AGAIN</button>
            `;
            document.getElementById('startBtn').addEventListener('click', startGame);
            starfieldContainer = document.getElementById('starfield');
            buildStarfield();
        }

        /* ---------- START GAME ---------- */
        function startGame() {
            while (cubes.length) removeCube(cubes[0]);
            shotCube = null;
            dangerActive = false;
            dangerTimer = 0;
            document.getElementById('danger-indicator').style.display = 'none';
            for (let i = particles.length - 1; i >= 0; i--) { scene.remove(particles[i].mesh);
                particles[i].mat.dispose(); }
            particles.length = 0;
            for (let i = trailParticles.length - 1; i >= 0; i--) { scene.remove(trailParticles[i].mesh);
                trailParticles[i].mat.dispose(); }
            trailParticles.length = 0;
            for (let i = flashSpheres.length - 1; i >= 0; i--) { scene.remove(flashSpheres[i].mesh);
                flashSpheres[i].mat.dispose(); }
            flashSpheres.length = 0;

            if (rampBody) { world.removeBody(rampBody);
                rampBody = null; }
            if (rampMesh) { scene.remove(rampMesh);
                rampMesh = null; }
            rampState = 'idle';

            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('hud').classList.add('active');
            score = 0;
            document.getElementById('score-display').textContent = '0';
            paused = false;
            maxReached = 2;
            rowTimer = 0;
            isOverlayVisible = false;
            gameStarted = false;

            refreshProgressionUI();
            applyTheme((playerLevel - 1) % THEMES.length);
            camera.position.set(0, camY, camZ);
            camera.lookAt(0, trackY, 0);

            // Setup shooter cube
            if (shooterCube) {
                scene.remove(shooterCube.mesh);
                world.removeBody(shooterCube.body);
            }
            curVal = rndStart();
            nxtVal = rndStart();
            aimX = 0;
            shooterCube = createKinematicCube(aimX, CUBE_SZ / 2 + 0.3, SHOOTER_Z, curVal);

            gameOn = true;

            // Ramp for spawning rows
            const rampWidth = TRACK_W + 0.4;
            rampBody = new CANNON.Body({
                type: CANNON.Body.KINEMATIC,
                material: wallMatPhys,
                shape: new CANNON.Box(new CANNON.Vec3(rampWidth / 2, 0.55, 0.24)),
            });
            rampBody.position.set(0, 0.55 + trackY, RAMP_HOME_Z);
            rampBody.velocity.set(0, 0, 0);
            rampBody.collisionFilterGroup = 4;
            rampBody.collisionFilterMask = 1;
            world.addBody(rampBody);
            rampMesh = new THREE.Mesh(new THREE.BoxGeometry(rampWidth, 0.45, 0.48),
                new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.92 }));
            rampMesh.position.set(0, trackY + 0.32, RAMP_HOME_Z);
            rampMesh.visible = false;
            scene.add(rampMesh);

            const startRowZ = Z_BACK + CUBE_SZ * 0.6;
            const startVals = [2, 4, 8, 16, 4];
            for (let i = 0; i < COLS; i++) {
                spawnCube(-TRACK_W / 2 + COL_W / 2 + i * COL_W, CUBE_SZ / 2 + 0.05, startRowZ, startVals[i], {
                    mergeCooldown: 0.4,
                });
            }
            audio.init();
        }

        /* ---------- GAME LOOP ---------- */
        let lastT = performance.now();

        function update() {
            if (isOverlayVisible) { requestAnimationFrame(update); return; }
            const now = performance.now(),
                dt = Math.min(.05, (now - lastT) / 1000);
            lastT = now;
            spaceStars.rotation.y += dt * 0.008;

            if (gameOn && !paused && gameStarted) {
                for (const c of cubes) { if (c.mergeCooldown > 0) c.mergeCooldown -= dt; }

                if (rampState === 'idle') {
                    rowTimer += dt;
                    const interval = Math.max(2.4, ROW_INTERVAL - score * 0.000015);
                    const liveCubes = cubes.filter(c => !c.isShot).length;
                    if (rowTimer >= interval || liveCubes <= 2) { rowTimer = 0;
                        triggerRampSpawn(); }
                }

                if (rampBody) {
                    if (rampState === 'pushing') {
                        rampBody.velocity.set(0, 0, RAMP_SPEED);
                        if (rampBody.position.z >= RAMP_PUSH_Z) {
                            rampBody.position.z = RAMP_PUSH_Z;
                            rampBody.velocity.set(0, 0, -RAMP_SPEED * 2);
                            rampState = 'retracting';
                        }
                    } else if (rampState === 'retracting') {
                        if (rampBody.position.z <= RAMP_HOME_Z) {
                            rampBody.position.set(0, 0.55 + trackY, RAMP_HOME_Z);
                            rampBody.velocity.set(0, 0, 0);
                            rampState = 'idle';
                            if (rampMesh) rampMesh.visible = false;
                            const minZ = RAMP_PUSH_Z + 1.2;
                            cubes.forEach(c => {
                                if (c.isShot) return;
                                if (c.body.position.z < minZ) {
                                    c.body.position.z = minZ;
                                    c.body.velocity.z = 0;
                                }
                            });
                            spawnRow(Z_BACK);
                        }
                    }
                }

                applyConveyorForce();
                world.step(1 / 60, dt, 4);
                if (rampMesh && rampBody) rampMesh.position.z = rampBody.position.z;

                for (const c of cubes) {
                    if (c.flash > 0) c.flash--;
                    if (c.body.position.x > X_LIMIT) { c.body.position.x = X_LIMIT; if (c.body.velocity.x > 0) c.body
                            .velocity.x *= -0.5; } else if (c.body.position.x < -X_LIMIT) { c.body.position.x = -
                            X_LIMIT; if (c.body.velocity.x < 0) c.body.velocity.x *= -0.5; }
                    if (c.body.position.z < Z_BACK) { c.body.position.z = Z_BACK; if (c.body.velocity.z < 0) c.body
                            .velocity.z *= -0.5; }
                    c.mesh.position.copy(c.body.position);
                    c.mesh.quaternion.copy(c.body.quaternion);
                    const ei = c.flash > 0 ? .28 + (c.flash / 12) * 1.7 : .28;
                    c.mesh.material.forEach(m => { if (m.emissiveIntensity !== undefined) m.emissiveIntensity =
                        ei; });
                }

                if (shotCube) {
                    const s = shotCube.body;
                    const worldPos = new THREE.Vector3(s.position.x, s.position.y, s.position.z);
                    const quat = new THREE.Quaternion(s.quaternion.x, s.quaternion.y, s.quaternion.z, s.quaternion
                    .w);
                    for (let i = 0; i < 3; i++) spawnTrailParticle(worldPos, new THREE.Vector3(s.velocity.x, s.velocity
                            .y, s.velocity.z), quat);
                }

                sweepMerges();
                if (shotCube && !cubes.includes(shotCube)) shotCube = null;
                if (shotCube && Math.abs(shotCube.body.velocity.z) < 0.3 && shotCube.body.position.z > -TRACK_L / 2 +
                    2) {
                    shotCube.isShot = false;
                    shotCube.mergeCooldown = 0.3;
                    shotCube = null;
                }
                if (shotCube && shotCube.body.position.z < -TRACK_L / 2 - 1) shotCube = null;

                checkDangerZone(dt);
                if (!gameOn) return;

                if (shakeAmt > 0) {
                    camera.position.x = camX + (Math.random() - .5) * shakeAmt * 2;
                    camera.position.y = camY + (Math.random() - .5) * shakeAmt;
                    shakeAmt *= .86;
                    if (shakeAmt < .005) { shakeAmt = 0;
                        camera.position.set(camX, camY, camZ); }
                }
            }

            // Update particle systems
            for (let i = flashSpheres.length - 1; i >= 0; i--) {
                const fs = flashSpheres[i];
                fs.life -= dt;
                fs.mesh.scale.setScalar(fs.mesh.scale.x + fs.scaleSpeed * dt);
                fs.mat.opacity = Math.max(0, fs.life * 1.8);
                if (fs.life <= 0) { scene.remove(fs.mesh);
                    fs.mat.dispose();
                    flashSpheres.splice(i, 1); }
            }
            for (let i = trailParticles.length - 1; i >= 0; i--) {
                const p = trailParticles[i];
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.vy += 1.5 * dt;
                p.life -= p.decay * dt;
                p.mat.opacity = Math.max(0, p.life);
                p.mesh.scale.setScalar(0.3 + p.life * 0.7);
                if (p.life <= 0) { scene.remove(p.mesh);
                    p.mat.dispose();
                    trailParticles.splice(i, 1); }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;
                p.vy -= 12 * dt;
                p.life -= p.decay;
                if (p.shard) { p.mesh.rotation.x += p.rx * p.vrot * dt;
                    p.mesh.rotation.y += p.ry * p.vrot * dt;
                    p.mesh.rotation.z += p.rz * p.vrot * dt; if (p.mesh.position.y < trackY + 0.15) { p.mesh.position
                            .y = trackY + 0.15;
                        p.vy *= -.4;
                        p.vx *= .6;
                        p.vz *= .6; } }
                if (p.life <= 0) { scene.remove(p.mesh);
                    p.mat.dispose();
                    particles.splice(i, 1); } else { p.mat.opacity = p.life; if (!p.shard) p.mesh.scale.setScalar(.6 +
                        p.life * .6); }
            }

            updateShooter();
            composer.render();
            requestAnimationFrame(update);
        }

        function rndStart() {
            let pool = [2, 2, 2, 4, 4, 8];
            if (maxReached >= 32) pool = [2, 4, 4, 8, 8, 16];
            if (maxReached >= 64) pool = [4, 8, 8, 16, 16, 32];
            if (maxReached >= 128) pool = [8, 16, 16, 32, 32, 64];
            if (maxReached >= 256) pool = [16, 32, 32, 64, 64, 128];
            if (maxReached >= 512) pool = [32, 64, 64, 128, 128, 256];
            return pool[Math.floor(Math.random() * pool.length)];
        }

        /* ---------- INPUT ---------- */
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -trackY);
        let dragging = false;

        function updateAim(cx, cy) {
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(groundPlane, target);
            if (target) aimX = Math.max(-X_LIMIT, Math.min(X_LIMIT, target.x));
        }
        canvas.addEventListener('mousedown', e => { dragging = true;
            updateAim(e.clientX, e.clientY); });
        canvas.addEventListener('mousemove', e => { if (dragging && gameOn && !paused) updateAim(e.clientX, e
        .clientY); });
        canvas.addEventListener('mouseup', () => { if (dragging) { shoot();
                dragging = false; } });
        canvas.addEventListener('touchstart', e => { dragging = true;
            updateAim(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (gameOn && !paused) updateAim(e.touches[0]
                .clientX, e.touches[0].clientY); }, { passive: false });
        canvas.addEventListener('touchend', e => { e.preventDefault();
            shoot();
            dragging = false; }, { passive: false });

        /* ---------- BUTTONS ---------- */
        document.getElementById('btn-pause').addEventListener('click', () => {
            if (!gameOn) return;
            paused = !paused;
            document.getElementById('btn-pause').textContent = paused ? '▶' : '⏸';
        });
        document.getElementById('btn-sound').addEventListener('click', () => {
            const m = audio.toggleMute();
            document.getElementById('btn-sound').textContent = m ? '🔇' : '🔊';
        });
        document.getElementById('btn-restart').addEventListener('click', startGame);

        function resize() {
            const w = wrap.clientWidth,
                h = wrap.clientHeight;
            renderer.setSize(w, h, false);
            composer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        /* ---------- INITIAL OVERLAY ---------- */
        function showInitialOverlay() {
            document.getElementById('overlay').innerHTML = `
                <div id="space-bg"></div>
                <div id="starfield"></div>
                <h1 class="overlay-title">MERGE CUBES 3D</h1>
                <p style="color:#dde;font-size:13px;text-align:center;max-width:280px;text-shadow:0 2px 10px rgba(0,0,0,0.9);">
                    Fit as many cubes as possible!<br>Merge identical cubes to grow them.
                </p>
                <button class="play-btn" id="startBtn">PLAY</button>
            `;
            document.getElementById('startBtn').addEventListener('click', startGame);
        }

        refreshProgressionUI();
        showInitialOverlay();
        update();
    </script>
</body>
</html>
