<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent}
body{background:#000;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;user-select:none;color:#fff}

#highscore-box{text-align:center;min-width:45px}
#highscore-lbl{color:#ffaa33;font-size:8px;font-weight:700;letter-spacing:1.5px}

@keyframes fup{0%{transform:translate(-50%,0) scale(.7);opacity:0}12%{transform:translate(-50%,-8px) scale(1.15);opacity:1}100%{transform:translate(-50%,-55px) scale(1);opacity:0}}
@keyframes msf{0%{transform:translate(-50%,8px) scale(.5);opacity:0}20%{transform:translate(-50%,-10px) scale(1.3);opacity:1}80%{opacity:1}100%{transform:translate(-50%,-55px);opacity:0}}
#boosters{width:100%;display:flex;justify-content:center;align-items:center;gap:30px;padding:8px 0 12px;background:linear-gradient(0deg,rgba(20,20,40,.95),rgba(15,15,30,.85));backdrop-filter:blur(10px);border-top:1px solid rgba(140,100,255,.2);flex-shrink:0;z-index:10;display:none !important}

.play-btn{position:relative;background:linear-gradient(135deg,#7b3fcc,#a855f7);color:#fff;border:none;border-radius:18px;padding:14px 50px;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:1.5px;box-shadow:0 6px 24px rgba(168,85,247,.5),inset 0 1px 0 rgba(255,255,255,.2)}

.goals-panel{background:rgba(0,0,0,.45);border:1px solid rgba(255,215,0,.25);border-radius:14px;padding:12px 20px;text-align:center;position:relative;backdrop-filter:blur(6px)}
.goals-panel h3{color:#FFD700;font-size:14px;margin-bottom:8px;letter-spacing:1px}
.goals-panel div{color:#ccc;font-size:13px;margin:4px 0}
#leaderboard-wrap{width:90%;max-width:320px;max-height:180px;overflow-y:auto;background:rgba(0,0,0,.5);border-radius:12px;padding:10px;border:1px solid rgba(255,170,51,.3);scrollbar-width:thin;scrollbar-color:#ffaa33 transparent}
#leaderboard-wrap h3{color:#ffaa33;font-size:15px;text-align:center;margin-bottom:8px;letter-spacing:1px}
.lb-entry{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,.08);font-size:12px;color:#ddd}
.lb-entry .lb-rank{color:#ffaa33;font-weight:700;min-width:24px}
.lb-entry .lb-score{color:#FFD700;font-weight:700}

#modal-close{display:block;margin:12px auto 0;background:#ffaa33;color:#000;border:none;border-radius:8px;padding:8px 24px;font-weight:700;cursor:pointer}
</style>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/","cannon-es":"https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"}}</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';

/* ─── STARFIELD ─────────────────────────────────────────────── */
function buildStarfield(){
  const sf=document.getElementById('starfield');if(!sf)return;sf.innerHTML='';
  function layer(count,size,dur,op){
    const cv=document.createElement('canvas');cv.width=600;cv.height=600;const ctx=cv.getContext('2d');
    for(let i=0;i<count;i++){const x=Math.random()*600,y=Math.random()*600,r=Math.random()*size+0.3;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${0.4+Math.random()*0.6})`;ctx.fill();}
    const div=document.createElement('div');div.className='star-layer';
    div.style.backgroundImage=`url(${cv.toDataURL()})`;div.style.backgroundRepeat='repeat';
    div.style.backgroundSize='600px 600px';div.style.opacity=op;div.style.animation=`warpStars ${dur}s linear infinite`;
    sf.appendChild(div);
  }
  layer(160,1.6,38,0.9);layer(220,1.0,68,0.7);layer(300,0.6,105,0.5);
}

/* ─── CONSTANTS ─────────────────────────────────────────────── */
const SEQ=[2,4,8,16,32,64,128,256,512,1024,2048,4096,8192,16384];
const PAL={
  2:{hex:0x3ecf5a,glow:0x2aff5a},4:{hex:0x8b5cf6,glow:0xa070ff},8:{hex:0xf97316,glow:0xffaa44},
  16:{hex:0x14b8a6,glow:0x44e0c8},32:{hex:0xf5b50a,glow:0xffd24a},64:{hex:0x0ea5e9,glow:0x44ccff},
  128:{hex:0x3b82f6,glow:0x77aaff},256:{hex:0xe11d48,glow:0xff3366},512:{hex:0xec4899,glow:0xff66bb},
  1024:{hex:0x7c3aed,glow:0xaa66ff},2048:{hex:0xFFD700,glow:0xffee44},4096:{hex:0xff5500,glow:0xff8844},
  8192:{hex:0x00ffff,glow:0x00ffff},16384:{hex:0xff00ff,glow:0xff00ff},
};
function gp(v){return PAL[v]||{hex:0xcc44ff,glow:0xff88ff}}
function nextVal(v){const i=SEQ.indexOf(v);return i>=0&&i+1<SEQ.length?SEQ[i+1]:v*2}

const COLS=5;
const CUBE_SZ=2.2;
const COL_W=CUBE_SZ+0.4;
const TRACK_W=COLS*COL_W+1.0;
const TRACK_L=36;
const DANGER_Z=13.5;
const SHOOTER_Z=16.0;
const X_LIMIT=TRACK_W/2-CUBE_SZ/2;
const Z_BACK=-TRACK_L/2 + CUBE_SZ/2;

const ROW_STEP    = CUBE_SZ + 0.06;
const RAMP_HOME_Z = -TRACK_L/2 + 0.3;
const SPAWN_Z     = RAMP_HOME_Z + 0.88;
const RAMP_PUSH_Z = 2.0;            // Σπρώχνει πολύ πιο μπροστά, αφήνοντας άπλετο χώρο
const RAMP_SPEED  = 12.0;

const GRP_TRACK  = 1;
const GRP_SHOT   = 2;
const GRP_WALL   = 4;
const GRP_NEWROW = 8;

/* ─── LOCAL STORAGE ─────────────────────────────────────────── */
const LS_HIGHSCORE='mergeCubes3D_highscore';
const LS_LEVEL='mergeCubes3D_playerLevel';
const LS_XP='mergeCubes3D_playerXP';
const LS_COINS='mergeCubes3D_coins';
const GIFT_DATE_KEY='mergeCubes3D_giftDate';
const FREE_BOMB_KEY='mergeCubes3D_freeBomb';
const FREE_RAINBOW_KEY='mergeCubes3D_freeRainbow';

let playerLevel=parseInt(localStorage.getItem(LS_LEVEL)||'1',10);
let playerXP=parseInt(localStorage.getItem(LS_XP)||'0',10);
let coins=parseInt(localStorage.getItem(LS_COINS)||'0',10);
let highScore=parseInt(localStorage.getItem(LS_HIGHSCORE)||'0',10);

function xpForLevel(lv){return Math.floor(1000*Math.pow(lv,2));}
function saveProgression(){
  localStorage.setItem(LS_LEVEL,playerLevel);
  localStorage.setItem(LS_XP,playerXP);
  localStorage.setItem(LS_COINS,coins);
  localStorage.setItem(LS_HIGHSCORE,highScore);
}

let roundScoreGoal=5000,roundCubeGoal=16,roundScoreMet=false,roundCubeMet=false,roundCoins=0;

document.getElementById('highscore-val').textContent=highScore.toLocaleString();

function updateLevelDisplay(){document.getElementById('level-box').textContent=`Lv.${playerLevel}`;}
function updateXPBar(){const needed=xpForLevel(playerLevel);const pct=Math.min(100,(playerXP/needed)*100);document.getElementById('xp-bar-fill').style.width=pct+'%';}
function updateCoinsDisplay(){document.getElementById('coins-box').innerHTML=`🪙 ${coins.toLocaleString()}`;}
function updateGoalsUI(){
  const scEl=document.getElementById('goal-score-text');
  const cuEl=document.getElementById('goal-cube-text');
  if(scEl){scEl.textContent=`🎯 ${score.toLocaleString()} / ${roundScoreGoal.toLocaleString()}`;scEl.className=roundScoreMet?'goal-met':'';}
  if(cuEl){cuEl.textContent=`🧊 ${maxReached} / ${roundCubeGoal}`;cuEl.className=roundCubeMet?'goal-met':'';}
}
function refreshAllProgressionUI(){updateLevelDisplay();updateXPBar();updateCoinsDisplay();updateGoalsUI();}

/* ─── LEADERBOARD ───────────────────────────────────────────── */
function getISOWeek(d){const date=new Date(d);date.setHours(0,0,0,0);date.setDate(date.getDate()+3-(date.getDay()+6)%7);const week1=new Date(date.getFullYear(),0,4);return 1+Math.round(((date.getTime()-week1.getTime())/86400000-3+(week1.getDay()+6)%7)/7);}
function getWeekKey(){const now=new Date();return `mergeCubes3D_weekly_${now.getFullYear()}_w${getISOWeek(now)}`;}
function getWeeklyLeaderboard(){try{return JSON.parse(localStorage.getItem(getWeekKey())||'[]')}catch(e){return[]}}
function saveWeeklyLeaderboard(lb){localStorage.setItem(getWeekKey(),JSON.stringify(lb));}
function addToWeeklyLeaderboard(s){
  const lb=getWeeklyLeaderboard();const now=new Date();
  const dateStr=now.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'2-digit'});
  const timeStr=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  lb.push({score:s,date:`${dateStr} ${timeStr}`});lb.sort((a,b)=>b.score-a.score);
  const top10=lb.slice(0,10);saveWeeklyLeaderboard(top10);return top10;
}
function saveHighScoreIfNeeded(s){if(s>highScore){highScore=s;saveProgression();document.getElementById('highscore-val').textContent=highScore.toLocaleString();}}
function updateRankScoreDisplay(s){document.getElementById('rank-score-display').textContent='Score: '+s.toLocaleString();}

function openLeaderboardModal(){
  const modal=document.getElementById('modal-leaderboard');
  document.getElementById('modal-current-score').textContent='Your Score: '+score.toLocaleString();
  const lb=getWeeklyLeaderboard();let html='';
  if(lb.length===0){html='<div class="lb-empty">No scores yet this week</div>';}
  else{lb.forEach((e,i)=>{html+=`<div class="lb-entry"><span class="lb-rank">#${i+1}</span><span class="lb-score">${e.score.toLocaleString()}</span><span class="lb-date">${e.date}</span></div>`;});}
  document.getElementById('modal-lb-list').innerHTML=html;modal.classList.add('active');
}
document.getElementById('btn-rank').addEventListener('click',openLeaderboardModal);
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal-leaderboard').classList.remove('active'));
document.getElementById('modal-leaderboard').addEventListener('click',(e)=>{if(e.target===document.getElementById('modal-leaderboard'))document.getElementById('modal-leaderboard').classList.remove('active');});

/* ─── 3D SETUP ──────────────────────────────────────────────── */
const wrap=document.getElementById('canvas-wrap');
const canvas=document.getElementById('three-canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080614);
scene.fog=new THREE.Fog(0x080614,46,92);

const camera=new THREE.PerspectiveCamera(64,1,0.1,250);
const trackY=3;

camera.position.set(0, 32, 28);
camera.lookAt(0, trackY, 1);

const ambient=new THREE.AmbientLight(0x7766cc,0.65);scene.add(ambient);
const keyLight=new THREE.DirectionalLight(0xffffff,1.4);
keyLight.position.set(5,22,13);keyLight.castShadow=true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.camera.left=-12;keyLight.shadow.camera.right=12;
keyLight.shadow.camera.top=30;keyLight.shadow.camera.bottom=-30;
keyLight.shadow.camera.near=0.5;keyLight.shadow.camera.far=70;
keyLight.shadow.bias=-0.0005;scene.add(keyLight);
const fillLight=new THREE.DirectionalLight(0x9977ff,0.5);fillLight.position.set(-7,13,9);scene.add(fillLight);
const rimLight=new THREE.PointLight(0xaa88ff,2.8,60);rimLight.position.set(0,10,-20);scene.add(rimLight);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(1,1),0.65,0.85,0.85));

const cubeGeo=new THREE.BoxGeometry(CUBE_SZ,CUBE_SZ,CUBE_SZ);
const matCache=new Map();
let rainbowMatsCache=null;

function makeTexture(value,pal){
  const sz=256,cv=document.createElement('canvas');cv.width=sz;cv.height=sz;const ctx=cv.getContext('2d');
  ctx.fillStyle='#'+pal.hex.toString(16).padStart(6,'0');ctx.fillRect(0,0,sz,sz);
  const gr=ctx.createRadialGradient(sz/2,sz/2,sz*.15,sz/2,sz/2,sz*.75);
  gr.addColorStop(0,'rgba(255,255,255,.22)');gr.addColorStop(1,'rgba(0,0,0,.3)');ctx.fillStyle=gr;ctx.fillRect(0,0,sz,sz);
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=10;ctx.strokeRect(5,5,sz-10,sz-10);
  let fontSize;if(value>=10000)fontSize=80;else if(value>=1000)fontSize=120;else if(value>=100)fontSize=150;else if(value>=10)fontSize=190;else fontSize=230;
  ctx.fillStyle='#fff';ctx.font=`900 ${fontSize}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=10;ctx.shadowOffsetY=5;ctx.fillText(value,sz/2,sz/2+8);
  const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;return t;
}
function getMats(value){
  if(matCache.has(value))return matCache.get(value);
  const pal=gp(value),tex=makeTexture(value,pal);
  const bp={color:0xffffff,roughness:.3,metalness:.2,emissive:pal.glow,emissiveIntensity:.28};
  const mn=new THREE.MeshStandardMaterial({...bp,map:tex});
  const mp=new THREE.MeshStandardMaterial({color:pal.hex,roughness:.3,metalness:.2,emissive:pal.glow,emissiveIntensity:.28});
  const ms=[mn,mn,mn,mp,mn,mn];matCache.set(value,ms);return ms;
}
function getRainbowMats(){
  if(rainbowMatsCache)return rainbowMatsCache;
  const sz=256,cv=document.createElement('canvas');cv.width=sz;cv.height=sz;const ctx=cv.getContext('2d');
  const g=ctx.createLinearGradient(0,0,sz,sz);
  ['#ff0040','#ff8800','#ffee00','#33dd33','#0099ff','#8844ff'].forEach((c,i,a)=>g.addColorStop(i/(a.length-1),c));
  ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=10;ctx.strokeRect(5,5,sz-10,sz-10);
  const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;
  const m=new THREE.MeshStandardMaterial({map:tex,roughness:.25,metalness:.3,emissive:0xffffff,emissiveIntensity:.2});
  rainbowMatsCache=[m,m,m,m,m,m];
  return rainbowMatsCache;
}

/* ─── CUBE SPAWNING ─────────────────────────────────────────── */
let uid=1;
const cubes=[];
const flashSpheres=[];

function spawnCube(x,y,z,value,opts={}){
  const mesh=new THREE.Mesh(cubeGeo,opts.rainbow?getRainbowMats():getMats(value));
  mesh.castShadow=true;mesh.receiveShadow=true;mesh.position.set(x,y+trackY,z);scene.add(mesh);

  let physMat;
  let linearDamping,angularDamping;
  if(opts.isShot){
    physMat=bouncyCubeMat;linearDamping=0.3;angularDamping=0.4;
  } else if(opts.isNewRow){
    physMat=newRowMat;linearDamping=0.88;angularDamping=0.95;
  } else if(opts.kinematic){
    physMat=cubeMat;linearDamping=0.5;angularDamping=0.6;
  } else {
    physMat=cubeMat;linearDamping=0.5;angularDamping=0.6;
  }

  const body=new CANNON.Body({
    mass: opts.isShot ? 2 : (opts.kinematic ? 0 : 1.2),
    type: opts.kinematic ? CANNON.Body.KINEMATIC : CANNON.Body.DYNAMIC,
    shape: new CANNON.Box(new CANNON.Vec3(CUBE_SZ/2,CUBE_SZ/2,CUBE_SZ/2)),
    material: physMat,
    position: new CANNON.Vec3(x,y+trackY,z),
    linearDamping,
    angularDamping
  });

  if(opts.isShot){
    // Αρχικά συγκρούεται ΜΟΝΟ με τοίχους – περνάει πάνω από όλα
    body.collisionFilterGroup=GRP_SHOT;
    body.collisionFilterMask=GRP_WALL;
  } else if(opts.isNewRow){
    body.collisionFilterGroup=GRP_NEWROW;
    body.collisionFilterMask=GRP_WALL;
  } else if(opts.kinematic){
    body.collisionFilterGroup=GRP_TRACK;
    body.collisionFilterMask=~0;
  } else {
    body.collisionFilterGroup=GRP_TRACK;
    body.collisionFilterMask=~0;
  }

  world.addBody(body);

  const cube={
    id:uid++,mesh,body,value,
    isShot:!!opts.isShot,
    rainbow:!!opts.rainbow,
    flash:0,
    mergeActive:true,
    mergeCooldown:opts.mergeCooldown||0,
    isNewRow:!!opts.isNewRow,
    newRowTimer:opts.isNewRow?1.5:0,
    settled:false,
    passedDanger: false
  };

  if(opts.addToCubes!==false){cubes.push(cube);}
  return cube;
}

function removeCube(c){scene.remove(c.mesh);world.removeBody(c.body);const i=cubes.indexOf(c);if(i>=0)cubes.splice(i,1);}

function activateNewRowCube(c){
  c.isNewRow=false;
  c.newRowTimer=0;
  c.body.collisionFilterGroup=GRP_TRACK;
  c.body.collisionFilterMask=~0;
}

let readyCubeMesh = null;
let readyCubeValue = 2;

function createReadyCube(value){
  if(readyCubeMesh){ scene.remove(readyCubeMesh); readyCubeMesh=null; }
  readyCubeValue = value;
  const mats = getMats(value);
  const mesh = new THREE.Mesh(cubeGeo, mats);
  mesh.castShadow = true;
  mesh.position.set(aimX, trackY + CUBE_SZ/2 + 0.15, SHOOTER_Z);
  scene.add(mesh);
  readyCubeMesh = mesh;
  if(shooterGlow){
    shooterGlow.position.x = aimX;
    shooterGlow.position.y = trackY + 0.03;
    shooterGlow.position.z = SHOOTER_Z;
  }
  updateAimLine();
}

function shoot(){
  if(!gameOn||paused) return;
  if(!readyCubeMesh) return;

  // Ο προηγούμενος κύβος (αν υπάρχει) ενεργοποιεί συγκρούσεις και παραμένει στο ταμπλό
  if(shotCube){
    shotCube.isShot = false;
    shotCube.body.collisionFilterGroup = GRP_TRACK;
    shotCube.body.collisionFilterMask = ~0;
    shotCube.mergeCooldown = 0.3;
    shotCube = null;
  }

  if(!gameStarted){ gameStarted=true; }
  audio.init(); audio.launch();

  scene.remove(readyCubeMesh);
  readyCubeMesh = null;

  const launchX = aimX;
  const launchY = CUBE_SZ/2 + 0.15;
  const launchZ = SHOOTER_Z;

  const nc = spawnCube(launchX, launchY, launchZ, readyCubeValue,
    { isShot:true, rainbow:rainbowArmed, addToCubes:false });

  nc.body.type    = CANNON.Body.DYNAMIC;
  nc.body.mass    = 2;
  nc.body.linearDamping  = 0.0;
  nc.body.angularDamping = 1.0;
  nc.body.fixedRotation  = true;
  nc.body.updateMassProperties();
  nc.body.wakeUp();

  // Ολίσθηση σε όλο το μήκος – χαμηλή τροχιά, μεγάλη ταχύτητα
  nc.body.velocity.set(0, 6, -30);
  nc.body.angularVelocity.set(0, 0, 0);

  nc.isShot = true;
  nc.launchZ = launchZ;
  nc.passedDanger = false;
  cubes.push(nc);
  shotCube = nc;

  curVal = nxtVal;
  nxtVal = rndStart();
  drawTargetHUD();
  createReadyCube(curVal);
  rainbowArmed = false;
}

/* ─── GAME LOGIC ────────────────────────────────────────────── */
function updateTarget(){targetVal=nextVal(maxReached);drawTargetHUD();}

function useBomb(){
  audio.boom();shakeAmt=.5;
  const sorted=cubes.filter(c=>!c.isShot).sort((a,b)=>b.body.position.z-a.body.position.z).slice(0,9);
  sorted.forEach(c=>{spawnShards(c.body.position.x-trackY,c.body.position.y-trackY,c.body.position.z,0xff5500,10);addScore(c.value);removeCube(c);});
  floatText(0,trackY+2.5,DANGER_Z-2,'BOOM!','points-mega');
}
function useRainbow(){rainbowArmed=true;floatText(aimX,trackY+2,SHOOTER_Z-1,'RAINBOW READY!','points-big');}

function tryMerge(a,b){
  const nv=nextVal(a.value);
  if(nv>maxReached){maxReached=nv;updateTarget();checkCubeGoal(nv);}
  const px=(a.body.position.x+b.body.position.x)/2;
  const py=Math.max(trackY+CUBE_SZ/2+.1,(a.body.position.y+b.body.position.y)/2);
  const pz=(a.body.position.z+b.body.position.z)/2;
  removeCube(a);removeCube(b);
  const nc=spawnCube(px-trackY,py-trackY,pz,nv);
  nc.flash=12;nc.mergeActive=true;nc.mergeCooldown=0.5;
  nc.body.velocity.set((Math.random()-.5)*3,6.5,(Math.random()-.5)*3);
  nc.body.angularVelocity.set((Math.random()-.5)*9,(Math.random()-.5)*9,(Math.random()-.5)*9);
  for(const c2 of cubes){if(c2.id===nc.id)continue;
    const dx=c2.body.position.x-px,dy=c2.body.position.y-py,dz=c2.body.position.z-pz;const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<3.5&&d>0.1){const f=7/(d+.3);c2.body.applyImpulse(new CANNON.Vec3((dx/d)*f,2.5,(dz/d)*f),new CANNON.Vec3(0,0,0));}}
  const pal=gp(nv);
  spawnShards(px-trackY,py-trackY,pz,gp(a.value).hex,16);
  spawnParticles(px-trackY,py-trackY,pz,pal.glow,24,7);
  spawnParticles(px-trackY,py-trackY,pz,0xff6600,18,5);
  if(nv>=16)spawnParticles(px-trackY,py-trackY,pz,0xFFD700,14,7);
  spawnFlashSphere(px-trackY,py-trackY,pz,pal.glow);spawnFlashSphere(px-trackY,py-trackY,pz,0xff8800);
  const pts=nv;
  addScore(pts);addXP(pts);addCoins(Math.max(1,Math.floor(nv/10)));
  shakeAmt=Math.min(.55,.1+Math.log2(nv)*.03);
  const lt=nv>=64?'points-mega':nv>=16?'points-big':'points';
  floatText(px-trackY,py-trackY+.6,pz,`+${pts}`,lt);
  if(SEQ.includes(nv)&&!seenMS.has(nv)){seenMS.add(nv);floatText(0,trackY+3,0,`✦ ${nv} REACHED! ✦`,'milestone');audio.milestone();}
  audio.mergeBoom();
  return nc;
}

function sweepMerges(){
  let iter=0;
  const MERGE_THRESHOLD=(CUBE_SZ*1.7)*(CUBE_SZ*1.7);
  while(iter<16){iter++;let merged=false;
    outer:for(let i=0;i<cubes.length;i++){for(let j=i+1;j<cubes.length;j++){
      const a=cubes[i],b=cubes[j];
      if(a.value!==b.value)continue;
      if(a.mergeCooldown>0||b.mergeCooldown>0)continue;
      if(a.isNewRow||b.isNewRow)continue;
      if(a.isShot||b.isShot)continue;   // shot cubes don't merge while in flight
      const dx=a.body.position.x-b.body.position.x,dy=a.body.position.y-b.body.position.y,dz=a.body.position.z-b.body.position.z;
      if(dx*dx+dy*dy+dz*dz<MERGE_THRESHOLD){
        const nc=tryMerge(a,b);
        merged=true;break outer;
      }}}if(!merged)break;
  }
}

/* ─── RAMP & ROWS ───────────────────────────────────────────── */
function clearSpawnZone(){
  const clearZ = RAMP_PUSH_Z + 1.5;   // πολύ μπροστά, εξασφαλίζει κενό χώρο
  for(const c of cubes){
    if(c.isShot||c.isNewRow)continue;
    if(c.body.position.z < clearZ){
      c.body.position.z = clearZ;
      if(c.body.velocity.z < 0) c.body.velocity.z = 0;
      c.body.velocity.x *= 0.5;
      c.body.velocity.y *= 0.5;
    }
  }
}

function spawnRow(z){
  clearSpawnZone();
  const vals=[[2,4,2,8,4],[4,2,8,2,4],[2,8,4,4,2],[4,2,4,8,2],[2,4,8,2,4]][Math.floor(Math.random()*5)];

    spawnCube(
      -TRACK_W/2+COL_W/2+i*COL_W,
      CUBE_SZ/2+0.02,
      z,
      vals[i],
      {isNewRow:true, mergeCooldown:1.0}
    );
  }
}

  rampBody.position.set(0,0.55+trackY,RAMP_HOME_Z);

}

function spawnParticles(x,y,z,color,count=16,speed=4){

    particles.push({mesh,mat,vx:Math.cos(a)*Math.cos(alt)*s,vy:Math.abs(Math.sin(alt))*s+1.5,vz:Math.sin(a)*Math.cos(alt)*s,life:1,decay:.02+Math.random()*.01,shard:false});}

function spawnShards(x,y,z,color,count=10){
  for(let i=0;i<count;i++){
    const mat=new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:.4,roughness:.4,metalness:.2,transparent:true,opacity:1});
    const mesh=new THREE.Mesh(shardGeo,mat);mesh.position.set(x,y+trackY,z);mesh.scale.setScalar(0.5+Math.random()*0.8);scene.add(mesh);
    const a=Math.random()*Math.PI*2,alt=Math.random()*Math.PI*0.6;const s=4+Math.random()*4;
    particles.push({mesh,mat,vx:Math.cos(a)*Math.cos(alt)*s,vy:Math.sin(alt)*s+3,vz:Math.sin(a)*Math.cos(alt)*s,life:1,decay:.018+Math.random()*.008,shard:true,vrot:(Math.random()-.5)*12,rx:Math.random(),ry:Math.random(),rz:Math.random()});}

function spawnFlashSphere(x,y,z,color){

function spawnTrailParticle(worldPos,velocity,cubeQuat){

/* ─── AUDIO ─────────────────────────────────────────────────── */
const audio=(()=>{
  let ctx=null,mg=null,muted=false;
  function init(){if(ctx)return;ctx=new(window.AudioContext||window.webkitAudioContext)();mg=ctx.createGain();mg.gain.value=.45;mg.connect(ctx.destination);}
  function env(g,pk,a,d,s,dur){const t=ctx.currentTime;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(pk,t+a);g.gain.exponentialRampToValueAtTime(Math.max(.0001,pk*s),t+a+d);g.gain.exponentialRampToValueAtTime(.0001,t+dur);}
  function noise(dur,vol,freq,type='lowpass'){const n=ctx.createBufferSource(),buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);n.buffer=buf;const fi=ctx.createBiquadFilter();fi.type=type;fi.frequency.value=freq;const g=ctx.createGain();g.gain.value=vol;n.connect(fi).connect(g).connect(mg);n.start();return n;}
  function launch(){if(muted)return;init();const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(150,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.12);o.connect(g).connect(mg);env(g,.18,.005,.02,.2,.16);o.start();o.stop(ctx.currentTime+.18);const o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='triangle';o2.frequency.setValueAtTime(80,ctx.currentTime);o2.frequency.exponentialRampToValueAtTime(400,ctx.currentTime+0.1);o2.connect(g2).connect(mg);env(g2,.12,.003,.02,.2,.14);o2.start();o2.stop(ctx.currentTime+.16);noise(.14,.28,800,'bandpass');}
  function boom(){if(muted)return;init();noise(.5,.55,320,'lowpass');const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(130,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(38,ctx.currentTime+.4);o.connect(g).connect(mg);env(g,.55,.002,.1,.2,.5);o.start();o.stop(ctx.currentTime+.55);noise(.18,.35,2600,'bandpass');}
  function mergeBoom(){if(muted)return;init();const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(90,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(22,ctx.currentTime+0.35);o.connect(g).connect(mg);env(g,0.7,0.005,0.08,0.3,0.45);o.start();o.stop(ctx.currentTime+0.5);noise(0.3,0.5,400,'bandpass');const o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='triangle';o2.frequency.setValueAtTime(160,ctx.currentTime);o2.frequency.exponentialRampToValueAtTime(50,ctx.currentTime+0.25);o2.connect(g2).connect(mg);env(g2,0.35,0.003,0.06,0.2,0.35);o2.start();o2.stop(ctx.currentTime+0.4);noise(0.12,0.25,3200,'highpass');}
  function thud(){if(muted)return;init();noise(.2,.32,160,'lowpass');const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(80,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(45,ctx.currentTime+.16);o.connect(g).connect(mg);env(g,.32,.002,.06,.2,.2);o.start();o.stop(ctx.currentTime+.22);}
  function blip(f,dur=.12,type='sine',vol=.4){if(muted)return;init();const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=f;o.connect(g).connect(mg);env(g,vol,.005,.04,.3,dur);o.start();o.stop(ctx.currentTime+dur+.05);}
  function milestone(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,.2,'square',.28),i*90));}
  function gift(){[659,880,1175,1568].forEach((f,i)=>setTimeout(()=>blip(f,.18,'triangle',.3),i*80));}
  function gameOver(){[330,277,220,175].forEach((f,i)=>setTimeout(()=>blip(f,.3,'triangle',.3),i*120));}
  function toggleMute(){muted=!muted;if(mg)mg.gain.value=muted?0:.45;return muted;}
  return{launch,boom,thud,mergeBoom,milestone,gift,gameOver,toggleMute,init};
})();

/* ─── MAIN LOOP ─────────────────────────────────────────────── */
let lastT=performance.now();
function update(){
  if(isOverlayVisible){requestAnimationFrame(update);return;}
  const now=performance.now(),dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  spaceStars.rotation.y+=dt*0.008;

  if(gameOn&&!paused){
    for(const c of cubes){if(c.mergeCooldown>0)c.mergeCooldown-=dt;}

    for(const c of cubes){
      if(c.isNewRow){
        c.newRowTimer-=dt;
        if(c.newRowTimer<=0) activateNewRowCube(c);
      }
    }

    // Ενεργοποίηση συγκρούσεων με κύβους ΜΟΝΟ αφού ο βολικός κύβος περάσει την κόκκινη γραμμή
    if(shotCube && !shotCube.passedDanger && shotCube.body.position.z < DANGER_Z){
      shotCube.passedDanger = true;
      shotCube.body.collisionFilterMask = GRP_TRACK | GRP_WALL;   // τώρα μπορεί να χτυπήσει κύβους
    }

    if(gameStarted&&rampState==='idle'){
      rowTimer+=dt;
      const interval=Math.max(2.0,4.2-(playerLevel-1)*0.12);
      const liveCubes=cubes.filter(c=>!c.isShot).length;
      if(rowTimer>=interval||liveCubes<=2){rowTimer=0;triggerRampSpawn();}
    }

    if(rampBody){
      if(rampState==='pushing'){
        rampBody.velocity.set(0,0,RAMP_SPEED);
        if(rampBody.position.z >= RAMP_PUSH_Z){
          rampBody.position.z = RAMP_PUSH_Z;
          rampBody.velocity.set(0,0,-RAMP_SPEED*2);
          rampState='retracting';
        }
      } else if(rampState==='retracting'){
        if(rampBody.position.z <= RAMP_HOME_Z){
          rampBody.position.set(0,0.55+trackY,RAMP_HOME_Z);
          rampBody.velocity.set(0,0,0);
          rampState='idle';
          if(rampMesh)rampMesh.visible=false;
          const minZ = RAMP_PUSH_Z + 1.5;
          cubes.forEach(c=>{if(c.isShot||c.isNewRow)return;if(c.body.position.z < minZ){c.body.position.z = minZ;c.body.velocity.z=0;}});
          spawnRow(Z_BACK);
        }
      }
    }

    world.step(1/60,dt,4);
    if(rampMesh&&rampBody)rampMesh.position.z=rampBody.position.z;

    const settling=(rampState==='idle');
    for(const c of cubes){
      if(c.flash>0)c.flash--;
      if(c.body.position.x > X_LIMIT){c.body.position.x = X_LIMIT; if(c.body.velocity.x>0)c.body.velocity.x*=-0.5;}
      else if(c.body.position.x < -X_LIMIT){c.body.position.x = -X_LIMIT; if(c.body.velocity.x<0)c.body.velocity.x*=-0.5;}
      if(c.body.position.z < Z_BACK){c.body.position.z = Z_BACK; if(c.body.velocity.z<0)c.body.velocity.z*=-0.5;}

      if(c.isNewRow){
        if(c.body.position.y < trackY+CUBE_SZ/2+0.1){
          c.body.position.y = trackY+CUBE_SZ/2+0.02;
          c.body.velocity.y = 0;
          c.body.velocity.x *= 0.7;
          c.body.velocity.z *= 0.7;
          c.body.angularVelocity.set(0,0,0);
          c.body.quaternion.set(0,0,0,1);
        }
      }

      if(settling && !c.isShot && !c.isNewRow && Math.abs(c.body.velocity.z)<0.6 && Math.abs(c.body.velocity.x)<0.6){
        let col = Math.round((c.body.position.x + TRACK_W/2 - COL_W/2) / COL_W);
        col = Math.max(0, Math.min(COLS-1, col));
        const cx = -TRACK_W/2 + COL_W/2 + col*COL_W;
        c.body.position.x += (cx - c.body.position.x)*0.18;
        c.body.velocity.x *= 0.5;
      }

      c.mesh.position.copy(c.body.position);
      c.mesh.quaternion.copy(c.body.quaternion);
      const ei = c.flash>0 ? .28+(c.flash/12)*1.7 : .28;
      const mats = Array.isArray(c.mesh.material)?c.mesh.material:[c.mesh.material];
      mats.forEach(m=>{if(m&&m.emissiveIntensity!==undefined)m.emissiveIntensity=ei;});
    }

    if(shotCube && !shotCube.rainbow){
      const s=shotCube.body;
      const worldPos=new THREE.Vector3(s.position.x,s.position.y,s.position.z);
      const quat=new THREE.Quaternion(s.quaternion.x,s.quaternion.y,s.quaternion.z,s.quaternion.w);
      for(let i=0;i<3;i++) spawnTrailParticle(worldPos,new THREE.Vector3(s.velocity.x,s.velocity.y,s.velocity.z),quat);
    }

    if(shotCube && shotCube.rainbow){
      for(const c of cubes){if(c===shotCube||c.isShot)continue;
        const dx=c.body.position.x-shotCube.body.position.x, dz=c.body.position.z-shotCube.body.position.z;
        if(dx*dx+dz*dz < (CUBE_SZ*1.3)*(CUBE_SZ*1.3)){
          const ref=shotCube; removeCube(shotCube); shotCube=null; rainbowClear(ref); break;
        }
      }
      if(shotCube && shotCube.body.position.z < Z_BACK+2){ const ref=shotCube; removeCube(shotCube); shotCube=null; rainbowClear(ref); }
    } else {
      sweepMerges();
      if(shotCube && !cubes.includes(shotCube)) shotCube=null;

      // Εγκατάσταση του βληματικού κύβου όταν φτάσει στο πίσω μέρος
      if(shotCube){
        if(shotCube.launchZ === undefined){
          shotCube.isShot = false;
          shotCube.body.collisionFilterGroup = GRP_TRACK;
          shotCube.body.collisionFilterMask = ~0;
          shotCube.mergeCooldown = 0.3;
          shotCube = null;
        } else {
          const traveled = shotCube.launchZ - shotCube.body.position.z;
          if(shotCube.body.position.z < DANGER_Z - 4){
            shotCube.body.linearDamping = 0.55;
          }
          if(traveled > 8.0 && Math.abs(shotCube.body.velocity.z) < 0.5 && Math.abs(shotCube.body.velocity.x) < 0.5 && shotCube.body.position.z < DANGER_Z - 2){
            shotCube.isShot = false;
            shotCube.body.linearDamping = 0.5;
            shotCube.body.collisionFilterGroup = GRP_TRACK;
            shotCube.body.collisionFilterMask = ~0;
            shotCube.mergeCooldown = 0.3;
            shotCube = null;
          }
        }
      }
      if(shotCube && shotCube.body.position.z < Z_BACK-1) shotCube=null;
    }

    if(shakeAmt>0){
      camera.position.x = 0 + (Math.random()-.5)*shakeAmt*2;
      camera.position.y = 32 + (Math.random()-.5)*shakeAmt;
      shakeAmt *= .86;
      if(shakeAmt<.005){shakeAmt=0; camera.position.set(0,32,28); camera.lookAt(0,trackY,1);}
    }

    if(gameStarted && rampState==='idle'){
      for(const c of cubes){
        if(c.isShot || c.isNewRow) continue;
        if(c.body.position.z > DANGER_Z && Math.abs(c.body.velocity.z)<1.2){ triggerGameOver(); return; }
      }
    }
  }

  // Particles & fx update...
  for(let i=flashSpheres.length-1;i>=0;i--){
    const fs=flashSpheres[i]; fs.life-=dt; fs.mesh.scale.setScalar(fs.mesh.scale.x+fs.scaleSpeed*dt);
    fs.mat.opacity=Math.max(0,fs.life*1.8);
    if(fs.life<=0){scene.remove(fs.mesh);fs.mat.dispose();flashSpheres.splice(i,1);}
  }
  for(let i=trailParticles.length-1;i>=0;i--){
    const p=trailParticles[i];
    p.mesh.position.x+=p.vx*dt; p.mesh.position.y+=p.vy*dt; p.mesh.position.z+=p.vz*dt;
    p.vy+=1.5*dt; p.life-=p.decay*dt; p.mat.opacity=Math.max(0,p.life); p.mesh.scale.setScalar(0.3+p.life*0.7);
    if(p.life<=0){scene.remove(p.mesh);p.mat.dispose();trailParticles.splice(i,1);}
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.mesh.position.x+=p.vx*dt; p.mesh.position.y+=p.vy*dt; p.mesh.position.z+=p.vz*dt; p.vy-=12*dt; p.life-=p.decay;
    if(p.shard){
      p.mesh.rotation.x+=p.rx*p.vrot*dt; p.mesh.rotation.y+=p.ry*p.vrot*dt; p.mesh.rotation.z+=p.rz*p.vrot*dt;
      if(p.mesh.position.y<trackY+0.15){p.mesh.position.y=trackY+0.15; p.vy*=-.4; p.vx*=.6; p.vz*=.6;}
    }
    if(p.life<=0){scene.remove(p.mesh);p.mat.dispose();particles.splice(i,1);}
    else{p.mat.opacity=p.life; if(!p.shard)p.mesh.scale.setScalar(.6+p.life*.6);}
  }

  updateShooter(); updateHUD(); composer.render(); requestAnimationFrame(update);
}

function makeShooter(){
  if(shooterGlow){scene.remove(shooterGlow);shooterGlow=null;}
  if(aimLine){scene.remove(aimLine);aimLine=null;}

  const glow=new THREE.Mesh(
    new THREE.RingGeometry(.4,1.0,32),
    new THREE.MeshBasicMaterial({color:0x8855ff,transparent:true,opacity:.4,side:THREE.DoubleSide})
  );
  glow.rotation.x=-Math.PI/2;
  glow.position.set(aimX,trackY+0.03,SHOOTER_Z);
  scene.add(glow); shooterGlow=glow;
  const lg=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0.05, SHOOTER_Z),
    new THREE.Vector3(0, 0.05, Z_BACK+1)
  ]);
  aimLine=new THREE.Line(lg, new THREE.LineBasicMaterial({
    color:0x9966ff, transparent:true, opacity:0.28, depthWrite:false
  }));
  scene.add(aimLine);
  createReadyCube(curVal);
}

function updateShooter(){
  if(!readyCubeMesh) return;
  readyCubeMesh.position.set(aimX, trackY + CUBE_SZ/2 + 0.15, SHOOTER_Z);
  readyCubeMesh.rotation.set(0,0,0);
  readyCubeMesh.material = rainbowArmed ? getRainbowMats() : getMats(readyCubeValue);
  if(shooterGlow){
    shooterGlow.position.x = aimX;
    shooterGlow.position.y = trackY + 0.03;
    shooterGlow.position.z = SHOOTER_Z;
  }
  updateAimLine();
}

function updateAimLine(){
  if(aimLine){
    const pts=[
      new THREE.Vector3(aimX, 0.05, SHOOTER_Z),
      new THREE.Vector3(aimX, 0.05, Z_BACK+1)
    ];
    aimLine.geometry.setFromPoints(pts);
  }
}

/* ─── INPUT ─────────────────────────────────────────────────── */
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),-trackY);

function getAimX(clientX, clientY){
  const rect=canvas.getBoundingClientRect();
  mouse.x=((clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const target=new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane,target);
  if(target && isFinite(target.x)){
    aimX=Math.max(-X_LIMIT,Math.min(X_LIMIT,target.x));
  }
  if(readyCubeMesh) readyCubeMesh.position.x=aimX;
  if(shooterGlow)   shooterGlow.position.x=aimX;
  updateAimLine();
}

canvas.addEventListener('mousedown', e=>{ if(!gameOn||paused)return; getAimX(e.clientX,e.clientY); });
canvas.addEventListener('mousemove', e=>{ if(!gameOn||paused||e.buttons===0)return; getAimX(e.clientX,e.clientY); });
canvas.addEventListener('mouseup', e=>{ if(!gameOn||paused)return; getAimX(e.clientX,e.clientY); shoot(); });

let touchId=null;
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(!gameOn||paused)return;
  const t=e.changedTouches[0]; touchId=t.identifier; getAimX(t.clientX,t.clientY);
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(!gameOn||paused)return;
  for(const t of e.changedTouches){ if(t.identifier===touchId){ getAimX(t.clientX,t.clientY); break; } }
},{passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){ if(t.identifier===touchId){ getAimX(t.clientX,t.clientY); shoot(); touchId=null; break; } }
},{passive:false});
canvas.addEventListener('touchcancel', e=>{ e.preventDefault(); touchId=null; },{passive:false});

/* ─── BOOSTER BUTTONS ───────────────────────────────────────── */
document.getElementById('boost-bomb').addEventListener('click',()=>{
  if(!gameOn||paused)return;
  if(freeBomb>0){freeBomb--;updateBoosterBadges();useBomb();}
  else if(coins>=BOMB_COST){coins-=BOMB_COST;saveProgression();updateCoinsDisplay();updateBoosterBadges();useBomb();}
  else{if(typeof show_11108267==='function'){show_11108267().then(()=>{freeBomb++;updateBoosterBadges();useBomb();});}else alert('Ad not available');}
});
document.getElementById('boost-rainbow').addEventListener('click',()=>{
  if(!gameOn||paused)return;
  if(freeRainbow>0){freeRainbow--;updateBoosterBadges();useRainbow();}
  else if(coins>=RAINBOW_COST){coins-=RAINBOW_COST;saveProgression();updateCoinsDisplay();updateBoosterBadges();useRainbow();}
  else{if(typeof show_11108267==='function'){show_11108267().then(()=>{freeRainbow++;updateBoosterBadges();useRainbow();});}else alert('Ad not available');}
});
document.getElementById('btn-newgames').addEventListener('click',()=>{
  if(typeof show_11108267==='function'){show_11108267().then(()=>startGame());}else startGame();
});
document.getElementById('btn-pause').addEventListener('click',()=>{
  if(!gameOn)return;paused=!paused;document.getElementById('btn-pause').textContent=paused?'▶':'⏸';
});
document.getElementById('btn-sound').addEventListener('click',()=>{
  const m=audio.toggleMute();document.getElementById('btn-sound').textContent=m?'🔇':'🔊';
});

/* ─── RESIZE ────────────────────────────────────────────────── */
function resize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h,false);composer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
window.addEventListener('resize',resize);resize();

/* ─── BOOT ──────────────────────────────────────────────────── */
function startGame(){
  while(cubes.length)removeCube(cubes[0]);
  shotCube=null;
  if(readyCubeMesh){scene.remove(readyCubeMesh);readyCubeMesh=null;}
  for(let i=particles.length-1;i>=0;i--){scene.remove(particles[i].mesh);particles[i].mat.dispose();}particles.length=0;
  for(let i=trailParticles.length-1;i>=0;i--){scene.remove(trailParticles[i].mesh);trailParticles[i].mat.dispose();}trailParticles.length=0;
  for(let i=flashSpheres.length-1;i>=0;i--){scene.remove(flashSpheres[i].mesh);flashSpheres[i].mat.dispose();}flashSpheres.length=0;
  if(rampBody){world.removeBody(rampBody);rampBody=null;}
  if(rampMesh){scene.remove(rampMesh);rampMesh=null;}
  rampState='idle';

  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').classList.add('active');
  document.getElementById('boosters').classList.add('active');
  score=0;mult=1;paused=false;rainbowArmed=false;maxReached=2;
  rowTimer=0;seenMS=new Set();shakeAmt=0;isOverlayVisible=false;gameStarted=false;
  roundScoreGoal=playerLevel*2500;
  const cubeIdx=Math.min(SEQ.length-1,3+Math.floor(playerLevel/3));
  roundCubeGoal=SEQ[cubeIdx];
  roundScoreMet=false;roundCubeMet=false;roundCoins=0;
  applyDailyGift();updateBoosterBadges();refreshAllProgressionUI();updateRankScoreDisplay(0);updateTarget();
  document.getElementById('highscore-val').textContent=highScore.toLocaleString();
  camera.position.set(0,32,28); camera.lookAt(0,trackY,1);
  curVal=rndStart();nxtVal=rndStart();aimX=0;gameOn=true;
  makeShooter();

  const rampWidth=TRACK_W+0.6;
  rampBody=new CANNON.Body({type:CANNON.Body.KINEMATIC,material:wallPhysMat,shape:new CANNON.Box(new CANNON.Vec3(rampWidth/2,0.55,0.24))});
  rampBody.position.set(0,0.55+trackY,RAMP_HOME_Z);rampBody.velocity.set(0,0,0);
  rampBody.collisionFilterGroup=GRP_WALL;
  rampBody.collisionFilterMask=GRP_TRACK|GRP_NEWROW;
  world.addBody(rampBody);
  rampMesh=new THREE.Mesh(new THREE.BoxGeometry(rampWidth,0.45,0.48),new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.92}));
  rampMesh.position.set(0,trackY+0.32,RAMP_HOME_Z);rampMesh.visible=false;scene.add(rampMesh);

  const startVals=[2,4,8,16,4];
  const startRowZ=Z_BACK+CUBE_SZ*0.6;
  for(let i=0;i<COLS;i++){
    const cx=-TRACK_W/2+COL_W/2+i*COL_W;
    spawnCube(cx,CUBE_SZ/2+0.05,startRowZ,startVals[i],{isNewRow:true,mergeCooldown:1.2});
  }

  drawTargetHUD(); audio.init();
}

refreshAllProgressionUI();
showInitialOverlay();
update();
</script>
