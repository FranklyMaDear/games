<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Merge Cubes 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent}
body{background:#000;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;
  align-items:center;height:100dvh;overflow:hidden;user-select:none;color:#fff}
#hud{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px 6px;background:linear-gradient(180deg,rgba(20,20,40,.95),rgba(15,15,30,.85));
  backdrop-filter:blur(10px);border-bottom:1px solid rgba(140,100,255,.2);flex-shrink:0;gap:10px;z-index:10;
  display:none !important;}
#hud.active{display:flex !important;}
#next-area{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:5px 12px}
#next-label{color:#888;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
#combo-col{display:flex;flex-direction:column;gap:4px}
#mult-row{display:flex;align-items:center;gap:6px}
#mult-val{color:#f0a030;font-size:14px;font-weight:800;min-width:30px;text-shadow:0 0 8px rgba(240,160,48,.5)}
#mult-track{width:74px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
#mult-fill{height:100%;background:linear-gradient(90deg,#f0a030,#ff5555);width:0%;transition:width .3s;border-radius:3px;
  box-shadow:0 0 8px rgba(255,140,80,.5)}
#score-box{text-align:center;flex:1}
#score-lbl{color:#666;font-size:9px;font-weight:700;letter-spacing:2px}
#score-val{color:#fff;font-size:24px;font-weight:900;line-height:1;letter-spacing:-1px;
  text-shadow:0 0 16px rgba(140,100,255,.5);font-variant-numeric:tabular-nums}
.hbtn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);color:#aaa;font-size:13px;
  display:flex;align-items:center;justify-content:center;cursor:pointer}
#hammer-wrap{position:absolute;left:6px;top:40%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;z-index:10}
#hammer-icon{font-size:22px;cursor:pointer;filter:drop-shadow(0 0 6px rgba(255,140,40,.6));transition:transform .15s}
#hammer-icon.ready{animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 6px rgba(255,200,0,.8))}
  50%{transform:scale(1.15);filter:drop-shadow(0 0 14px rgba(255,200,0,1))}}
#hammer-track{width:12px;height:80px;background:rgba(20,20,40,.8);border-radius:6px;
  overflow:hidden;border:1px solid rgba(140,100,255,.3);position:relative}
#hammer-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#ff9900,#ff3300);
  transition:height .5s cubic-bezier(.4,0,.2,1);border-radius:6px;box-shadow:0 0 8px rgba(255,140,0,.6)}
#canvas-wrap{flex:1;width:100%;position:relative;overflow:hidden}
#three-canvas{display:block;width:100%;height:100%;cursor:crosshair}
#fx-layer{position:absolute;inset:0;pointer-events:none;z-index:20;overflow:hidden}
.float-text{position:absolute;font-weight:900;letter-spacing:.5px;
  text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none;animation:fup 1.2s cubic-bezier(.2,.7,.3,1) forwards}
.float-text.milestone{font-size:26px;color:#FFD700;text-shadow:0 0 20px rgba(255,180,0,.9);
  animation:msf 1.6s cubic-bezier(.2,.7,.3,1) forwards}
.float-text.points{font-size:16px;color:#FFD700;text-shadow:0 2px 10px rgba(0,0,0,.9),0 0 12px rgba(255,180,0,.5)}
.float-text.points-big{font-size:22px}
.float-text.points-mega{font-size:28px;color:#FFA500}
@keyframes fup{0%{transform:translate(-50%,0) scale(.7);opacity:0}12%{transform:translate(-50%,-8px) scale(1.15);opacity:1}
  100%{transform:translate(-50%,-55px) scale(1);opacity:0}}
@keyframes msf{0%{transform:translate(-50%,8px) scale(.5);opacity:0}20%{transform:translate(-50%,-10px) scale(1.3);opacity:1}
  80%{opacity:1}100%{transform:translate(-50%,-55px);opacity:0}}
#boosters{width:100%;display:flex;justify-content:center;gap:40px;padding:8px 0 12px;
  background:linear-gradient(0deg,rgba(20,20,40,.95),rgba(15,15,30,.85));
  backdrop-filter:blur(10px);border-top:1px solid rgba(140,100,255,.2);flex-shrink:0;z-index:10;
  display:none !important;}
#boosters.active{display:flex !important;}
.boost-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.boost-circle{width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#4a3a80,#1a1a3a);border:2px solid #7766cc;
  display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;
  box-shadow:0 0 18px rgba(120,90,220,.55),inset 0 2px 0 rgba(255,255,255,.15);transition:transform .12s}
.boost-circle:active{transform:scale(.86)}
.ad-badge{position:absolute;top:-5px;right:-6px;background:#dc2626;color:#fff;
  font-size:8px;padding:2px 6px;border-radius:6px;font-weight:800;display:flex;align-items:center;gap:2px}
.boost-name{color:#999;font-size:9px;font-weight:700;letter-spacing:.5px}
#overlay{position:absolute;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:transparent;overflow:hidden}
#overlay.hidden{display:none}
#space-bg{position:absolute;inset:0;z-index:-2;
  background:radial-gradient(ellipse at 50% 35%, #251a45 0%, #150f30 40%, #0a0720 70%, #050310 100%);overflow:hidden;pointer-events:none}
#starfield{position:absolute;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.star-layer{position:absolute;width:200%;height:200%;top:-50%;left:-50%}
@keyframes warpStars{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-50%) scale(1.1)}}
#overlay h1{position:relative;color:#fff;font-size:38px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,#a855f7,#ec4899,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(168,85,247,.5))}
#overlay p{position:relative;color:#dde;font-size:13px;text-align:center;line-height:1.8;max-width:280px;text-shadow:0 2px 10px rgba(0,0,0,.9)}
.score-big{color:#FFD700;font-size:54px;font-weight:900;text-shadow:0 0 30px rgba(255,200,0,.6);position:relative}
.play-btn{position:relative;background:linear-gradient(135deg,#7b3fcc,#a855f7);color:#fff;border:none;border-radius:18px;
  padding:14px 50px;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:1.5px;
  box-shadow:0 6px 24px rgba(168,85,247,.5),inset 0 1px 0 rgba(255,255,255,.2)}
.play-btn:active{transform:scale(.94)}
</style>
</head>
<body>
<div id="hud">
  <div id="next-area">
    <div><div id="next-label">Next</div><canvas id="next-cnv" width="40" height="40"></canvas></div>
    <div id="combo-col"><div id="mult-row"><span id="mult-val">1×</span>
      <div id="mult-track"><div id="mult-fill"></div></div></div></div>
  </div>
  <div id="score-box"><div id="score-lbl">SCORE</div><div id="score-val">0</div></div>
  <div style="display:flex;gap:6px"><div class="hbtn" id="btn-sound">🔊</div><div class="hbtn" id="btn-pause">⏸</div></div>
</div>
<div id="canvas-wrap">
  <canvas id="three-canvas"></canvas>
  <div id="fx-layer"></div>
  <div id="hammer-wrap">
    <div id="hammer-icon">🔨</div>
    <div id="hammer-track"><div id="hammer-fill" style="height:0%"></div></div>
  </div>
  <div id="overlay">
    <div id="space-bg"></div>
    <div id="starfield"></div>
    <h1>MERGE CUBES 3D</h1>
    <p>Drag to aim, release to launch!<br>Match numbers to <b style="color:#f0a030">merge</b><br>
      Don't let cubes cross the <b style="color:#ff4444">red line</b>!</p>
    <button class="play-btn" id="startBtn">PLAY</button>
  </div>
</div>
<div id="boosters">
  <div class="boost-btn" id="boost-bomb">
    <div class="boost-circle"><span>💣</span><span class="ad-badge">▶ AD</span></div>
    <div class="boost-name">BOMB</div>
  </div>
  <div class="boost-btn" id="boost-rainbow">
    <div class="boost-circle"><span>🌈</span><span class="ad-badge">▶ AD</span></div>
    <div class="boost-name">RAINBOW</div>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
  "cannon-es":"https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"}}</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';

// ═══ STARFIELD overlay ═══
function buildStarfield(){
  const sf=document.getElementById('starfield');if(!sf)return;sf.innerHTML='';
  function layer(count,size,dur,op){
    const cv=document.createElement('canvas');cv.width=600;cv.height=600;const ctx=cv.getContext('2d');
    for(let i=0;i<count;i++){const x=Math.random()*600,y=Math.random()*600,r=Math.random()*size+0.3;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${0.4+Math.random()*0.6})`;ctx.fill();}
    const div=document.createElement('div');div.className='star-layer';
    div.style.backgroundImage=`url(${cv.toDataURL()})`;div.style.backgroundRepeat='repeat';
    div.style.backgroundSize='600px 600px';div.style.opacity=op;div.style.animation=`warpStars ${dur}s linear infinite`;
    sf.appendChild(div);
  }
  layer(160,1.6,38,0.9);layer(220,1.0,68,0.7);layer(300,0.6,105,0.5);
}
buildStarfield();

// ═══ CONFIG ═══
const SEQ=[2,4,8,16,32,64,128,256,512,1024,2048,4096];
const PAL={
  2:{hex:0x3ecf5a,glow:0x2aff5a},4:{hex:0x8b5cf6,glow:0xa070ff},8:{hex:0xf97316,glow:0xffaa44},
  16:{hex:0x14b8a6,glow:0x44e0c8},32:{hex:0xf5b50a,glow:0xffd24a},64:{hex:0x0ea5e9,glow:0x44ccff},
  128:{hex:0x3b82f6,glow:0x77aaff},256:{hex:0xe11d48,glow:0xff3366},512:{hex:0xec4899,glow:0xff66bb},
  1024:{hex:0x7c3aed,glow:0xaa66ff},2048:{hex:0xFFD700,glow:0xffee44},4096:{hex:0xff5500,glow:0xff8844},
};
function gp(v){return PAL[v]||{hex:0xcc44ff,glow:0xff88ff}}
function nextVal(v){const i=SEQ.indexOf(v);return i>=0&&i+1<SEQ.length?SEQ[i+1]:v*2}

const COLS=5;
const TRACK_W=9;
const COL_W=TRACK_W/COLS;
const CUBE_SZ=1.35;
const TRACK_L=24;
const DANGER_Z=5.5;
const SHOOTER_Z=8.0;
const X_LIMIT=TRACK_W/2-CUBE_SZ/2;

// ═══ THREE.JS ═══
const wrap=document.getElementById('canvas-wrap');
const canvas=document.getElementById('three-canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x080614);
scene.fog=new THREE.Fog(0x080614,36,66);

// camera shows whole trapezoid track
const camera=new THREE.PerspectiveCamera(48,1,0.1,200);
camera.position.set(0, 15.5, 13);
camera.lookAt(0, 0.5, -0.5);

const ambient=new THREE.AmbientLight(0x7766cc,0.65);scene.add(ambient);
const keyLight=new THREE.DirectionalLight(0xffffff,1.4);
keyLight.position.set(5,18,11);keyLight.castShadow=true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.camera.left=-12;keyLight.shadow.camera.right=12;
keyLight.shadow.camera.top=20;keyLight.shadow.camera.bottom=-20;
keyLight.shadow.camera.near=0.5;keyLight.shadow.camera.far=50;
keyLight.shadow.bias=-0.0005;scene.add(keyLight);
const fillLight=new THREE.DirectionalLight(0x9977ff,0.5);fillLight.position.set(-7,11,8);scene.add(fillLight);
const rimLight=new THREE.PointLight(0xaa88ff,2.5,48);rimLight.position.set(0,9,-15);scene.add(rimLight);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(1,1),0.65,0.85,0.85));

// ═══ SPACE BG ═══
const starGeo=new THREE.BufferGeometry();
const starN=2400;const stp=new Float32Array(starN*3);
for(let i=0;i<starN;i++){const r=50+Math.random()*90,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
  stp[i*3]=r*Math.sin(ph)*Math.cos(th);stp[i*3+1]=r*Math.cos(ph)*0.7+6;stp[i*3+2]=r*Math.sin(ph)*Math.sin(th);}
starGeo.setAttribute('position',new THREE.BufferAttribute(stp,3));
const spaceStars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xddccff,size:0.4,sizeAttenuation:true,
  transparent:true,opacity:0.95,blending:THREE.AdditiveBlending,fog:false}));
scene.add(spaceStars);
function addNebula(x,y,z,color,size,op){const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,fog:false});
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(size,size),m);mesh.position.set(x,y,z);mesh.lookAt(camera.position);scene.add(mesh)}
addNebula(-26,8,-38,0x5522aa,50,0.16);addNebula(30,14,-44,0xaa2266,56,0.13);addNebula(0,24,-54,0x3344bb,70,0.11);

// ═══ TRACK (trapezoid frame like the photo) ═══
function buildTrack(){
  const g=new THREE.Group();
  const fm=new THREE.MeshStandardMaterial({color:0x2e1c4f,roughness:0.55,metalness:0.15,emissive:0x180e30,emissiveIntensity:0.4});
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W,TRACK_L),fm);fl.rotation.x=-Math.PI/2;fl.receiveShadow=true;g.add(fl);
  const gm=new THREE.LineBasicMaterial({color:0x8855dd,transparent:true,opacity:0.22});
  for(let i=0;i<=COLS;i++){const x=-TRACK_W/2+i*COL_W;
    const bg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x,.02,-TRACK_L/2),new THREE.Vector3(x,.02,TRACK_L/2)]);g.add(new THREE.Line(bg,gm))}
  // glossy purple frame
  const wm=new THREE.MeshStandardMaterial({color:0x7a55dd,roughness:0.3,metalness:0.65,emissive:0x6644cc,emissiveIntensity:0.9});
  const wallH=1.5,wallT=0.55;
  const lw=new THREE.Mesh(new THREE.BoxGeometry(wallT,wallH,TRACK_L+wallT),wm);lw.position.set(-TRACK_W/2-wallT/2,wallH/2,0);lw.castShadow=true;g.add(lw);
  const rw=new THREE.Mesh(new THREE.BoxGeometry(wallT,wallH,TRACK_L+wallT),wm);rw.position.set(TRACK_W/2+wallT/2,wallH/2,0);rw.castShadow=true;g.add(rw);
  const bw=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W+wallT*2,wallH,wallT),wm);bw.position.set(0,wallH/2,-TRACK_L/2-wallT/2);bw.castShadow=true;g.add(bw);
  const frontW=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W+wallT*2,wallH,wallT),wm);frontW.position.set(0,wallH/2,TRACK_L/2+wallT/2);frontW.castShadow=true;g.add(frontW);
  [[-TRACK_W/2-wallT/2,-TRACK_L/2-wallT/2],[TRACK_W/2+wallT/2,-TRACK_L/2-wallT/2],
   [-TRACK_W/2-wallT/2,TRACK_L/2+wallT/2],[TRACK_W/2+wallT/2,TRACK_L/2+wallT/2]].forEach(([cx,cz])=>{
    const cyl=new THREE.Mesh(new THREE.CylinderGeometry(wallT/2,wallT/2,wallH,16),wm);cyl.position.set(cx,wallH/2,cz);cyl.castShadow=true;g.add(cyl)});
  // top red line
  const tl=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W,.32),new THREE.MeshBasicMaterial({color:0xff2828,transparent:true,opacity:0.95}));
  tl.rotation.x=-Math.PI/2;tl.position.set(0,.05,-TRACK_L/2+1.6);g.add(tl);
  // bottom danger line
  const dl=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W,.38),new THREE.MeshBasicMaterial({color:0xff2222,transparent:true,opacity:0.95}));
  dl.rotation.x=-Math.PI/2;dl.position.set(0,.05,DANGER_Z);g.add(dl);
  const dg=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W,1.0),new THREE.MeshBasicMaterial({color:0xff2222,transparent:true,opacity:0.18}));
  dg.rotation.x=-Math.PI/2;dg.position.set(0,.06,DANGER_Z);g.add(dg);
  return g;
}
scene.add(buildTrack());

// ═══ PHYSICS ═══
const world=new CANNON.World({gravity:new CANNON.Vec3(0,-14,0)});
world.broadphase=new CANNON.NaiveBroadphase();world.solver.iterations=12;
const cubeMat=new CANNON.Material('cube'),floorMat=new CANNON.Material('floor'),wallMat=new CANNON.Material('wall');
world.addContactMaterial(new CANNON.ContactMaterial(cubeMat,floorMat,{friction:.35,restitution:.15}));
world.addContactMaterial(new CANNON.ContactMaterial(cubeMat,cubeMat,{friction:.2,restitution:.3}));
world.addContactMaterial(new CANNON.ContactMaterial(cubeMat,wallMat,{friction:.25,restitution:.4}));
const floorBody=new CANNON.Body({mass:0,shape:new CANNON.Plane(),material:floorMat});
floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0),-Math.PI/2);world.addBody(floorBody);
function addWall(x,y,z,sx,sy,sz){const b=new CANNON.Body({mass:0,shape:new CANNON.Box(new CANNON.Vec3(sx,sy,sz)),material:wallMat});b.position.set(x,y,z);world.addBody(b)}
addWall(-TRACK_W/2-0.25,1.5,0,0.25,3,TRACK_L/2+2);
addWall(TRACK_W/2+0.25,1.5,0,0.25,3,TRACK_L/2+2);
addWall(0,1.5,-TRACK_L/2-0.25,TRACK_W/2+1,3,0.25);
addWall(0,1.5,TRACK_L/2+0.25,TRACK_W/2+1,3,0.25);

// ═══ CUBE MESH ═══
const cubeGeo=new THREE.BoxGeometry(CUBE_SZ,CUBE_SZ,CUBE_SZ);
const matCache=new Map();
function makeTexture(value,pal){
  const sz=256,cv=document.createElement('canvas');cv.width=sz;cv.height=sz;const ctx=cv.getContext('2d');
  ctx.fillStyle='#'+pal.hex.toString(16).padStart(6,'0');ctx.fillRect(0,0,sz,sz);
  const gr=ctx.createRadialGradient(sz/2,sz/2,sz*.15,sz/2,sz/2,sz*.75);
  gr.addColorStop(0,'rgba(255,255,255,.22)');gr.addColorStop(1,'rgba(0,0,0,.3)');ctx.fillStyle=gr;ctx.fillRect(0,0,sz,sz);
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=10;ctx.strokeRect(5,5,sz-10,sz-10);
  ctx.fillStyle='#fff';ctx.font=`900 ${value>=1000?110:value>=100?140:value>=10?170:200}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=10;ctx.shadowOffsetY=5;
  ctx.fillText(value,sz/2,sz/2+8);
  const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;return t;
}
function getMats(value){
  if(matCache.has(value))return matCache.get(value);
  const pal=gp(value),tex=makeTexture(value,pal);
  const bp={color:0xffffff,roughness:.3,metalness:.2,emissive:pal.glow,emissiveIntensity:.28};
  const mn=new THREE.MeshStandardMaterial({...bp,map:tex});
  const mp=new THREE.MeshStandardMaterial({color:pal.hex,roughness:.3,metalness:.2,emissive:pal.glow,emissiveIntensity:.28});
  const ms=[mn,mn,mn,mp,mn,mn];matCache.set(value,ms);return ms;
}
let rainbowTex=null;
function getRainbowMats(){
  if(!rainbowTex){const sz=256,cv=document.createElement('canvas');cv.width=sz;cv.height=sz;const ctx=cv.getContext('2d');
    const g=ctx.createLinearGradient(0,0,sz,sz);
    ['#ff0040','#ff8800','#ffee00','#33dd33','#0099ff','#8844ff'].forEach((c,i,a)=>g.addColorStop(i/(a.length-1),c));
    ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=10;ctx.strokeRect(5,5,sz-10,sz-10);
    rainbowTex=new THREE.CanvasTexture(cv);rainbowTex.colorSpace=THREE.SRGBColorSpace;}
  const m=new THREE.MeshStandardMaterial({map:rainbowTex,roughness:.25,metalness:.3,emissive:0xffffff,emissiveIntensity:.2});
  return [m,m,m,m,m,m];
}

let uid=1;const cubes=[];
function spawnCube(x,y,z,value,opts={}){
  const mesh=new THREE.Mesh(cubeGeo,opts.rainbow?getRainbowMats():getMats(value));
  mesh.castShadow=true;mesh.receiveShadow=true;mesh.position.set(x,y,z);scene.add(mesh);
  const body=new CANNON.Body({mass:opts.isShot?2:1.2,
    shape:new CANNON.Box(new CANNON.Vec3(CUBE_SZ/2,CUBE_SZ/2,CUBE_SZ/2)),
    material:cubeMat,position:new CANNON.Vec3(x,y,z),linearDamping:.2,angularDamping:.3});
  world.addBody(body);
  const cube={id:uid++,mesh,body,value,isShot:!!opts.isShot,rainbow:!!opts.rainbow,flash:0};
  cubes.push(cube);return cube;
}
function removeCube(c){scene.remove(c.mesh);world.removeBody(c.body);const i=cubes.indexOf(c);if(i>=0)cubes.splice(i,1)}

function spawnRow(z){

// ═══ AUDIO ═══
const audio=(()=>{
  let ctx=null,mg=null,muted=false;
  function init(){if(ctx)return;ctx=new(window.AudioContext||window.webkitAudioContext)();mg=ctx.createGain();mg.gain.value=.45;mg.connect(ctx.destination)}
  function env(g,pk,a,d,s,dur){const t=ctx.currentTime;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(pk,t+a);g.gain.exponentialRampToValueAtTime(Math.max(.0001,pk*s),t+a+d);g.gain.exponentialRampToValueAtTime(.0001,t+dur)}
  function noise(dur,vol,freq,type='lowpass'){const n=ctx.createBufferSource(),buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    n.buffer=buf;const fi=ctx.createBiquadFilter();fi.type=type;fi.frequency.value=freq;const g=ctx.createGain();g.gain.value=vol;n.connect(fi).connect(g).connect(mg);n.start();return n}
  // LAUNCH sound: bright ascending "pew/zap"
  function shoot(){if(muted)return;init();
    const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';
    o.frequency.setValueAtTime(420,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+.1);
    o.connect(g).connect(mg);env(g,.13,.003,.03,.2,.14);o.start();o.stop(ctx.currentTime+.16);
    const o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='sine';
    o2.frequency.setValueAtTime(660,ctx.currentTime);o2.frequency.exponentialRampToValueAtTime(1320,ctx.currentTime+.1);
    o2.connect(g2).connect(mg);env(g2,.08,.003,.03,.2,.13);o2.start();o2.stop(ctx.currentTime+.15);
  }
  // BOMB / explosion — used for collisions now
  function boom(){if(muted)return;init();
    noise(.5,.55,320,'lowpass');
    const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';
    o.frequency.setValueAtTime(130,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(38,ctx.currentTime+.4);
    o.connect(g).connect(mg);env(g,.55,.002,.1,.2,.5);o.start();o.stop(ctx.currentTime+.55);
    noise(.18,.35,2600,'bandpass');
  }
  function blip(f,dur=.12,type='sine',vol=.4){if(muted)return;init();const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=f;o.connect(g).connect(mg);env(g,vol,.005,.04,.3,dur);o.start();o.stop(ctx.currentTime+dur+.05)}
  function milestone(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,.2,'square',.28),i*90))}
  function gameOver(){[330,277,220,175].forEach((f,i)=>setTimeout(()=>blip(f,.3,'triangle',.3),i*120))}
  function toggleMute(){muted=!muted;if(mg)mg.gain.value=muted?0:.45;return muted}
  return{shoot,boom,milestone,gameOver,toggleMute,init}
})();

// ═══ STATE ═══
let gameOn=false,paused=false,score=0,mult=1,comboBar=0,comboTimer=0;
let hammerChg=0,curVal=2,nxtVal=2,aimX=0,maxReached=2;
let conveyor=0.32,rowTimer=0,ROW_INTERVAL=3.0;
let seenMS=new Set(),shakeAmt=0,isOverlayVisible=true,shotCube=null,rainbowArmed=false;

// shooter value scales with game progress (maxReached)
function shooterPool(){
  // base small values, expand as the board climbs
  let pool=[2,2,2,4,4,8];
  if(maxReached>=32)pool=[2,4,4,8,8,16];
  if(maxReached>=64)pool=[4,8,8,16,16,32];
  if(maxReached>=128)pool=[8,16,16,32,32,64];
  if(maxReached>=256)pool=[16,32,32,64,64,128];
  if(maxReached>=512)pool=[32,64,64,128,128,256];
  return pool;
}
function rndStart(){const p=shooterPool();return p[Math.floor(Math.random()*p.length)]}

// ═══ SHOOTER ═══
let shooterMesh=null,aimLine=null;
function makeShooter(){
  shooterMesh=new THREE.Mesh(cubeGeo,getMats(curVal));shooterMesh.castShadow=true;
  shooterMesh.position.set(0,CUBE_SZ/2+.1,SHOOTER_Z);scene.add(shooterMesh);
  const glow=new THREE.Mesh(new THREE.RingGeometry(.4,1.1,32),new THREE.MeshBasicMaterial({color:0x8855ff,transparent:true,opacity:.4,side:THREE.DoubleSide}));
  glow.rotation.x=-Math.PI/2;glow.position.set(0,.03,SHOOTER_Z);scene.add(glow);shooterMesh._glow=glow;
  const lg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,.4,SHOOTER_Z),new THREE.Vector3(0,.4,-TRACK_L/2+2)]);
  aimLine=new THREE.Line(lg,new THREE.LineDashedMaterial({color:0xffffff,dashSize:.3,gapSize:.3,opacity:.5,transparent:true}));
  aimLine.computeLineDistances();scene.add(aimLine);
}
function updateShooter(){
  if(!shooterMesh)return;
  const show=gameOn&&!shotCube;
  shooterMesh.visible=show;aimLine.visible=gameOn&&!shotCube;shooterMesh._glow.visible=show;
  shooterMesh.position.x=aimX;shooterMesh.position.y=CUBE_SZ/2+.1+Math.sin(performance.now()*.004)*.06;
  shooterMesh.rotation.y+=.01;shooterMesh._glow.position.x=aimX;
  shooterMesh.material=rainbowArmed?getRainbowMats():getMats(curVal);
  aimLine.geometry.setFromPoints([new THREE.Vector3(aimX,.4,SHOOTER_Z),new THREE.Vector3(aimX,.4,-TRACK_L/2+2)]);
  aimLine.computeLineDistances();
}

// ═══ MERGE (instant on contact, any side) ═══
function tryMerge(a,b){
  if(a.value!==b.value)return false;
  const nv=nextVal(a.value);
  if(nv>maxReached)maxReached=nv;
  const px=(a.body.position.x+b.body.position.x)/2;
  const py=Math.max(CUBE_SZ/2+.1,(a.body.position.y+b.body.position.y)/2);
  const pz=(a.body.position.z+b.body.position.z)/2;
  removeCube(a);removeCube(b);
  const nc=spawnCube(px,py,pz,nv);nc.flash=12;
  // BOUNCE up + spin, fly to a side a bit
  nc.body.velocity.set((Math.random()-.5)*3,6.5,(Math.random()-.5)*3);
  nc.body.angularVelocity.set((Math.random()-.5)*8,(Math.random()-.5)*8,(Math.random()-.5)*8);
  for(const c2 of cubes){if(c2.id===nc.id)continue;
    const dx=c2.body.position.x-px,dy=c2.body.position.y-py,dz=c2.body.position.z-pz;const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(d<3.5&&d>0.1){const f=7/(d+.4);c2.body.applyImpulse(new CANNON.Vec3((dx/d)*f,2.5,(dz/d)*f),new CANNON.Vec3(0,0,0))}}
  const pal=gp(nv);
  spawnShards(px,py,pz,gp(a.value).hex,10);
  spawnParticles(px,py,pz,pal.glow,16,5);
  if(nv>=16)spawnParticles(px,py,pz,0xFFD700,10,6);
  const pts=nv*mult;score+=pts;
  comboBar=Math.min(100,comboBar+42);comboTimer=2.6;
  mult=comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1;
  hammerChg=Math.min(100,hammerChg+18);
  shakeAmt=Math.min(.45,.1+Math.log2(nv)*.025);
  const lt=nv>=64?'points-mega':nv>=16?'points-big':'points';
  floatText(px,py+.6,pz,`+${mult>1?mult+'×':''}${pts}`,lt);
  if(SEQ.includes(nv)&&!seenMS.has(nv)){seenMS.add(nv);floatText(0,3,0,`✦ ${nv} REACHED! ✦`,'milestone');audio.milestone()}
  conveyor=Math.min(0.55,0.32+score*0.000004);
  audio.boom();  // collision = bomb sound
  return nc;
}
function sweepMerges(){
  let iter=0;
  while(iter<12){iter++;let merged=false;
    outer:for(let i=0;i<cubes.length;i++){for(let j=i+1;j<cubes.length;j++){
      const a=cubes[i],b=cubes[j];if(a.value!==b.value)continue;
      const dx=a.body.position.x-b.body.position.x,dy=a.body.position.y-b.body.position.y,dz=a.body.position.z-b.body.position.z;
      // generous threshold = immediate merge from any side
      if(dx*dx+dy*dy+dz*dz<(CUBE_SZ*1.25)*(CUBE_SZ*1.25)){
        if(tryMerge(a,b)){if(a===shotCube||b===shotCube)shotCube=null;merged=true;break outer;}
      }
    }}if(!merged)break;
  }
}

// ═══ SHOOT ═══
function shoot(){
  if(!gameOn||paused||shotCube)return;
  audio.init();audio.shoot();
  const isRainbow=rainbowArmed;rainbowArmed=false;
  shotCube=spawnCube(aimX,CUBE_SZ/2+.3,SHOOTER_Z,curVal,{isShot:true,rainbow:isRainbow});
  shotCube._rainbow=isRainbow;
  shotCube.body.velocity.set(0,2,-24);
  curVal=nxtVal;nxtVal=rndStart();drawNextHUD();
}
function rainbowClear(refCube){
  audio.boom();shakeAmt=.5;
  const col=Math.round((refCube.body.position.x+TRACK_W/2-COL_W/2)/COL_W);
  const targetX=-TRACK_W/2+COL_W/2+col*COL_W;
  for(let i=cubes.length-1;i>=0;i--){const c=cubes[i];if(c.isShot)continue;
    if(Math.abs(c.body.position.x-targetX)<COL_W*0.9){spawnShards(c.body.position.x,c.body.position.y,c.body.position.z,gp(c.value).hex,8);score+=c.value;removeCube(c)}}
  floatText(targetX,2,DANGER_Z-2,'CLEARED!','points-big');
}

// ═══ UPDATE ═══
let lastT=performance.now();
function update(){
  if(isOverlayVisible){requestAnimationFrame(update);return;}
  const now=performance.now(),dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  spaceStars.rotation.y+=dt*0.01;

  if(gameOn&&!paused){
    for(const c of cubes){if(c.isShot)continue;if(c.body.velocity.z<conveyor)c.body.velocity.z+=conveyor*dt*4;if(c.flash>0)c.flash--}
    rowTimer+=dt;if(rowTimer>=ROW_INTERVAL){rowTimer=0;spawnRow(-TRACK_L/2+1.5)}
    if(cubes.filter(c=>!c.isShot).length<=4)spawnRow(-TRACK_L/2+1.5);

    world.step(1/60,dt,4);

    for(const c of cubes){
      if(c.body.position.x>X_LIMIT){c.body.position.x=X_LIMIT;if(c.body.velocity.x>0)c.body.velocity.x*=-.3}
      else if(c.body.position.x<-X_LIMIT){c.body.position.x=-X_LIMIT;if(c.body.velocity.x<0)c.body.velocity.x*=-.3}
      c.mesh.position.copy(c.body.position);c.mesh.quaternion.copy(c.body.quaternion);
      const ei=c.flash>0?.28+(c.flash/12)*1.7:.28;
      c.mesh.material.forEach(m=>{if(m.emissiveIntensity!==undefined)m.emissiveIntensity=ei});
    }

    if(shotCube&&shotCube._rainbow){
      for(const c of cubes){if(c===shotCube||c.isShot)continue;
        const dx=c.body.position.x-shotCube.body.position.x,dz=c.body.position.z-shotCube.body.position.z;
        if(dx*dx+dz*dz<(CUBE_SZ*1.3)*(CUBE_SZ*1.3)){const ref=shotCube;removeCube(shotCube);shotCube=null;rainbowClear(ref);break;}
      }
      if(shotCube&&shotCube.body.position.z<-TRACK_L/2+2){const ref=shotCube;removeCube(shotCube);shotCube=null;rainbowClear(ref);}
    }else{
      sweepMerges();
      if(shotCube&&(!cubes.includes(shotCube)||shotCube.body.position.z<-TRACK_L/2-1)){if(cubes.includes(shotCube))shotCube=null;}
      if(shotCube&&Math.abs(shotCube.body.velocity.z)<1&&shotCube.body.position.z>-TRACK_L/2+2){shotCube.isShot=false;shotCube=null;}
    }
    sweepMerges();

    if(comboTimer>0)comboTimer-=dt;else{comboBar=Math.max(0,comboBar-dt*16);mult=comboBar>=90?4:comboBar>=60?3:comboBar>=30?2:1}
    if(shakeAmt>0){camera.position.x=(Math.random()-.5)*shakeAmt*2;camera.position.y=15.5+(Math.random()-.5)*shakeAmt;
      shakeAmt*=.86;if(shakeAmt<.005){shakeAmt=0;camera.position.set(0,15.5,13)}}
    for(const c of cubes){if(c.isShot)continue;if(c.body.position.z>DANGER_Z+0.2){triggerGameOver();return}}
  }

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    p.mesh.position.x+=p.vx*dt;p.mesh.position.y+=p.vy*dt;p.mesh.position.z+=p.vz*dt;p.vy-=12*dt;p.life-=p.decay;
    if(p.shard){p.mesh.rotation.x+=p.rx*p.vrot*dt;p.mesh.rotation.y+=p.ry*p.vrot*dt;p.mesh.rotation.z+=p.rz*p.vrot*dt;
      if(p.mesh.position.y<0.15){p.mesh.position.y=0.15;p.vy*=-.4;p.vx*=.6;p.vz*=.6}}
    if(p.life<=0){scene.remove(p.mesh);p.mat.dispose();particles.splice(i,1)}
    else{p.mat.opacity=p.life;if(!p.shard)p.mesh.scale.setScalar(.6+p.life*.6)}}

  updateShooter();updateHUD();composer.render();requestAnimationFrame(update);
}

// ═══ HUD ═══
const scoreEl=document.getElementById('score-val'),multEl=document.getElementById('mult-val'),
  multFillEl=document.getElementById('mult-fill'),hammerFillEl=document.getElementById('hammer-fill'),
  hammerIconEl=document.getElementById('hammer-icon');
const nextCnv=document.getElementById('next-cnv'),nextCtx=nextCnv.getContext('2d');
function drawMiniCube(mc,cx,cy,sz,val){const pal=gp(val),d=sz*.22;
  mc.fillStyle='#'+pal.glow.toString(16).padStart(6,'0');mc.beginPath();
  mc.moveTo(cx-sz/2,cy);mc.lineTo(cx-sz/2+d,cy-d);mc.lineTo(cx+sz/2+d,cy-d);mc.lineTo(cx+sz/2,cy);
  mc.closePath();mc.fill();mc.fillStyle='rgba(0,0,0,.4)';mc.beginPath();
  mc.moveTo(cx+sz/2,cy);mc.lineTo(cx+sz/2+d,cy-d);mc.lineTo(cx+sz/2+d,cy+sz-d);mc.lineTo(cx+sz/2,cy+sz);
  mc.closePath();mc.fill();mc.fillStyle='#'+pal.hex.toString(16).padStart(6,'0');mc.beginPath();

// ═══ GAME OVER / START ═══
function triggerGameOver(){
  gameOn=false;isOverlayVisible=true;
  if(shotCube){removeCube(shotCube);shotCube=null}audio.gameOver();

function startGame(){

  document.getElementById('boosters').classList.add('active');

  camera.position.set(0,15.5,13);camera.lookAt(0,0.5,-0.5);

}

// ═══ INPUT ═══
const raycaster=new THREE.Raycaster();const mouse=new THREE.Vector2();
const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
let dragging=false;
function updateAim(cx,cy){const rect=canvas.getBoundingClientRect();
  mouse.x=((cx-rect.left)/rect.width)*2-1;mouse.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);const target=new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane,target);
  if(target)aimX=Math.max(-X_LIMIT,Math.min(X_LIMIT,target.x))}
canvas.addEventListener('mousedown',e=>{dragging=true;updateAim(e.clientX,e.clientY)});
canvas.addEventListener('mousemove',e=>{if(dragging&&gameOn&&!paused)updateAim(e.clientX,e.clientY)});
canvas.addEventListener('mouseup',()=>{if(dragging){shoot();dragging=false}});
canvas.addEventListener('touchstart',e=>{dragging=true;updateAim(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(gameOn&&!paused)updateAim(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();shoot();dragging=false},{passive:false});

document.getElementById('hammer-icon').addEventListener('click',()=>{
  if(!gameOn||hammerChg<100)return;hammerChg=0;shakeAmt=.5;audio.boom();
  const sorted=cubes.filter(c=>!c.isShot).sort((a,b)=>b.body.position.z-a.body.position.z).slice(0,8);
  sorted.forEach(c=>{spawnShards(c.body.position.x,c.body.position.y,c.body.position.z,gp(c.value).hex,8);removeCube(c)})});

document.getElementById('boost-bomb').addEventListener('click',()=>{
  if(!gameOn||paused)return;audio.boom();shakeAmt=.5;
  const sorted=cubes.filter(c=>!c.isShot).sort((a,b)=>b.body.position.z-a.body.position.z).slice(0,9);
  sorted.forEach(c=>{spawnShards(c.body.position.x,c.body.position.y,c.body.position.z,0xff5500,10);score+=c.value;removeCube(c)});
  floatText(0,2.5,DANGER_Z-2,'BOOM!','points-mega')});
document.getElementById('boost-rainbow').addEventListener('click',()=>{
  if(!gameOn||paused||shotCube)return;rainbowArmed=true;
  floatText(aimX,2,SHOOTER_Z-1,'RAINBOW READY!','points-big')});

document.getElementById('btn-pause').addEventListener('click',()=>{if(!gameOn)return;paused=!paused;
  document.getElementById('btn-pause').textContent=paused?'▶':'⏸'});
document.getElementById('btn-sound').addEventListener('click',()=>{const m=audio.toggleMute();
  document.getElementById('btn-sound').textContent=m?'🔇':'🔊'});
document.getElementById('startBtn').addEventListener('click',startGame);

function resize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h,false);
  composer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()}
window.addEventListener('resize',resize);resize();update();
</script>
</body>
</html>
