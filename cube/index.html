<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Merge Cubes 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      color: #fff;
    }

    /* ═══ HUD ═══ */
    #hud {
      width: 100%;
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      background: linear-gradient(180deg, rgba(20, 20, 40, .95), rgba(15, 15, 30, .85));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(140, 100, 255, .2);
      flex-shrink: 0;
      gap: 10px;
      z-index: 10;
    }
    #hud.visible {
      display: flex;
    }
    #next-area {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 14px;
      padding: 6px 12px;
    }
    #next-label {
      color: #888;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    #combo-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #mult-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #mult-val {
      color: #f0a030;
      font-size: 14px;
      font-weight: 800;
      min-width: 30px;
      text-shadow: 0 0 8px rgba(240, 160, 48, .5);
    }
    #mult-track {
      width: 74px;
      height: 6px;
      background: rgba(255, 255, 255, .08);
      border-radius: 3px;
      overflow: hidden;
    }
    #mult-fill {
      height: 100%;
      background: linear-gradient(90deg, #f0a030, #ff5555);
      width: 0%;
      transition: width .3s;
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(255, 140, 80, .5);
    }
    #score-box {
      text-align: center;
      flex: 1;
    }
    #score-lbl {
      color: #666;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    #score-val {
      color: #fff;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1px;
      text-shadow: 0 0 16px rgba(140, 100, 255, .5);
      font-variant-numeric: tabular-nums;
    }
    .hbtn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .12);
      color: #aaa;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* ═══ HAMMER ═══ */
    #hammer-wrap {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      z-index: 10;
    }
    #hammer-wrap.visible {
      display: flex;
    }
    #hammer-icon {
      font-size: 24px;
      cursor: pointer;
      filter: drop-shadow(0 0 6px rgba(255, 140, 40, .6));
      transition: transform .15s;
    }
    #hammer-icon.ready {
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 6px rgba(255, 200, 0, .8))
      }
      50% {
        transform: scale(1.15);
        filter: drop-shadow(0 0 14px rgba(255, 200, 0, 1))
      }
    }
    #hammer-track {
      width: 14px;
      height: 90px;
      background: rgba(20, 20, 40, .8);
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid rgba(140, 100, 255, .3);
      position: relative;
    }
    #hammer-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, #ff9900, #ff3300);
      transition: height .5s cubic-bezier(.4, 0, .2, 1);
      border-radius: 7px;
      box-shadow: 0 0 8px rgba(255, 140, 0, .6);
      height: 0%;
    }

    /* ═══ CANVAS ═══ */
    #canvas-wrap {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    #three-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #fx-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }
    .float-text {
      position: absolute;
      font-weight: 900;
      letter-spacing: .5px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .7);
      pointer-events: none;
      animation: fup 1.2s cubic-bezier(.2, .7, .3, 1) forwards;
    }
    .float-text.milestone {
      font-size: 30px;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 180, 0, .9);
      animation: msf 1.8s cubic-bezier(.2, .7, .3, 1) forwards;
    }
    .float-text.points {
      font-size: 18px;
      color: #FFD700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, .9), 0 0 12px rgba(255, 180, 0, .5);
    }
    .float-text.points-big {
      font-size: 24px;
    }
    .float-text.points-mega {
      font-size: 30px;
      color: #FFA500;
    }
    @keyframes fup {
      0% {
        transform: translate(-50%, 0) scale(.7);
        opacity: 0
      }
      12% {
        transform: translate(-50%, -8px) scale(1.15);
        opacity: 1
      }
      100% {
        transform: translate(-50%, -60px) scale(1);
        opacity: 0
      }
    }
    @keyframes msf {
      0% {
        transform: translate(-50%, 8px) scale(.5);
        opacity: 0
      }
      20% {
        transform: translate(-50%, -10px) scale(1.3);
        opacity: 1
      }
      80% {
        opacity: 1
      }
      100% {
        transform: translate(-50%, -60px);
        opacity: 0
      }
    }

    /* ═══ BOOSTERS ═══ */
    #boosters {
      width: 100%;
      display: none;
      justify-content: center;
      gap: 22px;
      padding: 10px 0 14px;
      background: linear-gradient(0deg, rgba(20, 20, 40, .95), rgba(15, 15, 30, .85));
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(140, 100, 255, .2);
      flex-shrink: 0;
      z-index: 10;
    }
    #boosters.visible {
      display: flex;
    }
    .boost-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .boost-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 32%, #4a3a80, #1a1a3a);
      border: 2px solid #6655bb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      position: relative;
      box-shadow: 0 0 16px rgba(100, 80, 200, .5), inset 0 2px 0 rgba(255, 255, 255, .15);
    }
    .boost-circle:active {
      transform: scale(.85);
    }
    .boost-name {
      color: #888;
      font-size: 9px;
      font-weight: 700;
    }

    /* ═══ OVERLAY ═══ */
    #overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(5, 0, 30, 0.9), rgba(0, 0, 0, 0.98));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 200;
      backdrop-filter: blur(8px);
      overflow: hidden;
    }
    #overlay.hidden {
      display: none;
    }
    /* starfield canvas */
    #starfield-canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
    }
    /* 3D cube canvas */
    #cube3d-canvas {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      width: 160px;
      height: 160px;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #overlay h1 {
      color: #fff;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #a855f7, #ec4899, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 2;
      margin-top: 120px;
    }
    #overlay p {
      color: #aaa;
      font-size: 13px;
      text-align: center;
      line-height: 1.8;
      max-width: 280px;
      position: relative;
      z-index: 2;
    }
    .play-btn {
      background: linear-gradient(135deg, #7b3fcc, #a855f7);
      color: #fff;
      border: none;
      border-radius: 18px;
      padding: 14px 50px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 1.5px;
      box-shadow: 0 6px 24px rgba(168, 85, 247, .5), inset 0 1px 0 rgba(255, 255, 255, .2);
      position: relative;
      z-index: 2;
    }
    .play-btn:active {
      transform: scale(.94);
    }
    .score-big {
      color: #FFD700;
      font-size: 54px;
      font-weight: 900;
      text-shadow: 0 0 30px rgba(255, 200, 0, .6);
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

  <!-- ═══ HUD (hidden initially) ═══ -->
  <div id="hud">
    <div id="next-area">
      <div>
        <div id="next-label">Next</div>
        <canvas id="next-cnv" width="44" height="44"></canvas>
      </div>
      <div id="combo-col">
        <div id="mult-row">
          <span id="mult-val">1×</span>
          <div id="mult-track"><div id="mult-fill"></div></div>
        </div>
      </div>
    </div>
    <div id="score-box">
      <div id="score-lbl">SCORE</div>
      <div id="score-val">0</div>
    </div>
    <div style="display:flex;gap:6px">
      <div class="hbtn" id="btn-sound">🔊</div>
      <div class="hbtn" id="btn-pause">⏸</div>
    </div>
  </div>

  <!-- ═══ GAME VIEW ═══ -->
  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div id="fx-layer"></div>

    <!-- HAMMER (hidden initially) -->
    <div id="hammer-wrap">
      <div id="hammer-icon">🔨</div>
      <div id="hammer-track"><div id="hammer-fill" style="height:0%"></div></div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay">
      <canvas id="starfield-canvas"></canvas>
      <canvas id="cube3d-canvas"></canvas>
      <h1>MERGE CUBES 3D</h1>
      <p>
        Drag to aim, release to launch!<br>
        Match numbers to <b style="color:#f0a030">merge</b><br>
        Don't let cubes cross the <b style="color:#ff4444">red line</b>!
      </p>
      <button class="play-btn" id="startBtn">PLAY</button>
    </div>
  </div>

  <!-- ═══ BOOSTERS (hidden initially) ═══ -->
  <div id="boosters">
    <div class="boost-btn" id="boost-rainbow">
      <div class="boost-circle"><span>🌈</span></div>
      <div class="boost-name">Wildcard</div>
    </div>
    <div class="boost-btn" id="boost-swap">
      <div class="boost-circle"><span>🔄</span></div>
      <div class="boost-name">Swap</div>
    </div>
    <div class="boost-btn" id="boost-bomb">
      <div class="boost-circle"><span>💣</span></div>
      <div class="boost-name">TNT</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import * as CANNON from 'cannon-es';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ═══ CONFIG ═══
    const SEQ = [2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048];
    const PAL = {
      2: { hex: 0x3ecf5a, glow: 0x2aff5a },
      4: { hex: 0x8b5cf6, glow: 0xa070ff },
      8: { hex: 0xf97316, glow: 0xffaa44 },
      16: { hex: 0xe11d48, glow: 0xff3366 },
      32: { hex: 0x0ea5e9, glow: 0x44ccff },
      64: { hex: 0xf59e0b, glow: 0xffcc44 },
      128: { hex: 0xec4899, glow: 0xff66bb },
      256: { hex: 0x14b8a6, glow: 0x44e0c8 },
      512: { hex: 0xa16207, glow: 0xddaa44 },
      1024: { hex: 0x7c3aed, glow: 0xaa66ff },
      2048: { hex: 0xFFD700, glow: 0xffee44 },
    };
    function gp(v) { return PAL[v] || { hex: 0xcc44ff, glow: 0xff88ff }; }
    function nextVal(v) {
      const i = SEQ.indexOf(v);
      return i >= 0 && i + 1 < SEQ.length ? SEQ[i + 1] : v * 2;
    }

    const TRACK_W = 10, TRACK_L = 18, COLS = 5, COL_W = TRACK_W / COLS;
    const CUBE_SZ = 1.45;
    const DANGER_Z = 7.0;
    const SHOOTER_Z = 8.2;
    const SHOOTER_SCALE = 1.35;

    // ═══ STARFIELD (overlay background) ═══
    const starCanvas = document.getElementById('starfield-canvas');
    const starCtx = starCanvas.getContext('2d');
    let stars = [];
    const STAR_COUNT = 200;

    function resizeStarfield() {
      starCanvas.width = starCanvas.clientWidth;
      starCanvas.height = starCanvas.clientHeight;
    }
    function initStars() {
      stars = [];
      const cx = starCanvas.width / 2, cy = starCanvas.height / 2;
      for (let i = 0; i < STAR_COUNT; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * Math.max(cx, cy) * 1.2;
        stars.push({
          x: cx + Math.cos(angle) * dist,
          y: cy + Math.sin(angle) * dist,
          vx: 0, vy: 0,
          size: Math.random() * 1.8 + 0.4,
          brightness: Math.random() * 0.7 + 0.3,
        });
      }
    }
    function animateStars() {
      if (!starCanvas.isConnected) return;
      starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
      const cx = starCanvas.width / 2, cy = starCanvas.height / 2;
      for (const s of stars) {
        const dx = s.x - cx, dy = s.y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const speed = 0.5 + (1 - Math.min(dist / 300, 1)) * 1.5;
        s.vx = (dx / dist) * speed;
        s.vy = (dy / dist) * speed;
        s.x += s.vx;
        s.y += s.vy;
        if (Math.abs(s.x - cx) > starCanvas.width || Math.abs(s.y - cy) > starCanvas.height) {
          const angle = Math.random() * Math.PI * 2;
          const newDist = 20 + Math.random() * 40;
          s.x = cx + Math.cos(angle) * newDist;
          s.y = cy + Math.sin(angle) * newDist;
        }
        starCtx.fillStyle = `rgba(255,255,255,${s.brightness})`;
        starCtx.beginPath();
        starCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        starCtx.fill();
      }
      requestAnimationFrame(animateStars);
    }
    resizeStarfield();
    initStars();
    animateStars();
    window.addEventListener('resize', () => {
      resizeStarfield();
      initStars();
    });

    // ═══ 3D CUBE IN OVERLAY ═══
    const cube3dCanvas = document.getElementById('cube3d-canvas');
    const cube3dRenderer = new THREE.WebGLRenderer({ canvas: cube3dCanvas, alpha: true, antialias: true });
    cube3dRenderer.setSize(160, 160);
    cube3dRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    const overlayScene = new THREE.Scene();
    const overlayCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
    overlayCamera.position.set(0, 0, 3.5);
    overlayCamera.lookAt(0, 0, 0);
    // Ambient and point light for the floating cube
    overlayScene.add(new THREE.AmbientLight(0x4444aa, 0.8));
    const ptLight = new THREE.PointLight(0xffffff, 1.2);
    ptLight.position.set(1, 2, 3);
    overlayScene.add(ptLight);
    // Create a cube with dynamic texture
    function makeOverlayTexture(value, pal) {
      const sz = 256, cv2 = document.createElement('canvas');
      cv2.width = sz; cv2.height = sz;
      const ctx = cv2.getContext('2d');
      ctx.fillStyle = '#' + pal.hex.toString(16).padStart(6, '0');
      ctx.fillRect(0, 0, sz, sz);
      const gr = ctx.createRadialGradient(sz/2, sz/2, sz*.2, sz/2, sz/2, sz*.7);
      gr.addColorStop(0, 'rgba(255,255,255,.18)');
      gr.addColorStop(1, 'rgba(0,0,0,.25)');
      ctx.fillStyle = gr; ctx.fillRect(0,0,sz,sz);
      ctx.strokeStyle = 'rgba(0,0,0,.3)'; ctx.lineWidth = 8; ctx.strokeRect(4,4,sz-8,sz-8);
      ctx.fillStyle = '#fff';
      ctx.font = `900 130px system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,.5)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
      ctx.fillText(value, sz/2, sz/2+6);
      const t = new THREE.CanvasTexture(cv2);
      t.colorSpace = THREE.SRGBColorSpace;
      return t;
    }
    const overlayCubeGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    let overlayCubeValue = 2;
    const overlayTexture = makeOverlayTexture(overlayCubeValue, gp(overlayCubeValue));
    const overlayCubeMat = new THREE.MeshStandardMaterial({ map: overlayTexture, roughness: 0.3, metalness: 0.2, emissive: gp(overlayCubeValue).glow, emissiveIntensity: 0.2 });
    const overlayCube = new THREE.Mesh(overlayCubeGeo, overlayCubeMat);
    overlayScene.add(overlayCube);
    // Add a subtle glow ring
    const ringGeo = new THREE.TorusGeometry(0.85, 0.05, 16, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x8855ff, transparent: true, opacity: 0.5 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    overlayScene.add(ring);

    function animateOverlayCube() {
      if (!cube3dCanvas.isConnected) return;
      const t = performance.now() * 0.001;
      overlayCube.rotation.x = t * 0.5;
      overlayCube.rotation.y = t * 0.7;
      overlayCube.position.y = Math.sin(t * 1.8) * 0.15;
      ring.rotation.z += 0.01;
      ring.scale.setScalar(1 + Math.sin(t * 2) * 0.03);
      cube3dRenderer.render(overlayScene, overlayCamera);
      requestAnimationFrame(animateOverlayCube);
    }
    animateOverlayCube();

    // ═══ MAIN THREE.JS SETUP ═══
    const wrap = document.getElementById('canvas-wrap');
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0815);
    scene.fog = new THREE.Fog(0x0a0815, 16, 30);

    // Top‑down camera
    const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 100);
    camera.position.set(0, 13, 2);
    camera.lookAt(0, 0, -1);

    const ambient = new THREE.AmbientLight(0x4a3aaa, 0.5); scene.add(ambient);
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(4, 12, 6); keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    keyLight.shadow.camera.left = -12; keyLight.shadow.camera.right = 12;
    keyLight.shadow.camera.top = 14; keyLight.shadow.camera.bottom = -14;
    keyLight.shadow.camera.near = 0.5; keyLight.shadow.camera.far = 30;
    keyLight.shadow.bias = -0.0005; scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0x8866ff, 0.4); fillLight.position.set(-5, 8, 4); scene.add(fillLight);
    const rimLight = new THREE.PointLight(0x8844cc, 1.8, 25); rimLight.position.set(0, 5, -8); scene.add(rimLight);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    composer.addPass(new UnrealBloomPass(new THREE.Vector2(1, 1), 0.6, 0.7, 0.85));

    // ═══ TRACK ═══
    function buildTrack() {
      const g = new THREE.Group();
      const fm = new THREE.MeshStandardMaterial({ color: 0x2a1a55, roughness: 0.4, metalness: 0.3, emissive: 0x1a0a44, emissiveIntensity: 0.3 });
      const fl = new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W, TRACK_L), fm);
      fl.rotation.x = -Math.PI / 2; fl.receiveShadow = true; g.add(fl);
      const gm = new THREE.LineBasicMaterial({ color: 0x6644aa, transparent: true, opacity: 0.3 });
      for (let i = 0; i <= COLS; i++) {
        const x = -TRACK_W / 2 + i * COL_W;
        const bg2 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x, .01, -TRACK_L / 2), new THREE.Vector3(x, .01, TRACK_L / 2)]);
        g.add(new THREE.Line(bg2, gm));
      }
      const wm = new THREE.MeshStandardMaterial({ color: 0x6644aa, roughness: 0.35, metalness: 0.5, emissive: 0x3322aa, emissiveIntensity: 0.4 });
      const wg = new THREE.BoxGeometry(0.35, 1.8, TRACK_L);

        const newCtx = newStarCanvas.getContext('2d');
        newStarCanvas.width = newStarCanvas.clientWidth; newStarCanvas.height = newStarCanvas.clientHeight;
        const newStars = []; const cx = newStarCanvas.width/2, cy = newStarCanvas.height/2;
        for (let i=0; i<STAR_COUNT; i++) { const angle = Math.random()*Math.PI*2; const dist = Math.random()*Math.max(cx,cy)*1.2; newStars.push({ x: cx+Math.cos(angle)*dist, y: cy+Math.sin(angle)*dist, vx:0, vy:0, size: Math.random()*1.8+0.4, brightness: Math.random()*0.7+0.3 }); }
        function anim() { if(!newStarCanvas.isConnected) return; newCtx.clearRect(0,0,newStarCanvas.width,newStarCanvas.height); const cx2 = newStarCanvas.width/2, cy2 = newStarCanvas.height/2; for(const s of newStars) { const dx = s.x-cx2, dy = s.y-cy2; const dist = Math.sqrt(dx*dx+dy*dy)||1; const speed = 0.5+(1-Math.min(dist/300,1))*1.5; s.vx = (dx/dist)*speed; s.vy = (dy/dist)*speed; s.x += s.vx; s.y += s.vy; if(Math.abs(s.x-cx2)>newStarCanvas.width||Math.abs(s.y-cy2)>newStarCanvas.height) { const angle2 = Math.random()*Math.PI*2; const newDist = 20+Math.random()*40; s.x = cx2+Math.cos(angle2)*newDist; s.y = cy2+Math.sin(angle2)*newDist; } newCtx.fillStyle = `rgba(255,255,255,${s.brightness})`; newCtx.beginPath(); newCtx.arc(s.x, s.y, s.size, 0, Math.PI*2); newCtx.fill(); } requestAnimationFrame(anim); } anim();
      }
      const newCubeCanvas = ov.querySelector('#cube3d-canvas');
      if (newCubeCanvas) {
        const newCubeRenderer = new THREE.WebGLRenderer({ canvas: newCubeCanvas, alpha: true, antialias: true });
        newCubeRenderer.setSize(160,160);
        const newScene = new THREE.Scene();
        const newCamera = new THREE.PerspectiveCamera(45,1,0.1,10);
        newCamera.position.set(0,0,3.5); newCamera.lookAt(0,0,0);
        newScene.add(new THREE.AmbientLight(0x4444aa,0.8)); const ptL = new THREE.PointLight(0xffffff,1.2); ptL.position.set(1,2,3); newScene.add(ptL);
        const newCube = new THREE.Mesh(new THREE.BoxGeometry(1.2,1.2,1.2), new THREE.MeshStandardMaterial({ map: makeOverlayTexture(overlayCubeValue, gp(overlayCubeValue)), roughness:0.3, metalness:0.2, emissive: gp(overlayCubeValue).glow, emissiveIntensity:0.2 }));
        newScene.add(newCube);
        const newRing = new THREE.Mesh(new THREE.TorusGeometry(0.85,0.05,16,32), new THREE.MeshBasicMaterial({ color:0x8855ff, transparent:true, opacity:0.5 }));
        newRing.rotation.x = Math.PI/2; newScene.add(newRing);
        function animCube() { if(!newCubeCanvas.isConnected) return; const t = performance.now()*0.001; newCube.rotation.x = t*0.5; newCube.rotation.y = t*0.7; newCube.position.y = Math.sin(t*1.8)*0.15; newRing.rotation.z += 0.01; newRing.scale.setScalar(1+Math.sin(t*2)*0.03); newCubeRenderer.render(newScene, newCamera); requestAnimationFrame(animCube); } animCube();
      }
      document.getElementById('startBtn').addEventListener('click', startGame);
      document.getElementById('hud').classList.remove('visible');
      document.getElementById('boosters').classList.remove('visible');
      document.getElementById('hammer-wrap').classList.remove('visible');
    }

    function startGame() {
      while (cubes.length) removeCube(cubes[0]);
      for (let i = particles.length-1; i>=0; i--) { scene.remove(particles[i].mesh); particles[i].mat.dispose(); } particles.length = 0;
      if (!shooterMesh) makeShooter();
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('hud').classList.add('visible');
      document.getElementById('boosters').classList.add('visible');
      document.getElementById('hammer-wrap').classList.add('visible');
      score = 0; mult = 1; comboBar = 0; comboTimer = 0; hammerChg = 0; paused = false; shotCube = null;
      conveyorSpeed = .3; rowTimer = 0; seenMS = new Set(); shakeAmt = 0;
      camera.position.set(0,13,2); camera.lookAt(0,0,-1);
      curVal = rndStart(); nxtVal = rndStart(); aimX = 0;
      spawnInitial(); drawNextHUD(); gameOn = true; audio.init();
    }

    // ═══ INPUT ═══
    const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2(); const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
    let dragging = false;
    function updateAim(cx, cy) { const rect = canvas.getBoundingClientRect(); mouse.x = ((cx-rect.left)/rect.width)*2-1; mouse.y = -((cy-rect.top)/rect.height)*2+1; raycaster.setFromCamera(mouse, camera); const target = new THREE.Vector3(); raycaster.ray.intersectPlane(groundPlane, target); if (target) aimX = Math.max(-TRACK_W/2+CUBE_SZ/2, Math.min(TRACK_W/2-CUBE_SZ/2, target.x)); }
    canvas.addEventListener('mousedown', e => { dragging = true; updateAim(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', e => { if (dragging && gameOn && !paused) updateAim(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup', () => { if (dragging) { shoot(); dragging = false; } });
    canvas.addEventListener('touchstart', e => { dragging = true; updateAim(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (gameOn && !paused) updateAim(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchend', e => { e.preventDefault(); shoot(); dragging = false; }, { passive: false });

    // Hammer & Boosters (same as before)
    document.getElementById('hammer-icon').addEventListener('click', () => { if (!gameOn || hammerChg<100) return; hammerChg=0; shakeAmt=.5; audio.boom(); const sorted = cubes.filter(c=>!c.isShot).sort((a,b)=>b.body.position.z-a.body.position.z); sorted.slice(0,7).forEach(c=>{ spawnParticles(c.body.position.x,c.body.position.y,c.body.position.z,0xff8800,12,5); removeCube(c); }); checkAutoSpawn(); });
    document.getElementById('boost-rainbow').addEventListener('click', () => { if(!gameOn||paused) return; const counts={}; cubes.forEach(c=>{ if(!c.isShot) counts[c.value]=(counts[c.value]||0)+1; }); const best = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]; if(best) curVal = parseInt(best[0]); drawNextHUD(); });
    document.getElementById('boost-swap').addEventListener('click', () => { if(!gameOn||paused) return; [curVal,nxtVal] = [nxtVal,curVal]; drawNextHUD(); });
    document.getElementById('boost-bomb').addEventListener('click', () => { if(!gameOn||paused) return; audio.boom(); shakeAmt=.3; for(let i=cubes.length-1;i>=0;i--) { const c3=cubes[i]; if(c3.isShot) continue; if(Math.abs(c3.body.position.x-aimX)<COL_W*1.3 && c3.body.position.z>0) { spawnParticles(c3.body.position.x,c3.body.position.y,c3.body.position.z,0xff4400,10,4); score+=c3.value; removeCube(c3); } } checkAutoSpawn(); });
    document.getElementById('btn-pause').addEventListener('click', () => { if(!gameOn) return; paused = !paused; document.getElementById('btn-pause').textContent = paused?'▶':'⏸'; });
    document.getElementById('btn-sound').addEventListener('click', () => { const m = audio.toggleMute(); document.getElementById('btn-sound').textContent = m?'🔇':'🔊'; });
    document.getElementById('startBtn').addEventListener('click', startGame);

    function resize() { const w = wrap.clientWidth, h = wrap.clientHeight; renderer.setSize(w, h, false); composer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix(); }
    window.addEventListener('resize', resize); resize(); update();
  </script>
</body>
</html>
