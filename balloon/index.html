<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balloon Pop Game</title>
    
    <!-- Monetag SDK Installation -->
    <script src='//libtl.com/sdk.js' data-zone='11108267' data-sdk='show_11108267'></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3186700611266549"
     crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(160deg, #111827, #1f2937);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        .flash-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.15s ease-out;
        }
        
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #1a2980, #26d0ce);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        
        .welcome-content {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.07);
            padding: 30px 25px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .welcome-title {
            font-size: 2.6rem;
            margin-bottom: 10px;
            color: #ff9800;
            font-weight: 800;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .balloon-icon {
            font-size: 4.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .game-description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        
        .highlight {
            color: #ff9800;
            font-weight: bold;
        }
        
        .start-game-btn {
            padding: 16px 40px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff9800, #e52e71);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(229, 46, 113, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 280px;
        }
        
        .start-game-btn:active {
            transform: scale(0.96);
        }
        
        .game-container {
            width: 100%;
            height: 100vh;
            display: none;
            flex-direction: column;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        }
        
        .scoreboard-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .nav-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        .nav-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        #targetColor {
            padding: 4px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .game-area {
            position: relative;
            width: 100vw;
            flex: 1;
            overflow: hidden;
        }
        
        .balloon {
            position: absolute;
            cursor: pointer;
            touch-action: none;
            user-select: none;
            z-index: 2;
        }
        
        .balloon-body {
            position: relative;
            width: 60px;
            height: 72px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.1) 70%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 
                inset -6px -6px 12px rgba(0,0,0,0.3),
                inset 6px 6px 12px rgba(255,255,255,0.3),
                0 10px 20px rgba(0,0,0,0.3);
        }
        
        .balloon-body::before {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 10px;
            background: inherit;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }
        
        .balloon-string {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 1.5px;
            height: 25px;
            background: rgba(255,255,255,0.4);
        }
        
        .balloon.popping {
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: particleFly 0.6s ease-out forwards;
        }
        
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        .feedback {
            position: absolute;
            font-size: 1.3rem;
            font-weight: 800;
            pointer-events: none;
            z-index: 5;
            animation: feedbackFloat 0.8s ease-out forwards;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        @keyframes feedbackFloat {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; transform: translateY(-10px) scale(1.1); }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }

        .combo-display {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            backdrop-filter: blur(5px);
            display: none;
            animation: pulse 0.5s infinite alternate;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.05); }
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            display: none;
            backdrop-filter: blur(10px);
        }
        
        .game-over-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .game-over h2 {
            font-size: 2.2rem;
            color: #e52e71;
            margin-bottom: 20px;
            font-weight: 800;
        }
        
        .final-stats {
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 2;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .stat-row.total {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 5px;
            font-weight: bold;
            color: #ff9800;
        }
        
        .play-again-btn {
            padding: 14px 35px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        @media (max-width: 480px) {
            .welcome-title { font-size: 2.1rem; }
            .nav-value { font-size: 1.2rem; }
            .nav-label { font-size: 0.65rem; }
            .balloon-body { width: 52px; height: 63px; }
        }
    </style>
</head>
<body>

    <div class="flash-effect" id="flashEffect"></div>

    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
            <div class="balloon-icon">🎈</div>
            <h1 class="welcome-title">Balloon Pop</h1>
            <div class="game-description">
                Σκάστε τα μπαλόνια με το <span class="highlight">σωστό χρώμα</span>.<br>
                Προσοχή στα λάθη και μαζέψτε <span class="highlight">Combos</span>!
            </div>
            <button class="start-game-btn" id="startGameBtn">
                Έναρξη Παιχνιδιού
            </button>
        </div>
    </div>
    
    <!-- Main Game Container -->
    <div class="game-container" id="gameContainer">
        
        <div class="scoreboard-nav">
            <div class="nav-block">
                <span class="nav-label">Στόχος</span>
                <span class="nav-value" id="targetColor">---</span>
            </div>
            <div class="nav-block">
                <span class="nav-label">Χρόνος</span>
                <span class="nav-value" id="timer">60</span>
            </div>
            <div class="nav-block">
                <span class="nav-label">Σκορ</span>
                <span class="nav-value" id="scoreDisplay">0</span>
            </div>
        </div>
        
        <div class="game-area" id="gameArea">
            <div class="combo-display" id="comboDisplay">Combo x2!</div>
        </div>
        
        <!-- End Game Overlay -->
        <div class="game-over" id="gameOver">
            <div class="game-over-content">
                <h2>Τέλος Χρόνου!</h2>
                <div class="final-stats">
                    <div class="stat-row"><span>Σωστά Μπαλόνια:</span> <span id="finalCorrect" style="color:#10b981;">0</span></div>
                    <div class="stat-row"><span>Λάθος Μπαλόνια:</span> <span id="finalWrong" style="color:#ef4444;">0</span></div>
                    <div class="stat-row total"><span>Τελικό Σκορ:</span> <span id="finalScore">0</span></div>
                </div>
                <button class="play-again-btn" id="playAgainBtn">Παίξτε Ξανά</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const welcomeScreen = document.getElementById('welcomeScreen');
            const gameContainer = document.getElementById('gameContainer');
            const startGameBtn = document.getElementById('startGameBtn');
            const gameArea = document.getElementById('gameArea');
            const targetColorElement = document.getElementById('targetColor');
            const timerElement = document.getElementById('timer');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const comboDisplay = document.getElementById('comboDisplay');
            const gameOverScreen = document.getElementById('gameOver');
            const playAgainBtn = document.getElementById('playAgainBtn');
            const flashEffect = document.getElementById('flashEffect');
            
            const finalCorrectElement = document.getElementById('finalCorrect');
            const finalWrongElement = document.getElementById('finalWrong');
            const finalScoreElement = document.getElementById('finalScore');
            
            // Game State Metrics
            let gameActive = false;
            let timeLeft = 60;
            let score = 0;
            let comboCount = 0;
            
            let gameTimer;
            let balloonInterval;
            let targetChangeInterval;
            
            let targetColor = 'red';
            let balloons = [];
            let audioContext;
            const maxBalloons = 9;
            
            let correctPopped = 0;
            let wrongPopped = 0;
            let baseTargetDuration = 8000;
            
            const colorMap = {
                'red': { name: 'Κόκκινο', hex: '#ef4444' },
                'blue': { name: 'Μπλε', hex: '#3b82f6' },
                'green': { name: 'Πράσινο', hex: '#10b981' },
                'yellow': { name: 'Κίτρινο', hex: '#f59e0b' },
                'purple': { name: 'Μοβ', hex: '#8b5cf6' },
                'orange': { name: 'Πορτοκαλί', hex: '#f97316' }
            };
            
            function initAudio() {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.log('Audio Context error');
                }
            }
            
            function playSound(type) {
                if (!audioContext) return;
                try {
                    const now = audioContext.currentTime;
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    if (type === 'correct') {
                        osc.frequency.setValueAtTime(comboCount >= 3 ? 600 : 450, now);
                        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                        osc.type = 'sine';
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                    } else {
                        osc.frequency.setValueAtTime(250, now);
                        osc.frequency.exponentialRampToValueAtTime(120, now + 0.2);
                        osc.type = 'triangle';
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                    }
                } catch(e){}
            }
            
            function selectNewTarget() {
                const colors = Object.keys(colorMap);
                const availableColors = colors.filter(color => color !== targetColor);
                targetColor = availableColors[Math.floor(Math.random() * availableColors.length)];
                
                flashEffect.style.backgroundColor = colorMap[targetColor].hex;
                flashEffect.style.opacity = '0.15';
                setTimeout(() => { flashEffect.style.opacity = '0'; }, 200);
                
                updateTargetDisplay();
                injectTargetBalloons();
            }
            
            function injectTargetBalloons() {
                if (!gameActive) return;
                const count = 2 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    if (balloons.length < maxBalloons) createBalloon(targetColor);
                }
            }
            
            function updateTargetDisplay() {
                targetColorElement.textContent = colorMap[targetColor].name;
                targetColorElement.style.color = colorMap[targetColor].hex;
                targetColorElement.style.backgroundColor = `${colorMap[targetColor].hex}22`;
                targetColorElement.style.border = `1px solid ${colorMap[targetColor].hex}55`;
            }
            
            startGameBtn.addEventListener('click', () => {
                welcomeScreen.style.display = 'none';
                gameContainer.style.display = 'flex';
                initAudio();
                runActualGameInit();
            });

            playAgainBtn.addEventListener('click', () => {
                gameOverScreen.style.display = 'none';
                runActualGameInit();
            });
            
            function runActualGameInit() {
                gameActive = true;
                timeLeft = 60;
                score = 0;
                comboCount = 0;
                correctPopped = 0;
                wrongPopped = 0;
                
                timerElement.textContent = timeLeft;
                scoreDisplay.textContent = score;
                comboDisplay.style.display = 'none';
                
                clearAllBalloons();
                selectNewTarget();
                
                gameTimer = setInterval(handleClockTick, 1000);
                balloonInterval = setInterval(manageSpawning, 800);
                
                resetTargetChangeInterval(baseTargetDuration);
                
                for(let i=0; i<5; i++) {
                    createBalloon(i < 2 ? targetColor : null);
                }
            }
            
            function resetTargetChangeInterval(duration) {
                clearInterval(targetChangeInterval);
                targetChangeInterval = setInterval(() => {
                    if (gameActive) selectNewTarget();
                }, duration);
            }
            
            function handleClockTick() {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                if (timeLeft === 40) resetTargetChangeInterval(6500);
                if (timeLeft === 20) resetTargetChangeInterval(4500);
                
                if (timeLeft <= 0) terminateGame();
            }
            
            function manageSpawning() {
                if (!gameActive) return;
                if (balloons.length < maxBalloons) {
                    createBalloon(Math.random() < 0.5 ? targetColor : null);
                }
            }
            
            function moveBalloon(balloon) {
                if (!gameActive || !balloon.element.parentNode) return;
                
                const speedMultiplier = timeLeft < 20 ? 1.5 : (timeLeft < 40 ? 1.2 : 1.0);
                
                const rect = balloon.element.getBoundingClientRect();
                const areaRect = gameArea.getBoundingClientRect();
                
                if (rect.left <= areaRect.left + 5 || rect.right >= areaRect.right - 5) balloon.dirX *= -1;
                if (rect.top <= areaRect.top + 5 || rect.bottom >= areaRect.bottom - 5) balloon.dirY *= -1;
                
                let x = parseFloat(balloon.element.style.left) + balloon.dirX * balloon.speedX * speedMultiplier;
                let y = parseFloat(balloon.element.style.top) + balloon.dirY * balloon.speedY * speedMultiplier;
                
                x = Math.max(5, Math.min(x, gameArea.offsetWidth - 65));
                y = Math.max(5, Math.min(y, gameArea.offsetHeight - 85));
                
                balloon.element.style.left = `${x}px`;
                balloon.element.style.top = `${y}px`;
                
                if (!balloon.element.classList.contains('popping')) {
                    requestAnimationFrame(() => moveBalloon(balloon));
                }
            }
            
            function createBalloon(forcedColor = null) {
                if (!gameActive) return;
                
                const colors = Object.keys(colorMap);
                const chosenColor = forcedColor || colors[Math.floor(Math.random() * colors.length)];
                const hex = colorMap[chosenColor].hex;
                
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.dataset.color = chosenColor;
                
                const scale = 0.85 + Math.random() * 0.3;
                balloon.style.transform = `scale(${scale})`;
                
                const body = document.createElement('div');
                body.className = 'balloon-body';
                body.style.backgroundColor = hex;
                
                const string = document.createElement('div');
                string.className = 'balloon-string';
                
                balloon.appendChild(body);
                balloon.appendChild(string);
                
                const rx = 10 + Math.random() * (gameArea.offsetWidth - 80);
                const ry = 10 + Math.random() * (gameArea.offsetHeight - 100);
                balloon.style.left = `${rx}px`;
                balloon.style.top = `${ry}px`;
                
                balloon.addEventListener('pointerdown', handlePopEvent);
                gameArea.appendChild(balloon);
                
                const bObj = {
                    element: balloon,
                    color: chosenColor,
                    dirX: Math.random() * 2 - 1,
                    dirY: Math.random() * 2 - 1,
                    speedX: 0.6 + Math.random() * 0.8,
                    speedY: 0.5 + Math.random() * 0.7
                };
                
                balloons.push(bObj);
                requestAnimationFrame(() => moveBalloon(bObj));
            }
            
            function handlePopEvent(e) {
                if (!gameActive) return;
                e.preventDefault();
                
                const bEl = e.currentTarget;
                if (bEl.classList.contains('popping')) return;
                
                const bColor = bEl.dataset.color;
                const hex = colorMap[bColor].hex;
                
                if (bColor === targetColor) {
                    correctPopped++;
                    comboCount++;
                    
                    let pointsEarned = 10;
                    if (comboCount >= 6) {
                        pointsEarned = 30;
                        showComboBadge(`MEGA COMBO!`);
                    } else if (comboCount >= 3) {
                        pointsEarned = 20;
                        showComboBadge(`COMBO x2!`);
                    }
                    
                    score += pointsEarned;
                    playSound('correct');
                    triggerTextFeedback(`+${pointsEarned}`, '#10b981', bEl);
                } else {
                    wrongPopped++;
                    comboCount = 0;
                    comboDisplay.style.display = 'none';
                    
                    score = Math.max(0, score - 5);
                    playSound('wrong');
                    triggerTextFeedback('-5', '#ef4444', bEl);
                }
                
                scoreDisplay.textContent = score;
                bEl.classList.add('popping');
                spawnExplosionParticles(bEl, hex);
                
                setTimeout(() => {
                    if (bEl.parentNode) {
                        bEl.remove();
                        balloons = balloons.filter(b => b.element !== bEl);
                    }
                }, 200);
            }
            
            function showComboBadge(text) {
                comboDisplay.textContent = text;
                comboDisplay.style.display = 'block';
            }
            
            function triggerTextFeedback(text, color, element) {
                const f = document.createElement('div');
                f.className = 'feedback';
                f.textContent = text;
                f.style.color = color;
                
                const rect = element.getBoundingClientRect();
                const areaRect = gameArea.getBoundingClientRect();
                
                f.style.left = `${rect.left - areaRect.left + rect.width / 4}px`;
                f.style.top = `${rect.top - areaRect.top}px`;
                
                gameArea.appendChild(f);
                setTimeout(() => f.remove(), 800);
            }
            
            function spawnExplosionParticles(element, color) {
                const rect = element.getBoundingClientRect();
                const areaRect = gameArea.getBoundingClientRect();
                const cx = rect.left - areaRect.left + rect.width / 2;
                const cy = rect.top - areaRect.top + rect.height / 2;
                
                for (let i = 0; i < 12; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.backgroundColor = color;
                    p.style.left = `${cx}px`;
                    p.style.top = `${cy}px`;
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 20 + Math.random() * 45;
                    p.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                    p.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                    
                    gameArea.appendChild(p);
                    setTimeout(() => p.remove(), 600);
                }
            }
            
            function clearAllBalloons() {
                balloons.forEach(b => b.element.remove());
                balloons = [];
            }
            
            // Η συνάρτηση λήξης του παιχνιδιού όπου ενσωματώθηκε το Ad Function
            function terminateGame() {
                gameActive = false;
                clearInterval(gameTimer);
                clearInterval(balloonInterval);
                clearInterval(targetChangeInterval);
                
                // Κλήση της Rewarded Interstitial διαφήμισης της Monetag
                show_11108267().then(() => {
                    // Εδώ εκτελείται η εμφάνιση των αποτελεσμάτων αφού ο χρήστης δει τη διαφήμιση
                    finalCorrectElement.textContent = correctPopped;
                    finalWrongElement.textContent = wrongPopped;
                    finalScoreElement.textContent = score;
                    
                    gameOverScreen.style.display = 'flex';
                    clearAllBalloons();
                }).catch((err) => {
                    // Fallback σε περίπτωση που αποτύχει να φορτώσει η διαφήμιση (π.χ. AdBlocker)
                    finalCorrectElement.textContent = correctPopped;
                    finalWrongElement.textContent = wrongPopped;
                    finalScoreElement.textContent = score;
                    
                    gameOverScreen.style.display = 'flex';
                    clearAllBalloons();
                });
            }
        });
