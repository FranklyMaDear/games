<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balloon Pop Challenge</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src='//libtl.com/sdk.js' data-zone='11108267' data-sdk='show_11108267'></script>
    
    <link rel="icon" type="image/png" href="index.png">
    <link rel="shortcut icon" href="index.png">
    <link rel="apple-touch-icon" href="index.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(160deg, #0f172a, #1e293b);
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        .flash-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            opacity: 0;
            transition: opacity 0.15s ease-out;
        }
        
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #1a2980, #26d0ce);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        
        .welcome-content {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.07);
            padding: 30px 25px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .welcome-title {
            font-size: 2.6rem;
            margin-bottom: 10px;
            color: #ff9800;
            font-weight: 800;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .balloon-icon {
            font-size: 4.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .game-description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        
        .highlight {
            color: #ff9800;
            font-weight: bold;
        }
        
        .start-game-btn {
            padding: 16px 40px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff9800, #e52e71);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(229, 46, 113, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 280px;
        }
        
        .start-game-btn:active {
            transform: scale(0.96);
        }
        
        .game-container {
            width: 100%;
            height: 100vh;
            display: none;
            flex-direction: column;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        }
        
        .scoreboard-nav {
            display: flex;
            justify-between: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .nav-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        .nav-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        #targetColor {
            padding: 4px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .game-area {
            position: relative;
            width: 100vw;
            flex: 1;
            overflow: hidden;
        }
        
        .balloon {
            position: absolute;
            cursor: pointer;
            touch-action: none;
            user-select: none;
            z-index: 2;
            will-change: transform, left, top;
        }
        
        .balloon-body {
            position: relative;
            width: 60px;
            height: 72px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.1) 70%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 
                inset -6px -6px 12px rgba(0,0,0,0.3),
                inset 6px 6px 12px rgba(255,255,255,0.3),
                0 10px 20px rgba(0,0,0,0.3);
        }
        
        .balloon-body::before {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 10px;
            background: inherit;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }
        
        .balloon-string {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 1.5px;
            height: 25px;
            background: rgba(255, 255, 255, 0.4);
        }
        
        .balloon.popping {
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: particleFly 0.6s ease-out forwards;
        }
        
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        .feedback {
            position: absolute;
            font-size: 1.3rem;
            font-weight: 800;
            pointer-events: none;
            z-index: 5;
            animation: feedbackFloat 0.8s ease-out forwards;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        @keyframes feedbackFloat {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; transform: translateY(-10px) scale(1.1); }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }

        .combo-display {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            backdrop-filter: blur(5px);
            display: none;
            animation: pulse 0.5s infinite alternate;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.05); }
        }
        
        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            display: none;
            backdrop-filter: blur(10px);
        }
        
        .game-over-content {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 25px;
            border-radius: 24px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .game-over h2 {
            font-size: 2.2rem;
            color: #e52e71;
            margin-bottom: 15px;
            font-weight: 800;
        }
        
        .final-stats {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.8;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .stat-row.total {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 5px;
            font-weight: bold;
            color: #ff9800;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .double-score-btn {
            padding: 14px 35px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #eab308, #ca8a04);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 5px 15px rgba(234, 179, 8, 0.3);
            transition: transform 0.1s;
        }

        .double-score-btn:active {
            transform: scale(0.98);
        }

        .new-games-btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
            transition: transform 0.1s;
        }

        .new-games-btn:active {
            transform: scale(0.98);
        }

        .play-again-btn {
            padding: 14px 35px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
            transition: transform 0.1s;
            display: none;
        }

        @media (max-width: 480px) {
            .welcome-title { font-size: 2.1rem; }
            .nav-value { font-size: 1.2rem; }
            .nav-label { font-size: 0.65rem; }
            .balloon-body { width: 52px; height: 63px; }
        }
    </style>
</head>
<body>

    <div class="flash-effect" id="flashEffect"></div>

    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
            <div class="balloon-icon">🎈</div>
            <h1 class="welcome-title">Balloon Pop</h1>
            <div class="game-description">
                Pop the balloons with the <span class="highlight">target color</span>.<br>
                Avoid mistakes and stack up <span class="highlight">Combos</span>!
            </div>
            <button class="start-game-btn" id="startGameBtn">
                Start Game
            </button>
        </div>
    </div>
    
    <div class="game-container" id="gameContainer">
        
        <div class="scoreboard-nav">
            <div class="nav-block">
                <span class="nav-label">Target</span>
                <span class="nav-value" id="targetColor">---</span>
            </div>
            <div class="nav-block">
                <span class="nav-label">Time</span>
                <span class="nav-value" id="timer">60</span>
            </div>
            <div class="nav-block">
                <span class="nav-label">Score</span>
                <span class="nav-value" id="scoreDisplay">0</span>
            </div>
        </div>
        
        <div class="game-area" id="gameArea">
            <div class="combo-display" id="comboDisplay">Combo Level 1</div>
        </div>
        
        <div class="game-over" id="gameOver">
            <div class="game-over-content">
                <h2>Time's Up!</h2>
                <div class="final-stats">
                    <div class="stat-row"><span>Correct Pops:</span> <span id="finalCorrect" style="color:#10b981;">0</span></div>
                    <div class="stat-row"><span>Wrong Pops:</span> <span id="finalWrong" style="color:#ef4444;">0</span></div>
                    <div class="stat-row"><span>Current Score:</span> <span id="finalScore" style="color:#ffffff; font-weight:bold;">0</span></div>
                    <div class="stat-row total"><span>Best Score:</span> <span id="highScore">0</span></div>
                </div>
                
                <div class="action-buttons">
                    <button class="double-score-btn" id="doubleScoreBtn">Double Score ⚡ (Watch Ad)</button>
                    <button class="play-again-btn" id="playAgainBtn">Play Again 🔄</button>
                    <button class="new-games-btn" id="newGamesBtn">No Thanks, New Games 🎮</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        document.addEventListener('DOMContentLoaded', function() {
            const welcomeScreen = document.getElementById('welcomeScreen');
            const gameContainer = document.getElementById('gameContainer');
            const startGameBtn = document.getElementById('startGameBtn');
            const gameArea = document.getElementById('gameArea');
            const targetColorElement = document.getElementById('targetColor');
            const timerElement = document.getElementById('timer');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const comboDisplay = document.getElementById('comboDisplay');
            const gameOverScreen = document.getElementById('gameOver');
            const doubleScoreBtn = document.getElementById('doubleScoreBtn');
            const playAgainBtn = document.getElementById('playAgainBtn');
            const newGamesBtn = document.getElementById('newGamesBtn');
            const flashEffect = document.getElementById('flashEffect');
            
            const finalCorrectElement = document.getElementById('finalCorrect');
            const finalWrongElement = document.getElementById('finalWrong');
            const finalScoreElement = document.getElementById('finalScore');
            const highScoreElement = document.getElementById('highScore');
            
            let gameActive = false;
            let timeLeft = 60;
            let score = 0;
            let bestScore = 0;
            let hasWatchedAd = false;
            
            // ΝΕΕΣ ΜΕΤΑΒΛΗΤΕΣ ΓΙΑ ΤΟ COMBO SYSTEM
            let comboLevel = 1;         // Ξεκινάει από Level 1
            let consecutiveCorrect = 0; // Μετρητής για σωστά χτυπήματα (μέχρι το 4)
            let consecutiveWrong = 0;   // Μετρητής για λάθος χτυπήματα (μέχρι το 2)
            
            let gameTimer;
            let balloonInterval;
            let targetChangeInterval;
            
            let targetColor = 'red';
            let balloons = [];
            let audioContext;
            const maxBalloons = 14; // Αυξήθηκε ελαφρώς για να γεμίζει καλύτερα η οθόνη
            
            let correctPopped = 0;
            let wrongPopped = 0;
            let baseTargetDuration = 8000;
            
            const colorMap = {
                'red': { name: 'Red', hex: '#ef4444' },
                'blue': { name: 'Blue', hex: '#3b82f6' },
                'green': { name: 'Green', hex: '#10b981' },
                'yellow': { name: 'Yellow', hex: '#f59e0b' },
                'purple': { name: 'Purple', hex: '#8b5cf6' },
                'orange': { name: 'Orange', hex: '#f97316' }
            };

            function loadHighScore() {
                if (window.Telegram && window.Telegram.WebApp && Telegram.WebApp.CloudStorage) {
                    Telegram.WebApp.CloudStorage.getItem('balloon_high_score', function(err, value) {
                        if (!err && value) {
                            bestScore = parseInt(value) || 0;
                        }
                    });
                } else {
                    bestScore = parseInt(localStorage.getItem('balloon_high_score')) || 0;
                }
            }
            
            function saveHighScore(newScore) {
                if (newScore > bestScore) {
                    bestScore = newScore;
                    if (window.Telegram && window.Telegram.WebApp && Telegram.WebApp.CloudStorage) {
                        Telegram.WebApp.CloudStorage.setItem('balloon_high_score', newScore.toString());
                    } else {
                        localStorage.setItem('balloon_high_score', newScore.toString());
                    }
                }
            }
            
            loadHighScore();

            function initAudio() {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) { console.log('Audio error'); }
            }
            
            function playSound(type) {
                if (!audioContext) return;
                try {
                    const now = audioContext.currentTime;
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain); gain.connect(audioContext.destination);
                    
                    if (type === 'correct') {
                        osc.frequency.setValueAtTime(450 + (comboLevel * 50), now);
                        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                        osc.type = 'sine'; gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                    } else {
                        osc.frequency.setValueAtTime(250, now);
                        osc.frequency.exponentialRampToValueAtTime(120, now + 0.2);
                        osc.type = 'triangle'; gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                    }
                } catch(e){}
            }
            
            function selectNewTarget() {
                const colors = Object.keys(colorMap);
                const availableColors = colors.filter(color => color !== targetColor);
                targetColor = availableColors[Math.floor(Math.random() * availableColors.length)];
                
                flashEffect.style.backgroundColor = colorMap[targetColor].hex;
                flashEffect.style.opacity = '0.15';
                setTimeout(() => { flashEffect.style.opacity = '0'; }, 200);
                
                updateTargetDisplay();
                
                // ΔΙΟΡΘΩΣΗ: Μόλις αλλάξει το χρώμα, παράγουμε ΑΜΕΣΩΣ 3 μπαλόνια αυτού του χρώματος
                if (gameActive) {
                    for (let i = 0; i < 3; i++) {
                        createBalloon(targetColor);
                    }
                }
            }
            
            function updateTargetDisplay() {
                targetColorElement.textContent = colorMap[targetColor].name;
                targetColorElement.style.color = colorMap[targetColor].hex;
                targetColorElement.style.backgroundColor = `${colorMap[targetColor].hex}22`;
                targetColorElement.style.border = `1px solid ${colorMap[targetColor].hex}55`;
            }
            
            startGameBtn.addEventListener('click', () => {
                welcomeScreen.style.display = 'none';
                gameContainer.style.display = 'flex';
                initAudio();
                runActualGameInit();
            });

            doubleScoreBtn.addEventListener('click', () => {
                doubleScoreBtn.disabled = true;
                show_11108267().then(() => {
                    processScoreDoubling();
                }).catch((err) => {
                    processScoreDoubling();
                });
            });

            function processScoreDoubling() {
                score = score * 2;
                hasWatchedAd = true;
                saveHighScore(score);
                
                finalScoreElement.textContent = score;
                highScoreElement.textContent = bestScore;
                
                doubleScoreBtn.style.display = 'none';
                playAgainBtn.style.display = 'block';
            }

            playAgainBtn.addEventListener('click', () => {
                gameOverScreen.style.display = 'none';
                runActualGameInit();
            });

            newGamesBtn.addEventListener('click', () => {
                if (!hasWatchedAd) {
                    show_11108267().then(() => {
                        redirectToTelegramBot();
                    }).catch((err) => {
                        redirectToTelegramBot();
                    });
                } else {
                    redirectToTelegramBot();
                }
            });

            function redirectToTelegramBot() {
                if (window.Telegram && window.Telegram.WebApp) {
                    Telegram.WebApp.openTelegramLink('https://t.me/Franklygames_bot');
                } else {
                    window.open('https://t.me/Franklygames_bot', '_blank');
                }
            }
            
            function runActualGameInit() {
                gameActive = true;
                timeLeft = 60;
                score = 0;
                
                // Reset Combo System
                comboLevel = 1;
                consecutiveCorrect = 0;
                consecutiveWrong = 0;
                
                correctPopped = 0;
                wrongPopped = 0;
                hasWatchedAd = false;
                
                doubleScoreBtn.style.display = 'block';
                doubleScoreBtn.disabled = false;
                playAgainBtn.style.display = 'none';
                
                timerElement.textContent = timeLeft;
                scoreDisplay.textContent = score;
                
                comboDisplay.textContent = `Combo Level 1`;
                comboDisplay.style.display = 'block';
                
                clearAllBalloons();
                selectNewTarget();
                
                gameTimer = setInterval(handleClockTick, 1000);
                balloonInterval = setInterval(manageSpawning, 500); // Πιο γρήγορο σπαουνάρισμα
                
                resetTargetChangeInterval(baseTargetDuration);
                
                // Αρχικά μπαλόνια στην έναρξη
                for(let i=0; i<8; i++) {
                    createBalloon(i < 4 ? targetColor : null);
                }
            }
            
            function resetTargetChangeInterval(duration) {
                clearInterval(targetChangeInterval);
                targetChangeInterval = setInterval(() => {
                    if (gameActive) selectNewTarget();
                }, duration);
            }
            
            function handleClockTick() {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                if (timeLeft === 40) resetTargetChangeInterval(6500);
                if (timeLeft === 20) resetTargetChangeInterval(4500);
                
                if (timeLeft <= 0) terminateGame();
            }
            
            function manageSpawning() {
                if (!gameActive) return;
                if (balloons.length < maxBalloons) {
                    // 65% πιθανότητα να γεννηθεί το σωστό χρώμα για να μην αδειάζει ποτέ η οθόνη
                    createBalloon(Math.random() < 0.65 ? targetColor : null);
                }
            }
            
            function moveBalloon(balloon) {
                if (!gameActive || !balloon.element.parentNode) return;
                
                const speedMultiplier = timeLeft < 20 ? 1.6 : (timeLeft < 40 ? 1.3 : 1.0);
                
                balloon.x += balloon.dirX * balloon.speedX * speedMultiplier;
                balloon.y += balloon.dirY * balloon.speedY * speedMultiplier;
                
                balloon.depthProgress += balloon.depthSpeed;
                const currentScale = 0.55 + Math.abs(Math.sin(balloon.depthProgress)) * 0.65;
                
                const padding = 90;
                if (balloon.x < -padding) balloon.x = gameArea.offsetWidth + padding - 10;
                else if (balloon.x > gameArea.offsetWidth + padding) balloon.x = -padding + 10;
                
                if (balloon.y < -padding) balloon.y = gameArea.offsetHeight + padding - 10;
                else if (balloon.y > gameArea.offsetHeight + padding) balloon.y = -padding + 10;
                
                balloon.element.style.left = `${balloon.x}px`;
                balloon.element.style.top = `${balloon.y}px`;
                
                if (!balloon.element.classList.contains('popping')) {
                    balloon.element.style.transform = `scale(${currentScale})`;
                    balloon.element.style.zIndex = Math.floor(currentScale * 10);
                    requestAnimationFrame(() => moveBalloon(balloon));
                }
            }
            
            function createBalloon(forcedColor = null) {
                if (!gameActive) return;
                
                const colors = Object.keys(colorMap);
                const chosenColor = forcedColor || colors[Math.floor(Math.random() * colors.length)];
                const hex = colorMap[chosenColor].hex;
                
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.dataset.color = chosenColor;
                
                const body = document.createElement('div');
                body.className = 'balloon-body';
                body.style.backgroundColor = hex;
                
                const string = document.createElement('div');
                string.className = 'balloon-string';
                
                balloon.appendChild(body);
                balloon.appendChild(string);
                
                const startX = Math.random() * (gameArea.offsetWidth - 60);
                const startY = Math.random() * (gameArea.offsetHeight - 80);
                
                balloon.style.left = `${startX}px`;
                balloon.style.top = `${startY}px`;
                
                balloon.addEventListener('pointerdown', handlePopEvent);
                gameArea.appendChild(balloon);
                
                const bObj = {
                    element: balloon,
                    color: chosenColor,
                    x: startX,
                    y: startY,
                    dirX: Math.random() > 0.5 ? 1 : -1,
                    dirY: Math.random() > 0.5 ? 1 : -1,
                    speedX: 0.8 + Math.random() * 1.2,
                    speedY: 0.7 + Math.random() * 1.1,
                    depthProgress: Math.random() * Math.PI,
                    depthSpeed: 0.005 + Math.random() * 0.012
                };
                
                balloons.push(bObj);
                requestAnimationFrame(() => moveBalloon(bObj));
            }
            
            function handlePopEvent(e) {
                if (!gameActive) return;
                e.preventDefault();
                
                const bEl = e.currentTarget;
                if (bEl.classList.contains('popping')) return;
                
                const bColor = bEl.dataset.color;
                const hex = colorMap[bColor].hex;
                
                if (bColor === targetColor) {
                    correctPopped++;
                    consecutiveCorrect++;
                    consecutiveWrong = 0; // Μηδενισμός των λαθών αφού έκανε σωστό
                    
                    // Κάθε 4 σωστά -> Ανεβαίνει Level το Combo
                    if (consecutiveCorrect === 4) {
                        comboLevel++;
                        consecutiveCorrect = 0;
                    }
                    
                    // Υπολογισμός πόντων βάσει του Combo Level
                    let pointsEarned = 10 * comboLevel;
                    
                    score += pointsEarned;
                    playSound('correct');
                    triggerTextFeedback(`+${pointsEarned}`, '#10b981', bEl);
                } else {
                    wrongPopped++;
                    consecutiveWrong++;
                    consecutiveCorrect = 0; // Μηδενισμός των σωστών αφού έκανε λάθος
                    
                    // Κάθε 2 συνεχόμενα λάθη -> Πέφτει 1 Combo Level (μέχρι το ελάχιστο 1)
                    if (consecutiveWrong === 2) {
                        if (comboLevel > 1) {
                            comboLevel--;
                        }
                        consecutiveWrong = 0;
                    }
                    
                    score = Math.max(0, score - 5);
                    playSound('wrong');
                    triggerTextFeedback('-5', '#ef4444', bEl);
                }
                
                // Ανανέωση του Combo Badge στην οθόνη
                comboDisplay.textContent = `Combo Level ${comboLevel}`;
                comboDisplay.style.display = 'block';
                
                scoreDisplay.textContent = score;
                bEl.classList.add('popping');
                spawnExplosionParticles(bEl, hex);
                
                setTimeout(() => {
                    if (bEl.parentNode) {
                        bEl.remove();
                        balloons = balloons.filter(b => b.element !== bEl);
                    }
                }, 200);
            }
            
            function triggerTextFeedback(text, color, element) {
                const f = document.createElement('div');
                f.className = 'feedback';
                f.textContent = text;
                f.style.color = color;
                
                const rect = element.getBoundingClientRect();
                const areaRect = gameArea.getBoundingClientRect();
                
                f.style.left = `${rect.left - areaRect.left + rect.width / 4}px`;
                f.style.top = `${rect.top - areaRect.top}px`;
                
                gameArea.appendChild(f);
                setTimeout(() => f.remove(), 800);
            }
            
            function spawnExplosionParticles(element, color) {
                const rect = element.getBoundingClientRect();
                const areaRect = gameArea.getBoundingClientRect();
                const cx = rect.left - areaRect.left + rect.width / 2;
                const cy = rect.top - areaRect.top + rect.height / 2;
                
                for (let i = 0; i < 12; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.backgroundColor = color;
                    p.style.left = `${cx}px`;
                    p.style.top = `${cy}px`;
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 20 + Math.random() * 45;
                    p.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                    p.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                    
                    gameArea.appendChild(p);
                    setTimeout(() => p.remove(), 600);
                }
            }
            
            function clearAllBalloons() {
                balloons.forEach(b => b.element.remove());
                balloons = [];
            }
            
            function terminateGame() {
                if (gameOverScreen.style.display === 'flex') return;
                
                gameActive = false;
                clearInterval(gameTimer);
                clearInterval(balloonInterval);
                clearInterval(targetChangeInterval);
                
                saveHighScore(score);
                
                finalCorrectElement.textContent = correctPopped;
                finalWrongElement.textContent = wrongPopped;
                finalScoreElement.textContent = score;
                highScoreElement.textContent = bestScore;
                
                gameOverScreen.style.display = 'flex';
                clearAllBalloons();
            }
        });
    </script>
</body>
</html>
