<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jelly Avatar HTML5 Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            color: #ff4a75;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            animation: jellyPulse 2.5s infinite ease-in-out;
        }
        @keyframes jellyPulse {
            0 { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="canvas-container">
        <div class="ui-overlay">ΖΟΥΛΗΞΕ ΤΟ ΖΕΛΕ!</div>
    </div>

    <script>
        const { Engine, Render, Runner, Composites, MouseConstraint, Mouse, Composite, Bodies, Events } = Matter;

        const engine = Engine.create({ gravity: { y: 0.6 } });
        const world = engine.world;

        const container = document.getElementById('canvas-container');
        let width = window.innerWidth;
        let height = window.innerHeight;

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false, 
                background: '#141414'
            }
        });
        Render.run(render);

        const runner = Runner.create();
        Runner.run(runner, engine);

        // Αόρατα όρια οθόνης
        const wallOptions = { isStatic: true, render: { visible: false } };
        const floor = Bodies.rectangle(width / 2, height + 30, width * 2, 60, wallOptions);
        const leftWall = Bodies.rectangle(-30, height / 2, 60, height * 2, wallOptions);
        const rightWall = Bodies.rectangle(width + 30, height / 2, 60, height * 2, wallOptions);
        const ceiling = Bodies.rectangle(width / 2, -30, width * 2, 60, wallOptions);
        Composite.add(world, [floor, leftWall, rightWall, ceiling]);

        // Φόρτωση εικόνων
        const imgBody = new Image();
        imgBody.src = 'body.png';
        const imgEyes = new Image();
        imgEyes.src = 'eyes_open.png';

        // Δημιουργία Soft Body (Πλέγμα 4x4)
        const centerX = width / 2;
        const centerY = height / 2;
        const jellyScale = Math.min(width, height) * 0.0012;

        const jellyAvatar = Composites.softBody(centerX - 80, centerY - 80, 4, 4, 0, 0, true, 22, {
            particleRadius: 2,
            frictionAir: 0.04,
            render: { visible: false }
        }, {
            stiffness: 0.4,
            render: { visible: false }
        });

        Composite.add(world, jellyAvatar);

        // Δείκτες εξωτερικού περιγράμματος για τη σχεδίαση της καρδιάς
        const contourIndices = [0, 1, 2, 3, 7, 11, 15, 14, 13, 12, 8, 4];
        
        // Ορίζουμε δύο σταθερά σωματίδια για να υπολογίζουμε τη στροφή (angle) των ματιών
        const centerParticle = jellyAvatar.bodies[5];  // Το κέντρο
        const topParticle = jellyAvatar.bodies[1];     // Το πάνω κεντρικό σωματίδιο

        // Έλεγχος αφής
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.5,
                render: { visible: false }
            }
        });
        Composite.add(world, mouseConstraint);
        render.mouse = mouse;

        // --- CUSTOM RENDERER ---
        Events.on(render, 'afterRender', function() {
            const context = render.context;
            
            // Υπολογισμός ορίων του σώματος
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            jellyAvatar.bodies.forEach(b => {
                if (b.position.x < minX) minX = b.position.x;
                if (b.position.x > maxX) maxX = b.position.x;
                if (b.position.y < minY) minY = b.position.y;
                if (b.position.y > maxY) maxY = b.position.y;
            });

            const currentWidth = maxX - minX;
            const currentHeight = maxY - minY;
            const posX = minX + currentWidth / 2;
            const posY = minY + currentHeight / 2;

            context.save();
            
            // 1. Σχεδίαση και Clip του σώματος (body.png)
            context.beginPath();
            contourIndices.forEach((idx, i) => {
                const p = jellyAvatar.bodies[idx].position;
                if (i === 0) context.moveTo(p.x, p.y);
                else context.lineTo(p.x, p.y);
            });
            context.closePath();
            context.clip();
            
            if (imgBody.complete) {
                context.drawImage(
                    imgBody, 
                    posX - currentWidth / 2 - 20, 
                    posY - currentHeight / 2 - 20, 
                    currentWidth + 40, 
                    currentHeight + 40
                );
            }
            context.restore();

            // 2. Σχεδίαση των Ματιών (eyes_open.png) - Απόλυτα κλειδωμένα στο σώμα
            if (imgEyes.complete) {
                context.save();
                
                // Τα μάτια ακολουθούν ακριβώς τη θέση του κεντρικού σωματιδίου
                context.translate(centerParticle.position.x, centerParticle.position.y);
                
                // Υπολογισμός δυναμικής γωνίας με βάση τη σχέση κεντρικού και πάνω σωματιδίου
                // Έτσι, αν η καρδιά γείρει, τα μάτια γέρνουν μαζί της στον ίδιο ακριβώς βαθμό
                const angle = Math.atan2(topParticle.position.y - centerParticle.position.y, topParticle.position.x - centerParticle.position.x) + Math.PI / 2;
                context.rotate(angle);

                // Μέγεθος ματιών ανάλογα με το τρέχον μέγεθος του ζελέ για να μικραίνουν/μεγαλώνουν μαζί του
                const eyesWidth = currentWidth * 0.25;
                const eyesHeight = currentHeight * 0.15;

                context.drawImage(
                    imgEyes, 
                    -eyesWidth, 
                    -eyesHeight - (currentHeight * 0.05), // Μικρή μετατόπιση προς τα πάνω για να κάθονται σωστά στο πρόσωπο
                    eyesWidth * 2, 
                    eyesHeight * 2
                );
                context.restore();
            }
        });

        // Responsive resize
        window.addEventListener('resize', function() {
            width = window.innerWidth;
            height = window.innerHeight;
            render.bounds.max.x = width;
            render.bounds.max.y = height;
            render.options.width = width;
            render.options.height = height;
            if (render.canvas) {
                render.canvas.width = width;
                render.canvas.height = height;
            }
            Matter.Body.setPosition(floor, { x: width / 2, y: height + 30 });
            Matter.Body.setPosition(rightWall, { x: width + 30, y: height / 2 });
        });
    </script>
</body>
</html>
