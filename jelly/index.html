<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jelly Avatar HTML5 Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            color: #ff4a75;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            animation: jellyPulse 2.5s infinite ease-in-out;
        }
        @keyframes jellyPulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js">
    </script>
</head>
<body>

    <div id="canvas-container">
        <div class="ui-overlay">ΖΟΥΛΗΞΕ ΤΟ ΖΕΛΕ!</div>
    </div>

    <script>
        const { Engine, Render, Runner, Composites, MouseConstraint, Mouse, Composite, Bodies, Events } = Matter;

        // Δημιουργία μηχανής
        const engine = Engine.create({
            gravity: { y: 0.6 }
        });
        const world = engine.world;

        const container = document.getElementById('canvas-container');
        let width = window.innerWidth;
        let height = window.innerHeight;

        // Δημιουργία render
        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false,
                background: '#141414'
            }
        });
        Render.run(render);

        const runner = Runner.create();
        Runner.run(runner, engine);

        // Αόρατα όρια οθόνης
        const wallOptions = {
            isStatic: true,
            render: { visible: false }
        };
        const floor = Bodies.rectangle(width / 2, height + 30, width * 2, 60, wallOptions);
        const leftWall = Bodies.rectangle(-30, height / 2, 60, height * 2, wallOptions);
        const rightWall = Bodies.rectangle(width + 30, height / 2, 60, height * 2, wallOptions);
        const ceiling = Bodies.rectangle(width / 2, -30, width * 2, 60, wallOptions);
        Composite.add(world, [floor, leftWall, rightWall, ceiling]);

        // Φόρτωση εικόνων
        const imgBody = new Image();
        imgBody.src = 'body.png';
        const imgEyes = new Image();
        imgEyes.src = 'eyes_open.png';

        // Δημιουργία Soft Body (Πλέγμα 4x4)
        const centerX = width / 2;
        const centerY = height / 2;
        const particleRadius = 22;

        // Σωστή κλήση Composites.softBody για Matter.js 0.19
        const jellyAvatar = Composites.softBody(
            centerX - 80, centerY - 80, // xx, yy (επάνω-αριστερά γωνία)
            4, 4, // columns, rows
            0, 0, // columnGap, rowGap (μηδέν για ενωμένα)
            true, // crossBrace
            particleRadius, // particleRadius
            { // particleOptions
                frictionAir: 0.04,
                render: { visible: false }
            }, { // constraintOptions
                stiffness: 0.4,
                render: { visible: false }
            }
        );

        Composite.add(world, jellyAvatar);

        // Εξωτερικό περίγραμμα (12 σημεία από τα 16 του 4x4 πλέγματος)
        const contourIndices = [0, 1, 2, 3, 7, 11, 15, 14, 13, 12, 8, 4];

        // Δύο σωματίδια αναφοράς για τον υπολογισμό της γωνίας των ματιών
        const centerParticle = jellyAvatar.bodies[5]; // row 1, col 1 (κέντρο)
        const topParticle = jellyAvatar.bodies[1]; // row 0, col 1 (πάνω-κέντρο)

        // ---- Εισαγωγή Mouse / Touch ----
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.5,
                render: { visible: false }
            }
        });
        Composite.add(world, mouseConstraint);

        // Συγχρονισμός mouse με render
        render.mouse = mouse;

        // ---- CUSTOM RENDERER (ζωγραφική με εικόνες) ----
        Events.on(render, 'afterRender', function() {
            const context = render.context;

            // Υπολογισμός δυναμικών ορίων του σώματος
            let minX = Infinity,
                maxX = -Infinity,
                minY = Infinity,
                maxY = -Infinity;
            jellyAvatar.bodies.forEach(b => {
                if (b.position.x < minX) minX = b.position.x;
                if (b.position.x > maxX) maxX = b.position.x;
                if (b.position.y < minY) minY = b.position.y;
                if (b.position.y > maxY) maxY = b.position.y;
            });

            const currentWidth = maxX - minX;
            const currentHeight = maxY - minY;
            const posX = minX + currentWidth / 2;
            const posY = minY + currentHeight / 2;

            // 1. Σχεδίαση σώματος (body.png) με clipping path
            context.save();
            context.beginPath();
            contourIndices.forEach((idx, i) => {
                const p = jellyAvatar.bodies[idx].position;
                if (i === 0) context.moveTo(p.x, p.y);
                else context.lineTo(p.x, p.y);
            });
            context.closePath();
            context.clip();

            if (imgBody.complete && imgBody.naturalWidth > 0) {
                context.drawImage(
                    imgBody,
                    posX - currentWidth / 2 - 20,
                    posY - currentHeight / 2 - 20,
                    currentWidth + 40,
                    currentHeight + 40
                );
            } else {
                // Fallback αν δεν έχει φορτώσει η εικόνα
                context.fillStyle = '#ff6b8a';
                context.fill();
            }
            context.restore();

            // 2. Σχεδίαση ματιών (eyes_open.png) – απόλυτα κλειδωμένα στο σώμα
            if (imgEyes.complete && imgEyes.naturalWidth > 0) {
                context.save();

                // Μεταφορά στο κέντρο του ζελέ
                context.translate(centerParticle.position.x, centerParticle.position.y);

                // Γωνία περιστροφής με βάση το πάνω σωματίδιο
                const angle = Math.atan2(
                    topParticle.position.y - centerParticle.position.y,
                    topParticle.position.x - centerParticle.position.x
                ) + Math.PI / 2;
                context.rotate(angle);

                // Μέγεθος ματιών ανάλογα με το μέγεθος του ζελέ
                const eyesWidth = currentWidth * 0.25;
                const eyesHeight = currentHeight * 0.15;

                context.drawImage(
                    imgEyes,
                    -eyesWidth,
                    -eyesHeight - (currentHeight * 0.05),
                    eyesWidth * 2,
                    eyesHeight * 2
                );
                context.restore();
            }
        });

        // ---- Responsive resize ----
        window.addEventListener('resize', function() {
            width = window.innerWidth;
            height = window.innerHeight;
            render.bounds.max.x = width;
            render.bounds.max.y = height;
            render.options.width = width;
            render.options.height = height;
            if (render.canvas) {
                render.canvas.width = width;
                render.canvas.height = height;
            }
            Matter.Body.setPosition(floor, { x: width / 2, y: height + 30 });
            Matter.Body.setPosition(rightWall, { x: width + 30, y: height / 2 });
            Matter.Body.setPosition(leftWall, { x: -30, y: height / 2 });
            Matter.Body.setPosition(ceiling, { x: width / 2, y: -30 });
        });
    </script>
</body>
</html>
