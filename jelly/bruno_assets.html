<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bruno Galaxy Slime – ΕΓΓΥΗΜΕΝΗ ΕΜΦΑΝΙΣΗ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0b0b1a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #canvas-container { width: 100%; height: 100%; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    .ui-overlay {
      position: absolute; top: 20px; text-align: center; width: 100%; pointer-events: none;
      font-size: clamp(20px, 5vw, 32px); font-weight: 800;
      background: linear-gradient(45deg, #ff4a75, #a855f7, #3b82f6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
      animation: jellyPulse 2.5s infinite ease-in-out;
    }
    @keyframes jellyPulse {
      0% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 0.85; }
    }
    .btn-container {
      position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center;
      gap: 18px; flex-wrap: wrap; pointer-events: auto; padding: 0 20px;
    }
    .btn {
      background: rgba(20,20,40,0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 2px solid rgba(180,130,255,0.7); color: white; font-size: 32px; padding: 14px 24px;
      border-radius: 60px; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 20px rgba(168,85,247,0.3);
      display: flex; align-items: center; justify-content: center; min-width: 70px;
    }
    .btn:active { transform: scale(0.9); background: rgba(180,130,255,0.5); border-color: #fff; }
    .btn.recording { background: #ff3b5c; border-color: #fff; animation: pulse 0.8s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,59,92,0.8); }
      70% { box-shadow: 0 0 0 25px rgba(255,59,92,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,59,92,0); }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
  <div id="canvas-container">
    <div class="ui-overlay">Ο ΓΑΛΑΞΙΑΣ ΖΕΛΕΣ!</div>
    <div class="btn-container">
      <button class="btn" id="btnTalk">🎤</button>
      <button class="btn" id="btnFeed">🍔</button>
      <button class="btn" id="btnSleep">😴</button>
    </div>
  </div>

  <script>
    (function() {
      if (typeof Matter === 'undefined') {
        document.body.innerHTML = '<h2 style="color:white; text-align:center; margin-top:40vh;">Το Matter.js δεν φορτώθηκε. Ελέγξτε τη σύνδεση.</h2>';
        return;
      }

      const { Engine, Render, Runner, MouseConstraint, Mouse, Composite, Bodies, Events } = Matter;
      const engine = Engine.create({ gravity: { y: 0.7, scale: 0.001 } });
      const world = engine.world;

      const container = document.getElementById('canvas-container');
      let width = window.innerWidth;
      let height = window.innerHeight;

      const render = Render.create({
        element: container,
        engine: engine,
        options: {
          width, height,
          wireframes: false,
          background: '#0b0b1a',
          pixelRatio: window.devicePixelRatio || 1,
        }
      });
      Render.run(render);
      const runner = Runner.create();
      Runner.run(runner, engine);

      // Όρια
      const wallOpt = { isStatic: true, render: { visible: false } };
      const floor = Bodies.rectangle(width/2, height+40, width*2, 80, wallOpt);
      const leftWall = Bodies.rectangle(-40, height/2, 80, height*2, wallOpt);
      const rightWall = Bodies.rectangle(width+40, height/2, 80, height*2, wallOpt);
      const ceiling = Bodies.rectangle(width/2, -40, width*2, 80, wallOpt);
      Composite.add(world, [floor, leftWall, rightWall, ceiling]);

      const BASE_RADIUS = Math.min(width, height) * 0.1;
      const mainBody = Bodies.circle(width/2, height/2, BASE_RADIUS, {
        render: { visible: false },
        frictionAir: 0.08,
        restitution: 0.45,
        density: 0.002,
      });
      Composite.add(world, mainBody);

      const mouse = Mouse.create(render.canvas);
      const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.3, damping: 0.1, render: { visible: false }, bodyA: mainBody }
      });
      Composite.add(world, mouseConstraint);
      render.mouse = mouse;

      // ---------- (ΠΡΟΑΙΡΕΤΙΚΑ) Φόρτωση εικόνων ----------
      // Αν θες να χρησιμοποιήσεις τα δικά σου assets, απλώς ξεσχολίασε τις παρακάτω γραμμές
      // και αντικατέστησε τη συνάρτηση drawBruno με την έκδοση που σχεδιάζει εικόνες.
      /*
      const assets = {
        bodyNormal: 'body.png',
        bodyHappy: 'body2.png',
        bodySleep: 'body3.png',
        eyesOpen: 'eyes_open.png',
        eyesClosed: 'eyes_closed.PNG',
        mouthClosed: 'mouth.png',
        mouthTalk: 'mouth1.png',
        mouthOpen: 'mouth3.png',
      };
      const images = {};
      for (const [key, src] of Object.entries(assets)) {
        const img = new Image();
        img.src = src;
        images[key] = img;
      }
      */

      // ---------- Καταστάσεις ----------
      let state = 'normal';
      let laughTimer = null;
      let sleepTimer = null;
      let talkingAudio = null;
      let targetMouthOpen = 0;
      let currentMouthOpen = 0;
      let zzzParticles = [];

      // Eye tracking
      let mouseX = width/2, mouseY = height/2;
      window.addEventListener('mousemove', (e) => {
        const rect = render.canvas.getBoundingClientRect();
        const scaleX = render.options.width / rect.width;
        const scaleY = render.options.height / rect.height;
        mouseX = (e.clientX - rect.left) * scaleX;
        mouseY = (e.clientY - rect.top) * scaleY;
      });
      window.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          const rect = render.canvas.getBoundingClientRect();
          const scaleX = render.options.width / rect.width;
          const scaleY = render.options.height / rect.height;
          mouseX = (e.touches[0].clientX - rect.left) * scaleX;
          mouseY = (e.touches[0].clientY - rect.top) * scaleY;
        }
      }, { passive: true });

      // Audio
      let audioCtx = null;
      let mediaRecorder = null;
      let recordedChunks = [];
      const btnTalk = document.getElementById('btnTalk');
      const btnFeed = document.getElementById('btnFeed');
      const btnSleep = document.getElementById('btnSleep');

      async function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
      }

      async function startRecording() {
        await initAudio();
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          recordedChunks = [];
          mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            playTalking(url);
            stream.getTracks().forEach(t => t.stop());
          };
          mediaRecorder.start();
          btnTalk.classList.add('recording');
          btnTalk.textContent = '🔴';
        } catch (err) {
          alert('Δεν επιτρέπεται η πρόσβαση στο μικρόφωνο.');
        }
      }

      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
          btnTalk.classList.remove('recording');
          btnTalk.textContent = '🎤';
        }
      }

      function playTalking(url) {
        initAudio().then(() => {
          if (talkingAudio) { talkingAudio.pause(); talkingAudio = null; }
          const audio = new Audio(url);
          talkingAudio = audio;
          state = 'talking';
          const source = audioCtx.createMediaElementSource(audio);
          const analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          source.connect(analyser);
          analyser.connect(audioCtx.destination);
          const dataArray = new Uint8Array(analyser.frequencyBinCount);

          const updateMouth = () => {
            if (state !== 'talking' || audio.paused) {
              targetMouthOpen = 0;
              return;
            }
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            const avg = sum / dataArray.length;
            targetMouthOpen = Math.min(1, avg / 140);
            requestAnimationFrame(updateMouth);
          };
          audio.onended = () => {
            state = 'normal';
            targetMouthOpen = 0;
            talkingAudio = null;
          };
          audio.play().catch(e => console.warn(e));
          updateMouth();
        });
      }

      function laugh() {
        if (state === 'sleeping') return;
        state = 'laughing';
        Matter.Body.setAngularVelocity(mainBody, (Math.random()-0.5)*0.3);
        Matter.Body.applyForce(mainBody, mainBody.position, { x:0, y:-0.08 });
        if (laughTimer) clearTimeout(laughTimer);
        laughTimer = setTimeout(() => { if (state==='laughing') state='normal'; }, 900);
      }

      function feed() {
        if (state === 'sleeping') return;
        initAudio().then(() => {
          state = 'eating';
          if (talkingAudio) { talkingAudio.pause(); talkingAudio = null; }
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(400, audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime+0.2);
          gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.25);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime+0.25);
          setTimeout(() => { if (state==='eating') state='normal'; }, 700);
        });
      }

      function toggleSleep() {
        if (state === 'sleeping') {
          state = 'normal';
          btnSleep.textContent = '😴';
          zzzParticles = [];
          if (sleepTimer) clearTimeout(sleepTimer);
        } else {
          state = 'sleeping';
          btnSleep.textContent = '⏰';
          targetMouthOpen = 0;
          for (let i = 0; i < 5; i++) {
            zzzParticles.push({
              x: mainBody.position.x + (Math.random()-0.5)*80,
              y: mainBody.position.y - 50 - i*20,
              opacity: 1,
              life: 1,
            });
          }
          sleepTimer = setTimeout(() => {
            if (state === 'sleeping') {
              state = 'normal';
              btnSleep.textContent = '😴';
              zzzParticles = [];
            }
          }, 8000);
        }
      }

      btnTalk.addEventListener('pointerdown', startRecording);
      btnTalk.addEventListener('pointerup', stopRecording);
      btnTalk.addEventListener('pointerleave', stopRecording);
      btnFeed.addEventListener('click', feed);
      btnSleep.addEventListener('click', toggleSleep);

      render.canvas.addEventListener('pointerdown', (e) => {
        const rect = render.canvas.getBoundingClientRect();
        const scaleX = render.options.width / rect.width;
        const scaleY = render.options.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        if (Matter.Query.point([mainBody], { x, y }).length > 0) {
          laugh();
        }
      });

      // ---------- ΣΧΕΔΙΑΣΗ (100% canvas, χωρίς εικόνες) ----------
      function drawBruno(ctx, pos, angle, scale) {
        const bodyW = 220 * scale;
        const bodyH = 300 * scale;
        const eyeSize = 35 * scale;
        const pupilSize = 18 * scale;

        ctx.save();
        ctx.translate(pos.x, pos.y);
        // Στον ύπνο δίνουμε μια κλίση 90° για να φαίνεται ξαπλωμένος
        const finalAngle = (state === 'sleeping') ? angle + Math.PI/2 : angle;
        ctx.rotate(finalAngle);

        // Χρώματα ανά κατάσταση
        let bodyColor1, bodyColor2;
        if (state === 'sleeping') { bodyColor1 = '#7c3aed'; bodyColor2 = '#4c1d95'; }
        else if (state === 'eating') { bodyColor1 = '#f97316'; bodyColor2 = '#c2410c'; }
        else { bodyColor1 = '#a78bfa'; bodyColor2 = '#4f46e5'; }

        // Σώμα (ζελέ)
        const gradient = ctx.createLinearGradient(-bodyW/2, 0, bodyW/2, bodyH/2);
        gradient.addColorStop(0, bodyColor1);
        gradient.addColorStop(1, bodyColor2);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.ellipse(0, 0, bodyW/2, bodyH/2, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#ffffff33';
        ctx.lineWidth = 3*scale;
        ctx.stroke();
        // Λάμψη
        ctx.fillStyle = '#ffffff20';
        ctx.beginPath();
        ctx.ellipse(-bodyW*0.2, -bodyH*0.25, bodyW*0.15, bodyH*0.15, 0, 0, Math.PI*2);
        ctx.fill();

        // Χέρια
        ctx.fillStyle = gradient;
        if (state === 'eating') {
          ctx.beginPath(); ctx.ellipse(-bodyW*0.45, -bodyH*0.35, 25*scale, 35*scale, -0.4, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(bodyW*0.45, -bodyH*0.35, 25*scale, 35*scale, 0.4, 0, Math.PI*2); ctx.fill();
        } else if (state === 'laughing') {
          ctx.beginPath(); ctx.ellipse(-bodyW*0.45, -bodyH*0.4, 25*scale, 35*scale, -0.6, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(bodyW*0.45, -bodyH*0.4, 25*scale, 35*scale, 0.6, 0, Math.PI*2); ctx.fill();
        } else {
          ctx.beginPath(); ctx.ellipse(-bodyW*0.48, bodyH*0.25, 25*scale, 35*scale, 0.3, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(bodyW*0.48, bodyH*0.25, 25*scale, 35*scale, -0.3, 0, Math.PI*2); ctx.fill();
        }

        // Μάτια (με eye tracking)
        const eyeY = -bodyH * 0.12;
        if (state === 'sleeping') {
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 4*scale;
          ctx.beginPath(); ctx.moveTo(-45*scale, eyeY-5*scale); ctx.lineTo(-20*scale, eyeY+8*scale); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(20*scale, eyeY+8*scale); ctx.lineTo(45*scale, eyeY-5*scale); ctx.stroke();
        } else {
          const dx = mouseX - pos.x;
          const dy = mouseY - pos.y;
          const dist = Math.sqrt(dx*dx+dy*dy) || 1;
          const maxOffset = 12 * scale;
          const offsetX = (dx/dist) * Math.min(maxOffset, dist*0.08);
          const offsetY = (dy/dist) * Math.min(maxOffset, dist*0.08);

          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.ellipse(-35*scale + offsetX, eyeY + offsetY, eyeSize, eyeSize*1.1, 0, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(35*scale + offsetX, eyeY + offsetY, eyeSize, eyeSize*1.1, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#1e1b4b';
          ctx.beginPath(); ctx.ellipse(-30*scale + offsetX*1.2, eyeY+3*scale + offsetY*1.2, pupilSize, pupilSize, 0, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(40*scale + offsetX*1.2, eyeY+3*scale + offsetY*1.2, pupilSize, pupilSize, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.arc(-38*scale + offsetX, eyeY-8*scale + offsetY, 5*scale, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(32*scale + offsetX, eyeY-8*scale + offsetY, 5*scale, 0, Math.PI*2); ctx.fill();
        }

        // Στόμα (δυναμικό)
        const mouthY = bodyH * 0.18;
        let mouthOpen = 0;
        if (state === 'eating') mouthOpen = 0.8;
        else if (state === 'talking') mouthOpen = currentMouthOpen;
        else if (state === 'laughing') mouthOpen = 0.7;
        else if (state === 'sleeping') mouthOpen = 0.1;

        const mouthW = 40 * scale;
        const mouthH = (8 + mouthOpen * 30) * scale;
        ctx.fillStyle = '#1a0a2e';
        ctx.beginPath();
        ctx.ellipse(0, mouthY, mouthW, mouthH, 0, 0, Math.PI*2);
        ctx.fill();
        if (mouthOpen > 0.35) {
          ctx.fillStyle = '#ff6b8a';
          ctx.beginPath();
          ctx.ellipse(0, mouthY + mouthH*0.4, mouthW*0.6, mouthH*0.7, 0, 0, Math.PI);
          ctx.fill();
        }

        ctx.restore();

        // Zzz για ύπνο
        if (state === 'sleeping') {
          for (let p of zzzParticles) {
            p.y -= 1.5;
            p.opacity -= 0.008;
            if (p.opacity <= 0) {
              p.x = pos.x + (Math.random()-0.5)*80;
              p.y = pos.y - 50;
              p.opacity = 1;
            }
            ctx.save();
            ctx.font = `${24*scale}px "Comic Sans MS", cursive`;
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = p.opacity;
            ctx.fillText('Z', p.x, p.y);
            ctx.restore();
          }
        }
      }

      // Ομαλό άνοιγμα στόματος
      function animateMouth() {
        if (state === 'talking') {
          currentMouthOpen += (targetMouthOpen - currentMouthOpen) * 0.25;
        } else {
          currentMouthOpen += (0 - currentMouthOpen) * 0.15;
        }
        requestAnimationFrame(animateMouth);
      }
      animateMouth();

      // Σχεδίαση μετά το Matter.js render
      Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        if (!ctx) return;
        const pos = mainBody.position;
        const angle = mainBody.angle;
        const scaleFactor = Math.min(width, height) / 700;
        drawBruno(ctx, pos, angle, scaleFactor);
      });

      // Responsive
      function handleResize() {
        width = window.innerWidth;
        height = window.innerHeight;
        render.options.width = width;
        render.options.height = height;
        render.canvas.width = width;
        render.canvas.height = height;
        Matter.Body.setPosition(floor, { x: width/2, y: height+40 });
        Matter.Body.setPosition(rightWall, { x: width+40, y: height/2 });
        Matter.Body.setPosition(leftWall, { x: -40, y: height/2 });
        Matter.Body.setPosition(ceiling, { x: width/2, y: -40 });
      }
      window.addEventListener('resize', handleResize);
      handleResize();
    })();
  </script>
</body>
</html>
