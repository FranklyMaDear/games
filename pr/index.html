<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧿 HandMaster Pro - Πλήρης Ανάλυση</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; color: #fff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        #container { max-width: 700px; margin: 0 auto; }
        
        #camera-wrapper { position: relative; width: 100%; max-width: 500px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 3px solid #FFD700; box-shadow: 0 0 30px rgba(255,215,0,0.2); background: #111; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .btn { padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; flex: 1; min-width: 80px; }
        .btn-gold { background: #FFD700; color: #111; }
        .btn-gold:hover { background: #FFC107; transform: scale(1.03); }
        .btn-green { background: #2ecc71; color: #fff; }
        .btn-red { background: #e74c3c; color: #fff; }
        .btn-blue { background: #3498db; color: #fff; }
        .btn-purple { background: #9b59b6; color: #fff; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        #mode-selector { display: flex; justify-content: center; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
        .mode-btn { padding: 10px 20px; border: 2px solid #444; border-radius: 30px; background: transparent; color: #aaa; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(255,215,0,0.1); }

        #user-inputs { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 15px 0; }
        .input-group { display: flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 8px 15px; border-radius: 20px; border: 1px solid #444; }
        .input-group label { color: #aaa; font-size: 14px; }
        select, input { padding: 8px 15px; border-radius: 20px; border: none; background: #333; color: white; font-size: 14px; }
        input[type="number"] { width: 70px; }

        #result-area { display: none; background: #1a1a1a; border-radius: 20px; padding: 20px; margin-top: 20px; border-left: 5px solid #FFD700; text-align: left; }
        #result-area h2 { color: #FFD700; margin-top: 0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: #222; padding: 8px 12px; border-radius: 10px; }

        .badge { display: inline-block; background: #FFD700; color: #111; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        #loading { display: none; margin: 15px; color: #aaa; }

        #upload-section { margin: 20px 0; padding: 20px; border: 2px dashed #444; border-radius: 20px; background: #1a1a1a; }
        #upload-section:hover { border-color: #FFD700; }
        #file-input { display: none; }
        .upload-label { padding: 15px 30px; background: #333; border-radius: 30px; cursor: pointer; display: inline-block; transition: 0.3s; }
        .upload-label:hover { background: #444; }
        #upload-preview { max-width: 100%; border-radius: 10px; margin: 10px 0; display: none; }
        #upload-type { margin: 10px 0; color: #FFD700; font-weight: bold; }

        #age-display { margin: 15px 0; color: #FFD700; font-size: 18px; }
        #element-display { margin: 10px 0; color: #aaa; font-size: 16px; }

        #history-area { display: none; margin-top: 30px; text-align: left; }
        #history-area h2 { color: #FFD700; }
        .history-item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 10px 0; border-left: 4px solid #3498db; }
        .history-actions { display: flex; gap: 5px; margin-top: 5px; }
        .history-actions button { padding: 5px 12px; border: none; border-radius: 15px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>🧿 HandMaster Pro</h1>
        <p style="color:#aaa;">Ανέβασε φωτογραφία χεριού ή φλιτζανιού για πλήρη ανάλυση</p>

        <!-- Επιλογή Ηλικίας & Ζωδίου -->
        <div id="user-inputs">
            <div class="input-group">
                <label>🎂 Ηλικία:</label>
                <input type="number" id="user-age" min="1" max="120" value="30">
            </div>
            <div class="input-group">
                <label>♈ Ζώδιο:</label>
                <select id="zodiac">
                    <option value="Κριός">Κριός</option>
                    <option value="Ταύρος">Ταύρος</option>
                    <option value="Δίδυμοι">Δίδυμοι</option>
                    <option value="Καρκίνος">Καρκίνος</option>
                    <option value="Λέων">Λέων</option>
                    <option value="Παρθένος">Παρθένος</option>
                    <option value="Ζυγός">Ζυγός</option>
                    <option value="Σκορπιός">Σκορπιός</option>
                    <option value="Τοξότης">Τοξότης</option>
                    <option value="Αιγόκερως">Αιγόκερως</option>
                    <option value="Υδροχόος">Υδροχόος</option>
                    <option value="Ιχθείς">Ιχθείς</option>
                </select>
            </div>
        </div>

        <!-- Upload Section -->
        <div id="upload-section">
            <label for="file-input" class="upload-label">📁 Ανέβασε φωτογραφία</label>
            <input type="file" id="file-input" accept="image/*" onchange="handleUpload(event)">
            <div id="upload-type"></div>
            <img id="upload-preview">
            <div id="auto-status" style="margin-top:10px; color:#2ecc71; font-weight:bold; display:none;">⏳ Αυτόματη ανάλυση σε εξέλιξη...</div>
        </div>

        <!-- Camera (optional) -->
        <div id="camera-wrapper">
            <video id="webcam" playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="controls">
            <button class="btn btn-gold" id="startBtn" onclick="startCamera()">📷 Κάμερα</button>
            <button class="btn btn-green" id="analyzeBtn" onclick="analyze()" disabled>🔍 Ανάλυση</button>
            <button class="btn btn-red" onclick="resetAll()">⟳ Reset</button>
        </div>

        <div id="loading">⏳ Αναλύω...</div>

        <div id="result-area">
            <h2>🔮 Ανάλυση</h2>
            <div id="element-display"></div>
            <div id="age-display"></div>
            <div id="result-text"></div>
            <div class="stat-grid" id="stats-grid"></div>
            <div style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;">
                <button class="btn btn-blue" onclick="exportPDF()">📄 PDF</button>
                <button class="btn btn-purple" onclick="saveToHistory()">💾 Αποθήκευση</button>
            </div>
        </div>

        <div id="history-area">
            <h2>📚 Ιστορικό Αναλύσεων</h2>
            <div id="history-list"></div>
            <button class="btn btn-red" onclick="clearHistory()">🗑️ Διαγραφή Ιστορικού</button>
        </div>
    </div>

    <script>
        // --- MediaPipe Setup ---
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        let landmarksData = null;
        let analysisResult = null;
        let currentMode = 'hand';
        let capturedPhoto = null;
        let uploadedImage = null;
        let autoAnalyzePending = false;

        overlay.width = 500; overlay.height = 500;

        const hands = new Hands({
            locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                landmarksData = results.multiHandLandmarks[0];
                drawHand(landmarksData);
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('startBtn').disabled = true;
                capturePhoto();
            } else {
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                landmarksData = null;
                document.getElementById('analyzeBtn').disabled = true;
            }
        });

        function drawHand(lm) {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            ctx.save();
            ctx.scale(-1,1);
            ctx.translate(-overlay.width, 0);
            drawConnectors(ctx, lm, HAND_CONNECTIONS, {color:'#FFD700', lineWidth:2});
            drawLandmarks(ctx, lm, {color:'#FFD700', radius:4});
            ctx.restore();
        }

        // --- Upload & Αυτόματη Ανάλυση ---
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImage = e.target.result;
                const preview = document.getElementById('upload-preview');
                preview.src = uploadedImage;
                preview.style.display = 'block';
                
                // Εμφάνιση status
                document.getElementById('auto-status').style.display = 'block';
                document.getElementById('auto-status').innerText = '⏳ Ανίχνευση τύπου...';
                
                // Ανίχνευση τύπου και αυτόματη ανάλυση
                detectTypeAndAnalyze(uploadedImage);
            };
            reader.readAsDataURL(file);
        }

        async function detectTypeAndAnalyze(imageSrc) {
            const img = new Image();
            img.onload = function() {
                // Ανίχνευση τύπου (χέρι ή φλιτζάνι)
                const canvas = document.createElement('canvas');
                const ctx2 = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx2.drawImage(img, 0, 0);
                
                const data = ctx2.getImageData(0, 0, canvas.width, canvas.height).data;
                let brown = 0, skin = 0;
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i] > 80 && data[i] < 180 && data[i+1] > 50 && data[i+1] < 140 && data[i+2] > 20 && data[i+2] < 80) brown++;
                    if (data[i] > 150 && data[i+1] > 100 && data[i+2] > 70) skin++;
                }
                
                currentMode = brown > skin ? 'coffee' : 'hand';
                document.getElementById('upload-type').innerText = `🔍 Ανιχνεύτηκε: ${currentMode === 'hand' ? '✋ Χέρι' : '☕ Φλιτζάνι'}`;
                
                // Αυτόματη ανάλυση
                document.getElementById('auto-status').innerText = '⏳ Αυτόματη ανάλυση σε εξέλιξη...';
                
                setTimeout(() => {
                    let result;
                    if (currentMode === 'hand') {
                        result = analyzeHandFromImage();
                    } else {
                        result = analyzeCoffeeFromImage();
                    }
                    displayResult(result);
                    analysisResult = result;
                    document.getElementById('auto-status').innerText = '✅ Ανάλυση ολοκληρώθηκε!';
                    document.getElementById('auto-status').style.color = '#2ecc71';
                }, 500);
            };
            img.src = imageSrc;
        }

        // --- Camera ---
        function startCamera() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = "⏳...";
            new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 500, height: 500
            }).start().then(() => {
                btn.innerText = "✅ Ready";
                btn.style.background = "#2ecc71";
            }).catch(err => {
                alert("Camera error: "+err);
                btn.disabled = false;
                btn.innerText = "📷 Κάμερα";
            });
        }

        function capturePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedPhoto = canvas.toDataURL('image/png');
        }

        // --- Ανάλυση Χεριού ---
        function analyzeHandFromImage() {
            const age = parseInt(document.getElementById('user-age').value) || 30;
            const zodiac = document.getElementById('zodiac').value;
            
            // Υπολογισμός αναλογιών (προσομοίωση)
            const mid = 1 + (Math.random() * 0.3 - 0.15);
            const ring = 1 + (Math.random() * 0.3 - 0.15);
            const thumb = 0.12 + Math.random() * 0.08;
            
            // Στοιχείο
            const elements = ["🌍 Γη", "💨 Αέρας", "🔥 Φωτιά", "💧 Νερό"];
            const element = elements[Math.floor(Math.random() * elements.length)];
            const elementDescs = {
                "🌍 Γη": "Πρακτικότητα, λογική, σταθερότητα. Είστε προσγειωμένος/η, με ισχυρή σύνδεση με την πραγματικότητα.",
                "💨 Αέρας": "Διανόηση, επικοινωνία, ανησυχία. Αγαπάτε τη γνώση, την ομιλία και τις νέες ιδέες.",
                "🔥 Φωτιά": "Ενέργεια, πάθος, παρορμητισμός. Είστε γεμάτοι ζωή, δράση και ενθουσιασμό.",
                "💧 Νερό": "Διαίσθηση, δημιουργικότητα, συναισθηματική ευαισθησία. Έχετε βαθιά συναισθήματα και καλλιτεχνική φύση."
            };
            
            // Λόφοι
            const mountDescs = [
                "🪐 Λόφος Δία ανεπτυγμένος: Ηγεσία, φιλοδοξία.",
                "♄ Λόφος Κρόνου ανεπτυγμένος: Σοβαρότητα, υπευθυνότητα.",
                "☀️ Λόφος Απόλλωνα ανεπτυγμένος: Δημιουργικότητα, δόξα.",
                "☿ Λόφος Ερμή ανεπτυγμένος: Επικοινωνία, εμπόριο.",
                "♀️ Λόφος Αφροδίτης ανεπτυγμένος: Αγάπη, πάθος."
            ];
            const selectedMounts = mountDescs.slice(0, 2 + Math.floor(Math.random() * 3)).join(' ');
            
            // Ηλικιακή ανάλυση
            let ageAnalysis = "";
            if (age < 25) {
                ageAnalysis = `Στα ${age} σας χρόνια, η γραμμή ζωής δείχνει μια περίοδο δυναμικής εξέλιξης και αλλαγών. Νέες ευκαιρίες και προκλήσεις σας περιμένουν.`;
            } else if (age < 40) {
                ageAnalysis = `Στα ${age} σας χρόνια, η γραμμή ζωής δείχνει ωριμότητα και σταθερότητα. Είστε σε μια φάση όπου οι αποφάσεις σας έχουν μακροπρόθεσμες συνέπειες.`;
            } else if (age < 60) {
                ageAnalysis = `Στα ${age} σας χρόνια, η γραμμή ζωής δείχνει σοφία και εμπειρία. Η ζωτική σας ενέργεια είναι ακόμα ισχυρή, με έμφαση στην οικογένεια και την πνευματική ανάπτυξη.`;
            } else {
                ageAnalysis = `Στα ${age} σας χρόνια, η γραμμή ζωής δείχνει μια πλούσια διαδρομή. Η εμπειρία και η γνώση που έχετε συσσωρεύσει είναι το μεγαλύτερο σας πλεονέκτημα.`;
            }
            
            // Καριέρα
            const fateLine = Math.random() > 0.3 ? "εμφανής" : "ασαφής";
            const sunLine = Math.random() > 0.4 ? "εμφανής" : "ασαφής";
            let careerAnalysis = "";
            if (fateLine === "εμφανής") {
                careerAnalysis += "📈 Γραμμή Μοίρας εμφανής: Η καριέρα σας επηρεάζεται από εξωτερικούς παράγοντες, αλλά έχετε σταθερή πορεία. ";
            } else {
                careerAnalysis += "📉 Γραμμή Μοίρας ασαφής: Έχετε ελευθερία επιλογών, η καριέρα σας εξαρτάται από εσάς. ";
            }
            if (sunLine === "εμφανής") {
                careerAnalysis += "☀️ Γραμμή Ήλιου εμφανής: Δόξα, επιτυχία και καλλιτεχνικό ταλέντο. ";
            }
            
            // Διαίσθηση
            const mysticCross = Math.random() > 0.5 ? "εμφανής" : "μη εμφανής";
            let intuitionAnalysis = "";
            if (mysticCross === "εμφανής") {
                intuitionAnalysis = "✝️ Μυστικός Σταυρός: Έντονη διαίσθηση, ενδιαφέρον για το μεταφυσικό. ";
            }
            
            // Σύνδεση με ζώδιο
            const zodiacMap = {
                "Κριός": "Παρορμητική φύση, ενέργεια. Συνδεδεμένος με τον Λόφο του Άρη.",
                "Ταύρος": "Σταθερότητα & αντοχή. Συνδεδεμένος με τον Λόφο της Αφροδίτης.",
                "Δίδυμοι": "Ευελιξία, αλλαγή γνώμης. Συνδεδεμένος με τον Λόφο του Ερμή.",
                "Καρκίνος": "Συναισθηματική ευαισθησία. Συνδεδεμένος με τον Λόφο της Σελήνης.",
                "Λέων": "Ηγέτης, θέλει δράση. Συνδεδεμένος με τον Λόφο του Απόλλωνα.",
                "Παρθένος": "Αναλυτικό μυαλό. Συνδεδεμένος με τον Λόφο του Ερμή.",
                "Ζυγός": "Διπλωματία & ισορροπία. Συνδεδεμένος με τον Λόφο της Αφροδίτης.",
                "Σκορπιός": "Πάθος & μυστήριο. Συνδεδεμένος με τον Λόφο του Άρη.",
                "Τοξότης": "Περιπέτεια & ενθουσιασμός. Συνδεδεμένος με τον Λόφο του Δία.",
                "Αιγόκερως": "Υπομονή & στόχοι. Συνδεδεμένος με τον Λόφο του Κρόνου.",
                "Υδροχόος": "Μοναδικότητα & καινοτομία. Συνδεδεμένος με τον Λόφο του Κρόνου.",
                "Ιχθείς": "Ενσυναίσθηση & φαντασία. Συνδεδεμένος με τον Λόφο της Σελήνης."
            };
            const zodiacMatch = zodiacMap[zodiac] || "Συνδυασμός με το ζώδιο σου.";
            
            return {
                type: 'hand',
                element: element,
                elementDesc: elementDescs[element] || "",
                mountsDesc: selectedMounts,
                ageAnalysis: ageAnalysis,
                careerAnalysis: careerAnalysis,
                intuitionAnalysis: intuitionAnalysis,
                handDominance: "Δεξί χέρι (επίτευγμα) / Αριστερό (πεπρωμένο)",
                zodiac: zodiac,
                zodiacMatch: zodiacMatch,
                userAge: age,
                stats: {
                    "Δείκτης/Μέσος": mid.toFixed(2),
                    "Παράμεσος/Δείκτης": ring.toFixed(2),
                    "Άνοιγμα παλάμης": thumb.toFixed(3),
                    "Στοιχείο": element,
                    "Γραμμή Μοίρας": fateLine,
                    "Γραμμή Ήλιου": sunLine,
                    "Μυστικός Σταυρός": mysticCross,
                    "Ηλικία": age
                },
                date: new Date().toISOString(),
                source: 'upload'
            };
        }

        // --- Ανάλυση Φλιτζανιού ---
        function analyzeCoffeeFromImage() {
            const age = parseInt(document.getElementById('user-age').value) || 30;
            
            const shapes = ["Τετράγωνο","Κύκλος","Σταυρός","Τρίγωνο","Σπιτάκι","Ψάρι","Πουλί","Τριαντάφυλλο","Πρόσωπο","Ευθεία Γραμμή"];
            const sh = shapes[Math.floor(Math.random() * shapes.length)];
            const shapeInterp = {
                "Τετράγωνο": "Ερωτική & αισθηματική ζωή. Συνεχόμενο/Διακεκομμένο = Σύντομη ευτυχία.",
                "Κύκλος": "Καλά νέα, χρήματα, φίλοι. Πολλοί κύκλοι = Μεγάλη επιτυχία.",
                "Σταυρός": "Πολύ σοβαρό σημάδι. Αν είναι με πρόσωπο κάτω = Ευτυχισμένο γεγονός, γάμος.",
                "Τρίγωνο": "Τύχη στα οικονομικά. Πολλά τρίγωνα = Επιτυχία σε συναισθηματικό και οικονομικό τομέα.",
                "Σπιτάκι": "Οικογενειακή ευτυχία, γάμος.",
                "Ψάρι": "Ένα ψάρι = Επιτυχία. Πολλά = Κακό σημάδι, κίνδυνος, αρρώστια.",
                "Πουλί": "Ευχάριστα γεγονότα.",
                "Τριαντάφυλλο": "Υγεία και ευτυχία.",
                "Πρόσωπο": "Νέα σχέση (αν είναι κεφάλι). Κάποιος σε προστατεύει (αν είναι ανάποδα).",
                "Ευθεία Γραμμή": "Δρόμος, ταξίδι, καλό τέλος."
            }[sh] || "";
            
            const letters = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΟΠΣΤΥΦΧΨΩ";
            const lt = letters[Math.floor(Math.random() * letters.length)];
            const letterInterp = {
                "Α": "Άγγελος: Είστε τυχεροί, ευχάριστα νέα.",
                "Β": "Βαγόνι: Θα συναντήσετε πρόσωπο που αγαπάτε.",
                "Γ": "Γάιδαρος: Περιμένετε υπομονή σε οικογενειακά προβλήματα.",
                "Δ": "Δελφίνι: Ερωτική επιτυχία και οικογενειακή ευτυχία.",
                "Ε": "Εκκλησία: Κάποιο χαρούμενο γεγονός (γάμος, βάπτιση).",
                "Ζ": "Ζευγάρι: Ο σύντροφός σας έχει σχέση και με άλλη γυναίκα.",
                "Η": "Ήλιος: Απόλυτη επιτυχία.",
                "Θ": "Θάλασσα: Ανάλογο με τις γραμμές.",
                "Ι": "Ιτιά: Δυσάρεστη περίοδος, δεν θα κρατήσει πολύ.",
                "Κ": "Καντήλι: Μεγάλη ηρεμία.",
                "Λ": "Λαβύρινθος: Μεγάλος κίνδυνος.",
                "Μ": "Μαχαίρι: Εχθρότητα.",
                "Ν": "Νόμισμα: Τύχη και χρήματα.",
                "Ο": "Ομπρέλα: Είμαι συμπαθής, καλοί φίλοι.",
                "Π": "Παλάμη: Κέρδη μεγάλα (από κληρονομιά).",
                "Σ": "Σταυρός: Κακό σημάδι (θάνατος/ασθένεια).",
                "Τ": "Τριφύλλι: Μεγάλη τύχη.",
                "Υ": "Ύρακας: Προδοσία.",
                "Φ": "Φύλλο: Θα γνωρίσετε τον άνθρωπο που θα παντρευτείτε.",
                "Χ": "Χορός: Ευχάριστες στιγμές.",
                "Ψ": "Ψάρι: Δείτε γενικά σύμβολα.",
                "Ω": "Ωρολογιακός Μηχανισμός: Πρόοδος."
            }[lt] || "";

            // Ηλικιακή ανάλυση για φλιτζάνι
            let coffeeAgeAnalysis = "";
            if (age < 25) {
                coffeeAgeAnalysis = `Στα ${age} σας χρόνια, το φλιτζάνι δείχνει μια περίοδο δημιουργικής αναζήτησης και νέων εμπειριών.`;
            } else if (age < 40) {
                coffeeAgeAnalysis = `Στα ${age} σας χρόνια, το φλιτζάνι δείχνει σταθερότητα και ωριμότητα, με νέες ευκαιρίες στον ορίζοντα.`;
            } else if (age < 60) {
                coffeeAgeAnalysis = `Στα ${age} σας χρόνια, το φλιτζάνι δείχνει σοφία και εμπειρία. Οι προβλέψεις είναι πιο σίγουρες.`;
            } else {
                coffeeAgeAnalysis = `Στα ${age} σας χρόνια, το φλιτζάνι δείχνει μια μακρά και πλούσια διαδρομή. Η εμπειρία σας φωτίζει το μέλλον.`;
            }
            
            return {
                type: 'coffee',
                shape: sh,
                shapeInterpretation: shapeInterp,
                letter: lt,
                letterInterpretation: letterInterp,
                ageAnalysis: coffeeAgeAnalysis,
                userAge: age,
                stats: {
                    "Σχήμα": sh,
                    "Γράμμα": lt,
                    "Ηλικία": age
                },
                date: new Date().toISOString(),
                source: 'upload'
            };
        }

        // --- Εμφάνιση Αποτελέσματος ---
        function displayResult(r) {
            const area = document.getElementById('result-area');
            const text = document.getElementById('result-text');
            const grid = document.getElementById('stats-grid');
            const elementDisplay = document.getElementById('element-display');
            const ageDisplay = document.getElementById('age-display');

            area.style.display = 'block';

            if (r.type === 'hand') {
                elementDisplay.innerHTML = `<strong>${r.element}</strong> — ${r.elementDesc}`;
                elementDisplay.style.color = "#FFD700";
                
                ageDisplay.innerHTML = `📅 ${r.ageAnalysis}`;
                
                text.innerHTML = `
                    <strong>🪐 Λόφοι:</strong> ${r.mountsDesc}<br>
                    <strong>📈 Καριέρα:</strong> ${r.careerAnalysis}<br>
                    <strong>🔮 Διαίσθηση:</strong> ${r.intuitionAnalysis}<br>
                    <strong>🖐️ Χέρι:</strong> ${r.handDominance}<br>
                    <hr style="border-color:#444;">
                    <strong>♈ ${r.zodiac}:</strong> ${r.zodiacMatch}
                `;
                
                grid.innerHTML = `
                    <div class="stat-item"><span class="badge">Δείκτης/Μέσος</span><br>${r.stats["Δείκτης/Μέσος"]}</div>
                    <div class="stat-item"><span class="badge">Παράμεσος/Δείκτης</span><br>${r.stats["Παράμεσος/Δείκτης"]}</div>
                    <div class="stat-item"><span class="badge">Άνοιγμα παλάμης</span><br>${r.stats["Άνοιγμα παλάμης"]}</div>
                    <div class="stat-item"><span class="badge">Στοιχείο</span><br>${r.stats["Στοιχείο"]}</div>
                    <div class="stat-item"><span class="badge">Γραμμή Μοίρας</span><br>${r.stats["Γραμμή Μοίρας"]}</div>
                    <div class="stat-item"><span class="badge">Γραμμή Ήλιου</span><br>${r.stats["Γραμμή Ήλιου"]}</div>
                    <div class="stat-item"><span class="badge">Μυστικός Σταυρός</span><br>${r.stats["Μυστικός Σταυρός"]}</div>
                    <div class="stat-item"><span class="badge">Ηλικία</span><br>${r.stats["Ηλικία"]}</div>
                `;
            } else {
                elementDisplay.innerHTML = `<strong>☕ Ανάλυση Φλιτζανιού</strong>`;
                elementDisplay.style.color = "#FFD700";
                
                ageDisplay.innerHTML = `📅 ${r.ageAnalysis}`;
                
                text.innerHTML = `
                    <strong>☕ Σχήμα που εντοπίστηκε:</strong> ${r.shape}<br>
                    <strong>📖 Ερμηνεία σχήματος:</strong> ${r.shapeInterpretation}<br>
                    <hr style="border-color:#444;">
                    <strong>🔤 Γράμμα που εντοπίστηκε:</strong> ${r.letter}<br>
                    <strong>📖 Ερμηνεία γράμματος:</strong> ${r.letterInterpretation}
                `;
                
                grid.innerHTML = `
                    <div class="stat-item"><span class="badge">Σχήμα</span><br>${r.stats["Σχήμα"]}</div>
                    <div class="stat-item"><span class="badge">Γράμμα</span><br>${r.stats["Γράμμα"]}</div>
                    <div class="stat-item"><span class="badge">Ηλικία</span><br>${r.stats["Ηλικία"]}</div>
                `;
            }
        }

        // --- Ανάλυση (για κάμερα) ---
        function analyze() {
            if (!landmarksData) {
                alert("Δείξε το χέρι σου!");
                return;
            }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('analyzeBtn').disabled = true;

            setTimeout(() => {
                const result = analyzeHandFromImage(); // Χρησιμοποιούμε την ίδια λογική
                displayResult(result);
                analysisResult = result;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
            }, 300);
        }

        // --- Ιστορικό & PDF ---
        function saveToHistory() {
            if (!analysisResult) { alert("Κάνε ανάλυση πρώτα!"); return; }
            let h = JSON.parse(localStorage.getItem('history') || '[]');
            h.push({
                id: Date.now(),
                ...analysisResult,
                dateStr: new Date().toLocaleString('el-GR')
            });
            localStorage.setItem('history', JSON.stringify(h));
            renderHistory();
            alert("✅ Αποθηκεύτηκε!");
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const h = JSON.parse(localStorage.getItem('history') || '[]');
            if (!h.length) {
                list.innerHTML = "<p style='color:#888;'>Δεν υπάρχουν αναλύσεις.</p>";
                return;
            }
            list.innerHTML = h.map((item, i) => `
                <div class="history-item">
                    <strong>#${i+1}</strong> <small>${item.dateStr}</small> (${item.source})<br>
                    ${item.type === 'hand' ? 
                        `✋ ${item.element} | ♈ ${item.zodiac} | 📅 ${item.userAge} ετών` :
                        `☕ Σχήμα: ${item.shape} | Γράμμα: ${item.letter} | 📅 ${item.userAge} ετών`
                    }
                    <div class="history-actions">
                        <button onclick="deleteHistoryItem(${i})" style="background:#e74c3c;color:#fff;">Διαγραφή</button>
                        <button onclick="exportHistoryItemAsPDF(${i})" style="background:#3498db;color:#fff;">PDF</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('history-area').style.display = 'block';
        }

        function deleteHistoryItem(i) {
            let h = JSON.parse(localStorage.getItem('history') || '[]');
            h.splice(i, 1);
            localStorage.setItem('history', JSON.stringify(h));
            renderHistory();
        }

        function clearHistory() {
            if (confirm("Διαγραφή όλου του ιστορικού;")) {
                localStorage.removeItem('history');
                renderHistory();
                alert("Ιστορικό διαγράφηκε.");
            }
        }

        async function exportHistoryItemAsPDF(i) {
            const h = JSON.parse(localStorage.getItem('history') || '[]');
            const item = h[i];
            if (!item) return;
            const preview = document.createElement('div');
            preview.style.display = 'block';
            const content = document.createElement('div');
            content.innerHTML = `
                <div style="font-family:Arial; padding:20px; color:#111; background:white; max-width:500px; margin:auto; border-radius:15px;">
                    <h2 style="text-align:center; color:#B8860B;">🧿 HandMaster Pro</h2>
                    <p style="text-align:center; color:#555;">${item.dateStr}</p>
                    <hr>
                    ${item.type === 'hand' ? `
                        <p><strong>🌍 Στοιχείο:</strong> ${item.element}</p>
                        <p><strong>📅 Ηλικιακή ανάλυση:</strong> ${item.ageAnalysis}</p>
                        <p><strong>♈ Ζώδιο:</strong> ${item.zodiac} — ${item.zodiacMatch}</p>
                        <p><strong>📈 Καριέρα:</strong> ${item.careerAnalysis}</p>
                        <p><strong>🔮 Διαίσθηση:</strong> ${item.intuitionAnalysis}</p>
                    ` : `
                        <p><strong>☕ Σχήμα:</strong> ${item.shape}</p>
                        <p><strong>📖 Ερμηνεία:</strong> ${item.shapeInterpretation}</p>
                        <p><strong>🔤 Γράμμα:</strong> ${item.letter}</p>
                        <p><strong>📖 Ερμηνεία:</strong> ${item.letterInterpretation}</p>
                    `}
                    <hr>
                    <p style="text-align:center; font-size:12px; color:#999;">HandMaster Pro AI</p>
                </div>
            `;
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(content, { scale:2, backgroundColor:'#ffffff' });
            const pdf = new jsPDF('p','mm','a4');
            const w = pdf.internal.pageSize.getWidth();
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, (canvas.height * w) / canvas.width);
            pdf.save(`HandMaster_${item.dateStr}.pdf`);
        }

        async function exportPDF() {
            if (!analysisResult) { alert("Κάνε ανάλυση πρώτα!"); return; }
            const content = document.createElement('div');
            const now = new Date();
            content.innerHTML = `
                <div style="font-family:Arial; padding:20px; color:#111; background:white; max-width:500px; margin:auto; border-radius:15px;">
                    <h2 style="text-align:center; color:#B8860B;">🧿 HandMaster Pro</h2>
                    <p style="text-align:center; color:#555;">${now.toLocaleDateString('el-GR')}</p>
                    <hr>
                    ${analysisResult.type === 'hand' ? `
                        <p><strong>🌍 Στοιχείο:</strong> ${analysisResult.element}</p>
                        <p><strong>📅 Ηλικιακή ανάλυση:</strong> ${analysisResult.ageAnalysis}</p>
                        <p><strong>♈ Ζώδιο:</strong> ${analysisResult.zodiac} — ${analysisResult.zodiacMatch}</p>
                        <p><strong>📈 Καριέρα:</strong> ${analysisResult.careerAnalysis}</p>
                        <p><strong>🔮 Διαίσθηση:</strong> ${analysisResult.intuitionAnalysis}</p>
                    ` : `
                        <p><strong>☕ Σχήμα:</strong> ${analysisResult.shape}</p>
                        <p><strong>📖 Ερμηνεία:</strong> ${analysisResult.shapeInterpretation}</p>
                        <p><strong>🔤 Γράμμα:</strong> ${analysisResult.letter}</p>
                        <p><strong>📖 Ερμηνεία:</strong> ${analysisResult.letterInterpretation}</p>
                    `}
                    <hr>
                    <p style="text-align:center; font-size:12px; color:#999;">HandMaster Pro AI</p>
                </div>
            `;
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(content, { scale:2, backgroundColor:'#ffffff' });
            const pdf = new jsPDF('p','mm','a4');
            const w = pdf.internal.pageSize.getWidth();
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, (canvas.height * w) / canvas.width);
            pdf.save(`HandMaster_${now.toISOString().slice(0,10)}.pdf`);
        }

        function resetAll() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "📷 Κάμερα";
            ctx.clearRect(0,0,overlay.width,overlay.height);
            landmarksData = null;
            analysisResult = null;
            document.getElementById('upload-preview').style.display = 'none';
            document.getElementById('auto-status').style.display = 'none';
            document.getElementById('upload-type').innerText = '';
        }

        function drawConnectors(ctx, lm, conn, style) {
            ctx.strokeStyle = style.color;
            ctx.lineWidth = style.lineWidth;
            for (const [i,j] of conn) {
                ctx.beginPath();
                ctx.moveTo(lm[i].x * overlay.width, lm[i].y * overlay.height);
                ctx.lineTo(lm[j].x * overlay.width, lm[j].y * overlay.height);
                ctx.stroke();
            }
        }
        function drawLandmarks(ctx, lm, style) {
            ctx.fillStyle = style.color;
            for (const p of lm) {
                ctx.beginPath();
                ctx.arc(p.x * overlay.width, p.y * overlay.height, style.radius, 0, 2*Math.PI);
                ctx.fill();
            }
        }
        const HAND_CONNECTIONS = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],
            [0,17],[17,18],[18,19],[19,20],
            [5,9],[9,13],[13,17]
        ];

        window.onload = function() {
            const h = JSON.parse(localStorage.getItem('history') || '[]');
            if (h.length) {
                renderHistory();
                document.getElementById('history-area').style.display = 'block';
            }
        };
    </script>
