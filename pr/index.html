<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 HandMaster Pro - Ανάγνωση Χεριού & Αντικειμένων</title>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- TensorFlow & COCO-SSD -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@latest/dist/coco-ssd.min.js"></script>
    
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Firebase (προαιρετικό) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; color: #fff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        #container { max-width: 700px; margin: 0 auto; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin: 20px 0; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 30px; background: #333; color: #fff; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #FFD700; color: #111; }
        .tab-btn:hover { transform: scale(1.05); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #camera-wrapper { position: relative; width: 100%; max-width: 500px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 3px solid #FFD700; box-shadow: 0 0 30px rgba(255,215,0,0.2); background: #111; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .btn { padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; flex: 1; min-width: 100px; }
        .btn-gold { background: #FFD700; color: #111; }
        .btn-gold:hover { background: #FFC107; transform: scale(1.03); }
        .btn-green { background: #2ecc71; color: #fff; }
        .btn-red { background: #e74c3c; color: #fff; }
        .btn-blue { background: #3498db; color: #fff; }
        .btn-purple { background: #9b59b6; color: #fff; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        #zodiac-group { margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        select { padding: 10px 20px; border-radius: 30px; border: none; background: #333; color: white; font-size: 16px; }

        #result-area { display: none; background: #1a1a1a; border-radius: 20px; padding: 20px; margin-top: 20px; border-left: 5px solid #FFD700; text-align: left; }
        #result-area h2 { color: #FFD700; margin-top: 0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: #222; padding: 8px 12px; border-radius: 10px; }

        #pdf-preview { display: none; background: #222; padding: 15px; border-radius: 15px; margin: 20px 0; border: 1px solid #444; text-align: left; }
        #pdf-preview h3 { margin-top: 0; color: #FFD700; }

        /* Upload */
        #upload-area { border: 2px dashed #FFD700; padding: 30px; margin: 20px auto; max-width: 400px; border-radius: 20px; cursor: pointer; background: #1a1a1a; }
        #upload-area:hover { background: #222; }
        #uploaded-img { max-width: 100%; border-radius: 15px; margin: 10px 0; display: none; }

        /* History */
        #history-area { display: none; margin-top: 30px; text-align: left; }
        #history-area h2 { color: #FFD700; }
        .history-item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 10px 0; border-left: 4px solid #3498db; }
        .history-item small { color: #888; }
        .history-actions { display: flex; gap: 5px; margin-top: 5px; }
        .history-actions button { padding: 5px 12px; border: none; border-radius: 15px; cursor: pointer; font-size: 12px; }

        .badge { display: inline-block; background: #FFD700; color: #111; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 5px; }
        #loading { display: none; margin: 15px; color: #aaa; }
        
        .mode-label { color: #aaa; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>🖐️ HandMaster Pro</h1>
        <p style="color:#aaa;">Δείξε την παλάμη σου, ανέβασε κόκκαλο ή φλιτζάνι</p>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('camera')">📷 Κάμερα</button>
            <button class="tab-btn" onclick="switchTab('upload')">🖼️ Ανέβασμα</button>
        </div>

        <!-- Tab: Camera -->
        <div id="tab-camera" class="tab-content active">
            <div id="camera-wrapper">
                <video id="webcam" playsinline></video>
                <canvas id="overlay"></canvas>
            </div>

            <div class="controls">
                <button class="btn btn-gold" id="startBtn" onclick="startCamera()">📷 Εκκίνηση Κάμερας</button>
                <button class="btn btn-green" id="analyzeBtn" onclick="analyzeHand()" disabled>🔍 Ανάλυση</button>
                <button class="btn btn-red" id="resetBtn" onclick="resetAll()">⟳ Επαναφορά</button>
            </div>

            <div id="zodiac-group">
                <label for="zodiac">♈ Ζώδιο:</label>
                <select id="zodiac">
                    <option value="Κριός">Κριός</option>
                    <option value="Ταύρος">Ταύρος</option>
                    <option value="Δίδυμοι">Δίδυμοι</option>
                    <option value="Καρκίνος">Καρκίνος</option>
                    <option value="Λέων">Λέων</option>
                    <option value="Παρθένος">Παρθένος</option>
                    <option value="Ζυγός">Ζυγός</option>
                    <option value="Σκορπιός">Σκορπιός</option>
                    <option value="Τοξότης">Τοξότης</option>
                    <option value="Αιγόκερως">Αιγόκερως</option>
                    <option value="Υδροχόος">Υδροχόος</option>
                    <option value="Ιχθείς">Ιχθείς</option>
                </select>
            </div>
        </div>

        <!-- Tab: Upload -->
        <div id="tab-upload" class="tab-content">
            <div id="upload-area" onclick="document.getElementById('fileInput').click()">
                <p>📸 Κάνε κλικ ή σύρε εικόνα</p>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="analyzeUpload(event)">
            </div>
            <img id="uploaded-img">
            <div class="mode-label">Ανέβασε: χέρι, κόκκαλο, φλιτζάνι καφέ, κλπ.</div>
        </div>

        <div id="loading">⏳ Αναλύω...</div>

        <!-- Result -->
        <div id="result-area">
            <h2 id="result-title">🔮 Ανάλυση</h2>
            <div id="result-text"></div>
            <div class="stat-grid" id="stats-grid"></div>

            <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px;">
                <button class="btn btn-blue" onclick="exportPDF()">📄 Εξαγωγή PDF</button>
                <button class="btn btn-purple" onclick="saveToHistory()">💾 Αποθήκευση</button>
                <button class="btn btn-gold" onclick="resetAll()">⟳ Νέα Ανάλυση</button>
            </div>
        </div>

        <!-- PDF Preview -->
        <div id="pdf-preview">
            <h3>📄 Προεπισκόπηση PDF</h3>
            <div id="pdf-content"></div>
        </div>

        <!-- History -->
        <div id="history-area">
            <h2>📚 Ιστορικό Αναλύσεων</h2>
            <div id="history-list"></div>
            <button class="btn btn-red" onclick="clearHistory()" style="margin-top:10px;">🗑️ Διαγραφή Ιστορικού</button>
            <button class="btn btn-blue" onclick="syncToFirebase()" style="margin-top:10px;">☁️ Συγχρονισμός με Cloud</button>
        </div>
    </div>

    <script>
        // --- Firebase Configuration (προαιρετικό) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBogusKey_Replace_Me",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        // Αν θέλετε να χρησιμοποιήσετε Firebase, αντικαταστήστε τα παραπάνω με τα δικά σας στοιχεία.
        // firebase.initializeApp(firebaseConfig);
        // const db = firebase.firestore();

        // --- Global Variables ---
        let landmarksData = null;
        let analysisResult = null;
        let objectAnalysisResult = null;
        let currentMode = 'camera';

        // --- MediaPipe Setup ---
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');

        overlay.width = 500; overlay.height = 500;

        const hands = new Hands({
            locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                landmarksData = results.multiHandLandmarks[0];
                drawHand(landmarksData);
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('startBtn').disabled = true;
            } else {
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                landmarksData = null;
                document.getElementById('analyzeBtn').disabled = true;
            }
        });

        function drawHand(lm) {
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            ctx.save();
            ctx.scale(-1,1);
            ctx.translate(-overlay.width, 0);
            drawConnectors(ctx, lm, HAND_CONNECTIONS, {color:'#FFD700', lineWidth:2});
            drawLandmarks(ctx, lm, {color:'#FFD700', radius:4});
            ctx.restore();
        }

        // --- Camera ---
        function startCamera() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = "⏳ Φορτώνω AI...";
            const camera = new Camera(video, {
                onFrame: async () => { await hands.send({image: video}); },
                width: 500, height: 500
            });
            camera.start().then(() => {
                btn.innerText = "✅ Κάμερα έτοιμη";
                btn.style.background = "#2ecc71";
            }).catch(err => {
                alert("Σφάλμα κάμερας: " + err);
                btn.disabled = false;
                btn.innerText = "📷 Εκκίνηση";
            });
        }

        // --- Switch Tabs ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'camera') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                currentMode = 'camera';
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                currentMode = 'upload';
            }
            resetAll();
        }

        // --- COCO-SSD Model Loading ---
        let objectModel = null;
        (async function loadObjectModel() {
            try {
                objectModel = await cocoSsd.load();
                console.log("✅ COCO-SSD loaded");
            } catch (err) {
                console.error("Σφάλμα φόρτωσης COCO-SSD:", err);
            }
        })();

        // --- Analyze Hand (Camera) ---
        function analyzeHand() {
            if (!landmarksData) { alert("Δείξε το χέρι σου!"); return; }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('analyzeBtn').disabled = true;

            setTimeout(() => {
                const result = computeHandAnalysis(landmarksData);
                displayResult(result, 'hand');
                analysisResult = result;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
            }, 300);
        }

        function computeHandAnalysis(lm) {
            const tips = [4,8,12,16,20];
            const pips = [3,6,10,14,18];
            const lengths = tips.map((t,i) => {
                const dx = lm[t].x - lm[pips[i]].x;
                const dy = lm[t].y - lm[pips[i]].y;
                return Math.sqrt(dx*dx + dy*dy);
            });
            const idxLen = lengths[1];
            if (idxLen === 0) return { error: "Δεν βλέπω δείκτη" };
            const norm = lengths.map(l => l / idxLen);

            const middleRatio = norm[2] / norm[1];
            const ringRatio = norm[3] / norm[1];
            const thumbWidth = Math.abs(lm[4].x - lm[20].x);

            let personality = "";
            if (middleRatio > 1.15) personality += "Ισχυρή θέληση & αυτοπεποίθηση. ";
            else if (middleRatio < 0.95) personality += "Διακριτικός/ή, με βαθιά σκέψη. ";
            else personality += "Ισορροπημένος/η, προσγειωμένος/η. ";

            if (ringRatio > 1.1) personality += "Καλλιτεχνική φύση, αίσθηση ομορφιάς. ";
            else if (ringRatio < 0.9) personality += "Λογικός/ή, πρακτικός/ή. ";
            else personality += "Αναλυτικός/ή, προσέχεις λεπτομέρειες. ";

            const open = thumbWidth > 0.12 ? "Ανοιχτή παλάμη: Εξωστρεφής, δίνεις συναισθήματα." : "Κλειστή παλάμη: Κρατάς συναισθήματα, επιφυλακτικός/ή.";

            const zodiac = document.getElementById('zodiac').value;
            const zodiacMap = {
                "Κριός":"Παρορμητική φύση, ενέργεια.",
                "Ταύρος":"Σταθερότητα & αντοχή.",
                "Δίδυμοι":"Ευελιξία, αλλαγή γνώμης.",
                "Καρκίνος":"Συναισθηματική ευαισθησία.",
                "Λέων":"Ηγέτης, θέλει δράση.",
                "Παρθένος":"Αναλυτικό μυαλό.",
                "Ζυγός":"Διπλωματία & ισορροπία.",
                "Σκορπιός":"Πάθος & μυστήριο.",
                "Τοξότης":"Περιπέτεια & ενθουσιασμός.",
                "Αιγόκερως":"Υπομονή & στόχοι.",
                "Υδροχόος":"Μοναδικότητα & καινοτομία.",
                "Ιχθείς":"Ενσυναίσθηση & φαντασία."
            };
            const zodiacMatch = zodiacMap[zodiac] || "Συνδυασμός με το ζώδιο σου.";

            return {
                personality: personality,
                openHand: open,
                zodiacMatch: zodiacMatch,
                zodiac: zodiac,
                stats: {
                    "Δείκτης/Μέσος": middleRatio.toFixed(2),
                    "Παράμεσος/Δείκτης": ringRatio.toFixed(2),
                    "Άνοιγμα παλάμης": thumbWidth.toFixed(3)
                },
                date: new Date().toISOString(),
                type: 'hand'
            };
        }

        // --- Analyze Upload (Object Detection) ---
        async function analyzeUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!objectModel) { alert("Το μοντέλο δεν φόρτωσε ακόμα."); return; }

            document.getElementById('loading').style.display = 'block';

            const img = document.getElementById('uploaded-img');
            img.src = URL.createObjectURL(file);
            img.style.display = 'block';

            await new Promise((resolve) => { img.onload = resolve; });

            // 1. Object Detection
            const predictions = await objectModel.detect(img);
            const top = predictions.length > 0 ? predictions[0] : null;
            const confidence = top ? (top.score * 100).toFixed(1) : 0;
            const objectType = top ? top.class : 'unknown';

            // 2. Color Analysis (για κόκκαλο)
            const colors = getAverageColor(img);
            let analysis = "";
            let details = "";

            // 3. Custom Object Reading
            if (objectType === 'person' || objectType === 'hand') {
                analysis = "🖐️ Αναγνώρισα χέρι ή άνθρωπο. Αν θέλεις ανάλυση χεριού, χρησιμοποίησε την κάμερα.";
                details = "Εμπιστοσύνη AI: " + confidence + "%";
            } else if (objectType === 'cup' || objectType === 'bottle') {
                analysis = "☕ Αναγνώρισα φλιτζάνι ή μπουκάλι. Μπορεί να έχει καφέ ή άλλο ρόφημα. Αν έχει κατακάθι, δείχνει ότι σκέφτεσαι κάποιον.";
                details = "Εμπιστοσύνη AI: " + confidence + "% | " + colors;
            } else if (objectType === 'bowl' || objectType === 'plate') {
                // Έλεγχος αν είναι κόκκαλο (λευκό/κρεμ)
                if (colors.includes('Λευκό') || colors.includes('Κρεμ')) {
                    analysis = "🦴 Αναγνώρισα πιθανό κόκκαλο! Ανάλυση: Το κόκκαλο δείχνει ότι έχεις γερό σκελετό, είσαι ανθεκτικός. Η θέση του δείχνει ότι θα αντιμετωπίσεις μια πρόκληση με επιτυχία.";
                    details = "Χρωματική ανάλυση: " + colors + " | Πιθανότητα κοκάλου: 80%";
                } else {
                    analysis = "🍽️ Αναγνώρισα σκεύος. Πιθανότατα περιέχει φαγητό. Αν είναι κόκκαλο, ήρθε η ώρα να τελειώσεις το πιάτο σου.";
                    details = "Εμπιστοσύνη AI: " + confidence + "% | " + colors;
                }
            } else if (objectType === 'knife' || objectType === 'scissors') {
                analysis = "🔪 Βλέπω ένα αιχμηρό αντικείμενο. Μπορεί να σημαίνει ότι πρόκειται να πάρεις μια τολμηρή απόφαση.";
                details = "Εμπιστοσύνη AI: " + confidence + "%";
            } else if (objectType === 'fork') {
                analysis = "🍴 Ένα πιρούνι. Δείχνει ότι είσαι έτοιμος να 'μαζέψεις' πληροφορίες ή να κάνεις μια σημαντική επιλογή.";
                details = "Εμπιστοσύνη AI: " + confidence + "%";
            } else {
                // Generic
                if (colors.includes('Λευκό') || colors.includes('Κρεμ')) {
                    analysis = "🦴 Βλέπω λευκό/κρεμ αντικείμενο. Πιθανό κόκκαλο. Ανάλυση: Το κόκκαλο δείχνει ότι έχεις γερό σκελετό, είσαι ανθεκτικός.";
                    details = "Χρωματική ανάλυση: " + colors + " | Αντικείμενο: " + objectType;
                } else {
                    analysis = "🔍 Αναγνώρισα: " + objectType + ". Αν δεν είναι κάτι γνωστό, μπορεί να είναι ένα σημάδι ότι πρέπει να προσέξεις λεπτομέρειες γύρω σου.";
                    details = "Εμπιστοσύνη AI: " + confidence + "% | " + colors;
                }
            }

            // Add zodiac for upload
            const zodiac = document.getElementById('zodiac').value;
            const zodiacMap = {
                "Κριός":"Παρορμητική φύση.",
                "Ταύρος":"Σταθερότητα.",
                "Δίδυμοι":"Ευελιξία.",
                "Καρκίνος":"Συναισθηματική ευαισθησία.",
                "Λέων":"Ηγέτης.",
                "Παρθένος":"Αναλυτικό μυαλό.",
                "Ζυγός":"Διπλωματία.",
                "Σκορπιός":"Πάθος.",
                "Τοξότης":"Περιπέτεια.",
                "Αιγόκερως":"Υπομονή.",
                "Υδροχόος":"Μοναδικότητα.",
                "Ιχθείς":"Ενσυναίσθηση."
            };
            const zodiacMatch = zodiacMap[zodiac] || "Συνδυασμός.";

            const result = {
                personality: analysis,
                openHand: details,
                zodiacMatch: "♈ " + zodiac + ": " + zodiacMatch,
                zodiac: zodiac,
                stats: {
                    "Αντικείμενο": objectType,
                    "Εμπιστοσύνη": confidence + "%",
                    "Χρώμα": colors
                },
                date: new Date().toISOString(),
                type: 'object'
            };

            displayResult(result, 'object');
            objectAnalysisResult = result;
            document.getElementById('loading').style.display = 'none';
        }

        // --- Display Result ---
        function displayResult(r, mode) {
            const area = document.getElementById('result-area');
            const text = document.getElementById('result-text');
            const grid = document.getElementById('stats-grid');
            const title = document.getElementById('result-title');

            if (r.error) {
                text.innerHTML = "⚠️ " + r.error;
                grid.innerHTML = "";
                title.innerText = "🔮 Ανάλυση";
                area.style.display = 'block';
                return;
            }

            if (mode === 'hand') {
                title.innerText = "🖐️ Ανάλυση Χεριού";
                text.innerHTML = `
                    <strong>♥️ Χαρακτήρας:</strong> ${r.personality}<br>
                    <strong>👐 Στάση:</strong> ${r.openHand}<br>
                    <hr style="border-color:#444;">
                    <strong>♈ ${r.zodiac}:</strong> ${r.zodiacMatch}
                `;
                grid.innerHTML = `
                    <div class="stat-item"><span class="badge">Δείκτης/Μέσος</span><br>${r.stats["Δείκτης/Μέσος"]}</div>
                    <div class="stat-item"><span class="badge">Παράμεσος/Δείκτης</span><br>${r.stats["Παράμεσος/Δείκτης"]}</div>
                    <div class="stat-item"><span class="badge">Άνοιγμα</span><br>${r.stats["Άνοιγμα παλάμης"]}</div>
                `;
            } else {
                title.innerText = "🔮 Ανάλυση Αντικειμένου";
                text.innerHTML = `

        // --- Helper: Color Analysis ---
        function getAverageColor(img) {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let r = 0, g = 0, b = 0, count = 0;
            for (let i = 0; i < data.length; i += 4) {
                r += data[i];
                g += data[i+1];
                b += data[i+2];
                count++;
            }
            r = Math.round(r / count);
            g = Math.round(g / count);
            b = Math.round(b / count);
            if (r > 200 && g > 200 && b > 200) return "Λευκό/Κρεμ (πιθανό κόκκαλο)";
            if (r > 150 && g > 150 && b > 150) return "Ανοιχτό γκρι/Μπεζ";
            if (r > 100 && g > 80 && b > 60) return "Καφέ (μαγειρεμένο κρέας)";
            return "Μικτές αποχρώσεις";
        }

        // --- History Management (localStorage) ---
        function saveToHistory() {
            const currentResult = analysisResult || objectAnalysisResult;
            if (!currentResult) { alert("Κάνε πρώτα ανάλυση!"); return; }
            
            let history = JSON.parse(localStorage.getItem('handHistory') || '[]');
            const entry = {
                id: Date.now(),
                ...currentResult,
                dateStr: new Date().toLocaleString('el-GR')
            };
            history.push(entry);
            localStorage.setItem('handHistory', JSON.stringify(history));
            alert("✅ Αποθηκεύτηκε στο ιστορικό!");
            renderHistory();
            document.getElementById('history-area').style.display = 'block';
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('handHistory') || '[]');
            
            if (history.length === 0) {
                list.innerHTML = "<p style='color:#888;'>Δεν υπάρχουν αποθηκευμένες αναλύσεις.</p>";
                return;
            }

            list.innerHTML = history.map((item, index) => `
                <div class="history-item">
                    <strong>#${index+1}</strong> <small>${item.dateStr}</small><br>
                    <strong>Ζώδιο:</strong> ${item.zodiac} &nbsp;|&nbsp; 
                    <strong>Τύπος:</strong> ${item.type === 'hand' ? '🖐️ Χέρι' : '🔍 Αντικείμενο'}<br>
                    <strong>Ανάλυση:</strong> ${item.personality ? item.personality.substring(0,80) + '...' : 'N/A'}<br>
                    <div class="history-actions">
                        <button onclick="deleteHistoryItem(${index})" style="background:#e74c3c;color:#fff;">Διαγραφή</button>
                        <button onclick="exportHistoryItemAsPDF(${index})" style="background:#3498db;color:#fff;">PDF</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('history-area').style.display = 'block';
        }

        function deleteHistoryItem(index) {
            let history = JSON.parse(localStorage.getItem('handHistory') || '[]');
            history.splice(index, 1);
            localStorage.setItem('handHistory', JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            if (confirm("Διαγραφή όλου του ιστορικού;")) {
                localStorage.removeItem('handHistory');
                renderHistory();
                alert("Ιστορικό διαγράφηκε.");
            }
        }

        // --- Sync with Firebase ---
        async function syncToFirebase() {
            try {
                if (typeof firebase === 'undefined') {
                    alert("⚠️ Το Firebase δεν έχει ρυθμιστεί. Προσθέστε τα δικά σας στοιχεία στο firebaseConfig.");
                    return;
                }
                const db = firebase.firestore();
                const history = JSON.parse(localStorage.getItem('handHistory') || '[]');
                for (const entry of history) {
                    await db.collection('handAnalyses').add(entry);
                }
                alert("✅ Συγχρονίστηκε με το Cloud!");
            } catch (e) {
                alert("Σφάλμα συγχρονισμού: " + e.message);
            }
        }

        // --- Reset ---
        function resetAll() {

            landmarksData = null;

        }

        // --- Drawing Helpers ---
        function drawConnectors(ctx, lm, conn, style) {
            ctx.strokeStyle = style.color || 'white';
            ctx.lineWidth = style.lineWidth || 2;
            for (const [i,j] of conn) {
                ctx.beginPath();
                ctx.moveTo(lm[i].x * overlay.width, lm[i].y * overlay.height);
                ctx.lineTo(lm[j].x * overlay.width, lm[j].y * overlay.height);
                ctx.stroke();
            }
        }
        function drawLandmarks(ctx, lm, style) {
            ctx.fillStyle = style.color || 'white';
            for (const p of lm) {
                ctx.beginPath();
                ctx.arc(p.x * overlay.width, p.y * overlay.height, style.radius || 3, 0, 2*Math.PI);
                ctx.fill();
            }
        }
        const HAND_CONNECTIONS = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],
            [0,17],[17,18],[18,19],[19,20],
            [5,9],[9,13],[13,17]
        ];

        window.onload = function() {
