<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Omen - Ανάλυση Καφέ</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; color: #fff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #FFD700; }
        #container { max-width: 700px; margin: 0 auto; }
        
        .upload-box { border: 2px dashed #FFD700; padding: 30px; border-radius: 20px; margin: 20px 0; cursor: pointer; background: #1a1a1a; }
        .upload-box:hover { background: #222; }
        #file-input { display: none; }
        
        #original-image { max-width: 100%; max-height: 400px; border-radius: 10px; margin: 10px 0; display: none; border: 2px solid #444; }
        #processed-image { max-width: 100%; max-height: 400px; border-radius: 10px; margin: 10px 0; display: none; border: 2px solid #FFD700; }
        
        #analysis-result { display: none; background: #1a1a1a; border-radius: 20px; padding: 20px; margin-top: 20px; border-left: 5px solid #FFD700; text-align: left; }
        
        .shape-item { display: inline-block; background: #333; padding: 5px 15px; border-radius: 15px; margin: 5px; border: 1px solid #FFD700; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; font-size: 14px; cursor: pointer; background: #FFD700; color: #111; margin: 10px; }
        .btn:hover { transform: scale(1.05); }
        
        .loading { display: none; color: #FFD700; margin: 15px; font-size: 18px; }
        
        #debug-info { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>☕ Omen - Ανάγνωση Φλιτζανιού</h1>
        <p style="color:#aaa;">Ανέβασε φωτογραφία και θα αναλύσω τα σχέδια του καφέ</p>

        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 48px;">☕</div>
            <p>Πάτησε εδώ ή σύρε φωτογραφία</p>
            <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)">
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
            <img id="original-image" alt="Φωτογραφία φλιτζανιού">
            <img id="processed-image" alt="Ανίχνευση σχημάτων">
        </div>

        <div class="loading" id="loading">⏳ Αναλύω τα σχέδια του καφέ...</div>

        <div id="analysis-result">
            <h2>🔮 Ανίχνευση Σχημάτων</h2>
            <div id="shapes-found"></div>
            <div id="interpretation" style="margin-top: 20px; font-size: 18px; line-height: 1.6;"></div>
            <div id="position-analysis" style="margin-top: 15px; color: #aaa;"></div>
            
            <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn" onclick="exportReport()">📄 Αποθήκευση</button>
            </div>
        </div>

        <div id="debug-info"></div>
    </div>

    <!-- Canvas για επεξεργασία -->
    <canvas id="process-canvas" style="display:none;"></canvas>

    <script>
        let originalImage = null;
        let detectedShapes = [];

        // ------------------- ΑΝΙΧΝΕΥΣΗ ΣΧΗΜΑΤΩΝ -------------------
        function detectShapes(imageData, width, height) {
            const data = imageData.data;
            
            // 1. Μετατροπή σε Grayscale
            let gray = [];
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                const grayValue = 0.299 * r + 0.587 * g + 0.114 * b;
                gray.push(grayValue);
            }

            // 2. Εφαρμογή Canny Edge Detection (απλοποιημένο)
            // Θα χρησιμοποιήσουμε threshold για να βρούμε edges
            const threshold = 60;
            let edges = [];
            for (let i = 0; i < gray.length; i++) {
                // Απλό edge detection: φωτεινότητα vs γειτονικών
                const x = i % width;
                const y = Math.floor(i / width);
                
                if (x > 0 && x < width-1 && y > 0 && y < height-1) {
                    const top = gray[i - width];
                    const bottom = gray[i + width];
                    const left = gray[i - 1];
                    const right = gray[i + 1];
                    
                    const dx = Math.abs(right - left);
                    const dy = Math.abs(bottom - top);
                    const gradient = Math.sqrt(dx*dx + dy*dy);
                    
                    edges.push(gradient > threshold ? 255 : 0);
                } else {
                    edges.push(0);
                }
            }

            // 3. Συλλογή σημείων για σχήματα (απλή ομαδοποίηση)
            // Θα ομαδοποιήσουμε τα pixels που είναι κοντά
            let clusters = [];
            let visited = new Array(edges.length).fill(false);
            
            function getNeighbors(index) {
                const x = index % width;
                const y = Math.floor(index / width);
                const neighbors = [];
                const dirs = [-1, 1, -width, width, -width-1, -width+1, width-1, width+1];
                for (let d of dirs) {
                    const ni = index + d;
                    if (ni >= 0 && ni < edges.length) {
                        const nx = ni % width;
                        const ny = Math.floor(ni / width);
                        if (Math.abs(nx - x) <= 1 && Math.abs(ny - y) <= 1) {
                            neighbors.push(ni);
                        }
                    }
                }
                return neighbors;
            }

            for (let i = 0; i < edges.length; i++) {
                if (edges[i] > 128 && !visited[i]) {
                    // BFS για ομαδοποίηση
                    let cluster = [];
                    let queue = [i];
                    visited[i] = true;
                    
                    while (queue.length > 0) {
                        const current = queue.shift();
                        cluster.push(current);
                        const neighbors = getNeighbors(current);
                        for (let n of neighbors) {
                            if (edges[n] > 128 && !visited[n]) {
                                visited[n] = true;
                                queue.push(n);
                            }
                        }
                    }
                    
                    // Αν το cluster είναι αρκετά μεγάλο (πάνω από 20 pixels)
                    if (cluster.length > 20) {
                        // Υπολογισμός bounding box
                        let minX = width, maxX = 0, minY = height, maxY = 0;
                        for (let idx of cluster) {
                            const x = idx % width;
                            const y = Math.floor(idx / width);
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                        }
                        
                        const boxWidth = maxX - minX;
                        const boxHeight = maxY - minY;
                        const aspectRatio = boxWidth / boxHeight;
                        
                        // Κατηγοριοποίηση σχήματος
                        let shapeType = "Σύνθετο Σχήμα";
                        
                        // Αν το πλάτος και ύψος είναι παρόμοια, είναι κύκλος ή τετράγωνο
                        if (Math.abs(aspectRatio - 1) < 0.2) {
                            if (boxWidth > 30 && boxHeight > 30) {
                                shapeType = "Κύκλος";
                            } else {
                                shapeType = "Τετράγωνο";
                            }
                        } 
                        // Αν είναι πολύ πιο μακρύ, είναι γραμμή
                        else if (aspectRatio > 2 || aspectRatio < 0.5) {
                            shapeType = "Γραμμή (Ευθεία)";
                        }
                        // Τρίγωνο: συνήθως έχει aspect ratio κοντά στο 1 αλλά με λιγότερα pixels
                        else if (boxWidth > 15 && boxHeight > 15 && cluster.length < 100) {
                            shapeType = "Τρίγωνο";
                        }
                        
                        // Θέση σχήματος
                        const centerX = (minX + maxX) / 2;
                        const centerY = (minY + maxY) / 2;
                        let position = "";
                        if (centerY < height/3) position = "Πάνω μέρος";
                        else if (centerY > 2*height/3) position = "Κάτω μέρος";
                        else if (centerX < width/3) position = "Αριστερό ημισφαίριο";
                        else if (centerX > 2*width/3) position = "Δεξί ημισφαίριο";
                        else position = "Κέντρο";
                        
                        clusters.push({
                            type: shapeType,
                            count: cluster.length,
                            position: position,
                            centerX: centerX,
                            centerY: centerY,
                            width: boxWidth,
                            height: boxHeight
                        });
                    }
                }
            }

            return clusters;
        }

        // ------------------- ΒΑΣΗ ΕΡΜΗΝΕΙΩΝ -------------------
        const interpretations = {
            "Κύκλος": "Καλά νέα! Χρήματα, φίλοι, και μεγάλη επιτυχία.",
            "Τετράγωνο": "Αφορά την ερωτική και αισθηματική σας ζωή. Νέες γνωριμίες.",
            "Τρίγωνο": "Τύχη στα οικονομικά. Καλές επενδύσεις.",
            "Γραμμή (Ευθεία)": "Δρόμος, ταξίδι, ή γεγονός με ευχάριστο τέλος.",
            "Σύνθετο Σχήμα": "Πολύπλοκη κατάσταση που θα ξεκαθαρίσει σύντομα."
        };

        function analyzeImage(imageSrc) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('process-canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // Ανίχνευση σχημάτων
                const shapes = detectShapes(imageData, canvas.width, canvas.height);
                detectedShapes = shapes;
                
                // Εμφάνιση των σχημάτων στην επεξεργασμένη εικόνα
                const processedCanvas = document.createElement('canvas');
                processedCanvas.width = canvas.width;
                processedCanvas.height = canvas.height;
                const pCtx = processedCanvas.getContext('2d');
                pCtx.drawImage(canvas, 0, 0);
                pCtx.strokeStyle = '#FFD700';
                pCtx.lineWidth = 3;
                
                // Ζωγραφίζουμε bounding boxes γύρω από τα σχήματα που βρήκαμε
                for (let shape of shapes) {
                    // Υπολογισμός bounding box (προσεγγιστικά)
                    const x = shape.centerX - shape.width/2;
                    const y = shape.centerY - shape.height/2;
                    pCtx.strokeRect(x, y, shape.width, shape.height);
                    
                    // Ετικέτα
                    pCtx.fillStyle = '#FFD700';
                    pCtx.font = '16px Arial';
                    pCtx.fillText(shape.type, x, y - 5);
                }
                
                const processedImg = document.getElementById('processed-image');
                processedImg.src = processedCanvas.toDataURL();
                processedImg.style.display = 'block';
                
                // Εμφάνιση αποτελεσμάτων
                displayResults(shapes);
            };
            img.src = imageSrc;
        }

        function displayResults(shapes) {
            const resultDiv = document.getElementById('analysis-result');
            resultDiv.style.display = 'block';
            
            const shapesDiv = document.getElementById('shapes-found');
            const interpretDiv = document.getElementById('interpretation');
            const positionDiv = document.getElementById('position-analysis');
            
            if (shapes.length === 0) {
                shapesDiv.innerHTML = "<p>Δεν εντοπίστηκαν σχήματα. Ο καφές είναι καθαρός ή η φωτογραφία είναι θολή.</p>";
                interpretDiv.innerHTML = "Ηρεμία και γαλήνη. Δεν φαίνονται σημάδια, είναι μια περίοδος ηρεμίας.";
                positionDiv.innerHTML = "";
                return;
            }
            
            // Εμφάνιση σχημάτων
            let html = "<h3>🔍 Σχήματα που εντοπίστηκαν:</h3>";
            for (let i = 0; i < shapes.length; i++) {
                const s = shapes[i];
                html += `<div class="shape-item">${s.type} (${s.position})</div>`;
            }
            shapesDiv.innerHTML = html;
            
            // Ερμηνεία
            let mainInterpretation = "";
            let positionsSummary = "";
            
            // Αν υπάρχουν πολλαπλά σχήματα, δίνουμε σύνθετη ερμηνεία
            if (shapes.length === 1) {
                const shape = shapes[0];
                mainInterpretation = interpretations[shape.type] || "Ένα ενδιαφέρον σημάδι, δώστε προσοχή.";
                positionsSummary = `Βρίσκεται στο <strong>${shape.position}</strong>.`;
            } else {
                mainInterpretation = "Πολλά σχήματα μαζί σημαίνουν ότι η ζωή σας είναι γεμάτη γεγονότα. ";
                const types = shapes.map(s => s.type);
                if (types.includes("Κύκλος") && types.includes("Τετράγωνο")) {
                    mainInterpretation += "Συνδυασμός χρημάτων και ερωτικής τύχης. Θα έχετε επιτυχίες και στους δύο τομείς.";
                } else if (types.includes("Τρίγωνο") && types.includes("Γραμμή (Ευθεία)")) {
                    mainInterpretation += "Οικονομική τύχη και ταξίδια. Μια πολύ καλή περίοδος ξεκινά.";
                } else {
                    mainInterpretation += "Μια περίοδος γεμάτη προκλήσεις, αλλά και ευκαιρίες.";
                }
            }
            
            interpretDiv.innerHTML = `<strong>📖 Ερμηνεία:</strong><br>${mainInterpretation}`;
            
            // Ανάλυση θέσεων
            let posHtml = "<strong>📍 Ανάλυση θέσεων:</strong><br>";
            for (let s of shapes) {
                posHtml += `${s.type} στο <strong>${s.position}</strong>.<br>`;
            }
            positionDiv.innerHTML = posHtml;
        }

        // ------------------- ΔΙΑΧΕΙΡΙΣΗ UPLOAD -------------------
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            document.getElementById('loading').style.display = 'block';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageSrc = e.target.result;
                
                const originalImg = document.getElementById('original-image');
                originalImg.src = imageSrc;
                originalImg.style.display = 'block';
                
                // Ανάλυση εικόνας
                setTimeout(() => {
                    analyzeImage(imageSrc);
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            };
            reader.readAsDataURL(file);
        }

        // ------------------- EXPORT REPORT -------------------
        function exportReport() {
            if (detectedShapes.length === 0) {
                alert("Δεν υπάρχουν σχήματα για εξαγωγή.");
                return;
            }
            
            let report = "☕ Omen - Αναφορά Ανάγνωσης Φλιτζανιού\n\n";
            report += "Σχήματα που εντοπίστηκαν:\n";
            for (let i = 0; i < detectedShapes.length; i++) {
                const s = detectedShapes[i];
                report += `- ${s.type} (${s.position})\n`;
            }
            report += "\nΕρμηνεία:\n";
            report += interpretations[detectedShapes[0].type] || "Σύνθετη ερμηνεία.";
            
            // Δημιουργία PDF
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Omen_Report_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
