<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Omen - Καφεμαντεία AI</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #FFD700; }
        #container { max-width: 700px; margin: 0 auto; }
        
        .upload-box { border: 2px dashed #FFD700; padding: 30px; border-radius: 20px; margin: 20px 0; cursor: pointer; background: #1a1a1a; }
        #file-input { display: none; }
        #preview { max-width: 100%; max-height: 400px; border-radius: 10px; margin: 10px 0; display: none; }
        #loading { display: none; color: #FFD700; margin: 15px; }
        #result { display: none; background: #1a1a1a; border-radius: 20px; padding: 20px; margin-top: 20px; border-left: 5px solid #FFD700; text-align: left; }
        
        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 10px 0; }
        .btn { padding: 12px 24px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; background: #FFD700; color: #111; }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; }
        
        #camera-wrapper { position: relative; width: 100%; max-width: 500px; margin: 10px auto; border-radius: 20px; overflow: hidden; border: 3px solid #FFD700; background: #111; display: none; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        
        .badge { background: #FFD700; color: #111; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-item { background: #222; padding: 8px 12px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="container">
        <h1>☕ Omen</h1>
        <p style="color:#aaa;">Καφεμαντεία με AI - Πολίτικο Φλιτζάνι</p>

        <div class="controls">
            <button class="btn" onclick="startCamera()">📷 Κάμερα</button>
            <button class="btn" onclick="capturePhoto()" id="captureBtn" disabled>📸 Λήψη</button>
        </div>

        <div id="camera-wrapper">
            <video id="webcam" playsinline></video>
        </div>

        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 48px;">☕</div>
            <p>Πάτησε εδώ ή σύρε φωτογραφία</p>
            <input type="file" id="file-input" accept="image/*" onchange="handleUpload(event)">
        </div>

        <img id="preview" alt="Φωτογραφία φλιτζανιού">
        <div id="loading">⏳ Αναλύω τον καφέ με AI...</div>

        <div id="result">
            <h2>🔮 Ανάλυση</h2>
            <div id="symbol-display"></div>
            <div id="interpretation-display"></div>
            <div id="position-display"></div>
            <div class="stat-grid" id="stats-grid"></div>
        </div>
    </div>

    <script>
        // --- Ρύθμιση API ---
        const API_URL = "https://coffee-oracle-api--franklymadear.replit.app/analyze"; // Το endpoint σου!

        // --- Κάμερα ---
        const video = document.getElementById('webcam');
        let cameraStream = null;
        let capturedImage = null;

        async function startCamera() {
            const wrapper = document.getElementById('camera-wrapper');
            if (wrapper.style.display === 'block') {
                stopCamera();
                return;
            }
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = cameraStream;
                wrapper.style.display = 'block';
                document.getElementById('captureBtn').disabled = false;
            } catch (err) {
                alert("Δεν μπόρεσε να ανοίξει η κάμερα: " + err.message);
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
            }
            document.getElementById('camera-wrapper').style.display = 'none';
            document.getElementById('captureBtn').disabled = true;
        }

        function capturePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg');
            document.getElementById('preview').src = dataUrl;
            document.getElementById('preview').style.display = 'block';
            capturedImage = dataUrl;
            stopCamera();
            analyzeImage(dataUrl);
        }

        // --- Upload ---
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                document.getElementById('preview').src = dataUrl;
                document.getElementById('preview').style.display = 'block';
                capturedImage = dataUrl;
                analyzeImage(dataUrl);
            };
            reader.readAsDataURL(file);
        }

        // --- Ανάλυση (Σύνδεση με το API σου) ---
        async function analyzeImage(base64Image) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });

                if (!response.ok) {
                    throw new Error("Το API επέστρεψε σφάλμα: " + response.status);
                }

                const data = await response.json();
                
                if (data.success) {
                    displayResult(data);
                } else {
                    document.getElementById('result').innerHTML = `<p style="color:#e74c3c;">❌ Σφάλμα: ${data.error}</p>`;
                    document.getElementById('result').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `<p style="color:#e74c3c;">❌ Σφάλμα σύνδεσης: ${error.message}</p>`;
                document.getElementById('result').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // --- Εμφάνιση Αποτελέσματος ---
        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            document.getElementById('symbol-display').innerHTML = `<strong>🔮 Σύμβολο:</strong> ${data.symbol}`;
            document.getElementById('interpretation-display').innerHTML = `<strong>📖 Ερμηνεία:</strong> ${data.interpretation}`;
            document.getElementById('position-display').innerHTML = `<strong>📍 Θέση:</strong> ${data.position}`;

            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-item"><span class="badge">Σύμβολο</span><br>${data.symbol}</div>
                <div class="stat-item"><span class="badge">Θέση</span><br>${data.position}</div>
            `;
        }
    </script>
</body>
</html>
