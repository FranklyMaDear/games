<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connect Four - Galactic Edition</title>
    <meta name="theme-color" content="#0a0e27">

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3186700611266549"
        crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: #000010;
            position: relative;
            touch-action: manipulation;
        }

        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .shooting-star {
            position: fixed; width: 3px; height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0));
            border-radius: 50%; z-index: 1; pointer-events: none;
            animation: shoot linear forwards; transform-origin: top center;
        }
        @keyframes shoot {
            0%   { opacity: 1; transform: translate(0,0) rotate(-35deg); }
            70%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-400px,600px) rotate(-35deg); }
        }
        .nebula-particle {
            position: fixed; border-radius: 50%; z-index: 0; pointer-events: none;
            animation: nebulaFloat linear infinite; filter: blur(2px);
        }
        @keyframes nebulaFloat {
            0%   { transform: translate(0,0) scale(1); opacity: 0.6; }
            50%  { transform: translate(30px,-40px) scale(1.5); opacity: 0.2; }
            100% { transform: translate(-20px,20px) scale(1); opacity: 0.6; }
        }

        /* ── AD BANNERS ── */
        .ad-banner {
            width: 100%; max-width: 728px; min-height: 90px;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto; position: relative; z-index: 50; padding: 4px 0;
        }
        .ad-banner ins { display: block; width: 100%; }
        .ad-top    { padding-top: 8px; }
        .ad-bottom { padding-bottom: 8px; }

        /* ── GAME WRAPPER ── */
        .game-wrapper {
            display: flex; width: 100%;
            justify-content: center; align-items: center;
            padding: 6px 10px; position: relative; z-index: 50; flex: 1;
        }
        .game-container {
            text-align: center; background: rgba(20,20,35,0.9);
            border-radius: 20px; padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            width: 100%; max-width: 500px; margin: 4px;
            border: 2px solid rgba(132,204,22,0.3); backdrop-filter: blur(8px);
        }

        h1 {
            color: #84cc16; margin-bottom: 15px; font-size: 2rem;
            font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(132,204,22,0.5);
        }

        .players-info {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px; padding: 0 5px; gap: 5px;
        }
        .player {
            display: flex; flex-direction: column;
            align-items: center; gap: 6px; flex: 1; min-width: 80px;
        }
        .player-disc {
            width: 35px; height: 35px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }
        .player-disc.red    { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b); }
        .player-disc.yellow { background: radial-gradient(circle at 30% 30%, #ffd93d, #f39c12); }
        .player span { font-size: 0.9rem; font-weight: bold; color: #e8e8ed; }
        .player.active span { color: #84cc16; font-weight: 800; }
        .player.active .player-disc { transform: scale(1.15); }

        .scores { flex: 1; display: flex; justify-content: center; align-items: center; }
        .scores .score {
            font-size: 1.6rem; font-weight: bold; color: #e8e8ed;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px; border-radius: 20px; min-width: 80px;
            border: 1px solid rgba(132,204,22,0.2);
        }

        /* ── BOARD ── */
        .board-container {
            background: linear-gradient(145deg, #1976d2, #1565c0);
            padding: 15px; border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 6px 15px rgba(0,0,0,0.4);
            margin: 15px 0; position: relative;
            width: 100%; aspect-ratio: 7/6;
            border: 3px solid #0d47a1; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 6px; position: relative; z-index: 1;
            height: 95%; width: 95%; padding: 4px;
        }

        /* ── SLOT: relative so canvas sits inside ── */
        .slot {
            background: #000028; border-radius: 50%;
            cursor: pointer; position: relative;
            transition: background 0.2s ease, transform 0.2s ease;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.8), inset 0 -2px 4px rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .slot:hover, .slot:active { background: #00003a; transform: scale(1.05); }

        /* Galaxy canvas inside each empty slot */
        .slot-galaxy {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.3s ease;
        }
        .slot-galaxy.hidden { opacity: 0; }

        .disc {
            width: 85%; height: 85%; border-radius: 50%;
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.5),
                        inset 0 2px 4px rgba(255,255,255,0.3),
                        0 3px 6px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.4);
            position: relative; z-index: 2; opacity: 0;
        }
        .disc::before {
            content: ''; position: absolute;
            top: 15%; left: 15%; right: 15%; bottom: 15%;
            background: rgba(255,255,255,0.25);
            border-radius: 50%; filter: blur(1px); z-index: 3;
        }
        .disc.red    { background: radial-gradient(circle at 35% 35%, #ff5252, #c62828); opacity: 1; }
        .disc.yellow { background: radial-gradient(circle at 35% 35%, #ffeb3b, #f9a825); opacity: 1; }
        .disc.winner { animation: discPulse 1s infinite; }

        @keyframes discDrop {
            0%   { transform: translateY(-500px); opacity: 0; }
            60%  { transform: translateY(20px);   opacity: 1; }
            80%  { transform: translateY(-8px);   opacity: 1; }
            100% { transform: translateY(0);      opacity: 1; }
        }
        @keyframes discPulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .status {
            margin: 15px 0; font-size: 1.1rem; font-weight: 700;
            color: #e8e8ed; min-height: 25px; padding: 12px;
            background: rgba(255,255,255,0.05); border-radius: 10px;
            border: 1px solid rgba(132,204,22,0.2); text-align: center;
        }

        .game-buttons {
            display: flex; justify-content: center;
            align-items: center; gap: 10px;
            margin-top: 15px; padding: 0 5px; flex-wrap: wrap;
        }
        .game-btn {
            background: linear-gradient(135deg, #ff4081, #c51162);
            border: 2px solid #ff69b4; color: white;
            padding: 12px 20px; font-size: 0.9rem;
            border-radius: 40px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 0 #880e4f, 0 6px 12px rgba(0,0,0,0.4);
            font-family: inherit; font-weight: 700;
            flex: 1; min-width: 120px; max-width: 160px;
        }
        .game-btn:active  { transform: translateY(3px); box-shadow: 0 1px 0 #880e4f; }
        .game-btn:disabled { opacity: 0.5; pointer-events: none; }
        .game-btn.new-game {
            background: linear-gradient(135deg, #84cc16, #65a30d);
            border: 2px solid #a3e635;
            box-shadow: 0 4px 0 #4d7c0f, 0 6px 12px rgba(0,0,0,0.4);
        }
        .game-btn.small-btn {
            background: linear-gradient(135deg, #f39c12, #d35400);
            border: 2px solid #f1c40f;
            box-shadow: 0 4px 0 #b9770e, 0 6px 12px rgba(0,0,0,0.4);
            font-size: 0.75rem; padding: 8px 12px; min-width: 80px; max-width: 120px;
        }

        .diff-section { margin-top: 12px; }
        .diff-label {
            font-size: 0.7rem; color: #84cc16;
            letter-spacing: 2px; font-weight: 700;
            margin-bottom: 8px; text-transform: uppercase;
        }
        .diff-buttons { display: flex; gap: 8px; justify-content: center; }
        .diff-btn {
            flex: 1; max-width: 110px; padding: 10px 6px; font-size: 0.78rem;
            border-radius: 30px; border: 2px solid; cursor: pointer;
            font-family: inherit; font-weight: 700; transition: all 0.2s ease; opacity: 0.5;
        }
        .diff-btn:active { transform: translateY(2px); }
        .diff-btn.active { opacity: 1; transform: scale(1.06); }
        .diff-easy   { background: linear-gradient(135deg, #26c6da, #0097a7); border-color: #80deea; box-shadow: 0 3px 0 #006064; color: #fff; }
        .diff-medium { background: linear-gradient(135deg, #ffa726, #f57c00); border-color: #ffcc80; box-shadow: 0 3px 0 #e65100; color: #fff; }
        .diff-hard   { background: linear-gradient(135deg, #ef5350, #b71c1c); border-color: #ef9a9a; box-shadow: 0 3px 0 #7f0000; color: #fff; }

        .ai-thinking { color: #fbbf24; font-weight: bold; }

        @keyframes confettiFall {
            0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: fixed; width: 6px; height: 6px; top: -10px;
            animation: confettiFall 3s linear forwards; z-index: 200; border-radius: 50%;
        }
        .confetti:nth-child(1n){ background: #e74c3c; }
        .confetti:nth-child(2n){ background: #f1c40f; }
        .confetti:nth-child(3n){ background: #2ecc71; }
        .confetti:nth-child(4n){ background: #3498db; }
        .confetti:nth-child(5n){ background: #9b59b6; }

        /* ── SCOREBOARD MODAL ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); z-index: 500;
            justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #0e1027; border: 2px solid rgba(132,204,22,0.4);
            border-radius: 20px; padding: 24px 20px 20px;
            width: 92%; max-width: 420px; max-height: 80vh;
            overflow-y: auto; position: relative;
            box-shadow: 0 0 40px rgba(132,204,22,0.15);
        }
        .modal-title {
            color: #84cc16; font-size: 1.2rem; font-weight: 800;
            letter-spacing: 2px; text-align: center;
            margin-bottom: 16px; text-shadow: 0 0 12px rgba(132,204,22,0.5);
        }
        .score-tabs { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
        .score-tab {
            flex: 1; max-width: 120px; padding: 7px 4px; font-size: 0.72rem;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer; font-family: inherit; font-weight: 700;
            color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); transition: all 0.2s;
        }
        .score-tab.active { color: #fff; border-color: rgba(132,204,22,0.6); background: rgba(132,204,22,0.15); }
        .score-tab:hover  { background: rgba(255,255,255,0.1); }
        .score-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .score-table th {
            color: #84cc16; font-weight: 700; padding: 6px 8px;
            border-bottom: 1px solid rgba(132,204,22,0.25);
            text-align: center; font-size: 0.7rem; letter-spacing: 1px;
        }
        .score-table td {
            color: #e8e8ed; padding: 7px 8px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .score-table tr:last-child td { border-bottom: none; }
        .score-table .today-row td { color: #84cc16; font-weight: 700; }
        .score-table .win  { color: #4ade80; font-weight: 700; }
        .score-table .loss { color: #f87171; font-weight: 700; }
        .no-history { color: rgba(255,255,255,0.35); font-size: 0.75rem; padding: 16px; text-align: center; }
        .modal-back-btn {
            display: block; width: 100%; margin-top: 18px; padding: 12px;
            background: linear-gradient(135deg, #84cc16, #65a30d);
            border: none; border-radius: 30px; color: #fff;
            font-size: 0.95rem; font-weight: 800; font-family: inherit;
            cursor: pointer; box-shadow: 0 4px 0 #4d7c0f; transition: all 0.2s; letter-spacing: 1px;
        }
        .modal-back-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4d7c0f; }

        /* ── AD MODAL (post-game) ── */
        .ad-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,10,0.88); z-index: 600;
            justify-content: center; align-items: center;
            backdrop-filter: blur(6px);
            flex-direction: column;
            gap: 0;
        }
        .ad-modal-overlay.open { display: flex; }
        .ad-modal-box {
            background: #0a0e27;
            border: 2px solid rgba(132,204,22,0.35);
            border-radius: 22px;
            padding: 22px 18px 18px;
            width: 94%; max-width: 460px;
            box-shadow: 0 0 50px rgba(132,204,22,0.1), 0 20px 60px rgba(0,0,0,0.6);
            position: relative;
            text-align: center;
        }
        .ad-modal-result {
            font-size: 2rem; margin-bottom: 4px;
        }
        .ad-modal-subtitle {
            color: rgba(255,255,255,0.5); font-size: 0.78rem;
            letter-spacing: 1px; margin-bottom: 14px; text-transform: uppercase;
        }
        .ad-modal-ad-wrap {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 14px;
            min-height: 120px;
            display: flex; align-items: center; justify-content: center;
        }
        .ad-modal-buttons {
            display: flex; gap: 10px; justify-content: center;
        }
        .ad-modal-btn {
            flex: 1; max-width: 180px; padding: 13px 10px;
            border-radius: 35px; border: none; cursor: pointer;
            font-family: inherit; font-weight: 800; font-size: 0.9rem;
            transition: all 0.2s ease; letter-spacing: 0.5px;
        }
        .ad-modal-btn.play-again {
            background: linear-gradient(135deg, #84cc16, #65a30d);
            color: #fff; box-shadow: 0 4px 0 #4d7c0f;
        }
        .ad-modal-btn.play-again:active { transform: translateY(3px); box-shadow: 0 1px 0 #4d7c0f; }
        .ad-modal-btn.new-game-btn {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff; box-shadow: 0 4px 0 #1e3a8a;
        }
        .ad-modal-btn.new-game-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1e3a8a; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .game-container { padding: 15px 10px; margin: 3px; max-width: 95vw; }
            h1 { font-size: 1.6rem; }
            .board { gap: 5px; height: 92%; width: 92%; }
            .player-disc { width: 30px; height: 30px; }
            .scores .score { font-size: 1.3rem; padding: 6px 12px; }
            .game-btn { padding: 10px 15px; font-size: 0.85rem; }
            .ad-banner { min-height: 60px; }
        }
        @media (max-width: 480px) {
            .game-buttons { gap: 8px; }
            .game-btn { min-width: 100px; max-width: 130px; padding: 10px 12px; font-size: 0.8rem; }
            .ad-modal-btn { font-size: 0.82rem; padding: 11px 8px; }
        }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<!-- ▸ TOP AD -->
<div class="ad-banner ad-top">
    <ins class="adsbygoogle"
         style="display:block; width:100%; min-height:60px;"
         data-ad-client="ca-pub-3186700611266549"
         data-ad-slot="6826169932"
         data-ad-format="autorelaxed"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- ▸ GAME -->
<div class="game-wrapper">
  <div class="game-container">
    <h1>🪐 CONNECT FOUR</h1>

    <div class="players-info">
      <div class="player" id="player1">
        <div class="player-disc red"></div>
        <span>Εσύ</span>
      </div>
      <div class="scores">
        <div class="score" id="scoreDisplay">0 - 0</div>

        <div class="player-disc yellow"></div>

      </div>

    <div class="board-container">

    </div>

    <div class="status" id="status">Η σειρά σου</div>

    <div class="game-buttons">
      <button class="game-btn"          id="restartBtn">↺ Επανεκκίνηση</button>

      </div>
    </div>
  </div>
</div>

<!-- ▸ BOTTOM AD -->
<div class="ad-banner ad-bottom">
    <ins class="adsbygoogle"
         style="display:block; width:100%; min-height:60px;"
         data-ad-client="ca-pub-3186700611266549"
         data-ad-slot="6826169932"
         data-ad-format="autorelaxed"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- ▸ SCOREBOARD MODAL -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal-box">
    <div class="modal-title">🏆 Ιστορικό Σκορ</div>
    <div class="score-tabs">
      <button class="score-tab" id="tabEasy">😊 Εύκολο</button>
      <button class="score-tab" id="tabMedium">😐 Μέτριο</button>
      <button class="score-tab active" id="tabHard">💀 Πολύ Δύσκολο</button>

    <div id="scoreboardContent"></div>

<div class="ad-modal-overlay" id="adModal">
  <div class="ad-modal-box">
    <div class="ad-modal-result" id="adModalResult">🎉</div>
    <div class="ad-modal-subtitle">Επόμενη κίνηση;</div>
    <div class="ad-modal-ad-wrap" id="adModalAdWrap">
      <!-- Fresh AdSense ins injected here dynamically -->
    </div>
    <div class="ad-modal-buttons">
      <button class="ad-modal-btn play-again"   id="adModalPlayAgain">↺ Ξανά</button>
      <button class="ad-modal-btn new-game-btn" id="adModalNewGame">⊕ Νέο Παιχνίδι</button>
    </div>
  </div>
</div>

<script>
(function () {

    // ════════════════════════════════════════
    // STARFIELD BACKGROUND
    // ════════════════════════════════════════
    const canvas = document.getElementById('starCanvas');
    const ctx    = canvas.getContext('2d');
    let stars    = [];

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    function createStars(count) {
        stars = [];
        for (let i = 0; i < count; i++) stars.push({
            x: Math.random() * canvas.width,  y: Math.random() * canvas.height,
            radius: Math.random() * 2.5 + 0.5,
            baseBrightness: Math.random() * 0.7 + 0.3,
            twinkleSpeed:   Math.random() * 0.02 + 0.005,
            twinkleOffset:  Math.random() * Math.PI * 2,
            driftX: (Math.random() - 0.5) * 0.3, driftY: (Math.random() - 0.5) * 0.3
        });
    }

    function drawStars(ts) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            const twinkle = Math.sin(ts * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
            const alpha   = s.baseBrightness * twinkle;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
            if (s.radius > 1.5) {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.radius * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180,200,255,${alpha * 0.3})`; ctx.fill();
            }
            s.x += s.driftX; s.y += s.driftY;
            if (s.x < 0) s.x = canvas.width;  if (s.x > canvas.width)  s.x = 0;
            if (s.y < 0) s.y = canvas.height;  if (s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(drawStars);
    }

    function createShootingStar() {
        const star = document.createElement('div');
        star.classList.add('shooting-star');
        star.style.left = Math.random() * 80 + '%';
        star.style.top  = Math.random() * 40 + '%';
        star.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
        document.body.appendChild(star);
        star.addEventListener('animationend', () => star.remove());
    }
    function scheduleShootingStar() {

    // ════════════════════════════════════════
    // GALAXY SLOT STARS — mini canvas per slot
    // ════════════════════════════════════════
    const SLOT_STAR_COUNT = 9;   // stars per hole
    const SLOT_COLORS = [
        '#ffffff', '#e8eeff', '#c8d8ff',  // white / blue-white
        '#ffe8a0', '#ffd060',             // warm yellow
        '#80c0ff', '#a0e0ff',             // cold blue
        '#ffaaff', '#cc88ff'              // pink / violet
    ];

    function createSlotGalaxy(slot) {
        const cvs = document.createElement('canvas');
        cvs.classList.add('slot-galaxy');
        slot.insertBefore(cvs, slot.firstChild);

        // stars local to this canvas
        const starsData = [];
        function seedStars(w, h) {
            starsData.length = 0;
            for (let i = 0; i < SLOT_STAR_COUNT; i++) {
                // keep inside circle (radius 0.42 of canvas size)
                const angle  = Math.random() * Math.PI * 2;
                const dist   = Math.random() * 0.40;
                starsData.push({
                    cx: 0.5 + dist * Math.cos(angle),
                    cy: 0.5 + dist * Math.sin(angle),
                    r:  Math.random() * 1.2 + 0.4,
                    color: SLOT_COLORS[Math.floor(Math.random() * SLOT_COLORS.length)],
                    speed:  Math.random() * 0.015 + 0.005,
                    phase:  Math.random() * Math.PI * 2,
                    // slow drift
                    driftAngle: Math.random() * Math.PI * 2,
                    driftSpeed: Math.random() * 0.0003 + 0.0001,
                    driftRadius: Math.random() * 0.06 + 0.02
                });
            }
        }

        let w = 0, h = 0;
        let animId = null;
        let ts = 0;
        let destroyed = false;

        function resize() {
            const rect = slot.getBoundingClientRect();
            w = rect.width  || 40;
            h = rect.height || 40;
            cvs.width  = w;
            cvs.height = h;
            seedStars(w, h);
        }

        function draw(now) {
            if (destroyed) return;
            ts = now * 0.001; // seconds
            const c = cvs.getContext('2d');
            c.clearRect(0, 0, w, h);

            const cx = w / 2, cy = h / 2;
            const clipR = Math.min(w, h) * 0.49;

            // clip to circle
            c.save();
            c.beginPath(); c.arc(cx, cy, clipR, 0, Math.PI * 2); c.clip();

            starsData.forEach(s => {
                // drift in a slow orbit
                const drift = ts * s.driftSpeed;
                const ox = s.driftRadius * Math.cos(s.driftAngle + drift * Math.PI * 2);
                const oy = s.driftRadius * Math.sin(s.driftAngle + drift * Math.PI * 2);

                const px = (s.cx + ox) * w;
                const py = (s.cy + oy) * h;

                // twinkle
                const alpha = 0.45 + 0.55 * Math.abs(Math.sin(ts * s.speed * 6 + s.phase));

                // glow
                const g = c.createRadialGradient(px, py, 0, px, py, s.r * 3.5);
                g.addColorStop(0,   hexAlpha(s.color, alpha));
                g.addColorStop(0.4, hexAlpha(s.color, alpha * 0.4));
                g.addColorStop(1,   hexAlpha(s.color, 0));
                c.beginPath(); c.arc(px, py, s.r * 3.5, 0, Math.PI * 2);
                c.fillStyle = g; c.fill();

                // core dot
                c.beginPath(); c.arc(px, py, s.r, 0, Math.PI * 2);
                c.fillStyle = hexAlpha(s.color, alpha); c.fill();
            });

            c.restore();
            animId = requestAnimationFrame(draw);
        }

        function hexAlpha(hex, a) {
            // hex = '#rrggbb'
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},${a.toFixed(3)})`;
        }

        function start() { resize(); animId = requestAnimationFrame(draw); }
        function stop()  { destroyed = true; if (animId) cancelAnimationFrame(animId); }
        function hide()  { cvs.classList.add('hidden'); stop(); }

        return { start, hide };
    }

    // ════════════════════════════════════════
    // AUDIO
    // ════════════════════════════════════════
    class GameAudio {
        constructor() { this.audioCtx = null; this.initialized = false; this._muted = false; }
        init() {
            if (this.initialized) return;
            try { this.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); this.initialized = true; }
            catch (e) {}
        }
        setMuted(m) { this._muted = !!m; }
        _ensureRunning() {
            this.init();
            if (this.audioCtx && this.audioCtx.state === 'suspended') {
                try { this.audioCtx.resume(); } catch (e) {}
            }
        }
        playDropSound() {
            if (this._muted) return;
            this._ensureRunning();
            if (!this.audioCtx) return;
            try {
                const now = this.audioCtx.currentTime;
                const o = this.audioCtx.createOscillator(), g = this.audioCtx.createGain();
                o.connect(g); g.connect(this.audioCtx.destination);
                o.type = 'sine';
                o.frequency.setValueAtTime(180, now);
                o.frequency.exponentialRampToValueAtTime(60, now + 0.12);
                g.gain.setValueAtTime(0.35, now);
                g.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
                o.start(now); o.stop(now + 0.18);
            } catch (e) {}
        }
        playVictorySound() {
            if (this._muted) return;
            this._ensureRunning();
            if (!this.audioCtx) return;
            try {
                const now   = this.audioCtx.currentTime;
                const notes = [{freq:523.25,time:0,dur:0.2},{freq:659.25,time:0.15,dur:0.2},{freq:783.99,time:0.3,dur:0.2},{freq:1046.50,time:0.45,dur:0.4}];
                notes.forEach(n => {
                    const o = this.audioCtx.createOscillator(), g = this.audioCtx.createGain();
                    o.connect(g); g.connect(this.audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.setValueAtTime(n.freq, now + n.time);
                    g.gain.setValueAtTime(0.2, now + n.time);
                    g.gain.exponentialRampToValueAtTime(0.01, now + n.time + n.dur);
                    o.start(now + n.time); o.stop(now + n.time + n.dur);
                });
            } catch (e) {}
        }
    }

    // ════════════════════════════════════════
    // CONNECT FOUR
    // ════════════════════════════════════════
    class ConnectFour {
        constructor() {
            this.ROWS = 6; this.COLS = 7;
            this.board = []; this.currentPlayer = 1;
            this.gameInProgress = false; this.isAiTurn = false;
            this.scores     = { 1: 0, 2: 0 };
            this.audio      = new GameAudio();
            this.aiFirst    = false;
            this.difficulty = 'hard';
            this._slotGalaxies = []; // per-slot animation handles

            this.domBoard       = document.getElementById('board');
            this.domStatus      = document.getElementById('status');
            this.domScore       = document.getElementById('scoreDisplay');
            this.restartBtn     = document.getElementById('restartBtn');
            this.newGameBtn     = document.getElementById('newGameBtn');
            this.toggleFirstBtn = document.getElementById('toggleFirstBtn');
            this.diffEasyBtn    = document.getElementById('diffEasy');
            this.diffMediumBtn  = document.getElementById('diffMedium');
            this.diffHardBtn    = document.getElementById('diffHard');

            this.initDOMEvents();
            this.audio.init();
            this.checkDayReset();

            const todayInit = this.loadTodayScores();
            const initSaved = todayInit[this.difficulty] || { w: 0, l: 0 };
            this.scores = { 1: initSaved.w, 2: initSaved.l };
            this._scoreTab = this.difficulty;

            this.newGame();
            this.initScoreboardTabs();
            this.renderScoreboard();
        }

        initDOMEvents() {
            this.restartBtn.addEventListener('click',     () => this.restartGame());
            this.newGameBtn.addEventListener('click',     () => this.newGame());
            this.toggleFirstBtn.addEventListener('click', () => this.toggleFirstPlayer());
            this.diffEasyBtn.addEventListener('click',   () => this.setDifficulty('easy'));
            this.diffMediumBtn.addEventListener('click', () => this.setDifficulty('medium'));
            this.diffHardBtn.addEventListener('click',   () => this.setDifficulty('hard'));
        }

        setDifficulty(d) {
            this.difficulty = d;
            [this.diffEasyBtn, this.diffMediumBtn, this.diffHardBtn].forEach(b => b.classList.remove('active'));
            const labels = { easy: 'AI (Εύκολο)', medium: 'AI (Μέτριο)', hard: 'AI (Πολύ Δύσκολο)' };
            document.querySelector('#player2 span').textContent = labels[d];
            if (d === 'easy')        this.diffEasyBtn.classList.add('active');
            else if (d === 'medium') this.diffMediumBtn.classList.add('active');
            else                     this.diffHardBtn.classList.add('active');
            const tabMap = { easy: 'tabEasy', medium: 'tabMedium', hard: 'tabHard' };
            document.querySelectorAll('.score-tab').forEach(t => t.classList.remove('active'));
            const at = document.getElementById(tabMap[d]);
            if (at) at.classList.add('active');
            this._scoreTab = d;
            const today = this.loadTodayScores();
            const saved = today[d] || { w: 0, l: 0 };
            this.scores = { 1: saved.w, 2: saved.l };
            this.updateScores();
            this.renderScoreboard();
            this.restartGame();
        }

        setButtonsEnabled(en) {
            [this.restartBtn, this.newGameBtn, this.toggleFirstBtn,
             this.diffEasyBtn, this.diffMediumBtn, this.diffHardBtn].forEach(b => { if (b) b.disabled = !en; });
        }

        toggleFirstPlayer() {
            this.aiFirst = !this.aiFirst;
            this.toggleFirstBtn.textContent = this.aiFirst ? '👤 Εσύ Πρώτος' : '🤖 AI Πρώτο';
            this.newGame();
        }

        initializeBoard() {
            // stop all existing galaxy animations
            this._slotGalaxies.forEach(g => g && g.hide && g.hide());
            this._slotGalaxies = [];

            this.board = Array(this.ROWS).fill(null).map(() => Array(this.COLS).fill(0));
            this.domBoard.innerHTML = '';

            for (let r = 0; r < this.ROWS; r++) {
                for (let c = 0; c < this.COLS; c++) {
                    const slot = document.createElement('div');
                    slot.classList.add('slot');
                    slot.dataset.col = c;
                    slot.dataset.row = r;

                    const disc = document.createElement('div');
                    disc.classList.add('disc');
                    slot.appendChild(disc);

                    // galaxy animation inside this slot
                    const gal = createSlotGalaxy(slot);
                    this._slotGalaxies.push(gal);

                    slot.addEventListener('click', () => this.handleSlotClick(c));
                    this.domBoard.appendChild(slot);
                }
            }

            // start galaxy animations after a short delay so slots have real dimensions
            setTimeout(() => {
                this._slotGalaxies.forEach(g => g && g.start && g.start());
            }, 60);

            this.gameInProgress = true;
            this.currentPlayer  = 1;

            if (this.aiFirst) {
                this.currentPlayer = 2;
                this.updateStatus(); this.updatePlayerIndicators();
                this.triggerAiTurn();
            } else {
                this.updateStatus(); this.updatePlayerIndicators();
            }
        }

        handleSlotClick(col) { if (!this.gameInProgress || this.isAiTurn) return; this.makeMove(col); }

        makeMove(col) {
            const row = this.getAvailableRow(col);
            if (row === -1) return;
            this.board[row][col] = this.currentPlayer;
            this.animateDiscDrop(row, col, this.currentPlayer);
            this.audio.playDropSound();

            // hide the galaxy for this cell
            const idx = row * this.COLS + col;
            if (this._slotGalaxies[idx]) this._slotGalaxies[idx].hide();

            if (this.checkWinCondition(row, col)) { this.handleWinState();  return; }
            if (this.checkDrawCondition())          { this.handleDrawState(); return; }

            this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
            this.updateStatus(); this.updatePlayerIndicators();
            if (this.currentPlayer === 2 && this.gameInProgress) this.triggerAiTurn();
        }

        getAvailableRow(col) {
            for (let r = this.ROWS - 1; r >= 0; r--) if (this.board[r][col] === 0) return r;
            return -1;
        }

        animateDiscDrop(row, col, player) {
            const slot = this.domBoard.children[row * this.COLS + col];
            const disc = slot.querySelector('.disc');
            disc.className = `disc ${player === 1 ? 'red' : 'yellow'}`;
            disc.style.animation = 'discDrop 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards';
        }

        updatePlayerIndicators() {
            document.getElementById('player1').classList.toggle('active', this.currentPlayer === 1);
            document.getElementById('player2').classList.toggle('active', this.currentPlayer === 2);
        }

        updateStatus() {
            if (!this.gameInProgress) return;
            this.domStatus.innerHTML = this.currentPlayer === 2
                ? '<span class="ai-thinking">Το AI σκέφτεται...</span>'
                : 'Η σειρά σου';
        }

        checkWinCondition(row, col) {
            const p    = this.board[row][col];
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (const [dr, dc] of dirs) {
                let count = 1, cells = [[row, col]];
                for (const step of [1, -1]) {
                    let r = row + dr * step, c = col + dc * step;
                    while (r >= 0 && r < this.ROWS && c >= 0 && c < this.COLS && this.board[r][c] === p) {
                        count++; cells.push([r, c]);
                        if (count >= 4) { this.highlightWinningSequence(cells); return true; }
                        r += dr * step; c += dc * step;
                    }
                }
            }
            return false;
        }

        highlightWinningSequence(cells) {
            cells.forEach(([r, c]) => {
                const d = this.domBoard.children[r * this.COLS + c].querySelector('.disc');
                if (d) d.classList.add('winner');
            });
        }

        checkDrawCondition() { return this.board[0].every(c => c !== 0); }

        handleWinState() {
            this.gameInProgress = false;
            this.scores[this.currentPlayer]++;
            this.updateScores();
            this.audio.playVictorySound();
            this.triggerConfettiEffect();
            const isHuman = this.currentPlayer === 1;
            this.domStatus.textContent = isHuman ? 'Κέρδισες! 🎉' : 'Κέρδισε το AI! 😞';
            this.handleGameEnd(isHuman ? '🎉 Κέρδισες!' : '😞 Κέρδισε το AI');
        }

        handleDrawState() {
            this.gameInProgress = false;
            this.domStatus.textContent = 'Ισοπαλία! 🤝';
            this.handleGameEnd('🤝 Ισοπαλία!');
        }

        // ── SCORE PERSISTENCE ──
        getTodayKey() {
            const d = new Date();
            return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
        }
        loadAllScores() {
            try { return JSON.parse(localStorage.getItem('cf_allscores') || '{}'); }
            catch (e) { return {}; }
        }
        saveAllScores(all) {
            try { localStorage.setItem('cf_allscores', JSON.stringify(all)); } catch (e) {}
        }
        checkDayReset() {
            const lastDay = (() => { try { return localStorage.getItem('cf_lastday'); } catch(e){ return ''; } })() || '';
            const today   = this.getTodayKey();
            if (lastDay && lastDay !== today) {
                const all   = this.loadAllScores();
                const saved = JSON.parse(localStorage.getItem('cf_todayscores') || '{}');
                if (Object.keys(saved).length > 0) {
                    all[lastDay] = saved;
                    const keys = Object.keys(all).sort().slice(-14);
                    const trimmed = {}; keys.forEach(k => { trimmed[k] = all[k]; });
                    this.saveAllScores(trimmed);
                }
                try { localStorage.removeItem('cf_todayscores'); } catch(e) {}
            }
            try { localStorage.setItem('cf_lastday', today); } catch(e) {}
        }
        loadTodayScores() {
            try { return JSON.parse(localStorage.getItem('cf_todayscores') || '{}'); }
            catch (e) { return {}; }
        }
        saveTodayScore() {
            const today = this.loadTodayScores();
            if (!today[this.difficulty]) today[this.difficulty] = { w:0, l:0 };
            today[this.difficulty].w = this.scores[1];
            today[this.difficulty].l = this.scores[2];
            try { localStorage.setItem('cf_todayscores', JSON.stringify(today)); } catch(e) {}
        }
        saveProgress() { this.saveTodayScore(); this.renderScoreboard(); }

        handleGameEnd(resultEmoji) {
            this.saveProgress();
            this.setButtonsEnabled(true);
            // show ad modal after short delay (confetti first)
            setTimeout(() => {
                showAdModal(
                    resultEmoji,
                    () => this.restartGame(),
                    () => this.newGame()
                );
            }, 1400);
        }

        updateScores() { this.domScore.textContent = `${this.scores[1]} - ${this.scores[2]}`; }

        renderScoreboard() {
            const tab     = this._scoreTab || this.difficulty;
            const content = document.getElementById('scoreboardContent');
            if (!content) return;
            const todayKey    = this.getTodayKey();
            const todayScores = this.loadTodayScores();
            const allScores   = this.loadAllScores();
            const combined    = Object.assign({}, allScores);
            if (todayScores && Object.keys(todayScores).length > 0) combined[todayKey] = todayScores;
            const rows = Object.keys(combined).sort().reverse()
                .map(date => ({ date, diff: (combined[date] || {})[tab] || null }))
                .filter(r => r.diff);
            if (rows.length === 0) {
                content.innerHTML = '<div class="no-history">Δεν υπάρχει ιστορικό για αυτή τη δυσκολία.</div>';
                return;
            }
            let html = '<table class="score-table"><thead><tr><th>📅 Ημερομηνία</th><th class="win">✅ Νίκες</th><th class="loss">❌ Ήττες</th></tr></thead><tbody>';
            rows.forEach(r => {
                const isToday = r.date === todayKey;
                const cls     = isToday ? 'today-row' : '';
                const label   = isToday ? '🟢 Σήμερα' : r.date;
                html += `<tr class="${cls}"><td>${label}</td><td class="win">${r.diff.w}</td><td class="loss">${r.diff.l}</td></tr>`;
            });
            html += '</tbody></table>';
            content.innerHTML = html;
        }

        initScoreboardTabs() {
            const tabs = { tabEasy:'easy', tabMedium:'medium', tabHard:'hard' };
            Object.entries(tabs).forEach(([id, diff]) => {
                const btn = document.getElementById(id);
                if (btn) btn.addEventListener('click', () => {
                    document.querySelectorAll('.score-tab').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    this._scoreTab = diff;
                    this.renderScoreboard();
                });
            });
            const openBtn  = document.getElementById('openScoreboardBtn');
            const closeBtn = document.getElementById('closeScoreboardBtn');
            const modal    = document.getElementById('scoreModal');
            if (openBtn)  openBtn.addEventListener('click',  () => { this.renderScoreboard(); modal.classList.add('open'); });
            if (closeBtn) closeBtn.addEventListener('click', () => modal.classList.remove('open'));
            if (modal)    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
        }

        // ── AI ──
        triggerAiTurn() {
            this.isAiTurn = true; this.updateStatus();
            const delay = this.difficulty === 'easy' ? Math.random()*800+600 : Math.random()*400+300;
            setTimeout(() => {
                if (!this.gameInProgress) { this.isAiTurn = false; return; }
                const col = this.computeAiMove();
                this.isAiTurn = false;
                this.makeMove(col);
            }, delay);
        }

        computeAiMove() {
            const valid = [];
            for (let c = 0; c < this.COLS; c++) if (this.getAvailableRow(c) !== -1) valid.push(c);
            if (this.difficulty === 'easy') {
                if (Math.random() < 0.70) return valid[Math.floor(Math.random()*valid.length)];
                for (const c of valid) { const r=this.getAvailableRow(c); this.board[r][c]=2; if(this.checkWinSimulation(r,c,2)){this.board[r][c]=0;return c;} this.board[r][c]=0; }
                for (const c of valid) { const r=this.getAvailableRow(c); this.board[r][c]=1; if(this.checkWinSimulation(r,c,1)){this.board[r][c]=0;return c;} this.board[r][c]=0; }
                return valid[Math.floor(Math.random()*valid.length)];
            }
            for (const c of valid) { const r=this.getAvailableRow(c); this.board[r][c]=2; if(this.checkWinSimulation(r,c,2)){this.board[r][c]=0;return c;} this.board[r][c]=0; }
            for (const c of valid) { const r=this.getAvailableRow(c); this.board[r][c]=1; if(this.checkWinSimulation(r,c,1)){this.board[r][c]=0;return c;} this.board[r][c]=0; }
            if (this.difficulty === 'medium' && Math.random() < 0.30)
                return valid[Math.floor(Math.random()*valid.length)];
            const depth = this.difficulty === 'medium' ? 3 : 5;
            let best = -Infinity, cols = [valid[0]];
            for (const c of valid) {
                const r = this.getAvailableRow(c); this.board[r][c] = 2;
                const s = this.minimax(depth, false, -Infinity, Infinity);
                this.board[r][c] = 0;
                if (s > best) { best = s; cols = [c]; }
                else if (s === best) cols.push(c);
            }
            return cols[Math.floor(Math.random()*cols.length)];
        }

        checkWinSimulation(row, col, p) {
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (const [dr,dc] of dirs) {
                let count = 1;
                for (const step of [1,-1]) {
                    let r=row+dr*step, c=col+dc*step;
                    while (r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.board[r][c]===p) {
                        count++; if(count>=4) return true; r+=dr*step; c+=dc*step;
                    }
                }
            }
            return false;
        }

        minimax(depth, isMax, alpha, beta) {
            const score = this.evaluateBoardState();
            if (depth===0||this.checkDrawCondition()) return score;
            if (Math.abs(score)>5000) return score;
            const valid = [];
            for (let c=0;c<this.COLS;c++) if(this.getAvailableRow(c)!==-1) valid.push(c);
            if (isMax) {
                let m=-Infinity;
                for (const c of valid) {
                    const r=this.getAvailableRow(c); this.board[r][c]=2;
                    const e=this.minimax(depth-1,false,alpha,beta);
                    this.board[r][c]=0; m=Math.max(m,e); alpha=Math.max(alpha,e);
                    if(beta<=alpha) break;
                }
                return m;
            } else {
                let m=Infinity;
                for (const c of valid) {
                    const r=this.getAvailableRow(c); this.board[r][c]=1;
                    const e=this.minimax(depth-1,true,alpha,beta);
                    this.board[r][c]=0; m=Math.min(m,e); beta=Math.min(beta,e);
                    if(beta<=alpha) break;
                }
                return m;
            }
        }

        evaluateBoardState() {
            let score = 0;
            const mid = Math.floor(this.COLS/2);
            let mc = 0;
            for (let r=0;r<this.ROWS;r++) {
                if (this.board[r][mid]===2) mc++;
                else if (this.board[r][mid]===1) mc--;
            }
            score += mc*4;
            for (let r=0;r<this.ROWS;r++)
                for (let c=0;c<this.COLS-3;c++)
                    score += this.evaluateWindow([this.board[r][c],this.board[r][c+1],this.board[r][c+2],this.board[r][c+3]]);
            for (let c=0;c<this.COLS;c++)
                for (let r=0;r<this.ROWS-3;r++)
                    score += this.evaluateWindow([this.board[r][c],this.board[r+1][c],this.board[r+2][c],this.board[r+3][c]]);
            for (let r=0;r<this.ROWS-3;r++)
                for (let c=0;c<this.COLS-3;c++) {
                    score += this.evaluateWindow([this.board[r][c],this.board[r+1][c+1],this.board[r+2][c+2],this.board[r+3][c+3]]);
                    score += this.evaluateWindow([this.board[r+3][c],this.board[r+2][c+1],this.board[r+1][c+2],this.board[r][c+3]]);
                }
            return score;
        }

        evaluateWindow(w) {
            let score = 0;
            const ai=w.filter(c=>c===2).length, pl=w.filter(c=>c===1).length, em=w.filter(c=>c===0).length;
            if(ai===4) return 10000; if(pl===4) return -10000;
            if(ai===3&&em===1) score+=50; else if(ai===2&&em===2) score+=10;
            if(pl===3&&em===1) score-=80; else if(pl===2&&em===2) score-=15;
            return score;
        }

        triggerConfettiEffect() {
            for (let i=0;i<60;i++) {
                const c = document.createElement('div');
                c.classList.add('confetti');
                c.style.left             = Math.random()*100+'vw';
                c.style.animationDelay   = Math.random()*0.5+'s';
                c.style.animationDuration = (Math.random()*2+2)+'s';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3500);
            }
        }

        restartGame() {
            this.currentPlayer = 1; this.isAiTurn = false;
            this.initializeBoard(); this.updateStatus(); this.updatePlayerIndicators();
            document.querySelectorAll('.confetti').forEach(c => c.remove());
            this.setButtonsEnabled(true);
        }
        newGame() { this.restartGame(); }
    }

    // ── BOOT ──
    try { initBackgroundEffects(); } catch (e) {}
    try { window._game = new ConnectFour(); } catch (e) { console.error(e); }

})();
</script>
