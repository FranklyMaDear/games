<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connect Four - Galactic Edition</title>
    <meta name="theme-color" content="#0a0e27">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3186700611266549" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center;
            background: #000010; position: relative; touch-action: manipulation;
        }

        /* ── STARFIELD ── */
        #starCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .shooting-star {
            position: fixed; width: 3px; height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0));
            border-radius: 50%; z-index: 1; pointer-events: none;
            animation: shoot linear forwards; transform-origin: top center;
        }
        @keyframes shoot {
            0%   { opacity:1; transform:translate(0,0) rotate(-35deg); }
            70%  { opacity:1; }
            100% { opacity:0; transform:translate(-400px,600px) rotate(-35deg); }
        }
        .nebula-particle {
            position: fixed; border-radius: 50%; z-index: 0;
            pointer-events: none; animation: nebulaFloat linear infinite; filter: blur(2px);
        }
        @keyframes nebulaFloat {
            0%   { transform:translate(0,0) scale(1); opacity:0.6; }
            50%  { transform:translate(30px,-40px) scale(1.5); opacity:0.2; }
            100% { transform:translate(-20px,20px) scale(1); opacity:0.6; }
        }

        /* ── ADS ── */
        .ad-banner {
            width:100%; max-width:728px; min-height:90px;
            display:flex; justify-content:center; align-items:center;
            margin:0 auto; position:relative; z-index:50; padding:4px 0;
        }
        .ad-banner ins { display:block; width:100%; }
        .ad-top    { padding-top:8px; }
        .ad-bottom { padding-bottom:8px; }

        /* ── GAME WRAPPER ── */
        .game-wrapper {
            display:flex; width:100%;
            justify-content:center; align-items:center;
            padding:6px 10px; position:relative; z-index:50; flex:1;
        }
        .game-container {
            text-align:center;
            background:rgba(10,14,35,0.82);
            border-radius:20px; padding:20px 15px;
            box-shadow:0 10px 40px rgba(0,0,0,0.6);
            width:100%; max-width:500px; margin:4px;
            border:2px solid rgba(132,204,22,0.3);
            backdrop-filter:blur(6px);
        }

        h1 {
            color:#84cc16; margin-bottom:15px; font-size:2rem;
            font-weight:bold; letter-spacing:2px;
            text-shadow:0 0 20px rgba(132,204,22,0.5);
        }

        .players-info {
            display:flex; justify-content:space-between;
            align-items:center; margin-bottom:15px; padding:0 5px; gap:5px;
        }
        .player {
            display:flex; flex-direction:column;
            align-items:center; gap:6px; flex:1; min-width:80px;
        }
        .player-disc {
            width:35px; height:35px; border-radius:50%;
            border:2px solid #fff; box-shadow:0 3px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .player-disc.red    { background:radial-gradient(circle at 30% 30%,#ff6b6b,#c0392b); }
        .player-disc.yellow { background:radial-gradient(circle at 30% 30%,#ffd93d,#f39c12); }
        .player span { font-size:0.9rem; font-weight:bold; color:#e8e8ed; }
        .player.active span { color:#84cc16; font-weight:800; }
        .player.active .player-disc { transform:scale(1.15); }

        .scores { flex:1; display:flex; justify-content:center; align-items:center; }
        .scores .score {
            font-size:1.6rem; font-weight:bold; color:#e8e8ed;
            background:rgba(255,255,255,0.05);
            padding:8px 16px; border-radius:20px; min-width:80px;
            border:1px solid rgba(132,204,22,0.2);
        }

        /* ════════════════════════════════
           BOARD — the key trick:
           board-container is transparent so the
           fixed starCanvas shows through.
           Slots are also transparent circles.
           The blue "frame" is just a border+shadow.
        ════════════════════════════════ */
        .board-container {
            /* transparent background so stars shine through */
            background: transparent;
            padding:12px; border-radius:15px;
            /* blue rim gives the board its identity */
            box-shadow:
                0 0 0 14px #1565c0,
                0 0 0 17px #0d47a1,
                0 8px 30px rgba(0,0,0,0.6);
            margin:15px 0; position:relative;
            width:100%; aspect-ratio:7/6;
            overflow:hidden;
            display:flex; justify-content:center; align-items:center;
        }

        /* Blue board surface with holes punched out using a CSS mask */
        .board-surface {
            position:absolute; inset:0;
            background:#1565c0;
            /* The mask below punches circular holes where each slot sits.
               We generate it via JS after layout, so initially just blue. */
            pointer-events:none;
            z-index:2;
        }

        .board {
            display:grid;
            grid-template-columns:repeat(7, 1fr);
            grid-template-rows:repeat(6, 1fr);
            gap:6px; position:relative; z-index:3;
            height:96%; width:96%; padding:4px;
        }

        /* Each slot: transparent so stars show through */
        .slot {
            position:relative; border-radius:50%;
            cursor:pointer;
            /* deep inset shadow gives the "hole" depth illusion */
            box-shadow:
                inset 0 6px 14px rgba(0,0,0,0.95),
                inset 0 -2px 6px rgba(255,255,255,0.04),
                0 0 0 2px rgba(0,0,20,0.8);
            background: rgba(0,0,10,0.15);  /* nearly transparent */
            display:flex; align-items:center; justify-content:center;
            overflow:hidden;
            transition: box-shadow 0.15s;
        }
        .slot:hover {
            box-shadow:
                inset 0 6px 14px rgba(0,0,0,0.85),
                inset 0 -2px 6px rgba(255,255,255,0.08),
                0 0 0 2px rgba(132,204,22,0.5);
        }

        /* Disc fills the slot and covers the stars */
        .disc {
            width:88%; height:88%; border-radius:50%;
            position:absolute; z-index:4;
            opacity:0; /* hidden until placed */
            box-shadow:
                inset 0 -5px 10px rgba(0,0,0,0.55),
                inset 0 3px 6px rgba(255,255,255,0.35),
                0 4px 8px rgba(0,0,0,0.5);
            border:2px solid rgba(255,255,255,0.45);
        }
        .disc::before {
            content:''; position:absolute;
            top:14%; left:14%; right:14%; bottom:14%;
            background:rgba(255,255,255,0.22);
            border-radius:50%; filter:blur(1px); z-index:5;
        }
        .disc.red    { background:radial-gradient(circle at 35% 35%,#ff5252,#c62828); opacity:1; }
        .disc.yellow { background:radial-gradient(circle at 35% 35%,#ffeb3b,#f9a825); opacity:1; }
        .disc.winner { animation:discPulse 0.9s infinite; }

        @keyframes discDrop {
            0%   { transform:translateY(-520px); opacity:0; }
            60%  { transform:translateY(18px);   opacity:1; }
            80%  { transform:translateY(-7px);   opacity:1; }
            100% { transform:translateY(0);      opacity:1; }
        }
        @keyframes discPulse {
            0%,100% { transform:scale(1); filter:brightness(1); }
            50%     { transform:scale(1.09); filter:brightness(1.3); }
        }

        /* ── STATUS / BUTTONS ── */
        .status {
            margin:12px 0; font-size:1.1rem; font-weight:700;
            color:#e8e8ed; min-height:25px; padding:12px;
            background:rgba(255,255,255,0.05); border-radius:10px;
            border:1px solid rgba(132,204,22,0.2); text-align:center;
        }
        .game-buttons {
            display:flex; justify-content:center; align-items:center;
            gap:10px; margin-top:12px; padding:0 5px; flex-wrap:wrap;
        }
        .game-btn {
            background:linear-gradient(135deg,#ff4081,#c51162);
            border:2px solid #ff69b4; color:white;
            padding:12px 20px; font-size:0.9rem; border-radius:40px;
            cursor:pointer; transition:all 0.2s ease;
            box-shadow:0 4px 0 #880e4f,0 6px 12px rgba(0,0,0,0.4);
            font-family:inherit; font-weight:700;
            flex:1; min-width:120px; max-width:160px;
        }
        .game-btn:active  { transform:translateY(3px); box-shadow:0 1px 0 #880e4f; }
        .game-btn:disabled { opacity:0.5; pointer-events:none; }
        .game-btn.new-game {
            background:linear-gradient(135deg,#84cc16,#65a30d);
            border:2px solid #a3e635;
            box-shadow:0 4px 0 #4d7c0f,0 6px 12px rgba(0,0,0,0.4);
        }
        .game-btn.small-btn {
            background:linear-gradient(135deg,#f39c12,#d35400);
            border:2px solid #f1c40f;
            box-shadow:0 4px 0 #b9770e,0 6px 12px rgba(0,0,0,0.4);
            font-size:0.75rem; padding:8px 12px; min-width:80px; max-width:120px;
        }
        .diff-section { margin-top:12px; }
        .diff-label {
            font-size:0.7rem; color:#84cc16; letter-spacing:2px;
            font-weight:700; margin-bottom:8px; text-transform:uppercase;
        }
        .diff-buttons { display:flex; gap:8px; justify-content:center; }
        .diff-btn {
            flex:1; max-width:110px; padding:10px 6px; font-size:0.78rem;
            border-radius:30px; border:2px solid; cursor:pointer;
            font-family:inherit; font-weight:700; transition:all 0.2s ease; opacity:0.5;
        }
        .diff-btn:active { transform:translateY(2px); }
        .diff-btn.active { opacity:1; transform:scale(1.06); }
        .diff-easy   { background:linear-gradient(135deg,#26c6da,#0097a7); border-color:#80deea; box-shadow:0 3px 0 #006064; color:#fff; }
        .diff-medium { background:linear-gradient(135deg,#ffa726,#f57c00); border-color:#ffcc80; box-shadow:0 3px 0 #e65100; color:#fff; }
        .diff-hard   { background:linear-gradient(135deg,#ef5350,#b71c1c); border-color:#ef9a9a; box-shadow:0 3px 0 #7f0000; color:#fff; }
        .ai-thinking { color:#fbbf24; font-weight:bold; }

        /* ── CONFETTI ── */
        @keyframes confettiFall {
            0%   { transform:translateY(-10px) rotate(0deg);   opacity:1; }
            100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
        }
        .confetti {
            position:fixed; width:6px; height:6px; top:-10px;
            animation:confettiFall 3s linear forwards; z-index:200; border-radius:50%;
        }
        .confetti:nth-child(1n){ background:#e74c3c; }
        .confetti:nth-child(2n){ background:#f1c40f; }
        .confetti:nth-child(3n){ background:#2ecc71; }
        .confetti:nth-child(4n){ background:#3498db; }
        .confetti:nth-child(5n){ background:#9b59b6; }

        /* ── SCOREBOARD MODAL ── */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.78); z-index:500;
            justify-content:center; align-items:center; backdrop-filter:blur(5px);
        }
        .modal-overlay.open { display:flex; }
        .modal-box {
            background:#0e1027; border:2px solid rgba(132,204,22,0.4);
            border-radius:20px; padding:24px 20px 20px;
            width:92%; max-width:420px; max-height:80vh; overflow-y:auto;
            box-shadow:0 0 40px rgba(132,204,22,0.15);
        }
        .modal-title {
            color:#84cc16; font-size:1.2rem; font-weight:800;
            letter-spacing:2px; text-align:center; margin-bottom:16px;
            text-shadow:0 0 12px rgba(132,204,22,0.5);
        }
        .score-tabs { display:flex; gap:6px; justify-content:center; margin-bottom:14px; }
        .score-tab {
            flex:1; max-width:120px; padding:7px 4px; font-size:0.72rem;
            border-radius:20px; border:1px solid rgba(255,255,255,0.15);
            cursor:pointer; font-family:inherit; font-weight:700;
            color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.05); transition:all 0.2s;
        }
        .score-tab.active { color:#fff; border-color:rgba(132,204,22,0.6); background:rgba(132,204,22,0.15); }
        .score-table { width:100%; border-collapse:collapse; font-size:0.78rem; }
        .score-table th {
            color:#84cc16; font-weight:700; padding:6px 8px;
            border-bottom:1px solid rgba(132,204,22,0.25);
            text-align:center; font-size:0.7rem; letter-spacing:1px;
        }
        .score-table td {
            color:#e8e8ed; padding:7px 8px; text-align:center;
            border-bottom:1px solid rgba(255,255,255,0.06);
        }
        .score-table tr:last-child td { border-bottom:none; }
        .score-table .today-row td { color:#84cc16; font-weight:700; }
        .score-table .win  { color:#4ade80; font-weight:700; }
        .score-table .loss { color:#f87171; font-weight:700; }
        .no-history { color:rgba(255,255,255,0.35); font-size:0.75rem; padding:16px; text-align:center; }
        .modal-back-btn {
            display:block; width:100%; margin-top:18px; padding:12px;
            background:linear-gradient(135deg,#84cc16,#65a30d);
            border:none; border-radius:30px; color:#fff;
            font-size:0.95rem; font-weight:800; font-family:inherit;
            cursor:pointer; box-shadow:0 4px 0 #4d7c0f; transition:all 0.2s; letter-spacing:1px;
        }
        .modal-back-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #4d7c0f; }

        /* ── AD END-GAME MODAL ── */
        .ad-modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,10,0.88); z-index:600;
            justify-content:center; align-items:center;
            backdrop-filter:blur(6px); flex-direction:column;
        }
        .ad-modal-overlay.open { display:flex; }
        .ad-modal-box {
            background:#0a0e27;
            border:2px solid rgba(132,204,22,0.35);
            border-radius:22px; padding:22px 18px 18px;
            width:94%; max-width:460px;
            box-shadow:0 0 50px rgba(132,204,22,0.1),0 20px 60px rgba(0,0,0,0.6);
            text-align:center;
        }
        .ad-modal-result   { font-size:2rem; margin-bottom:4px; }
        .ad-modal-subtitle {
            color:rgba(255,255,255,0.5); font-size:0.78rem;
            letter-spacing:1px; margin-bottom:14px; text-transform:uppercase;
        }
        .ad-modal-ad-wrap {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:12px; padding:10px; margin-bottom:14px;
            min-height:110px; display:flex; align-items:center; justify-content:center;
        }
        .ad-modal-buttons { display:flex; gap:10px; justify-content:center; }
        .ad-modal-btn {
            flex:1; max-width:180px; padding:13px 10px;
            border-radius:35px; border:none; cursor:pointer;
            font-family:inherit; font-weight:800; font-size:0.9rem;
            transition:all 0.2s; letter-spacing:0.5px;
        }
        .ad-modal-btn.play-again {
            background:linear-gradient(135deg,#84cc16,#65a30d);
            color:#fff; box-shadow:0 4px 0 #4d7c0f;
        }
        .ad-modal-btn.play-again:active { transform:translateY(3px); box-shadow:0 1px 0 #4d7c0f; }
        .ad-modal-btn.new-game-btn {
            background:linear-gradient(135deg,#3b82f6,#1d4ed8);
            color:#fff; box-shadow:0 4px 0 #1e3a8a;
        }
        .ad-modal-btn.new-game-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #1e3a8a; }

        /* ── RESPONSIVE ── */
        @media (max-width:768px) {
            .game-container { padding:15px 10px; margin:3px; max-width:95vw; }
            h1 { font-size:1.6rem; }
            .board { gap:5px; height:93%; width:93%; }
            .player-disc { width:30px; height:30px; }
            .scores .score { font-size:1.3rem; padding:6px 12px; }
            .game-btn { padding:10px 15px; font-size:0.85rem; }
            .ad-banner { min-height:60px; }
        }
        @media (max-width:480px) {
            .game-buttons { gap:8px; }
            .game-btn { min-width:100px; max-width:130px; padding:10px 12px; font-size:0.8rem; }
        }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<!-- ▸ TOP AD -->
<div class="ad-banner ad-top">
    <ins class="adsbygoogle"
         style="display:block;width:100%;min-height:60px;"
         data-ad-client="ca-pub-3186700611266549"
         data-ad-slot="6826169932"
         data-ad-format="autorelaxed"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- ▸ GAME -->
<div class="game-wrapper">
  <div class="game-container">
    <h1>🪐 CONNECT FOUR</h1>
    <div class="players-info">
      <div class="player" id="player1">
        <div class="player-disc red"></div>
        <span>Εσύ</span>
      </div>
      <div class="scores">
        <div class="score" id="scoreDisplay">0 - 0</div>
      </div>
      <div class="player" id="player2">
        <div class="player-disc yellow"></div>
        <span>AI (Πολύ Δύσκολο)</span>
      </div>
    </div>

    <div class="board-container" id="boardContainer">
      <!-- blue surface with punched holes is drawn on a canvas overlay -->
      <canvas id="boardCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;border-radius:13px;"></canvas>
      <div class="board" id="board"></div>
    </div>

    <div class="status" id="status">Η σειρά σου</div>

    <div class="game-buttons">
      <button class="game-btn"           id="restartBtn">↺ Επανεκκίνηση</button>
      <button class="game-btn new-game"  id="newGameBtn">⊕ Νέο Παιχνίδι</button>
      <button class="game-btn small-btn" id="toggleFirstBtn">🤖 AI Πρώτο</button>
      <button class="game-btn small-btn" id="openScoreboardBtn"
        style="background:linear-gradient(135deg,#7b1fa2,#4a148c);border-color:#ce93d8;box-shadow:0 4px 0 #38006b;">
        🏆 Σκορ
      </button>
    </div>

    <div class="diff-section">
      <div class="diff-label">⚡ Δυσκολία</div>
      <div class="diff-buttons">
        <button class="diff-btn diff-easy"   id="diffEasy">😊 Εύκολο</button>
        <button class="diff-btn diff-medium" id="diffMedium">😐 Μέτριο</button>
        <button class="diff-btn diff-hard active" id="diffHard">💀 Πολύ Δύσκολο</button>
      </div>
    </div>
  </div>
</div>

<!-- ▸ BOTTOM AD -->
<div class="ad-banner ad-bottom">
    <ins class="adsbygoogle"
         style="display:block;width:100%;min-height:60px;"
         data-ad-client="ca-pub-3186700611266549"
         data-ad-slot="6826169932"
         data-ad-format="autorelaxed"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- ▸ SCOREBOARD MODAL -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal-box">
    <div class="modal-title">🏆 Ιστορικό Σκορ</div>
    <div class="score-tabs">
      <button class="score-tab" id="tabEasy">😊 Εύκολο</button>
      <button class="score-tab" id="tabMedium">😐 Μέτριο</button>
      <button class="score-tab active" id="tabHard">💀 Πολύ Δύσκολο</button>
    </div>
    <div id="scoreboardContent"></div>
    <button class="modal-back-btn" id="closeScoreboardBtn">← Πίσω στο Παιχνίδι</button>
  </div>
</div>

<!-- ▸ END-GAME AD MODAL -->
<div class="ad-modal-overlay" id="adModal">
  <div class="ad-modal-box">
    <div class="ad-modal-result" id="adModalResult">🎉</div>
    <div class="ad-modal-subtitle">Επόμενη κίνηση;</div>
    <div class="ad-modal-ad-wrap" id="adModalAdWrap"></div>
    <div class="ad-modal-buttons">
      <button class="ad-modal-btn play-again"   id="adModalPlayAgain">↺ Ξανά</button>
      <button class="ad-modal-btn new-game-btn" id="adModalNewGame">⊕ Νέο Παιχνίδι</button>
    </div>
  </div>
</div>

<script>
(function () {
    'use strict';

    // ════════════════════════════════════════
    // STARFIELD BACKGROUND
    // ════════════════════════════════════════
    const bgCanvas = document.getElementById('starCanvas');
    const bgCtx    = bgCanvas.getContext('2d');
    let stars = [];

    function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }

    function createStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) stars.push({
            x: Math.random() * bgCanvas.width,
            y: Math.random() * bgCanvas.height,
            r: Math.random() * 2.4 + 0.4,
            bright: Math.random() * 0.7 + 0.3,
            tSpeed: Math.random() * 0.02 + 0.005,
            tOff:   Math.random() * Math.PI * 2,
            dx: (Math.random() - 0.5) * 0.25,
            dy: (Math.random() - 0.5) * 0.25,
        });
    }

    function animStars(ts) {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        stars.forEach(s => {
            const tw = Math.sin(ts * s.tSpeed + s.tOff) * 0.3 + 0.7;
            const a  = s.bright * tw;
            bgCtx.beginPath(); bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            bgCtx.fillStyle = `rgba(255,255,255,${a})`; bgCtx.fill();
            if (s.r > 1.5) {
                bgCtx.beginPath(); bgCtx.arc(s.x, s.y, s.r * 2.8, 0, Math.PI*2);
                bgCtx.fillStyle = `rgba(180,210,255,${a*0.28})`; bgCtx.fill();
            }
            s.x += s.dx; s.y += s.dy;
            if (s.x < 0) s.x = bgCanvas.width;  if (s.x > bgCanvas.width)  s.x = 0;
            if (s.y < 0) s.y = bgCanvas.height;  if (s.y > bgCanvas.height) s.y = 0;
        });
        requestAnimationFrame(animStars);
    }

    // ════════════════════════════════════════
    // BOARD CANVAS — draws the blue board WITH
    // transparent circular holes so the live
    // starfield canvas behind it shows through.
    // Occupied cells are covered by a filled disc.
    // ════════════════════════════════════════
    const boardCvs = document.getElementById('boardCanvas');
    const boardCtx = boardCvs.getContext('2d');
    let slotLayout = [];   // [{cx,cy,r}]  pixel positions of each slot

    function drawBoard(occupiedGrid) {
        const container = document.getElementById('boardContainer');
        const rect = container.getBoundingClientRect();
        const W = rect.width  || container.offsetWidth;
        const H = rect.height || container.offsetHeight;
        boardCvs.width  = W;
        boardCvs.height = H;

        const ROWS = 6, COLS = 7;
        const GAP = W * 0.016;
        const PAD = W * 0.03;
        const cellW = (W - PAD*2 - GAP*(COLS-1)) / COLS;
        const cellH = (H - PAD*2 - GAP*(ROWS-1)) / ROWS;
        const R = Math.min(cellW, cellH) * 0.44;

        slotLayout = [];

        const c = boardCtx;
        c.clearRect(0, 0, W, H);

        // 1) Fill entire canvas with blue board colour
        c.fillStyle = '#1565c0';
        c.beginPath();
        c.roundRect(0, 0, W, H, 12);
        c.fill();

        // 2) For each slot: punch a transparent hole using destination-out
        //    This lets the fixed starCanvas show through.
        c.globalCompositeOperation = 'destination-out';
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const cx = PAD + col*(cellW+GAP) + cellW/2;
                const cy = PAD + row*(cellH+GAP) + cellH/2;
                slotLayout.push({cx, cy, r: R});

                c.beginPath(); c.arc(cx, cy, R, 0, Math.PI*2); c.fill();
            }
        }
        c.globalCompositeOperation = 'source-over';

        // 3) Re-draw inset shadow ring on each hole for depth
        for (let i = 0; i < slotLayout.length; i++) {
            const {cx, cy, r} = slotLayout[i];
            // dark rim
            c.beginPath(); c.arc(cx, cy, r, 0, Math.PI*2);
            c.strokeStyle = 'rgba(0,0,0,0.7)'; c.lineWidth = 3; c.stroke();

            // subtle bottom highlight
            const highlight = c.createLinearGradient(cx, cy-r, cx, cy+r);
            highlight.addColorStop(0,   'rgba(0,0,0,0.0)');
            highlight.addColorStop(0.6, 'rgba(0,0,0,0.0)');
            highlight.addColorStop(1,   'rgba(0,0,40,0.45)');
            c.beginPath(); c.arc(cx, cy, r-1, 0, Math.PI*2);
            c.strokeStyle = highlight; c.lineWidth = 4; c.stroke();
        }

        // 4) Draw placed discs (cover the holes for occupied cells)
        if (occupiedGrid) {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const val = occupiedGrid[row][col];
                    if (!val) continue;
                    const {cx, cy, r} = slotLayout[row*COLS+col];
                    const isRed = val === 1;

                    // disc base
                    const gr = c.createRadialGradient(cx-r*0.2, cy-r*0.2, r*0.05, cx, cy, r*0.95);
                    if (isRed) {
                        gr.addColorStop(0, '#ff6060');
                        gr.addColorStop(1, '#b71c1c');
                    } else {
                        gr.addColorStop(0, '#fff176');
                        gr.addColorStop(1, '#f57f17');
                    }
                    c.beginPath(); c.arc(cx, cy, r*0.9, 0, Math.PI*2);
                    c.fillStyle = gr; c.fill();

                    // gloss
                    const gloss = c.createRadialGradient(cx-r*0.25, cy-r*0.3, 0, cx, cy, r*0.9);
                    gloss.addColorStop(0,   'rgba(255,255,255,0.38)');
                    gloss.addColorStop(0.45,'rgba(255,255,255,0.0)');
                    c.beginPath(); c.arc(cx, cy, r*0.9, 0, Math.PI*2);
                    c.fillStyle = gloss; c.fill();

                    // border
                    c.beginPath(); c.arc(cx, cy, r*0.9, 0, Math.PI*2);
                    c.strokeStyle = 'rgba(255,255,255,0.4)'; c.lineWidth = 1.5; c.stroke();
                }
            }
        }
    }

    // winner flash overlay on board canvas
    function flashWinners(cells, color) {
        let tick = 0;
        const iv = setInterval(() => {
            // just pulse brightness — redraw handled by game
            cells.forEach(([row, col]) => {
                if (!slotLayout.length) return;
                const {cx, cy, r} = slotLayout[row*7+col];
                const a = tick % 2 === 0 ? 0.55 : 0;
                boardCtx.beginPath(); boardCtx.arc(cx, cy, r*0.88, 0, Math.PI*2);
                boardCtx.fillStyle = `rgba(255,255,255,${a})`; boardCtx.fill();
            });
            tick++;
            if (tick > 7) clearInterval(iv);
        }, 200);
    }

    // ════════════════════════════════════════
    // AUDIO
    // ════════════════════════════════════════
    class GameAudio {
        constructor() { this.ctx = null; this.ok = false; }
        init() {
            if (this.ok) return;
            try { this.ctx = new (window.AudioContext||window.webkitAudioContext)(); this.ok = true; } catch(e){}
        }
        _go() { this.init(); if (this.ctx?.state==='suspended') try{this.ctx.resume();}catch(e){} }
        drop() {
            this._go(); if (!this.ctx) return;
            try {
                const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination); o.type='sine';
                o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(60,t+0.12);
                g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.18);
                o.start(t); o.stop(t+0.18);
            }catch(e){}
        }
        win() {
            this._go(); if (!this.ctx) return;
            try {
                const t=this.ctx.currentTime;
                [{f:523,d:0,l:.2},{f:659,d:.15,l:.2},{f:784,d:.3,l:.2},{f:1047,d:.45,l:.4}].forEach(n=>{
                    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
                    o.connect(g); g.connect(this.ctx.destination); o.type='sine';
                    o.frequency.setValueAtTime(n.f,t+n.d);
                    g.gain.setValueAtTime(0.18,t+n.d); g.gain.exponentialRampToValueAtTime(0.01,t+n.d+n.l);
                    o.start(t+n.d); o.stop(t+n.d+n.l);
                });
            }catch(e){}
        }
    }

    // ════════════════════════════════════════
    // CONNECT FOUR GAME
    // ════════════════════════════════════════
    class ConnectFour {
        constructor() {
            this.ROWS=6; this.COLS=7;
            this.grid=[]; this.cur=1;
            this.live=false; this.aiTurn=false;
            this.scores={1:0,2:0};
            this.sfx=new GameAudio();
            this.aiFirst=false;
            this.diff='hard';
            this._scoreTab='hard';

            this.elStatus  = document.getElementById('status');
            this.elScore   = document.getElementById('scoreDisplay');
            this.btnRestart= document.getElementById('restartBtn');
            this.btnNew    = document.getElementById('newGameBtn');
            this.btnToggle = document.getElementById('toggleFirstBtn');
            this.btnEasy   = document.getElementById('diffEasy');
            this.btnMed    = document.getElementById('diffMedium');
            this.btnHard   = document.getElementById('diffHard');

            this.bindUI();
            this.sfx.init();
            this.checkDayReset();

            const saved = (this.loadToday()[this.diff]||{w:0,l:0});
            this.scores = {1:saved.w, 2:saved.l};

            this.newGame();
            this.initScoreboardUI();
            this.renderScoreboard();
        }

        bindUI() {
            this.btnRestart.addEventListener('click', ()=>this.restart());
            this.btnNew.addEventListener('click',     ()=>this.newGame());
            this.btnToggle.addEventListener('click',  ()=>this.toggleFirst());
            this.btnEasy.addEventListener('click',    ()=>this.setDiff('easy'));
            this.btnMed.addEventListener('click',     ()=>this.setDiff('medium'));
            this.btnHard.addEventListener('click',    ()=>this.setDiff('hard'));
        }

        setDiff(d) {
            this.diff=d;
            [this.btnEasy,this.btnMed,this.btnHard].forEach(b=>b.classList.remove('active'));
            ({easy:this.btnEasy,medium:this.btnMed,hard:this.btnHard})[d].classList.add('active');
            document.querySelector('#player2 span').textContent =
                ({easy:'AI (Εύκολο)',medium:'AI (Μέτριο)',hard:'AI (Πολύ Δύσκολο)'})[d];
            const tabId = ({easy:'tabEasy',medium:'tabMedium',hard:'tabHard'})[d];
            document.querySelectorAll('.score-tab').forEach(t=>t.classList.remove('active'));
            document.getElementById(tabId)?.classList.add('active');
            this._scoreTab=d;
            const sv=this.loadToday()[d]||{w:0,l:0};
            this.scores={1:sv.w,2:sv.l}; this.updateScore();
            this.renderScoreboard(); this.restart();
        }

        setBtns(en) {
            [this.btnRestart,this.btnNew,this.btnToggle,this.btnEasy,this.btnMed,this.btnHard]
                .forEach(b=>{if(b)b.disabled=!en;});
        }

        toggleFirst() {
            this.aiFirst=!this.aiFirst;
            this.btnToggle.textContent=this.aiFirst?'👤 Εσύ Πρώτος':'🤖 AI Πρώτο';
            this.newGame();
        }

        buildGrid() {
            this.grid=Array(this.ROWS).fill(null).map(()=>Array(this.COLS).fill(0));

            // Build clickable invisible overlay cells on top of boardCanvas
            const domBoard = document.getElementById('board');
            domBoard.innerHTML='';
            for (let r=0;r<this.ROWS;r++) {
                for (let c=0;c<this.COLS;c++) {
                    const cell=document.createElement('div');
                    cell.style.cssText='border-radius:50%;cursor:pointer;';
                    cell.addEventListener('click',()=>this.play(c));
                    domBoard.appendChild(cell);
                }
            }

            // Draw the board for the first time
            setTimeout(()=>{ drawBoard(this.grid); }, 30);

            this.live=true; this.cur=1;
            if (this.aiFirst) { this.cur=2; this.tick(); this.doAI(); }
            else this.tick();
        }

        play(col) {
            if (!this.live||this.aiTurn) return;
            const row=this.freeRow(col); if(row===-1) return;
            this.drop(row,col,this.cur);
        }

        drop(row,col,player) {
            this.grid[row][col]=player;
            this.sfx.drop();

            // animate the disc dropping then redraw board
            this.animDrop(row,col,player,()=>{
                drawBoard(this.grid);
                if (this.checkWin(row,col)) { this.doWin(row,col); return; }
                if (this.checkDraw())        { this.doDraw(); return; }
                this.cur = this.cur===1?2:1;
                this.tick();
                if (this.cur===2&&this.live) this.doAI();
            });
        }

        /* Animate a disc falling from top of container down to its row.
           We create a temporary absolutely-positioned canvas disc, tween it,
           then call the callback when done. */
        animDrop(row, col, player, cb) {
            if (!slotLayout.length) { cb(); return; }
            const container = document.getElementById('boardContainer');
            const {cx,cy,r} = slotLayout[row*this.COLS+col];
            const {cy:topCy} = slotLayout[col]; // top row same column

            const el = document.createElement('canvas');
            el.width = el.height = r*2+4;
            const ec = el.getContext('2d');
            const er = r*0.9;
            const ex = er+2, ey = er+2;
            // draw disc on temp canvas
            const gr = ec.createRadialGradient(ex-er*0.2,ey-er*0.2,er*0.05,ex,ey,er);
            if (player===1){ gr.addColorStop(0,'#ff6060'); gr.addColorStop(1,'#b71c1c'); }
            else            { gr.addColorStop(0,'#fff176'); gr.addColorStop(1,'#f57f17'); }
            ec.beginPath(); ec.arc(ex,ey,er,0,Math.PI*2); ec.fillStyle=gr; ec.fill();
            const gloss=ec.createRadialGradient(ex-er*.25,ey-er*.3,0,ex,ey,er);
            gloss.addColorStop(0,'rgba(255,255,255,.38)'); gloss.addColorStop(.45,'rgba(255,255,255,0)');
            ec.beginPath(); ec.arc(ex,ey,er,0,Math.PI*2); ec.fillStyle=gloss; ec.fill();
            ec.beginPath(); ec.arc(ex,ey,er,0,Math.PI*2);
            ec.strokeStyle='rgba(255,255,255,.4)'; ec.lineWidth=1.5; ec.stroke();

            el.style.cssText=`position:absolute;left:${cx-r-2}px;top:${-r*2-4}px;z-index:10;pointer-events:none;border-radius:50%;`;
            container.appendChild(el);

            const startY = topCy - r - (r*2);
            const endY   = cy - r - 2;
            const dist   = endY - startY;
            const dur    = 320;
            let t0 = null;

            function frame(ts) {
                if (!t0) t0=ts;
                const p = Math.min((ts-t0)/dur, 1);
                // ease: accelerate then bounce
                let y;
                if (p < 0.75) {
                    y = startY + dist * (p/0.75) * (p/0.75) * 0.75;
                } else {
                    const q = (p-0.75)/0.25;
                    y = startY + dist * (1 + Math.sin(q*Math.PI)*0.08*(1-q));
                }
                el.style.top = y+'px';
                if (p < 1) requestAnimationFrame(frame);
                else { el.remove(); cb(); }
            }
            requestAnimationFrame(frame);
        }

        freeRow(col) {
            for (let r=this.ROWS-1;r>=0;r--) if(!this.grid[r][col]) return r;
            return -1;
        }

        tick() {
            if (!this.live) return;
            this.elStatus.innerHTML = this.cur===2
                ? '<span class="ai-thinking">Το AI σκέφτεται...</span>'
                : 'Η σειρά σου';
            document.getElementById('player1').classList.toggle('active',this.cur===1);
            document.getElementById('player2').classList.toggle('active',this.cur===2);
        }

        checkWin(row,col) {
            const p=this.grid[row][col], dirs=[[0,1],[1,0],[1,1],[1,-1]];
            for (const [dr,dc] of dirs) {
                let cnt=1, cells=[[row,col]];
                for (const s of [1,-1]) {
                    let r=row+dr*s, c=col+dc*s;
                    while(r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.grid[r][c]===p){
                        cnt++; cells.push([r,c]);
                        if(cnt>=4){this._winCells=cells; return true;}
                        r+=dr*s; c+=dc*s;
                    }
                }
            }
            return false;
        }
        checkDraw() { return this.grid[0].every(c=>c!==0); }

        doWin(row,col) {
            this.live=false;
            this.scores[this.cur]++;
            this.updateScore();
            this.sfx.win();
            this.confetti();
            flashWinners(this._winCells, this.cur===1?'red':'yellow');
            const txt = this.cur===1?'🎉 Κέρδισες!':'😞 Κέρδισε το AI';
            this.elStatus.textContent = this.cur===1?'Κέρδισες! 🎉':'Κέρδισε το AI! 😞';
            this.endGame(txt);
        }
        doDraw() {
            this.live=false;
            this.elStatus.textContent='Ισοπαλία! 🤝';
            this.endGame('🤝 Ισοπαλία!');
        }
        endGame(emoji) {
            this.saveToday(); this.renderScoreboard(); this.setBtns(true);
            setTimeout(()=>{ showAdModal(emoji,()=>this.restart(),()=>this.newGame()); }, 1400);
        }

        updateScore() { this.elScore.textContent=`${this.scores[1]} - ${this.scores[2]}`; }

        confetti() {
            for (let i=0;i<60;i++) {
                const el=document.createElement('div'); el.className='confetti';
                el.style.left=Math.random()*100+'vw';
                el.style.animationDelay=Math.random()*0.5+'s';
                el.style.animationDuration=(Math.random()*2+2)+'s';
                document.body.appendChild(el);
                setTimeout(()=>el.remove(),3500);
            }
        }

        // ── AI ──
        doAI() {
            this.aiTurn=true;
            const delay=this.diff==='easy'?Math.random()*800+600:Math.random()*400+300;
            setTimeout(()=>{
                if(!this.live){this.aiTurn=false;return;}
                const col=this.aiMove(); this.aiTurn=false; this.drop(this.freeRow(col),col,2);
            },delay);
        }
        aiMove() {
            const v=[]; for(let c=0;c<this.COLS;c++) if(this.freeRow(c)!==-1)v.push(c);
            if(this.diff==='easy'){
                if(Math.random()<.7)return v[Math.floor(Math.random()*v.length)];
                for(const c of v){const r=this.freeRow(c);this.grid[r][c]=2;if(this.simWin(r,c,2)){this.grid[r][c]=0;return c;}this.grid[r][c]=0;}
                for(const c of v){const r=this.freeRow(c);this.grid[r][c]=1;if(this.simWin(r,c,1)){this.grid[r][c]=0;return c;}this.grid[r][c]=0;}
                return v[Math.floor(Math.random()*v.length)];
            }
            for(const c of v){const r=this.freeRow(c);this.grid[r][c]=2;if(this.simWin(r,c,2)){this.grid[r][c]=0;return c;}this.grid[r][c]=0;}
            for(const c of v){const r=this.freeRow(c);this.grid[r][c]=1;if(this.simWin(r,c,1)){this.grid[r][c]=0;return c;}this.grid[r][c]=0;}
            if(this.diff==='medium'&&Math.random()<.3)return v[Math.floor(Math.random()*v.length)];
            const depth=this.diff==='medium'?3:5;
            let best=-Infinity,cols=[v[0]];
            for(const c of v){const r=this.freeRow(c);this.grid[r][c]=2;const s=this.mm(depth,false,-Infinity,Infinity);this.grid[r][c]=0;if(s>best){best=s;cols=[c];}else if(s===best)cols.push(c);}
            return cols[Math.floor(Math.random()*cols.length)];
        }
        simWin(row,col,p){
            const dirs=[[0,1],[1,0],[1,1],[1,-1]];
            for(const[dr,dc]of dirs){let cnt=1;for(const s of[1,-1]){let r=row+dr*s,c=col+dc*s;while(r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.grid[r][c]===p){cnt++;if(cnt>=4)return true;r+=dr*s;c+=dc*s;}}}
            return false;
        }
        mm(depth,isMax,a,b){
            const sc=this.eval();
            if(depth===0||this.checkDraw())return sc;
            if(Math.abs(sc)>5000)return sc;
            const v=[];for(let c=0;c<this.COLS;c++)if(this.freeRow(c)!==-1)v.push(c);
            if(isMax){let m=-Infinity;for(const c of v){const r=this.freeRow(c);this.grid[r][c]=2;const e=this.mm(depth-1,false,a,b);this.grid[r][c]=0;m=Math.max(m,e);a=Math.max(a,e);if(b<=a)break;}return m;}
            else{let m=Infinity;for(const c of v){const r=this.freeRow(c);this.grid[r][c]=1;const e=this.mm(depth-1,true,a,b);this.grid[r][c]=0;m=Math.min(m,e);b=Math.min(b,e);if(b<=a)break;}return m;}
        }
        eval(){
            let s=0,mid=Math.floor(this.COLS/2),mc=0;
            for(let r=0;r<this.ROWS;r++){if(this.grid[r][mid]===2)mc++;else if(this.grid[r][mid]===1)mc--;}
            s+=mc*4;
            for(let r=0;r<this.ROWS;r++)for(let c=0;c<this.COLS-3;c++)s+=this.ew([this.grid[r][c],this.grid[r][c+1],this.grid[r][c+2],this.grid[r][c+3]]);
            for(let c=0;c<this.COLS;c++)for(let r=0;r<this.ROWS-3;r++)s+=this.ew([this.grid[r][c],this.grid[r+1][c],this.grid[r+2][c],this.grid[r+3][c]]);
            for(let r=0;r<this.ROWS-3;r++)for(let c=0;c<this.COLS-3;c++){s+=this.ew([this.grid[r][c],this.grid[r+1][c+1],this.grid[r+2][c+2],this.grid[r+3][c+3]]);s+=this.ew([this.grid[r+3][c],this.grid[r+2][c+1],this.grid[r+1][c+2],this.grid[r][c+3]]);}
            return s;
        }
        ew(w){
            let s=0;const ai=w.filter(c=>c===2).length,pl=w.filter(c=>c===1).length,em=w.filter(c=>c===0).length;
            if(ai===4)return 10000;if(pl===4)return -10000;
            if(ai===3&&em===1)s+=50;else if(ai===2&&em===2)s+=10;
            if(pl===3&&em===1)s-=80;else if(pl===2&&em===2)s-=15;
            return s;
        }

        // ── PERSISTENCE ──
        todayKey(){const d=new Date();return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
        loadAll(){try{return JSON.parse(localStorage.getItem('cf_all')||'{}');}catch{return{};}}
        saveAll(a){try{localStorage.setItem('cf_all',JSON.stringify(a));}catch{}}
        checkDayReset(){
            const last=(()=>{try{return localStorage.getItem('cf_lastday');}catch{return'';}})()??'';
            const today=this.todayKey();
            if(last&&last!==today){
                const all=this.loadAll(),saved=JSON.parse(localStorage.getItem('cf_today')||'{}');
                if(Object.keys(saved).length){all[last]=saved;const ks=Object.keys(all).sort().slice(-14);const t={};ks.forEach(k=>t[k]=all[k]);this.saveAll(t);}
                try{localStorage.removeItem('cf_today');}catch{}
            }
            try{localStorage.setItem('cf_lastday',today);}catch{}
        }
        loadToday(){try{return JSON.parse(localStorage.getItem('cf_today')||'{}');}catch{return{};}}
        saveToday(){
            const t=this.loadToday();
            if(!t[this.diff])t[this.diff]={w:0,l:0};
            t[this.diff].w=this.scores[1]; t[this.diff].l=this.scores[2];
            try{localStorage.setItem('cf_today',JSON.stringify(t));}catch{}
        }

        renderScoreboard(){
            const tab=this._scoreTab||this.diff;
            const el=document.getElementById('scoreboardContent'); if(!el)return;
            const tk=this.todayKey(),ts=this.loadToday(),all=this.loadAll();
            const combined=Object.assign({},all);
            if(Object.keys(ts).length)combined[tk]=ts;
            const rows=Object.keys(combined).sort().reverse()
                .map(d=>({d,v:(combined[d]||{})[tab]||null})).filter(r=>r.v);
            if(!rows.length){el.innerHTML='<div class="no-history">Δεν υπάρχει ιστορικό για αυτή τη δυσκολία.</div>';return;}
            let h='<table class="score-table"><thead><tr><th>📅 Ημερομηνία</th><th class="win">✅ Νίκες</th><th class="loss">❌ Ήττες</th></tr></thead><tbody>';
            rows.forEach(r=>{
                const it=r.d===tk,cls=it?'today-row':'',lb=it?'🟢 Σήμερα':r.d;
                h+=`<tr class="${cls}"><td>${lb}</td><td class="win">${r.v.w}</td><td class="loss">${r.v.l}</td></tr>`;
            });
            el.innerHTML=h+'</tbody></table>';
        }

        initScoreboardUI(){
            [{id:'tabEasy',d:'easy'},{id:'tabMedium',d:'medium'},{id:'tabHard',d:'hard'}].forEach(({id,d})=>{
                document.getElementById(id)?.addEventListener('click',()=>{
                    document.querySelectorAll('.score-tab').forEach(t=>t.classList.remove('active'));
                    document.getElementById(id).classList.add('active');
                    this._scoreTab=d; this.renderScoreboard();
                });
            });
            const modal=document.getElementById('scoreModal');
            document.getElementById('openScoreboardBtn')?.addEventListener('click',()=>{this.renderScoreboard();modal.classList.add('open');});
            document.getElementById('closeScoreboardBtn')?.addEventListener('click',()=>modal.classList.remove('open'));
            modal?.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open');});
        }

        restart(){
            this.cur=1; this.aiTurn=false; this.live=false;
            document.querySelectorAll('.confetti').forEach(c=>c.remove());
            this.setBtns(true);
            this.buildGrid();
        }
        newGame(){ this.restart(); }
    }

    // ── BOOT ──
    try { initBg(); } catch(e) { console.error(e); }
    try { window._game = new ConnectFour(); } catch(e) { console.error(e); }

    // Redraw board on resize
    window.addEventListener('resize', () => {
        if (window._game) drawBoard(window._game.grid);
    });

})();
</script>
</body>
</html>
