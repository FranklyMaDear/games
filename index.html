<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Games Franklymadear - Gamified</title>
    <link rel="icon" type="image/png" sizes="32x32" href="photo.png">
    <link rel="apple-touch-icon" href="photo.png">
    <meta name="theme-color" content="#1a1a2e">
    <script src="https://omg10.com/4/10274068" data-site-id="3062566"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* fixed header */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: rgba(15,12,41,0.95); backdrop-filter: blur(10px);
            padding: 10px 15px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #f1c40f;
        }
        .energy-bar { flex: 1; margin: 0 15px; }
        .energy-text { font-size: 0.8rem; color: #f1c40f; }
        .progress-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-top: 3px; }
        .progress-fg { height: 100%; width: 0%; background: linear-gradient(90deg, #f1c40f, #e74c3c); border-radius: 5px; transition: width 0.5s; }
        .wallet { display: flex; align-items: center; gap: 5px; color: #f1c40f; font-weight: bold; }
        /* main content */
        .main-content { padding: 80px 15px 80px; max-width: 500px; margin: 0 auto; }
        /* action grid */
        .action-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 15px; margin: 20px 0; }
        .action-btn {
            background: rgba(255,255,255,0.1); border-radius: 20px; padding: 15px 10px;
            text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2);
        }
        .action-btn:active { transform: scale(0.95); }
        .action-icon { font-size: 2rem; margin-bottom: 5px; }
        .action-label { font-size: 0.7rem; font-weight: bold; }
        /* board/path */
        .path { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; }
        .step {
            width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
        }
        .step.completed { background: #27ae60; }
        /* bottom bar */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000;
            background: rgba(15,12,41,0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 2px solid #f1c40f;
        }
        .tab {
            display: flex; flex-direction: column; align-items: center; color: #aaa; cursor: pointer;
            font-size: 0.7rem; transition: 0.3s;
        }
        .tab i { font-size: 1.2rem; margin-bottom: 2px; }
        .tab.active { color: #f1c40f; }
        /* games section */
        .games-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; margin-top: 15px; }
        .game-card {
            background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; text-align: center;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2);
        }
        .game-card:active { transform: scale(0.95); }
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #f1c40f; color: #000; padding: 10px 25px; border-radius: 30px;
            font-weight: bold; z-index: 2000; animation: slideUp 0.5s, fadeOut 0.5s 2.5s forwards;
        }
        @keyframes slideUp { from { bottom: 0; opacity: 0; } to { bottom: 80px; opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; } }
        .hidden { display: none; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="energy-bar">
            <div class="energy-text">⚡ <span id="energyVal">0</span>/<span id="maxEnergy">300</span></div>
            <div class="progress-bg"><div class="progress-fg" id="energyProgress"></div></div>
        </div>
        <div class="wallet">💰 <span id="pointsDisplay">0</span></div>
    </div>

    <div class="main-content">
        <!-- Action Grid -->
        <div class="action-grid">
            <div class="action-btn" onclick="handleAction('claim')">
                <div class="action-icon">🎁</div><div class="action-label">CLAIM</div>
            </div>
            <div class="action-btn" onclick="showStreak()">
                <div class="action-icon">🔥</div><div class="action-label">STREAK</div>
            </div>
            <div class="action-btn" onclick="handleAction('gift')">
                <div class="action-icon">🎀</div><div class="action-label">GIFTS</div>
            </div>
            <div class="action-btn" onclick="handleAction('wheel')">
                <div class="action-icon">🎡</div><div class="action-label">WHEEL</div>
            </div>
        </div>

        <!-- Dynamic content area -->
        <div id="tab-content"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-bar">
        <div class="tab active" data-tab="board"><i class="fas fa-road"></i> BOARD</div>
        <div class="tab" data-tab="games"><i class="fas fa-gamepad"></i> GAMES</div>
        <div class="tab" data-tab="shop"><i class="fas fa-store"></i> SHOP</div>
        <div class="tab" data-tab="season"><i class="fas fa-calendar-alt"></i> SEASON</div>
        <div class="tab" data-tab="rewards"><i class="fas fa-trophy"></i> REWARDS</div>
    </div>

    <script>
        const API_ENDPOINT = "https://franklymadear-games.hf.space";
        const API_KEY = "m0n3t4g_s3cur3_k3y_2026";
        let userId = localStorage.getItem('franklymadear_userId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
            localStorage.setItem('franklymadear_userId', userId);
        }

        async function apiCall(method, path, body = null) {
            const headers = { 'Content-Type': 'application/json', 'X-API-Key': API_KEY };
            const res = await fetch(API_ENDPOINT + path, { method, headers, body: body ? JSON.stringify(body) : null });
            if (!res.ok) {
                const err = await res.json();
                showToast(err.detail || 'Error');
                throw new Error(err.detail);
            }
            return res.json();
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        // Energy & points
        async function loadEnergy() {
            const data = await apiCall('GET', `/energy?userId=${userId}`);
            document.getElementById('energyVal').textContent = data.current_energy;
            document.getElementById('maxEnergy').textContent = data.max_energy;
            document.getElementById('energyProgress').style.width = (data.current_energy / data.max_energy * 100) + '%';
        }
        async function loadPoints() {
            const data = await apiCall('GET', `/points/${userId}`);
            document.getElementById('pointsDisplay').textContent = data.total_points;
        }
        async function refreshUI() { await loadEnergy(); await loadPoints(); }

        // Actions
        function showAdThen(callback) {
            if (typeof monetag !== 'undefined' && monetag.rewardedAd) {
                monetag.rewardedAd({
                    zoneId: "11090314",
                    onReward: callback,
                    onError: () => showToast('Ad failed – try again later')
                });
            } else {
                // fallback for testing
                callback();
            }
        }

        async function handleAction(type) {
            if (type === 'claim') {
                showAdThen(async () => {
                    const data = await apiCall('POST', '/daily_claim', { userId });
                    showToast(`Daily bonus: +${data.bonus_points} pts, +${data.bonus_energy}⚡`);
                    refreshUI();
                });
            } else if (type === 'gift') {
                showAdThen(async () => {
                    const data = await apiCall('POST', '/gift', { userId });
                    showToast(`Gift: ${data.reward_type} +${data.amount}`);
                    refreshUI();
                });
            } else if (type === 'wheel') {
                showAdThen(async () => {
                    const data = await apiCall('POST', '/wheel', { userId });
                    showToast(`Wheel: ${data.prize.type} +${data.prize.amount}`);
                    refreshUI();
                });
            }
        }

        async function showStreak() {
            const data = await apiCall('GET', `/streak?userId=${userId}`);
            showToast(`🔥 Streak: ${data.streak} days`);
        }

        // Tab rendering
        async function renderTab(tab) {
            const content = document.getElementById('tab-content');
            content.innerHTML = '';
            if (tab === 'board') {
                const board = await apiCall('GET', `/board?userId=${userId}`);
                let html = '<h3>Progress Path</h3><div class="path">';
                for (let i = 1; i <= board.total_steps; i++) {
                    html += `<div class="step ${i <= board.steps_completed ? 'completed' : ''}">${i}</div>`;
                }
                html += '</div>';
                content.innerHTML = html;
            } else if (tab === 'games') {
                content.innerHTML = '<h3>Choose a Game</h3><div class="games-grid" id="gamesGrid"></div>';
                const games = [
                    {name:"Crack The Code", url:"/code/index.html", icon:"🔐"},
                    {name:"Crack The Code Kids", url:"/codekids/index.html", icon:"🧸"},
                    {name:"Crack The Code Words", url:"/codewords/index.html", icon:"📝"},
                    {name:"Chess", url:"/chess/index.html", icon:"♔"},
                    {name:"Animals", url:"/animals/index.html", icon:"🐾"},
                    {name:"Connect 4", url:"/4x4/connect4.html", icon:"🔴"},
                    {name:"Balloons", url:"/balloon/index.html", icon:"🎈"},
                    {name:"Sudoku", url:"/sudoku/sudoku.html", icon:"🔢"}
                ];
                const grid = document.getElementById('gamesGrid');
                games.forEach(g => {
                    const card = document.createElement('div'); card.className = 'game-card';
                    card.innerHTML = `<div style="font-size:2rem">${g.icon}</div><div>${g.name}</div>`;
                    card.onclick = () => {
                        showAdThen(async () => {
                            try {
                                const data = await apiCall('POST', '/log', { userId, game: g.name });
                                showToast(`+${data.points_earned} pts (x${data.multiplier})`);
                                refreshUI();
                                window.open('https://games.franklymadear.com' + g.url, '_blank');
                            } catch(e) {}
                        });
                    };
                    grid.appendChild(card);
                });
            } else if (tab === 'shop') {
                const shop = await apiCall('GET', '/shop');
                let html = '<h3>Shop</h3>';
                shop.items.forEach(item => html += `<p>${item.name} - ${item.cost} pts</p>`);
                content.innerHTML = html;
            } else if (tab === 'season') {
                const season = await apiCall('GET', '/season');
                content.innerHTML = `<h3>Season ${season.season}</h3><p>Ends in ${season.ends_in_days} days</p>`;
            } else if (tab === 'rewards') {
                const rewards = await apiCall('GET', '/rewards');
                let html = '<h3>Rewards</h3>';
                rewards.rewards.forEach(r => html += `<p>${r.name} - ${r.description}</p>`);
                content.innerHTML = html;
            }
        }

        // Bottom nav switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderTab(tab.dataset.tab);
            });
        });

        // Initial load
        refreshUI();
        renderTab('board');
        setInterval(refreshUI, 10000); // refresh energy every 10s
    </script>
</body>
</html>
