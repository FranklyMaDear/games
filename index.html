<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FranklyGames</title>
    <link rel="icon" type="image/png" sizes="32x32" href="photo.png">
    <link rel="apple-touch-icon" href="photo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121214">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="//libtl.com/sdk.js" data-zone="11108267" data-sdk="show_11108267"></script>

    <style>
        :root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1d;
            --bg-tertiary: #1f1f23;
            --bg-card: #18181b;
            --border-default: #2a2a2f;
            --border-hover: #84cc16;
            --neon: #84cc16;
            --neon-glow: rgba(132, 204, 22, 0.5);
            --neon-soft: rgba(132, 204, 22, 0.2);
            --text-primary: #e8e8ed;
            --text-secondary: #b0b0b8;
            --text-muted: #787880;
            --gold: #f59e0b;
            --gold-bright: #fbbf24;
            --star-orange: #ff6d3a;
            --accent-royal: #6366f1;
            --accent-fuchsia: #d946ef;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --radius-xl: 16px;
            --radius-lg: 14px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --radius-pill: 50px;
            --font-tech: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: var(--font-tech);
            overflow-x: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            padding-top: 70px;
            padding-bottom: 85px;
            background: var(--bg-primary);
            background-attachment: fixed;
        }

        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(13, 13, 15, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-default);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
        }

        .level-box {
            flex: 1;
        }

        .level-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.68rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .progress-bg {
            width: 100%;
            height: 7px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-default);
        }

        .progress-fg {
            height: 100%;
            width: 0%;
            background: var(--neon);
            border-radius: 20px;
            transition: width 0.5s;
            box-shadow: 0 0 12px var(--neon-glow), 0 0 30px var(--neon-soft);
        }

        .wallet {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg-tertiary);
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            font-weight: 700;
            color: var(--text-primary);
            border: 1px solid var(--border-default);
            font-size: 0.75rem;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .wallet-stars {
            color: var(--star-orange);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 12px 20px;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-size: 1.3rem;
            color: var(--text-primary);
            text-align: center;
            margin: 14px 0;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--neon-soft);
        }

        .top-buttons-box {
            display: flex;
            gap: 8px;
            justify-content: center;
            width: 92%;
            max-width: 420px;
            margin: 0 auto 10px auto;
            position: relative;
            z-index: 10;
        }

        .dark-action-btn {
            flex: 1;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-weight: 700;
            font-size: 12px;
            padding: 12px 6px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.4px;
        }

        .dark-action-btn:hover {
            border-color: var(--neon);
            box-shadow: 0 0 18px var(--neon-soft), 0 0 35px rgba(132, 204, 22, 0.1);
            color: var(--neon);
            transform: translateY(-2px);
        }

        .dark-action-btn:active {
            transform: scale(0.95);
            border-color: var(--neon);
            box-shadow: 0 0 25px var(--neon-glow);
        }

        .category-title {
            font-size: 0.9rem;
            color: var(--neon);
            margin: 22px 0 10px;
            padding-left: 10px;
            border-left: 3px solid var(--neon);
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            text-shadow: 0 0 12px var(--neon-soft);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            padding: 20px 10px 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            min-height: 130px;
            position: relative;
            overflow: hidden;
        }

        .game-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(132, 204, 22, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .game-card:hover {
            border-color: var(--neon);
            box-shadow: 0 0 25px var(--neon-soft), 0 8px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-4px);
        }

        .game-card:active {
            transform: scale(0.96);
            border-color: var(--neon);
            box-shadow: 0 0 35px var(--neon-glow);
        }

        .game-card .game-icon {
            font-size: 2.6rem;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 14px var(--neon-glow), 0 0 28px rgba(132, 204, 22, 0.3);
            filter: drop-shadow(0 0 10px var(--neon-soft));
            transition: all 0.3s;
        }

        .game-card h3 {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 3px;
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 0 #000, 0 0 14px rgba(132, 204, 22, 0.4);
            letter-spacing: 0.5px;
        }

        .game-card p {
            color: var(--text-muted);
            font-size: 0.72rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .section {
            display: none;
        }
        .section.active {
            display: block;
        }

        /* Avatar System Styles */
        .avatar-preview {
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .cat-container {
            position: relative;
            display: inline-block;
            width: 150px;
            height: 150px;
        }

        .cat-body {
            font-size: 8rem;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: catIdle 2s ease-in-out infinite;
            filter: drop-shadow(0 6px 15px rgba(0, 0, 0, 0.4));
        }

        @keyframes catIdle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .cat-hat, .cat-glasses, .cat-outfit {
            position: absolute;
            z-index: 3;
        }
        .cat-hat { top: -25px; left: 50%; transform: translateX(-50%); font-size: 2.5rem; }
        .cat-glasses { top: 55px; left: 50%; transform: translateX(-50%); font-size: 2rem; }
        .cat-outfit { top: 80px; left: 50%; transform: translateX(-50%); font-size: 3rem; z-index: 1; }

        .happiness-bar {
            width: 80%;
            height: 10px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            margin: 10px auto;
            overflow: hidden;
            border: 1px solid var(--border-default);
        }
        .happiness-fill {
            height: 100%;
            width: 50%;
            background: var(--neon);
            border-radius: 10px;
            transition: width 0.5s;
            box-shadow: 0 0 10px var(--neon-soft);
        }

        .avatar-tabs { display: flex; justify-content: center; gap: 8px; margin: 14px 0; }
        .avatar-tab {
            padding: 10px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-pill) var(--radius-pill) 0 0;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .avatar-tab.active {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--neon);
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon-soft);
        }

        .shop-grid, .wardrobe-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 8px;
        }
        .shop-item, .wardrobe-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .shop-item:hover, .wardrobe-item:hover {
            border-color: var(--neon);
            box-shadow: 0 0 15px var(--neon-soft);
            transform: scale(1.03);
        }
        .item-icon { font-size: 2.5rem; }
        .item-name { font-size: 0.7rem; font-weight: 700; color: var(--text-primary); margin: 4px 0; }
        .item-price { font-size: 0.65rem; color: var(--star-orange); font-weight: 700; }
        
        .buy-btn, .equip-btn {
            margin-top: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .buy-btn { background: var(--gold); color: #000; }
        .equip-btn { background: var(--neon); color: #000; }
        .equip-btn.unequip { background: var(--accent-red); color: #fff; }

        .board-iframe-container {
            width: 100%;
            height: calc(100vh - 160px);
            border: 1px solid var(--border-default);
            background: #0a0e27;
            margin: 0 auto;
        }
        .board-iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Welcome Full Screen */
        .welcome-full-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .welcome-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 24px;
            padding: 40px 24px 32px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px var(--neon-soft);
            animation: welcomeFadeIn 0.8s ease-out;
        }
        .welcome-title {
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-primary);
            margin: 16px 0 8px;
        }
        .btn-lets-play {
            padding: 16px 40px;
            background: var(--neon);
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            box-shadow: 0 0 25px var(--neon-glow);
            transition: all 0.25s;
            text-transform: uppercase;
            width: 100%;
            margin-top: 20px;
        }

        /* Bottom Navbar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(13, 13, 15, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--border-default);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            gap: 4px;
        }
        .nav-tab i { font-size: 1.4rem; }
        .nav-tab.active { color: var(--neon); }

        /* Pop-up Banner */
        .popup-banner {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            background: rgba(26, 26, 29, 0.95);
            border: 1px solid var(--border-default);
            padding: 10px 20px;
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        .popup-banner.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header class="glass-header">
        <div class="level-box">
            <div class="level-label">
                <span>Επίπεδο <span id="levelVal">1</span></span>
                <span><span id="levelPts">0</span> / 1000 XP</span>
            </div>
            <div class="progress-bg"><div class="progress-fg" id="levelProgress"></div></div>
        </div>
        <div class="wallet"><span class="wallet-stars">🪙</span> <span id="pointsDisplay">0</span></div>
        <div class="wallet"><span class="wallet-stars">⭐</span> <span id="starsDisplay">0</span></div>
    </header>

    <main class="main-container">

        <section id="section-hub" class="section active">
            <h2 class="section-title">FranklyGames Hub</h2>
            
            <div class="category-title">Παιχνίδια & Εξερεύνηση</div>
            <div class="games-grid">
                <a class="game-card" onclick="navigateTo('board')">
                    <div class="game-icon">🎲</div>
                    <h3>Board Game</h3>
                    <p>Ρίξε το ζάρι και μάζεψε πόντους!</p>
                </a>
                <a class="game-card" onclick="navigateTo('avatar')">
                    <div class="game-icon">🐱</div>
                    <h3>AZIRAM World</h3>
                    <p>Φρόντισε τον AZIRAM!</p>
                </a>
            </div>
        </section>

        <section id="section-board" class="section">
            <h2 class="section-title">Επιτραπέζιο Παιχνίδια</h2>
            <div class="board-iframe-container">
                <iframe src="board/index.html" id="boardIframe"></iframe>
            </div>
        </section>

        <section id="section-avatar" class="section">
            <h2 class="section-title">AZIRAM Κόσμος</h2>
            <div class="avatar-preview">
                <div class="cat-container">
                    <div class="cat-body" id="catBody">🐱</div>
                    <div class="cat-hat" id="equippedHat"></div>
                    <div class="cat-glasses" id="equippedGlasses"></div>
                    <div class="cat-outfit" id="equippedOutfit"></div>
                </div>
                <div class="happiness-bar"><div class="happiness-fill" id="happinessFill"></div></div>
                <p style="font-size:0.8rem; color:var(--text-secondary);">Χαρά του AZIRAM: <span id="happinessText">50%</span></p>
            </div>

            <div class="avatar-tabs">
                <div class="avatar-tab active" onclick="switchAvatarTab('shop')">Κατάστημα</div>
                <div class="avatar-tab" onclick="switchAvatarTab('wardrobe')">Ντουλάπα</div>
            </div>

            <div id="avatarShop" class="avatar-tab-content">
                <div class="shop-grid" id="shopGrid"></div>
            </div>
            <div id="avatarWardrobe" class="avatar-tab-content" style="display:none;">
                <div class="wardrobe-grid" id="wardrobeGrid"></div>
            </div>
        </section>

    </main>

    <div class="popup-banner" id="popupBanner">
        <span>📢 Παίξε και κέρδισε καθημερινά δώρα!</span>
    </div>

    <nav class="bottom-nav">
        <button class="nav-tab active" onclick="navigateTo('hub')">🎮<br>Hub</button>
        <button class="nav-tab" onclick="navigateTo('board')">🎲<br>Board</button>
        <button class="nav-tab" onclick="navigateTo('avatar')">🐱<br>AZIRAM</button>
    </nav>

    <script>
        const userId = "user_test_123"; 
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playHappySound() {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            [261.63, 329.63, 392.00, 523.25].forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(f, now + i*0.1);
                gain.gain.setValueAtTime(0.1, now + i*0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i*0.1);
                osc.stop(now + i*0.1 + 0.25);
            });
        }

        function navigateTo(tab) {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            
            const sectionEl = document.getElementById('section-' + tab);
            if (sectionEl) sectionEl.classList.add('active');
            
            // Sync bottom navbar highlighting
            const btnIndex = ['hub', 'board', 'avatar'].indexOf(tab);
            if(btnIndex !== -1) {
                document.querySelectorAll('.nav-tab')[btnIndex].classList.add('active');
            }

            if (tab === 'avatar') loadAvatarWorld();
            refreshUI();
        }

        async function refreshUI() {
            // Προσομοίωση τοπικών δεδομένων ή κλήσης API
            document.getElementById('pointsDisplay').textContent = localStorage.getItem('mariza_points') || 0;
            document.getElementById('starsDisplay').textContent = localStorage.getItem('mariza_stars') || 0;
        }

        function loadAvatarWorld() {
            // Λογική για το σύστημα μασκότ AZIRAM
            console.log("AZIRAM World loaded.");
        }

        function switchAvatarTab(tab) {
            if(tab === 'shop') {
                document.getElementById('avatarShop').style.display = 'block';
                document.getElementById('avatarWardrobe').style.display = 'none';
            } else {
                document.getElementById('avatarShop').style.display = 'none';
                document.getElementById('avatarWardrobe').style.display = 'block';
            }
        }

        // POP-UP BANNER LOGIC
        const popupBanner = document.getElementById('popupBanner');
        function showPopupBanner() {
            popupBanner.classList.add('show');
            setTimeout(() => { popupBanner.classList.remove('show'); }, 4000);
        }
        setInterval(showPopupBanner, 20000);
        setTimeout(showPopupBanner, 3000);

        // WELCOME SCREEN
        document.addEventListener("DOMContentLoaded", () => {
            refreshUI();
            const welcomePage = document.createElement('div'); 
            welcomePage.className = 'welcome-full-screen';
            welcomePage.innerHTML = `
                <div class="welcome-card">
                    <h1 class="welcome-title">FranklyGames</h1>
                    <p>Καλώς ήρθες στο Απόλυτο Gaming Hub!</p>
                    <button class="btn-lets-play" id="startAppBtn">Πάμε να Παίξουμε!</button>
                </div>
            `;
            document.body.appendChild(welcomePage);
            document.getElementById('startAppBtn').onclick = () => { 
                initAudio(); 
                playHappySound(); 
                welcomePage.remove(); 
            };
        });
    </script>
</body>
</html>
