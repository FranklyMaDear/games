<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Games Franklymadear - Gamified Hub</title>
    <link rel="icon" type="image/png" sizes="32x32" href="photo.png">
    <link rel="apple-touch-icon" href="photo.png">
    <meta name="theme-color" content="#1a1a2e">
    <script src="https://omg10.com/4/10274068" data-site-id="3062566"></script>
    <!-- Winwheel.js για το Wheel -->
    <script src="https://cdn.jsdelivr.net/npm/winwheel@1.0.0/dist/winwheel.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(145deg, #0f0c29, #1a1a3e, #24243e);
            color: #fff; min-height: 100vh; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        /* fixed header */
        .header {
            position: fixed; top:0; left:0; width:100%; z-index:1000;
            background: rgba(10,8,30,0.95); backdrop-filter: blur(12px);
            padding: 12px 15px; display: flex; align-items: center; gap: 12px;
            border-bottom: 2px solid #f1c40f; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .energy-box { flex: 1; }
        .energy-label { display: flex; justify-content: space-between; font-size:0.75rem; color:#f1c40f; margin-bottom:4px; }
        .progress-bg {
            width:100%; height:12px; background: rgba(255,255,255,0.1); border-radius:10px; overflow:hidden;
        }
        .progress-fg {
            height:100%; width:0%; background: linear-gradient(90deg, #f1c40f, #f39c12); border-radius:10px;
            transition: width 0.6s; box-shadow: 0 0 12px #f1c40f80;
        }
        .wallet {
            display:flex; align-items:center; gap:6px; background: rgba(241,196,15,0.15);
            padding: 8px 16px; border-radius: 25px; font-weight:700; color:#f1c40f;
            border: 1px solid rgba(241,196,15,0.3);
        }
        /* main content */
        .main-content { padding: 100px 15px 90px; max-width: 520px; margin:0 auto; }
        /* action grid */
        .action-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin: 15px 0 25px; }
        .action-btn {
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), rgba(0,0,0,0.3));
            border-radius: 24px; padding: 18px 8px; text-align: center; cursor: pointer;
            transition: all 0.3s; border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }
        .action-btn:active { transform: scale(0.92); }
        .action-icon { font-size: 2.2rem; margin-bottom: 6px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .action-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        /* board */
        .level-info { text-align: center; margin-bottom: 20px; }
        .level-badge {
            display: inline-block; background: #f1c40f; color: #000; font-weight: 800; padding: 5px 18px;
            border-radius: 20px; font-size: 1.2rem;
        }
        .xp-bar { width:100%; height:14px; background: rgba(255,255,255,0.1); border-radius:10px; margin:12px 0; }
        .xp-fill { height:100%; background: linear-gradient(90deg, #e74c3c, #f1c40f); border-radius:10px; transition: width 0.5s; }
        .path-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-top: 15px; }
        .step {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; background: rgba(255,255,255,0.1); font-weight: 700;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .step.completed { background: #27ae60; border-color: #2ecc71; box-shadow: 0 0 15px #27ae6080; }
        .step.current { border-color: #f1c40f; box-shadow: 0 0 20px #f1c40f80; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { box-shadow: 0 0 35px #f1c40f; } }
        /* games grid */
        .games-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; margin-top: 10px; }
        .game-card {
            background: rgba(255,255,255,0.06); border-radius: 18px; padding: 20px 12px;
            text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        .game-card:active { transform: scale(0.95); }
        /* iframe modal */
        .modal-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content { width: 95%; height: 85%; background: #fff; border-radius: 16px; overflow: hidden; position: relative; }
        .modal-content iframe { width: 100%; height: 100%; border: none; }
        .modal-close {
            position: absolute; top: -15px; right: -15px; background: #e74c3c; color: #fff;
            width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-weight: bold; z-index: 10;
        }
        /* leaderboard */
        .leaderboard-item {
            display: flex; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.05);
            border-radius: 10px; margin-bottom: 6px;
        }
        .mission-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 6px;
        }
        .referral-box { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 15px; text-align: center; margin: 15px 0; }
        /* wheel canvas */
        #wheelCanvas { max-width: 300px; margin: 20px auto; display: block; }
        #spinBtn {
            display: block; margin: 0 auto; padding: 12px 30px; background: #f1c40f; color: #000;
            border: none; border-radius: 25px; font-weight: 700; font-size: 1rem; cursor: pointer;
        }
        /* bottom bar */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000;
            background: rgba(10,8,30,0.95); backdrop-filter: blur(12px);
            display: flex; justify-content: space-around; padding: 10px 0 14px;
            border-top: 2px solid #f1c40f; box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        .tab {
            display: flex; flex-direction: column; align-items: center; color: #777;
            font-size: 0.7rem; cursor: pointer; transition: 0.3s; gap: 3px;
        }
        .tab i { font-size: 1.3rem; }
        .tab.active { color: #f1c40f; text-shadow: 0 0 10px #f1c40f; }
        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: #f1c40f; color: #000; padding: 12px 28px; border-radius: 30px;
            font-weight: 700; z-index: 3000; animation: toastIn 0.4s, toastOut 0.4s 2.5s forwards;
        }
        @keyframes toastIn { from { opacity:0; bottom:50px; } to { opacity:1; bottom:90px; } }
        @keyframes toastOut { to { opacity:0; bottom:120px; } }
        .hidden { display: none; }
        @media (max-width:400px) {
            .action-grid { gap: 8px; }
            .action-btn { padding: 12px 4px; }
            .action-icon { font-size: 1.6rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="energy-box">
            <div class="energy-label"><span>⚡ Energy</span><span id="energyVal">0</span> / <span id="maxEnergy">300</span></div>
            <div class="progress-bg"><div class="progress-fg" id="energyProgress"></div></div>
        </div>
        <div class="wallet">💰 <span id="pointsDisplay">0</span></div>
    </div>

    <div class="main-content">
        <!-- Action Grid -->
        <div class="action-grid">
            <div class="action-btn" onclick="handleAction('claim')">
                <span class="action-icon">🎁</span><span class="action-label">Claim</span>
            </div>
            <div class="action-btn" onclick="showStreak()">
                <span class="action-icon">🔥</span><span class="action-label">Streak</span>
            </div>
            <div class="action-btn" onclick="handleAction('gift')">
                <span class="action-icon">🎀</span><span class="action-label">Gifts</span>
            </div>
            <div class="action-btn" onclick="handleAction('wheel')">
                <span class="action-icon">🎡</span><span class="action-label">Wheel</span>
            </div>
        </div>

        <!-- Dynamic Tab Content -->
        <div id="tab-content"></div>
    </div>

    <!-- Iframe Modal -->
    <div class="modal-overlay" id="gameModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeGameModal()">✕</span>
            <iframe id="gameIframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-bar">
        <div class="tab active" data-tab="board"><i class="fas fa-road"></i> BOARD</div>
        <div class="tab" data-tab="games"><i class="fas fa-gamepad"></i> GAMES</div>
        <div class="tab" data-tab="shop"><i class="fas fa-store"></i> SHOP</div>
        <div class="tab" data-tab="season"><i class="fas fa-calendar-alt"></i> SEASON</div>
        <div class="tab" data-tab="rewards"><i class="fas fa-trophy"></i> REWARDS</div>
    </div>

    <script>
        const API_ENDPOINT = "https://franklymadear-games.hf.space";
        const API_KEY = "m0n3t4g_s3cur3_k3y_2026";
        let userId = localStorage.getItem('franklymadear_userId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
            localStorage.setItem('franklymadear_userId', userId);
        }

        async function apiCall(method, path, body = null) {
            const headers = { 'Content-Type': 'application/json', 'X-API-Key': API_KEY };
            const res = await fetch(API_ENDPOINT + path, {
                method, headers, body: body ? JSON.stringify(body) : null
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Request failed');
            }
            return res.json();
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        async function refreshUI() {
            try {
                const energy = await apiCall('GET', `/energy?userId=${userId}`);
                document.getElementById('energyVal').textContent = energy.current_energy;
                document.getElementById('maxEnergy').textContent = energy.max_energy;
                document.getElementById('energyProgress').style.width =
                    (energy.current_energy / energy.max_energy * 100) + '%';
                const pts = await apiCall('GET', `/points/${userId}`);
                document.getElementById('pointsDisplay').textContent = pts.total_points;
            } catch(e) {}
        }

        function showAdThen(callback) {
            if (typeof monetag !== 'undefined' && typeof monetag.rewardedAd === 'function') {
                monetag.rewardedAd({
                    zoneId: "11090314",
                    onReward: callback,
                    onError: () => showToast('Ad failed – try again later')
                });
            } else {
                callback();
            }
        }

        // Iframe modal
        function openGameModal(url) {
            document.getElementById('gameIframe').src = url;
            document.getElementById('gameModal').classList.add('active');
        }
        function closeGameModal() {
            document.getElementById('gameIframe').src = '';
            document.getElementById('gameModal').classList.remove('active');
        }

        async function handleAction(type) {
            try {
                if (type === 'claim') {
                    showAdThen(async () => {
                        const data = await apiCall('POST', '/daily_claim', { userId });
                        showToast(`+${data.bonus_points} pts & +${data.bonus_energy}⚡`);
                        refreshUI();
                    });
                } else if (type === 'gift') {
                    showAdThen(async () => {
                        const data = await apiCall('POST', '/gift', { userId });
                        showToast(`Gift: ${data.reward_type} +${data.amount}`);
                        refreshUI();
                    });
                } else if (type === 'wheel') {
                    // Το wheel φορτώνεται στο tab 'wheel'
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelector('[data-tab="games"]').classList.add('active');
                    renderTab('wheel');
                }
            } catch(e) { showToast(e.message); }
        }

        async function showStreak() {
            try {
                const data = await apiCall('GET', `/streak?userId=${userId}`);
                showToast(`🔥 Streak: ${data.streak} days`);
            } catch(e) { showToast(e.message); }
        }

        // ===================== TAB RENDERING =====================
        async function renderTab(tab) {
            const content = document.getElementById('tab-content');
            content.innerHTML = '';
            try {
                if (tab === 'board') {
                    const board = await apiCall('GET', `/board?userId=${userId}`);
                    const progressPercent = (board.progress * 100).toFixed(0);
                    let html = `<div class="level-info">
                        <span class="level-badge">Level ${board.level}</span>
                        <div class="xp-bar"><div class="xp-fill" style="width:${progressPercent}%"></div></div>
                        <p style="font-size:0.8rem; color:#aaa;">${board.total_points} / ${board.next_level_points} pts</p>
                    </div>`;
                    html += '<h3>🏆 Progress Path</h3><div class="path-grid">';
                    for (let i = 0; i < 10; i++) {
                        let cls = 'step';
                        if (i < board.level) cls += ' completed';
                        else if (i === board.level) cls += ' current';
                        html += `<div class="${cls}">${i+1}</div>`;
                    }
                    html += '</div>';
                    content.innerHTML = html;
                }
                else if (tab === 'games') {
                    let html = '<h3>🎮 Choose a Game</h3><div class="games-grid" id="gamesGrid"></div>';
                    content.innerHTML = html;
                    const games = [
                        {name:"Crack The Code", url:"https://games.franklymadear.com/code/index.html", icon:"🔐"},
                        {name:"Code Kids", url:"https://games.franklymadear.com/codekids/index.html", icon:"🧸"},
                        {name:"Code Words", url:"https://games.franklymadear.com/codewords/index.html", icon:"📝"},
                        {name:"Chess", url:"https://games.franklymadear.com/chess/index.html", icon:"♔"},
                        {name:"Animals", url:"https://games.franklymadear.com/animals/index.html", icon:"🐾"},
                        {name:"Connect 4", url:"https://games.franklymadear.com/4x4/connect4.html", icon:"🔴"},
                        {name:"Balloons", url:"https://games.franklymadear.com/balloon/index.html", icon:"🎈"},
                        {name:"Sudoku", url:"https://games.franklymadear.com/sudoku/sudoku.html", icon:"🔢"}
                    ];
                    const grid = document.getElementById('gamesGrid');
                    games.forEach(g => {
                        const card = document.createElement('div'); card.className = 'game-card';
                        card.innerHTML = `<div style="font-size:2rem;">${g.icon}</div><div style="font-weight:600;">${g.name}</div>`;
                        card.onclick = () => {
                            showAdThen(async () => {
                                try {
                                    const data = await apiCall('POST', '/log', { userId, game: g.name });
                                    showToast(`+${data.points_earned} pts (x${data.multiplier})`);
                                    refreshUI();
                                    openGameModal(g.url);
                                } catch(e) { showToast(e.message); }
                            });
                        };
                        grid.appendChild(card);
                    });
                }
                else if (tab === 'shop') {
                    const shop = await apiCall('GET', '/shop');
                    let html = '<h3>🛒 Shop</h3>';
                    shop.items.forEach(i => html +=
                        `<div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; margin:8px 0;">
                            ${i.name} – <b>${i.cost} pts</b></div>`);
                    content.innerHTML = html;
                }
                else if (tab === 'season') {
                    const season = await apiCall('GET', '/season');
                    content.innerHTML = `<h3>📅 Season ${season.season}</h3>
                        <p>Ends in <b>${season.ends_in_days}</b> days</p>
                        <p>Rewards: ${season.rewards.join(', ')}</p>`;
                }
                else if (tab === 'rewards') {
                    let html = '<h3>🏅 Leaderboard</h3>';
                    const leaderboard = await apiCall('GET', '/leaderboard');
                    leaderboard.leaderboard.forEach((entry, index) => {
                        html += `<div class="leaderboard-item">
                            <span>${index+1}. ${entry.userId.substring(0,8)}...</span>
                            <span>Lv.${entry.level} – ${entry.points} pts</span>
                        </div>`;
                    });
                    html += '<h3 style="margin-top:20px;">📋 Daily Missions</h3>';
                    const missions = await apiCall('GET', `/missions?userId=${userId}`);
                    missions.missions.forEach(m => {
                        html += `<div class="mission-item">
                            <span>${m.description} (${m.progress}/${m.target})</span>
                            ${m.completed && !m.claimed ?
                                `<button onclick="claimMission(${m.id})" style="background:#f1c40f; color:#000; border:none; padding:5px 10px; border-radius:8px; cursor:pointer;">Claim +${m.reward_points}</button>` :
                                m.claimed ? '✅' : '🔒'}
                        </div>`;
                    });
                    html += '<h3 style="margin-top:20px;">👥 Referral</h3>';
                    const ref = await apiCall('GET', `/referral?userId=${userId}`);
                    html += `<div class="referral-box">
                        <p>Your referral code: <b>${ref.referral_code}</b></p>
                        <input type="text" id="refInput" placeholder="Enter referral code" style="width:100%; padding:8px; margin:8px 0; border-radius:8px; border:none;">
                        <button onclick="applyReferral()" style="background:#f1c40f; color:#000; border:none; padding:8px 16px; border-radius:8px;">Apply</button>
                    </div>`;
                    content.innerHTML = html;
                }
                else if (tab === 'wheel') {
                    let html = '<h3>🎡 Wheel of Fortune</h3>';
                    html += '<canvas id="wheelCanvas" width="400" height="400"></canvas>';
                    html += '<button id="spinBtn">SPIN</button>';
                    content.innerHTML = html;
                    initWheel();
                }
            } catch(e) {
                content.innerHTML = `<p style="color:#e74c3c;">Error: ${e.message}</p>`;
            }
        }

        // Wheel of Fortune
        let wheelInstance = null;
        function initWheel() {
            const segments = [
                {text: '10 pts', fillStyle: '#e74c3c', points: 10},
                {text: '50 pts', fillStyle: '#3498db', points: 50},
                {text: '20⚡', fillStyle: '#2ecc71', energy: 20},
                {text: '5 pts', fillStyle: '#f39c12', points: 5},
                {text: '100 pts', fillStyle: '#9b59b6', points: 100},
                {text: '30⚡', fillStyle: '#1abc9c', energy: 30},
                {text: '200 pts', fillStyle: '#f1c40f', points: 200},
                {text: '15⚡', fillStyle: '#e67e22', energy: 15}
            ];
            wheelInstance = new Winwheel({
                canvasId: 'wheelCanvas',
                numSegments: segments.length,
                segments: segments,
                animation: { type: 'spinToStop', duration: 5, spins: 8 }
            });
            document.getElementById('spinBtn').onclick = () => {
                wheelInstance.startAnimation();
                const winner = segments[Math.floor(Math.random() * segments.length)];
                setTimeout(async () => {
                    try {
                        const data = await apiCall('POST', '/wheel', { userId });
                        showToast(`Won: ${winner.text}!`);
                        refreshUI();
                    } catch(e) { showToast(e.message); }
                }, 5200);
            };
        }

        window.claimMission = async function(missionId) {
            try {
                const data = await apiCall('POST', '/missions/claim', { userId, missionId });
                showToast(`Mission claimed! +${data.reward_points} pts`);
                refreshUI();
                renderTab('rewards');
            } catch(e) { showToast(e.message); }
        };

        window.applyReferral = async function() {
            const code = document.getElementById('refInput').value.trim();
            if (!code) return showToast('Enter a referral code');
            try {
                const data = await apiCall('POST', '/referral/apply', { userId, referralCode: code });
                showToast(`Referral applied! +${data.bonus_points} pts`);
                refreshUI();
                renderTab('rewards');
            } catch(e) { showToast(e.message); }
        };

        // Bottom navigation
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderTab(tab.dataset.tab);
            });
        });

        // Initial load
        refreshUI();
        renderTab('board');
        setInterval(refreshUI, 15000);
    </script>
</body>
</html>
