<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ο κ. Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός</title>

    <!-- Meta Tags για σωστή κοινοποίηση στα Social Media (Open Graph) -->
    <meta property="og:title" content="Ο κ. Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός" />
    <meta property="og:description" content="Δείτε το αποκλειστικό βίντεο και τις δηλώσεις για το μεγάλο ντέρμπι." />
    <meta property="og:url" content="https://games.franklymadear.com/blog/index.html" />
    <meta property="og:image" content="https://games.franklymadear.com/blog/blog.png" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Μορφοποίηση (CSS) -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 420px; /* Ιδανικό πλάτος για Reel εμφάνιση */
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .video-card {
            background-color: #1e1e1e;
            border-radius: 16px;
            padding: 25px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        
        /* Επαγγελματικός Τίτλος με 3D Design */
        .video-title {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 25px;
            color: #ff4757;
            line-height: 1.4;
            letter-spacing: 0.5px;
            /* 3D Εφέ με διαδοχικές σκιές */
            text-shadow: 
                0 1px 0 #b3323d,
                0 2px 0 #992b34,
                0 3px 0 #80242c,
                0 4px 0 #661d23,
                0 5px 6px rgba(0, 0, 0, 0.6),
                0 8px 10px rgba(0, 0, 0, 0.4);
        }
        
        .video-container {
            position: relative;
            padding-bottom: 177.77%; /* 9:16 Αναλογία για Reel */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }
        
        /* Διάφανο επίπεδο πάνω από το βίντεο */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: background 0.3s;
        }
        
        /* Εικονίδιο Play */
        .play-button-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 71, 87, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(255, 71, 87, 0.5);
            transition: transform 0.2s;
        }
        .play-overlay:hover .play-button-icon {
            transform: scale(1.1);
            background: #ff4757;
        }
        .play-button-icon::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Κάρτα Προβολής Reel -->
        <div class="video-card">
            <!-- Ο Τίτλος του Βίντεο με 3D Εφέ -->
            <div class="video-title">Ο κύριος Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός</div>
            
            <div class="video-container">
                <!-- Το overlay που ελέγχει το κλικ -->
                <div class="play-overlay" id="videoOverlay" onclick="handlePlayClick()">
                    <div class="play-button-icon"></div>
                </div>

                <!-- Το βίντεο Reel -->
                <video id="myReelVideo" controls poster="blog.png" playsinline>
                    <source src="video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <script>
        function handlePlayClick() {
            const video = document.getElementById('myReelVideo');
            const overlay = document.getElementById('videoOverlay');
            
            // 1. Ξεκινάμε αμέσως το βίντεο για να πάρει σωστά το focus η εικόνα
            video.play();
            
            // Κρύβουμε το overlay για να εμφανιστούν τα κανονικά κουμπιά του βίντεο
            overlay.style.display = 'none';
            
            // 2. Ανοίγουμε τη διαφήμιση με μια μικρή καθυστέρηση 500ms 
            // ώστε ο browser να έχει προλάβει να ξεκινήσει το rendering της εικόνας
            setTimeout(function() {
                window.open("https://omg10.com/4/11090314", "_blank");
            }, 500);
        }
    </script>

</body>
</html>
