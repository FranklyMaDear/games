<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ο κ. Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός</title>

    <!-- Meta Tags για σωστή κοινοποίηση στα Social Media (Open Graph) -->
    <meta property="og:title" content="Ο κ. Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός" />
    <meta property="og:description" content="Δείτε το αποκλειστικό βίντεο και τις δηλώσεις για το μεγάλο ντέρμπι." />
    <meta property="og:url" content="https://games.franklymadear.com/blog/index.html" />
    <meta property="og:image" content="https://games.franklymadear.com/blog/blog.png" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Μορφοποίηση (CSS) -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 420px; /* Ιδανικό πλάτος για Reel εμφάνιση */
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .video-card {
            background-color: #1e1e1e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .video-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            color: #ff4757;
            line-height: 1.4;
        }
        .video-container {
            position: relative;
            padding-bottom: 177.77%; /* 9:16 Αναλογία για Reel/Κάθετο Βίντεο */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Καλύπτει όλη την επιφάνεια του Reel */
            border: none;
        }
        
        /* Το σύνδεσμος-κουμπί που καλύπτει όλο το βίντεο */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.1); /* Ελαφριά σκίαση για να φαίνεται το poster */
            cursor: pointer;
            transition: background 0.3s;
        }
        .play-overlay:hover {
            background: rgba(0, 0, 0, 0.2);
        }
        
        /* Σχεδίαση του CSS Play Button */
        .play-button-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 71, 87, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(255, 71, 87, 0.5);
            transition: transform 0.2s;
        }
        .play-overlay:hover .play-button-icon {
            transform: scale(1.1);
            background: #ff4757;
        }
        .play-button-icon::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 5px; /* Κεντράρισμα του τριγώνου */
        }

        .link-btn {
            display: inline-block;
            background-color: #ff4757;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 25px;
            transition: background-color 0.2s, transform 0.2s;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
            width: 80%;
            margin-top: 5px;
        }
        .link-btn:hover {
            background-color: #ff6b81;
            transform: scale(1.02);
        }
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #747d8c;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Κάρτα Προβολής Reel -->
        <div class="video-card">
            <!-- Ο Τίτλος του Βίντεο -->
            <div class="video-title">Ο κύριος Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός</div>
            
            <div class="video-container">
                <!-- Το σύνδεσμος-κουμπί Play που ανοίγει το link σε νέο παράθυρο -->
                <a href="https://omg10.com/4/11090314" target="_blank" class="play-overlay" onclick="startVideo(event)">
                    <div class="play-button-icon"></div>
                </a>

                <!-- Το βίντεο Reel -->
                <video id="myReelVideo" controls poster="blog.png">
                    <source src="video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <!-- Κουμπί στο κάτω μέρος της κάρτας -->
            <a href="https://omg10.com/4/11090314" target="_blank" class="link-btn">Επόμενο Βίντεο ➔</a>
        </div>
    </div>

    <footer>
        &copy; 2026 FranklyGames. All rights reserved.
    </footer>

    <script>
        function startVideo(event) {
            // Βρίσκουμε το βίντεο
            const video = document.getElementById('myReelVideo');
            
            // Ξεκινάει η αναπαραγωγή του βίντεο στο τρέχον παράθυρο
            video.play();
            
            // Κρύβουμε το διάφανο overlay με το Play ώστε ο χρήστης να μπορεί να χρησιμοποιήσει τα native controls (pause, volume κλπ)
            event.currentTarget.style.display = 'none';
        }
    </script>

</body>
</html>
