        const video = document.getElementById('myReelVideo');
        let adTriggered = false; // Εξασφαλίζει ότι η διαφήμιση θα ανοίξει μόνο μία φορά στην αρχή

                    // Αυτόματο redirect στο link σας μετά τη διαφήμιση
                    window.location.href = "https://omg10.com/4/10274068";
                    
                }).catch(e => {
                    // user get error during playing ad
                    // do nothing or whatever you want
                    console.error("Σφάλμα κατά την αναπαραγωγή της διαφήμισης:", e);

            } else {
                console.log("Το διαφημιστικό SDK δεν έχει φορτώσει ακόμα.");
                setTimeout(triggerRewardedPopup, 500);
            }
        }
