<!DOCTYPE html>
<html lang="el">
<head>
    <!-- Script Διαφημίσεων (Ακριβώς κάτω από το head tag) -->
    <script src='//libtl.com/sdk.js' data-zone='11108267' data-sdk='show_11108267'></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ο κ. Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός</title>

    <!-- Meta Tags για σωστή κοινοποίηση στα Social Media (Open Graph) -->
    <meta property="og:title" content="Ο κ. Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός" />
    <meta property="og:description" content="Δείτε το αποκλειστικό βίντεο και τις δηλώσεις για το μεγάλο ντέρμπι." />
    <meta property="og:url" content="https://games.franklymadear.com/blog/index.html" />
    <meta property="og:image" content="https://games.franklymadear.com/blog/blog.png" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Μορφοποίηση (CSS) -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 420px; /* Ιδανικό πλάτος για Reel εμφάνιση */
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .video-card {
            background-color: #1e1e1e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .video-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            color: #ff4757;
            line-height: 1.4;
        }
        .video-container {
            position: relative;
            padding-bottom: 177.77%; /* 9:16 Αναλογία για Reel/Κάθετο Βίντεο */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Καλύπτει όλη την επιφάνεια του Reel */
            border: none;
        }
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #747d8c;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Κάρτα Προβολής Reel -->
        <div class="video-card">
            <!-- Ο Τίτλος του Βίντεο -->
            <div class="video-title">Ο κύριος Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός</div>
            
            <div class="video-container">
                <!-- Το βίντεο Reel -->
                <video id="myReelVideo" controls poster="blog.png">
                    <source src="video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 FranklyGames. All rights reserved.
    </footer>

    <!-- Script Λειτουργικότητας και Διαφημίσεων -->
    <script>
        const video = document.getElementById('myReelVideo');
        let adTriggered = false; // Εξασφαλίζει ότι η διαφήμιση θα εμφανιστεί μόνο μία φορά

        // Παρακολούθηση του χρόνου αναπαραγωγής
        video.addEventListener('timeupdate', function() {
            // Μόλις το βίντεο φτάσει ή ξεπεράσει τα 3 δευτερόλεπτα
            if (video.currentTime >= 3 && !adTriggered) {
                adTriggered = true; 
                video.pause(); // Αυτόματη παύση του βίντεο
                
                triggerRewardedAd(); // Έναρξη της διαφήμισης
            }
        });

        // Λειτουργία εμφάνισης του SDK της διαφήμισης
        function triggerRewardedAd() {
            if (typeof show_11108267 === 'function') {
                
                show_11108267().then(() => {
                    // Ο χρήστης είδε τη διαφήμιση, εκτελείται η ανταμοιβή (συνέχεια βίντεο)
                    giveUserReward();
                }).catch((error) => {
                    console.error("Η διαφήμιση απέτυχε ή έκλεισε με σφάλμα:", error);
                    // Σε περίπτωση σφάλματος του SDK, αφήνουμε το βίντεο να συνεχίσει για να μην κολλήσει ο χρήστης
                    video.play(); 
                });

            } else {
                console.log("Το διαφημιστικό SDK δεν έχει φορτώσει ακόμα.");
                // Αν δεν έχει φορτώσει το SDK, ξαναπροσπαθεί σε 1 δευτερόλεπτο
                setTimeout(triggerRewardedAd, 1000);
            }
        }

        // Η συνάρτηση ανταμοιβής (Συνέχεια αναπαραγωγής)
        function giveUserReward() {
            console.log("Η διαφήμιση ολοκληρώθηκε! Το βίντεο συνεχίζεται.");
            video.play(); // Το βίντεο συνεχίζει αυτόματα
        }
    </script>

</body>
</html>
