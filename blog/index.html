    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 420px; /* Ιδανικό πλάτος για Reel εμφάνιση σε desktop/mobile */
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        .video-card {
            background-color: #1e1e1e;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .video-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            color: #ff4757;
            line-height: 1.4;
        }
        .video-container {
            position: relative;
            padding-bottom: 177.77%; /* 9:16 Αναλογία για Reel/Κάθετο Βίντεο */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            margin-bottom: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Καλύπτει όλη την επιφάνεια του Reel */
            border: none;
        }
        .continue-section {
            margin-top: 15px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px dashed #ff4757;
            padding: 12px;
            border-radius: 8px;
        }
        .continue-text {
            font-size: 14px;
            color: #f1f2f6;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .reward-btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);
            width: 100%;
        }
        .reward-btn:hover {
            background-color: #26af5f;
            transform: scale(1.02);
        }
        .reward-btn:active {
            transform: scale(0.98);
        }
        footer {
            margin-top: 20px;

            color: #747d8c;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-card">
            <div class="video-title">Ο κύριος Μητσοτάκης μιλάει για το σημερινό ντέρμπι Ολυμπιακός - Παναθηναϊκός</div>
            
            <div class="video-container">
                <video id="myReelVideo" controls poster="blog.png">
                    <source src="video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="continue-section">
                <div class="continue-text">Πατήστε Continue να δείτε την συνέχεια του βίντεο 👇</div>
                <button class="reward-btn" onclick="watchAdForReward()">Continue ➔</button>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 FranklyGames. All rights reserved.
    </footer>

    <script>
        const video = document.getElementById('myReelVideo');
        let adTriggered = false; // Μεταβλητή για να σιγουρευτούμε ότι η διαφήμιση θα παίξει μόνο μία φορά

        // Παρακολούθηση του χρόνου του βίντεο
        video.addEventListener('timeupdate', function() {
            // Αν το βίντεο ξεπεράσει τα 3 δευτερόλεπτα και δεν έχει ξαναμπει διαφήμιση
            if (video.currentTime >= 3 && !adTriggered) {
                adTriggered = true; 
                video.pause(); // Παύση του βίντεο αυτόματα
                
                console.log("Πέρασαν 3 δευτερόλεπτα. Έναρξη διαφήμισης...");
                watchAdForReward(); // Αυτόματη κλήση της διαφήμισης
            }
        });

        // Η συνάρτηση που εμφανίζει τη διαφήμιση
        function watchAdForReward() {
            if (typeof show_11108267 === 'function') {
                
                show_11108267().then(() => {
                    // Επιτυχής ολοκλήρωση της διαφήμισης
                    giveUserReward();
                }).catch((error) => {
                    console.error("Η διαφήμιση απέτυχε:", error);
                    // Σε περίπτωση σφάλματος, επιτρέπουμε στον χρήστη να συνεχίσει
                    video.play(); 
                });

            } else {
                console.log("Το SDK δεν έχει φορτώσει ακόμα.");
                alert("Παρακαλώ περιμένετε να φορτώσει η διαφήμιση και πατήστε ξανά Continue.");
            }
        }

        // Η συνάρτηση ανταμοιβής / συνέχειας
        function giveUserReward() {
            console.log("Η διαφήμιση ολοκληρώθηκε επιτυχώς!");
            
            // Το βίντεο συνεχίζει αυτόματα να παίζει
            video.play(); 
        }
    </script>

</body>
</html>
