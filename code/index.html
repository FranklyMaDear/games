<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRACK THE CODE | Μάντεψε την Κρυφή Λέξη</title>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #131820;
            --border: #2a3040;
            --gold: #e2b04a;
            --gold-light: #f5d78c;
            --text: #bcc5d0;
            --text-bright: #e8edf2;
            --success: #2ea043;
            --danger: #da3633;
            --warning: #d2991d;
            --btn-bg: #1c2129;
            --shadow: 0 6px 24px rgba(0,0,0,0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            background: linear-gradient(160deg, #0a0e14 0%, #141b24 40%, #0d1117 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            overflow: hidden;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 100%;
            background: var(--bg-card);
            border: none;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
            border-radius: 0;
            padding: 12px 10px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .game-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 10%, rgba(226,176,74,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .title-section {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            padding-top: env(safe-area-inset-top, 8px);
        }

        .title {
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f7da8c 0%, #c99530 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 4px rgba(200,150,50,0.5));
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.6rem;
            color: #6e7681;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .hint-box {
            background: rgba(226,176,74,0.06);
            border: 1px solid rgba(226,176,74,0.25);
            color: var(--gold-light);
            padding: 8px 12px;
            border-radius: 10px;
            font-style: italic;
            font-size: clamp(0.8rem, 3vw, 1rem);
            text-align: center;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            line-height: 1.3;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .level-bar-container {
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }

        .level-text {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .level-points {
            font-size: 0.6rem;
            color: var(--text);
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        .level-bar-outer {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .level-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #e2b04a 0%, #f5d78c 50%, #e2b04a 100%);
            border-radius: 5px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(226,176,74,0.4);
            width: 0%;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .stat-box {
            flex: 1;
            min-width: 60px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px 8px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6e7681;
            margin-bottom: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            font-weight: 700;
            color: var(--text-bright);
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        .score-highlight {
            color: var(--gold-light);
            text-shadow: 0 0 8px rgba(226,176,74,0.5);
        }

        .attempts-dots {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .attempt-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 3px rgba(46,160,67,0.6);
            transition: all 0.3s ease;
        }

        .attempt-dot.lost {
            background: var(--danger);
            box-shadow: 0 0 5px rgba(218,54,51,0.7);
            animation: pulseDot 0.35s ease;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        .word-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
            background: rgba(0,0,0,0.5);
            padding: 12px 10px;
            border-radius: 12px;
            border: 2px solid var(--border);
            width: 100%;
            min-height: 55px;
            position: relative;
            z-index: 1;
            overflow: visible;
            flex-shrink: 0;
        }

        .word-slot {
            background: linear-gradient(180deg, #1a1f28 0%, #0d1117 100%);
            border: 2px solid #30363d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-light);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            text-shadow: 0 0 6px rgba(226,176,74,0.5);
            transition: all 0.3s ease;
            font-family: 'SF Mono', 'Courier New', monospace;
            flex-shrink: 1;
            position: relative;
            overflow: hidden;
        }

        .word-slot.spinning .slot-inner {
            animation: spinSlot 0.6s ease-in-out;
        }

        @keyframes spinSlot {
            0% { transform: rotateX(0deg); opacity: 1; }
            25% { transform: rotateX(90deg); opacity: 0.3; }
            50% { transform: rotateX(180deg); opacity: 0.1; }
            75% { transform: rotateX(270deg); opacity: 0.3; }
            100% { transform: rotateX(360deg); opacity: 1; }
        }

        .word-slot.revealed {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(226,176,74,0.6), inset 0 2px 4px rgba(0,0,0,0.5);
            animation: revealPop 0.4s ease;
        }

        @keyframes revealPop {
            0% { transform: scale(0.6); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .word-slot.wrong-flash {
            animation: wrongShake 0.5s ease;
            border-color: var(--danger) !important;
            box-shadow: 0 0 12px rgba(218,54,51,0.6), inset 0 2px 4px rgba(0,0,0,0.5) !important;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        .word-slot.space {
            background: transparent;
            border: none;
            box-shadow: none;
            flex-shrink: 0;
        }

        .slot-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            background: rgba(0,0,0,0.35);
            padding: 12px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .letter-btn {
            width: clamp(42px, 11vw, 56px);
            height: clamp(42px, 11vw, 56px);
            background: linear-gradient(180deg, #2a3340 0%, #1a202a 100%);
            border: 2px solid #4a5568;
            border-radius: 12px;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #0a0d12, 0 4px 8px rgba(0,0,0,0.5);
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        .letter-btn:active,
        .letter-btn.pressed {
            top: 3px !important;
            box-shadow: 0 1px 0 #0a0d12, 0 2px 4px rgba(0,0,0,0.4) !important;
            background: linear-gradient(180deg, #3d4858 0%, #2a3340 100%) !important;
            border-color: #6a7a90 !important;
            transform: scale(0.95);
        }

        .letter-btn.used-correct {
            background: linear-gradient(180deg, #142a14 0%, #0a1a0a 100%) !important;
            border-color: #2ea043 !important;
            color: #3fb950 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 2px 0 #0a0d12;
            top: 2px;
        }

        .letter-btn.used-wrong {
            background: linear-gradient(180deg, #2a1414 0%, #1a0a0a 100%) !important;
            border-color: #da3633 !important;
            color: #f85149 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 2px 0 #0a0d12;
            top: 2px;
            text-decoration: line-through;
        }

        .guess-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .guess-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--btn-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-bright);
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            text-align: center;
            font-family: 'SF Mono', 'Courier New', monospace;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .guess-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(226,176,74,0.25), inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .guess-input::placeholder {
            color: #484f58;
            letter-spacing: 1px;
            font-size: 0.7rem;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            flex: 1;
            min-width: 110px;
            padding: 14px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: clamp(0.8rem, 2.8vw, 1rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid;
            position: relative;
            top: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            text-align: center;
            -webkit-touch-callout: none;
        }

        .btn-submit {
            background: linear-gradient(180deg, #e2b04a 0%, #b8882a 100%);
            border-color: #d4a035;
            color: #0d1117;
            box-shadow: 0 4px 0 #6b4f1a, 0 4px 12px rgba(0,0,0,0.6);
        }

        .btn-submit:active {
            top: 2px;
            box-shadow: 0 2px 0 #6b4f1a, 0 2px 6px rgba(0,0,0,0.6);
        }

        .btn-submit:disabled {
            opacity: 0.35;
            pointer-events: none;
            top: 0;
        }

        .btn-new {
            background: var(--btn-bg);
            border-color: var(--border);
            color: var(--text-bright);
            box-shadow: 0 4px 0 #0d1117, 0 4px 12px rgba(0,0,0,0.6);
        }

        .btn-new:active {
            top: 2px;
            box-shadow: 0 2px 0 #0d1117, 0 2px 6px rgba(0,0,0,0.6);
            background: #2a323d;
        }

        .message {
            font-weight: 600;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            min-height: 18px;
            color: var(--warning);
            text-align: center;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            width: 100%;
            flex-shrink: 0;
        }

        .result-panel {
            background: rgba(226,176,74,0.08);
            border: 2px solid var(--gold);
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideUp 0.4s ease;
            position: relative;
            z-index: 1;
            width: 100%;
            flex-shrink: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-emoji { font-size: 1.4rem; }
        .result-text {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--gold-light);
        }

        .hidden { display: none !important; }

        .footer {
            display: flex;
            gap: 8px;
            font-size: 0.55rem;
            color: #484f58;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        hr {
            border-color: var(--border);
            width: 80%;
            margin: 1px 0;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            width: 9px;
            height: 9px;
            top: -20px;
            animation: confettiFall 2.5s ease-in forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .score-pop {
            position: absolute;
            color: var(--gold-light);
            font-weight: 800;
            font-size: 0.85rem;
            pointer-events: none;
            animation: scoreFloat 1.2s ease-out forwards;
            z-index: 10;
            text-shadow: 0 0 10px rgba(226,176,74,0.8);
        }

        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
        }

        /* Ad overlay notification */
        .ad-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: var(--gold-light);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 700;
            z-index: 1000;
            animation: fadeInOut 2.5s ease forwards;
            pointer-events: none;
            letter-spacing: 1px;
            border: 1px solid var(--gold);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            75% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        @media (min-width: 600px) {
            .game-container {
                border-radius: 22px;
                border: 2px solid var(--border);
                max-width: 500px;
                height: auto;
                min-height: 100vh;
                min-height: 100dvh;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="title-section">
            <div class="title">🔐 CRACK THE CODE</div>
            <div class="subtitle">ΑΠΟΚΡΥΠΤΟΓΡΑΦΗΣΕ ΤΗ ΛΕΞΗ</div>
        </div>

        <div class="level-bar-container">
            <div class="level-info">
                <span class="level-text" id="levelText">🏅 LEVEL 1</span>
                <span class="level-points" id="levelPoints">0 / 500 XP</span>
            </div>
            <div class="level-bar-outer">
                <div class="level-bar-inner" id="levelBar"></div>
            </div>
        </div>

        <div class="hint-box" id="hintText">💡 Φόρτωση...</div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">⏳ ΧΡΟΝΟΣ</div>
                <div class="stat-value" id="timerDisplay">3:00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">⭐ ΣΚΟΡ</div>
                <div class="stat-value score-highlight" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🏆 ΡΕΚΟΡ</div>
                <div class="stat-value score-highlight" id="highScoreDisplay">0</div>
            </div>
        </div>

        <div class="attempts-dots" id="attemptsDots"></div>

        <div class="word-display" id="wordDisplay"></div>

        <div class="alphabet-container" id="alphabetContainer"></div>

        <div class="guess-section">
            <input type="text" class="guess-input" id="guessInput" 
                   placeholder="Γράψε ολόκληρη τη λέξη..." 
                   autocomplete="off" inputmode="text" enterkeyhint="done">
            <div class="btn-row">
                <button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
                <button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
            </div>
        </div>

        <div class="message" id="messageBox"></div>

        <div id="resultPanel" class="result-panel hidden">
            <span class="result-emoji" id="resultEmoji">🏆</span>
            <span class="result-text" id="resultText"></span>
        </div>

        <hr>
        <div class="footer">
            <span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span>
            <span>🔔 SUBSCRIBE</span>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <script src="words.js"></script>

    <!-- Διαφημιστικό Script - quge5.com -->
    <script src="https://quge5.com/88/tag.min.js" data-zone="199912" async data-cfasync="false"></script>

    <script>
        (function() {
            if (typeof SECRET_WORDS === 'undefined') {
                alert('Σφάλμα: Το αρχείο words.js δεν φορτώθηκε σωστά!');
                return;
            }

            const ALPHABET = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ".split("");
            const START_TIME = 180;
            const MAX_ATTEMPTS = 8;
            const POINTS_PER_LETTER = 10;
            const POINTS_FULL_WORD = 100;
            const STORAGE_KEY_HIGHSCORE = 'crackTheCode_highScore';
            const STORAGE_KEY_LEVEL = 'crackTheCode_level';
            const STORAGE_KEY_XP = 'crackTheCode_xp';
            const STORAGE_KEY_SCORE = 'crackTheCode_score';
            const XP_PER_LEVEL = 500;

            let currentWord = "";
            let currentHint = "";
            let gameActive = false;
            let timeSeconds = START_TIME;
            let timerInterval = null;
            let usedLetters = [];
            let wrongAttempts = 0;
            let revealedLetters = [];
            let usedWordIndices = [];
            let isSpinning = false;
            let currentScore = 0;
            let highScore = 0;
            let currentLevel = 1;
            let currentXP = 0;
            let correctLettersInCurrentWord = 0;
            let adWindowRef = null; // Αναφορά στο παράθυρο διαφήμισης

            const gameContainer = document.getElementById("gameContainer");
            const timerDisplay = document.getElementById("timerDisplay");
            const hintText = document.getElementById("hintText");
            const wordDisplay = document.getElementById("wordDisplay");
            const alphabetContainer = document.getElementById("alphabetContainer");
            const attemptsDots = document.getElementById("attemptsDots");
            const guessInput = document.getElementById("guessInput");
            const submitBtn = document.getElementById("submitGuess");
            const newGameBtn = document.getElementById("newGameBtn");
            const messageBox = document.getElementById("messageBox");
            const resultPanel = document.getElementById("resultPanel");
            const resultEmoji = document.getElementById("resultEmoji");
            const resultText = document.getElementById("resultText");
            const scoreDisplay = document.getElementById("scoreDisplay");
            const highScoreDisplay = document.getElementById("highScoreDisplay");
            const confettiContainer = document.getElementById("confettiContainer");
            const levelText = document.getElementById("levelText");
            const levelPoints = document.getElementById("levelPoints");
            const levelBar = document.getElementById("levelBar");

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            let audioCtx;

            function initAudio() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playCorrectLetterSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.3);
                } catch(e) {}
            }

            function playWrongLetterSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.3);
                } catch(e) {}
            }

            function playWordCorrectSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + i * 0.15);
                        gain.gain.setValueAtTime(0.3, now + i * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.4);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.4);
                    });
                } catch(e) {}
            }

            function playWordWrongSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.setValueAtTime(100, now + 0.2);
                    osc.frequency.setValueAtTime(80, now + 0.4);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.5);
                } catch(e) {}
            }

            function playWinFanfare() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + i * 0.12);
                        gain.gain.setValueAtTime(0.25, now + i * 0.12);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.35);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.35);
                    });
                } catch(e) {}
            }

            function playSpinSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    for (let i = 0; i < 6; i++) {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(200 + Math.random() * 400, now + i * 0.04);
                        gain.gain.setValueAtTime(0.06, now + i * 0.04);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.04 + 0.06);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.04); osc.stop(now + i * 0.04 + 0.06);
                    }
                } catch(e) {}
            }

            function playLevelUpSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, now + i * 0.1);
                        gain.gain.setValueAtTime(0.3, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3);
                    });
                } catch(e) {}
            }

            // ========== ΔΙΑΦΗΜΙΣΗ ΣΕ ΝΕΟ ΠΑΡΑΘΥΡΟ ==========
            function showAdNotification() {
                const notification = document.createElement('div');
                notification.className = 'ad-notification';
                notification.textContent = '📢 Η διαφήμιση άνοιξε σε νέο παράθυρο';
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 2500);
            }

            function openAdInNewWindow() {
                try {
                    // Κλείνουμε προηγούμενο παράθυρο διαφήμισης αν υπάρχει
                    if (adWindowRef && !adWindowRef.closed) {
                        adWindowRef.close();
                    }
                    
                    // Ανοίγουμε νέο παράθυρο με διαφημιστικό περιεχόμενο
                    // Το quge5.com script θα ανιχνεύσει αυτόματα το data-zone και θα προωθήσει τη διαφήμιση
                    adWindowRef = window.open('about:blank', '_blank', 'width=800,height=600');
                    
                    if (adWindowRef) {
                        // Γράφουμε ένα minimal HTML που θα φορτώσει το διαφημιστικό script
                        adWindowRef.document.write(`
                            <!DOCTYPE html>
                            <html>
                            <head>
                                <meta charset="UTF-8">
                                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                <title>Διαφήμιση</title>
                                <style>
                                    body { 
                                        margin: 0; 
                                        background: #000; 
                                        display: flex; 
                                        justify-content: center; 
                                        align-items: center; 
                                        min-height: 100vh;
                                        font-family: Arial, sans-serif;
                                        color: #fff;
                                    }
                                    .loading { text-align: center; font-size: 18px; }
                                </style>
                            </head>
                            <body>
                                <div class="loading">📢 Φόρτωση διαφήμισης...</div>
                                <script src="https://quge5.com/88/tag.min.js" data-zone="199912" async data-cfasync="false"><\/script>
                            </body>
                            </html>
                        `);
                        adWindowRef.document.close();
                        
                        // Εστιάζουμε στο παράθυρο της διαφήμισης
                        adWindowRef.focus();
                        
                        // Ειδοποίηση στον χρήστη
                        showAdNotification();
                        
                        // Επιστρέφουμε focus στο παιχνίδι μετά από λίγο
                        setTimeout(() => {
                            window.focus();
                        }, 1500);
                    }
                } catch(e) {
                    console.warn('Δεν ήταν δυνατό το άνοιγμα διαφήμισης:', e);
                    // Fallback: ανοίγουμε απλά ένα κενό παράθυρο
                    try {
                        adWindowRef = window.open('https://quge5.com/88/tag.min.js', '_blank');
                        showAdNotification();
                        setTimeout(() => window.focus(), 1500);
                    } catch(e2) {
                        console.warn('Fallback διαφήμισης απέτυχε:', e2);
                    }
                }
            }

            function triggerEndOfLevelAd() {
                // Ανοίγουμε διαφήμιση σε νέο παράθυρο στο τέλος κάθε πίστας
                setTimeout(() => {
                    openAdInNewWindow();
                }, 800); // Μικρή καθυστέρηση για να φανούν τα αποτελέσματα πρώτα
            }

            // ========== ΑΠΟΘΗΚΕΥΣΗ ΔΕΔΟΜΕΝΩΝ ==========
            function loadSavedData() {
                try {
                    highScore = parseInt(localStorage.getItem(STORAGE_KEY_HIGHSCORE), 10) || 0;
                    currentLevel = parseInt(localStorage.getItem(STORAGE_KEY_LEVEL), 10) || 1;
                    currentXP = parseInt(localStorage.getItem(STORAGE_KEY_XP), 10) || 0;
                    currentScore = parseInt(localStorage.getItem(STORAGE_KEY_SCORE), 10) || 0;
                } catch(e) {
                    highScore = 0;
                    currentLevel = 1;
                    currentXP = 0;
                    currentScore = 0;
                }
                highScoreDisplay.textContent = highScore;
                updateScoreDisplay();
                updateLevelDisplay();
            }

            function saveAllData() {
                try {
                    localStorage.setItem(STORAGE_KEY_HIGHSCORE, highScore);
                    localStorage.setItem(STORAGE_KEY_LEVEL, currentLevel);
                    localStorage.setItem(STORAGE_KEY_XP, currentXP);
                    localStorage.setItem(STORAGE_KEY_SCORE, currentScore);
                } catch(e) {}
            }

            function updateScoreDisplay() {
                scoreDisplay.textContent = currentScore;
                if (currentScore > highScore) {
                    highScore = currentScore;
                    highScoreDisplay.textContent = highScore;
                }
            }

            function updateLevelDisplay() {
                levelText.textContent = '🏅 LEVEL ' + currentLevel;
                const xpNeeded = XP_PER_LEVEL;
                const progress = Math.min((currentXP / xpNeeded) * 100, 100);
                levelBar.style.width = progress + '%';
                levelPoints.textContent = currentXP + ' / ' + xpNeeded + ' XP';
            }

            function addXP(amount) {
                currentXP += amount;
                let leveledUp = false;
                while (currentXP >= XP_PER_LEVEL) {
                    currentXP -= XP_PER_LEVEL;
                    currentLevel++;
                    leveledUp = true;
                }
                updateLevelDisplay();
                if (leveledUp) {
                    playLevelUpSound();
                    const rect = gameContainer.getBoundingClientRect();
                    showScorePop('⬆ LEVEL ' + currentLevel + '!', rect.width/2, rect.height/3);
                    messageBox.textContent = '🎉 ΑΝΕΒΗΚΕΣ LEVEL ' + currentLevel + '! Συγχαρητήρια!';
                    messageBox.style.color = 'var(--gold-light)';
                }
                saveAllData();
            }

            function showScorePop(text, x, y) {
                const pop = document.createElement('span');
                pop.className = 'score-pop';
                pop.textContent = text;
                pop.style.left = x + 'px';
                pop.style.top = y + 'px';
                gameContainer.appendChild(pop);
                setTimeout(() => pop.remove(), 1200);
            }

            function spawnConfetti() {
                const colors = ['#f5d78c','#e2b04a','#3fb950','#58a6ff','#f85149','#d2991d','#bc8cff','#ff7b72'];
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < 50; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.animationDelay = Math.random() * 1.2 + 's';
                    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    piece.style.width = (Math.random() * 8 + 4) + 'px';
                    piece.style.height = (Math.random() * 8 + 4) + 'px';
                    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    fragment.appendChild(piece);
                }
                confettiContainer.appendChild(fragment);
                setTimeout(() => { confettiContainer.innerHTML = ''; }, 3500);
            }

            function getRandomWord() {
                if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = [];
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * SECRET_WORDS.length);
                } while (usedWordIndices.includes(randomIndex));
                usedWordIndices.push(randomIndex);
                return SECRET_WORDS[randomIndex];
            }

            function normalizeGreek(text) {
                return text.toUpperCase()
                    .replace(/Ά/g,"Α").replace(/Έ/g,"Ε").replace(/Ή/g,"Η")
                    .replace(/Ί/g,"Ι").replace(/Ό/g,"Ο").replace(/Ύ/g,"Υ")
                    .replace(/Ώ/g,"Ω").replace(/Ϊ/g,"Ι").replace(/Ϋ/g,"Υ")
                    .replace(/\s+/g,"");
            }

            function formatTime(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function stopTimer() {
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            }

            function createAttemptDots() {
                attemptsDots.innerHTML = "";
                for (let i = 0; i < MAX_ATTEMPTS; i++) {
                    const dot = document.createElement("span");
                    dot.className = "attempt-dot";
                    if (i < wrongAttempts) dot.classList.add("lost");
                    attemptsDots.appendChild(dot);
                }
            }

            function updateAttemptDots() {
                const dots = attemptsDots.querySelectorAll(".attempt-dot");
                dots.forEach((dot, index) => {
                    if (index < wrongAttempts) dot.classList.add("lost");
                    else dot.classList.remove("lost");
                });
            }

            function spinAllSlots(callback) {
                if (isSpinning) return;
                isSpinning = true;
                playSpinSound();
                const slots = wordDisplay.querySelectorAll(".word-slot:not(.space)");
                const allLetters = ALPHABET.join("");
                slots.forEach((slot) => {
                    const inner = slot.querySelector(".slot-inner");
                    if (!inner) return;
                    slot.classList.add("spinning");
                    let spinCount = 0;
                    const maxSpins = 8;
                    const spinInterval = setInterval(() => {
                        inner.textContent = allLetters[Math.floor(Math.random() * allLetters.length)];
                        spinCount++;
                        if (spinCount >= maxSpins) {
                            clearInterval(spinInterval);
                            slot.classList.remove("spinning");
                        }
                    }, 50);
                    slot._spinInterval = spinInterval;
                });
                setTimeout(() => {
                    isSpinning = false;
                    updateWordDisplay();
                    if (callback) callback();
                }, 500);
            }

            function createAlphabetButtons() {
                alphabetContainer.innerHTML = "";
                ALPHABET.forEach(letter => {
                    const btn = document.createElement("button");
                    btn.className = "letter-btn";
                    btn.textContent = letter;
                    btn.setAttribute("aria-label", `Γράμμα ${letter}`);
                    btn.setAttribute("type", "button");
                    
                    btn.addEventListener("touchstart", function(e) {
                        e.preventDefault(); e.stopPropagation();
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    }, { passive: false });
                    
                    btn.addEventListener("touchend", function(e) { 
                        e.preventDefault(); 
                        btn.classList.remove("pressed"); 
                    });
                    
                    btn.addEventListener("touchcancel", function(e) { 
                        btn.classList.remove("pressed"); 
                    });
                    
                    btn.addEventListener("mousedown", function(e) {
                        e.preventDefault();
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    });
                    
                    btn.addEventListener("mouseup", function(e) { 
                        btn.classList.remove("pressed"); 
                    });
                    
                    btn.addEventListener("mouseleave", function(e) { 
                        btn.classList.remove("pressed"); 
                    });
                    
                    btn.addEventListener("click", function(e) { 
                        e.preventDefault(); 
                        e.stopPropagation(); 
                    });
                    
                    alphabetContainer.appendChild(btn);
                });
            }

            function updateAlphabetButtons() {
                const buttons = alphabetContainer.querySelectorAll(".letter-btn");
                const normalizedWord = normalizeGreek(currentWord);
                buttons.forEach(btn => {
                    const letter = btn.textContent;
                    btn.classList.remove("used-correct", "used-wrong", "pressed");
                    if (usedLetters.includes(letter)) {
                        btn.classList.add(normalizedWord.includes(letter) ? "used-correct" : "used-wrong");
                    }
                });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive || usedLetters.includes(letter) || isSpinning) return;
                
                usedLetters.push(letter);
                const normalizedWord = normalizeGreek(currentWord);
                const positions = [];
                for (let i = 0; i < normalizedWord.length; i++) {
                    if (normalizedWord[i] === letter) positions.push(i);
                }
                
                spinAllSlots(() => {
                    if (positions.length > 0) {
                        playCorrectLetterSound();
                        const pointsEarned = positions.length * POINTS_PER_LETTER;
                        currentScore += pointsEarned;
                        addXP(pointsEarned);
                        correctLettersInCurrentWord += positions.length;
                        positions.forEach(pos => { revealedLetters[pos] = letter; });
                        updateWordDisplay(true, positions);
                        updateAlphabetButtons();
                        updateScoreDisplay();
                        saveAllData();
                        
                        const rect = btn.getBoundingClientRect();
                        const containerRect = gameContainer.getBoundingClientRect();
                        showScorePop('+' + pointsEarned, rect.left - containerRect.left + rect.width/2, rect.top - containerRect.top);
                        
                        messageBox.textContent = `✅ Το γράμμα "${letter}" βρέθηκε! +${pointsEarned} πόντοι`;
                        messageBox.style.color = "var(--success)";
                        
                        if (revealedLetters.join("") === normalizedWord) {
                            setTimeout(() => {
                                currentScore += POINTS_FULL_WORD;
                                addXP(POINTS_FULL_WORD);
                                updateScoreDisplay();
                                saveAllData();
                                showScorePop('+100 ΛΕΞΗ!', wordDisplay.getBoundingClientRect().left - containerRect.left + wordDisplay.clientWidth/2, wordDisplay.getBoundingClientRect().top - containerRect.top);
                                playWordCorrectSound();
                                setTimeout(() => playWinFanfare(), 600);
                                spawnConfetti();
                                endGame(true);
                                // Άνοιγμα διαφήμισης στο τέλος της πίστας
                                triggerEndOfLevelAd();
                            }, 400);
                        }
                    } else {
                        playWrongLetterSound();
                        wrongAttempts++;
                        updateAttemptDots();
                        updateAlphabetButtons();
                        flashAllSlots();
                        messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                        messageBox.style.color = "var(--danger)";
                        
                        if (wrongAttempts >= MAX_ATTEMPTS) {
                            setTimeout(() => {
                                endGame(false, "attempts");
                                // Άνοιγμα διαφήμισης στο τέλος της πίστας (αποτυχία)
                                triggerEndOfLevelAd();
                            }, 400);
                        }
                    }
                });
            }

            function flashAllSlots() {
                const slots = wordDisplay.querySelectorAll(".word-slot:not(.space)");
                slots.forEach(slot => {
                    slot.classList.add("wrong-flash");
                    setTimeout(() => slot.classList.remove("wrong-flash"), 500);
                });
            }

            function calculateSlotSize(wordLength) {
                const container = wordDisplay;
                const containerWidth = container.clientWidth - 16;
                const gapSize = 4;
                const totalGaps = (wordLength - 1) * gapSize;
                let slotSize = Math.floor((containerWidth - totalGaps) / wordLength);
                slotSize = Math.min(slotSize, 50);
                slotSize = Math.max(slotSize, 20);
                return slotSize;
            }

            function updateWordDisplay(animate = false, highlightPositions = []) {
                wordDisplay.innerHTML = "";
                const displayWord = currentWord.toUpperCase();
                const normalizedWord = normalizeGreek(currentWord);
                const wordLength = normalizedWord.length;
                const slotSize = calculateSlotSize(wordLength);
                
                for (let i = 0; i < displayWord.length; i++) {
                    const slot = document.createElement("span");
                    
                    if (displayWord[i] === " ") {
                        slot.className = "word-slot space";
                        slot.style.width = Math.floor(slotSize * 0.3) + "px";
                        slot.style.minWidth = Math.floor(slotSize * 0.3) + "px";
                    } else {
                        slot.className = "word-slot";
                        slot.style.width = slotSize + "px";
                        slot.style.height = (slotSize * 1.3) + "px";
                        slot.style.fontSize = (slotSize * 0.5) + "px";
                        slot.style.minWidth = slotSize + "px";
                        
                        const inner = document.createElement("span");
                        inner.className = "slot-inner";
                        inner.textContent = revealedLetters[i] || "_";
                        slot.appendChild(inner);
                        
                        if (animate && highlightPositions.includes(i)) {
                            slot.classList.add("revealed");
                            setTimeout(() => slot.classList.remove("revealed"), 400);
                        }
                    }
                    wordDisplay.appendChild(slot);
                }
            }

            function checkFullGuess() {
                if (!gameActive || isSpinning) return;
                
                initAudio();
                const guess = normalizeGreek(guessInput.value.trim());
                const normalizedWord = normalizeGreek(currentWord);
                
                if (guess === "") {
                    messageBox.textContent = "Γράψε μια λέξη για υποβολή!";
                    messageBox.style.color = "var(--warning)";
                    return;
                }
                
                spinAllSlots(() => {
                    if (guess === normalizedWord) {
                        const remainingLetters = normalizedWord.length - correctLettersInCurrentWord;
                        const letterPoints = remainingLetters * POINTS_PER_LETTER;
                        const totalPoints = letterPoints + POINTS_FULL_WORD;
                        currentScore += totalPoints;
                        addXP(totalPoints);
                        updateScoreDisplay();
                        saveAllData();
                        
                        for (let i = 0; i < normalizedWord.length; i++) {
                            if (!revealedLetters[i]) {
                                revealedLetters[i] = normalizedWord[i];
                                if (!usedLetters.includes(normalizedWord[i])) usedLetters.push(normalizedWord[i]);
                            }
                        }
                        updateWordDisplay(true);
                        updateAlphabetButtons();
                        
                        const containerRect = gameContainer.getBoundingClientRect();
                        showScorePop('+' + totalPoints, wordDisplay.getBoundingClientRect().left - containerRect.left + wordDisplay.clientWidth/2, wordDisplay.getBoundingClientRect().top - containerRect.top);
                        
                        playWordCorrectSound();
                        setTimeout(() => playWinFanfare(), 600);
                        spawnConfetti();
                        endGame(true);
                        // Άνοιγμα διαφήμισης στο τέλος της πίστας
                        triggerEndOfLevelAd();
                    } else {
                        playWordWrongSound();
                        wrongAttempts++;
                        updateAttemptDots();
                        flashAllSlots();
                        messageBox.textContent = `Λάθος λέξη! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                        messageBox.style.color = "var(--danger)";
                        guessInput.value = "";
                        guessInput.focus();
                        
                        if (wrongAttempts >= MAX_ATTEMPTS) {
                            setTimeout(() => {
                                endGame(false, "attempts");
                                // Άνοιγμα διαφήμισης στο τέλος της πίστας (αποτυχία)
                                triggerEndOfLevelAd();
                            }, 400);
                        }
                    }
                });
            }

            function endGame(won, reason = "time") {
                if (!gameActive) return;
                gameActive = false;
                stopTimer();
                
                const normalizedWord = normalizeGreek(currentWord);
                for (let i = 0; i < normalizedWord.length; i++) revealedLetters[i] = normalizedWord[i];
                updateWordDisplay();
                updateAlphabetButtons();
                guessInput.disabled = true;
                submitBtn.disabled = true;
                resultPanel.classList.remove("hidden");
                
                saveAllData();
                
                if (won) {
                    resultEmoji.textContent = "🎉";
                    resultText.textContent = "ΤΟ ΒΡΗΚΕΣ!";
                    messageBox.textContent = "Συγχαρητήρια! Πάτα ΝΕΟ ΠΑΙΧΝΙΔΙ";
                    messageBox.style.color = "var(--success)";
                } else {
                    resultEmoji.textContent = reason === "attempts" ? "💔" : "⏰";
                    resultText.textContent = reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ";
                    messageBox.textContent = "Η λέξη ήταν: " + currentWord + ". Πάτα ΝΕΟ ΠΑΙΧΝΙΔΙ";
                    messageBox.style.color = "var(--danger)";
                }
                
                // Για timeout, ανοίγουμε επίσης διαφήμιση
                if (reason === "time") {
                    triggerEndOfLevelAd();
                }
            }

            function resetGame() {
                stopTimer();
                const randomWordObj = getRandomWord();
                currentWord = randomWordObj.word;
                currentHint = randomWordObj.hint;
                gameActive = true;
                timeSeconds = START_TIME;
                wrongAttempts = 0;
                usedLetters = [];
                isSpinning = false;
                correctLettersInCurrentWord = 0;
                const normalizedWord = normalizeGreek(currentWord);
                revealedLetters = new Array(normalizedWord.length).fill("");
                
                timerDisplay.textContent = formatTime(timeSeconds);
                timerDisplay.style.color = "var(--text-bright)";
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                updateAlphabetButtons();
                createAttemptDots();
                guessInput.value = "";
                guessInput.disabled = false;
                submitBtn.disabled = false;
                resultPanel.classList.add("hidden");
                messageBox.textContent = "";
                messageBox.style.color = "var(--text)";
                confettiContainer.innerHTML = "";
                
                timerInterval = setInterval(() => {
                    if (!gameActive) return;
                    timeSeconds--;
                    timerDisplay.textContent = formatTime(timeSeconds);
                    timerDisplay.style.color = timeSeconds <= 30 ? "var(--danger)" : "var(--text-bright)";
                    if (timeSeconds <= 0) {
                        timeSeconds = 0;
                        timerDisplay.textContent = formatTime(0);
                        endGame(false, "time");
                    }
                }, 1000);
                
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
                guessInput.blur();
                setTimeout(() => guessInput.focus(), 100);
            }

            // ========== EVENT LISTENERS ==========
            submitBtn.addEventListener("touchstart", function(e) { 
                e.preventDefault(); 
                initAudio();
                checkFullGuess(); 
            });
            submitBtn.addEventListener("mousedown", function(e) { 
                e.preventDefault(); 
                initAudio();
                checkFullGuess(); 
            });
            submitBtn.addEventListener("click", function(e) { e.preventDefault(); });

            newGameBtn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                initAudio();
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
                guessInput.blur();
                resetGame();
            });
            newGameBtn.addEventListener("mousedown", function(e) {
                e.preventDefault();
                initAudio();
                window.scrollTo(0, 0);
                guessInput.blur();
                resetGame();
            });
            newGameBtn.addEventListener("click", function(e) { e.preventDefault(); });

            guessInput.addEventListener("keydown", function(e) {
                if (e.key === "Enter") { 
                    e.preventDefault(); 
                    initAudio();
                    checkFullGuess(); 
                }
            });

            guessInput.addEventListener("input", function(e) {
                e.target.value = e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, "");
            });

            guessInput.addEventListener("focus", function(e) {
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
            });

            // ========== ΑΡΧΙΚΟΠΟΙΗΣΗ ==========
            loadSavedData();
            createAttemptDots();
            createAlphabetButtons();
            resetGame();

            window.addEventListener('resize', () => { 
                updateWordDisplay(); 
                window.scrollTo(0, 0);
            });
            
            document.addEventListener('touchmove', function(e) {
                if (e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                }
            }, { passive: false });

            // Καθαρισμός παραθύρου διαφήμισης όταν κλείνει η σελίδα
            window.addEventListener('beforeunload', function() {
                if (adWindowRef && !adWindowRef.closed) {
                    adWindowRef.close();
                }
            });
        })();
    </script>
</body>
</html>
