<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ΤΡΟΧΟΣ ΤΗΣ ΤΥΧΗΣ | Crack the Code</title>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #131820;
            --border: #2a3040;
            --gold: #e2b04a;
            --gold-light: #f5d78c;
            --text: #bcc5d0;
            --text-bright: #e8edf2;
            --success: #2ea043;
            --danger: #da3633;
            --btn-bg: #1c2129;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(160deg, #0a0e14 0%, #141b24 40%, #0d1117 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 8px;
            margin: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .game-container {
            max-width: 750px;
            width: 100%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border-radius: 24px;
            padding: 16px 14px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }
        .title {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f7da8c 0%, #c99530 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            filter: drop-shadow(0 4px 8px rgba(200, 150, 50, 0.6));
        }
        .subtitle {
            font-size: 0.7rem;
            color: #6e7681;
            letter-spacing: 3px;
            text-align: center;
            margin-top: 2px;
        }
        .hint-box {
            background: rgba(226, 176, 74, 0.06);
            border: 1px solid rgba(226, 176, 74, 0.3);
            border-radius: 14px;
            padding: 12px 16px;
            text-align: center;
            width: 100%;
        }
        .hint-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 4px;
            font-weight: 700;
        }
        .hint-text {
            font-style: italic;
            color: var(--gold-light);
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            line-height: 1.5;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1;
            min-width: 90px;
            max-width: 200px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 14px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .stat-box.points-box {
            border-color: var(--gold);
            background: rgba(226, 176, 74, 0.1);
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(226, 176, 74, 0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(226, 176, 74, 0.5);
            }
        }
        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6e7681;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .stat-value {
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            font-weight: 700;
            color: var(--text-bright);
            font-family: 'SF Mono', 'Courier New', monospace;
        }
        .stat-value.points-value {
            color: var(--gold-light);
            font-size: clamp(1.2rem, 4vw, 1.7rem);
        }
        .word-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.5);
            padding: 18px 14px;
            border-radius: 18px;
            border: 2px solid var(--border);
            width: 100%;
            min-height: 55px;
        }
        .word-slot {
            background: linear-gradient(180deg, #1a1f28 0%, #0d1117 100%);
            border: 2px solid #30363d;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-light);
            font-family: 'SF Mono', 'Courier New', monospace;
            width: 40px;
            height: 52px;
            flex-shrink: 0;
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            transition: all 0.3s ease;
        }
        .word-slot.revealed {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(226, 176, 74, 0.7);
            animation: revealPop 0.4s ease;
        }
        @keyframes revealPop {
            0% {
                transform: scale(0.4);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .word-slot.space {
            width: 16px;
            background: transparent;
            border: none;
            box-shadow: none;
        }
        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.35);
            padding: 12px 8px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
        }
        .letter-btn {
            width: clamp(36px, 9vw, 48px);
            height: clamp(36px, 9vw, 48px);
            background: linear-gradient(180deg, #2a3340 0%, #1a202a 100%);
            border: 2px solid #4a5568;
            border-radius: 12px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #0a0d12;
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .letter-btn:active,
        .letter-btn.pressed {
            top: 3px;
            box-shadow: 0 1px 0 #0a0d12;
            background: #3d4858;
            border-color: #6a7a90;
            transform: scale(0.95);
        }
        .letter-btn.used-correct {
            background: #142a14 !important;
            border-color: #2ea043 !important;
            color: #3fb950 !important;
            opacity: 0.75;
            pointer-events: none;
            top: 2px;
        }
        .letter-btn.used-wrong {
            background: #2a1414 !important;
            border-color: #da3633 !important;
            color: #f85149 !important;
            opacity: 0.75;
            pointer-events: none;
            top: 2px;
            text-decoration: line-through;
        }
        .letter-btn.disabled-spin {
            opacity: 0.3;
            pointer-events: none;
        }
        .letter-btn.buy-mode {
            animation: buyPulse 0.8s ease-in-out infinite;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 14px rgba(59, 130, 246, 0.6) !important;
        }
        @keyframes buyPulse {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
            }
            50% {
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
            }
        }
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .btn {
            flex: 1;
            min-width: 90px;
            padding: 12px 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            text-align: center;
            box-shadow: 0 5px 0 rgba(0, 0, 0, 0.5);
            position: relative;
            top: 0;
        }
        .btn:active {
            top: 4px;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
        }
        .btn-spin {
            background: linear-gradient(180deg, #e63946 0%, #9b1d20 100%);
            border-color: #c62828;
            color: #fff;
            font-weight: 800;
            animation: pulseSpin 2s ease-in-out infinite;
        }
        @keyframes pulseSpin {
            0%,
            100% {
                box-shadow: 0 5px 0 rgba(0, 0, 0, 0.5), 0 0 10px rgba(230, 57, 70, 0.4);
            }
            50% {
                box-shadow: 0 5px 0 rgba(0, 0, 0, 0.5), 0 0 22px rgba(230, 57, 70, 0.8);
            }
        }
        .btn-spin:disabled {
            opacity: 0.35;
            animation: none;
        }
        .btn-buy {
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
            border-color: #2563eb;
            color: #fff;
            font-weight: 800;
        }
        .btn-buy:disabled {
            opacity: 0.35;
        }
        .btn-buy.active-buy {
            background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%) !important;
            border-color: #fbbf24 !important;
            animation: buyActivePulse 0.6s ease-in-out infinite;
        }
        @keyframes buyActivePulse {
            0%,
            100% {
                box-shadow: 0 5px 0 rgba(0, 0, 0, 0.5), 0 0 12px rgba(245, 158, 11, 0.5);
            }
            50% {
                box-shadow: 0 5px 0 rgba(0, 0, 0, 0.5), 0 0 25px rgba(245, 158, 11, 0.9);
            }
        }
        .btn-submit {
            background: linear-gradient(180deg, #e2b04a 0%, #b8882a 100%);
            border-color: #d4a035;
            color: #0d1117;
            font-weight: 800;
        }
        .btn-submit:disabled {
            opacity: 0.35;
        }
        .btn-new {
            background: var(--btn-bg);
            border-color: var(--border);
            color: var(--text-bright);
        }
        .guess-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--btn-bg);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text-bright);
            font-size: clamp(0.9rem, 3vw, 1rem);
            text-align: center;
            font-family: 'SF Mono', 'Courier New', monospace;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .guess-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(226, 176, 74, 0.3);
        }
        .message {
            font-weight: 600;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            min-height: 22px;
            color: var(--warning);
            text-align: center;
            width: 100%;
        }
        .result-panel {
            background: rgba(226, 176, 74, 0.08);
            border: 2px solid var(--gold);
            padding: 10px 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            font-size: 0.95rem;
        }
        .hidden {
            display: none !important;
        }
        .footer {
            display: flex;
            gap: 10px;
            font-size: 0.6rem;
            color: #484f58;
            flex-wrap: wrap;
            justify-content: center;
        }
        hr {
            border-color: var(--border);
            width: 80%;
            margin: 2px 0;
        }

        /* ========== ΤΡΟΧΟΣ - MODAL ========== */
        .wheel-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .wheel-modal {
            background: radial-gradient(ellipse at center, #1a1f2e 0%, #0a0e18 100%);
            border: 4px solid var(--gold);
            border-radius: 28px;
            padding: 24px 20px 28px;
            text-align: center;
            max-width: 550px;
            width: 97%;
            box-shadow: 0 0 120px rgba(226, 176, 74, 0.9), 0 0 40px rgba(255, 255, 255, 0.1), inset 0 0 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .wheel-title {
            font-size: clamp(1.3rem, 4.5vw, 1.7rem);
            font-weight: 900;
            background: linear-gradient(180deg, #f7da8c 0%, #e2b04a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: 4px;
        }
        .wheel-container {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 0 auto 18px;
        }
        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(226, 176, 74, 0.8), 0 0 120px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(0, 0, 0, 0.6);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        .wheel-pointer {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 38px solid #ff3333;
            filter: drop-shadow(0 6px 10px rgba(255, 0, 0, 0.8));
            z-index: 5;
            animation: pointerBounce 1s ease-in-out infinite;
        }
        @keyframes pointerBounce {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-5px);
            }
        }
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 40% 40%, #ffe9a0, #b8882a 70%, #6b4f1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.85rem;
            color: #0d1117;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(226, 176, 74, 0.6), inset 0 3px 6px rgba(255, 255, 255, 0.3);
            z-index: 4;
        }
        .spin-btn-big {
            background: linear-gradient(180deg, #ff4444 0%, #991111 100%);
            border: 3px solid #ff6666;
            color: #fff;
            padding: 16px 50px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 8px 0 #550000, 0 10px 30px rgba(255, 0, 0, 0.4);
            margin: 10px 0;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .spin-btn-big:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #550000, 0 4px 15px rgba(255, 0, 0, 0.3);
        }
        .spin-btn-big:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .wheel-result {
            font-size: 1.2rem;
            font-weight: 700;
            min-height: 30px;
            margin: 10px 0;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
        }
        .close-wheel-btn {
            position: absolute;
            top: 10px;
            right: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 6px 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 420px) {
            .wheel-container {
                width: 300px;
                height: 300px;
            }
            .spin-btn-big {
                padding: 14px 36px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">🎡 ΤΡΟΧΟΣ ΤΗΣ ΤΥΧΗΣ</div>
        <div class="subtitle">ΓΥΡΙΣΕ ΤΟΝ ΤΡΟΧΟ - ΒΡΕΣ ΤΗ ΛΕΞΗ!</div>

        <div class="hint-box" id="hintBox">
            <div class="hint-category" id="hintCategory">ΚΑΤΗΓΟΡΙΑ</div>
            <div class="hint-text" id="hintText">💡 Φόρτωση...</div>
        </div>

        <div class="stats-row">
            <div class="stat-box points-box">
                <div class="stat-label">💰 ΣΥΝΟΛΟ ΠΟΝΤΩΝ</div>
                <div class="stat-value points-value" id="pointsDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🎯 ΑΞΙΑ ΓΥΡΟΥ</div>
                <div class="stat-value" id="roundPointsDisplay" style="color:#f5d78c;">-</div>
            </div>
        </div>

        <div class="word-display" id="wordDisplay"></div>

        <div class="alphabet-container" id="alphabetContainer"></div>

        <input type="text" class="guess-input" id="guessInput" placeholder="Γράψε ολόκληρη τη λέξη..." autocomplete="off" inputmode="text" enterkeyhint="done">

        <div class="btn-row">
            <button class="btn btn-spin" id="spinWheelBtn">🎡 ΓΥΡΙΣΕ ΤΡΟΧΟ</button>
            <button class="btn btn-buy" id="buyLetterBtn">🛒 ΑΓΟΡΑ ΓΡΑΜΜΑ (20π)</button>
            <button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ ΛΕΞΗΣ</button>
            <button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
        </div>

        <div class="message" id="messageBox">Γύρισε τον τροχό για να ξεκινήσεις!</div>

        <div id="resultPanel" class="result-panel hidden">
            <span id="resultEmoji">🏆</span>
            <span id="resultText"></span>
            <span id="scoreDisplay"></span>
        </div>

        <hr>
        <div class="footer">
            <span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span>
            <span>💾 ΟΙ ΠΟΝΤΟΙ ΑΠΟΘΗΚΕΥΟΝΤΑΙ</span>
        </div>
    </div>

    <!-- MODAL ΤΡΟΧΟΥ -->
    <div class="wheel-modal-overlay hidden" id="wheelModal">
        <div class="wheel-modal">
            <button class="close-wheel-btn" id="closeWheelBtn">✕</button>
            <div class="wheel-title">🎡 ΓΥΡΙΣΕ ΤΟΝ ΤΡΟΧΟ!</div>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas class="wheel-canvas" id="wheelCanvas" width="380" height="380"></canvas>
                <div class="wheel-center">🎰</div>
            </div>
            <button class="spin-btn-big" id="spinBtn">🎰 ΓΥΡΙΣΕ!</button>
            <div class="wheel-result" id="wheelResult"></div>
        </div>
    </div>

    <script>
        (function() {
            const SECRET_WORDS = [
                { word: "ΦΙΛΟΣΟΦΙΑ", hint: "Η αγάπη για τη σοφία και τη γνώση", category: "ΕΠΙΣΤΗΜΗ" },
                { word: "ΕΛΕΥΘΕΡΙΑ", hint: "Το πολυτιμότερο αγαθό του ανθρώπου", category: "ΑΞΙΑ" },
                { word: "ΘΑΛΑΣΣΑ", hint: "Απέραντο γαλάζιο που κρύβει μυστικά", category: "ΦΥΣΗ" },
                { word: "ΠΕΡΙΠΕΤΕΙΑ", hint: "Μια συναρπαστική και απρόβλεπτη εμπειρία", category: "ΖΩΗ" },
                { word: "ΚΑΛΛΙΟ ΑΡΓΑ ΠΑΡΑ ΠΟΤΕ", hint: "Γνωστή παροιμία για το χρόνο", category: "ΠΑΡΟΙΜΙΑ" },
                { word: "ΟΠΟΙΟΣ ΒΙΑΖΕΤΑΙ ΣΚΟΝΤΑΦΤΕΙ", hint: "Παροιμία για τη βιασύνη", category: "ΠΑΡΟΙΜΙΑ" },
                { word: "Η ΓΛΩΣΣΑ ΚΟΚΑΛΑ ΔΕΝ ΕΧΕΙ", hint: "Παροιμία για τη δύναμη του λόγου", category: "ΠΑΡΟΙΜΙΑ" },
                { word: "Ο ΜΙΚΡΟΣ ΠΡΙΓΚΙΠΑΣ", hint: "Κλασικό βιβλίο του Αντουάν ντε Σαιντ-Εξυπερύ", category: "ΒΙΒΛΙΟ" },
                { word: "Ο ΓΕΡΟΣ ΚΑΙ Η ΘΑΛΑΣΣΑ", hint: "Αριστούργημα του Έρνεστ Χέμινγουεϊ", category: "ΒΙΒΛΙΟ" },
                { word: "ΠΟΛΕΜΟΣ ΚΑΙ ΕΙΡΗΝΗ", hint: "Επικό μυθιστόρημα του Λέοντος Τολστόι", category: "ΒΙΒΛΙΟ" },

            function savePoints() { try { localStorage.setItem(STORAGE_KEY, totalPoints.toString()); } catch (e) {} }

            function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended')
                    audioCtx.resume(); }

            function playTick() { if (!audioCtx) return; try { const o = audioCtx.createOscillator(); const g = audioCtx
                        .createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(500, audioCtx.currentTime);
                    g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.start();
                    o.stop(audioCtx.currentTime + 0.04); } catch (e) {} }

            function playWin() { if (!audioCtx) return; try { [523, 659, 784].forEach((f, i) => { const o = audioCtx
                            .createOscillator(); const g = audioCtx.createGain();
                        o.type = 'sine';
                        o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
                        g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.25);
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.start(audioCtx.currentTime + i * 0.1);
                        o.stop(audioCtx.currentTime + i * 0.1 + 0.25); }); } catch (e) {} }

            function playFail() { if (!audioCtx) return; try { const o = audioCtx.createOscillator(); const g = audioCtx
                        .createGain();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(70, audioCtx.currentTime);
                    o.frequency.linearRampToValueAtTime(25, audioCtx.currentTime + 0.35);
                    g.gain.setValueAtTime(0.14, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.start();
                    o.stop(audioCtx.currentTime + 0.35); } catch (e) {} }

            function playBankrupt() { if (!audioCtx) return; try { for (let i = 0; i < 4; i++) { const o = audioCtx
                            .createOscillator(); const g = audioCtx.createGain();
                        o.type = 'square';
                        o.frequency.setValueAtTime(45 - i * 8, audioCtx.currentTime + i * 0.1);
                        g.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.18);
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.start(audioCtx.currentTime + i * 0.1);
                        o.stop(audioCtx.currentTime + i * 0.1 + 0.18); } } catch (e) {} }

            function drawWheel(rotation = 0) {
                const ctx = wheelCanvas.getContext("2d");
                const cx = wheelCanvas.width / 2;
                const cy = wheelCanvas.height / 2;
                const radius = 170;
                const segs = WHEEL_SEGMENTS.length;
                const anglePer = (2 * Math.PI) / segs;
                ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
                WHEEL_SEGMENTS.forEach((seg, i) => {
                    const start = i * anglePer + rotation;
                    const end = start + anglePer;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, radius, start, end);
                    ctx.closePath();
                    ctx.fillStyle = seg.color;
                    ctx.fill();
                    ctx.strokeStyle = "#1a1a2e";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(start + anglePer / 2);
                    ctx.textAlign = "right";
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 18px 'Segoe UI', sans-serif";
                    ctx.shadowColor = "#000";
                    ctx.shadowBlur = 4;
                    ctx.fillText(seg.label, radius - 16, 6);
                    ctx.restore();
                });
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = "#f5d78c";
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 30, 0, 2 * Math.PI);
                ctx.fillStyle = "#0d1117";
                ctx.fill();
                ctx.strokeStyle = "#f5d78c";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            function closeWheelModal() {
                if (autoCloseTimeout) clearTimeout(autoCloseTimeout);
                wheelModal.classList.add("hidden");
                if (wheelSpun) {
                    updateAlphabetButtonsState(false);
                    spinWheelBtn.disabled = true;
                }
            }

            function spinWheel() {
                if (!gameActive || wheelHasSpunThisRound) return;
                wheelHasSpunThisRound = true;
                spinBtn.disabled = true;
                closeWheelBtn.style.pointerEvents = "auto";
                const segs = WHEEL_SEGMENTS.length;
                const anglePer = 360 / segs;
                const randomSeg = Math.floor(Math.random() * segs);
                const totalRot = 360 * (6 + Math.floor(Math.random() * 5)) + (randomSeg * anglePer) + (Math.random() *
                    anglePer * 0.6);
                const duration = 4500;
                const startTime = performance.now();

                function animate(ts) {
                    const elapsed = ts - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const cr = totalRot * eased;
                    drawWheel((cr * Math.PI) / 180);
                    if (Math.floor(cr / 10) !== Math.floor((cr - totalRot * 0.02) / 10)) playTick();
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        const fa = cr % 360;
                        const si = Math.floor(fa / anglePer);
                        const ai = (segs - si) % segs;
                        const result = WHEEL_SEGMENTS[ai];
                        if (result.value === 0) {
                            wheelResult.textContent = "💀 ΧΡΕΟΚΟΠΙΑ! Μηδενίστηκαν οι πόντοι σου!";
                            wheelResult.style.color = "#ff4444";
                            totalPoints = 0;
                            currentRoundPoints = 0;
                            playBankrupt();
                        } else {
                            currentRoundPoints = result.value;
                            wheelResult.textContent =
                                `💰 Κέρδισες ${result.value} πόντους ανά γράμμα!`;
                            wheelResult.style.color = "#f5d78c";
                            playWin();
                        }
                        wheelSpun = true;
                        updatePointsDisplay();
                        roundPointsDisplay.textContent = currentRoundPoints > 0 ? currentRoundPoints +
                            "π/γράμμα" : "0π";
                        savePoints();
                        closeWheelBtn.style.pointerEvents = "auto";
                        updateAlphabetButtonsState(false);
                        spinWheelBtn.disabled = true;
                        messageBox.textContent = wheelResult.textContent;
                        messageBox.style.color = wheelResult.style.color;
                        autoCloseTimeout = setTimeout(() => closeWheelModal(), 3000);
                    }
                }
                requestAnimationFrame(animate);
            }

            function updatePointsDisplay() { pointsDisplay.textContent = totalPoints.toLocaleString(); }

            function normalizeGreek(text) { return text.toUpperCase().replace(/Ά/g, "Α").replace(/Έ/g, "Ε").replace(/Ή/g,
                    "Η").replace(/Ί/g, "Ι").replace(/Ό/g, "Ο").replace(/Ύ/g, "Υ").replace(/Ώ/g, "Ω").replace(/Ϊ/g, "Ι")
                    .replace(/Ϋ/g, "Υ").replace(/\s+/g, ""); }

            function formatTime(sec) { const m = Math.floor(sec / 60); const s = sec % 60; return `${m}:${s < 10 ? '0' : ''}${s}`; }

            function stopTimer() { if (timerInterval) { clearInterval(timerInterval);

            function updateAlphabetButtonsState(disabled) { const btns = alphabetContainer.querySelectorAll(
                    ".letter-btn:not(.used-correct):not(.used-wrong)"); btns.forEach(b => { if (disabled) b.classList.add(
                        "disabled-spin"); else b.classList.remove("disabled-spin"); }); }

            function createAlphabetButtons() {
                alphabetContainer.innerHTML = "";
                ALPHABET.forEach(letter => {
                    const btn = document.createElement("button");
                    btn.className = "letter-btn disabled-spin";
                    btn.textContent = letter;
                    btn.setAttribute("type", "button");
                    btn.addEventListener("touchstart", function(e) { e.preventDefault();
                        e.stopPropagation(); if (isBuyMode) { initAudio();
                            handleBuyLetterClick(letter); return; } if (!wheelSpun || !
                            gameActive) { messageBox.textContent = "Γύρισε πρώτα τον τροχό! 🎡";
                            messageBox.style.color = "#ff6b6b"; return; }
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn); }, { passive: false });
                    btn.addEventListener("touchend", () => btn.classList.remove("pressed"));
                    btn.addEventListener("mousedown", function(e) { e.preventDefault(); if (isBuyMode) { initAudio();
                            handleBuyLetterClick(letter); return; } if (!wheelSpun || !gameActive) {
                            messageBox.textContent = "Γύρισε πρώτα τον τροχό! 🎡";
                            messageBox.style.color = "#ff6b6b"; return; }
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn); });
                    btn.addEventListener("mouseup", () => btn.classList.remove("pressed"));
                    btn.addEventListener("mouseleave", () => btn.classList.remove("pressed"));
                    btn.addEventListener("click", e => { e.preventDefault();
                        e.stopPropagation(); });
                    alphabetContainer.appendChild(btn);
                });
            }

            function updateAlphabetButtons() { const btns = alphabetContainer.querySelectorAll(".letter-btn"); const nw =
                    normalizeGreek(currentWord);
                btns.forEach(b => { const l = b.textContent;
                    b.classList.remove("used-correct", "used-wrong", "buy-mode"); if (usedLetters.includes(l)) { b

                        usedLetters.includes(l) && !b.classList.contains("used-correct") && !b.classList.contains(
                            "used-wrong")) { b.classList.add("buy-mode"); } }); }

            function handleLetterClick(letter, btn) { if (!gameActive || usedLetters.includes(letter) || !wheelSpun)
                return;
                usedLetters.push(letter); const nw = normalizeGreek(currentWord); const pos = []; for (let i = 0; i < nw
                    .length; i++) { if (nw[i] === letter) pos.push(i); } if (pos.length > 0) { const earned =
                        currentRoundPoints * pos.length;
                    totalPoints += earned;
                    pos.forEach(p => { revealedLetters[p] = letter; });
                    updatePointsDisplay();
                    savePoints();
                    updateWordDisplay(true, pos);
                    updateAlphabetButtons();
                    messageBox.textContent = `✅ Το "${letter}" βρέθηκε! +${earned} πόντοι!`;
                    messageBox.style.color = "#2ea043";
                    playWin(); if (revealedLetters.join("") === nw) { totalPoints += 500;
                        updatePointsDisplay();
                        savePoints();
                        setTimeout(() => endGame(true), 500); } } else { messageBox.textContent =

                    messageBox.style.color = "#da3633";

                wheelSpun = false;
                wheelHasSpunThisRound = false;
                currentRoundPoints = 0;
                roundPointsDisplay.textContent = "-";
                updateAlphabetButtonsState(true);

            function activateBuyMode() { if (!gameActive) return; if (!wheelSpun) { messageBox.textContent =
                        "Γύρισε πρώτα τον τροχό! 🎡";
                    messageBox.style.color = "#ff6b6b"; return; } if (totalPoints < BUY_COST) { messageBox.textContent =

                isBuyMode = true;

            function handleBuyLetterClick(letter) { if (!isBuyMode) return; if (usedLetters.includes(letter)) {
                    messageBox.textContent = "Αυτό το γράμμα έχει ήδη χρησιμοποιηθεί!";
                    messageBox.style.color = "#ff6b6b"; return; } if (totalPoints < BUY_COST) { messageBox.textContent =
                        `Χρειάζεσαι ${BUY_COST} πόντους! Έχεις ${totalPoints}π.`;
                    messageBox.style.color = "#ff6b6b";
                    deactivateBuyMode(); return; }
                totalPoints -= BUY_COST;
                updatePointsDisplay();
                savePoints();
                usedLetters.push(letter); const nw = normalizeGreek(currentWord); const pos = []; for (let i = 0; i < nw
                    .length; i++) { if (nw[i] === letter && !revealedLetters[i]) pos.push(i); } if (pos.length > 0) { pos
                        .forEach(p => { revealedLetters[p] = letter; });
                    updateWordDisplay(true, pos);
                    messageBox.textContent = `🛒 Αγόρασες το "${letter}" για ${BUY_COST}π! Βρέθηκε!`;
                    messageBox.style.color = "#4d96ff";
                    playWin(); if (revealedLetters.join("") === nw) { totalPoints += 500;
                        updatePointsDisplay();
                        savePoints();
                        setTimeout(() => endGame(true), 500); } } else { updateAlphabetButtons();
                    messageBox.textContent =
                        `🛒 Αγόρασες το "${letter}" για ${BUY_COST}π. Δεν υπήρχε στη λέξη.`;
                    messageBox.style.color = "#ffd93d";
                    playFail(); }
                deactivateBuyMode(); }

            function deactivateBuyMode() { isBuyMode = false;
                buyLetterBtn.classList.remove("active-buy");
                buyLetterBtn.textContent = "🛒 ΑΓΟΡΑ ΓΡΑΜΜΑ (20π)";
                updateAlphabetButtons();
                updateAlphabetButtonsState(true);
                spinWheelBtn.disabled = true; }

            function updateWordDisplay(animate = false, hp = []) { wordDisplay.innerHTML = ""; const dw = currentWord
                    .toUpperCase(); let si = 0; for (let i = 0; i < dw.length; i++) { const slot = document.createElement(
                        "span"); if (dw[i] === " ") { slot.className = "word-slot space"; } else { slot.className =
                            "word-slot";
                        slot.textContent = revealedLetters[si] || "_"; if (animate && hp.includes(si)) { slot.classList
                                .add("revealed");
                            setTimeout(() => slot.classList.remove("revealed"), 400); }
                        si++; }
                    wordDisplay.appendChild(slot); } }

            function checkFullGuess() { if (!gameActive) return; if (!wheelSpun) { messageBox.textContent =
                        "Γύρισε πρώτα τον τροχό!";
                    messageBox.style.color = "#ff6b6b"; return; }
                initAudio(); const guess = normalizeGreek(guessInput.value.trim()); const nw = normalizeGreek(
                currentWord); if (guess === "") return; if (guess === nw) { for (let i = 0; i < nw.length; i++) { if (!
                        revealedLetters[i]) { revealedLetters[i] = nw[i]; if (!usedLetters.includes(nw[i]))
                            usedLetters.push(nw[i]); } }
                    totalPoints += currentRoundPoints * nw.length + 500;
                    updatePointsDisplay();
                    savePoints();
                    updateWordDisplay(true);
                    updateAlphabetButtons();
                    playWin();
                    endGame(true); } else { messageBox.textContent = "Λάθος λέξη! Προσπάθησε ξανά.";
                    messageBox.style.color = "#da3633";
                    playFail();
                    guessInput.value = "";
                    guessInput.focus(); } }

            function endGame(won) { if (!gameActive) return;
                gameActive = false;
                stopTimer();
                deactivateBuyMode(); const nw = normalizeGreek(currentWord); for (let i = 0; i < nw.length; i++)
                    revealedLetters[i] = nw[i];
                updateWordDisplay();
                updateAlphabetButtons();
                guessInput.disabled = true;
                submitBtn.disabled = true;
                spinWheelBtn.disabled = true;
                buyLetterBtn.disabled = true;
                updateAlphabetButtonsState(true);
                resultPanel.classList.remove("hidden"); if (won) { resultEmoji.textContent = "🎉";
                    resultText.textContent = "ΤΟ ΒΡΗΚΕΣ!";
                    scoreDisplay.textContent = `${totalPoints.toLocaleString()} πόντοι`;
                    messageBox.textContent = "Συγχαρητήρια! " + currentWord;
                    messageBox.style.color = "#2ea043"; } else { resultEmoji.textContent = "⏰";
                    resultText.textContent = "ΤΕΛΟΣ ΧΡΟΝΟΥ";
                    scoreDisplay.textContent = `${totalPoints.toLocaleString()} πόντοι`;
                    messageBox.textContent = "Η λέξη ήταν: " + currentWord;
                    messageBox.style.color = "#da3633"; }
                savePoints(); }

            function shuffleArray(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(
                        Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]]; } return a; }

            function getRandomWord() { if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = []; const
                    avail = []; for (let i = 0; i < SECRET_WORDS.length; i++) { if (!usedWordIndices.includes(i)) avail
                        .push(i); } const ch = shuffleArray(avail)[0];
                usedWordIndices.push(ch); return SECRET_WORDS[ch]; }

            function resetGame() { stopTimer(); if (autoCloseTimeout) clearTimeout(autoCloseTimeout);
                deactivateBuyMode();
                loadPoints(); const rw = getRandomWord();
                currentWord = rw.word;
                currentHint = rw.hint;
                currentCategory = rw.category;
                gameActive = true;
                timeSeconds = START_TIME;
                usedLetters = [];
                wheelSpun = false;
                wheelHasSpunThisRound = false;
                currentRoundPoints = 0; const nw = normalizeGreek(currentWord);
                revealedLetters = new Array(nw.length).fill("");
                timerDisplay.textContent = formatTime(timeSeconds);
                timerDisplay.style.color = "#e8edf2";
                updatePointsDisplay();
                roundPointsDisplay.textContent = "-";
                hintCategory.textContent = "📂 " + currentCategory;
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                updateAlphabetButtons();
                updateAlphabetButtonsState(true);
                guessInput.value = "";
                guessInput.disabled = false;
                submitBtn.disabled = false;
                spinWheelBtn.disabled = false;
                buyLetterBtn.disabled = false;
                resultPanel.classList.add("hidden");
                messageBox.textContent = "Γύρισε τον τροχό για να ξεκινήσεις!";
                messageBox.style.color = "#f5d78c";
                wheelModal.classList.add("hidden");
                wheelResult.textContent = "";
                savePoints();
                timerInterval = setInterval(() => { if (!gameActive) return;
                    timeSeconds--;
                    timerDisplay.textContent = formatTime(timeSeconds);
                    timerDisplay.style.color = timeSeconds <= 30 ? "#da3633" : "#e8edf2"; if (timeSeconds <= 0) {
                        timeSeconds = 0;
                        timerDisplay.textContent = formatTime(0);
                        endGame(false); } }, 1000);
                guessInput.focus(); }

            spinWheelBtn.addEventListener("touchstart", e => { e.preventDefault(); if (!gameActive) return;
                deactivateBuyMode();
                initAudio();
                wheelHasSpunThisRound = false;
                wheelModal.classList.remove("hidden");
                drawWheel(0);
                wheelResult.textContent = "";
                spinBtn.disabled = false;
                closeWheelBtn.style.pointerEvents = "auto"; });
            spinWheelBtn.addEventListener("click", e => e.preventDefault());
            spinBtn.addEventListener("touchstart", e => { e.preventDefault();
                initAudio();
                spinWheel(); });
            spinBtn.addEventListener("click", e => e.preventDefault());
            closeWheelBtn.addEventListener("touchstart", e => { e.preventDefault();
                closeWheelModal(); });
            closeWheelBtn.addEventListener("click", e => e.preventDefault());
            buyLetterBtn.addEventListener("touchstart", e => { e.preventDefault(); if (isBuyMode) { deactivateBuyMode
                        (); return; }
                initAudio();
                activateBuyMode(); });
            buyLetterBtn.addEventListener("mousedown", e => { e.preventDefault(); if (isBuyMode) { deactivateBuyMode
                        (); return; }
                initAudio();
                activateBuyMode(); });
            buyLetterBtn.addEventListener("click", e => e.preventDefault());
            submitBtn.addEventListener("touchstart", e => { e.preventDefault();
                deactivateBuyMode();
                checkFullGuess(); });
            submitBtn.addEventListener("mousedown", e => { e.preventDefault();
                deactivateBuyMode();
                checkFullGuess(); });
            submitBtn.addEventListener("click", e => e.preventDefault());
            newGameBtn.addEventListener("touchstart", e => { e.preventDefault();
                resetGame(); });
            newGameBtn.addEventListener("mousedown", e => { e.preventDefault();
                resetGame(); });
            newGameBtn.addEventListener("click", e => e.preventDefault());
            guessInput.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault();
                    checkFullGuess(); } });
            guessInput.addEventListener("input", e => { e.target.value = e.target.value.toUpperCase().replace(
                    /[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, ""); });
            createAlphabetButtons();
            updateAlphabetButtonsState(true);
            loadPoints();
            resetGame();
        })();
    </script>
</body>
</html>
