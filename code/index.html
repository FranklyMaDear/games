<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ΤΡΟΧΟΣ ΤΗΣ ΤΥΧΗΣ | Crack the Code</title>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #131820;
            --border: #2a3040;
            --gold: #e2b04a;
            --gold-light: #f5d78c;
            --text: #bcc5d0;
            --text-bright: #e8edf2;
            --success: #2ea043;
            --danger: #da3633;
            --warning: #d2991d;
            --btn-bg: #1c2129;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(160deg, #0a0e14 0%, #141b24 40%, #0d1117 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            margin: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 750px;
            width: 100%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            box-shadow: 0 6px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            border-radius: 22px;
            padding: 18px 14px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .title-section {
            text-align: center;
            z-index: 1;
            width: 100%;
        }

        .title {
            font-size: clamp(1.3rem, 5vw, 2rem);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f7da8c 0%, #c99530 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 3px 6px rgba(200,150,50,0.6));
        }

        .subtitle {
            font-size: 0.7rem;
            color: #6e7681;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .hint-box {
            background: rgba(226,176,74,0.06);
            border: 1px solid rgba(226,176,74,0.25);
            color: var(--gold-light);
            padding: 10px 16px;
            border-radius: 14px;
            font-style: italic;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            text-align: center;
            width: 100%;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            z-index: 1;
            line-height: 1.4;
        }

        /* ΣΤΑΤΙΣΤΙΚΑ */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            width: 100%;
            z-index: 1;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1;
            min-width: 80px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px 10px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .stat-box.points-box {
            border-color: var(--gold);
            background: rgba(226,176,74,0.1);
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 10px rgba(226,176,74,0.2); }
            50% { box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(226,176,74,0.5); }
        }
        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6e7681;
            margin-bottom: 3px;
            font-weight: 600;
        }
        .stat-value {
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            font-weight: 700;
            color: var(--text-bright);
            font-family: 'SF Mono', 'Courier New', monospace;
        }
        .stat-value.points-value {
            color: var(--gold-light);
            font-size: clamp(1.3rem, 4vw, 1.8rem);
        }
        .attempts-dots {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .attempt-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px rgba(46,160,67,0.6);
            transition: all 0.3s ease;
        }
        .attempt-dot.lost {
            background: var(--danger);
            box-shadow: 0 0 8px rgba(218,54,51,0.7);
            animation: pulseDot 0.35s ease;
        }
        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        /* ΠΛΑΙΣΙΟ ΛΕΞΗΣ */
        .word-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.5);
            padding: 16px 12px;
            border-radius: 18px;
            border: 2px solid var(--border);
            width: 100%;
            min-height: 65px;
            z-index: 1;
        }
        .word-slot {
            background: linear-gradient(180deg, #1a1f28 0%, #0d1117 100%);
            border: 2px solid #30363d;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-light);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            font-family: 'SF Mono', 'Courier New', monospace;
            width: 42px;
            height: 56px;
            flex-shrink: 0;
            font-size: clamp(1.2rem, 3.5vw, 1.6rem);
            transition: all 0.3s ease;
        }
        .word-slot .slot-points {
            font-size: 0.5rem;
            color: var(--gold);
            letter-spacing: 1px;
            margin-top: 1px;
            opacity: 0.7;
        }
        .word-slot.revealed {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(226,176,74,0.7), inset 0 2px 4px rgba(0,0,0,0.5);
            animation: revealPop 0.5s ease;
        }
        @keyframes revealPop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .word-slot.wrong-flash {
            animation: wrongShake 0.5s ease;
            border-color: var(--danger) !important;
        }
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }
        .word-slot.space {
            width: 16px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        /* ΑΛΦΑΒΗΤΑ */
        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            background: rgba(0,0,0,0.35);
            padding: 12px 8px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            z-index: 1;
        }
        .letter-btn {
            width: clamp(36px, 9vw, 46px);
            height: clamp(36px, 9vw, 46px);
            background: linear-gradient(180deg, #2a3340 0%, #1a202a 100%);
            border: 2px solid #4a5568;
            border-radius: 12px;
            font-size: clamp(0.95rem, 3vw, 1.2rem);
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #0a0d12;
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .letter-btn:active, .letter-btn.pressed {
            top: 3px;
            box-shadow: 0 1px 0 #0a0d12;
            background: #3d4858;
            border-color: #6a7a90;
            transform: scale(0.95);
        }
        .letter-btn.used-correct {
            background: linear-gradient(180deg, #142a14 0%, #0a1a0a 100%) !important;
            border-color: #2ea043 !important;
            color: #3fb950 !important;
            opacity: 0.7;
            pointer-events: none;
            top: 2px;
        }
        .letter-btn.used-wrong {
            background: linear-gradient(180deg, #2a1414 0%, #1a0a0a 100%) !important;
            border-color: #da3633 !important;
            color: #f85149 !important;
            opacity: 0.7;
            pointer-events: none;
            top: 2px;
            text-decoration: line-through;
        }
        .letter-btn.disabled-spin {
            opacity: 0.4;
            pointer-events: none;
        }

        /* ΚΟΥΜΠΙΑ & INPUT */
        .guess-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            z-index: 1;
        }
        .guess-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--btn-bg);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text-bright);
            font-size: clamp(0.9rem, 3vw, 1rem);
            text-align: center;
            font-family: 'SF Mono', 'Courier New', monospace;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .guess-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 22px rgba(226,176,74,0.25), inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .btn {
            flex: 1;
            min-width: 100px;
            padding: 11px 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            text-align: center;
        }
        .btn-spin {
            background: linear-gradient(180deg, #ff6b6b 0%, #c0392b 100%);
            border-color: #e74c3c;
            color: #fff;
            box-shadow: 0 5px 0 #7b1a1a;
            font-weight: 800;
            animation: pulseBtn 1.5s ease-in-out infinite;
        }
        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 5px 0 #7b1a1a, 0 0 10px rgba(255,107,107,0.3); }
            50% { box-shadow: 0 5px 0 #7b1a1a, 0 0 25px rgba(255,107,107,0.7); }
        }
        .btn-spin:active { top: 3px; box-shadow: 0 2px 0 #7b1a1a; }
        .btn-spin:disabled {
            opacity: 0.4;
            pointer-events: none;
            animation: none;
        }
        .btn-submit {
            background: linear-gradient(180deg, #e2b04a 0%, #b8882a 100%);
            border-color: #d4a035;
            color: #0d1117;
            box-shadow: 0 5px 0 #6b4f1a;
            font-weight: 800;
        }
        .btn-submit:active { top: 3px; box-shadow: 0 2px 0 #6b4f1a; }
        .btn-submit:disabled { opacity: 0.35; pointer-events: none; }
        .btn-new {
            background: var(--btn-bg);
            border-color: var(--border);
            color: var(--text-bright);
            box-shadow: 0 5px 0 #0d1117;
        }
        .btn-new:active { top: 3px; box-shadow: 0 2px 0 #0d1117; }

        .message {
            font-weight: 600;
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            min-height: 22px;
            color: var(--warning);
            text-align: center;
            z-index: 1;
            width: 100%;
        }
        .result-panel {
            background: rgba(226,176,74,0.08);
            border: 2px solid var(--gold);
            padding: 10px 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
            width: 100%;
        }
        .hidden { display: none !important; }
        .footer {
            display: flex;
            gap: 10px;
            font-size: 0.6rem;
            color: #484f58;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
        }
        hr { border-color: var(--border); width: 80%; margin: 2px 0; z-index: 1; }

        .confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* ========== MODAL ΤΡΟΧΟΥ ========== */
        .wheel-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .wheel-modal {
            background: #1a1f2e;
            border: 3px solid var(--gold);
            border-radius: 24px;
            padding: 20px 16px 24px;
            text-align: center;
            max-width: 450px;
            width: 95%;
            box-shadow: 0 0 50px rgba(226,176,74,0.5);
            position: relative;
        }
        .wheel-title {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 900;
            color: var(--gold-light);
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 16px;
        }
        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(226,176,74,0.6), 0 0 60px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        .wheel-pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 30px solid #ff4444;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            z-index: 5;
        }
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #f7da8c, #b8882a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.8rem;
            color: #0d1117;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 4;
        }
        .spin-btn {
            background: linear-gradient(180deg, #ff4444 0%, #991111 100%);
            border: 2px solid #ff6666;
            color: #fff;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 6px 0 #550000;
            margin: 8px 0;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .spin-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #550000; }
        .spin-btn:disabled { opacity: 0.4; pointer-events: none; }
        .wheel-result {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold-light);
            min-height: 30px;
            margin: 8px 0;
        }
        .ad-banner {
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            color: #000;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-top: 8px;
            animation: adShine 2s ease-in-out infinite;
        }
        @keyframes adShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .close-wheel-btn {
            position: absolute;
            top: 8px;
            right: 14px;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px 8px;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="title-section">
            <div class="title">🎡 ΤΡΟΧΟΣ ΤΗΣ ΤΥΧΗΣ</div>
            <div class="subtitle">ΓΥΡΙΣΕ ΤΟΝ ΤΡΟΧΟ - ΒΡΕΣ ΤΗ ΛΕΞΗ!</div>
        </div>

        <div class="hint-box" id="hintText">💡 Φόρτωση...</div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">⏳ ΧΡΟΝΟΣ</div>
                <div class="stat-value" id="timerDisplay">3:00</div>
            </div>
            <div class="stat-box points-box">
                <div class="stat-label">💰 ΠΟΝΤΟΙ</div>
                <div class="stat-value points-value" id="pointsDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🎯 ΤΡΕΧΩΝ ΓΥΡΟΣ</div>
                <div class="stat-value" id="roundPointsDisplay" style="color:#f5d78c;">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">❤️ ΠΡΟΣΠΑΘΕΙΕΣ</div>
                <div class="attempts-dots" id="attemptsDots"></div>
            </div>
        </div>

        <div class="word-display" id="wordDisplay"></div>

        <div class="alphabet-container" id="alphabetContainer"></div>

        <div class="guess-section">
            <input type="text" class="guess-input" id="guessInput" placeholder="Γράψε τη λέξη ή φράση..." autocomplete="off" inputmode="text" enterkeyhint="done">
            <div class="btn-row">
                <button class="btn btn-spin" id="spinWheelBtn">🎡 ΓΥΡΙΣΕ ΤΡΟΧΟ</button>
                <button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
                <button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟΣ ΓΥΡΟΣ</button>
            </div>
        </div>

        <div class="message" id="messageBox">Γύρισε τον τροχό για να ξεκινήσεις!</div>

        <div id="resultPanel" class="result-panel hidden">
            <span id="resultEmoji">🏆</span>
            <span id="resultText"></span>
            <span id="scoreDisplay"></span>
        </div>

        <hr>
        <div class="footer">
            <span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span>
            <span>🔔 SUBSCRIBE</span>
        </div>
    </div>

    <!-- MODAL ΤΡΟΧΟΥ -->
    <div class="wheel-modal-overlay hidden" id="wheelModal">
        <div class="wheel-modal">
            <button class="close-wheel-btn" id="closeWheelBtn">✕</button>
            <div class="wheel-title">🎡 ΓΥΡΙΣΕ ΤΟΝ ΤΡΟΧΟ!</div>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas class="wheel-canvas" id="wheelCanvas" width="300" height="300"></canvas>
                <div class="wheel-center">ΤΥΧΗ</div>
            </div>
            <button class="spin-btn" id="spinBtn">🎰 ΓΥΡΙΣΕ!</button>
            <div class="wheel-result" id="wheelResult"></div>
            <div class="ad-banner">📢 ΔΙΑΦΗΜΙΣΗ: Κέρδισε έως 5000 πόντους σε κάθε γύρισμα!</div>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        (function() {
            // ========== 50 ΛΕΞΕΙΣ ==========
            const SECRET_WORDS = [
                { word: "ΦΙΛΟΣΟΦΙΑ", hint: "Η αγάπη για τη σοφία και τη γνώση" },
                { word: "ΕΛΕΥΘΕΡΙΑ", hint: "Το πολυτιμότερο αγαθό του ανθρώπου" },
                { word: "ΘΑΛΑΣΣΑ", hint: "Απέραντο γαλάζιο που κρύβει μυστικά" },
                { word: "ΠΕΡΙΠΕΤΕΙΑ", hint: "Μια συναρπαστική και απρόβλεπτη εμπειρία" },
                { word: "ΚΑΛΛΙΟ ΑΡΓΑ ΠΑΡΑ ΠΟΤΕ", hint: "Γνωστή παροιμία για το χρόνο" },
                { word: "ΟΠΟΙΟΣ ΒΙΑΖΕΤΑΙ ΣΚΟΝΤΑΦΤΕΙ", hint: "Παροιμία για τη βιασύνη" },
                { word: "Η ΓΛΩΣΣΑ ΚΟΚΑΛΑ ΔΕΝ ΕΧΕΙ", hint: "Παροιμία για τη δύναμη του λόγου" },
                { word: "Ο ΜΙΚΡΟΣ ΠΡΙΓΚΙΠΑΣ", hint: "Κλασικό βιβλίο του Αντουάν ντε Σαιντ-Εξυπερύ" },

            const AudioContext = window.AudioContext || window.webkitAudioContext;

            function initAudio() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playTickSound() {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.05);
                } catch(e) {}
            }

            function playWinSound() {
                if (!audioCtx) return;
                try {
                    [523, 659, 784, 1047].forEach((f, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.12);
                        gain.gain.setValueAtTime(0.25, audioCtx.currentTime + i * 0.12);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.3);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(audioCtx.currentTime + i * 0.12);
                        osc.stop(audioCtx.currentTime + i * 0.12 + 0.3);
                    });
                } catch(e) {}
            }

            function playFailSound() {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.4);
                } catch(e) {}
            }

            function drawWheel(rotation = 0) {
                const ctx = wheelCanvas.getContext("2d");
                const centerX = wheelCanvas.width / 2;
                const centerY = wheelCanvas.height / 2;
                const radius = 130;
                const segments = WHEEL_SEGMENTS.length;
                const anglePerSegment = (2 * Math.PI) / segments;

                ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
                
                WHEEL_SEGMENTS.forEach((seg, i) => {
                    const startAngle = i * anglePerSegment + rotation;
                    const endAngle = startAngle + anglePerSegment;
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                    ctx.closePath();
                    ctx.fillStyle = seg.color;
                    ctx.fill();
                    ctx.strokeStyle = "#1a1a2e";
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Κείμενο
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(startAngle + anglePerSegment / 2);
                    ctx.textAlign = "right";
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 12px 'Segoe UI', sans-serif";
                    ctx.shadowColor = "#000";
                    ctx.shadowBlur = 3;
                    ctx.fillText(seg.label, radius - 12, 5);
                    ctx.restore();
                });

                // Εξωτερικός κύκλος
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = "#f5d78c";
                ctx.lineWidth = 4;
                ctx.stroke();

                // Εσωτερικός κύκλος
                ctx.beginPath();
                ctx.arc(centerX, centerY, 20, 0, 2 * Math.PI);
                ctx.fillStyle = "#0d1117";
                ctx.fill();
                ctx.strokeStyle = "#f5d78c";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            function spinWheel() {
                if (!wheelSpun && gameActive === false) return;
                
                spinBtn.disabled = true;
                closeWheelBtn.style.pointerEvents = "none";
                
                const segments = WHEEL_SEGMENTS.length;
                const anglePerSegment = 360 / segments;
                const randomSegment = Math.floor(Math.random() * segments);
                // Πολλές περιστροφές + τυχαία κατάληξη
                const totalRotation = 360 * (5 + Math.floor(Math.random() * 5)) + (randomSegment * anglePerSegment) + (Math.random() * anglePerSegment * 0.8);
                
                let currentRotation = 0;
                const startTime = performance.now();
                const duration = 4000;
                
                function animateWheel(timestamp) {
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    // Easing
                    const eased = 1 - Math.pow(1 - progress, 3);
                    currentRotation = totalRotation * eased;
                    
                    drawWheel((currentRotation * Math.PI) / 180);
                    
                    // Tick sound
                    if (Math.floor(currentRotation / 10) !== Math.floor((currentRotation - totalRotation * 0.02) / 10)) {
                        playTickSound();
                    }
                    
                    if (progress < 1) {
                        requestAnimationFrame(animateWheel);
                    } else {
                        // Αποτέλεσμα
                        const finalAngle = currentRotation % 360;
                        const segmentIndex = Math.floor(finalAngle / anglePerSegment);
                        const actualIndex = (segments - segmentIndex) % segments;
                        const result = WHEEL_SEGMENTS[actualIndex];
                        
                        wheelValue = result.value;
                        wheelLabel = result.label;
                        wheelSpun = true;
                        
                        if (wheelValue === -1) {
                            wheelResult.textContent = "💀 ΧΡΕΟΚΟΠΙΑ! Χάνεις όλους τους πόντους του γύρου!";
                            wheelResult.style.color = "#ff4444";
                            currentRoundPoints = 0;
                            totalPoints = Math.floor(totalPoints / 2);
                        } else if (wheelValue === -2) {
                            wheelResult.textContent = "🎁 ΔΩΡΟ! Παίρνεις 500 πόντους δώρο!";
                            wheelResult.style.color = "#ff8787";
                            currentRoundPoints = 500;
                        } else if (wheelValue === -3) {
                            wheelResult.textContent = "📢 ΔΙΑΦΗΜΙΣΗ! Κέρδισες 250 πόντους!";
                            wheelResult.style.color = "#74c0fc";
                            currentRoundPoints = 250;
                        } else {
                            wheelResult.textContent = `💰 Κέρδισες ${wheelValue} πόντους ανά γράμμα!`;
                            wheelResult.style.color = "#f5d78c";
                            currentRoundPoints = wheelValue;
                        }
                        
                        updatePointsDisplay();
                        roundPointsDisplay.textContent = currentRoundPoints > 0 ? currentRoundPoints + "π" : "0π";
                        
                        if (wheelValue === -1) {
                            playFailSound();
                        } else {
                            playWinSound();
                        }
                        
                        spinBtn.disabled = false;
                        closeWheelBtn.style.pointerEvents = "auto";
                        updateAlphabetButtonsState(false);
                        messageBox.textContent = wheelResult.textContent;
                    }
                }
                
                requestAnimationFrame(animateWheel);
            }

            function updatePointsDisplay() {
                pointsDisplay.textContent = totalPoints.toLocaleString();

            function normalizeGreek(text) {
                return text.toUpperCase()
                    .replace(/Ά/g, "Α").replace(/Έ/g, "Ε").replace(/Ή/g, "Η")
                    .replace(/Ί/g, "Ι").replace(/Ό/g, "Ο").replace(/Ύ/g, "Υ")
                    .replace(/Ώ/g, "Ω").replace(/Ϊ/g, "Ι").replace(/Ϋ/g, "Υ")
                    .replace(/\s+/g, "");
            }

            function formatTime(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

            function createAttemptDots() {
                attemptsDots.innerHTML = "";
                for (let i = 0; i < MAX_ATTEMPTS; i++) {
                    const dot = document.createElement("span");
                    dot.className = "attempt-dot";
                    if (i < wrongAttempts) dot.classList.add("lost");
                    attemptsDots.appendChild(dot);
                }
            }

            function updateAttemptDots() {
                const dots = attemptsDots.querySelectorAll(".attempt-dot");
                dots.forEach((dot, i) => {
                    if (i < wrongAttempts) dot.classList.add("lost");
                    else dot.classList.remove("lost");
                });
            }

            function updateAlphabetButtonsState(disabled) {
                const buttons = alphabetContainer.querySelectorAll(".letter-btn");
                buttons.forEach(btn => {
                    if (disabled) {
                        btn.classList.add("disabled-spin");
                    } else {
                        btn.classList.remove("disabled-spin");
                    }
                });
            }

            function createAlphabetButtons() {
                alphabetContainer.innerHTML = "";
                ALPHABET.forEach(letter => {
                    const btn = document.createElement("button");
                    btn.className = "letter-btn disabled-spin";
                    btn.textContent = letter;
                    btn.setAttribute("type", "button");
                    btn.addEventListener("touchstart", function(e) {
                        e.preventDefault(); e.stopPropagation();
                        if (!wheelSpun || !gameActive) {
                            messageBox.textContent = "Πρώτα γύρισε τον τροχό!";
                            messageBox.style.color = "#ff6b6b";
                            return;
                        }
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    }, { passive: false });
                    btn.addEventListener("touchend", () => btn.classList.remove("pressed"));
                    btn.addEventListener("mousedown", function(e) {
                        e.preventDefault();
                        if (!wheelSpun || !gameActive) {
                            messageBox.textContent = "Πρώτα γύρισε τον τροχό!";
                            messageBox.style.color = "#ff6b6b";
                            return;
                        }
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    });
                    btn.addEventListener("mouseup", () => btn.classList.remove("pressed"));
                    btn.addEventListener("mouseleave", () => btn.classList.remove("pressed"));
                    btn.addEventListener("click", e => { e.preventDefault(); e.stopPropagation(); });
                    alphabetContainer.appendChild(btn);
                });
            }

            function updateAlphabetButtons() {
                const buttons = alphabetContainer.querySelectorAll(".letter-btn");
                const normalizedWord = normalizeGreek(currentWord);
                buttons.forEach(btn => {
                    const letter = btn.textContent;
                    btn.classList.remove("used-correct", "used-wrong", "pressed");
                    if (usedLetters.includes(letter)) {
                        btn.classList.add(normalizedWord.includes(letter) ? "used-correct" : "used-wrong");
                    }
                });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive || usedLetters.includes(letter)) return;
                if (!wheelSpun) {
                    messageBox.textContent = "Γύρισε πρώτα τον τροχό!";
                    messageBox.style.color = "#ff6b6b";
                    return;
                }

                usedLetters.push(letter);
                const normalizedWord = normalizeGreek(currentWord);
                const positions = [];
                for (let i = 0; i < normalizedWord.length; i++) {
                    if (normalizedWord[i] === letter) positions.push(i);
                }

                if (positions.length > 0) {
                    const earnedPoints = currentRoundPoints * positions.length;
                    totalPoints += earnedPoints;
                    positions.forEach(pos => { revealedLetters[pos] = letter; });
                    updatePointsDisplay();
                    updateWordDisplay(true, positions);
                    updateAlphabetButtons();
                    messageBox.textContent = `✅ Το "${letter}" βρέθηκε! +${earnedPoints} πόντοι!`;
                    messageBox.style.color = "#2ea043";
                    playWinSound();

                    if (revealedLetters.join("") === normalizedWord) {
                        totalPoints += 5000; // Bonus ολοκλήρωσης
                        updatePointsDisplay();
                        setTimeout(() => endGame(true), 600);
                    }
                } else {
                    wrongAttempts++;
                    updateAttemptDots();
                    updateAlphabetButtons();
                    messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                    messageBox.style.color = "#da3633";
                    playFailSound();
                    if (wrongAttempts >= MAX_ATTEMPTS) {
                        setTimeout(() => endGame(false, "attempts"), 500);
                    }
                }

                // Επαναφορά τροχού για νέο γύρισμα
                wheelSpun = false;
                currentRoundPoints = 0;
                roundPointsDisplay.textContent = "-";
                updateAlphabetButtonsState(true);
                spinWheelBtn.disabled = false;
                wheelResult.textContent = "";
            }

            function updateWordDisplay(animate = false, highlightPositions = []) {
                wordDisplay.innerHTML = "";
                const displayWord = currentWord.toUpperCase();
                let slotIndex = 0;
                for (let i = 0; i < displayWord.length; i++) {
                    const slot = document.createElement("span");
                    if (displayWord[i] === " ") {
                        slot.className = "word-slot space";
                    } else {
                        slot.className = "word-slot";
                        slot.textContent = revealedLetters[slotIndex] || "_";
                        if (animate && highlightPositions.includes(slotIndex)) {
                            slot.classList.add("revealed");
                            setTimeout(() => slot.classList.remove("revealed"), 500);
                        }
                        slotIndex++;
                    }
                    wordDisplay.appendChild(slot);
                }
            }

            function checkFullGuess() {
                if (!gameActive) return;
                if (!wheelSpun) {
                    messageBox.textContent = "Γύρισε πρώτα τον τροχό!";
                    messageBox.style.color = "#ff6b6b";
                    return;
                }
                initAudio();
                const guess = normalizeGreek(guessInput.value.trim());
                const normalizedWord = normalizeGreek(currentWord);
                if (guess === "") {
                    messageBox.textContent = "Γράψε μια λέξη!";
                    return;
                }
                if (guess === normalizedWord) {
                    for (let i = 0; i < normalizedWord.length; i++) {
                        if (!revealedLetters[i]) {
                            revealedLetters[i] = normalizedWord[i];
                            if (!usedLetters.includes(normalizedWord[i])) usedLetters.push(normalizedWord[i]);
                        }
                    }
                    totalPoints += currentRoundPoints * normalizedWord.length + 5000;
                    updatePointsDisplay();
                    updateWordDisplay(true);
                    updateAlphabetButtons();
                    playWinSound();
                    endGame(true);
                } else {
                    wrongAttempts++;
                    updateAttemptDots();
                    messageBox.textContent = `Λάθος! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                    messageBox.style.color = "#da3633";
                    playFailSound();
                    guessInput.value = "";
                    guessInput.focus();
                    wheelSpun = false;
                    currentRoundPoints = 0;
                    roundPointsDisplay.textContent = "-";
                    updateAlphabetButtonsState(true);
                    spinWheelBtn.disabled = false;
                    if (wrongAttempts >= MAX_ATTEMPTS) {
                        setTimeout(() => endGame(false, "attempts"), 500);
                    }
                }
            }

            function endGame(won, reason = "time") {
                if (!gameActive) return;
                gameActive = false;
                stopTimer();
                const normalizedWord = normalizeGreek(currentWord);
                for (let i = 0; i < normalizedWord.length; i++) revealedLetters[i] = normalizedWord[i];
                updateWordDisplay();
                updateAlphabetButtons();
                guessInput.disabled = true;
                submitBtn.disabled = true;
                spinWheelBtn.disabled = true;
                updateAlphabetButtonsState(true);
                resultPanel.classList.remove("hidden");
                if (won) {
                    resultEmoji.textContent = "🎉";
                    resultText.textContent = "ΤΟ ΒΡΗΚΕΣ!";
                    scoreDisplay.textContent = `${totalPoints.toLocaleString()} πόντοι`;
                    messageBox.textContent = "Συγχαρητήρια! " + currentWord;
                    messageBox.style.color = "#2ea043";
                } else {
                    resultEmoji.textContent = reason === "attempts" ? "💔" : "⏰";
                    resultText.textContent = reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ";
                    scoreDisplay.textContent = `${totalPoints.toLocaleString()} πόντοι`;
                    messageBox.textContent = "Η λέξη ήταν: " + currentWord;
                    messageBox.style.color = "#da3633";
                }
            }

            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function getRandomWord() {
                if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = [];
                const available = [];
                for (let i = 0; i < SECRET_WORDS.length; i++) {
                    if (!usedWordIndices.includes(i)) available.push(i);
                }
                const chosen = shuffleArray(available)[0];
                usedWordIndices.push(chosen);
                return SECRET_WORDS[chosen];
            }

            function resetGame() {
                stopTimer();
                const randomWordObj = getRandomWord();
                currentWord = randomWordObj.word;
                currentHint = randomWordObj.hint;
                gameActive = true;
                timeSeconds = START_TIME;
                wrongAttempts = 0;
                usedLetters = [];
                wheelSpun = false;
                currentRoundPoints = 0;
                wheelValue = 0;
                const nw = normalizeGreek(currentWord);
                revealedLetters = new Array(nw.length).fill("");
                totalPoints = 0;

                timerDisplay.textContent = formatTime(timeSeconds);
                timerDisplay.style.color = "#e8edf2";
                updatePointsDisplay();
                roundPointsDisplay.textContent = "-";
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                updateAlphabetButtons();
                updateAlphabetButtonsState(true);
                createAttemptDots();
                guessInput.value = "";
                guessInput.disabled = false;
                submitBtn.disabled = false;
                spinWheelBtn.disabled = false;
                resultPanel.classList.add("hidden");
                messageBox.textContent = "Γύρισε τον τροχό για να ξεκινήσεις!";
                messageBox.style.color = "#f5d78c";
                confettiContainer.innerHTML = "";
                wheelModal.classList.add("hidden");
                wheelResult.textContent = "";

                timerInterval = setInterval(() => {
                    if (!gameActive) return;
                    timeSeconds--;
                    timerDisplay.textContent = formatTime(timeSeconds);
                    timerDisplay.style.color = timeSeconds <= 30 ? "#da3633" : "#e8edf2";
                    if (timeSeconds <= 0) { timeSeconds = 0; timerDisplay.textContent = formatTime(0); endGame(false, "time"); }
                }, 1000);
                guessInput.focus();
            }

            // ========== EVENT LISTENERS ==========
            spinWheelBtn.addEventListener("touchstart", e => {
                e.preventDefault();
                initAudio();
                wheelModal.classList.remove("hidden");
                drawWheel(0);
                wheelResult.textContent = "";
                spinBtn.disabled = false;
                closeWheelBtn.style.pointerEvents = "auto";
            });
            spinWheelBtn.addEventListener("click", e => e.preventDefault());

            spinBtn.addEventListener("touchstart", e => {
                e.preventDefault();
                initAudio();
                spinWheel();
            });
            spinBtn.addEventListener("click", e => e.preventDefault());

            closeWheelBtn.addEventListener("touchstart", e => {
                e.preventDefault();
                wheelModal.classList.add("hidden");
                if (wheelSpun) {
                    updateAlphabetButtonsState(false);
                    spinWheelBtn.disabled = true;
                }
            });
            closeWheelBtn.addEventListener("click", e => e.preventDefault());

            submitBtn.addEventListener("touchstart", e => { e.preventDefault(); checkFullGuess(); });
            submitBtn.addEventListener("mousedown", e => { e.preventDefault(); checkFullGuess(); });
            submitBtn.addEventListener("click", e => e.preventDefault());

            newGameBtn.addEventListener("touchstart", e => { e.preventDefault(); resetGame(); });
            newGameBtn.addEventListener("mousedown", e => { e.preventDefault(); resetGame(); });
            newGameBtn.addEventListener("click", e => e.preventDefault());

            guessInput.addEventListener("keydown", e => {
                if (e.key === "Enter") { e.preventDefault(); checkFullGuess(); }
            });
            guessInput.addEventListener("input", e => {
                e.target.value = e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, "");
            });

            createAttemptDots();
            createAlphabetButtons();
            updateAlphabetButtonsState(true);
            resetGame();
        })();
    </script>
</body>
</html>
