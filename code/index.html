<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRACK THE CODE | Μάντεψε την Κρυφή Λέξη</title>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #0f1219;
            --border: #2c3442;
            --gold: #e2b04a;
            --gold-light: #f5d78c;
            --text: #bcc5d0;
            --text-bright: #eef2f8;
            --success: #2ea043;
            --danger: #da3633;
            --warning: #d2991d;
            --btn-bg: #1a202c;
            --shadow: 0 10px 28px rgba(0,0,0,0.7);
            --xp-glow: 0 0 10px rgba(226,176,74,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #0e121b, #03060b);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
        }

        .game-container {
            width: 100%;
            max-width: 580px;
            height: auto;
            max-height: 95vh;
            background: var(--bg-card);
            border-radius: 36px;
            border: 1px solid rgba(226,176,74,0.25);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.03);
            padding: 16px 14px 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* scrollbar */
        .game-container::-webkit-scrollbar { width: 3px; }
        .game-container::-webkit-scrollbar-track { background: #1e2430; border-radius: 10px; }
        .game-container::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* title */
        .title-section {
            text-align: center;
        }
        .title {
            font-size: clamp(1.2rem, 6vw, 1.7rem);
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f7da8c, #c99530);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        .subtitle {
            font-size: 0.55rem;
            color: #6a7482;
            letter-spacing: 2px;
        }

        /* level bar */
        .level-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 4px;
        }
        .level-text { color: var(--gold-light); font-weight: bold; }
        .level-points { font-family: monospace; }
        .level-bar-outer {
            background: #0b0f16;
            border-radius: 12px;
            height: 10px;
            border: 1px solid #2a3140;
            overflow: hidden;
        }
        .level-bar-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e2b04a, #ffdd99);
            border-radius: 12px;
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--xp-glow);
        }

        .hint-box {
            background: rgba(0,0,0,0.6);
            border-left: 5px solid var(--gold);
            padding: 10px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--gold-light);
            font-style: italic;
            backdrop-filter: blur(4px);
        }

        .stats-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        .stat-box {
            background: #10141e;
            border: 1px solid #232a36;
            border-radius: 20px;
            flex: 1;
            text-align: center;
            padding: 6px 4px;
        }
        .stat-label { font-size: 0.55rem; color: #818b9c; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--gold-light); font-family: monospace; }

        .attempts-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 4px 0;
        }
        .attempt-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2ea043;
            box-shadow: 0 0 5px #2ea04380;
        }
        .attempt-dot.lost { background: #da3633; box-shadow: 0 0 8px #da3633; }

        /* ========== WORD DISPLAY – FLEXIBLE WRAP & LARGE BOXES ========== */
        .word-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px 8px;
            background: rgba(0,0,0,0.45);
            border-radius: 28px;
            padding: 18px 12px;
            border: 1px solid #2c3442;
            min-height: 85px;
            margin: 6px 0;
        }

        .word-slot {
            background: linear-gradient(145deg, #1b212c, #0f131c);
            border: 2px solid #3a4457;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--gold-light);
            font-family: 'SF Mono', 'Courier New', monospace;
            transition: 0.15s linear;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            position: relative;
            /* δυναμικό μέγεθος: μεγάλο αλλά προσαρμόζεται  */
            width: auto;
            min-width: 52px;
            height: 68px;
            font-size: 1.7rem;
            flex-shrink: 0;
        }
        /* αύξηση για μεγάλες οθόνες - κρατάμε μεγάλα τετράγωνα */
        @media (min-width: 480px) {
            .word-slot {
                min-width: 60px;
                height: 76px;
                font-size: 2rem;
            }
        }
        /* όταν η λέξη είναι μακριά, αφήνουμε το flex να διπλώσει, αλλά τα κουτιά παραμένουν μεγάλα */
        .word-slot.space {
            background: transparent;
            border: none;
            box-shadow: none;
            min-width: 18px;
        }

        .word-slot.revealed {
            border-color: var(--gold);
            box-shadow: 0 0 18px rgba(226,176,74,0.6);
            animation: pop 0.28s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.7); opacity: 0.4; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .word-slot.wrong-flash {
            animation: shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            border-color: var(--danger) !important;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .slot-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            letter-spacing: 2px;
        }

        /* alphabet grid */
        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            background: #0a0e16cc;
            border-radius: 32px;
            padding: 12px 10px;
            margin: 6px 0;
        }
        .letter-btn {
            width: clamp(45px, 11vw, 58px);
            height: clamp(45px, 11vw, 58px);
            background: radial-gradient(circle at 30% 20%, #2b3445, #1a1f2b);
            border: 2px solid #4b5670;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b0f15;
            transition: 0.05s linear;
            touch-action: manipulation;
        }
        .letter-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #0b0f15; background: #394455; }
        .letter-btn.used-correct { background: #183218; border-color: #2ea043; color: #a5f0a5; opacity: 0.6; pointer-events: none; transform: none; }
        .letter-btn.used-wrong { background: #2f1b1b; border-color: #da3633; color: #ff8a86; text-decoration: line-through; opacity: 0.6; pointer-events: none; }

        .guess-section input {
            width: 100%;
            padding: 14px;
            background: #11161f;
            border: 2px solid #2f384b;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            text-align: center;
            text-transform: uppercase;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .btn-row {
            display: flex;
            gap: 14px;
            margin-top: 6px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            border-radius: 40px;
            border: none;
            background: #222a38;
            color: white;
            font-size: 0.85rem;
            transition: 0.07s linear;
            box-shadow: 0 3px 0 #0a0e14;
        }
        .btn-submit { background: linear-gradient(145deg, #e2b04a, #b8872a); color: #0f1219; box-shadow: 0 4px 0 #694e1a; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #0a0e14; }
        .result-panel {
            background: #e2b04a20;
            border: 1px solid gold;
            border-radius: 60px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }
        .hidden { display: none; }
        .message { text-align: center; font-size: 0.75rem; color: var(--gold-light); min-height: 28px; }
        .footer { display: flex; justify-content: center; gap: 20px; font-size: 0.6rem; color: #4b5668; }
        .ad-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: gold;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.7rem;
            z-index: 1000;
            animation: fadeUp 2s forwards;
            pointer-events: none;
        }
        @keyframes fadeUp {
            0% { opacity: 0; bottom: 0; }
            15% { opacity: 1; bottom: 25px; }
            80% { opacity: 1; bottom: 25px; }
            100% { opacity: 0; bottom: 50px; }
        }
        .score-pop {
            position: absolute;
            color: gold;
            font-weight: bold;
            font-size: 1rem;
            pointer-events: none;
            animation: floatPop 1s forwards;
            z-index: 200;
        }
        @keyframes floatPop {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            100% { opacity: 0; transform: translateY(-35px) scale(1.3); }
        }
        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 12px;
            background: gold;
            top: -20px;
            animation: fall 2.2s linear forwards;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
    <!-- Διαφημιστικό script όπως ζητήθηκε (ανοίγει σε νέο παράθυρο όταν καλείται) -->

</head>
<body>
<div class="game-container" id="gameContainer">
    <div class="title-section"><div class="title">🔐 CRACK THE CODE</div><div class="subtitle">ΑΠΟΚΡΥΠΤΟΓΡΑΦΗΣΕ ΤΗ ΛΕΞΗ</div></div>
    <div class="level-bar-container"><div class="level-info"><span class="level-text" id="levelText">🏅 LEVEL 1</span><span class="level-points" id="levelPoints">0 / 500 XP</span></div><div class="level-bar-outer"><div class="level-bar-inner" id="levelBar"></div></div></div>
    <div class="hint-box" id="hintText">💡 Φόρτωση...</div>
    <div class="stats-row"><div class="stat-box"><div class="stat-label">⏳ ΧΡΟΝΟΣ</div><div class="stat-value" id="timerDisplay">3:00</div></div><div class="stat-box"><div class="stat-label">⭐ ΣΚΟΡ</div><div class="stat-value score-highlight" id="scoreDisplay">0</div></div><div class="stat-box"><div class="stat-label">🏆 ΡΕΚΟΡ</div><div class="stat-value score-highlight" id="highScoreDisplay">0</div></div></div>
    <div class="attempts-dots" id="attemptsDots"></div>
    <div class="word-display" id="wordDisplay"></div>
    <div class="alphabet-container" id="alphabetContainer"></div>
    <div class="guess-section"><input type="text" class="guess-input" id="guessInput" placeholder="Γράψε ολόκληρη τη λέξη..." autocomplete="off" inputmode="text"><div class="btn-row"><button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button><button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button></div></div>
    <div class="message" id="messageBox"></div>
    <div id="resultPanel" class="result-panel hidden"><span class="result-emoji" id="resultEmoji">🏆</span><span class="result-text" id="resultText"></span></div>
    <div class="footer"><span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span><span>🔔 SUBSCRIBE</span></div>
</div>
<div class="confetti-container" id="confettiContainer"></div>

<script>
    // ==================== ΛΕΞΕΙΣ (built-in με hints) ====================
    const SECRET_WORDS = [
        { word: "ΑΣΤΕΡΙ", hint: "Λάμπει στον νυχτερινό ουρανό" },
        { word: "ΓΑΛΑΞΙΑΣ", hint: "Αποτελείται από δισεκατομμύρια άστρα" },
        { word: "ΠΥΡΑΥΛΟΣ", hint: "Μεταφέρει δορυφόρους στο διάστημα" },
        { word: "ΔΙΑΣΤΗΜΑ", hint: "Άπειρο και αχανές σύμπαν" },
        { word: "ΤΗΛΕΣΚΟΠΙΟ", hint: "Βλέπουμε μακρινούς πλανήτες" },
        { word: "ΣΕΛΗΝΗ", hint: "Φυσικός δορυφόρος της Γης" },
        { word: "ΑΣΤΡΟΝΑΥΤΗΣ", hint: "Ταξιδεύει στο διάστημα" },
        { word: "ΝΕΦΕΛΩΜΑ", hint: "Σύννεφο σκόνης και αερίου" }
    ];

    const ALPHABET = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ".split("");
    const START_TIME = 180;
    const MAX_ATTEMPTS = 8;
    const POINTS_PER_LETTER = 10;
    const POINTS_FULL_WORD = 100;
    const PENALTY_WRONG_GUESS = 100;    // ← όταν υποβάλεις λάθος ολόκληρη λέξη -100 πόντοι
    const XP_PER_LEVEL = 500;

    let currentWord = "", currentHint = "", gameActive = false, timeSeconds = START_TIME, timerInterval = null;
    let usedLetters = [], wrongAttempts = 0, revealedLetters = [], usedWordIndices = [], isSpinning = false;
    let currentScore = 0, highScore = 0, currentLevel = 1, currentXP = 0, correctLettersInCurrentWord = 0;

    // DOM elements
    const wordDisplay = document.getElementById("wordDisplay"), alphabetContainer = document.getElementById("alphabetContainer");
    const attemptsDots = document.getElementById("attemptsDots"), guessInput = document.getElementById("guessInput");
    const submitBtn = document.getElementById("submitGuess"), newGameBtn = document.getElementById("newGameBtn");
    const messageBox = document.getElementById("messageBox"), resultPanel = document.getElementById("resultPanel");
    const resultEmoji = document.getElementById("resultEmoji"), resultText = document.getElementById("resultText");
    const scoreDisplay = document.getElementById("scoreDisplay"), highScoreDisplay = document.getElementById("highScoreDisplay");
    const timerDisplay = document.getElementById("timerDisplay"), hintText = document.getElementById("hintText");
    const levelText = document.getElementById("levelText"), levelPoints = document.getElementById("levelPoints"), levelBar = document.getElementById("levelBar");
    const confettiContainer = document.getElementById("confettiContainer"), gameContainer = document.getElementById("gameContainer");

    // Audio (optional)
    let audioCtx = null;
    function initAudio(){ if(!audioCtx && window.AudioContext){ audioCtx = new AudioContext(); if(audioCtx.state === 'suspended') audioCtx.resume(); } }
    function playSound(type){ if(!audioCtx) return; try{ const now=audioCtx.currentTime; const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); gain.gain.value=0.2; if(type==='correct'){ osc.frequency.setValueAtTime(523.25,now); gain.gain.exponentialRampToValueAtTime(0.01,now+0.3); } else if(type==='wrong'){ osc.frequency.setValueAtTime(180,now); osc.frequency.exponentialRampToValueAtTime(90,now+0.3); gain.gain.exponentialRampToValueAtTime(0.01,now+0.3); } else if(type==='win'){ osc.frequency.value=523.25; setTimeout(()=>{ if(audioCtx){ const o2=audioCtx.createOscillator(); const g2=audioCtx.createGain(); o2.frequency.value=659.25; g2.gain.value=0.2; g2.exponentialRampToValueAtTime(0.01,now+0.5); o2.connect(g2); g2.connect(audioCtx.destination); o2.start(); o2.stop(now+0.5);}},100); } osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.35); }catch(e){}
    }

    function showAdNotification(){ const div=document.createElement('div'); div.className='ad-notification'; div.innerText='📢 Η διαφήμιση άνοιξε σε νέο παράθυρο'; document.body.appendChild(div); setTimeout(()=>div.remove(),2500); }
    // ad trigger για νέο παιχνίδι & ήττα/νίκη (χρήση tag.min.js)
    function triggerAd() {
        if(typeof window.triggerAdFromGame === 'function') { window.triggerAdFromGame(); return; }
        try {
            // προσπαθούμε να ενεργοποιήσουμε την ad script (θεωρητικά το tag.min.js δημιουργεί popup)
            if(window.adsManager && typeof window.adsManager.openAd === 'function') window.adsManager.openAd();
            else {
                // generic: δημιουργούμε link προς την πηγή διαφήμισης (αλλά καλύτερα να καλέσει τον κώδικα)
                const tempLink = document.createElement('a');
                tempLink.href = "https://5gvci.com/act/files/tag.min.js?z=10021853";
                tempLink.target = "_blank";
                tempLink.rel = "noopener";
                tempLink.click();
            }
        } catch(e){ console.warn(e); }
        showAdNotification();
    }

    function saveData(){ localStorage.setItem('crackHigh', highScore); localStorage.setItem('crackLevel', currentLevel); localStorage.setItem('crackXP', currentXP); localStorage.setItem('crackScore', currentScore); }
    function loadData(){ highScore = parseInt(localStorage.getItem('crackHigh'))||0; currentLevel=parseInt(localStorage.getItem('crackLevel'))||1; currentXP=parseInt(localStorage.getItem('crackXP'))||0; currentScore=parseInt(localStorage.getItem('crackScore'))||0; highScoreDisplay.innerText=highScore; updateScoreUI(); updateLevelUI(); }
    function updateScoreUI(){ scoreDisplay.innerText=currentScore; if(currentScore>highScore){ highScore=currentScore; highScoreDisplay.innerText=highScore; saveData(); } }
    function updateLevelUI(){ levelText.innerText='🏅 LEVEL '+currentLevel; let progress=(currentXP/XP_PER_LEVEL)*100; levelBar.style.width=Math.min(progress,100)+'%'; levelPoints.innerText=currentXP+' / '+XP_PER_LEVEL+' XP'; }
    function addXP(amount){ let oldLevel=currentLevel; currentXP+=amount; let leveled=false; while(currentXP>=XP_PER_LEVEL){ currentXP-=XP_PER_LEVEL; currentLevel++; leveled=true; } updateLevelUI(); if(leveled){ messageBox.innerText='🎉 ΑΝΕΒΗΚΕΣ LEVEL '+currentLevel+'!'; playSound('win'); triggerAd(); } saveData(); }

    function showScorePop(text,x,y){ const pop=document.createElement('div'); pop.className='score-pop'; pop.innerText=text; pop.style.left=x+'px'; pop.style.top=y+'px'; gameContainer.appendChild(pop); setTimeout(()=>pop.remove(),1000); }
    function spawnConfetti(){ for(let i=0;i<60;i++){ const c=document.createElement('div'); c.className='confetti-piece'; c.style.left=Math.random()*100+'%'; c.style.backgroundColor=['#f5d78c','#e2b04a','#3fb950','#ffaa66'][Math.floor(Math.random()*4)]; c.style.animationDelay=Math.random()*1.5+'s'; c.style.width=Math.random()*8+4+'px'; c.style.height=Math.random()*8+6+'px'; confettiContainer.appendChild(c); } setTimeout(()=>confettiContainer.innerHTML='',3000); }

    function normalizeGreek(str){ return str.toUpperCase().replace(/Ά|Α/g,'Α').replace(/Έ|Ε/g,'Ε').replace(/Ή|Η/g,'Η').replace(/Ί|Ι/g,'Ι').replace(/Ό|Ο/g,'Ο').replace(/Ύ|Υ/g,'Υ').replace(/Ώ|Ω/g,'Ω').replace(/Ϊ|Ι/g,'Ι').replace(/Ϋ|Υ/g,'Υ'); }
    function formatTime(sec){ let m=Math.floor(sec/60), s=sec%60; return m+':'+(s<10?'0':'')+s; }
    function stopTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
    function updateAttemptDots(){ const dots=attemptsDots.querySelectorAll('.attempt-dot'); dots.forEach((d,i)=>{ if(i<wrongAttempts) d.classList.add('lost'); else d.classList.remove('lost'); }); }
    function createAttemptDots(){ attemptsDots.innerHTML=''; for(let i=0;i<MAX_ATTEMPTS;i++){ const dot=document.createElement('span'); dot.className='attempt-dot'; attemptsDots.appendChild(dot); } updateAttemptDots(); }

    function getRandomWord(){ if(usedWordIndices.length>=SECRET_WORDS.length) usedWordIndices=[]; let idx; do{ idx=Math.floor(Math.random()*SECRET_WORDS.length); }while(usedWordIndices.includes(idx)); usedWordIndices.push(idx); return SECRET_WORDS[idx]; }

    // Δυναμική εμφάνιση λέξης: flex-wrap & αυτόματο break κάτω, κουτιά μεγάλα
    function buildWordDisplay(highlight=[]){
        wordDisplay.innerHTML='';
        const normWord=normalizeGreek(currentWord);
        for(let i=0;i<currentWord.length;i++){
            const ch=currentWord[i];
            const isSpace=ch===' ';
            const slot=document.createElement('div');
            if(isSpace){ slot.className='word-slot space'; slot.style.minWidth='20px'; slot.style.width='auto'; slot.style.background='transparent'; slot.style.border='none'; }
            else {
                slot.className='word-slot';
                const inner=document.createElement('div'); inner.className='slot-inner';
                inner.innerText=revealedLetters[i] || '_';
                slot.appendChild(inner);
                if(highlight.includes(i)){ slot.classList.add('revealed'); setTimeout(()=>slot.classList.remove('revealed'),350); }
            }
            wordDisplay.appendChild(slot);
        }
    }

    function updateAlphabetState(){
        const btns=alphabetContainer.querySelectorAll('.letter-btn');
        const normWord=normalizeGreek(currentWord);
        btns.forEach(btn=>{
            const letter=btn.innerText;
            if(usedLetters.includes(letter)){
                btn.classList.add(normWord.includes(letter)?'used-correct':'used-wrong');
            } else { btn.classList.remove('used-correct','used-wrong'); }
        });
    }

    function spinAnimation(callback){
        if(isSpinning) return; isSpinning=true;
        const slots=Array.from(wordDisplay.children).filter(c=>!c.classList.contains('space'));
        slots.forEach(slot=>{ slot.style.transition='0.08s linear'; let count=0; const intr=setInterval(()=>{ if(slot.children[0]) slot.children[0].innerText=ALPHABET[Math.floor(Math.random()*24)]; count++; if(count>=8){ clearInterval(intr); slot.style.transition=''; if(callback) callback(); isSpinning=false; } },35); });
        setTimeout(()=>{ if(isSpinning){ isSpinning=false; if(callback) callback(); } },400);
    }

    function handleLetterClick(letter, btn){
        if(!gameActive || usedLetters.includes(letter) || isSpinning) return;
        initAudio(); usedLetters.push(letter);
        const normWord=normalizeGreek(currentWord);
        const positions=[];
        for(let i=0;i<normWord.length;i++) if(normWord[i]===letter && !revealedLetters[i]) positions.push(i);
        spinAnimation(()=>{
            if(positions.length>0){
                playSound('correct');
                const gain=positions.length*POINTS_PER_LETTER;
                currentScore+=gain; addXP(gain); correctLettersInCurrentWord+=positions.length;
                positions.forEach(pos=>{ revealedLetters[pos]=letter; });
                buildWordDisplay(positions);
                updateAlphabetState(); updateScoreUI(); saveData();
                const rect=btn.getBoundingClientRect(), contRect=gameContainer.getBoundingClientRect();
                showScorePop('+'+gain, rect.left-contRect.left+rect.width/2, rect.top-contRect.top);
                messageBox.innerText=`✅ Το "${letter}" υπάρχει! +${gain} πόντους`;
                if(revealedLetters.join('')===normWord){
                    setTimeout(()=>{
                        currentScore+=POINTS_FULL_WORD; addXP(POINTS_FULL_WORD);
                        updateScoreUI(); playSound('win'); spawnConfetti();
                        messageBox.innerText='🏆 Ολοκλήρωσες τη λέξη! +100';
                        triggerAd();
                        endGame(true);
                    },300);
                }
            } else {
                playSound('wrong');
                wrongAttempts++; updateAttemptDots();
                updateAlphabetState();
                messageBox.innerText=`❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                if(wrongAttempts>=MAX_ATTEMPTS){ triggerAd(); endGame(false,'attempts'); }
            }
        });
    }

    function createAlphabet(){
        alphabetContainer.innerHTML='';
        ALPHABET.forEach(letter=>{
            const btn=document.createElement('button'); btn.className='letter-btn'; btn.innerText=letter;
            btn.addEventListener('click',(e)=>{ e.preventDefault(); handleLetterClick(letter,btn); });
            btn.addEventListener('touchstart',(e)=>{ e.preventDefault(); handleLetterClick(letter,btn); },{passive:false});
            alphabetContainer.appendChild(btn);
        });
    }

    function checkFullGuess(){
        if(!gameActive || isSpinning) return;
        initAudio();
        const guess=normalizeGreek(guessInput.value.trim());
        const normWord=normalizeGreek(currentWord);
        if(guess===''){ messageBox.innerText='Γράψε μια λέξη'; return; }
        spinAnimation(()=>{
            if(guess===normWord){
                const missing=normWord.length-correctLettersInCurrentWord;
                const letterBonus=missing*POINTS_PER_LETTER;
                const total=letterBonus+POINTS_FULL_WORD;
                currentScore+=total; addXP(total);
                for(let i=0;i<normWord.length;i++) if(!revealedLetters[i]) revealedLetters[i]=normWord[i];
                usedLetters=[...new Set([...usedLetters,...normWord.split('')])];
                buildWordDisplay([...Array(normWord.length).keys()]);
                updateAlphabetState(); updateScoreUI(); playSound('win'); spawnConfetti();
                messageBox.innerText=`🎉 Σωστή λέξη! +${total} πόντοι!`;
                triggerAd();
                endGame(true);
            } else {
                // ΛΑΘΟΣ ΛΕΞΗ: αφαίρεση 100 πόντων !
                currentScore = Math.max(0, currentScore - PENALTY_WRONG_GUESS);
                updateScoreUI(); saveData();
                wrongAttempts++; updateAttemptDots();
                playSound('wrong');
                messageBox.innerText=`❌ Λάθος λέξη! -${PENALTY_WRONG_GUESS} πόντοι. (${wrongAttempts}/${MAX_ATTEMPTS})`;
                showScorePop(`-${PENALTY_WRONG_GUESS}`, wordDisplay.getBoundingClientRect().left+50, wordDisplay.getBoundingClientRect().top-20);
                guessInput.value='';
                if(wrongAttempts>=MAX_ATTEMPTS){ triggerAd(); endGame(false,'attempts'); }
            }
        });
    }

    function endGame(won, reason='time'){
        if(!gameActive) return;
        gameActive=false; stopTimer();
        const norm=normalizeGreek(currentWord);
        for(let i=0;i<norm.length;i++) if(!revealedLetters[i]) revealedLetters[i]=norm[i];
        buildWordDisplay();
        guessInput.disabled=true; submitBtn.disabled=true;
        resultPanel.classList.remove('hidden');
        if(won){
            resultEmoji.innerText='🎉'; resultText.innerText='ΤΟ ΒΡΗΚΕΣ!'; messageBox.innerText='Μπράβο! Παίξε ΝΕΟ ΠΑΙΧΝΙΔΙ.';
        } else {
            resultEmoji.innerText= reason==='attempts'?'💔':'⏰';
            resultText.innerText= reason==='attempts'?'ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ':'ΤΕΛΟΣ ΧΡΟΝΟΥ';
            messageBox.innerText=`Η λέξη ήταν: ${currentWord}. Παίζεις ξανά;`;
        }
    }

    function resetGame(){
        stopTimer();
        const obj=getRandomWord(); currentWord=obj.word; currentHint=obj.hint;
        gameActive=true; timeSeconds=START_TIME; wrongAttempts=0; usedLetters=[]; correctLettersInCurrentWord=0;
        const normWord=normalizeGreek(currentWord);
        revealedLetters=new Array(normWord.length).fill('');
        hintText.innerText='💡 '+currentHint;
        timerDisplay.innerText=formatTime(timeSeconds); timerDisplay.style.color='var(--text-bright)';
        createAttemptDots(); buildWordDisplay(); updateAlphabetState(); guessInput.disabled=false; submitBtn.disabled=false;
        resultPanel.classList.add('hidden'); messageBox.innerText=''; guessInput.value=''; confettiContainer.innerHTML='';
        if(timerInterval) clearInterval(timerInterval);
        timerInterval=setInterval(()=>{
            if(!gameActive) return;
            timeSeconds--; timerDisplay.innerText=formatTime(timeSeconds);
            if(timeSeconds<=30) timerDisplay.style.color='var(--danger)';
            if(timeSeconds<=0){ timerDisplay.innerText='0:00'; endGame(false,'time'); }
        },1000);
        saveData();
    }

    // AD trigger on NEW GAME, plus every level up & lose/win uses triggerAd
    newGameBtn.addEventListener('click',(e)=>{ e.preventDefault(); initAudio(); resetGame(); triggerAd(); });
    submitBtn.addEventListener('click',(e)=>{ e.preventDefault(); checkFullGuess(); });
    guessInput.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); checkFullGuess(); } });
    guessInput.addEventListener('input',(e)=>e.target.value=e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏ]/g,''));
    window.addEventListener('resize',()=>buildWordDisplay());
    loadData(); createAlphabet(); resetGame();
    // window ad bridge: optional
    window.triggerAdFromGame = function(){ triggerAd(); };
</script>
</body>
