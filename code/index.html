<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CRACK THE CODE | Μάντεψε τη Μυστική Λέξη</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 10%, #2b1e10, #0f0a05);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #d4c49a;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 15, 10, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid #6b5a3a;
            box-shadow: 0 0 30px rgba(180, 130, 40, 0.4);
            border-radius: 16px;
            padding: 25px 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .top-hint {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: #e5c687;
            text-shadow: 0 0 8px #cc9f2c;
            background: #1e1808;
            padding: 8px 22px;
            border-radius: 40px;
            border: 1px solid #aa8b4c;
        }
        .timer-section {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1f180a;
            padding: 6px 20px;
            border-radius: 30px;
            border: 1px solid #7a6a3c;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .hint-box {
            background: #1e1a0e;
            border: 1px dashed #c9aa4b;
            color: #ebd494;
            padding: 10px 20px;
            border-radius: 12px;
            font-style: italic;
            font-size: 1.3rem;
            text-align: center;
            width: 100%;
        }
        .code-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: #0a0702;
            padding: 15px 20px;
            border-radius: 20px;
            border: 2px solid #b49450;
            width: 100%;
            flex-wrap: wrap;
        }
        .letter-slot {
            width: 48px;
            height: 58px;
            background: #2f2618;
            border: 2px solid #806f48;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            color: #ffde9e;
            box-shadow: inset 0 0 10px black;
            text-transform: uppercase;
        }
        .guess-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .guess-letter-input {
            width: 45px;
            height: 52px;
            background: #1f1a0c;
            border: 2px solid #c2a24a;
            border-radius: 10px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffe7af;
            background: #2b2414;
            outline: none;
            font-family: 'Courier New', monospace;
        }
        .guess-letter-input:focus {
            border-color: #f3cd60;
            box-shadow: 0 0 15px #e6b422;
        }
        .btn {
            background: linear-gradient(180deg, #4d3b1e 0%, #211a0b 100%);
            border: 2px solid #ab8d4b;
            color: #fae9b2;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b0702;
            transition: 0.1s ease;
            font-family: 'Courier New', monospace;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0b0702;
        }
        .btn:disabled { opacity: 0.5; pointer-events: none; }
        .message {
            font-weight: bold;
            font-size: 1.1rem;
            min-height: 28px;
            color: #e7c468;
            text-align: center;
        }
        .result-badge {
            background: #15100a;
            border: 1px solid #bb9648;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .hidden { display: none !important; }
        hr { border-color: #5e4f2e; width: 80%; margin: 8px 0; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-hint">🔎 CRACK THE CODE</div>
    <div class="timer-section">
        <span>⏳</span> <span id="timerDisplay">1:56</span>
    </div>
    <div class="hint-box" id="hintText">💡 Hint: Daughter Of Hallownest</div>

    <div class="code-display" id="codeDisplayContainer">
        <span class="letter-slot" id="slot1">?</span>
        <span class="letter-slot" id="slot2">?</span>
        <span class="letter-slot" id="slot3">?</span>
        <span class="letter-slot" id="slot4">?</span>
        <span class="letter-slot" id="slot5">?</span>
        <span class="letter-slot" id="slot6">?</span>
    </div>

    <div class="guess-row" id="guessInputs">
        <input type="text" maxlength="1" class="guess-letter-input" id="letter0" placeholder="A">
        <input type="text" maxlength="1" class="guess-letter-input" id="letter1" placeholder="D">
        <input type="text" maxlength="1" class="guess-letter-input" id="letter2" placeholder="O">
        <input type="text" maxlength="1" class="guess-letter-input" id="letter3" placeholder="L">
        <input type="text" maxlength="1" class="guess-letter-input" id="letter4" placeholder="F">
        <input type="text" maxlength="1" class="guess-letter-input" id="letter5" placeholder="_">
    </div>

    <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
        <button class="btn" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
        <button class="btn" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
    </div>

    <div class="message" id="messageBox"></div>

    <div id="resultPanel" class="result-badge hidden">
        <span id="resultEmoji">🏆</span>
        <span id="resultText">VAULT CRACKED!</span>
        <span id="scoreDisplay">2779 / 6000</span>
    </div>

    <div style="color:#c0a059; font-size:0.9rem;">Μοιράσου το αποτέλεσμα!</div>
    <hr>
    <div style="display: flex; gap: 18px; font-size:0.8rem; color:#b89f5e;">
        <span>🔔 SUBSCRIBE</span>
        <span>🔧 CREATE YOUR OWN CODE</span>
    </div>
</div>

<script>
    (function() {
        const SECRET_WORD = "HORNET";   // Η λέξη που ψάχνουμε (6 γράμματα)
        const WORD_LENGTH = 6;
        const MAX_SCORE = 6000;
        const START_TIME = 116;         // 1:56 σε δευτερόλεπτα

        let gameActive = true;
        let timeSeconds = START_TIME;
        let timerInterval = null;

        // DOM στοιχεία
        const timerDisplay = document.getElementById("timerDisplay");
        const slots = [
            document.getElementById("slot1"), document.getElementById("slot2"),
            document.getElementById("slot3"), document.getElementById("slot4"),
            document.getElementById("slot5"), document.getElementById("slot6")
        ];
        const letterInputs = [
            document.getElementById("letter0"), document.getElementById("letter1"),
            document.getElementById("letter2"), document.getElementById("letter3"),
            document.getElementById("letter4"), document.getElementById("letter5")
        ];
        const submitBtn = document.getElementById("submitGuess");
        const newGameBtn = document.getElementById("newGameBtn");
        const messageBox = document.getElementById("messageBox");
        const resultPanel = document.getElementById("resultPanel");
        const resultEmoji = document.getElementById("resultEmoji");
        const resultText = document.getElementById("resultText");
        const scoreDisplay = document.getElementById("scoreDisplay");

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }

        function disableInputs(dis = true) {
            letterInputs.forEach(inp => inp.disabled = dis);
            submitBtn.disabled = dis;
        }

        function resetSlots() {
            slots.forEach(s => s.textContent = "?");
        }

        function revealWord() {
            for (let i = 0; i < WORD_LENGTH; i++) slots[i].textContent = SECRET_WORD[i];
        }

        function calculateScore() {
            if (timeSeconds <= 0) return 0;
            return Math.floor((timeSeconds / START_TIME) * MAX_SCORE);
        }

        function endGame(won) {
            if (!gameActive) return;
            gameActive = false;
            stopTimer();
            disableInputs(true);
            revealWord();
            resultPanel.classList.remove("hidden");

            if (won) {
                resultEmoji.textContent = "🔓";
                resultText.textContent = "VAULT CRACKED!";
                scoreDisplay.textContent = `${calculateScore()} / ${MAX_SCORE}`;
                messageBox.textContent = "Ο ΚΩΔΙΚΟΣ ΗΤΑΝ: " + SECRET_WORD;
            } else {
                resultEmoji.textContent = "⏰";
                resultText.textContent = "TIME'S UP!";
                scoreDisplay.textContent = `0 / ${MAX_SCORE}`;
                messageBox.textContent = "Τέλος χρόνου! Η λέξη ήταν: " + SECRET_WORD;
            }
        }

        function checkGuess() {
            if (!gameActive) return;
            const guess = letterInputs.map(inp => inp.value.toUpperCase().trim()).join("");
            if (guess.length !== WORD_LENGTH) {
                messageBox.textContent = "Συμπλήρωσε όλα τα γράμματα!";
                return;
            }
            if (guess === SECRET_WORD) {
                endGame(true);
            } else {
                messageBox.textContent = "Λάθος κωδικός. Προσπάθησε ξανά!";
                letterInputs.forEach(inp => inp.value = "");
                letterInputs[0].focus();
            }
        }

        function resetGame() {
            stopTimer();
            gameActive = true;
            timeSeconds = START_TIME;
            timerDisplay.textContent = formatTime(timeSeconds);
            letterInputs.forEach(inp => inp.value = "");
            disableInputs(false);
            resetSlots();
            resultPanel.classList.add("hidden");
            messageBox.textContent = "";
            letterInputs[0].focus();

            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeSeconds--;
                timerDisplay.textContent = formatTime(timeSeconds);
                if (timeSeconds <= 0) {
                    timeSeconds = 0;
                    timerDisplay.textContent = formatTime(0);
                    endGame(false);
                }
            }, 1000);
        }

        // Πλοήγηση με βελάκια / Enter / Backspace
        letterInputs.forEach((inp, idx) => {
            inp.addEventListener("input", () => {
                if (inp.value.length === 1 && idx < WORD_LENGTH - 1) {
                    letterInputs[idx + 1].focus();
                }
            });
            inp.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && inp.value === "" && idx > 0) {
                    letterInputs[idx - 1].focus();
                    e.preventDefault();
                } else if (e.key === "Enter") {
                    e.preventDefault();
                    checkGuess();
                }
            });
        });

        submitBtn.addEventListener("click", checkGuess);
        newGameBtn.addEventListener("click", resetGame);

        resetGame(); // Έναρξη
    })();
</script>
</body>
</html>
