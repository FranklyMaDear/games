<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ΤΡΟΧΟΣ ΤΗΣ ΤΥΧΗΣ | Crack the Code</title>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #131820;
            --border: #2a3040;
            --gold: #e2b04a;
            --gold-light: #f5d78c;
            --text: #bcc5d0;
            --text-bright: #e8edf2;
            --success: #2ea043;
            --danger: #da3633;
            --warning: #d2991d;
            --btn-bg: #1c2129;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(160deg, #0a0e14 0%, #141b24 40%, #0d1117 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            margin: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 750px;
            width: 100%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            box-shadow: 0 6px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            border-radius: 22px;
            padding: 16px 12px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .title-section {
            text-align: center;
            z-index: 1;
            width: 100%;
        }
        .title {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f7da8c 0%, #c99530 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 3px 6px rgba(200,150,50,0.6));
        }
        .subtitle {
            font-size: 0.65rem;
            color: #6e7681;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .hint-box {
            background: rgba(226,176,74,0.06);
            border: 1px solid rgba(226,176,74,0.25);
            color: var(--gold-light);
            padding: 8px 14px;
            border-radius: 12px;
            font-style: italic;
            font-size: clamp(0.85rem, 3vw, 1rem);
            text-align: center;
            width: 100%;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            z-index: 1;
            line-height: 1.4;
        }

        /* ΣΤΑΤΙΣΤΙΚΑ */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            width: 100%;
            z-index: 1;
            flex-wrap: wrap;
        }
        .stat-box {
            flex: 1;
            min-width: 70px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 7px 8px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .stat-box.points-box {
            border-color: var(--gold);
            background: rgba(226,176,74,0.1);
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 10px rgba(226,176,74,0.2); }
            50% { box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(226,176,74,0.5); }
        }
        .stat-label {
            font-size: 0.58rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6e7681;
            margin-bottom: 2px;
            font-weight: 600;
        }
        .stat-value {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 700;
            color: var(--text-bright);
            font-family: 'SF Mono', 'Courier New', monospace;
        }
        .stat-value.points-value {
            color: var(--gold-light);
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
        }
        .attempts-dots {
            display: flex;
            gap: 3px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .attempt-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 5px rgba(46,160,67,0.6);
            transition: all 0.3s ease;
        }
        .attempt-dot.lost {
            background: var(--danger);
            box-shadow: 0 0 6px rgba(218,54,51,0.7);
            animation: pulseDot 0.35s ease;
        }
        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        /* ΠΛΑΙΣΙΟ ΛΕΞΗΣ */
        .word-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.5);
            padding: 14px 10px;
            border-radius: 16px;
            border: 2px solid var(--border);
            width: 100%;
            min-height: 55px;
            z-index: 1;
        }
        .word-slot {
            background: linear-gradient(180deg, #1a1f28 0%, #0d1117 100%);
            border: 2px solid #30363d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-light);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            font-family: 'SF Mono', 'Courier New', monospace;
            width: 38px;
            height: 48px;
            flex-shrink: 0;
            font-size: clamp(1rem, 3vw, 1.4rem);
            transition: all 0.3s ease;
        }
        .word-slot.revealed {
            border-color: var(--gold);
            box-shadow: 0 0 18px rgba(226,176,74,0.7), inset 0 2px 4px rgba(0,0,0,0.5);
            animation: revealPop 0.4s ease;
        }
        @keyframes revealPop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .word-slot.space {
            width: 14px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        /* ΑΛΦΑΒΗΤΑ */
        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            background: rgba(0,0,0,0.35);
            padding: 10px 6px;
            border-radius: 14px;
            border: 1px solid var(--border);
            width: 100%;
            z-index: 1;
        }
        .letter-btn {
            width: clamp(34px, 8.5vw, 44px);
            height: clamp(34px, 8.5vw, 44px);
            background: linear-gradient(180deg, #2a3340 0%, #1a202a 100%);
            border: 2px solid #4a5568;
            border-radius: 10px;
            font-size: clamp(0.9rem, 2.8vw, 1.1rem);
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #0a0d12;
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .letter-btn:active, .letter-btn.pressed {
            top: 2px;
            box-shadow: 0 1px 0 #0a0d12;
            background: #3d4858;
            border-color: #6a7a90;
            transform: scale(0.95);
        }
        .letter-btn.used-correct {
            background: linear-gradient(180deg, #142a14 0%, #0a1a0a 100%) !important;
            border-color: #2ea043 !important;
            color: #3fb950 !important;
            opacity: 0.7;
            pointer-events: none;
            top: 1px;
        }
        .letter-btn.used-wrong {
            background: linear-gradient(180deg, #2a1414 0%, #1a0a0a 100%) !important;
            border-color: #da3633 !important;
            color: #f85149 !important;
            opacity: 0.7;
            pointer-events: none;
            top: 1px;
            text-decoration: line-through;
        }
        .letter-btn.disabled-spin {
            opacity: 0.35;
            pointer-events: none;
        }

        /* ΚΟΥΜΠΙΑ */
        .guess-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            z-index: 1;
        }
        .guess-input {
            width: 100%;
            padding: 9px 12px;
            background: var(--btn-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-bright);
            font-size: clamp(0.85rem, 2.8vw, 0.95rem);
            text-align: center;
            font-family: 'SF Mono', 'Courier New', monospace;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .guess-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(226,176,74,0.25), inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .btn-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .btn {
            flex: 1;
            min-width: 85px;
            padding: 10px 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: clamp(0.7rem, 2.3vw, 0.85rem);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            text-align: center;
        }
        .btn-spin {
            background: linear-gradient(180deg, #ff6b6b 0%, #b71c1c 100%);
            border-color: #e53935;
            color: #fff;
            box-shadow: 0 4px 0 #6b0000;
            font-weight: 800;
            animation: pulseBtn 1.8s ease-in-out infinite;
        }
        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 4px 0 #6b0000, 0 0 8px rgba(255,107,107,0.3); }
            50% { box-shadow: 0 4px 0 #6b0000, 0 0 20px rgba(255,107,107,0.7); }
        }
        .btn-spin:active { top: 2px; box-shadow: 0 2px 0 #6b0000; }
        .btn-spin:disabled { opacity: 0.35; pointer-events: none; animation: none; }
        .btn-buy {
            background: linear-gradient(180deg, #4d96ff 0%, #1a56b8 100%);
            border-color: #2979ff;
            color: #fff;
            box-shadow: 0 4px 0 #0a2a5e;
            font-weight: 800;
        }
        .btn-buy:active { top: 2px; box-shadow: 0 2px 0 #0a2a5e; }
        .btn-buy:disabled { opacity: 0.35; pointer-events: none; }
        .btn-submit {
            background: linear-gradient(180deg, #e2b04a 0%, #b8882a 100%);
            border-color: #d4a035;
            color: #0d1117;
            box-shadow: 0 4px 0 #6b4f1a;
            font-weight: 800;
        }
        .btn-submit:active { top: 2px; box-shadow: 0 2px 0 #6b4f1a; }
        .btn-submit:disabled { opacity: 0.35; pointer-events: none; }
        .btn-new {
            background: var(--btn-bg);
            border-color: var(--border);
            color: var(--text-bright);
            box-shadow: 0 4px 0 #0d1117;
        }
        .btn-new:active { top: 2px; box-shadow: 0 2px 0 #0d1117; }

        .message {
            font-weight: 600;
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            min-height: 20px;
            color: var(--warning);
            text-align: center;
            z-index: 1;
            width: 100%;
        }
        .result-panel {
            background: rgba(226,176,74,0.08);
            border: 2px solid var(--gold);
            padding: 8px 14px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
            width: 100%;
            font-size: 0.9rem;
        }
        .hidden { display: none !important; }
        .footer {
            display: flex;
            gap: 8px;
            font-size: 0.58rem;
            color: #484f58;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
        }
        hr { border-color: var(--border); width: 80%; margin: 1px 0; z-index: 1; }

        /* MODAL ΤΡΟΧΟΥ */
        .wheel-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .wheel-modal {
            background: #141a24;
            border: 3px solid var(--gold);
            border-radius: 22px;
            padding: 18px 14px 22px;
            text-align: center;
            max-width: 420px;
            width: 95%;
            box-shadow: 0 0 60px rgba(226,176,74,0.6);
            position: relative;
        }
        .wheel-title {
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            font-weight: 900;
            color: var(--gold-light);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .wheel-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 14px;
        }
        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(226,176,74,0.6);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        .wheel-pointer {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 26px solid #ff4444;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.6));
            z-index: 5;
        }
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #f7da8c, #b8882a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.7rem;
            color: #0d1117;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 4;
        }
        .spin-btn {
            background: linear-gradient(180deg, #ff4444 0%, #991111 100%);
            border: 2px solid #ff6666;
            color: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 5px 0 #550000;
            margin: 6px 0;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .spin-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #550000; }
        .spin-btn:disabled { opacity: 0.4; pointer-events: none; }
        .wheel-result {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold-light);
            min-height: 26px;
            margin: 6px 0;
        }
        .ad-banner {
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            background-size: 300% 100%;
            color: #000;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 1px;
            margin-top: 6px;
            animation: adShine 2.5s ease-in-out infinite;
        }
        @keyframes adShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .close-wheel-btn {
            position: absolute;
            top: 6px;
            right: 12px;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 6px;
        }

        /* Μεγάλες οθόνες */
        @media (hover: hover) and (pointer: fine) {
            .letter-btn:hover {
                background: #384250;
                border-color: #6a7a90;
                transform: translateY(-1px);
            }
            .btn-spin:hover { background: linear-gradient(180deg, #ff8080 0%, #d32f2f 100%); }
            .btn-buy:hover { background: linear-gradient(180deg, #69a0ff 0%, #2563c8 100%); }
            .btn-submit:hover { background: linear-gradient(180deg, #eec060 0%, #c89830 100%); }
            .btn-new:hover { background: #2a323d; border-color: #5a6472; }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="title-section">
            <div class="title">🎡 ΤΡΟΧΟΣ ΤΗΣ ΤΥΧΗΣ</div>
            <div class="subtitle">ΓΥΡΙΣΕ - ΒΡΕΣ ΓΡΑΜΜΑ - ΞΑΝΑ ΓΥΡΙΣΕ!</div>
        </div>

        <div class="hint-box" id="hintText">💡 Φόρτωση...</div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">⏳ ΧΡΟΝΟΣ</div>
                <div class="stat-value" id="timerDisplay">3:00</div>
            </div>
            <div class="stat-box points-box">
                <div class="stat-label">💰 ΣΥΝΟΛΟ ΠΟΝΤΩΝ</div>
                <div class="stat-value points-value" id="pointsDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🎯 ΓΥΡΟΣ</div>
                <div class="stat-value" id="roundPointsDisplay" style="color:#f5d78c;">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">❤️</div>
                <div class="attempts-dots" id="attemptsDots"></div>
            </div>
        </div>

        <div class="word-display" id="wordDisplay"></div>

        <div class="alphabet-container" id="alphabetContainer"></div>

        <div class="guess-section">
            <input type="text" class="guess-input" id="guessInput" placeholder="Γράψε τη λέξη..." autocomplete="off" inputmode="text" enterkeyhint="done">
            <div class="btn-row">
                <button class="btn btn-spin" id="spinWheelBtn">🎡 ΓΥΡΙΣΕ ΤΡΟΧΟ</button>
                <button class="btn btn-buy" id="buyLetterBtn">🛒 ΑΓΟΡΑ ΓΡΑΜΜΑΤΟΣ (20π)</button>
                <button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
                <button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
            </div>
        </div>

        <div class="message" id="messageBox">Γύρισε τον τροχό για να ξεκινήσεις!</div>

        <div id="resultPanel" class="result-panel hidden">
            <span id="resultEmoji">🏆</span>
            <span id="resultText"></span>
            <span id="scoreDisplay"></span>
        </div>

        <hr>
        <div class="footer">
            <span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span>
            <span>🔔 SUBSCRIBE</span>
            <span>💾 ΟΙ ΠΟΝΤΟΙ ΑΠΟΘΗΚΕΥΟΝΤΑΙ</span>
        </div>
    </div>

    <!-- MODAL ΤΡΟΧΟΥ -->
    <div class="wheel-modal-overlay hidden" id="wheelModal">
        <div class="wheel-modal">
            <button class="close-wheel-btn" id="closeWheelBtn">✕</button>
            <div class="wheel-title">🎡 ΓΥΡΙΣΕ ΤΟΝ ΤΡΟΧΟ!</div>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas class="wheel-canvas" id="wheelCanvas" width="280" height="280"></canvas>
                <div class="wheel-center">ΤΥΧΗ</div>
            </div>
            <button class="spin-btn" id="spinBtn">🎰 ΓΥΡΙΣΕ!</button>
            <div class="wheel-result" id="wheelResult"></div>
            <div class="ad-banner">📢 Κέρδισε έως 100 πόντους ανά γράμμα!</div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 50 ΛΕΞΕΙΣ ==========
            const SECRET_WORDS = [
                { word: "ΦΙΛΟΣΟΦΙΑ", hint: "Η αγάπη για τη σοφία και τη γνώση" },
                { word: "ΕΛΕΥΘΕΡΙΑ", hint: "Το πολυτιμότερο αγαθό του ανθρώπου" },
                { word: "ΘΑΛΑΣΣΑ", hint: "Απέραντο γαλάζιο που κρύβει μυστικά" },
                { word: "ΠΕΡΙΠΕΤΕΙΑ", hint: "Μια συναρπαστική και απρόβλεπτη εμπειρία" },
                { word: "ΚΑΛΛΙΟ ΑΡΓΑ ΠΑΡΑ ΠΟΤΕ", hint: "Γνωστή παροιμία για το χρόνο" },
                { word: "ΟΠΟΙΟΣ ΒΙΑΖΕΤΑΙ ΣΚΟΝΤΑΦΤΕΙ", hint: "Παροιμία για τη βιασύνη" },

                { word: "Ο ΜΙΚΡΟΣ ΠΡΙΓΚΙΠΑΣ", hint: "Κλασικό βιβλίο" },

            // ========== LOCAL STORAGE ==========
            function savePoints() {
                try {

            function loadPoints() {
                try {

            function initAudio() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playTickSound() {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(700, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.04);
                } catch(e) {}
            }

            function playWinSound() {
                if (!audioCtx) return;
                try {
                    [523, 659, 784].forEach((f, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
                        gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.25);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(audioCtx.currentTime + i * 0.1);
                        osc.stop(audioCtx.currentTime + i * 0.1 + 0.25);
                    });
                } catch(e) {}
            }

            function playFailSound() {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(90, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(35, audioCtx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.35);
                } catch(e) {}
            }

            function playBankruptSound() {
                if (!audioCtx) return;
                try {
                    for (let i = 0; i < 3; i++) {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(60 - i * 15, audioCtx.currentTime + i * 0.15);
                        gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.2);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(audioCtx.currentTime + i * 0.15);
                        osc.stop(audioCtx.currentTime + i * 0.15 + 0.2);
                    }
                } catch(e) {}
            }

            function drawWheel(rotation = 0) {
                const ctx = wheelCanvas.getContext("2d");
                const cx = wheelCanvas.width / 2;
                const cy = wheelCanvas.height / 2;
                const radius = 120;
                const segs = WHEEL_SEGMENTS.length;
                const anglePer = (2 * Math.PI) / segs;
                ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
                WHEEL_SEGMENTS.forEach((seg, i) => {
                    const start = i * anglePer + rotation;
                    const end = start + anglePer;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, radius, start, end);
                    ctx.closePath();
                    ctx.fillStyle = seg.color;
                    ctx.fill();
                    ctx.strokeStyle = "#1a1a2e";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(start + anglePer / 2);
                    ctx.textAlign = "right";
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 11px 'Segoe UI', sans-serif";
                    ctx.shadowColor = "#000";
                    ctx.shadowBlur = 2;
                    ctx.fillText(seg.label, radius - 10, 4);
                    ctx.restore();
                });
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = "#f5d78c";
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            function spinWheel() {
                if (!gameActive) return;
                spinBtn.disabled = true;
                closeWheelBtn.style.pointerEvents = "none";
                const segs = WHEEL_SEGMENTS.length;
                const anglePer = 360 / segs;
                const randomSeg = Math.floor(Math.random() * segs);
                const totalRot = 360 * (5 + Math.floor(Math.random() * 5)) + (randomSeg * anglePer) + (Math.random() * anglePer * 0.7);
                const duration = 4000;
                const startTime = performance.now();
                function animate(ts) {
                    const elapsed = ts - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    const currentRot = totalRot * eased;
                    drawWheel((currentRot * Math.PI) / 180);
                    if (Math.floor(currentRot / 10) !== Math.floor((currentRot - totalRot * 0.02) / 10)) playTickSound();
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        const finalAngle = currentRot % 360;
                        const segIndex = Math.floor(finalAngle / anglePer);
                        const actualIndex = (segs - segIndex) % segs;
                        const result = WHEEL_SEGMENTS[actualIndex];
                        wheelLabel = result.label;
                        if (result.value === 0) {
                            // ΧΡΕΟΚΟΠΙΑ
                            wheelResult.textContent = "💀 ΧΡΕΟΚΟΠΙΑ! Μηδενίστηκαν οι πόντοι σου!";
                            wheelResult.style.color = "#ff4444";
                            totalPoints = 0;
                            currentRoundPoints = 0;
                            playBankruptSound();
                        } else {
                            currentRoundPoints = result.value;
                            wheelResult.textContent = `💰 Κέρδισες ${result.value} πόντους ανά γράμμα!`;
                            wheelResult.style.color = "#f5d78c";
                            playWinSound();
                        }
                        wheelSpun = true;
                        updatePointsDisplay();
                        roundPointsDisplay.textContent = currentRoundPoints > 0 ? currentRoundPoints + "π/γράμμα" : "0π";
                        savePoints();
                        spinBtn.disabled = false;
                        closeWheelBtn.style.pointerEvents = "auto";
                        updateAlphabetButtonsState(false);
                        spinWheelBtn.disabled = true;
                        messageBox.textContent = wheelResult.textContent;
                    }
                }
                requestAnimationFrame(animate);
            }

            function updatePointsDisplay() {
                pointsDisplay.textContent = totalPoints.toLocaleString();

            function normalizeGreek(text) {
                return text.toUpperCase()
                    .replace(/Ά/g, "Α").replace(/Έ/g, "Ε").replace(/Ή/g, "Η")
                    .replace(/Ί/g, "Ι").replace(/Ό/g, "Ο").replace(/Ύ/g, "Υ")
                    .replace(/Ώ/g, "Ω").replace(/Ϊ/g, "Ι").replace(/Ϋ/g, "Υ")
                    .replace(/\s+/g, "");
            }

            function formatTime(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

            function createAttemptDots() {
                attemptsDots.innerHTML = "";

                    const dot = document.createElement("span");

            function updateAttemptDots() {
                const dots = attemptsDots.querySelectorAll(".attempt-dot");
                dots.forEach((d, i) => {

            function updateAlphabetButtonsState(disabled) {
                const btns = alphabetContainer.querySelectorAll(".letter-btn:not(.used-correct):not(.used-wrong)");
                btns.forEach(b => {
                    if (disabled) b.classList.add("disabled-spin");
                    else b.classList.remove("disabled-spin");

            function createAlphabetButtons() {
                alphabetContainer.innerHTML = "";
                ALPHABET.forEach(letter => {
                    const btn = document.createElement("button");
                    btn.className = "letter-btn disabled-spin";
                    btn.textContent = letter;
                    btn.setAttribute("type", "button");
                    btn.addEventListener("touchstart", function(e) {
                        e.preventDefault(); e.stopPropagation();
                        if (!wheelSpun || !gameActive) {
                            messageBox.textContent = "Πρώτα γύρισε τον τροχό! 🎡";
                            messageBox.style.color = "#ff6b6b";
                            return;
                        }
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    }, { passive: false });
                    btn.addEventListener("touchend", () => btn.classList.remove("pressed"));
                    btn.addEventListener("mousedown", function(e) {
                        e.preventDefault();
                        if (!wheelSpun || !gameActive) {
                            messageBox.textContent = "Πρώτα γύρισε τον τροχό! 🎡";
                            messageBox.style.color = "#ff6b6b";
                            return;
                        }
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    });
                    btn.addEventListener("mouseup", () => btn.classList.remove("pressed"));
                    btn.addEventListener("mouseleave", () => btn.classList.remove("pressed"));
                    btn.addEventListener("click", e => { e.preventDefault(); e.stopPropagation(); });
                    alphabetContainer.appendChild(btn);
                });
            }

            function updateAlphabetButtons() {
                const btns = alphabetContainer.querySelectorAll(".letter-btn");
                const nw = normalizeGreek(currentWord);
                btns.forEach(b => {
                    const l = b.textContent;
                    b.classList.remove("used-correct", "used-wrong", "pressed");
                    if (usedLetters.includes(l)) {
                        b.classList.add(nw.includes(l) ? "used-correct" : "used-wrong");

            function handleLetterClick(letter, btn) {
                if (!gameActive || usedLetters.includes(letter)) return;
                if (!wheelSpun) {
                    messageBox.textContent = "Γύρισε πρώτα τον τροχό! 🎡";
                    messageBox.style.color = "#ff6b6b";
                    return;
                }
                usedLetters.push(letter);
                const nw = normalizeGreek(currentWord);
                const positions = [];
                for (let i = 0; i < nw.length; i++) {
                    if (nw[i] === letter) positions.push(i);
                }
                if (positions.length > 0) {
                    const earned = currentRoundPoints * positions.length;
                    totalPoints += earned;
                    positions.forEach(p => { revealedLetters[p] = letter; });
                    updatePointsDisplay();
                    savePoints();
                    updateWordDisplay(true, positions);
                    updateAlphabetButtons();
                    messageBox.textContent = `✅ Το "${letter}" βρέθηκε! +${earned} πόντοι!`;
                    messageBox.style.color = "#2ea043";
                    playWinSound();
                    if (revealedLetters.join("") === nw) {
                        totalPoints += 1000;
                        updatePointsDisplay();
                        savePoints();
                        setTimeout(() => endGame(true), 500);
                    }
                } else {
                    wrongAttempts++;
                    updateAttemptDots();
                    updateAlphabetButtons();
                    messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                    messageBox.style.color = "#da3633";
                    playFailSound();
                    if (wrongAttempts >= MAX_ATTEMPTS) {
                        setTimeout(() => endGame(false, "attempts"), 500);
                    }
                }
                // Επαναφορά για νέο γύρισμα
                wheelSpun = false;
                currentRoundPoints = 0;
                roundPointsDisplay.textContent = "-";
                updateAlphabetButtonsState(true);
                spinWheelBtn.disabled = false;
            }

            function buyLetter() {
                if (!gameActive) return;
                if (!wheelSpun) {
                    messageBox.textContent = "Πρώτα γύρισε τον τροχό! 🎡";
                    messageBox.style.color = "#ff6b6b";
                    return;
                }
                if (totalPoints < BUY_COST) {
                    messageBox.textContent = `Χρειάζεσαι ${BUY_COST} πόντους! Έχεις ${totalPoints}.`;
                    messageBox.style.color = "#ff6b6b";
                    return;
                }
                // Βρες τυχαίο φωνήεν που δεν έχει χρησιμοποιηθεί
                const nw = normalizeGreek(currentWord);
                const availableVowels = [];
                for (let i = 0; i < nw.length; i++) {
                    const ch = nw[i];
                    if (VOWELS.includes(ch) && !usedLetters.includes(ch) && !revealedLetters[i]) {
                        if (!availableVowels.includes(ch)) availableVowels.push(ch);
                    }
                }
                if (availableVowels.length === 0) {
                    messageBox.textContent = "Δεν υπάρχουν άλλα φωνήεντα!";
                    messageBox.style.color = "#ffd93d";
                    return;
                }
                const chosen = availableVowels[Math.floor(Math.random() * availableVowels.length)];
                totalPoints -= BUY_COST;
                updatePointsDisplay();
                savePoints();
                // Αποκάλυψη όλων των θέσεων αυτού του φωνήεντος
                const positions = [];
                for (let i = 0; i < nw.length; i++) {
                    if (nw[i] === chosen && !revealedLetters[i]) positions.push(i);
                }
                positions.forEach(p => { revealedLetters[p] = chosen; });
                if (!usedLetters.includes(chosen)) usedLetters.push(chosen);
                updateWordDisplay(true, positions);
                updateAlphabetButtons();
                messageBox.textContent = `🛒 Αγόρασες το "${chosen}" για ${BUY_COST} πόντους!`;
                messageBox.style.color = "#4d96ff";
                playWinSound();
                if (revealedLetters.join("") === nw) {
                    totalPoints += 1000;
                    updatePointsDisplay();
                    savePoints();
                    setTimeout(() => endGame(true), 500);
                }
                // Δεν επαναφέρουμε το wheelSpun - ο παίκτης μπορεί ακόμα να επιλέξει γράμμα
            }

            function updateWordDisplay(animate = false, highlightPositions = []) {
                wordDisplay.innerHTML = "";
                const dw = currentWord.toUpperCase();
                let si = 0;
                for (let i = 0; i < dw.length; i++) {
                    const slot = document.createElement("span");
                    if (dw[i] === " ") {
                        slot.className = "word-slot space";
                    } else {
                        slot.className = "word-slot";
                        slot.textContent = revealedLetters[si] || "_";
                        if (animate && highlightPositions.includes(si)) {
                            slot.classList.add("revealed");
                            setTimeout(() => slot.classList.remove("revealed"), 400);
                        }
                        si++;
                    }
                    wordDisplay.appendChild(slot);
                }
            }

            function checkFullGuess() {
                if (!gameActive) return;
                if (!wheelSpun) {
                    messageBox.textContent = "Γύρισε πρώτα τον τροχό! 🎡";
                    messageBox.style.color = "#ff6b6b";
                    return;
                }
                initAudio();
                const guess = normalizeGreek(guessInput.value.trim());
                const nw = normalizeGreek(currentWord);
                if (guess === "") { messageBox.textContent = "Γράψε μια λέξη!"; return; }
                if (guess === nw) {
                    for (let i = 0; i < nw.length; i++) {
                        if (!revealedLetters[i]) {
                            revealedLetters[i] = nw[i];
                            if (!usedLetters.includes(nw[i])) usedLetters.push(nw[i]);
                        }
                    }
                    totalPoints += currentRoundPoints * nw.length + 1000;
                    updatePointsDisplay();
                    savePoints();
                    updateWordDisplay(true);
                    updateAlphabetButtons();
                    playWinSound();
                    endGame(true);
                } else {
                    wrongAttempts += 2;
                    updateAttemptDots();
                    messageBox.textContent = `Λάθος! (-2 προσπάθειες, ${wrongAttempts}/${MAX_ATTEMPTS})`;
                    messageBox.style.color = "#da3633";
                    playFailSound();
                    guessInput.value = "";
                    guessInput.focus();
                    wheelSpun = false;
                    currentRoundPoints = 0;
                    roundPointsDisplay.textContent = "-";
                    updateAlphabetButtonsState(true);
                    spinWheelBtn.disabled = false;
                    if (wrongAttempts >= MAX_ATTEMPTS) {
                        setTimeout(() => endGame(false, "attempts"), 500);
                    }
                }
            }

            function endGame(won, reason = "time") {
                if (!gameActive) return;
                gameActive = false;
                stopTimer();
                const nw = normalizeGreek(currentWord);
                for (let i = 0; i < nw.length; i++) revealedLetters[i] = nw[i];
                updateWordDisplay();
                updateAlphabetButtons();
                guessInput.disabled = true;
                submitBtn.disabled = true;
                spinWheelBtn.disabled = true;
                buyLetterBtn.disabled = true;
                updateAlphabetButtonsState(true);
                resultPanel.classList.remove("hidden");
                if (won) {
                    resultEmoji.textContent = "🎉";
                    resultText.textContent = "ΤΟ ΒΡΗΚΕΣ!";
                    scoreDisplay.textContent = `${totalPoints.toLocaleString()} πόντοι`;
                    messageBox.textContent = "Συγχαρητήρια! " + currentWord;
                    messageBox.style.color = "#2ea043";
                } else {
                    resultEmoji.textContent = reason === "attempts" ? "💔" : "⏰";
                    resultText.textContent = reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ";
                    scoreDisplay.textContent = `${totalPoints.toLocaleString()} πόντοι`;
                    messageBox.textContent = "Η λέξη ήταν: " + currentWord;
                    messageBox.style.color = "#da3633";
                }
                savePoints();
            }

            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function getRandomWord() {
                if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = [];
                const avail = [];
                for (let i = 0; i < SECRET_WORDS.length; i++) {
                    if (!usedWordIndices.includes(i)) avail.push(i);
                }
                const ch = shuffleArray(avail)[0];
                usedWordIndices.push(ch);
                return SECRET_WORDS[ch];
            }

            function resetGame() {
                stopTimer();
                loadPoints();
                const rw = getRandomWord();
                currentWord = rw.word;
                currentHint = rw.hint;
                gameActive = true;
                timeSeconds = START_TIME;
                wrongAttempts = 0;
                usedLetters = [];
                wheelSpun = false;
                currentRoundPoints = 0;
                const nw = normalizeGreek(currentWord);
                revealedLetters = new Array(nw.length).fill("");
                timerDisplay.textContent = formatTime(timeSeconds);
                timerDisplay.style.color = "#e8edf2";
                updatePointsDisplay();
                roundPointsDisplay.textContent = "-";
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                updateAlphabetButtons();
                updateAlphabetButtonsState(true);
                createAttemptDots();
                guessInput.value = "";
                guessInput.disabled = false;
                submitBtn.disabled = false;
                spinWheelBtn.disabled = false;
                buyLetterBtn.disabled = false;
                resultPanel.classList.add("hidden");
                messageBox.textContent = "Γύρισε τον τροχό για να ξεκινήσεις!";
                messageBox.style.color = "#f5d78c";
                wheelModal.classList.add("hidden");
                wheelResult.textContent = "";
                savePoints();
                timerInterval = setInterval(() => {
                    if (!gameActive) return;
                    timeSeconds--;
                    timerDisplay.textContent = formatTime(timeSeconds);
                    timerDisplay.style.color = timeSeconds <= 30 ? "#da3633" : "#e8edf2";
                    if (timeSeconds <= 0) { timeSeconds = 0; timerDisplay.textContent = formatTime(0); endGame(false, "time"); }
                }, 1000);
                guessInput.focus();
            }

            // ========== EVENT LISTENERS ==========
            spinWheelBtn.addEventListener("touchstart", e => {
                e.preventDefault();
                if (!gameActive) return;
                initAudio();
                wheelModal.classList.remove("hidden");
                drawWheel(0);
                wheelResult.textContent = "";
                spinBtn.disabled = false;
                closeWheelBtn.style.pointerEvents = "auto";
            });
            spinWheelBtn.addEventListener("click", e => e.preventDefault());

            spinBtn.addEventListener("touchstart", e => {
                e.preventDefault();
                initAudio();
                spinWheel();
            });
            spinBtn.addEventListener("click", e => e.preventDefault());

            closeWheelBtn.addEventListener("touchstart", e => {
                e.preventDefault();
                wheelModal.classList.add("hidden");
                if (wheelSpun) {
                    updateAlphabetButtonsState(false);
                    spinWheelBtn.disabled = true;
                }
            });
            closeWheelBtn.addEventListener("click", e => e.preventDefault());

            buyLetterBtn.addEventListener("touchstart", e => {
                e.preventDefault();
                initAudio();
                buyLetter();
            });
            buyLetterBtn.addEventListener("mousedown", e => {
                e.preventDefault();
                initAudio();
                buyLetter();
            });
            buyLetterBtn.addEventListener("click", e => e.preventDefault());

            submitBtn.addEventListener("touchstart", e => { e.preventDefault(); checkFullGuess(); });
            submitBtn.addEventListener("mousedown", e => { e.preventDefault(); checkFullGuess(); });
            submitBtn.addEventListener("click", e => e.preventDefault());

            newGameBtn.addEventListener("touchstart", e => { e.preventDefault(); resetGame(); });
            newGameBtn.addEventListener("mousedown", e => { e.preventDefault(); resetGame(); });
            newGameBtn.addEventListener("click", e => e.preventDefault());

            guessInput.addEventListener("keydown", e => {
                if (e.key === "Enter") { e.preventDefault(); checkFullGuess(); }
            });
            guessInput.addEventListener("input", e => {
                e.target.value = e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, "");
            });

            createAttemptDots();
            createAlphabetButtons();
            updateAlphabetButtonsState(true);
            loadPoints();
            resetGame();
        })();
    </script>
</body>
</html>
