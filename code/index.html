<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CRACK THE CODE | Μάντεψε την Κρυφή Λέξη</title>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #131820;
            --border: #2a3040;
            --gold: #e2b04a;
            --gold-light: #f5d78c;
            --text: #bcc5d0;
            --text-bright: #e8edf2;
            --success: #2ea043;
            --danger: #da3633;
            --warning: #d2991d;
            --btn-bg: #1c2129;
            --shadow: 0 6px 24px rgba(0,0,0,0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            background: linear-gradient(160deg, #0a0e14 0%, #141b24 40%, #0d1117 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            overflow: hidden;
        }

        .game-container {
            max-width: 600px;
            width: 100%;
            max-height: 100vh;
            background: var(--bg-card);
            border: 2px solid var(--border);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
            border-radius: 22px;
            padding: 16px 14px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .game-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 10%, rgba(226,176,74,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .title-section {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .title {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f7da8c 0%, #c99530 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 3px 6px rgba(200,150,50,0.5));
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.65rem;
            color: #6e7681;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .hint-box {
            background: rgba(226,176,74,0.06);
            border: 1px solid rgba(226,176,74,0.25);
            color: var(--gold-light);
            padding: 10px 14px;
            border-radius: 12px;
            font-style: italic;
            font-size: clamp(0.8rem, 3vw, 1rem);
            text-align: center;
            width: 100%;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            line-height: 1.4;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .stat-box {
            flex: 1;
            min-width: 70px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 10px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6e7681;
            margin-bottom: 2px;
            font-weight: 600;
        }

        .stat-value {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 700;
            color: var(--text-bright);
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        .score-highlight {
            color: var(--gold-light);
            text-shadow: 0 0 10px rgba(226,176,74,0.5);
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
        }

        .attempts-dots {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .attempt-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 4px rgba(46,160,67,0.6);
            transition: all 0.3s ease;
        }

        .attempt-dot.lost {
            background: var(--danger);
            box-shadow: 0 0 6px rgba(218,54,51,0.7);
            animation: pulseDot 0.35s ease;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        /* ========== ΠΛΑΙΣΙΟ ΜΕ ΚΟΥΤΑΚΙΑ ========== */
        .word-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
            background: rgba(0,0,0,0.5);
            padding: 12px 10px;
            border-radius: 14px;
            border: 2px solid var(--border);
            width: 100%;
            min-height: 55px;
            position: relative;
            z-index: 1;
            overflow: visible;
        }

        .word-slot {
            background: linear-gradient(180deg, #1a1f28 0%, #0d1117 100%);
            border: 2px solid #30363d;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-light);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            text-shadow: 0 0 8px rgba(226,176,74,0.5);
            transition: all 0.3s ease;
            font-family: 'SF Mono', 'Courier New', monospace;
            flex-shrink: 1;
            position: relative;
            overflow: hidden;
        }

        .word-slot.spinning .slot-inner {
            animation: spinSlot 0.6s ease-in-out;
        }

        @keyframes spinSlot {
            0% { transform: rotateX(0deg); opacity: 1; }
            25% { transform: rotateX(90deg); opacity: 0.3; }
            50% { transform: rotateX(180deg); opacity: 0.1; }
            75% { transform: rotateX(270deg); opacity: 0.3; }
            100% { transform: rotateX(360deg); opacity: 1; }
        }

        .word-slot.revealed {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(226,176,74,0.6), inset 0 2px 4px rgba(0,0,0,0.5);
            animation: revealPop 0.4s ease;
        }

        @keyframes revealPop {
            0% { transform: scale(0.6); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .word-slot.wrong-flash {
            animation: wrongShake 0.5s ease;
            border-color: var(--danger) !important;
            box-shadow: 0 0 15px rgba(218,54,51,0.6), inset 0 2px 4px rgba(0,0,0,0.5) !important;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        .word-slot.space {
            background: transparent;
            border: none;
            box-shadow: none;
            flex-shrink: 0;
        }

        .slot-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* ========== ΑΛΦΑΒΗΤΑ ========== */
        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            background: rgba(0,0,0,0.35);
            padding: 12px 10px;
            border-radius: 14px;
            border: 1px solid var(--border);
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .letter-btn {
            width: clamp(36px, 9vw, 46px);
            height: clamp(36px, 9vw, 46px);
            background: linear-gradient(180deg, #2a3340 0%, #1a202a 100%);
            border: 2px solid #4a5568;
            border-radius: 12px;
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #0a0d12, 0 3px 8px rgba(0,0,0,0.5);
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        .letter-btn:active,
        .letter-btn.pressed {
            top: 3px !important;
            box-shadow: 0 1px 0 #0a0d12, 0 2px 4px rgba(0,0,0,0.4) !important;
            background: linear-gradient(180deg, #3d4858 0%, #2a3340 100%) !important;
            border-color: #6a7a90 !important;
            transform: scale(0.95);
        }

        .letter-btn.used-correct {
            background: linear-gradient(180deg, #142a14 0%, #0a1a0a 100%) !important;
            border-color: #2ea043 !important;
            color: #3fb950 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 2px 0 #0a0d12;
            top: 2px;
        }

        .letter-btn.used-wrong {
            background: linear-gradient(180deg, #2a1414 0%, #1a0a0a 100%) !important;
            border-color: #da3633 !important;
            color: #f85149 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 2px 0 #0a0d12;
            top: 2px;
            text-decoration: line-through;
        }

        /* Πεδίο μαντέματος */
        .guess-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .guess-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--btn-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-bright);
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            text-align: center;
            font-family: 'SF Mono', 'Courier New', monospace;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .guess-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 18px rgba(226,176,74,0.25), inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .guess-input::placeholder {
            color: #484f58;
            letter-spacing: 2px;
            font-size: 0.75rem;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            flex: 1;
            min-width: 100px;
            padding: 11px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid;
            position: relative;
            top: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            text-align: center;
            -webkit-touch-callout: none;
        }

        .btn-submit {
            background: linear-gradient(180deg, #e2b04a 0%, #b8882a 100%);
            border-color: #d4a035;
            color: #0d1117;
            box-shadow: 0 4px 0 #6b4f1a, 0 4px 12px rgba(0,0,0,0.6);
            font-weight: 800;
        }

        .btn-submit:active {
            top: 3px;
            box-shadow: 0 1px 0 #6b4f1a, 0 2px 6px rgba(0,0,0,0.6);
        }

        .btn-submit:disabled {
            opacity: 0.35;
            pointer-events: none;
            top: 0;
        }

        .btn-new {
            background: var(--btn-bg);
            border-color: var(--border);
            color: var(--text-bright);
            box-shadow: 0 4px 0 #0d1117, 0 4px 12px rgba(0,0,0,0.6);
        }

        .btn-new:active {
            top: 3px;
            box-shadow: 0 1px 0 #0d1117, 0 2px 6px rgba(0,0,0,0.6);
            background: #2a323d;
        }

        .btn-reset-score {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            box-shadow: none;
            font-size: 0.65rem;
            padding: 6px 10px;
            min-width: auto;
            flex: 0;
        }

        .btn-reset-score:active {
            background: rgba(218,54,51,0.2);
        }

        .message {
            font-weight: 600;
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            min-height: 20px;
            color: var(--warning);
            text-align: center;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            width: 100%;
        }

        .result-panel {
            background: rgba(226,176,74,0.08);
            border: 2px solid var(--gold);
            padding: 10px 14px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideUp 0.4s ease;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-emoji { font-size: 1.5rem; }
        .result-text {
            font-weight: 800;
            font-size: 1rem;
            color: var(--gold-light);
        }
        .result-score {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 700;
            color: var(--text-bright);
            background: rgba(0,0,0,0.4);
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.8rem;
        }

        .hidden { display: none !important; }

        .footer {
            display: flex;
            gap: 10px;
            font-size: 0.6rem;
            color: #484f58;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }

        hr {
            border-color: var(--border);
            width: 80%;
            margin: 1px 0;
            position: relative;
            z-index: 1;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            animation: confettiFall 2.5s ease-in forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .score-pop {
            position: absolute;
            color: var(--gold-light);
            font-weight: 700;
            font-size: 0.8rem;
            pointer-events: none;
            animation: scoreFloat 1.2s ease-out forwards;
            z-index: 10;
        }

        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        @media (max-height: 700px) {
            .game-container {
                gap: 8px;
                padding: 10px;
            }
            .word-display {
                padding: 8px;
                min-height: 45px;
            }
            .alphabet-container {
                padding: 8px;
                gap: 4px;
            }
            .letter-btn {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
        }

        @media (hover: hover) and (pointer: fine) {
            .letter-btn:hover {
                background: #384250;
                border-color: #6a7a90;
                transform: translateY(-2px);
                box-shadow: 0 5px 0 #0a0d12, 0 6px 12px rgba(0,0,0,0.5);
            }
            .btn-submit:hover {
                background: linear-gradient(180deg, #eec060 0%, #c89830 100%);
            }
            .btn-new:hover {
                background: #2a323d;
                border-color: #5a6472;
            }
            .btn-reset-score:hover {
                background: rgba(218,54,51,0.15);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title-section">
            <div class="title">🔐 CRACK THE CODE</div>
            <div class="subtitle">ΑΠΟΚΡΥΠΤΟΓΡΑΦΗΣΕ ΤΗ ΛΕΞΗ</div>
        </div>

        <div class="hint-box" id="hintText">💡 Φόρτωση...</div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">⏳ ΧΡΟΝΟΣ</div>
                <div class="stat-value" id="timerDisplay">3:00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">⭐ ΣΚΟΡ</div>
                <div class="stat-value score-highlight" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🏆 ΡΕΚΟΡ</div>
                <div class="stat-value score-highlight" id="highScoreDisplay">0</div>
            </div>
        </div>

        <div class="attempts-dots" id="attemptsDots"></div>

        <div class="word-display" id="wordDisplay"></div>

        <div class="alphabet-container" id="alphabetContainer"></div>

        <div class="guess-section">
            <input type="text" class="guess-input" id="guessInput" 
                   placeholder="Γράψε ολόκληρη τη λέξη..." 
                   autocomplete="off" inputmode="text" enterkeyhint="done">
            <div class="btn-row">
                <button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
                <button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
            </div>
            <button class="btn btn-reset-score" id="resetScoreBtn">🗑️ ΜΗΔΕΝΙΣΜΟΣ ΣΚΟΡ</button>
        </div>

        <div class="message" id="messageBox"></div>

        <div id="resultPanel" class="result-panel hidden">
            <span class="result-emoji" id="resultEmoji">🏆</span>
            <span class="result-text" id="resultText"></span>
        </div>

        <hr>
        <div class="footer">
            <span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span>
            <span>🔔 SUBSCRIBE</span>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        (function() {
            // ========== 117 ΛΕΞΕΙΣ & ΠΡΟΤΑΣΕΙΣ ==========
            const SECRET_WORDS = [
                { word: "ΑΠΟΣΠΑΣΜΑΤΗΡΑΣ", hint: "Εργαλείο για την αφαίρεση καρφιών" },
                { word: "ΧΡΗΜΑΤΙΣΤΗΡΙΟ", hint: "Χώρος αγοραπωλησίας μετοχών" },
                { word: "ΑΝΕΜΟΓΕΝΝΗΤΡΙΑ", hint: "Μηχανή που παράγει ρεύμα από τον άνεμο" },
                { word: "ΚΑΡΔΙΟΧΕΙΡΟΥΡΓΟΣ", hint: "Γιατρός που χειρουργεί την καρδιά" },
                { word: "ΠΡΟΓΡΑΜΜΑΤΙΣΤΗΣ", hint: "Αυτός που γράφει κώδικα υπολογιστών" },
                { word: "ΥΔΡΑΥΛΙΚΟΣ", hint: "Επαγγελματίας που φτιάχνει σωληνώσεις" },
                { word: "ΦΑΡΜΑΚΟΠΟΙΟΣ", hint: "Αυτός που παρασκευάζει και δίνει φάρμακα" },
                { word: "ΚΟΣΜΗΜΑΤΟΠΩΛΕΙΟ", hint: "Κατάστημα με δαχτυλίδια και κολιέ" },
                { word: "ΦΩΤΟΓΡΑΦΟΣ", hint: "Απαθανατίζει στιγμές με το φακό του" },
                { word: "ΣΥΜΒΟΛΑΙΟΓΡΑΦΟΣ", hint: "Νομικός που επικυρώνει συμφωνίες" },
                { word: "ΚΥΒΙΣΜΟΣ", hint: "Καλλιτεχνικό ρεύμα του Πικάσο" },
                { word: "ΣΟΥΡΕΑΛΙΣΜΟΣ", hint: "Το κίνημα του υπερρεαλισμού" },
                { word: "ΠΕΖΟΓΡΑΦΙΑ", hint: "Ο λόγος που δεν είναι έμμετρος" },
                { word: "ΜΕΛΟΔΡΑΜΑ", hint: "Έργο με έντονη συναισθηματική φόρτιση" },
                { word: "ΚΑΛΛΙΓΡΑΦΙΑ", hint: "Η τέχνη της ωραίας γραφής" },
                { word: "ΑΝΘΟΛΟΓΙΑ", hint: "Συλλογή επιλεγμένων λογοτεχνικών έργων" },
                { word: "ΠΡΟΣΩΠΟΓΡΑΦΙΑ", hint: "Ζωγραφική απεικόνιση προσώπου" },

            // ========== LOCAL STORAGE ==========
            function loadHighScore() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    highScore = saved ? parseInt(saved, 10) : 0;
                } catch(e) {
                    highScore = 0;
                }
                highScoreDisplay.textContent = highScore;
            }

            function saveHighScore(score) {
                if (score > highScore) {
                    highScore = score;
                    try {
                        localStorage.setItem(STORAGE_KEY, highScore);
                    } catch(e) {}
                    highScoreDisplay.textContent = highScore;
                }
            }

            function resetHighScore() {
                highScore = 0;
                try {
                    localStorage.removeItem(STORAGE_KEY);

            // ========== ΗΧΟΙ ==========
            function initAudio() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playSuccessSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    [523.25, 659.25, 783.99].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + i * 0.12);
                        gain.gain.setValueAtTime(0.3, now + i * 0.12);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.3);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.3);
                    });
                } catch(e) {}
            }

            function playFailSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.3);
                } catch(e) {}
            }

            function playSpinSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    for (let i = 0; i < 8; i++) {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(200 + Math.random() * 400, now + i * 0.05);
                        gain.gain.setValueAtTime(0.08, now + i * 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.08);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.05); osc.stop(now + i * 0.05 + 0.08);
                    }
                } catch(e) {}
            }

                if (!audioCtx) return;

                } catch(e) {}
            }

            function getRandomWord() {
                if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = [];
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * SECRET_WORDS.length);
                } while (usedWordIndices.includes(randomIndex));
                usedWordIndices.push(randomIndex);
                return SECRET_WORDS[randomIndex];
            }

            function normalizeGreek(text) {
                return text.toUpperCase()
                    .replace(/Ά/g,"Α").replace(/Έ/g,"Ε").replace(/Ή/g,"Η")
                    .replace(/Ί/g,"Ι").replace(/Ό/g,"Ο").replace(/Ύ/g,"Υ")
                    .replace(/Ώ/g,"Ω").replace(/Ϊ/g,"Ι").replace(/Ϋ/g,"Υ")
                    .replace(/\s+/g,"");
            }

            function formatTime(sec) {
                const m = Math.floor(sec / 60);

                return `${m}:${s < 10 ? '0' : ''}${s}`;

                    attemptsDots.appendChild(dot);

            function updateAttemptDots() {
                const dots = attemptsDots.querySelectorAll(".attempt-dot");
                dots.forEach((dot, index) => {
                    if (index < wrongAttempts) dot.classList.add("lost");
                    else dot.classList.remove("lost");
                });
            }

            function spinAllSlots(callback) {
                if (isSpinning) return;
                isSpinning = true;
                playSpinSound();
                const slots = wordDisplay.querySelectorAll(".word-slot:not(.space)");
                const allLetters = ALPHABET.join("");
                slots.forEach((slot) => {
                    const inner = slot.querySelector(".slot-inner");
                    if (!inner) return;
                    slot.classList.add("spinning");
                    let spinCount = 0;
                    const maxSpins = 10;
                    const spinInterval = setInterval(() => {
                        inner.textContent = allLetters[Math.floor(Math.random() * allLetters.length)];
                        spinCount++;
                        if (spinCount >= maxSpins) {
                            clearInterval(spinInterval);
                            slot.classList.remove("spinning");
                        }
                    }, 60);
                    slot._spinInterval = spinInterval;
                });
                setTimeout(() => {
                    isSpinning = false;
                    updateWordDisplay();
                    if (callback) callback();
                }, 700);
            }

                    const btn = document.createElement("button");
                    btn.className = "letter-btn";
                    btn.textContent = letter;
                    btn.setAttribute("aria-label", `Γράμμα ${letter}`);
                    btn.setAttribute("type", "button");
                    btn.addEventListener("touchstart", function(e) {
                        e.preventDefault(); e.stopPropagation();
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    }, { passive: false });
                    btn.addEventListener("touchend", function(e) { e.preventDefault(); btn.classList.remove("pressed"); });
                    btn.addEventListener("touchcancel", function(e) { btn.classList.remove("pressed"); });
                    btn.addEventListener("mousedown", function(e) {
                        e.preventDefault();
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    });
                    btn.addEventListener("mouseup", function(e) { btn.classList.remove("pressed"); });
                    btn.addEventListener("mouseleave", function(e) { btn.classList.remove("pressed"); });
                    btn.addEventListener("click", function(e) { e.preventDefault(); e.stopPropagation(); });
                    alphabetContainer.appendChild(btn);
                });
            }

            function updateAlphabetButtons() {
                const buttons = alphabetContainer.querySelectorAll(".letter-btn");
                const normalizedWord = normalizeGreek(currentWord);
                buttons.forEach(btn => {
                    const letter = btn.textContent;
                    btn.classList.remove("used-correct", "used-wrong", "pressed");
                    if (usedLetters.includes(letter)) {
                        btn.classList.add(normalizedWord.includes(letter) ? "used-correct" : "used-wrong");
                    }
                });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive || usedLetters.includes(letter) || isSpinning) return;
                usedLetters.push(letter);
                const normalizedWord = normalizeGreek(currentWord);
                const positions = [];
                for (let i = 0; i < normalizedWord.length; i++) {
                    if (normalizedWord[i] === letter) positions.push(i);
                }
                spinAllSlots(() => {
                    if (positions.length > 0) {
                        playSuccessSound();
                        const pointsEarned = positions.length * POINTS_PER_LETTER;
                        currentScore += pointsEarned;
                        correctLettersInCurrentWord += positions.length;
                        positions.forEach(pos => { revealedLetters[pos] = letter; });
                        updateWordDisplay(true, positions);
                        updateAlphabetButtons();
                        updateScoreDisplay();
                        
                        const rect = btn.getBoundingClientRect();
                        const containerRect = document.querySelector('.game-container').getBoundingClientRect();
                        showScorePop('+' + pointsEarned, rect.left - containerRect.left + rect.width/2, rect.top - containerRect.top);
                        
                        messageBox.textContent = `✅ Το γράμμα "${letter}" βρέθηκε! +${pointsEarned} πόντοι`;
                        messageBox.style.color = "var(--success)";
                        
                        if (revealedLetters.join("") === normalizedWord) {
                            setTimeout(() => {
                                currentScore += POINTS_FULL_WORD;
                                updateScoreDisplay();
                                showScorePop('+100 ΛΕΞΗ!', wordDisplay.getBoundingClientRect().left - document.querySelector('.game-container').getBoundingClientRect().left + wordDisplay.clientWidth/2, wordDisplay.getBoundingClientRect().top - document.querySelector('.game-container').getBoundingClientRect().top);
                                playWinFanfare();
                                spawnConfetti();
                                endGame(true);
                            }, 500);
                        }
                    } else {
                        playFailSound();
                        wrongAttempts++;
                        updateAttemptDots();
                        updateAlphabetButtons();
                        flashAllSlots();
                        messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                        messageBox.style.color = "var(--danger)";
                        if (wrongAttempts >= MAX_ATTEMPTS) {
                            setTimeout(() => endGame(false, "attempts"), 500);
                        }
                    }
                });
            }

            function flashAllSlots() {
                const slots = wordDisplay.querySelectorAll(".word-slot:not(.space)");
                slots.forEach(slot => {
                    slot.classList.add("wrong-flash");
                    setTimeout(() => slot.classList.remove("wrong-flash"), 500);
                });
            }

            function calculateSlotSize(wordLength) {
                const container = wordDisplay;
                const containerWidth = container.clientWidth - 20;
                const gapSize = 4;
                const totalGaps = (wordLength - 1) * gapSize;
                let slotSize = Math.floor((containerWidth - totalGaps) / wordLength);
                slotSize = Math.min(slotSize, 48);
                slotSize = Math.max(slotSize, 20);
                return slotSize;
            }

            function updateWordDisplay(animate = false, highlightPositions = []) {
                wordDisplay.innerHTML = "";
                const displayWord = currentWord.toUpperCase();
                const normalizedWord = normalizeGreek(currentWord);
                const wordLength = normalizedWord.length;
                const slotSize = calculateSlotSize(wordLength);
                for (let i = 0; i < displayWord.length; i++) {
                    const slot = document.createElement("span");
                    if (displayWord[i] === " ") {
                        slot.className = "word-slot space";
                        slot.style.width = Math.floor(slotSize * 0.3) + "px";
                        slot.style.minWidth = Math.floor(slotSize * 0.3) + "px";
                    } else {
                        slot.className = "word-slot";
                        slot.style.width = slotSize + "px";
                        slot.style.height = (slotSize * 1.3) + "px";
                        slot.style.fontSize = (slotSize * 0.5) + "px";
                        slot.style.minWidth = slotSize + "px";
                        const inner = document.createElement("span");
                        inner.className = "slot-inner";
                        inner.textContent = revealedLetters[i] || "_";
                        slot.appendChild(inner);
                        if (animate && highlightPositions.includes(i)) {
                            slot.classList.add("revealed");
                            setTimeout(() => slot.classList.remove("revealed"), 400);
                        }
                    }
                    wordDisplay.appendChild(slot);
                }
            }

            function checkFullGuess() {
                if (!gameActive || isSpinning) return;
                initAudio();
                const guess = normalizeGreek(guessInput.value.trim());
                const normalizedWord = normalizeGreek(currentWord);
                if (guess === "") {
                    messageBox.textContent = "Γράψε μια λέξη για υποβολή!";
                    messageBox.style.color = "var(--warning)";
                    return;
                }
                spinAllSlots(() => {
                    if (guess === normalizedWord) {
                        const remainingLetters = normalizedWord.length - correctLettersInCurrentWord;
                        const letterPoints = remainingLetters * POINTS_PER_LETTER;
                        currentScore += letterPoints + POINTS_FULL_WORD;
                        updateScoreDisplay();
                        
                        for (let i = 0; i < normalizedWord.length; i++) {
                            if (!revealedLetters[i]) {
                                revealedLetters[i] = normalizedWord[i];
                                if (!usedLetters.includes(normalizedWord[i])) usedLetters.push(normalizedWord[i]);
                            }
                        }
                        updateWordDisplay(true);
                        updateAlphabetButtons();
                        showScorePop('+' + (letterPoints + POINTS_FULL_WORD) + ' ΛΕΞΗ!', wordDisplay.getBoundingClientRect().left - document.querySelector('.game-container').getBoundingClientRect().left + wordDisplay.clientWidth/2, wordDisplay.getBoundingClientRect().top - document.querySelector('.game-container').getBoundingClientRect().top);
                        playWinFanfare();
                        spawnConfetti();
                        endGame(true);
                    } else {
                        playFailSound();
                        wrongAttempts++;
                        updateAttemptDots();
                        flashAllSlots();
                        messageBox.textContent = `Λάθος λέξη! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                        messageBox.style.color = "var(--danger)";
                        guessInput.value = "";
                        guessInput.focus();
                        if (wrongAttempts >= MAX_ATTEMPTS) {
                            setTimeout(() => endGame(false, "attempts"), 500);
                        }
                    }
                });
            }

            function endGame(won, reason = "time") {
                if (!gameActive) return;
                gameActive = false;
                stopTimer();
                const normalizedWord = normalizeGreek(currentWord);
                for (let i = 0; i < normalizedWord.length; i++) revealedLetters[i] = normalizedWord[i];
                updateWordDisplay();
                updateAlphabetButtons();
                guessInput.disabled = true;
                submitBtn.disabled = true;
                resultPanel.classList.remove("hidden");
                
                saveHighScore(currentScore);
                
                if (won) {
                    resultEmoji.textContent = "🎉";
                    resultText.textContent = "ΤΟ ΒΡΗΚΕΣ! +" + POINTS_FULL_WORD;
                    messageBox.textContent = "Συγχαρητήρια! Σκορ: " + currentScore;
                    messageBox.style.color = "var(--success)";
                } else {
                    resultEmoji.textContent = reason === "attempts" ? "💔" : "⏰";
                    resultText.textContent = reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ";
                    messageBox.textContent = "Η λέξη ήταν: " + currentWord + " | Σκορ: " + currentScore;
                    messageBox.style.color = "var(--danger)";
                }
            }

            function resetGame() {
                stopTimer();
                const randomWordObj = getRandomWord();
                currentWord = randomWordObj.word;
                currentHint = randomWordObj.hint;
                gameActive = true;
                timeSeconds = START_TIME;
                wrongAttempts = 0;
                usedLetters = [];
                isSpinning = false;
                correctLettersInCurrentWord = 0;
                const normalizedWord = normalizeGreek(currentWord);
                revealedLetters = new Array(normalizedWord.length).fill("");
                
                timerDisplay.textContent = formatTime(timeSeconds);
                timerDisplay.style.color = "var(--text-bright)";
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                updateAlphabetButtons();
                createAttemptDots();
                guessInput.value = "";
                guessInput.disabled = false;
                submitBtn.disabled = false;
                resultPanel.classList.add("hidden");
                messageBox.textContent = "Σκορ: " + currentScore + " | Ρεκόρ: " + highScore;
                messageBox.style.color = "var(--text)";
                confettiContainer.innerHTML = "";
                
                timerInterval = setInterval(() => {
                    if (!gameActive) return;
                    timeSeconds--;
                    timerDisplay.textContent = formatTime(timeSeconds);
                    timerDisplay.style.color = timeSeconds <= 30 ? "var(--danger)" : "var(--text-bright)";
                    if (timeSeconds <= 0) {
                        timeSeconds = 0;
                        timerDisplay.textContent = formatTime(0);
                        endGame(false, "time");
                    }
                }, 1000);
                
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
                guessInput.focus();
            }

            submitBtn.addEventListener("touchstart", function(e) { e.preventDefault(); checkFullGuess(); });
            submitBtn.addEventListener("mousedown", function(e) { e.preventDefault(); checkFullGuess(); });
            submitBtn.addEventListener("click", function(e) { e.preventDefault(); });

            newGameBtn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
                resetGame();
            });
            newGameBtn.addEventListener("mousedown", function(e) {
                e.preventDefault();
                window.scrollTo(0, 0);
                resetGame();
            });
            newGameBtn.addEventListener("click", function(e) { e.preventDefault(); });

            resetScoreBtn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                currentScore = 0;
                updateScoreDisplay();
                resetHighScore();
                messageBox.textContent = "Το σκορ μηδενίστηκε!";
                messageBox.style.color = "var(--warning)";
            });
            resetScoreBtn.addEventListener("mousedown", function(e) {
                e.preventDefault();
                currentScore = 0;
                updateScoreDisplay();
                resetHighScore();
                messageBox.textContent = "Το σκορ μηδενίστηκε!";
                messageBox.style.color = "var(--warning)";
            });
            resetScoreBtn.addEventListener("click", function(e) { e.preventDefault(); });

            guessInput.addEventListener("keydown", function(e) {
                if (e.key === "Enter") { e.preventDefault(); checkFullGuess(); }
            });

            guessInput.addEventListener("input", function(e) {
                e.target.value = e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, "");
            });

            loadHighScore();
            updateScoreDisplay();
            createAttemptDots();
            createAlphabetButtons();
            resetGame();

            window.addEventListener('resize', () => { updateWordDisplay(); });
        })();
    </script>
