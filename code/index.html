<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CRACK THE CODE | Μάντεψε την Κρυφή Λέξη</title>
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #131820;
            --border: #2a3040;
            --gold: #e2b04a;
            --gold-light: #f5d78c;
            --text: #bcc5d0;
            --text-bright: #e8edf2;
            --success: #2ea043;
            --danger: #da3633;
            --warning: #d2991d;
            --btn-bg: #1c2129;
            --shadow: 0 6px 24px rgba(0,0,0,0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(160deg, #0a0e14 0%, #141b24 40%, #0d1117 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .game-container {
            max-width: 520px;
            width: 100%;
            background: var(--bg-card);
            border: 2px solid var(--border);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
            border-radius: 22px;
            padding: 20px 14px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .game-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 10%, rgba(226,176,74,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .title-section {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .title {
            font-size: clamp(1.3rem, 5vw, 1.9rem);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f7da8c 0%, #c99530 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 3px 6px rgba(200,150,50,0.5));
            line-height: 1.3;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #6e7681;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .hint-box {
            background: rgba(226,176,74,0.06);
            border: 1px solid rgba(226,176,74,0.25);
            color: var(--gold-light);
            padding: 12px 18px;
            border-radius: 14px;
            font-style: italic;
            font-size: clamp(0.95rem, 3.5vw, 1.15rem);
            text-align: center;
            width: 100%;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            line-height: 1.5;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .stat-box {
            flex: 1;
            min-width: 90px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 12px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6e7681;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .stat-value {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 700;
            color: var(--text-bright);
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        .attempts-dots {
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .attempt-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px rgba(46,160,67,0.6);
            transition: all 0.3s ease;
        }

        .attempt-dot.lost {
            background: var(--danger);
            box-shadow: 0 0 8px rgba(218,54,51,0.7);
            animation: pulseDot 0.35s ease;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        .word-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.45);
            padding: 16px 12px;
            border-radius: 18px;
            border: 2px solid var(--border);
            width: 100%;
            min-height: 58px;
            position: relative;
            z-index: 1;
        }

        .word-slot {
            width: clamp(36px, 10vw, 46px);
            height: clamp(44px, 12vw, 54px);
            background: linear-gradient(180deg, #1a1f28 0%, #0d1117 100%);
            border: 2px solid #30363d;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-light);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            text-shadow: 0 0 10px rgba(226,176,74,0.5);
            transition: all 0.3s ease;
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        .word-slot.revealed {
            border-color: var(--gold);
            box-shadow: 0 0 18px rgba(226,176,74,0.5), inset 0 2px 4px rgba(0,0,0,0.5);
            animation: revealPop 0.35s ease;
        }

        @keyframes revealPop {
            0% { transform: scale(0.7); opacity: 0.5; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        .word-slot.space {
            width: 14px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        /* ========== ΑΛΦΑΒΗΤΑ - ΔΙΟΡΘΩΜΕΝΑ ΚΟΥΜΠΙΑ ========== */
        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            background: rgba(0,0,0,0.35);
            padding: 16px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .letter-btn {
            width: clamp(42px, 11vw, 52px);
            height: clamp(42px, 11vw, 52px);
            background: linear-gradient(180deg, #2a3340 0%, #1a202a 100%);
            border: 2px solid #4a5568;
            border-radius: 14px;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #0a0d12, 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            /* Κρίσιμο: αποτροπή οποιουδήποτε default συμπεριφοράς */
            -webkit-touch-callout: none;
        }

        /* Κατάσταση πατήματος - άμεση οπτική ανάδραση */
        .letter-btn:active,
        .letter-btn.pressed {
            top: 4px !important;
            box-shadow: 0 1px 0 #0a0d12, 0 2px 5px rgba(0,0,0,0.4) !important;
            background: linear-gradient(180deg, #3d4858 0%, #2a3340 100%) !important;
            border-color: #6a7a90 !important;
            transform: scale(0.95);
        }

        .letter-btn.used-correct {
            background: linear-gradient(180deg, #142a14 0%, #0a1a0a 100%) !important;
            border-color: #2ea043 !important;
            color: #3fb950 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 2px 0 #0a0d12;
            top: 2px;
        }

        .letter-btn.used-wrong {
            background: linear-gradient(180deg, #2a1414 0%, #1a0a0a 100%) !important;
            border-color: #da3633 !important;
            color: #f85149 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 2px 0 #0a0d12;
            top: 2px;
            text-decoration: line-through;
        }

        /* Πεδίο μαντέματος */
        .guess-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .guess-input {
            width: 100%;
            padding: 13px 16px;
            background: var(--btn-bg);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text-bright);
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            text-align: center;
            font-family: 'SF Mono', 'Courier New', monospace;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .guess-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 22px rgba(226,176,74,0.25), inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .guess-input::placeholder {
            color: #484f58;
            letter-spacing: 2px;
            font-size: 0.85rem;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            flex: 1;
            min-width: 110px;
            padding: 13px 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: clamp(0.85rem, 3vw, 1rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid;
            position: relative;
            top: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            text-align: center;
            -webkit-touch-callout: none;
        }

        .btn-submit {
            background: linear-gradient(180deg, #e2b04a 0%, #b8882a 100%);
            border-color: #d4a035;
            color: #0d1117;
            box-shadow: 0 5px 0 #6b4f1a, 0 5px 15px rgba(0,0,0,0.6);
            font-weight: 800;
        }

        .btn-submit:active {
            top: 4px;
            box-shadow: 0 1px 0 #6b4f1a, 0 2px 8px rgba(0,0,0,0.6);
        }

        .btn-submit:disabled {
            opacity: 0.35;
            pointer-events: none;
            top: 0;
        }

        .btn-new {
            background: var(--btn-bg);
            border-color: var(--border);
            color: var(--text-bright);
            box-shadow: 0 5px 0 #0d1117, 0 5px 15px rgba(0,0,0,0.6);
        }

        .btn-new:active {
            top: 4px;
            box-shadow: 0 1px 0 #0d1117, 0 2px 8px rgba(0,0,0,0.6);
            background: #2a323d;
        }

        .message {
            font-weight: 600;
            font-size: clamp(0.85rem, 3vw, 1rem);
            min-height: 24px;
            color: var(--warning);
            text-align: center;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            width: 100%;
        }

        .result-panel {
            background: rgba(226,176,74,0.08);
            border: 2px solid var(--gold);
            padding: 12px 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideUp 0.4s ease;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-emoji { font-size: 1.8rem; }
        .result-text {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--gold-light);
        }
        .result-score {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 700;
            color: var(--text-bright);
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .hidden { display: none !important; }

        .footer {
            display: flex;
            gap: 14px;
            font-size: 0.68rem;
            color: #484f58;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }

        hr {
            border-color: var(--border);
            width: 80%;
            margin: 2px 0;
            position: relative;
            z-index: 1;
        }

        /* Desktop hover μόνο για συσκευές με ποντίκι */
        @media (hover: hover) and (pointer: fine) {
            .letter-btn:hover {
                background: #384250;
                border-color: #6a7a90;
                transform: translateY(-2px);
                box-shadow: 0 6px 0 #0a0d12, 0 8px 16px rgba(0,0,0,0.5);
            }
            .btn-submit:hover {
                background: linear-gradient(180deg, #eec060 0%, #c89830 100%);
            }
            .btn-new:hover {
                background: #2a323d;
                border-color: #5a6472;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title-section">
            <div class="title">🔐 CRACK THE CODE</div>
            <div class="subtitle">ΑΠΟΚΡΥΠΤΟΓΡΑΦΗΣΕ ΤΗ ΛΕΞΗ</div>
        </div>

        <div class="hint-box" id="hintText">💡 Φόρτωση...</div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">⏳ ΧΡΟΝΟΣ</div>
                <div class="stat-value" id="timerDisplay">3:00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">❤️ ΠΡΟΣΠΑΘΕΙΕΣ</div>
                <div class="attempts-dots" id="attemptsDots"></div>
            </div>
        </div>

        <div class="word-display" id="wordDisplay"></div>

        <!-- ΑΛΦΑΒΗΤΑ -->
        <div class="alphabet-container" id="alphabetContainer"></div>

        <div class="guess-section">
            <input type="text" class="guess-input" id="guessInput" 
                   placeholder="Γράψε ολόκληρη τη λέξη..." 
                   autocomplete="off" inputmode="text" enterkeyhint="done">
            <div class="btn-row">
                <button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
                <button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
            </div>
        </div>

        <div class="message" id="messageBox"></div>

        <div id="resultPanel" class="result-panel hidden">
            <span class="result-emoji" id="resultEmoji">🏆</span>
            <span class="result-text" id="resultText"></span>
            <span class="result-score" id="scoreDisplay"></span>
        </div>

        <hr>
        <div class="footer">
            <span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span>
            <span>🔔 SUBSCRIBE</span>
        </div>
    </div>

    <script>
        (function() {
            // ========== 20 ΠΡΟΤΑΣΕΙΣ ==========
            const SECRET_WORDS = [
                { word: "ΦΙΛΟΣΟΦΙΑ", hint: "Η αγάπη για τη σοφία και τη γνώση" },
                { word: "ΕΛΕΥΘΕΡΙΑ", hint: "Το πολυτιμότερο αγαθό του ανθρώπου" },
                { word: "ΘΑΛΑΣΣΑ", hint: "Απέραντο γαλάζιο που κρύβει μυστικά" },
                { word: "ΠΕΡΙΠΕΤΕΙΑ", hint: "Μια συναρπαστική και απρόβλεπτη εμπειρία" },
                { word: "ΟΝΕΙΡΟ", hint: "Ταξίδι του μυαλού όταν κοιμάσαι" },
                { word: "ΑΣΤΕΡΙΑ", hint: "Λαμπερά φωτάκια στον νυχτερινό ουρανό" },
                { word: "ΚΑΛΟΚΑΙΡΙ", hint: "Εποχή με ήλιο, θάλασσα και ξεγνοιασιά" },
                { word: "ΦΑΝΤΑΣΙΑ", hint: "Η δύναμη να δημιουργείς κόσμους με το μυαλό" },
                { word: "ΧΑΜΟΓΕΛΟ", hint: "Η πιο όμορφη καμπύλη του προσώπου" },
                { word: "ΜΥΣΤΗΡΙΟ", hint: "Κάτι ανεξήγητο που σε ιντριγκάρει" },
                { word: "ΔΗΜΙΟΥΡΓΙΑ", hint: "Η πράξη του να φτιάχνεις κάτι νέο" },
                { word: "ΑΓΑΠΗ", hint: "Το δυνατότερο συναίσθημα στον κόσμο" },
                { word: "ΤΑΞΙΔΙ", hint: "Μετακίνηση σε νέους προορισμούς" },
                { word: "ΜΟΥΣΙΚΗ", hint: "Ήχοι που αγγίζουν την ψυχή" },
                { word: "ΓΝΩΣΗ", hint: "Ό,τι μαθαίνεις και σε κάνει σοφότερο" },
                { word: "ΦΥΣΗ", hint: "Το φυσικό περιβάλλον γύρω μας" },
                { word: "ΙΣΤΟΡΙΑ", hint: "Αφήγηση γεγονότων του παρελθόντος" },
                { word: "ΕΠΙΣΤΗΜΗ", hint: "Η συστηματική μελέτη του κόσμου" },
                { word: "ΤΕΧΝΗ", hint: "Δημιουργική έκφραση μέσω έργων" },
                { word: "ΦΙΛΙΑ", hint: "Ένας ανεκτίμητος δεσμός μεταξύ ανθρώπων" }
            ];

            const ALPHABET = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ".split("");
            const START_TIME = 180;
            const MAX_SCORE = 6000;
            const MAX_ATTEMPTS = 8;

            let currentWord = "";
            let currentHint = "";
            let gameActive = false;
            let timeSeconds = START_TIME;
            let timerInterval = null;
            let usedLetters = [];
            let wrongAttempts = 0;
            let revealedLetters = [];
            let usedWordIndices = [];

            // DOM
            const timerDisplay = document.getElementById("timerDisplay");
            const hintText = document.getElementById("hintText");
            const wordDisplay = document.getElementById("wordDisplay");
            const alphabetContainer = document.getElementById("alphabetContainer");
            const attemptsDots = document.getElementById("attemptsDots");
            const guessInput = document.getElementById("guessInput");
            const submitBtn = document.getElementById("submitGuess");
            const newGameBtn = document.getElementById("newGameBtn");
            const messageBox = document.getElementById("messageBox");
            const resultPanel = document.getElementById("resultPanel");
            const resultEmoji = document.getElementById("resultEmoji");
            const resultText = document.getElementById("resultText");
            const scoreDisplay = document.getElementById("scoreDisplay");

            function getRandomWord() {
                if (usedWordIndices.length >= SECRET_WORDS.length) {
                    usedWordIndices = [];
                }
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * SECRET_WORDS.length);
                } while (usedWordIndices.includes(randomIndex));
                usedWordIndices.push(randomIndex);
                return SECRET_WORDS[randomIndex];
            }

            function normalizeGreek(text) {
                return text.toUpperCase()
                    .replace(/Ά/g, "Α").replace(/Έ/g, "Ε").replace(/Ή/g, "Η")
                    .replace(/Ί/g, "Ι").replace(/Ό/g, "Ο").replace(/Ύ/g, "Υ")
                    .replace(/Ώ/g, "Ω").replace(/Ϊ/g, "Ι").replace(/Ϋ/g, "Υ")
                    .replace(/\s+/g, "");
            }

            function formatTime(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function stopTimer() {
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            }

            function createAttemptDots() {
                attemptsDots.innerHTML = "";
                for (let i = 0; i < MAX_ATTEMPTS; i++) {
                    const dot = document.createElement("span");
                    dot.className = "attempt-dot";
                    if (i < wrongAttempts) dot.classList.add("lost");
                    attemptsDots.appendChild(dot);
                }
            }

            function updateAttemptDots() {
                const dots = attemptsDots.querySelectorAll(".attempt-dot");
                dots.forEach((dot, index) => {
                    if (index < wrongAttempts) dot.classList.add("lost");
                    else dot.classList.remove("lost");
                });
            }

            // ========== ΔΗΜΙΟΥΡΓΙΑ ΚΟΥΜΠΙΩΝ ΑΛΦΑΒΗΤΟΥ (ΔΙΟΡΘΩΜΕΝΑ) ==========
            function createAlphabetButtons() {
                alphabetContainer.innerHTML = "";
                ALPHABET.forEach(letter => {
                    const btn = document.createElement("button");
                    btn.className = "letter-btn";
                    btn.textContent = letter;
                    btn.setAttribute("aria-label", `Γράμμα ${letter}`);
                    btn.setAttribute("type", "button");
                    
                    // Χρήση touchstart για ΑΜΕΣΗ απόκριση σε κινητά
                    btn.addEventListener("touchstart", function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        // Προσθήκη κλάσης για οπτική ανάδραση
                        btn.classList.add("pressed");
                        handleLetterClick(letter, btn);
                    }, { passive: false });
                    
                    // Αφαίρεση pressed όταν τελειώνει το touch
                    btn.addEventListener("touchend", function(e) {
                        e.preventDefault();
                        btn.classList.remove("pressed");
                    });
                    
                    btn.addEventListener("touchcancel", function(e) {
                        btn.classList.remove("pressed");
                    });
                    
                    // Για desktop (mouse)
                    btn.addEventListener("mousedown", function(e) {
                        e.preventDefault();
                        btn.classList.add("pressed");
                        handleLetterClick(letter, btn);
                    });
                    
                    btn.addEventListener("mouseup", function(e) {
                        btn.classList.remove("pressed");
                    });
                    
                    btn.addEventListener("mouseleave", function(e) {
                        btn.classList.remove("pressed");
                    });
                    
                    // Αποφυγή οποιουδήποτε click event που μπορεί να προκαλέσει διπλό fire
                    btn.addEventListener("click", function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                    });
                    
                    alphabetContainer.appendChild(btn);
                });
            }

            function updateAlphabetButtons() {
                const buttons = alphabetContainer.querySelectorAll(".letter-btn");
                const normalizedWord = normalizeGreek(currentWord);
                buttons.forEach(btn => {
                    const letter = btn.textContent;
                    // Αφαίρεση πρώτα όλων των ειδικών κλάσεων
                    btn.classList.remove("used-correct", "used-wrong", "pressed");
                    if (usedLetters.includes(letter)) {
                        if (normalizedWord.includes(letter)) {
                            btn.classList.add("used-correct");
                        } else {
                            btn.classList.add("used-wrong");
                        }
                    }
                });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive) return;
                if (usedLetters.includes(letter)) return;

                usedLetters.push(letter);
                const normalizedWord = normalizeGreek(currentWord);
                const positions = [];
                for (let i = 0; i < normalizedWord.length; i++) {
                    if (normalizedWord[i] === letter) positions.push(i);
                }

                if (positions.length > 0) {
                    positions.forEach(pos => { revealedLetters[pos] = letter; });
                    updateWordDisplay(true);
                    updateAlphabetButtons();
                    messageBox.textContent = `✅ Το γράμμα "${letter}" βρέθηκε!`;
                    messageBox.style.color = "var(--success)";
                    if (revealedLetters.join("") === normalizedWord) {
                        setTimeout(() => endGame(true), 300);
                    }
                } else {
                    wrongAttempts++;
                    updateAttemptDots();
                    updateAlphabetButtons();
                    messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                    messageBox.style.color = "var(--danger)";
                    if (wrongAttempts >= MAX_ATTEMPTS) {
                        setTimeout(() => endGame(false, "attempts"), 300);
                    }
                }
            }

            function updateWordDisplay(animate = false) {
                wordDisplay.innerHTML = "";
                const displayWord = currentWord.toUpperCase();
                for (let i = 0; i < displayWord.length; i++) {
                    const slot = document.createElement("span");
                    if (displayWord[i] === " ") {
                        slot.className = "word-slot space";
                    } else {
                        slot.className = "word-slot";
                        slot.textContent = revealedLetters[i] || "_";
                        if (animate && revealedLetters[i]) {
                            slot.classList.add("revealed");
                            setTimeout(() => slot.classList.remove("revealed"), 350);
                        }
                    }
                    wordDisplay.appendChild(slot);
                }
            }

            function checkFullGuess() {
                if (!gameActive) return;
                const guess = normalizeGreek(guessInput.value.trim());
                const normalizedWord = normalizeGreek(currentWord);
                if (guess === "") {
                    messageBox.textContent = "Γράψε μια λέξη για υποβολή!";
                    messageBox.style.color = "var(--warning)";
                    return;
                }
                if (guess === normalizedWord) {
                    for (let i = 0; i < normalizedWord.length; i++) {
                        if (!revealedLetters[i]) {
                            revealedLetters[i] = normalizedWord[i];
                            if (!usedLetters.includes(normalizedWord[i])) usedLetters.push(normalizedWord[i]);
                        }
                    }
                    updateWordDisplay(true);
                    updateAlphabetButtons();
                    endGame(true);
                } else {
                    wrongAttempts++;
                    updateAttemptDots();
                    messageBox.textContent = `Λάθος λέξη! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                    messageBox.style.color = "var(--danger)";
                    guessInput.value = "";
                    guessInput.focus();
                    if (wrongAttempts >= MAX_ATTEMPTS) {
                        setTimeout(() => endGame(false, "attempts"), 300);
                    }
                }
            }

            function calculateScore() {
                if (timeSeconds <= 0) return 0;
                return Math.floor((timeSeconds / START_TIME) * MAX_SCORE);
            }

            function endGame(won, reason = "time") {
                if (!gameActive) return;
                gameActive = false;
                stopTimer();
                const normalizedWord = normalizeGreek(currentWord);
                for (let i = 0; i < normalizedWord.length; i++) revealedLetters[i] = normalizedWord[i];
                updateWordDisplay();
                updateAlphabetButtons();
                guessInput.disabled = true;
                submitBtn.disabled = true;
                resultPanel.classList.remove("hidden");
                if (won) {
                    resultEmoji.textContent = "🎉";
                    resultText.textContent = "ΤΟ ΒΡΗΚΕΣ!";
                    scoreDisplay.textContent = `${calculateScore()} / ${MAX_SCORE}`;
                    messageBox.textContent = "Συγχαρητήρια! Η λέξη ήταν: " + currentWord;
                    messageBox.style.color = "var(--success)";
                } else {
                    resultEmoji.textContent = reason === "attempts" ? "💔" : "⏰";
                    resultText.textContent = reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ";
                    scoreDisplay.textContent = "0 / 6000";
                    messageBox.textContent = "Η λέξη ήταν: " + currentWord;
                    messageBox.style.color = "var(--danger)";
                }
            }

            function resetGame() {
                stopTimer();
                const randomWordObj = getRandomWord();
                currentWord = randomWordObj.word;
                currentHint = randomWordObj.hint;
                gameActive = true;
                timeSeconds = START_TIME;
                wrongAttempts = 0;
                usedLetters = [];
                const normalizedWord = normalizeGreek(currentWord);
                revealedLetters = new Array(normalizedWord.length).fill("");
                timerDisplay.textContent = formatTime(timeSeconds);
                timerDisplay.style.color = "var(--text-bright)";
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                updateAlphabetButtons();
                createAttemptDots();
                guessInput.value = "";
                guessInput.disabled = false;
                submitBtn.disabled = false;
                resultPanel.classList.add("hidden");
                messageBox.textContent = "";
                timerInterval = setInterval(() => {
                    if (!gameActive) return;
                    timeSeconds--;
                    timerDisplay.textContent = formatTime(timeSeconds);
                    timerDisplay.style.color = timeSeconds <= 30 ? "var(--danger)" : "var(--text-bright)";
                    if (timeSeconds <= 0) {
                        timeSeconds = 0;
                        timerDisplay.textContent = formatTime(0);
                        endGame(false, "time");
                    }
                }, 1000);
                guessInput.focus();
            }

            // ========== EVENT LISTENERS ==========
            submitBtn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                checkFullGuess();
            });
            submitBtn.addEventListener("mousedown", function(e) {
                e.preventDefault();
                checkFullGuess();
            });
            submitBtn.addEventListener("click", function(e) { e.preventDefault(); });

            newGameBtn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                resetGame();
            });
            newGameBtn.addEventListener("mousedown", function(e) {
                e.preventDefault();
                resetGame();
            });
            newGameBtn.addEventListener("click", function(e) { e.preventDefault(); });

            guessInput.addEventListener("keydown", function(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    checkFullGuess();
                }
            });

            guessInput.addEventListener("input", function(e) {
                let value = e.target.value;
                value = value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, "");
                e.target.value = value;
            });

            // Αρχικοποίηση
            createAttemptDots();
            createAlphabetButtons();
            resetGame();
        })();
    </script>
</body>
</html>
