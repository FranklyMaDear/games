<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CRACK THE CODE | Μυστικός Κωδικός</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 10%, #2b1e10, #0f0a05);
      font-family: 'Courier New', 'Fira Code', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
      color: #d4c49a;
    }

    .game-container {
      max-width: 500px;
      width: 100%;
      background: rgba(20, 15, 10, 0.9);
      backdrop-filter: blur(12px);
      border: 2px solid #6b5a3a;
      box-shadow: 0 0 30px rgba(180, 130, 40, 0.4), inset 0 0 20px rgba(0,0,0,0.8);
      border-radius: 16px;
      padding: 25px 20px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
    }

    /* διακοσμητικά στοιχεία τύπου φωτογραφίας */
    .top-hint {
      font-size: 1.7rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e5c687;
      text-shadow: 0 0 8px #cc9f2c;
      background: #1e1808;
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid #aa8b4c;
      margin-bottom: 5px;
      text-align: center;
      width: fit-content;
    }

    .timer-section {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1f180a;
      padding: 8px 18px;
      border-radius: 30px;
      border: 1px solid #7a6a3c;
      color: #fae7a7;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 2px;
      box-shadow: inset 0 0 8px black;
    }

    .timer-icon {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 6px gold);
    }

    .hint-box {
      background: #1e1a0e;
      border: 1px dashed #c9aa4b;
      color: #ebd494;
      padding: 12px 20px;
      border-radius: 12px;
      font-style: italic;
      font-size: 1.3rem;
      text-align: center;
      width: 100%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.7);
      margin: 5px 0;
    }

    .code-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #0a0702;
      padding: 15px 20px;
      border-radius: 20px;
      border: 2px solid #b49450;
      width: 100%;
    }

    .letter-slot {
      width: 50px;
      height: 60px;
      background: #2f2618;
      border: 2px solid #806f48;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      text-transform: uppercase;
      color: #ffde9e;
      box-shadow: inset 0 0 10px #000000;
      text-shadow: 0 0 8px #cc8800;
      background: linear-gradient(180deg, #3a2e19 0%, #1f1707 100%);
    }

    .input-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
    }

    .guess-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .guess-letter-input {
      width: 48px;
      height: 54px;
      background: #1f1a0c;
      border: 2px solid #c2a24a;
      border-radius: 10px;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      text-transform: uppercase;
      color: #ffe7af;
      background: #2b2414;
      outline: none;
      caret-color: #dbaa3a;
      box-shadow: inset 0 0 6px black;
      font-family: 'Courier New', monospace;
    }

    .guess-letter-input:focus {
      border-color: #f3cd60;
      box-shadow: 0 0 15px #e6b422;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 5px;
    }

    .btn {
      background: #32281a;
      border: 2px solid #ab8d4b;
      color: #fae9b2;
      padding: 12px 22px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      background: linear-gradient(180deg, #4d3b1e 0%, #211a0b 100%);
      box-shadow: 0 5px 0 #0b0702, 0 8px 18px black;
      transition: all 0.1s ease;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #0b0702, 0 5px 12px black;
      background: #5f4a27;
    }

    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      transform: none;
      filter: grayscale(0.5);
    }

    .message {
      font-weight: bold;
      font-size: 1.2rem;
      min-height: 30px;
      color: #e7c468;
      text-shadow: 0 0 6px black;
      text-align: center;
    }

    .result-badge {
      background: #15100a;
      border: 1px solid #bb9648;
      padding: 10px 20px;
      border-radius: 30px;
      color: #ffd966;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }

    .subscribe-text {
      color: #c0a059;
      font-size: 0.9rem;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    .small {
      font-size: 0.9rem;
    }

    hr {
      border-color: #5e4f2e;
      width: 80%;
      margin: 10px 0;
    }

    @media (max-width: 400px) {
      .letter-slot {
        width: 40px;
        height: 50px;
        font-size: 2rem;
      }
      .guess-letter-input {
        width: 40px;
        height: 48px;
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="top-hint">🔎 CRACK THE CODE</div>

  <!-- Χρονόμετρο -->
  <div class="timer-section">
    <span class="timer-icon">⏳</span>
    <span id="timerDisplay">1:56</span>
  </div>

  <!-- Στοιχείο υπόδειξης όπως "Daughter Of Hallownest" -->
  <div class="hint-box" id="hintText">
    💡 Hint: Daughter Of Hallownest
  </div>

  <!-- Εμφάνιση μυστικής λέξης (κρυμμένη αρχικά) -->
  <div class="code-display" id="codeDisplayContainer">
    <span id="slot1" class="letter-slot">?</span>
    <span id="slot2" class="letter-slot">?</span>
    <span id="slot3" class="letter-slot">?</span>
    <span id="slot4" class="letter-slot">?</span>
    <span id="slot5" class="letter-slot">?</span>
    <span id="slot6" class="letter-slot">?</span>
  </div>

  <!-- Περιοχή εισαγωγής γραμμάτων -->
  <div class="input-area">
    <div class="guess-row" id="guessInputs">
      <input type="text" maxlength="1" class="guess-letter-input" id="letter0" placeholder="A" autofocus>
      <input type="text" maxlength="1" class="guess-letter-input" id="letter1" placeholder="D">
      <input type="text" maxlength="1" class="guess-letter-input" id="letter2" placeholder="O">
      <input type="text" maxlength="1" class="guess-letter-input" id="letter3" placeholder="L">
      <input type="text" maxlength="1" class="guess-letter-input" id="letter4" placeholder="F">
      <input type="text" maxlength="1" class="guess-letter-input" id="letter5" placeholder="_">
    </div>

    <div class="action-buttons">
      <button class="btn" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
      <button class="btn" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
    </div>
  </div>

  <!-- Μήνυμα αποτελέσματος / κατάστασης -->
  <div class="message" id="messageBox"></div>

  <!-- Σκορ / εμφάνιση τύπου VAULT CRACKED -->
  <div id="resultPanel" class="result-badge hidden">
    <span id="resultEmoji">🏆</span>
    <span id="resultText">VAULT CRACKED!</span>
    <span id="scoreDisplay">2779 / 6000</span>
  </div>

  <div class="subscribe-text">
    <span id="shareHint">Μοιράσου το αποτέλεσμα!</span>
  </div>
  <hr>
  <div style="display: flex; gap: 15px; font-size: 0.8rem; color:#b89f5e;">
    <span>🔔 SUBSCRIBE</span>
    <span>🔧 CREATE YOUR OWN CODE</span>
  </div>
</div>

<script>
  (function() {
    // ---------- ΣΤΑΘΕΡΕΣ & ΜΥΣΤΙΚΗ ΛΕΞΗ ----------
    // Ο κωδικός που πρέπει να βρει ο παίκτης (όπως "ADOLF HITLER" αλλά χωρίς κενό)
    // Στην φωτογραφία φαίνεται "ADOLF HITLER", αλλά για το παιχνίδι χρησιμοποιούμε μία λέξη χωρίς διάστημα
    // για να ταιριάζει στα 6 slots. Επέλεξα "HORNET" που ταιριάζει στο hint "Daughter Of Hallownest"
    // (Η Hornet είναι κόρη του Hallownest στο Hollow Knight).
    const SECRET_WORD = "HORNET";  // 6 γράμματα, κεφαλαία
    const WORD_LENGTH = 6;
    const MAX_SCORE = 6000;
    
    // Κατάσταση παιχνιδιού
    let currentGuess = ["", "", "", "", "", ""];
    let gameActive = true;
    let timerInterval = null;
    let timeSeconds = 116; // αρχικά 1:56 -> 1*60 + 56 = 116 δευτερόλεπτα
    const START_TIME = 116; // 1:56
    
    // Στοιχεία DOM
    const timerDisplay = document.getElementById("timerDisplay");
    const hintText = document.getElementById("hintText");
    const slots = [
      document.getElementById("slot1"),
      document.getElementById("slot2"),
      document.getElementById("slot3"),
      document.getElementById("slot4"),
      document.getElementById("slot5"),
      document.getElementById("slot6")
    ];
    const letterInputs = [
      document.getElementById("letter0"),
      document.getElementById("letter1"),
      document.getElementById("letter2"),
      document.getElementById("letter3"),
      document.getElementById("letter4"),
      document.getElementById("letter5")
    ];
    const submitBtn = document.getElementById("submitGuess");
    const newGameBtn = document.getElementById("newGameBtn");
    const messageBox = document.getElementById("messageBox");
    const resultPanel = document.getElementById("resultPanel");
    const resultEmoji = document.getElementById("resultEmoji");
    const resultText = document.getElementById("resultText");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const shareHint = document.getElementById("shareHint");
    
    // ---------- ΒΟΗΘΗΤΙΚΕΣ ΣΥΝΑΡΤΗΣΕΙΣ ----------
    function formatTime(sec) {
      const mins = Math.floor(sec / 60);
      const remainingSecs = sec % 60;
      return `${mins}:${remainingSecs < 10 ? '0' : ''}${remainingSecs}`;
    }
    
    function updateTimerDisplay() {
      timerDisplay.textContent = formatTime(timeSeconds);
    }
    
    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }
    
    function disableInputs(disabled = true) {
      letterInputs.forEach(input => {
        input.disabled = disabled;
        if (disabled) {
          input.style.opacity = "0.6";
        } else {
          input.style.opacity = "1";
        }
      });
      submitBtn.disabled = disabled;
    }
    
    // Επαναφορά slots σε ? 
    function resetSlotsToHidden() {
      slots.forEach(slot => {
        slot.textContent = "?";
      });
    }
    
    // Αποκάλυψη της σωστής λέξης στα slots (όταν τελειώνει το παιχνίδι)
    function revealSecretWord() {
      for (let i = 0; i < WORD_LENGTH; i++) {
        slots[i].textContent = SECRET_WORD[i];
      }
    }
    
    // Υπολογισμός σκορ με βάση τον χρόνο που απέμεινε
    function calculateScore() {
      if (timeSeconds <= 0) return 0;
      // Μέγιστο σκορ όταν μένει πολύς χρόνος, κλιμακώνεται
      const ratio = timeSeconds / START_TIME;
      let score = Math.floor(ratio * MAX_SCORE);
      return Math.max(0, Math.min(MAX_SCORE, score));
    }
    
    // Εμφάνιση αποτελέσματος (νίκη)
    function showVictory() {
      if (!gameActive) return;
      gameActive = false;
      stopTimer();
      disableInputs(true);
      revealSecretWord();
      
      const finalScore = calculateScore();
      resultPanel.classList.remove("hidden");
      resultEmoji.textContent = "🔓";
      resultText.textContent = "VAULT CRACKED!";
      scoreDisplay.textContent = `${finalScore} / ${MAX_SCORE}`;
      
      messageBox.textContent = "Ο ΚΩΔΙΚΟΣ ΗΤΑΝ: " + SECRET_WORD;
      shareHint.textContent = "Σχολίασε τον κωδικό και μοιράσου το αποτέλεσμα!";
      
      // Αλλαγή χρώματος υποβάθρου μηνύματος
      messageBox.style.color = "#f5d742";
    }
    
    // Ήττα (τέλος χρόνου)
    function gameOverTime() {
      if (!gameActive) return;
      gameActive = false;
      stopTimer();
      disableInputs(true);
      revealSecretWord();
      
      resultPanel.classList.remove("hidden");
      resultEmoji.textContent = "⏰";
      resultText.textContent = "TIME'S UP!";
      scoreDisplay.textContent = `0 / ${MAX_SCORE}`;
      
      messageBox.textContent = "Ο χρόνος τελείωσε! Ο κωδικός ήταν: " + SECRET_WORD;
      messageBox.style.color = "#d98c5f";
      shareHint.textContent = "Προσπάθησε ξανά!";
    }
    
    // Επαναφορά παιχνιδιού
    function resetGame() {
      stopTimer();
      gameActive = true;
      timeSeconds = START_TIME;
      updateTimerDisplay();
      
      // Καθαρισμός πεδίων εισαγωγής
      letterInputs.forEach((input, idx) => {
        input.value = "";
        currentGuess[idx] = "";
      });
      
      disableInputs(false);
      resetSlotsToHidden();
      
      resultPanel.classList.add("hidden");
      messageBox.textContent = "";
      messageBox.style.color = "#e7c468";
      shareHint.textContent = "Μοιράσου το αποτέλεσμα!";
      
      // Εστίαση στο πρώτο input
      letterInputs[0].focus();
      
      // Εκκίνηση timer
      startTimer();
    }
    
    function startTimer() {
      if (timerInterval) stopTimer();
      timerInterval = setInterval(() => {
        if (!gameActive) {
          // Αν το παιχνίδι δεν είναι ενεργό, σταματάμε
          if (timeSeconds <= 0) {
            stopTimer();
          }
          return;
        }
        
        timeSeconds--;
        updateTimerDisplay();
        
        if (timeSeconds <= 0) {
          timeSeconds = 0;
          updateTimerDisplay();
          gameOverTime();
        }
      }, 1000);
    }
    
    // Συλλογή τρέχουσας μαντεψιάς από τα inputs
    function collectGuessFromInputs() {
      const guessArray = [];
      for (let i = 0; i < WORD_LENGTH; i++) {
        let val = letterInputs[i].value.trim().toUpperCase();
        if (val.length > 1) val = val.charAt(0); // μόνο πρώτος χαρακτήρας
        guessArray.push(val);
      }
      return guessArray;
    }
    
    // Έλεγχος μαντεψιάς
    function checkGuess() {
      if (!gameActive) {
        messageBox.textContent = "Το παιχνίδι έχει ολοκληρωθεί. Ξεκίνα νέο.";
        return;
      }
      
      const guess = collectGuessFromInputs();
      
      // Έλεγχος αν όλα τα πεδία έχουν ένα γράμμα
      for (let i = 0; i < WORD_LENGTH; i++) {
        if (guess[i] === "" || guess[i].length !== 1) {
          messageBox.textContent = "Συμπλήρωσε και τα 6 γράμματα!";
          return;
        }
      }
      
      const guessWord = guess.join("");
      
      if (guessWord === SECRET_WORD) {
        // ΣΩΣΤΟ!
        showVictory();
      } else {
        // Λάθος μαντεψιά
        messageBox.textContent = "Λάθος κωδικός. Προσπάθησε ξανά!";
        // Κούνημα εφέ στα inputs (προαιρετικά)
        letterInputs.forEach(input => {
          input.style.transform = "translateX(3px)";
          setTimeout(() => { input.style.transform = ""; }, 80);
        });
        // Καθαρισμός inputs για ευκολία (ή κρατάμε την επιλογή; Συνήθως τα καθαρίζουμε)
        letterInputs.forEach((input, idx) => {
          input.value = "";
          currentGuess[idx] = "";
        });
        letterInputs[0].focus();
      }
    }
    
    // Αυτόματη μετακίνηση μεταξύ πεδίων
    function setupInputNavigation() {
      letterInputs.forEach((input, index) => {
        input.addEventListener("input", function(e) {
          if (!gameActive) {
            input.value = "";
            return;
          }
          let val = input.value;
          // Κρατάμε μόνο τον πρώτο χαρακτήρα, κεφαλαίο
          if (val.length > 1) {
            input.value = val.charAt(0).toUpperCase();
          } else if (val.length === 1) {
            input.value = val.toUpperCase();
          }
          
          // Αν εισήχθη γράμμα, μετακίνηση στο επόμενο πεδίο
          if (input.value.length === 1 && index < WORD_LENGTH - 1) {
            letterInputs[index + 1].focus();
          }
          
          // Ενημέρωση currentGuess
          currentGuess[index] = input.value;
        });
        
        input.addEventListener("keydown", function(e) {
          if (e.key === "Backspace") {
            if (input.value === "" && index > 0) {
              // Μετακίνηση στο προηγούμενο πεδίο
              letterInputs[index - 1].focus();
              e.preventDefault();
            } else if (input.value !== "") {
              // Καθαρισμός τρέχοντος
              input.value = "";
              currentGuess[index] = "";
            }
          } else if (e.key === "ArrowRight" && index < WORD_LENGTH - 1) {
            letterInputs[index + 1].focus();
            e.preventDefault();
          } else if (e.key === "ArrowLeft" && index > 0) {
            letterInputs[index - 1].focus();
            e.preventDefault();
          } else if (e.key === "Enter") {
            e.preventDefault();
            submitBtn.click();
          }
        });
        
        // Φιλτράρισμα μόνο γραμμάτων
        input.addEventListener("beforeinput", function(e) {
          if (e.data && !/^[a-zA-Z]$/.test(e.data)) {
            e.preventDefault();
          }
        });
      });
    }
    
    // Απόδοση hint (στατικό αλλά μπορεί να αλλάξει)
    hintText.textContent = "💡 Hint: Daughter Of Hallownest";
    
    // Συνδέσεις κουμπιών
    submitBtn.addEventListener("click", checkGuess);
    newGameBtn.addEventListener("click", resetGame);
    
    // Αρχικοποίηση
    function initialGame() {
      resetGame(); // θέτει timer, καθαρίζει, ενεργοποιεί
    }
    
    setupInputNavigation();
    initialGame();
    
    // Καθαρισμός διαστήματος κατά την έξοδο (καλή πρακτική)
    window.addEventListener("beforeunload", () => {
      stopTimer();
    });
    
  })();
</script>
</body>
</html>
