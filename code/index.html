<html lang="el">
<head>

    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #131820;
            --border: #2a3040;
            --gold: #e2b04a;
            --gold-light: #f5d78c;
            --text: #bcc5d0;
            --text-bright: #e8edf2;
            --success: #2ea043;
            --danger: #da3633;
            --warning: #d2991d;
            --btn-bg: #1c2129;
            --shadow: 0 6px 24px rgba(0,0,0,0.6);
            --slot-size: clamp(32px, 7vw, 42px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            background: linear-gradient(160deg, #0a0e14 0%, #141b24 40%, #0d1117 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            overflow: hidden;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 600px;
            background: var(--bg-card);
            border: none;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
            border-radius: 0;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .game-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 10%, rgba(226,176,74,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .title-section {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            padding-top: env(safe-area-inset-top, 6px);
            flex-shrink: 0;
        }

        .title {
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f7da8c 0%, #c99530 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 4px rgba(200,150,50,0.5));
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.55rem;
            color: #6e7681;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .hint-box {
            background: rgba(226,176,74,0.06);
            border: 1px solid rgba(226,176,74,0.25);
            color: var(--gold-light);
            padding: 6px 10px;
            border-radius: 10px;
            font-style: italic;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            text-align: center;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            line-height: 1.3;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .level-bar-container {
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1px;
        }

        .level-text {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .level-points {
            font-size: 0.5rem;
            color: var(--text);
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        .level-bar-outer {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.5);
            border-radius: 3px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .level-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #e2b04a 0%, #f5d78c 50%, #e2b04a 100%);
            border-radius: 3px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(226,176,74,0.4);
            width: 0%;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .stat-box {
            flex: 1;
            min-width: 50px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 4px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6e7681;
            margin-bottom: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: clamp(0.7rem, 2.5vw, 0.95rem);
            font-weight: 700;
            color: var(--text-bright);
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        .score-highlight {
            color: var(--gold-light);
            text-shadow: 0 0 8px rgba(226,176,74,0.5);
        }

        .attempts-dots {
            display: flex;
            gap: 3px;
            justify-content: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .attempt-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 3px rgba(46,160,67,0.6);
            transition: all 0.3s ease;
        }

        .attempt-dot.lost {
            background: var(--danger);
            box-shadow: 0 0 5px rgba(218,54,51,0.7);
            animation: pulseDot 0.35s ease;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        /* ========== ΠΛΑΙΣΙΟ ΛΕΞΕΩΝ - RESPONSIVE ========== */
        .word-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(0,0,0,0.55);
            padding: 10px 8px;
            border-radius: 14px;
            border: 2px solid var(--border);
            width: 100%;
            min-height: 180px;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .word-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            width: 100%;
            flex-wrap: nowrap;
        }

        .word-slot {
            background: linear-gradient(180deg, #1a1f28 0%, #0d1117 100%);
            border: 2px solid #30363d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--gold-light);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            text-shadow: 0 0 8px rgba(226,176,74,0.5);
            transition: all 0.3s ease;
            font-family: 'SF Mono', 'Courier New', monospace;
            position: relative;
            overflow: hidden;
            width: var(--slot-size);
            height: calc(var(--slot-size) * 1.25);
            min-width: var(--slot-size);
            font-size: clamp(0.8rem, 3.5vw, 1.1rem);
            flex-shrink: 0;
        }

        .word-slot.spinning .slot-inner {
            animation: spinSlot 0.6s ease-in-out;
        }

        @keyframes spinSlot {
            0% { transform: rotateX(0deg); opacity: 1; }
            25% { transform: rotateX(90deg); opacity: 0.3; }
            50% { transform: rotateX(180deg); opacity: 0.1; }
            75% { transform: rotateX(270deg); opacity: 0.3; }
            100% { transform: rotateX(360deg); opacity: 1; }
        }

        .word-slot.revealed {
            border-color: var(--gold);
            box-shadow: 0 0 14px rgba(226,176,74,0.7), inset 0 2px 4px rgba(0,0,0,0.5);
            animation: revealPop 0.4s ease;
        }

        @keyframes revealPop {
            0% { transform: scale(0.6); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .word-slot.wrong-flash {
            animation: wrongShake 0.5s ease;
            border-color: var(--danger) !important;
            box-shadow: 0 0 14px rgba(218,54,51,0.7), inset 0 2px 4px rgba(0,0,0,0.5) !important;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        .word-slot.space {
            background: transparent;
            border: none;
            box-shadow: none;
            width: 8px;
            min-width: 8px;
            height: auto;
        }

        .slot-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            background: rgba(0,0,0,0.35);
            padding: 6px 4px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .letter-btn {
            width: clamp(30px, 8vw, 44px);
            height: clamp(30px, 8vw, 44px);
            background: linear-gradient(180deg, #2a3340 0%, #1a202a 100%);
            border: 2px solid #4a5568;
            border-radius: 8px;
            font-size: clamp(0.75rem, 2.8vw, 1.05rem);
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #0a0d12, 0 3px 6px rgba(0,0,0,0.5);
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        .letter-btn:active,
        .letter-btn.pressed {
            top: 2px !important;
            box-shadow: 0 1px 0 #0a0d12, 0 2px 4px rgba(0,0,0,0.4) !important;
            background: linear-gradient(180deg, #3d4858 0%, #2a3340 100%) !important;
            border-color: #6a7a90 !important;
            transform: scale(0.95);
        }

        .letter-btn.used-correct {
            background: linear-gradient(180deg, #142a14 0%, #0a1a0a 100%) !important;
            border-color: #2ea043 !important;
            color: #3fb950 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 2px 0 #0a0d12;
            top: 2px;
        }

        .letter-btn.used-wrong {
            background: linear-gradient(180deg, #2a1414 0%, #1a0a0a 100%) !important;
            border-color: #da3633 !important;
            color: #f85149 !important;
            opacity: 0.7;
            pointer-events: none;
            box-shadow: 0 2px 0 #0a0d12;
            top: 2px;
            text-decoration: line-through;
        }

        .guess-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .guess-input {
            width: 100%;
            padding: 9px 10px;
            background: var(--btn-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-bright);
            font-size: clamp(0.75rem, 2.5vw, 0.95rem);
            text-align: center;
            font-family: 'SF Mono', 'Courier New', monospace;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .guess-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(226,176,74,0.25), inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .guess-input::placeholder {
            color: #484f58;
            letter-spacing: 1px;
            font-size: 0.55rem;
        }

        .btn-row {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 11px 7px;
            border-radius: 8px;
            font-weight: 800;
            font-size: clamp(0.65rem, 2vw, 0.8rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid;
            position: relative;
            top: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            text-align: center;
            -webkit-touch-callout: none;
        }

        .btn-submit {
            background: linear-gradient(180deg, #e2b04a 0%, #b8882a 100%);
            border-color: #d4a035;
            color: #0d1117;
            box-shadow: 0 3px 0 #6b4f1a, 0 3px 10px rgba(0,0,0,0.6);
        }

        .btn-submit:active {
            top: 2px;
            box-shadow: 0 1px 0 #6b4f1a, 0 2px 6px rgba(0,0,0,0.6);
        }

        .btn-submit:disabled {
            opacity: 0.35;
            pointer-events: none;
            top: 0;
        }

        .btn-new {
            background: var(--btn-bg);
            border-color: var(--border);
            color: var(--text-bright);
            box-shadow: 0 3px 0 #0d1117, 0 3px 10px rgba(0,0,0,0.6);
        }

        .btn-new:active {
            top: 2px;
            box-shadow: 0 1px 0 #0d1117, 0 2px 6px rgba(0,0,0,0.6);
            background: #2a323d;
        }

        .message {
            font-weight: 600;
            font-size: clamp(0.55rem, 1.8vw, 0.7rem);
            min-height: 12px;
            color: var(--warning);
            text-align: center;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            width: 100%;
            flex-shrink: 0;
        }

        .result-panel {
            background: rgba(226,176,74,0.08);
            border: 2px solid var(--gold);
            padding: 5px 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideUp 0.4s ease;
            position: relative;
            z-index: 1;
            width: 100%;
            flex-shrink: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-emoji { font-size: 1.1rem; }
        .result-text {
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--gold-light);
        }

        .hidden { display: none !important; }

        .footer {
            display: flex;
            gap: 6px;
            font-size: 0.4rem;
            color: #484f58;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        hr {
            border-color: var(--border);
            width: 80%;
            margin: 0;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            width: 9px;
            height: 9px;
            top: -20px;
            animation: confettiFall 2.5s ease-in forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .score-pop {
            position: absolute;
            color: var(--gold-light);
            font-weight: 800;
            font-size: 0.7rem;
            pointer-events: none;
            animation: scoreFloat 1.2s ease-out forwards;
            z-index: 10;
            text-shadow: 0 0 10px rgba(226,176,74,0.8);
        }

        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
        }

        /* Tablet & Desktop */
        @media (min-width: 600px) {
            .game-container {
                border-radius: 22px;
                border: 2px solid var(--border);
                max-width: 550px;
                height: auto;
                min-height: 100vh;
                min-height: 100dvh;
                margin: 0 auto;
                padding: 12px 16px;
            }
            :root {
                --slot-size: 44px;
            }
        }

        @media (min-width: 768px) {
            .game-container {
                max-width: 600px;
                padding: 14px 20px;
            }
            :root {
                --slot-size: 46px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="title-section">
            <div class="title">🔐 CRACK THE CODE</div>
            <div class="subtitle">ΑΠΟΚΡΥΠΤΟΓΡΑΦΗΣΕ ΤΗ ΛΕΞΗ</div>
        </div>

        <div class="level-bar-container">
            <div class="level-info">
                <span class="level-text" id="levelText">🏅 LEVEL 1</span>
                <span class="level-points" id="levelPoints">0 / 500 XP</span>
            </div>
            <div class="level-bar-outer">
                <div class="level-bar-inner" id="levelBar"></div>
            </div>
        </div>

        <div class="hint-box" id="hintText">💡 Φόρτωση...</div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">⏳ ΧΡΟΝΟΣ</div>
                <div class="stat-value" id="timerDisplay">3:00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">⭐ ΣΚΟΡ</div>
                <div class="stat-value score-highlight" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🏆 ΡΕΚΟΡ</div>
                <div class="stat-value score-highlight" id="highScoreDisplay">0</div>
            </div>
        </div>

        <div class="attempts-dots" id="attemptsDots"></div>

        <div class="word-display" id="wordDisplay"></div>

        <div class="alphabet-container" id="alphabetContainer"></div>

        <div class="guess-section">
            <input type="text" class="guess-input" id="guessInput" 
                   placeholder="Γράψε ολόκληρη τη λέξη..." 
                   autocomplete="off" inputmode="text" enterkeyhint="done">
            <div class="btn-row">
                <button class="btn btn-submit" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
                <button class="btn btn-new" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
            </div>
        </div>

        <div class="message" id="messageBox"></div>

        <div id="resultPanel" class="result-panel hidden">
            <span class="result-emoji" id="resultEmoji">🏆</span>
            <span class="result-text" id="resultText"></span>
        </div>

        <hr>
        <div class="footer">
            <span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span>
            <span>🔔 SUBSCRIBE</span>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <!-- Φόρτωση Λέξεων -->
    <script src="words.js"></script>

    <script>
        (function() {
            if (typeof SECRET_WORDS === 'undefined') {
                alert('Σφάλμα: Το αρχείο words.js δεν φορτώθηκε σωστά!');
                return;
            }

            const ALPHABET = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ".split("");
            const START_TIME = 180;
            const MAX_ATTEMPTS = 8;
            const POINTS_PER_LETTER = 10;
            const POINTS_FULL_WORD = 100;
            const POINTS_PENALTY_LOSS = 100;
            const STORAGE_KEY_HIGHSCORE = 'crackTheCode_highScore';
            const STORAGE_KEY_LEVEL = 'crackTheCode_level';
            const STORAGE_KEY_XP = 'crackTheCode_xp';
            const STORAGE_KEY_SCORE = 'crackTheCode_score';
            const XP_PER_LEVEL = 500;

            let currentWord = "";
            let currentHint = "";
            let gameActive = false;
            let timeSeconds = START_TIME;
            let timerInterval = null;
            let usedLetters = [];
            let wrongAttempts = 0;
            let revealedLetters = [];
            let usedWordIndices = [];
            let isSpinning = false;
            let currentScore = 0;
            let highScore = 0;
            let currentLevel = 1;
            let currentXP = 0;
            let correctLettersInCurrentWord = 0;

            const gameContainer = document.getElementById("gameContainer");
            const timerDisplay = document.getElementById("timerDisplay");
            const hintText = document.getElementById("hintText");
            const wordDisplay = document.getElementById("wordDisplay");
            const alphabetContainer = document.getElementById("alphabetContainer");
            const attemptsDots = document.getElementById("attemptsDots");
            const guessInput = document.getElementById("guessInput");
            const submitBtn = document.getElementById("submitGuess");
            const newGameBtn = document.getElementById("newGameBtn");
            const messageBox = document.getElementById("messageBox");
            const resultPanel = document.getElementById("resultPanel");
            const resultEmoji = document.getElementById("resultEmoji");
            const resultText = document.getElementById("resultText");
            const scoreDisplay = document.getElementById("scoreDisplay");
            const highScoreDisplay = document.getElementById("highScoreDisplay");
            const confettiContainer = document.getElementById("confettiContainer");
            const levelText = document.getElementById("levelText");
            const levelPoints = document.getElementById("levelPoints");
            const levelBar = document.getElementById("levelBar");

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            let audioCtx;

            function initAudio() {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            function playCorrectLetterSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.3);
                } catch(e) {}
            }

            function playWrongLetterSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.3);
                } catch(e) {}
            }

            function playWordCorrectSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + i * 0.15);
                        gain.gain.setValueAtTime(0.3, now + i * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.4);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.4);
                    });
                } catch(e) {}
            }

            function playWordWrongSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.setValueAtTime(100, now + 0.2);
                    osc.frequency.setValueAtTime(80, now + 0.4);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now); osc.stop(now + 0.5);
                } catch(e) {}
            }

            function playWinFanfare() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + i * 0.12);
                        gain.gain.setValueAtTime(0.25, now + i * 0.12);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.35);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.35);
                    });
                } catch(e) {}
            }

            function playSpinSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    for (let i = 0; i < 6; i++) {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(200 + Math.random() * 400, now + i * 0.04);
                        gain.gain.setValueAtTime(0.06, now + i * 0.04);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.04 + 0.06);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.04); osc.stop(now + i * 0.04 + 0.06);
                    }
                } catch(e) {}
            }

            function playLevelUpSound() {
                if (!audioCtx) return;
                try {
                    const now = audioCtx.currentTime;
                    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, now + i * 0.1);
                        gain.gain.setValueAtTime(0.3, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3);
                    });
                } catch(e) {}
            }

            function loadSavedData() {
                try {
                    highScore = parseInt(localStorage.getItem(STORAGE_KEY_HIGHSCORE), 10) || 0;
                    currentLevel = parseInt(localStorage.getItem(STORAGE_KEY_LEVEL), 10) || 1;
                    currentXP = parseInt(localStorage.getItem(STORAGE_KEY_XP), 10) || 0;
                    currentScore = parseInt(localStorage.getItem(STORAGE_KEY_SCORE), 10) || 0;
                } catch(e) {
                    highScore = 0;
                    currentLevel = 1;
                    currentXP = 0;
                    currentScore = 0;
                }
                highScoreDisplay.textContent = highScore;
                updateScoreDisplay();
                updateLevelDisplay();
            }

            function saveAllData() {
                try {
                    localStorage.setItem(STORAGE_KEY_HIGHSCORE, highScore);
                    localStorage.setItem(STORAGE_KEY_LEVEL, currentLevel);
                    localStorage.setItem(STORAGE_KEY_XP, currentXP);
                    localStorage.setItem(STORAGE_KEY_SCORE, currentScore);
                } catch(e) {}
            }

            function updateScoreDisplay() {
                scoreDisplay.textContent = currentScore;
                if (currentScore > highScore) {
                    highScore = currentScore;
                    highScoreDisplay.textContent = highScore;
                }
            }

            function updateLevelDisplay() {
                levelText.textContent = '🏅 LEVEL ' + currentLevel;
                const xpNeeded = XP_PER_LEVEL;
                const progress = Math.min((currentXP / xpNeeded) * 100, 100);
                levelBar.style.width = progress + '%';
                levelPoints.textContent = currentXP + ' / ' + xpNeeded + ' XP';
            }

            function addXP(amount) {
                currentXP += amount;
                let leveledUp = false;
                while (currentXP >= XP_PER_LEVEL) {
                    currentXP -= XP_PER_LEVEL;
                    currentLevel++;
                    leveledUp = true;
                }
                updateLevelDisplay();
                if (leveledUp) {
                    playLevelUpSound();
                    const rect = gameContainer.getBoundingClientRect();
                    showScorePop('⬆ LEVEL ' + currentLevel + '!', rect.width/2, rect.height/3);
                    messageBox.textContent = '🎉 ΑΝΕΒΗΚΕΣ LEVEL ' + currentLevel + '!';
                    messageBox.style.color = 'var(--gold-light)';
                }
                saveAllData();
            }

            function showScorePop(text, x, y) {
                const pop = document.createElement('span');
                pop.className = 'score-pop';
                pop.textContent = text;
                pop.style.left = x + 'px';
                pop.style.top = y + 'px';
                gameContainer.appendChild(pop);
                setTimeout(() => pop.remove(), 1200);
            }

            function spawnConfetti() {
                const colors = ['#f5d78c','#e2b04a','#3fb950','#58a6ff','#f85149','#d2991d','#bc8cff','#ff7b72'];
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < 50; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.animationDelay = Math.random() * 1.2 + 's';
                    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    piece.style.width = (Math.random() * 8 + 4) + 'px';
                    piece.style.height = (Math.random() * 8 + 4) + 'px';
                    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    fragment.appendChild(piece);
                }
                confettiContainer.appendChild(fragment);
                setTimeout(() => { confettiContainer.innerHTML = ''; }, 3500);
            }

            function getRandomWord() {
                if (usedWordIndices.length >= SECRET_WORDS.length) usedWordIndices = [];
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * SECRET_WORDS.length);
                } while (usedWordIndices.includes(randomIndex));
                usedWordIndices.push(randomIndex);
                return SECRET_WORDS[randomIndex];
            }

            function normalizeGreek(text) {
                return text.toUpperCase()
                    .replace(/Ά/g,"Α").replace(/Έ/g,"Ε").replace(/Ή/g,"Η")
                    .replace(/Ί/g,"Ι").replace(/Ό/g,"Ο").replace(/Ύ/g,"Υ")
                    .replace(/Ώ/g,"Ω").replace(/Ϊ/g,"Ι").replace(/Ϋ/g,"Υ")
                    .replace(/\s+/g,"");
            }

            function formatTime(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function stopTimer() {
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            }

            function createAttemptDots() {
                attemptsDots.innerHTML = "";
                for (let i = 0; i < MAX_ATTEMPTS; i++) {
                    const dot = document.createElement("span");
                    dot.className = "attempt-dot";
                    if (i < wrongAttempts) dot.classList.add("lost");
                    attemptsDots.appendChild(dot);
                }
            }

            function updateAttemptDots() {
                const dots = attemptsDots.querySelectorAll(".attempt-dot");
                dots.forEach((dot, index) => {
                    if (index < wrongAttempts) dot.classList.add("lost");
                    else dot.classList.remove("lost");
                });
            }

            function spinAllSlots(callback) {
                if (isSpinning) return;
                isSpinning = true;
                playSpinSound();
                const allSlots = wordDisplay.querySelectorAll(".word-slot:not(.space)");
                const allLetters = ALPHABET.join("");
                allSlots.forEach((slot) => {
                    const inner = slot.querySelector(".slot-inner");
                    if (!inner) return;
                    slot.classList.add("spinning");
                    let spinCount = 0;
                    const maxSpins = 8;
                    const spinInterval = setInterval(() => {
                        inner.textContent = allLetters[Math.floor(Math.random() * allLetters.length)];
                        spinCount++;
                        if (spinCount >= maxSpins) {
                            clearInterval(spinInterval);
                            slot.classList.remove("spinning");
                        }
                    }, 50);
                    slot._spinInterval = spinInterval;
                });
                setTimeout(() => {
                    isSpinning = false;
                    updateWordDisplay();
                    if (callback) callback();
                }, 500);
            }

            function createAlphabetButtons() {
                alphabetContainer.innerHTML = "";
                ALPHABET.forEach(letter => {
                    const btn = document.createElement("button");
                    btn.className = "letter-btn";
                    btn.textContent = letter;
                    btn.setAttribute("type", "button");
                    
                    btn.addEventListener("touchstart", function(e) {
                        e.preventDefault(); e.stopPropagation();
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    }, { passive: false });
                    
                    btn.addEventListener("touchend", function(e) { 
                        e.preventDefault(); 
                        btn.classList.remove("pressed"); 
                    });
                    
                    btn.addEventListener("touchcancel", function(e) { 
                        btn.classList.remove("pressed"); 
                    });
                    
                    btn.addEventListener("mousedown", function(e) {
                        e.preventDefault();
                        btn.classList.add("pressed");
                        initAudio();
                        handleLetterClick(letter, btn);
                    });
                    
                    btn.addEventListener("mouseup", function(e) { 
                        btn.classList.remove("pressed"); 
                    });
                    
                    btn.addEventListener("mouseleave", function(e) { 
                        btn.classList.remove("pressed"); 
                    });
                    
                    btn.addEventListener("click", function(e) { 
                        e.preventDefault(); e.stopPropagation(); 
                    });
                    
                    alphabetContainer.appendChild(btn);
                });
            }

            function updateAlphabetButtons() {
                const buttons = alphabetContainer.querySelectorAll(".letter-btn");
                const normalizedWord = normalizeGreek(currentWord);
                buttons.forEach(btn => {
                    const letter = btn.textContent;
                    btn.classList.remove("used-correct", "used-wrong", "pressed");
                    if (usedLetters.includes(letter)) {
                        btn.classList.add(normalizedWord.includes(letter) ? "used-correct" : "used-wrong");
                    }
                });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive || usedLetters.includes(letter) || isSpinning) return;
                
                usedLetters.push(letter);
                const normalizedWord = normalizeGreek(currentWord);
                const positions = [];
                for (let i = 0; i < normalizedWord.length; i++) {
                    if (normalizedWord[i] === letter) positions.push(i);
                }
                
                spinAllSlots(() => {
                    if (positions.length > 0) {
                        playCorrectLetterSound();
                        const pointsEarned = positions.length * POINTS_PER_LETTER;
                        currentScore += pointsEarned;
                        addXP(pointsEarned);
                        correctLettersInCurrentWord += positions.length;
                        positions.forEach(pos => { revealedLetters[pos] = letter; });
                        updateWordDisplay(true, positions);
                        updateAlphabetButtons();
                        updateScoreDisplay();
                        saveAllData();
                        
                        const rect = btn.getBoundingClientRect();
                        const containerRect = gameContainer.getBoundingClientRect();
                        showScorePop('+' + pointsEarned, rect.left - containerRect.left + rect.width/2, rect.top - containerRect.top);
                        
                        messageBox.textContent = `✅ Το "${letter}" βρέθηκε! +${pointsEarned}`;
                        messageBox.style.color = "var(--success)";
                        
                        const allRevealed = revealedLetters.map(l => l || '').join('');
                        if (allRevealed === normalizedWord) {
                            setTimeout(() => {
                                currentScore += POINTS_FULL_WORD;
                                addXP(POINTS_FULL_WORD);
                                updateScoreDisplay();
                                saveAllData();
                                showScorePop('+100 ΛΕΞΗ!', wordDisplay.getBoundingClientRect().left - containerRect.left + wordDisplay.clientWidth/2, wordDisplay.getBoundingClientRect().top - containerRect.top);
                                playWordCorrectSound();
                                setTimeout(() => playWinFanfare(), 600);
                                spawnConfetti();
                                endGame(true);
                            }, 400);
                        }
                    } else {
                        playWrongLetterSound();
                        wrongAttempts++;
                        updateAttemptDots();
                        updateAlphabetButtons();
                        flashAllSlots();
                        messageBox.textContent = `❌ Το "${letter}" δεν υπάρχει! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                        messageBox.style.color = "var(--danger)";
                        
                        if (wrongAttempts >= MAX_ATTEMPTS) {
                            setTimeout(() => endGame(false, "attempts"), 400);
                        }
                    }
                });
            }

            function flashAllSlots() {
                const allSlots = wordDisplay.querySelectorAll(".word-slot:not(.space)");
                allSlots.forEach(slot => {
                    slot.classList.add("wrong-flash");
                    setTimeout(() => slot.classList.remove("wrong-flash"), 500);
                });
            }

            function updateWordDisplay(animate = false, highlightPositions = []) {
                wordDisplay.innerHTML = "";
                const displayWord = currentWord.toUpperCase();
                
                // Υπολογίζουμε πόσα γράμματα χωράνε ανά σειρά με βάση το πλάτος
                const containerWidth = wordDisplay.clientWidth - 16;
                const slotWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--slot-size'));
                const gapSize = 4;
                const maxPerRow = Math.floor((containerWidth + gapSize) / (slotWidth + gapSize));
                
                // Χωρίζουμε σε λέξεις
                const words = displayWord.split(" ");
                
                // Δημιουργούμε όλα τα slots
                const allSlots = [];
                let letterIndex = 0;
                
                for (let w = 0; w < words.length; w++) {
                    if (w > 0) allSlots.push({ type: "space" });
                    const word = words[w];
                    for (let i = 0; i < word.length; i++) {
                        allSlots.push({
                            type: "letter",
                            index: letterIndex,
                            char: revealedLetters[letterIndex] || "_"
                        });
                        letterIndex++;
                    }
                }
                
                // Μοιράζουμε σε σειρές
                const rows = [];
                let currentRow = [];
                let currentCount = 0;
                
                for (let i = 0; i < allSlots.length; i++) {
                    const slot = allSlots[i];
                    
                    if (slot.type === "space") {
                        // Ελέγχουμε αν πρέπει να αλλάξουμε σειρά
                        const remainingLetters = countRemainingLetters(allSlots, i + 1);
                        if (currentCount > 0 && currentCount + remainingLetters > maxPerRow && remainingLetters <= maxPerRow) {
                            rows.push(currentRow);
                            currentRow = [];
                            currentCount = 0;
                            continue;
                        }
                        currentRow.push(slot);
                    } else {
                        if (currentCount >= maxPerRow) {
                            rows.push(currentRow);
                            currentRow = [];
                            currentCount = 0;
                            // Αφαιρούμε τυχόν space στην αρχή νέας σειράς
                        }
                        currentRow.push(slot);
                        currentCount++;
                    }
                }
                if (currentRow.length > 0) {
                    // Αφαιρούμε trailing/leading spaces
                    while (currentRow.length > 0 && currentRow[0].type === "space") currentRow.shift();
                    while (currentRow.length > 0 && currentRow[currentRow.length - 1].type === "space") currentRow.pop();
                    if (currentRow.length > 0) rows.push(currentRow);
                }
                
                // Περιορίζουμε σε 4 σειρές
                while (rows.length > 4) {
                    const lastRow = rows.pop();
                    rows[rows.length - 1].push({ type: "space" });
                    rows[rows.length - 1].push(...lastRow);
                }
                
                // Δημιουργούμε τα row divs
                rows.forEach((rowSlots) => {
                    // Αφαιρούμε trailing/leading spaces
                    while (rowSlots.length > 0 && rowSlots[0].type === "space") rowSlots.shift();
                    while (rowSlots.length > 0 && rowSlots[rowSlots.length - 1].type === "space") rowSlots.pop();
                    
                    if (rowSlots.length === 0) return;
                    
                    const rowDiv = document.createElement("div");
                    rowDiv.className = "word-row";
                    
                    rowSlots.forEach((slot) => {
                        if (slot.type === "space") {
                            const spaceEl = document.createElement("span");
                            spaceEl.className = "word-slot space";
                            rowDiv.appendChild(spaceEl);
                        } else {
                            const slotEl = document.createElement("span");
                            slotEl.className = "word-slot";
                            
                            const inner = document.createElement("span");
                            inner.className = "slot-inner";
                            inner.textContent = slot.char;
                            slotEl.appendChild(inner);
                            
                            if (animate && highlightPositions.includes(slot.index)) {
                                slotEl.classList.add("revealed");
                                setTimeout(() => slotEl.classList.remove("revealed"), 400);
                            }
                            
                            rowDiv.appendChild(slotEl);
                        }
                    });
                    
                    wordDisplay.appendChild(rowDiv);
                });
            }
            
            function countRemainingLetters(slots, startIndex) {
                let count = 0;
                for (let i = startIndex; i < slots.length; i++) {
                    if (slots[i].type === "letter") count++;
                    else if (count > 0) break;
                }
                return count;
            }

            function checkFullGuess() {
                if (!gameActive || isSpinning) return;
                
                initAudio();
                const guess = normalizeGreek(guessInput.value.trim());
                const normalizedWord = normalizeGreek(currentWord);
                
                if (guess === "") {
                    messageBox.textContent = "Γράψε μια λέξη!";
                    messageBox.style.color = "var(--warning)";
                    return;
                }
                
                spinAllSlots(() => {
                    if (guess === normalizedWord) {
                        const remainingLetters = normalizedWord.length - correctLettersInCurrentWord;
                        const letterPoints = remainingLetters * POINTS_PER_LETTER;
                        const totalPoints = letterPoints + POINTS_FULL_WORD;
                        currentScore += totalPoints;
                        addXP(totalPoints);
                        updateScoreDisplay();
                        saveAllData();
                        
                        for (let i = 0; i < normalizedWord.length; i++) {
                            if (!revealedLetters[i]) {
                                revealedLetters[i] = normalizedWord[i];
                                if (!usedLetters.includes(normalizedWord[i])) usedLetters.push(normalizedWord[i]);
                            }
                        }
                        updateWordDisplay(true);
                        updateAlphabetButtons();
                        
                        const containerRect = gameContainer.getBoundingClientRect();
                        showScorePop('+' + totalPoints, wordDisplay.getBoundingClientRect().left - containerRect.left + wordDisplay.clientWidth/2, wordDisplay.getBoundingClientRect().top - containerRect.top);
                        
                        playWordCorrectSound();
                        setTimeout(() => playWinFanfare(), 600);
                        spawnConfetti();
                        endGame(true);
                    } else {
                        playWordWrongSound();
                        wrongAttempts++;
                        updateAttemptDots();
                        flashAllSlots();
                        messageBox.textContent = `Λάθος λέξη! (${wrongAttempts}/${MAX_ATTEMPTS})`;
                        messageBox.style.color = "var(--danger)";
                        guessInput.value = "";
                        guessInput.focus();
                        
                        if (wrongAttempts >= MAX_ATTEMPTS) {
                            setTimeout(() => endGame(false, "attempts"), 400);
                        }
                    }
                });
            }

            function endGame(won, reason = "time") {
                if (!gameActive) return;
                gameActive = false;
                stopTimer();
                
                if (!won) {
                    currentScore = Math.max(0, currentScore - POINTS_PENALTY_LOSS);
                    updateScoreDisplay();
                    saveAllData();
                    showScorePop('-100', wordDisplay.getBoundingClientRect().left, wordDisplay.getBoundingClientRect().top);
                }

                const normalizedWord = normalizeGreek(currentWord);
                for (let i = 0; i < normalizedWord.length; i++) {
                    revealedLetters[i] = normalizedWord[i];
                }
                updateWordDisplay();
                updateAlphabetButtons();
                guessInput.disabled = true;
                submitBtn.disabled = true;
                resultPanel.classList.remove("hidden");
                
                saveAllData();
                
                if (won) {
                    resultEmoji.textContent = "🎉";
                    resultText.textContent = "ΤΟ ΒΡΗΚΕΣ!";
                    messageBox.textContent = "Συγχαρητήρια! Πάτα ΝΕΟ ΠΑΙΧΝΙΔΙ";
                    messageBox.style.color = "var(--success)";
                } else {
                    resultEmoji.textContent = reason === "attempts" ? "💔" : "⏰";
                    resultText.textContent = reason === "attempts" ? "ΤΕΛΟΣ ΠΡΟΣΠΑΘΕΙΩΝ" : "ΤΕΛΟΣ ΧΡΟΝΟΥ";
                    messageBox.textContent = `Λέξη: ${currentWord} (-100 πόντοι)`;
                    messageBox.style.color = "var(--danger)";
                }
            }

            function resetGame() {
                stopTimer();
                
                const randomWordObj = getRandomWord();
                currentWord = randomWordObj.word;
                currentHint = randomWordObj.hint;
                gameActive = true;
                timeSeconds = START_TIME;
                wrongAttempts = 0;
                usedLetters = [];
                isSpinning = false;
                correctLettersInCurrentWord = 0;
                const normalizedWord = normalizeGreek(currentWord);
                revealedLetters = new Array(normalizedWord.length).fill("");
                
                timerDisplay.textContent = formatTime(timeSeconds);
                timerDisplay.style.color = "var(--text-bright)";
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                updateAlphabetButtons();
                createAttemptDots();
                guessInput.value = "";
                guessInput.disabled = false;
                submitBtn.disabled = false;
                resultPanel.classList.add("hidden");
                messageBox.textContent = "";
                messageBox.style.color = "var(--text)";
                confettiContainer.innerHTML = "";
                
                timerInterval = setInterval(() => {
                    if (!gameActive) return;
                    timeSeconds--;
                    timerDisplay.textContent = formatTime(timeSeconds);
                    timerDisplay.style.color = timeSeconds <= 30 ? "var(--danger)" : "var(--text-bright)";
                    if (timeSeconds <= 0) {
                        timeSeconds = 0;
                        timerDisplay.textContent = formatTime(0);
                        endGame(false, "time");
                    }
                }, 1000);
                
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;
                guessInput.blur();
                setTimeout(() => guessInput.focus(), 100);
            }

            // ========== EVENT LISTENERS ==========
            submitBtn.addEventListener("touchstart", function(e) { 
                e.preventDefault(); 
                initAudio();
                checkFullGuess(); 
            });
            submitBtn.addEventListener("mousedown", function(e) { 
                e.preventDefault(); 
                initAudio();
                checkFullGuess(); 
            });
            submitBtn.addEventListener("click", function(e) { e.preventDefault(); });

            newGameBtn.addEventListener("touchstart", function(e) {
                e.preventDefault();
                initAudio();
                window.scrollTo(0, 0);
                guessInput.blur();
                resetGame();
            });
            newGameBtn.addEventListener("mousedown", function(e) {
                e.preventDefault();
                initAudio();
                window.scrollTo(0, 0);
                guessInput.blur();
                resetGame();
            });
            newGameBtn.addEventListener("click", function(e) { e.preventDefault(); });

            guessInput.addEventListener("keydown", function(e) {
                if (e.key === "Enter") { 
                    e.preventDefault(); 
                    initAudio();
                    checkFullGuess(); 
                }
            });

            guessInput.addEventListener("input", function(e) {
                e.target.value = e.target.value.toUpperCase().replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, "");
            });

            guessInput.addEventListener("focus", function(e) {
                window.scrollTo(0, 0);
            });

            // ========== ΑΡΧΙΚΟΠΟΙΗΣΗ ==========
            loadSavedData();
            createAttemptDots();
            createAlphabetButtons();
            resetGame();

            window.addEventListener('resize', () => { 
                updateWordDisplay(); 
                window.scrollTo(0, 0);
            });
            
            document.addEventListener('touchmove', function(e) {
                if (e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                }
            }, { passive: false });
        })();
    </script>
</body>
</html>
