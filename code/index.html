<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CRACK THE CODE | Μάντεψε την Κρυφή Λέξη</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 10%, #1a2a1a, #0a0f0a);
            font-family: 'Courier New', 'Fira Code', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #c0d4c0;
        }

        .game-container {
            max-width: 550px;
            width: 100%;
            background: rgba(15, 25, 15, 0.95);
            backdrop-filter: blur(12px);
            border: 2px solid #4a6b4a;
            box-shadow: 0 0 30px rgba(80, 140, 80, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.8);
            border-radius: 16px;
            padding: 25px 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #a8d4a8;
            text-shadow: 0 0 10px #4a8a4a;
            background: #0a1a0a;
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid #5a8a5a;
            text-align: center;
        }

        .hint-box {
            background: #0f1f0f;
            border: 1px dashed #6aaa6a;
            color: #c0e0c0;
            padding: 12px 20px;
            border-radius: 12px;
            font-style: italic;
            font-size: 1.2rem;
            text-align: center;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .timer-section {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0f1f0f;
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid #5a8a5a;
            color: #b0e0b0;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: inset 0 0 8px black;
        }

        .alphabet-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            background: #0a1a0a;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #4a6a4a;
            width: 100%;
            max-width: 500px;
        }

        .letter-btn {
            width: 36px;
            height: 36px;
            background: linear-gradient(180deg, #2a4a2a 0%, #1a2a1a 100%);
            border: 2px solid #5a8a5a;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            color: #c0e0c0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #0a1a0a;
            font-family: 'Courier New', monospace;
        }

        .letter-btn:hover {
            background: #3a6a3a;
            border-color: #8ac08a;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #0a1a0a, 0 0 10px #4a8a4a;
        }

        .letter-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a1a0a;
        }

        .letter-btn.used {
            background: #1a2a1a;
            border-color: #3a5a3a;
            color: #5a7a5a;
            opacity: 0.4;
            pointer-events: none;
            text-decoration: line-through;
        }

        .word-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: #0a0f0a;
            padding: 15px 20px;
            border-radius: 20px;
            border: 2px solid #5a8a5a;
            width: 100%;
            min-height: 60px;
        }

        .word-slot {
            width: 40px;
            height: 50px;
            background: #1a2a1a;
            border: 2px solid #4a7a4a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #b0e0b0;
            box-shadow: inset 0 0 10px #000000;
            text-shadow: 0 0 8px #4a8a4a;
        }

        .word-slot.space {
            width: 20px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .guess-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .guess-input {
            width: 100%;
            padding: 10px;
            background: #1a2a1a;
            border: 2px solid #5a8a5a;
            border-radius: 10px;
            color: #c0e0c0;
            font-size: 1.2rem;
            text-align: center;
            font-family: 'Courier New', monospace;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .guess-input:focus {
            border-color: #8ac08a;
            box-shadow: 0 0 15px #4a8a4a;
        }

        .btn {
            background: linear-gradient(180deg, #2a4a2a 0%, #1a2a1a 100%);
            border: 2px solid #5a8a5a;
            color: #b0e0b0;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 0 #0a1a0a, 0 8px 18px black;
            transition: all 0.1s ease;
            font-family: 'Courier New', monospace;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0a1a0a, 0 5px 12px black;
            background: #3a5a3a;
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            transform: none;
        }

        .message {
            font-weight: bold;
            font-size: 1.1rem;
            min-height: 28px;
            color: #a8d4a8;
            text-shadow: 0 0 6px black;
            text-align: center;
        }

        .result-badge {
            background: #0a1a0a;
            border: 1px solid #5a8a5a;
            padding: 8px 20px;
            border-radius: 30px;
            color: #b0e0b0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hidden {
            display: none !important;
        }

        .used-letters-display {
            font-size: 0.9rem;
            color: #8ab08a;
            min-height: 20px;
            letter-spacing: 2px;
        }

        hr {
            border-color: #4a6a4a;
            width: 80%;
            margin: 5px 0;
        }

        @media (max-width: 450px) {
            .letter-btn {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            .word-slot {
                width: 34px;
                height: 42px;
                font-size: 1.6rem;
            }
            .title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">🔐 CRACK THE CODE</div>

        <div class="timer-section">
            <span>⏳</span>
            <span id="timerDisplay">3:00</span>
        </div>

        <div class="hint-box" id="hintText">
            💡 Βρες την κρυφή λέξη χρησιμοποιώντας τα γράμματα!
        </div>

        <!-- Εμφάνιση κρυφής λέξης με κενά -->
        <div class="word-display" id="wordDisplay"></div>

        <!-- Αλφαβήτα -->
        <div class="alphabet-container" id="alphabetContainer"></div>

        <!-- Χρησιμοποιημένα γράμματα -->
        <div class="used-letters-display" id="usedLettersDisplay"></div>

        <!-- Πεδίο μαντέματος -->
        <div class="guess-section">
            <input type="text" class="guess-input" id="guessInput" placeholder="Γράψε ολόκληρη τη λέξη..." autocomplete="off">
            <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                <button class="btn" id="submitGuess">🔓 ΥΠΟΒΟΛΗ</button>
                <button class="btn" id="newGameBtn">🔄 ΝΕΟ ΠΑΙΧΝΙΔΙ</button>
            </div>
        </div>

        <div class="message" id="messageBox"></div>

        <div id="resultPanel" class="result-badge hidden">
            <span id="resultEmoji">🏆</span>
            <span id="resultText"></span>
            <span id="scoreDisplay"></span>
        </div>

        <hr>
        <div style="display: flex; gap: 20px; font-size: 0.8rem; color:#8ab08a;">
            <span>📢 ΜΟΙΡΑΣΟΥ ΤΟ</span>
            <span>🔔 SUBSCRIBE</span>
        </div>
    </div>

    <script>
        (function() {
            // ========== 10 ΤΥΧΑΙΕΣ ΛΕΞΕΙΣ / ΠΡΟΤΑΣΕΙΣ ==========
            const SECRET_WORDS = [
                { word: "ΦΙΛΟΣΟΦΙΑ", hint: "Αγάπη για τη σοφία" },
                { word: "ΕΛΕΥΘΕΡΙΑ", hint: "Ύψιστο αγαθό" },
                { word: "ΘΑΛΑΣΣΑ", hint: "Απέραντο γαλάζιο" },
                { word: "ΠΕΡΙΠΕΤΕΙΑ", hint: "Συναρπαστική εμπειρία" },
                { word: "ΟΝΕΙΡΟ", hint: "Βλέπεις όταν κοιμάσαι" },
                { word: "ΑΣΤΕΡΙΑ", hint: "Λάμπουν στον ουρανό" },
                { word: "ΚΑΛΟΚΑΙΡΙ", hint: "Ζεστή εποχή" },
                { word: "ΦΑΝΤΑΣΙΑ", hint: "Δημιουργική σκέψη" },
                { word: "ΧΑΜΟΓΕΛΟ", hint: "Εκφράζει χαρά" },
                { word: "ΜΥΣΤΗΡΙΟ", hint: "Κάτι ανεξήγητο" }
            ];

            const ALPHABET = "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ".split("");
            const START_TIME = 180; // 3 λεπτά
            const MAX_SCORE = 6000;

            let currentWord = "";
            let currentHint = "";
            let gameActive = false;
            let timeSeconds = START_TIME;
            let timerInterval = null;
            let usedLetters = [];
            let revealedLetters = [];

            // DOM Elements
            const timerDisplay = document.getElementById("timerDisplay");
            const hintText = document.getElementById("hintText");
            const wordDisplay = document.getElementById("wordDisplay");
            const alphabetContainer = document.getElementById("alphabetContainer");
            const usedLettersDisplay = document.getElementById("usedLettersDisplay");
            const guessInput = document.getElementById("guessInput");
            const submitBtn = document.getElementById("submitGuess");
            const newGameBtn = document.getElementById("newGameBtn");
            const messageBox = document.getElementById("messageBox");
            const resultPanel = document.getElementById("resultPanel");
            const resultEmoji = document.getElementById("resultEmoji");
            const resultText = document.getElementById("resultText");
            const scoreDisplay = document.getElementById("scoreDisplay");

            // ========== ΣΥΝΑΡΤΗΣΕΙΣ ==========
            function getRandomWord() {
                const randomIndex = Math.floor(Math.random() * SECRET_WORDS.length);
                return SECRET_WORDS[randomIndex];
            }

            function normalizeGreek(text) {
                return text.toUpperCase()
                    .replace(/Ά/g, "Α").replace(/Έ/g, "Ε").replace(/Ή/g, "Η")
                    .replace(/Ί/g, "Ι").replace(/Ό/g, "Ο").replace(/Ύ/g, "Υ")
                    .replace(/Ώ/g, "Ω").replace(/Ϊ/g, "Ι").replace(/Ϋ/g, "Υ")
                    .replace(/\s+/g, "");
            }

            function formatTime(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function createAlphabetButtons() {
                alphabetContainer.innerHTML = "";
                ALPHABET.forEach(letter => {
                    const btn = document.createElement("button");
                    btn.className = "letter-btn";
                    btn.textContent = letter;
                    btn.addEventListener("click", () => handleLetterClick(letter, btn));
                    alphabetContainer.appendChild(btn);
                });
            }

            function updateAlphabetButtons() {
                const buttons = alphabetContainer.querySelectorAll(".letter-btn");
                buttons.forEach(btn => {
                    const letter = btn.textContent;
                    if (usedLetters.includes(letter)) {
                        btn.classList.add("used");
                    } else {
                        btn.classList.remove("used");
                    }
                });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive) return;
                if (usedLetters.includes(letter)) return;

                usedLetters.push(letter);
                btn.classList.add("used");

                // Έλεγχος αν το γράμμα υπάρχει στη λέξη
                const normalizedWord = normalizeGreek(currentWord);
                const positions = [];
                for (let i = 0; i < normalizedWord.length; i++) {
                    if (normalizedWord[i] === letter) {
                        positions.push(i);
                    }
                }

                if (positions.length > 0) {
                    // Αποκάλυψη γράμματος
                    positions.forEach(pos => {
                        revealedLetters[pos] = letter;
                    });
                    updateWordDisplay();
                    messageBox.textContent = `✅ Το γράμμα "${letter}" βρέθηκε!`;
                    messageBox.style.color = "#8ac08a";

                    // Έλεγχος νίκης
                    if (revealedLetters.join("") === normalizedWord) {
                        endGame(true);
                    }
                } else {
                    messageBox.textContent = `❌ Το γράμμα "${letter}" δεν υπάρχει.`;
                    messageBox.style.color = "#d98c5f";
                    updateUsedLettersDisplay();
                }
            }

            function updateWordDisplay() {
                wordDisplay.innerHTML = "";
                const displayWord = currentWord.toUpperCase();
                const normalizedWord = normalizeGreek(currentWord);

                for (let i = 0; i < displayWord.length; i++) {
                    const slot = document.createElement("span");
                    if (displayWord[i] === " ") {
                        slot.className = "word-slot space";
                        slot.textContent = "";
                    } else {
                        slot.className = "word-slot";
                        const normalizedChar = normalizedWord[i];
                        if (revealedLetters[i]) {
                            slot.textContent = revealedLetters[i];
                        } else {
                            slot.textContent = "_";
                        }
                    }
                    wordDisplay.appendChild(slot);
                }
            }

            function updateUsedLettersDisplay() {
                if (usedLetters.length > 0) {
                    usedLettersDisplay.textContent = "Χρησιμοποιημένα: " + usedLetters.join(", ");
                } else {
                    usedLettersDisplay.textContent = "";
                }
            }

            function checkFullGuess() {
                if (!gameActive) return;

                const guess = normalizeGreek(guessInput.value.trim());
                const normalizedWord = normalizeGreek(currentWord);

                if (guess === "") {
                    messageBox.textContent = "Γράψε μια λέξη!";
                    return;
                }

                if (guess === normalizedWord) {
                    // Αποκάλυψη όλων των γραμμάτων
                    for (let i = 0; i < normalizedWord.length; i++) {
                        if (!revealedLetters[i]) {
                            revealedLetters[i] = normalizedWord[i];
                            if (!usedLetters.includes(normalizedWord[i])) {
                                usedLetters.push(normalizedWord[i]);
                            }
                        }
                    }
                    updateWordDisplay();
                    updateAlphabetButtons();
                    updateUsedLettersDisplay();
                    endGame(true);
                } else {
                    messageBox.textContent = "Λάθος! Προσπάθησε ξανά.";
                    messageBox.style.color = "#d98c5f";
                    guessInput.value = "";
                    guessInput.focus();
                }
            }

            function calculateScore() {
                if (timeSeconds <= 0) return 0;
                const ratio = timeSeconds / START_TIME;
                return Math.floor(ratio * MAX_SCORE);
            }

            function endGame(won) {
                if (!gameActive) return;
                gameActive = false;
                stopTimer();

                // Αποκάλυψη όλων των γραμμάτων
                const normalizedWord = normalizeGreek(currentWord);
                for (let i = 0; i < normalizedWord.length; i++) {
                    revealedLetters[i] = normalizedWord[i];
                }
                updateWordDisplay();
                updateAlphabetButtons();

                resultPanel.classList.remove("hidden");
                if (won) {
                    resultEmoji.textContent = "🎉";
                    resultText.textContent = "ΤΟ ΒΡΗΚΕΣ!";
                    scoreDisplay.textContent = `${calculateScore()} / ${MAX_SCORE}`;
                    messageBox.textContent = "Συγχαρητήρια! Η λέξη ήταν: " + currentWord;
                    messageBox.style.color = "#8ac08a";
                } else {
                    resultEmoji.textContent = "⏰";
                    resultText.textContent = "ΤΕΛΟΣ ΧΡΟΝΟΥ!";
                    scoreDisplay.textContent = "0 / 6000";
                    messageBox.textContent = "Η λέξη ήταν: " + currentWord;
                    messageBox.style.color = "#d98c5f";
                }

                guessInput.disabled = true;
                submitBtn.disabled = true;
            }

            function resetGame() {
                stopTimer();

                // Επιλογή τυχαίας λέξης
                const randomWordObj = getRandomWord();
                currentWord = randomWordObj.word;
                currentHint = randomWordObj.hint;

                // Επαναφορά κατάστασης
                gameActive = true;
                timeSeconds = START_TIME;
                usedLetters = [];
                const normalizedWord = normalizeGreek(currentWord);
                revealedLetters = new Array(normalizedWord.length).fill("");

                // Ενημέρωση UI
                timerDisplay.textContent = formatTime(timeSeconds);
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay();
                createAlphabetButtons();
                updateAlphabetButtons();
                updateUsedLettersDisplay();
                guessInput.value = "";
                guessInput.disabled = false;
                submitBtn.disabled = false;
                resultPanel.classList.add("hidden");
                messageBox.textContent = "";
                messageBox.style.color = "#a8d4a8";

                // Έναρξη χρονομέτρου
                timerInterval = setInterval(() => {
                    if (!gameActive) return;
                    timeSeconds--;
                    timerDisplay.textContent = formatTime(timeSeconds);
                    if (timeSeconds <= 0) {
                        timeSeconds = 0;
                        timerDisplay.textContent = formatTime(0);
                        endGame(false);
                    }
                }, 1000);

                guessInput.focus();
            }

            // ========== EVENT LISTENERS ==========
            submitBtn.addEventListener("click", checkFullGuess);
            newGameBtn.addEventListener("click", resetGame);

            guessInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    checkFullGuess();
                }
            });

            // Φιλτράρισμα εισαγωγής μόνο ελληνικών
            guessInput.addEventListener("input", (e) => {
                let value = e.target.value;
                // Αντικατάσταση τονισμένων και μετατροπή σε κεφαλαία
                value = value.toUpperCase()
                    .replace(/[^Α-ΩΆΈΉΊΌΎΏΪΫ\s]/g, "");
                e.target.value = value;
            });

            // ========== ΑΡΧΙΚΟΠΟΙΗΣΗ ==========
            createAlphabetButtons();
            resetGame();
        })();
    </script>
</body>
</html>
