<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Deluxe Pro</title>
    <link rel="icon" type="image/png" sizes="32x32" href="index.png">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src='//libtl.com/sdk.js' data-zone='11108267' data-sdk='show_11108267'></script>
    <style>
        :root {
            --board-size: min(88vw, 88vh, 700px);
            --square-size: calc(var(--board-size) / 8);
            --piece-size: calc(var(--square-size) * 0.88);
            --dot-size: calc(var(--square-size) * 0.2);
            --eval-width: 14px;
            --sidebar-width: 130px;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(160deg, #0d1b2a 0%, #1b2838 30%, #1e3c72 60%, #2a5298 100%);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 6px; padding-bottom: 60px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden; perspective: 1200px;
        }
        .main-layout {
            display: flex; gap: 8px; align-items: flex-start;
            width: 100%; max-width: calc(var(--board-size) + var(--sidebar-width) + 20px);
            justify-content: center; flex-wrap: wrap;
        }
        .board-area { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: var(--board-size); gap: 6px;
            padding: 6px 10px; background: rgba(0,0,0,0.35); border-radius: 12px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
        }
        .level-badge {
            display: flex; align-items: center; gap: 6px;
            color: #ffcb2e; font-weight: 700; font-size: 12px;
            background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 20px;
            border: 1px solid rgba(255,203,46,0.3);
        }
        .streak-badge {
            display: flex; align-items: center; gap: 4px;
            color: #ff6b6b; font-weight: 700; font-size: 11px;
            background: rgba(255,107,107,0.15); padding: 5px 10px; border-radius: 20px;
            border: 1px solid rgba(255,107,107,0.3);
        }
        .daily-mission-bar {
            width: 100%; max-width: var(--board-size);
            background: rgba(0,0,0,0.35); border-radius: 10px; padding: 6px 12px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 8px;
        }
        .daily-mission-label { color: #e0e0e0; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .daily-mission-track { flex: 1; height: 7px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .daily-mission-fill {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.5s; box-shadow: 0 0 10px rgba(76,175,80,0.5);
        }
        .daily-mission-count { color: #ffcb2e; font-weight: 700; font-size: 12px; min-width: 30px; text-align: center; }
        .daily-mission-reward {
            background: linear-gradient(135deg, #ffcb2e, #ff9f00); color: #000;
            padding: 5px 10px; border-radius: 20px; font-weight: 700; font-size: 10px;
            cursor: pointer; border: none;
            box-shadow: 0 4px 0 #b37400, 0 6px 15px rgba(0,0,0,0.4);
            transition: all 0.2s; white-space: nowrap;
            transform: translateZ(4px);
        }
        .daily-mission-reward:active { transform: translateY(3px) translateZ(2px); box-shadow: 0 1px 0 #b37400; }
        .daily-mission-reward:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .board-row { display: flex; gap: 6px; align-items: stretch; }
        .eval-bar-container {
            width: var(--eval-width); min-height: var(--board-size);
            background: rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden;
            display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1);
        }
        .eval-bar-black { flex: 1; background: #1a1a1a; transition: flex 0.6s; display: flex; align-items: flex-end; justify-content: center; color: #888; font-size: 9px; padding-bottom: 2px; }
        .eval-bar-white { flex: 1; background: #e8e8e8; transition: flex 0.6s; display: flex; align-items: flex-start; justify-content: center; color: #555; font-size: 9px; padding-top: 2px; }
        .board-container {
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(145deg, #4a3820, #3a2e16);
            padding: 8px; border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 4px 0 #2a1f0e, inset 0 1px 0 rgba(255,255,255,0.08);
            width: var(--board-size); transform: rotateX(1.5deg);
        }
        .board {
            width: var(--board-size); height: var(--board-size);
            display: grid; grid-template-columns: repeat(8, 1fr);
            border: 4px solid #2a1f0e;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.5), 0 6px 0 #1a1008, 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 2px;
            transition: transform 0.5s ease;
        }
        .board.flipped { transform: rotate(180deg); }
        .board.flipped .piece { transform: rotate(180deg); }
        .square {
            position: relative; width: var(--square-size); height: var(--square-size);
            display: flex; align-items: center; justify-content: center;
        }
        .sq-light { background: #e8d5b7; } .sq-dark { background: #b58863; }
        .piece {
            width: var(--piece-size); height: var(--piece-size);
            cursor: grab; transition: transform 0.12s; user-select: none;
            filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.45)); z-index: 2;
        }
        .piece:active { cursor: grabbing; transform: scale(1.1); }
        .highlight { box-shadow: inset 0 0 0 3px #ffcb2e, inset 0 0 10px rgba(255,203,46,0.35); animation: glowPulse 0.8s infinite; }
        @keyframes glowPulse { 0%,100% { box-shadow: inset 0 0 0 3px #ffcb2e, inset 0 0 10px rgba(255,203,46,0.35); } 50% { box-shadow: inset 0 0 0 4px #ffe066, inset 0 0 15px rgba(255,203,46,0.5); } }
        .move-dot::after { content: ''; position: absolute; width: var(--dot-size); height: var(--dot-size); border-radius: 50%; background: rgba(0,0,0,0.22); z-index: 1; }
        .check { box-shadow: inset 0 0 0 3px #ff3333, inset 0 0 14px rgba(255,51,51,0.5) !important; animation: checkPulse 0.6s infinite !important; }
        @keyframes checkPulse { 0%,100% { box-shadow: inset 0 0 0 3px #ff3333, inset 0 0 14px rgba(255,51,51,0.5); } 50% { box-shadow: inset 0 0 0 6px #ff5555, inset 0 0 20px rgba(255,51,51,0.7); } }
        .game-info { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 4px 6px; gap: 6px; color: #fff; font-size: 11px; font-weight: 600; }
        .timer { color: #ffcb2e; font-weight: 700; font-size: 14px; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,203,46,0.25); box-shadow: 0 3px 0 rgba(0,0,0,0.3); transform: translateZ(3px); }
        .timer.low { color: #ff4444; border-color: rgba(255,68,68,0.4); animation: timerBlink 0.5s infinite; }
        @keyframes timerBlink { 50% { opacity: 0.4; } }
        .side-panel { width: var(--sidebar-width); display: flex; flex-direction: column; gap: 6px; min-width: 110px; }
        .panel-box { background: rgba(0,0,0,0.35); border-radius: 10px; padding: 8px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px); box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.3); }
        .panel-title { color: #ffcb2e; font-size: 11px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .notation-list { max-height: 180px; overflow-y: auto; color: #ccc; font-size: 11px; font-family: 'Courier New', monospace; line-height: 1.5; }
        .undo-btn { width: 100%; padding: 8px; background: #5d4037; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 11px; box-shadow: 0 3px 0 #3e2723, 0 5px 10px rgba(0,0,0,0.3); transition: all 0.2s; transform: translateZ(2px); }
        .undo-btn:active { transform: translateY(2px) translateZ(1px); box-shadow: 0 1px 0 #3e2723; }
        .undo-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
            display: none; justify-content: center; align-items: center;
            z-index: 100; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn {
            0% { transform: translateZ(-100px) scale(0.8); opacity: 0; }
            70% { transform: translateZ(20px) scale(1.03); opacity: 1; }
            100% { transform: translateZ(0) scale(1); opacity: 1; }
        }
        .modal-content {
            background: linear-gradient(160deg, #3a2e16, #2a1f0e);
            padding: 22px 18px; border-radius: 16px;
            max-width: 92%; width: 400px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 0 3px #d19a4c, 0 0 40px rgba(209,154,76,0.3);
            animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            transform-style: preserve-3d; border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content h2 { color: #ffcb2e; margin: 0 0 8px; }
        .modal-content h3 { color: #e0c080; margin: 6px 0; font-size: 14px; }
        .modal-options { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
        .modal-btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: #5d4037; color: white; font-weight: 700; cursor: pointer;
            font-size: 14px; transition: all 0.2s;
            box-shadow: 0 4px 0 #3e2723, 0 6px 12px rgba(0,0,0,0.3);
            transform: translateZ(3px);
        }
        .modal-btn:active { transform: translateY(3px) translateZ(1px); box-shadow: 0 1px 0 #3e2723; }
        .modal-btn.active { background: #d19a4c; box-shadow: 0 4px 0 #8b6914, 0 6px 15px rgba(209,154,76,0.4); }
        .start-btn { background: #4CAF50; box-shadow: 0 4px 0 #2e7d32, 0 6px 15px rgba(76,175,80,0.4); font-size: 17px; margin-top: 6px; }
        .status-mate { color: #ff4444; font-weight: 800; }
        .status-check { color: #ff8c00; font-weight: 700; }
        .ai-thinking-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9); color: #ffcb2e;
            text-align: center; padding: 12px; font-weight: 700; font-size: 15px;
            z-index: 150; display: none;
            border-top: 2px solid rgba(255,203,46,0.3);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        .promotion-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .promotion-dialog {
            background: #3a2e16; padding: 16px; border-radius: 16px;
            display: flex; gap: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.6);
            border: 2px solid #d19a4c;
        }
        .promotion-option {
            width: 60px; height: 60px; background: #5d4037; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 0 #3e2723;
        }
        .promotion-option:hover { background: #d19a4c; transform: scale(1.08); }
        .promotion-option img { width: 80%; height: 80%; }
        .leaderboard-modal .modal-content { width: 420px; }
        .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.06); color: #e0e0e0; font-size: 13px; }
        .lb-rank { font-weight: 800; color: #ffcb2e; min-width: 36px; }
        .lb-name { flex: 1; text-align: left; margin: 0 6px; overflow: hidden; text-overflow: ellipsis; }
        .lb-streak { font-weight: 700; color: #ff6b6b; min-width: 44px; text-align: right; }
        .diff-btn {
            padding: 10px; font-size: 13px; margin: 2px 0;
        }
        @media (max-width: 700px) {
            .side-panel { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 4px; }
            .side-panel .panel-box { flex: 1; min-width: 100px; }
            .notation-list { max-height: 100px; }
            .eval-bar-container { display: none; }
            .main-layout { flex-direction: column; align-items: center; }
            .board-area { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="board-area">
            <div class="stats-bar">
                <div class="level-badge" id="levelBadge">🏅 Rookie</div>
                <div class="streak-badge" id="streakBadge" style="display:none;">🔥 0</div>
                <button class="modal-btn" id="leaderboardBtn" style="width:auto;padding:5px 12px;font-size:11px;border-radius:20px;">🏆 Top 10</button>
            </div>
            <div class="daily-mission-bar">
                <span class="daily-mission-label">📋 Daily: 3 Wins</span>
                <div class="daily-mission-track"><div class="daily-mission-fill" id="dailyMissionFill" style="width:0%;"></div></div>
                <span class="daily-mission-count" id="dailyMissionCount">0/3</span>
                <button class="daily-mission-reward" id="dailyClaimBtn" disabled>🎁 50pts</button>
            </div>
            <div class="board-row">
                <div class="eval-bar-container" id="evalBarContainer">
                    <div class="eval-bar-black" id="evalBarBlack">B</div>
                    <div class="eval-bar-white" id="evalBarWhite">W</div>
                </div>
                <div class="board-container">
                    <div class="game-info">
                        <span id="gameStatus">White's turn</span>
                        <span class="timer" id="whiteTime">5:00</span>
                        <span style="color:#aaa;">vs</span>
                        <span class="timer" id="blackTime">5:00</span>

        <div class="side-panel">
            <div class="panel-box">
                <div class="panel-title">📝 Notation</div>

            </div>
            <button class="undo-btn" id="undoBtn" disabled>↩️ Undo (1 left)</button>
        </div>
    </div>

    <div class="ai-thinking-footer" id="aiThinkingFooter">🤔 AI is thinking...</div>

    <div class="promotion-overlay" id="promotionOverlay">
        <div class="promotion-dialog" id="promotionDialog"></div>
    </div>

    <!-- Setup Modal -->
    <div class="modal-overlay" id="setupModal">
        <div class="modal-content">
            <h2>♕ Chess vs AI ♛</h2>
            <p style="color:#ccc;" id="difficultyLabel">Difficulty: Hard</p>
            <div class="modal-options">
                <h3>Difficulty</h3>
                <button class="modal-btn diff-btn active" data-diff="hard">🔥 Hard</button>
                <button class="modal-btn diff-btn" data-diff="medium">⚡ Medium</button>
            </div>
            <div class="modal-options">
                <h3>Choose Your Color</h3>
                <button class="modal-btn color-btn active" data-color="white">⚪ White</button>
                <button class="modal-btn color-btn" data-color="black">⚫ Black</button>
                <button class="modal-btn color-btn" data-color="random">🎲 Random</button>
            </div>
            <p id="savedGameInfo" style="color:#4CAF50;display:none;">↩️ Saved game found!</p>
            <button class="modal-btn start-btn" id="startGameBtn">New Game</button>
            <button class="modal-btn" id="resumeGameBtn" style="display:none;background:#2196F3;">Resume</button>

        </div>
    </div>

    <!-- Post-Game Modal -->
    <div class="modal-overlay" id="postGameModal">
        <div class="modal-content">
            <h2 id="postGameTitle">🎉</h2>
            <p id="postGameMessage"></p>
            <p id="streakInfo"></p>
            <p id="levelUpInfo" style="color:#ffcb2e;display:none;"></p>
            <button class="modal-btn" id="playAgainBtn" style="background:#4CAF50;">New Game</button>
            <button class="modal-btn" id="menuBtn">Menu</button>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div class="modal-overlay leaderboard-modal" id="leaderboardModal">
        <div class="modal-content">
            <h2>🏆 Top Win Streaks</h2>
            <div id="leaderboardList"></div>
            <button class="modal-btn" id="closeLbBtn" style="margin-top:8px;">Close</button>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const API = "https://franklymadear-games.hf.space";
        const API_KEY = "m0n3t4g_s3cur3_k3y_2026";
        const TIME_CONTROL = 300;
        const DAILY_WINS_NEEDED = 3;
        const DAILY_REWARD = 50;
        const WORKER_TIMEOUT = 10000;

        let currentDifficulty = 'hard'; // 'medium' | 'hard'
        let aiDepth = 3; // medium: 2, hard: 3

        // ==================== USER ID ====================
        let userId = localStorage.getItem('franklymadear_userId');
        if (!userId && window.Telegram?.WebApp?.initDataUnsafe?.user) {
            userId = 'tg_' + window.Telegram.WebApp.initDataUnsafe.user.id;
            localStorage.setItem('franklymadear_userId', userId);
        }
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
            localStorage.setItem('franklymadear_userId', userId);
        }

        const apiCall = (m, p, b) => fetch(API+p, { method:m, headers:{'Content-Type':'application/json','X-API-Key':API_KEY}, body:b?JSON.stringify(b):null }).then(r=>r.json());
        const notifyHub = (type, data) => { if(window.parent!==window) window.parent.postMessage({type, ...data}, '*'); };

        async function sendScoreToBackend(score, gameResult) {
            if (!userId) return;
            try {
                await apiCall('POST', '/add-points', { userId, game: 'Chess', points: score });
                await apiCall('POST', '/missions/update', { userId, game: 'chess', score, playtime: 1, words: 0 });
                if (gameResult === 'checkmate') {
                    const WINS_KEY = 'frankly_chess_wins';
                    const CLAIMED_KEY = 'frankly_chess_claimed';
                    if (localStorage.getItem(CLAIMED_KEY) !== 'true') {
                        const current = parseInt(localStorage.getItem(WINS_KEY) || '0');
                        if (current < 3) {
                            localStorage.setItem(WINS_KEY, (current + 1).toString());
                        }
                    }
                }
                if (window.parent !== window) {
                    if (gameResult === 'checkmate') {
                        window.parent.postMessage({ type: 'updateMission', game: 'chess', result: 'win' }, '*');
                    }
                    window.parent.postMessage({ type: 'gameScore', game: 'Chess', score }, '*');
                }
            } catch(e) { console.warn('API error:', e); }
        }

        // ==================== AUDIO & HAPTICS ====================
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(f, d, t='sine', v=0.08) {
            if (!audioCtx) return;
            const o=audioCtx.createOscillator(), g=audioCtx.createGain();
            o.connect(g);g.connect(audioCtx.destination);
            o.type=t;o.frequency.setValueAtTime(f,audioCtx.currentTime);
            g.gain.setValueAtTime(v,audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
            o.start();o.stop(audioCtx.currentTime+d);
        }
        function sfxMove(){ playTone(600,0.07); }
        function sfxCapture(){ playTone(800,0.1,'triangle'); }
        function sfxCheck(){ playTone(1200,0.1);setTimeout(()=>playTone(900,0.1),70); }
        function sfxMate(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.22,'sine',0.13),i*90)); }
        function sfxClaim(){ [440,554,660,880].forEach((f,i)=>setTimeout(()=>playTone(f,0.18,'sine',0.1),i*70)); }
        function haptic(type='medium'){ window.Telegram?.WebApp?.HapticFeedback?.impactOccurred(type); }

        // ==================== MONETAG AD ====================
        function showAdThen(callback) {
            if (typeof show_11108267 === 'function') {
                show_11108267().then(() => {
                    if (callback) callback();
                }).catch(() => {
                    if (callback) callback();
                });
            } else {
                if (callback) callback();
            }
        }

        // ==================== TELEGRAM MAIN BUTTON ====================
        function setupMainButton(text, cb) {
            if (window.Telegram?.WebApp?.MainButton) {
                const mb = window.Telegram.WebApp.MainButton;
                mb.setText(text); mb.show(); mb.onClick(cb); return mb;
            }
            return null;
        }
        function hideMainButton(){ window.Telegram?.WebApp?.MainButton?.hide(); }

        // ==================== LEVEL SYSTEM ====================
        const LEVELS = [
            { name: 'Rookie', min: 0 }, { name: 'Beginner', min: 10 }, { name: 'Intermediate', min: 25 },
            { name: 'Advanced', min: 50 }, { name: 'Expert', min: 100 }, { name: 'Master', min: 200 }, { name: 'Grandmaster', min: 500 }
        ];
        function getTotalWins() { return parseInt(localStorage.getItem('chess_total_wins')||'0'); }
        function addTotalWin() { const w = getTotalWins()+1; localStorage.setItem('chess_total_wins', w.toString()); updateLevelUI(); return w; }
        function getLevel() {
            const wins = getTotalWins();
            for (let i = LEVELS.length-1; i >= 0; i--) if (wins >= LEVELS[i].min) return LEVELS[i];
            return LEVELS[0];
        }
        function updateLevelUI() {
            document.getElementById('levelBadge').textContent = `🏅 ${getLevel().name}`;
        }

        // ==================== DAILY MISSIONS ====================
        function getDailyKey() { return 'chess_daily_' + new Date().toDateString(); }
        function getDailyWins() { return parseInt(localStorage.getItem(getDailyKey())||'0'); }
        function addDailyWin() {
            const w = getDailyWins()+1;
            localStorage.setItem(getDailyKey(), w.toString());

        // ==================== NOTATION & UNDO ====================
        let moveHistory = [], undoUsed = false;

        function addNotation(move, captured) {
            const piece = board[move.to.r][move.to.c];
            const sym = { p:'', n:'N', b:'B', r:'R', q:'Q', k:'K' }[piece.type];
            const f = 'abcdefgh'[move.from.c] + (8 - move.from.r);
            const t = 'abcdefgh'[move.to.c] + (8 - move.to.r);

        function undoLastMove() {

                board[last.move.from.r][last.move.from.c] = board[last.move.to.r][last.move.to.c];
                board[last.move.to.r][last.move.to.c] = last.captured;

        // ==================== DOM ====================
        const boardEl = document.getElementById('board');
        const gameStatusEl = document.getElementById('gameStatus');
        const whiteTimeEl = document.getElementById('whiteTime');

        const promotionDialog = document.getElementById('promotionDialog');

        // ==================== GAME STATE ====================
        const START_POSITION = [
            ['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],
            [null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],
            ['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']
        ];
        let board = [], whiteToMove = true, selected = null, legalMoves = [];
        let gameActive = false, aiColor = 'b', playerColor = 'w', kingInCheck = false;
        let whiteTimeLeft = TIME_CONTROL, blackTimeLeft = TIME_CONTROL;
        let timerInterval = null, lastTimerTick = 0;
        let isDailyChallenge = false, postGamePending = false;
        let aiThinking = false;

        let promotionPending = null;

        // ==================== AI WORKER ====================
        let aiWorker = null;

        function initWorker() {
            if (aiWorker) {
                try { aiWorker.terminate(); } catch(e) {}
                aiWorker = null;
            }

            const code = `
                const V = { p:100, n:320, b:330, r:500, q:900, k:20000 };
                function getMoves(b, r, c) {
                    const p = b[r][c]; if (!p) return [];
                    const m = [], col = p.color, d = col == 'w' ? -1 : 1;
                    const ib = (rr, cc) => rr >= 0 && rr < 8 && cc >= 0 && cc < 8;
                    const em = (rr, cc) => ib(rr, cc) && !b[rr][cc];
                    const en = (rr, cc) => ib(rr, cc) && b[rr][cc] && b[rr][cc].color != col;
                    if (p.type == 'p') {
                        if (em(r+d, c)) m.push({ r: r+d, c });
                        if ((col == 'w' && r == 6 || col == 'b' && r == 1) && em(r+d, c) && em(r+2*d, c)) m.push({ r: r+2*d, c });
                        [-1,1].forEach(dc => { if (en(r+d, c+dc)) m.push({ r: r+d, c: c+dc }); });
                    }
                    if (p.type == 'n') {
                        [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr, dc]) => {
                            const rr = r+dr, cc = c+dc;
                            if (ib(rr, cc) && (!b[rr][cc] || en(rr, cc))) m.push({ r: rr, c: cc });
                        });
                    }
                    if (['b','r','q'].includes(p.type)) {
                        const dirs = [];
                        if (['b','q'].includes(p.type)) dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
                        if (['r','q'].includes(p.type)) dirs.push([-1,0],[1,0],[0,-1],[0,1]);
                        dirs.forEach(([dr, dc]) => {
                            let rr = r+dr, cc = c+dc;
                            while (ib(rr, cc)) {
                                if (!b[rr][cc]) m.push({ r: rr, c: cc });
                                else { if (en(rr, cc)) m.push({ r: rr, c: cc }); break; }
                                rr += dr; cc += dc;
                            }
                        });
                    }
                    if (p.type == 'k') {
                        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
                            if ((dr || dc) && ib(r+dr, c+dc) && (!b[r+dr][c+dc] || en(r+dr, c+dc))) {
                                m.push({ r: r+dr, c: c+dc });
                            }
                        }
                    }
                    return m;
                }
                function isCheck(b, col) {
                    let kp = null;
                    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                        if (b[r][c] && b[r][c].type == 'k' && b[r][c].color == col) { kp = { r, c }; break; }
                    }
                    if (!kp) return false;
                    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                        if (b[r][c] && b[r][c].color != col && getMoves(b, r, c).some(m => m.r == kp.r && m.c == kp.c)) return true;
                    }
                    return false;
                }
                function legalMoves(b, r, c) {
                    return getMoves(b, r, c).filter(m => {
                        const o = b[m.r][m.c], p = b[r][c];
                        b[m.r][m.c] = p; b[r][c] = null;
                        const ck = isCheck(b, p.color);
                        b[r][c] = p; b[m.r][m.c] = o;
                        return !ck;
                    });
                }
                function allMoves(b, col) {
                    const m = [];
                    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                        if (b[r][c] && b[r][c].color == col) {
                            legalMoves(b, r, c).forEach(t => {
                                if (b[r][c].type == 'p' && (t.r == 0 || t.r == 7)) {
                                    m.push({ from: { r, c }, to: t, promotion: 'q' });
                                } else {
                                    m.push({ from: { r, c }, to: t });
                                }
                            });
                        }
                    }
                    return m;
                }
                function evalBoard(b, ai) {
                    let s = 0;
                    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                        const p = b[r][c]; if (!p) continue;
                        s += p.color == ai ? V[p.type] : -V[p.type];
                    }
                    return s + Math.random() * 8 - 4;
                }
                function minimax(b, depth, a, beta, isMax, ai) {
                    const col = isMax ? ai : (ai == 'w' ? 'b' : 'w');
                    if (depth == 0) return evalBoard(b, ai);
                    const moves = allMoves(b, col);
                    if (moves.length == 0) return isCheck(b, col) ? (isMax ? -99999 : 99999) : 0;
                    moves.sort((x, y) => {
                        const ca = b[x.to.r][x.to.c] ? V[b[x.to.r][x.to.c].type] : 0;
                        const cb = b[y.to.r][y.to.c] ? V[b[y.to.r][y.to.c].type] : 0;
                        return cb - ca;
                    });
                    if (isMax) {
                        let best = -Infinity;
                        for (const m of moves) {
                            const o = b[m.to.r][m.to.c], p = b[m.from.r][m.from.c];
                            b[m.to.r][m.to.c] = p; b[m.from.r][m.from.c] = null;
                            if (m.promotion) b[m.to.r][m.to.c].type = m.promotion;
                            const v = minimax(b, depth-1, a, beta, false, ai);
                            b[m.from.r][m.from.c] = p; b[m.to.r][m.to.c] = o;
                            best = Math.max(best, v);
                            a = Math.max(a, v);
                            if (beta <= a) break;
                        }
                        return best;
                    } else {
                        let best = Infinity;
                        for (const m of moves) {
                            const o = b[m.to.r][m.to.c], p = b[m.from.r][m.from.c];
                            b[m.to.r][m.to.c] = p; b[m.from.r][m.from.c] = null;
                            if (m.promotion) b[m.to.r][m.to.c].type = m.promotion;
                            const v = minimax(b, depth-1, a, beta, true, ai);
                            b[m.from.r][m.from.c] = p; b[m.to.r][m.to.c] = o;
                            best = Math.min(best, v);
                            beta = Math.min(beta, v);
                            if (beta <= a) break;
                        }
                        return best;
                    }
                }
                self.onmessage = function(e) {
                    const { board: b, aiColor: ai, depth } = e.data;
                    console.log('🤖 Worker: computing move at depth', depth);
                    const moves = allMoves(b, ai);
                    if (!moves.length) { console.log('🤖 Worker: no moves'); self.postMessage(null); return; }
                    moves.sort((x, y) => {
                        const ca = b[x.to.r][x.to.c] ? V[b[x.to.r][x.to.c].type] : 0;
                        const cb = b[y.to.r][y.to.c] ? V[b[y.to.r][y.to.c].type] : 0;
                        return cb - ca;
                    });
                    let best = -Infinity, bestMoves = [];
                    const searchDepth = depth - 1;
                    for (const m of moves) {
                        const o = b[m.to.r][m.to.c], p = b[m.from.r][m.from.c];
                        b[m.to.r][m.to.c] = p; b[m.from.r][m.from.c] = null;
                        if (m.promotion) b[m.to.r][m.to.c].type = m.promotion;
                        const s = minimax(b, searchDepth, -Infinity, Infinity, false, ai);
                        b[m.from.r][m.from.c] = p; b[m.to.r][m.to.c] = o;
                        if (s > best) { best = s; bestMoves = [m]; }
                        else if (s == best) bestMoves.push(m);
                    }
                    const result = bestMoves[Math.floor(Math.random() * bestMoves.length)];
                    console.log('🤖 Worker: move found', result);
                    self.postMessage(result);
                };
            `;

            const blob = new Blob([code], { type: 'application/javascript' });
            aiWorker = new Worker(URL.createObjectURL(blob));

            aiWorker.onmessage = function(e) {
                console.log('📩 Main: worker returned', e.data);
                if (aiTimeoutId) { clearTimeout(aiTimeoutId); aiTimeoutId = null; }
                aiFooter.style.display = 'none';
                aiThinking = false;

                if (!gameActive) {
                    console.log('⚠️ Main: game not active, ignoring worker move');
                    return;
                }

                if (e.data && whiteToMove === (aiColor === 'w')) {
                    console.log('✅ Main: executing AI move');
                    movePiece(e.data.from.r, e.data.from.c, e.data.to.r, e.data.to.c, e.data.promotion || 'q');
                }
            };

            aiWorker.onerror = function(e) {
                console.error('💥 Worker error:', e);
                aiFooter.style.display = 'none';
                aiThinking = false;
                if (aiTimeoutId) { clearTimeout(aiTimeoutId); aiTimeoutId = null; }
                if (gameActive && whiteToMove === (aiColor === 'w')) {
                    const moves = getAllLegalMovesSync(board, aiColor);
                    if (moves.length > 0) {
                        const m = moves[Math.floor(Math.random() * moves.length)];
                        movePiece(m.from.r, m.from.c, m.to.r, m.to.c, 'q');
                    }
                }
            };
        }

        // ==================== GAME LOGIC ====================
        function getInitialBoardForColor(colorChoice) {
            // Δημιουργία board από το START_POSITION, με αντιστροφή αν ο παίκτης είναι μαύρα
            let pos = START_POSITION;
            if (colorChoice === 'b') {
                // Αντιστροφή γραμμών και στηλών ώστε με το rotate να είναι σωστή η θέση
                pos = START_POSITION.map(row => [...row].reverse()).reverse();
            }
            return pos.map(r => r.map(ch => ch ? { type: ch.toLowerCase(), color: ch === ch.toUpperCase() ? 'w' : 'b' } : null));
        }

        function initGame(colorChoice) {
            console.log('🎮 initGame:', colorChoice);
            initAudio();
            initWorker();

            colorChoice = colorChoice === 'random' ? (Math.random()<0.5?'white':'black') : colorChoice;
            playerColor = colorChoice === 'white' ? 'w' : 'b';
            aiColor = playerColor === 'w' ? 'b' : 'w';
            board = getInitialBoardForColor(playerColor);
            whiteToMove = true; selected = null; legalMoves = []; gameActive = true;
            kingInCheck = false; aiThinking = false; promotionPending = null;
            whiteTimeLeft = TIME_CONTROL; blackTimeLeft = TIME_CONTROL; lastTimerTick = Date.now();
            isDailyChallenge = false; postGamePending = false; undoUsed = false;

            startTimer();
            updateTimerDisplay(); updateEvalBar();

            if (aiColor === 'w') setTimeout(makeAIMove, 500);

                showPostGame(playerColor === 'w' ? 'Black' : 'White', 'resign');
            });
        }

        function loadDailyChallenge() {
            initAudio();
            initWorker();
            playerColor = 'w'; aiColor = 'b';
            board = getInitialBoardForColor('w'); // daily είναι πάντα λευκά
            whiteToMove = true; selected = null; legalMoves = []; gameActive = true;
            kingInCheck = false; aiThinking = false; promotionPending = null;
            whiteTimeLeft = TIME_CONTROL; blackTimeLeft = TIME_CONTROL; lastTimerTick = Date.now();
            isDailyChallenge = true; postGamePending = false; undoUsed = false;
            moveHistory = []; notationList.innerHTML = '';
            clearInterval(timerInterval); timerInterval = null;
            startTimer();
            updateTimerDisplay(); updateEvalBar();
            document.querySelector('.board').classList.remove('flipped');
            gameStatusEl.textContent = '📅 Daily: Mate in 1';

                if (!gameActive) return;
                gameActive = false; clearInterval(timerInterval); timerInterval = null;
                showPostGame('AI', 'daily_fail');
            });
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            lastTimerTick = Date.now();
            timerInterval = setInterval(() => {
                if (!gameActive || postGamePending || promotionPending) { lastTimerTick = Date.now(); return; }
                const now = Date.now();
                const elapsed = Math.floor((now - lastTimerTick) / 1000);
                if (elapsed >= 1) {
                    if (whiteToMove) {
                        whiteTimeLeft = Math.max(0, whiteTimeLeft - elapsed);
                        if (whiteTimeLeft <= 0) {
                            gameActive = false;
                            clearInterval(timerInterval); timerInterval = null;
                            showPostGame('Black', 'timeout');
                            return;
                        }
                    } else {
                        blackTimeLeft = Math.max(0, blackTimeLeft - elapsed);
                        if (blackTimeLeft <= 0) {
                            gameActive = false;
                            clearInterval(timerInterval); timerInterval = null;
                            showPostGame('White', 'timeout');
                            return;
                        }
                    }
                    lastTimerTick = now;
                }
                updateTimerDisplay();
                saveGame();
            }, 250);
        }

        function updateTimerDisplay() {
            const fmt = s => { const m = Math.floor(s/60), sec = s%60; return `${m}:${sec.toString().padStart(2,'0')}`; };
            whiteTimeEl.textContent = fmt(Math.max(0, whiteTimeLeft));
            blackTimeEl.textContent = fmt(Math.max(0, blackTimeLeft));
            whiteTimeEl.classList.toggle('low', whiteTimeLeft < 30);
            blackTimeEl.classList.toggle('low', blackTimeLeft < 30);
            if (gameActive && !timerInterval) startTimer();
        }

        function saveGame() {
            if (!gameActive) { localStorage.removeItem('chess_saved'); return; }
            localStorage.setItem('chess_saved', JSON.stringify({
                board, whiteToMove, aiColor, playerColor, gameActive,
                whiteTimeLeft, blackTimeLeft, isDailyChallenge,
                moveHistory, undoUsed, currentDifficulty
            }));
        }

        function loadGame() {
            const s = localStorage.getItem('chess_saved');
            if (!s) return false;
            try {
                const d = JSON.parse(s);
                board = d.board; whiteToMove = d.whiteToMove; aiColor = d.aiColor;
                playerColor = d.playerColor; gameActive = d.gameActive;
                whiteTimeLeft = d.whiteTimeLeft; blackTimeLeft = d.blackTimeLeft;
                isDailyChallenge = d.isDailyChallenge;
                moveHistory = d.moveHistory || []; undoUsed = d.undoUsed || false;
                if (d.currentDifficulty) {
                    currentDifficulty = d.currentDifficulty;
                    aiDepth = currentDifficulty === 'medium' ? 2 : 3;
                }
                notationList.innerHTML = '';
                moveHistory.forEach(m => notationList.appendChild(Object.assign(document.createElement('div'), { textContent: m.text })));
                lastTimerTick = Date.now();
                return true;
            } catch(e) { return false; }
        }

        function makeAIMove() {
            if (!gameActive || postGamePending || aiThinking || promotionPending) {
                console.log('⚠️ makeAIMove: blocked', { gameActive, postGamePending, aiThinking, promotionPending });
                return;
            }
            if (whiteToMove !== (aiColor === 'w')) {
                console.log('⚠️ makeAIMove: not AI turn');
                return;
            }

            console.log('🤖 makeAIMove: requesting AI move...');
            aiThinking = true;
            aiFooter.style.display = 'block';

            if (aiTimeoutId) clearTimeout(aiTimeoutId);
            aiTimeoutId = setTimeout(() => {
                console.error('⏰ AI timeout! Using fallback.');
                aiFooter.style.display = 'none';
                aiThinking = false;

                if (!gameActive) return;

                try { aiWorker.terminate(); } catch(e) {}
                aiWorker = null;
                initWorker();

                const moves = getAllLegalMovesSync(board, aiColor);
                if (moves.length > 0) {
                    const m = moves[Math.floor(Math.random() * moves.length)];
                    movePiece(m.from.r, m.from.c, m.to.r, m.to.c, 'q');
                }
            }, WORKER_TIMEOUT);

            const boardCopy = board.map(r => r.map(c => c ? { ...c } : null));
            aiWorker.postMessage({ board: boardCopy, aiColor, depth: aiDepth });
        }

        // ==================== RENDER ====================
        function render() {
            boardEl.innerHTML = '';
            let kp = null;
            if (kingInCheck) {
                const col = whiteToMove ? 'w' : 'b';
                for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                    if (board[r][c]?.type==='k' && board[r][c].color===col) { kp={r,c}; break; }
                }
            }
            for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
                const sq = document.createElement('div');
                sq.className = 'square '+((r+c)%2?'sq-dark':'sq-light');
                sq.dataset.r = r; sq.dataset.c = c;
                if (kp && kp.r===r && kp.c===c) sq.classList.add('check');
                if (legalMoves.some(m=>m.r===r&&m.c===c)) sq.classList.add('move-dot');
                if (selected?.r===r && selected?.c===c) sq.classList.add('highlight');
                const p = board[r][c];
                if (p) {
                    const img = document.createElement('img');
                    img.src = getPieceImg(p.type, p.color);
                    img.className = 'piece'; img.draggable = true;
                    if (gameActive && !aiThinking && !promotionPending && whiteToMove !== (aiColor==='w')) {
                        img.addEventListener('click', e => { e.stopPropagation(); handleClick(r,c); });
                    }
                    sq.appendChild(img);
                }
                if (gameActive && !aiThinking && !promotionPending && whiteToMove !== (aiColor==='w')) {
                    sq.addEventListener('click', () => handleClick(r,c));
                }
                boardEl.appendChild(sq);
            }
            gameStatusEl.textContent = gameActive ? `${whiteToMove?'White':'Black'}'s turn` : '';
            updateTimerDisplay(); updateEvalBar();
        }

        function handleClick(r, c) {
            if (!gameActive || postGamePending || aiThinking || promotionPending) return;
            if (whiteToMove === (aiColor==='w')) return;

            console.log(`🖱️ handleClick: (${r},${c})`, selected);

            if (selected && legalMoves.some(m=>m.r===r&&m.c===c)) {
                movePiece(selected.r, selected.c, r, c);
                selected = null; legalMoves = [];
                if (gameActive && !postGamePending && !promotionPending && whiteToMove === (aiColor==='w')) {
                    setTimeout(makeAIMove, 300);
                }
                return;
            }

            const p = board[r][c];
            if (p && p.color === (whiteToMove?'w':'b')) {
                selected = {r,c}; legalMoves = getLegalMoves(r,c);
            } else { selected = null; legalMoves = []; }
            render();
        }

        // ==================== MOVE PIECE (με PROMOTION UI) ====================
        function movePiece(sr, sc, tr, tc, promotionType) {
            console.log(`♟️ movePiece: (${sr},${sc}) -> (${tr},${tc}) promotion:${promotionType || 'none'}`);

            selected = null;
            legalMoves = [];

            const captured = board[tr][tc];
            board[tr][tc] = board[sr][sc];
            board[sr][sc] = null;

            const piece = board[tr][tc];
            if (piece && piece.type === 'p' && (tr === 0 || tr === 7)) {
                if (promotionType) {
                    piece.type = promotionType;
                } else {
                    promotionPending = { r: tr, c: tc, color: piece.color };
                    requestAnimationFrame(() => render());
                    showPromotionUI(piece.color);
                    return;
                }
            }

            finalizeMove(sr, sc, tr, tc, captured);
        }

        function finalizeMove(sr, sc, tr, tc, captured) {
            whiteToMove = !whiteToMove;

            requestAnimationFrame(() => {
                render();
                if (captured) { sfxCapture(); haptic('heavy'); }
                else { sfxMove(); haptic('light'); }
                addNotation({ from: {r:sr,c:sc}, to: {r:tr,c:tc} }, captured);
                checkGameState();
                if (kingInCheck) sfxCheck();
                saveGame();
            });
        }

        function showPromotionUI(color) {
            promotionDialog.innerHTML = '';
            const pieces = ['q', 'r', 'b', 'n'];
            const names = { q: 'Queen', r: 'Rook', b: 'Bishop', n: 'Knight' };

            const promoR = promotionPending.r, promoC = promotionPending.c;

            pieces.forEach(type => {
                const option = document.createElement('div');
                option.className = 'promotion-option';
                option.innerHTML = `<img src="${getPieceImg(type, color)}" alt="${names[type]}">`;
                option.title = names[type];
                option.addEventListener('click', () => {
                    promotionOverlay.style.display = 'none';
                    board[promoR][promoC].type = type;
                    promotionPending = null;

                    whiteToMove = !whiteToMove;

                    requestAnimationFrame(() => {
                        render();
                        sfxMove();
                        haptic('light');
                        // Βρίσκουμε το from από την τελευταία κίνηση ή χρησιμοποιούμε default
                        const lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length-1] : null;
                        const dir = color === 'w' ? 1 : -1;
                        let fromR = promoR + dir;
                        let fromC = promoC;
                        const from = lastMove ? lastMove.move.to : {r: fromR, c: fromC};
                        addNotation({ from: from, to: {r: promoR, c: promoC} }, false);
                        checkGameState();
                        if (kingInCheck) sfxCheck();
                        saveGame();

                        if (gameActive && whiteToMove === (aiColor === 'w')) {
                            setTimeout(makeAIMove, 300);
                        }
                    });
                });
                promotionDialog.appendChild(option);
            });

            promotionOverlay.style.display = 'flex';
        }

        function getLegalMoves(r, c) {
            return getMovesSync(board, r, c).filter(m => {
                const orig = board[m.r][m.c], piece = board[r][c];
                board[m.r][m.c] = piece; board[r][c] = null;
                const inCheck = isKingInCheckSync(board, piece.color);
                board[r][c] = piece; board[m.r][m.c] = orig;
                return !inCheck;
            });
        }

        function checkGameState() {
            const color = whiteToMove ? 'w' : 'b';
            kingInCheck = isKingInCheckSync(board, color);
            const hasMoves = getAllLegalMovesSync(board, color).length > 0;

            if (!hasMoves) {
                postGamePending = true;
                const winner = kingInCheck ? (color === 'w' ? 'Black' : 'White') : null;
                const resultType = kingInCheck ? 'checkmate' : 'stalemate';
                requestAnimationFrame(() => render());

                setTimeout(() => {
                    if (kingInCheck) {
                        gameStatusEl.innerHTML = `<span class="status-mate">Checkmate! ${winner} wins!</span>`;
                        sfxMate();
                    } else {
                        gameStatusEl.textContent = "Stalemate! It's a draw";
                    }
                    gameActive = false;
                    clearInterval(timerInterval); timerInterval = null;
                    showPostGame(winner, resultType);
                    postGamePending = false;
                }, 800);
            } else if (kingInCheck) {
                gameStatusEl.innerHTML = `<span class="status-check">${color==='w'?'White':'Black'} is in check!</span>`;
            } else {
                gameStatusEl.textContent = `${whiteToMove?'White':'Black'}'s turn`;
            }
        }

        // ==================== SYNCHRONOUS HELPERS ====================
        function getMovesSync(b, r, c) {
            const p = b[r][c]; if (!p) return [];
            const m = [], col = p.color, d = col === 'w' ? -1 : 1;
            const ib = (rr,cc) => rr>=0&&rr<8&&cc>=0&&cc<8;
            const em = (rr,cc) => ib(rr,cc) && !b[rr][cc];
            const en = (rr,cc) => ib(rr,cc) && b[rr][cc] && b[rr][cc].color !== col;
            if (p.type==='p') {
                if (em(r+d,c)) m.push({r:r+d,c});
                if ((col==='w'&&r===6||col==='b'&&r===1) && em(r+d,c) && em(r+2*d,c)) m.push({r:r+2*d,c});
                [-1,1].forEach(dc => { if (en(r+d,c+dc)) m.push({r:r+d,c:c+dc}); });
            }
            if (p.type==='n') {
                [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr,dc]) => {
                    if (ib(r+dr,c+dc) && (!b[r+dr][c+dc] || en(r+dr,c+dc))) m.push({r:r+dr,c:c+dc});
                });
            }
            if (['b','r','q'].includes(p.type)) {
                const dirs = [];
                if (['b','q'].includes(p.type)) dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
                if (['r','q'].includes(p.type)) dirs.push([-1,0],[1,0],[0,-1],[0,1]);
                dirs.forEach(([dr,dc]) => {
                    let rr=r+dr, cc=c+dc;
                    while (ib(rr,cc)) {
                        if (!b[rr][cc]) m.push({r:rr,c:cc});
                        else { if (en(rr,cc)) m.push({r:rr,c:cc}); break; }
                        rr+=dr; cc+=dc;
                    }
                });
            }
            if (p.type==='k') {
                for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
                    if ((dr || dc) && ib(r+dr, c+dc) && (!b[r+dr][c+dc] || en(r+dr, c+dc))) {
                        m.push({r:r+dr,c:c+dc});
                    }
                }
            }
            return m;
        }
        function isKingInCheckSync(b, col) {
            let kp = null;
            for (let r=0;r<8;r++) for (let c=0;c<8;c++) if (b[r][c]?.type==='k' && b[r][c].color===col) { kp={r,c}; break; }
            if (!kp) return false;
            for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                if (b[r][c] && b[r][c].color!==col && getMovesSync(b,r,c).some(m=>m.r===kp.r&&m.c===kp.c)) return true;
            }
            return false;
        }
        function getAllLegalMovesSync(b, col) {
            const moves = [];
            for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                if (b[r][c] && b[r][c].color === col) {
                    getMovesSync(b,r,c).filter(m => {
                        const orig = b[m.r][m.c], piece = b[r][c];
                        b[m.r][m.c] = piece; b[r][c] = null;
                        const ck = isKingInCheckSync(b, piece.color);
                        b[r][c] = piece; b[m.r][m.c] = orig;
                        return !ck;
                    }).forEach(to => moves.push({from:{r,c},to}));
                }
            }
            return moves;
        }
        function getPieceImg(t, c) {
            const map = { pw:'4/45/Chess_plt45.svg', pb:'c/c7/Chess_pdt45.svg', rw:'7/72/Chess_rlt45.svg', rb:'f/ff/Chess_rdt45.svg', nw:'7/70/Chess_nlt45.svg', nb:'e/ef/Chess_ndt45.svg', bw:'b/b1/Chess_blt45.svg', bb:'9/98/Chess_bdt45.svg', qw:'1/15/Chess_qlt45.svg', qb:'4/47/Chess_qdt45.svg', kw:'4/42/Chess_klt45.svg', kb:'f/f0/Chess_kdt45.svg' };
            return `https://upload.wikimedia.org/wikipedia/commons/${map[t+c]}`;
        }

        // ==================== POST-GAME (με Monetag Ad) ====================
        function showPostGame(winner, resultType) {
            gameActive = false; aiThinking = false; promotionPending = null;
            clearInterval(timerInterval); timerInterval = null;
            aiFooter.style.display = 'none';
            promotionOverlay.style.display = 'none';
            if (aiTimeoutId) { clearTimeout(aiTimeoutId); aiTimeoutId = null; }
            localStorage.removeItem('chess_saved'); hideMainButton();

            let baseScore = 0, title = '', message = '';
            const isPlayerWin = winner && ((playerColor==='w'&&winner==='White')||(playerColor==='b'&&winner==='Black'));

            if (resultType === 'checkmate') {
                baseScore = isPlayerWin ? 100 : 0;
                title = isPlayerWin ? '🎉 You Win!' : '😞 AI Wins';
                message = isPlayerWin ? 'Checkmate!' : 'AI checkmated you.';
            } else if (resultType === 'stalemate') { baseScore = 25; title = '🤝 Draw'; message = 'Stalemate.'; }
            else if (resultType === 'timeout') { baseScore = isPlayerWin ? 75 : 0; title = isPlayerWin ? '⏰ Win on Time' : '⏰ Time Out'; }
            else if (resultType === 'resign') { baseScore = 0; title = '🏳️ Resigned'; }
            else if (resultType === 'daily_fail') { baseScore = 0; title = '📅 Challenge Failed'; }

            if (isPlayerWin && resultType === 'checkmate') {
                const streak = getWinStreak() + 1; setWinStreak(streak);
                updateLeaderboard(streak); addTotalWin(); addDailyWin();
                if (streak >= 5) { baseScore = Math.floor(baseScore * 2); message += ` 🔥 ${streak}x (2x)`; }
                else if (streak >= 3) { baseScore = Math.floor(baseScore * 1.5); message += ` ⚡ ${streak}x (1.5x)`; }
            } else if (!isPlayerWin && resultType !== 'stalemate') { setWinStreak(0); }

            document.getElementById('postGameTitle').textContent = title;
            document.getElementById('postGameMessage').textContent = message;
            document.getElementById('streakInfo').innerHTML = getWinStreak() >= 2 ? `<span class="streak-badge">🔥 ${getWinStreak()}</span>` : '';
            const levelUpInfo = document.getElementById('levelUpInfo');
            levelUpInfo.style.display = 'none';
            if (isPlayerWin && resultType === 'checkmate') {
                const prevWins = getTotalWins() - 1;
                let prevLevel = 'Rookie';
                for (let i = LEVELS.length-1; i >= 0; i--) if (prevWins >= LEVELS[i].min) { prevLevel = LEVELS[i].name; break; }
                if (prevLevel !== getLevel().name) {
                    levelUpInfo.textContent = `⬆️ Level Up: ${getLevel().name}!`;
                    levelUpInfo.style.display = 'block';
                }
            }
            updateDailyUI(); updateLevelUI(); updateStreakUI();

            postGameModal.style.display = 'flex';

            showAdThen(() => {
                console.log('📺 Ad completed or skipped');
            });

            if (baseScore > 0) sendScoreToBackend(baseScore, resultType);
        }

        // ==================== EVENT LISTENERS ====================
        // Difficulty buttons
        document.querySelectorAll('.diff-btn').forEach(b => b.addEventListener('click', () => {
            document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            currentDifficulty = b.dataset.diff;
            aiDepth = currentDifficulty === 'medium' ? 2 : 3;
            document.getElementById('difficultyLabel').textContent = `Difficulty: ${currentDifficulty === 'medium' ? 'Medium' : 'Hard'}`;
        }));

        // Color buttons
        document.querySelectorAll('.color-btn').forEach(b => b.addEventListener('click', () => {
            document.querySelectorAll('.color-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }));

        document.getElementById('startGameBtn').addEventListener('click', () => {
            setupModal.style.display = 'none';
            initGame(document.querySelector('.color-btn.active').dataset.color);
        });
        document.getElementById('resumeGameBtn').addEventListener('click', () => {
            if (loadGame()) {
                setupModal.style.display = 'none';
                document.querySelector('.board').classList.toggle('flipped', playerColor === 'b');
                document.getElementById('difficultyLabel').textContent = `Difficulty: ${currentDifficulty === 'medium' ? 'Medium' : 'Hard'}`;
                startTimer(); updateTimerDisplay(); updateEvalBar(); render(); updateUndoButton();
                if (gameActive && whiteToMove === (aiColor==='w')) setTimeout(makeAIMove, 400);
                setupMainButton('🏳️ Resign', () => {
                    if (!gameActive) return;
                    gameActive = false; clearInterval(timerInterval); timerInterval = null;
                    showPostGame(playerColor==='w'?'Black':'White', 'resign');
                });
            }
        });
        document.getElementById('dailyChallengeBtn').addEventListener('click', () => { setupModal.style.display = 'none'; loadDailyChallenge(); });
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            showAdThen(() => {
                postGameModal.style.display = 'none';
                setupModal.style.display = 'flex';
                checkSaved();
            });
        });
        document.getElementById('menuBtn').addEventListener('click', () => {
            showAdThen(() => {
                postGameModal.style.display = 'none';
                setupModal.style.display = 'flex';
                checkSaved();
            });
        });
        document.getElementById('leaderboardBtn').addEventListener('click', showLeaderboard);
        document.getElementById('closeLbBtn').addEventListener('click', () => document.getElementById('leaderboardModal').style.display = 'none');
        undoBtn.addEventListener('click', undoLastMove);

        promotionOverlay.addEventListener('click', (e) => {
            if (e.target === promotionOverlay) {
                // Default: Queen
                const promoR = promotionPending.r, promoC = promotionPending.c;
                board[promoR][promoC].type = 'q';
                promotionPending = null;
                promotionOverlay.style.display = 'none';
                whiteToMove = !whiteToMove;
                requestAnimationFrame(() => {
                    render();
                    sfxMove();
                    const lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length-1] : null;
                    const dir = board[promoR][promoC].color === 'w' ? 1 : -1;
                    let fromR = promoR + dir;
                    let fromC = promoC;
                    const from = lastMove ? lastMove.move.to : {r: fromR, c: fromC};
                    addNotation({ from: from, to: {r: promoR, c: promoC} }, false);
                    checkGameState();
                    saveGame();
                    if (gameActive && whiteToMove === (aiColor === 'w')) {
                        setTimeout(makeAIMove, 300);
                    }
                });
            }
        });

        function checkSaved() {
            const has = !!localStorage.getItem('chess_saved');
            document.getElementById('savedGameInfo').style.display = has ? 'block' : 'none';
            document.getElementById('resumeGameBtn').style.display = has ? 'block' : 'none';
        }

        window.addEventListener('DOMContentLoaded', () => {
            initAudio(); initWorker();
            updateLevelUI(); updateStreakUI(); updateDailyUI();
            setupModal.style.display = 'flex'; checkSaved();
            document.getElementById('difficultyLabel').textContent = `Difficulty: ${currentDifficulty === 'medium' ? 'Medium' : 'Hard'}`;
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.setHeaderColor('#1e3c72');
            }
        });
        window.addEventListener('message', e => {
            if (e.data?.type === 'setUserId') { userId = e.data.userId; localStorage.setItem('franklymadear_userId', userId); }
        });
    </script>
