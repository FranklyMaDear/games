<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Deluxe Pro</title>
    <link rel="icon" type="image/png" sizes="32x32" href="index.png">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src='//libtl.com/sdk.js' data-zone='11108267' data-sdk='show_11108267'></script>
    <style>
        :root {
            --board-size: min(92vw, 92vh, 800px);
            --square-size: calc(var(--board-size) / 8);
            --piece-size: calc(var(--square-size) * 0.88);
            --dot-size: calc(var(--square-size) * 0.22);
            --perspective: 1200px;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(160deg, #0d1b2a 0%, #1b2838 30%, #1e3c72 60%, #2a5298 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 6px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            perspective: var(--perspective);
        }
        .container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 820px; gap: 8px;
        }
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: var(--board-size); gap: 8px;
            padding: 6px 10px; background: rgba(0,0,0,0.35); border-radius: 12px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
        }
        .level-badge {
            display: flex; align-items: center; gap: 6px;
            color: #ffcb2e; font-weight: 700; font-size: 13px;
            background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 20px;
            border: 1px solid rgba(255,203,46,0.3);
            text-shadow: 0 0 8px rgba(255,203,46,0.4);
        }
        .streak-badge {
            display: flex; align-items: center; gap: 4px;
            color: #ff6b6b; font-weight: 700; font-size: 12px;
            background: rgba(255,107,107,0.15); padding: 5px 10px; border-radius: 20px;
            border: 1px solid rgba(255,107,107,0.3);
        }
        .daily-mission-bar {
            width: 100%; max-width: var(--board-size);
            background: rgba(0,0,0,0.35); border-radius: 10px; padding: 8px 14px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 10px;
        }
        .daily-mission-label {
            color: #e0e0e0; font-size: 12px; font-weight: 600; white-space: nowrap;
        }
        .daily-mission-track {
            flex: 1; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden;
        }
        .daily-mission-fill {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 12px rgba(76,175,80,0.5);
        }
        .daily-mission-count {
            color: #ffcb2e; font-weight: 700; font-size: 13px; min-width: 36px; text-align: center;
        }
        .daily-mission-reward {
            background: linear-gradient(135deg, #ffcb2e, #ff9f00); color: #000;
            padding: 6px 12px; border-radius: 20px; font-weight: 700; font-size: 11px;
            cursor: pointer; border: none;
            box-shadow: 0 4px 0 #b37400, 0 6px 15px rgba(0,0,0,0.4);
            transition: all 0.2s; white-space: nowrap;
            transform: translateZ(4px);
        }
        .daily-mission-reward:active { transform: translateY(3px) translateZ(2px); box-shadow: 0 1px 0 #b37400, 0 3px 8px rgba(0,0,0,0.3); }
        .daily-mission-reward:disabled { opacity: 0.5; cursor: not-allowed; }
        .board-container {
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(145deg, #4a3820, #3a2e16);
            padding: 10px; border-radius: 16px;
            box-shadow:
                0 20px 50px rgba(0,0,0,0.5),
                0 4px 0 #2a1f0e,
                inset 0 1px 0 rgba(255,255,255,0.08);
            width: var(--board-size);
            transform: rotateX(2deg);
        }
        .board {
            width: var(--board-size); height: var(--board-size);
            display: grid; grid-template-columns: repeat(8, 1fr);
            border: 5px solid #2a1f0e;
            box-shadow:
                inset 0 0 30px rgba(0,0,0,0.6),
                0 8px 0 #1a1008,
                0 12px 25px rgba(0,0,0,0.5);
            border-radius: 3px;
        }
        .square {
            position: relative; width: var(--square-size); height: var(--square-size);
            display: flex; align-items: center; justify-content: center;
            transition: box-shadow 0.15s;
        }
        .sq-light { background: #e8d5b7; }
        .sq-dark { background: #b58863; }
        .sq-light:hover, .sq-dark:hover { filter: brightness(1.08); }
        .piece {
            width: var(--piece-size); height: var(--piece-size);
            cursor: grab; transition: transform 0.12s, filter 0.12s;
            user-select: none; -webkit-user-select: none;
            filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.45));
            z-index: 2;
        }
        .piece:active { cursor: grabbing; transform: scale(1.12); filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.55)); }
        .highlight {
            box-shadow: inset 0 0 0 4px #ffcb2e, inset 0 0 12px rgba(255,203,46,0.4);
            animation: glowPulse 0.8s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,100% { box-shadow: inset 0 0 0 4px #ffcb2e, inset 0 0 12px rgba(255,203,46,0.4); }
            50% { box-shadow: inset 0 0 0 5px #ffe066, inset 0 0 18px rgba(255,203,46,0.6); }
        }
        .move-dot::after {
            content: ''; position: absolute; width: var(--dot-size); height: var(--dot-size);
            border-radius: 50%; background: rgba(0,0,0,0.22);
            z-index: 1;
        }
        .check {
            box-shadow: inset 0 0 0 4px #ff3333, inset 0 0 16px rgba(255,51,51,0.5) !important;
            animation: checkPulse 0.6s ease-in-out infinite !important;
        }
        @keyframes checkPulse {
            0%,100% { box-shadow: inset 0 0 0 4px #ff3333, inset 0 0 16px rgba(255,51,51,0.5); }
            50% { box-shadow: inset 0 0 0 7px #ff5555, inset 0 0 24px rgba(255,51,51,0.7); }
        }
        .game-info {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; padding: 6px 8px; gap: 8px; color: #fff;
            font-size: 13px; font-weight: 600;
        }
        .timer {
            color: #ffcb2e; font-weight: 700; font-size: 15px;
            background: rgba(0,0,0,0.4); padding: 5px 14px; border-radius: 20px;
            border: 1px solid rgba(255,203,46,0.25);
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
            transform: translateZ(3px);
        }
        .timer.low { color: #ff4444; border-color: rgba(255,68,68,0.4); animation: timerBlink 0.5s infinite; }
        @keyframes timerBlink { 50% { opacity: 0.4; } }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
            display: none; justify-content: center; align-items: center;
            z-index: 100; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn {
            0% { transform: translateZ(-100px) scale(0.8); opacity: 0; }
            70% { transform: translateZ(20px) scale(1.03); opacity: 1; }
            100% { transform: translateZ(0) scale(1); opacity: 1; }
        }
        .modal-content {
            background: linear-gradient(160deg, #3a2e16, #2a1f0e);
            padding: 24px 20px; border-radius: 18px;
            max-width: 92%; width: 420px; text-align: center;
            box-shadow:
                0 25px 60px rgba(0,0,0,0.6),
                0 0 0 3px #d19a4c,
                0 0 40px rgba(209,154,76,0.3);
            animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            transform-style: preserve-3d;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content h2 { color: #ffcb2e; margin-top: 0; text-shadow: 0 2px 6px rgba(0,0,0,0.4); }
        .modal-content h3 { color: #e0c080; margin: 8px 0; font-size: 15px; }
        .modal-options { display: flex; flex-direction: column; gap: 7px; margin: 12px 0; }
        .modal-btn {
            width: 100%; padding: 13px; border: none; border-radius: 12px;
            background: #5d4037; color: white; font-weight: 700; cursor: pointer;
            font-size: 15px; transition: all 0.2s;
            box-shadow: 0 4px 0 #3e2723, 0 6px 12px rgba(0,0,0,0.3);
            transform: translateZ(3px);
        }
        .modal-btn:active { transform: translateY(3px) translateZ(1px); box-shadow: 0 1px 0 #3e2723, 0 3px 6px rgba(0,0,0,0.3); }
        .modal-btn.active { background: #d19a4c; box-shadow: 0 4px 0 #8b6914, 0 6px 15px rgba(209,154,76,0.4); }
        .start-btn { background: #4CAF50; box-shadow: 0 4px 0 #2e7d32, 0 6px 15px rgba(76,175,80,0.4); font-size: 18px; margin-top: 8px; }
        .status-mate { color: #ff4444; font-weight: 800; font-size: 1.1em; text-shadow: 0 0 12px rgba(255,68,68,0.5); }
        .status-check { color: #ff8c00; font-weight: 700; animation: checkPulse 0.8s infinite; }
        .thinking-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 180; pointer-events: none;
        }
        .thinking-box {
            background: rgba(0,0,0,0.85); color: #ffcb2e; padding: 16px 28px;
            border-radius: 16px; font-size: 17px; font-weight: 700;
            border: 2px solid rgba(255,203,46,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 30px rgba(255,203,46,0.2);
            animation: thinkPulse 1.5s infinite;
        }
        @keyframes thinkPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.75; } }
        .leaderboard-modal .modal-content { width: 440px; }
        .lb-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
            color: #e0e0e0; font-size: 14px;
        }
        .lb-rank { font-weight: 800; color: #ffcb2e; min-width: 40px; }
        .lb-name { flex: 1; text-align: left; margin: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-streak { font-weight: 700; color: #ff6b6b; min-width: 50px; text-align: right; }
        @media (max-width: 600px) {
            .stats-bar { font-size: 11px; padding: 5px 8px; }
            .timer { font-size: 13px; padding: 4px 10px; }
            .game-info { font-size: 11px; }
            .modal-content { width: 95%; padding: 18px 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Stats Bar -->
        <div class="stats-bar" id="statsBar">
            <div class="level-badge" id="levelBadge">🏅 Rookie</div>
            <div class="streak-badge" id="streakBadge" style="display:none;">🔥 0</div>
            <button class="modal-btn" id="leaderboardBtn" style="width:auto;padding:6px 14px;font-size:12px;border-radius:20px;">🏆 Top 10</button>
        </div>

        <!-- Daily Mission Bar -->
        <div class="daily-mission-bar" id="dailyMissionBar">
            <span class="daily-mission-label">📋 Daily: 3 Wins</span>
            <div class="daily-mission-track"><div class="daily-mission-fill" id="dailyMissionFill" style="width:0%;"></div></div>
            <span class="daily-mission-count" id="dailyMissionCount">0/3</span>
            <button class="daily-mission-reward" id="dailyClaimBtn" disabled>🎁 Claim</button>
        </div>

        <!-- Board -->
        <div class="board-container">
            <div class="game-info">
                <span id="gameStatus">White's turn</span>
                <span class="timer" id="whiteTime">5:00</span>
                <span style="color:#aaa;">vs</span>
                <span class="timer" id="blackTime">5:00</span>
            </div>
            <div id="board" class="board"></div>
        </div>
    </div>

    <!-- Setup Modal -->
    <div class="modal-overlay" id="setupModal">
        <div class="modal-content">
            <h2>♕ Chess vs AI ♛</h2>
            <p style="color:#ccc;">Extreme Difficulty • 5 min each</p>
            <div class="modal-options">
                <h3>Choose Your Color</h3>
                <button class="modal-btn color-btn active" data-color="white">⚪ White</button>
                <button class="modal-btn color-btn" data-color="black">⚫ Black</button>
                <button class="modal-btn color-btn" data-color="random">🎲 Random</button>
            </div>
            <p id="savedGameInfo" style="color:#4CAF50;display:none;">↩️ Saved game found!</p>
            <button class="modal-btn start-btn" id="startGameBtn">New Game</button>
            <button class="modal-btn" id="resumeGameBtn" style="display:none;background:#2196F3;">Resume</button>
            <button class="modal-btn" id="dailyChallengeBtn" style="background:#9C27B0;">📅 Daily Challenge</button>
        </div>
    </div>

    <!-- Post-Game Modal -->
    <div class="modal-overlay" id="postGameModal">
        <div class="modal-content">
            <h2 id="postGameTitle">🎉</h2>
            <p id="postGameMessage"></p>
            <p id="streakInfo"></p>
            <p id="levelUpInfo" style="color:#ffcb2e;display:none;"></p>
            <button class="modal-btn" id="playAgainBtn" style="background:#4CAF50;">New Game</button>
            <button class="modal-btn" id="menuBtn">Menu</button>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div class="modal-overlay leaderboard-modal" id="leaderboardModal">
        <div class="modal-content">
            <h2>🏆 Top Win Streaks</h2>
            <div id="leaderboardList"></div>
            <button class="modal-btn" id="closeLbBtn" style="margin-top:10px;">Close</button>
        </div>
    </div>

    <!-- Thinking Overlay -->
    <div class="thinking-overlay" id="thinkingOverlay"><div class="thinking-box">🤔 AI is thinking...</div></div>

    <script>
        // ==================== CONFIG ====================
        const API = "https://franklymadear-games.hf.space";
        const API_KEY = "m0n3t4g_s3cur3_k3y_2026";
        const TIME_CONTROL = 300;
        const DAILY_WINS_NEEDED = 3;
        const DAILY_REWARD = 150;

        // ==================== USER ID ====================
        let userId = localStorage.getItem('franklymadear_userId');
        if (!userId && window.Telegram?.WebApp?.initDataUnsafe?.user) {
            userId = 'tg_' + window.Telegram.WebApp.initDataUnsafe.user.id;
            localStorage.setItem('franklymadear_userId', userId);
        }
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
            localStorage.setItem('franklymadear_userId', userId);
        }

        const apiCall = (m, p, b) => fetch(API+p, { method:m, headers:{'Content-Type':'application/json','X-API-Key':API_KEY}, body:b?JSON.stringify(b):null }).then(r=>r.json());
        const notifyHub = (type, data) => { if(window.parent!==window) window.parent.postMessage({type, ...data}, '*'); };

        async function sendScoreToBackend(score, gameResult) {
            if (!userId) return;
            try {
                await apiCall('POST', '/add-points', { userId, game: 'Chess', points: score });
                await apiCall('POST', '/missions/update', { userId, game: 'chess', score, playtime: 1, words: 0 });
                if (window.parent !== window) {
                    if (gameResult === 'checkmate') {
                        window.parent.postMessage({ type: 'updateMission', game: 'chess', result: 'win' }, '*');
                    }
                    window.parent.postMessage({ type: 'gameScore', game: 'Chess', score }, '*');
                }
            } catch(e) { console.warn('API error:', e); }
        }

        // ==================== AUDIO & HAPTICS ====================
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(f, d, t='sine', v=0.1) {
            if (!audioCtx) return;
            const o=audioCtx.createOscillator(), g=audioCtx.createGain();
            o.connect(g);g.connect(audioCtx.destination);
            o.type=t;o.frequency.setValueAtTime(f,audioCtx.currentTime);
            g.gain.setValueAtTime(v,audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
            o.start();o.stop(audioCtx.currentTime+d);
        }
        function sfxMove(){ playTone(600,0.08); }
        function sfxCapture(){ playTone(800,0.12,'triangle'); }
        function sfxCheck(){ playTone(1200,0.12);setTimeout(()=>playTone(900,0.12),80); }
        function sfxMate(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.25,'sine',0.15),i*100)); }
        function sfxClaim(){ [440,554,660,880].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sine',0.12),i*80)); }
        function haptic(type='medium'){ window.Telegram?.WebApp?.HapticFeedback?.impactOccurred(type); }

        // ==================== TELEGRAM MAIN BUTTON ====================
        function setupMainButton(text, cb) {
            if (window.Telegram?.WebApp?.MainButton) {
                const mb = window.Telegram.WebApp.MainButton;
                mb.setText(text); mb.show(); mb.onClick(cb); return mb;
            }
            return null;
        }
        function hideMainButton(){ window.Telegram?.WebApp?.MainButton?.hide(); }

        // ==================== LEVEL SYSTEM ====================
        const LEVELS = [
            { name: 'Rookie', min: 0 },
            { name: 'Beginner', min: 10 },
            { name: 'Intermediate', min: 25 },
            { name: 'Advanced', min: 50 },
            { name: 'Expert', min: 100 },
            { name: 'Master', min: 200 },
            { name: 'Grandmaster', min: 500 }
        ];
        function getTotalWins() { return parseInt(localStorage.getItem('chess_total_wins')||'0'); }
        function addTotalWin() { const w = getTotalWins()+1; localStorage.setItem('chess_total_wins', w.toString()); updateLevelUI(); return w; }
        function getLevel() {
            const wins = getTotalWins();
            for (let i = LEVELS.length-1; i >= 0; i--) if (wins >= LEVELS[i].min) return LEVELS[i];
            return LEVELS[0];
        }
        function updateLevelUI() {
            const lvl = getLevel();
            document.getElementById('levelBadge').textContent = `🏅 ${lvl.name}`;
        }

        // ==================== DAILY MISSIONS ====================
        function getDailyKey() { return 'chess_daily_' + new Date().toDateString(); }
        function getDailyWins() { return parseInt(localStorage.getItem(getDailyKey())||'0'); }
        function addDailyWin() {
            const key = getDailyKey(); const w = getDailyWins()+1;
            localStorage.setItem(key, w.toString()); updateDailyUI(); return w;
        }
        function isDailyClaimed() { return localStorage.getItem(getDailyKey()+'_claimed')==='true'; }
        function setDailyClaimed() { localStorage.setItem(getDailyKey()+'_claimed', 'true'); }
        function updateDailyUI() {
            const w = getDailyWins(), claimed = isDailyClaimed();
            const pct = Math.min(100, (w/DAILY_WINS_NEEDED)*100);
            document.getElementById('dailyMissionFill').style.width = pct+'%';
            document.getElementById('dailyMissionCount').textContent = `${Math.min(w,DAILY_WINS_NEEDED)}/${DAILY_WINS_NEEDED}`;
            const btn = document.getElementById('dailyClaimBtn');
            if (claimed) {
                btn.textContent = '✅ Done'; btn.disabled = true;
                btn.style.background = '#666'; btn.style.boxShadow = '0 3px 0 #444';
            } else if (w >= DAILY_WINS_NEEDED) {
                btn.textContent = '🎁 Claim'; btn.disabled = false;
                btn.style.background = 'linear-gradient(135deg, #ffcb2e, #ff9f00)';
            } else {
                btn.textContent = '🔒 Claim'; btn.disabled = true;
                btn.style.background = '#555'; btn.style.boxShadow = '0 3px 0 #333';
            }
        }

        document.getElementById('dailyClaimBtn').addEventListener('click', async () => {
            if (isDailyClaimed() || getDailyWins() < DAILY_WINS_NEEDED) return;
            setDailyClaimed();
            sfxClaim();
            haptic('heavy');
            await sendScoreToBackend(DAILY_REWARD, 'daily_mission');
            updateDailyUI();
            alert(`🎉 Daily Mission Complete! +${DAILY_REWARD} points!`);
        });

        // ==================== WIN STREAK ====================
        function getWinStreak() { return parseInt(localStorage.getItem('chess_streak')||'0'); }
        function setWinStreak(s) { localStorage.setItem('chess_streak', s.toString()); updateStreakUI(); }
        function updateStreakUI() {
            const s = getWinStreak();
            const badge = document.getElementById('streakBadge');
            if (s >= 2) {
                badge.style.display = 'flex'; badge.textContent = `🔥 ${s}`;
                if (s >= 5) badge.style.color = '#ff4444';
                else if (s >= 3) badge.style.color = '#ff8c00';
                else badge.style.color = '#ff6b6b';
            } else { badge.style.display = 'none'; }
        }

        // ==================== LEADERBOARD ====================
        function getLocalLeaderboard() {
            return JSON.parse(localStorage.getItem('chess_leaderboard')||'[]');
        }
        function updateLeaderboard(streak) {
            const lb = getLocalLeaderboard();
            const existing = lb.find(e => e.userId === userId);
            if (existing) { if (streak > existing.streak) existing.streak = streak; }
            else { lb.push({ userId, name: userId.substr(-6), streak }); }
            lb.sort((a,b) => b.streak - a.streak);
            const top10 = lb.slice(0, 10);
            localStorage.setItem('chess_leaderboard', JSON.stringify(top10));
        }
        function showLeaderboard() {
            const lb = getLocalLeaderboard();
            const html = lb.length ? lb.map((e,i) => `
                <div class="lb-row" style="${e.userId===userId?'background:rgba(255,203,46,0.1);border-radius:8px;':''}">
                    <span class="lb-rank">${i+1}. ${i===0?'🥇':i===1?'🥈':i===2?'🥉':''}</span>
                    <span class="lb-name">${e.userId===userId?'⭐ You':e.name}</span>
                    <span class="lb-streak">🔥 ${e.streak}</span>
                </div>`).join('') : '<p style="color:#aaa;">No players yet. Play to rank!</p>';
            document.getElementById('leaderboardList').innerHTML = html;
            document.getElementById('leaderboardModal').style.display = 'flex';
        }

        // ==================== DOM REFS ====================
        const boardEl = document.getElementById('board');
        const gameStatusEl = document.getElementById('gameStatus');
        const whiteTimeEl = document.getElementById('whiteTime');
        const blackTimeEl = document.getElementById('blackTime');
        const thinkingOverlay = document.getElementById('thinkingOverlay');
        const setupModal = document.getElementById('setupModal');
        const postGameModal = document.getElementById('postGameModal');
        const savedGameInfo = document.getElementById('savedGameInfo');
        const resumeGameBtn = document.getElementById('resumeGameBtn');

        // ==================== GAME STATE ====================
        const START_POSITION = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];
        const PIECE_VALUES = { p:100, n:320, b:330, r:500, q:900, k:20000 };
        const PAWN_TABLE = [
            [0,0,0,0,0,0,0,0],[50,50,50,50,50,50,50,50],[10,10,20,30,30,20,10,10],
            [5,5,10,25,25,10,5,5],[0,0,0,20,20,0,0,0],[5,-5,-10,0,0,-10,-5,5],
            [5,10,10,-20,-20,10,10,5],[0,0,0,0,0,0,0,0]
        ];
        const KNIGHT_TABLE = [
            [-50,-40,-30,-30,-30,-30,-40,-50],[-40,-20,0,0,0,0,-20,-40],
            [-30,0,10,15,15,10,0,-30],[-30,5,15,20,20,15,5,-30],
            [-30,0,15,20,20,15,0,-30],[-30,5,10,15,15,10,5,-30],
            [-40,-20,0,5,5,0,-20,-40],[-50,-40,-30,-30,-30,-30,-40,-50]
        ];

        let board = [], whiteToMove = true, selected = null, legalMoves = [];
        let gameActive = false, aiColor = 'b', playerColor = 'w', kingInCheck = false;
        let whiteTimeLeft = TIME_CONTROL, blackTimeLeft = TIME_CONTROL, timerInterval = null;
        let isDailyChallenge = false;
        let postGamePending = false; // Debounce για το game over bug

        // ==================== WEB WORKER ====================
        let aiWorker = null;
        function initWorker() {
            const code = `
                const V={p:100,n:320,b:330,r:500,q:900,k:20000};
                const PT=${JSON.stringify(PAWN_TABLE)}; const NT=${JSON.stringify(KNIGHT_TABLE)};
                function getMoves(b,r,c){const p=b[r][c];if(!p)return[];const m=[],col=p.color,d=col=='w'?-1:1;
                const ib=(rr,cc)=>rr>=0&&rr<8&&cc>=0&&cc<8;
                const em=(rr,cc)=>ib(rr,cc)&&!b[rr][cc];
                const en=(rr,cc)=>ib(rr,cc)&&b[rr][cc]&&b[rr][cc].color!=col;
                if(p.type=='p'){if(em(r+d,c))m.push({r:r+d,c});if((col=='w'&&r==6||col=='b'&&r==1)&&em(r+d,c)&&em(r+2*d,c))m.push({r:r+2*d,c});[-1,1].forEach(dc=>{if(en(r+d,c+dc))m.push({r:r+d,c:c+dc});});}
                if(p.type=='n'){[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr,dc])=>{const rr=r+dr,cc=c+dc;if(ib(rr,cc)&&(!b[rr][cc]||en(rr,cc)))m.push({r:rr,c:cc});});}
                if(['b','r','q'].includes(p.type)){const dirs=[];if(['b','q'].includes(p.type))dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);if(['r','q'].includes(p.type))dirs.push([-1,0],[1,0],[0,-1],[0,1]);dirs.forEach(([dr,dc])=>{let rr=r+dr,cc=c+dc;while(ib(rr,cc)){if(!b[rr][cc])m.push({r:rr,c:cc});else{if(en(rr,cc))m.push({r:rr,c:cc});break;}rr+=dr;cc+=dc;}});}
                if(p.type=='k'){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(dr||dc){const rr=r+dr,cc=c+dc;if(ib(rr,cc)&&(!b[rr][cc]||en(rr,cc)))m.push({r:rr,c:cc});}}}
                return m;}
                function isCheck(b,col){let kp=null;for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(p&&p.type=='k'&&p.color==col){kp={r,c};break;}}if(!kp)return false;for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(p&&p.color!=col&&getMoves(b,r,c).some(m=>m.r==kp.r&&m.c==kp.c))return true;}return false;}
                function legalMoves(b,r,c){return getMoves(b,r,c).filter(m=>{const o=b[m.r][m.c],p=b[r][c];b[m.r][m.c]=p;b[r][c]=null;const ck=isCheck(b,p.color);b[r][c]=p;b[m.r][m.c]=o;return!ck;});}
                function allMoves(b,col){const m=[];for(let r=0;r<8;r++)for(let c=0;c<8;c++){if(b[r][c]&&b[r][c].color==col)legalMoves(b,r,c).forEach(t=>m.push({from:{r,c},to:t}));}return m;}
                function evalBoard(b,ai){let s=0;for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(!p)continue;let v=V[p.type];const row=p.color=='w'?r:7-r;if(p.type=='p')v+=PT[row][c]*0.3;else if(p.type=='n')v+=NT[row][c]*0.3;s+=p.color==ai?v:-v;}return s+Math.random()*8-4;}
                function minimax(b,depth,a,beta,isMax,ai){
                    const col=isMax?ai:(ai=='w'?'b':'w');
                    if(depth==0)return evalBoard(b,ai);
                    const moves=allMoves(b,col);
                    if(moves.length==0)return isCheck(b,col)?(isMax?-99999:99999):0;
                    moves.sort((x,y)=>{const ca=b[x.to.r][x.to.c]?V[b[x.to.r][x.to.c].type]:0;const cb=b[y.to.r][y.to.c]?V[b[y.to.r][y.to.c].type]:0;return cb-ca;});
                    if(isMax){let best=-Infinity;for(const m of moves){const o=b[m.to.r][m.to.c],p=b[m.from.r][m.from.c];b[m.to.r][m.to.c]=p;b[m.from.r][m.from.c]=null;const v=minimax(b,depth-1,a,beta,false,ai);b[m.from.r][m.from.c]=p;b[m.to.r][m.to.c]=o;best=Math.max(best,v);a=Math.max(a,v);if(beta<=a)break;}return best;}
                    else{let best=Infinity;for(const m of moves){const o=b[m.to.r][m.to.c],p=b[m.from.r][m.from.c];b[m.to.r][m.to.c]=p;b[m.from.r][m.from.c]=null;const v=minimax(b,depth-1,a,beta,true,ai);b[m.from.r][m.from.c]=p;b[m.to.r][m.to.c]=o;best=Math.min(best,v);beta=Math.min(beta,v);if(beta<=a)break;}return best;}
                }
                self.onmessage=function(e){const{board,aiColor,depth}=e.data;const moves=allMoves(board,aiColor);if(!moves.length){self.postMessage(null);return;}moves.sort((x,y)=>{const ca=board[x.to.r][x.to.c]?V[board[x.to.r][x.to.c].type]:0;const cb=board[y.to.r][y.to.c]?V[board[y.to.r][y.to.c].type]:0;return cb-ca;});let best=-Infinity,bestMoves=[];for(const m of moves){const o=board[m.to.r][m.to.c],p=board[m.from.r][m.from.c];board[m.to.r][m.to.c]=p;board[m.from.r][m.from.c]=null;const s=minimax(board,depth-1,-Infinity,Infinity,false,aiColor);board[m.from.r][m.from.c]=p;board[m.to.r][m.to.c]=o;if(s>best){best=s;bestMoves=[m];}else if(s==best)bestMoves.push(m);}self.postMessage(bestMoves[Math.floor(Math.random()*bestMoves.length)]);};
            `;
            aiWorker = new Worker(URL.createObjectURL(new Blob([code], {type:'application/javascript'})));
            aiWorker.onmessage = function(e) {
                thinkingOverlay.style.display = 'none';
                if (e.data && gameActive) {
                    movePiece(e.data.from.r, e.data.from.c, e.data.to.r, e.data.to.c);
                    render();
                }
            };
        }

        // ==================== GAME LOGIC ====================
        function initGame(colorChoice) {
            initAudio();
            if (colorChoice === 'random') colorChoice = Math.random() < 0.5 ? 'white' : 'black';
            playerColor = colorChoice === 'white' ? 'w' : 'b';
            aiColor = playerColor === 'w' ? 'b' : 'w';
            board = START_POSITION.map(r => r.map(ch => ch ? { type: ch.toLowerCase(), color: ch === ch.toUpperCase() ? 'w' : 'b' } : null));
            whiteToMove = true; selected = null; legalMoves = []; gameActive = true;
            kingInCheck = false; whiteTimeLeft = TIME_CONTROL; blackTimeLeft = TIME_CONTROL;
            isDailyChallenge = false; postGamePending = false;
            clearInterval(timerInterval); startTimer();
            updateTimerDisplay(); render();
            if (aiColor === 'w') setTimeout(makeAIMove, 400);
            setupMainButton('🏳️ Resign', () => {
                if (!gameActive) return;
                gameActive = false; clearInterval(timerInterval);
                showPostGame(playerColor === 'w' ? 'Black' : 'White', 'resign');
            });
        }

        function loadDailyChallenge() {
            initAudio();
            const puzzles = [
                { fen: 'r1bqkb1r/pppp1ppp/2n2n2/4p2Q/2B1P3/8/PPPP1PPP/RNB1K1NR w KQkq - 0 1', desc: 'Mate in 1' },
                { fen: 'rnbqkbnr/ppp2ppp/3p4/4p3/2B1P3/5Q2/PPPP1PPP/RNB1K1NR w KQkq - 0 1', desc: 'Mate in 1' },
                { fen: 'r1bqkb1r/pppp1ppp/2n5/4p3/2B1n3/5N2/PPPP1PPP/RNBQK2R w KQkq - 0 1', desc: 'Mate in 1' }
            ];
            const idx = new Date().toDateString().split('').reduce((a,c) => a + c.charCodeAt(0), 0) % puzzles.length;
            playerColor = 'w'; aiColor = 'b';
            board = START_POSITION.map(r => r.map(ch => ch ? { type: ch.toLowerCase(), color: ch === ch.toUpperCase() ? 'w' : 'b' } : null));
            whiteToMove = true; selected = null; legalMoves = []; gameActive = true;
            kingInCheck = false; whiteTimeLeft = TIME_CONTROL; blackTimeLeft = TIME_CONTROL;
            isDailyChallenge = true; postGamePending = false;
            clearInterval(timerInterval); startTimer();
            updateTimerDisplay();
            gameStatusEl.textContent = `📅 Daily: ${puzzles[idx].desc}`;
            render();
            setupMainButton('Give Up', () => {
                if (!gameActive) return;
                gameActive = false; clearInterval(timerInterval);
                showPostGame('AI', 'daily_fail');
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                if (whiteToMove) {
                    whiteTimeLeft--;
                    if (whiteTimeLeft <= 0) { gameActive = false; showPostGame('Black', 'timeout'); }
                } else {
                    blackTimeLeft--;
                    if (blackTimeLeft <= 0) { gameActive = false; showPostGame('White', 'timeout'); }
                }
                updateTimerDisplay(); saveGame();
            }, 1000);
        }

        function updateTimerDisplay() {
            const fmt = s => { const m = Math.floor(s/60), sec = s%60; return `${m}:${sec.toString().padStart(2,'0')}`; };
            whiteTimeEl.textContent = fmt(Math.max(0, whiteTimeLeft));
            blackTimeEl.textContent = fmt(Math.max(0, blackTimeLeft));
            whiteTimeEl.classList.toggle('low', whiteTimeLeft < 30);
            blackTimeEl.classList.toggle('low', blackTimeLeft < 30);
        }

        function saveGame() {
            if (!gameActive) { localStorage.removeItem('chess_saved'); return; }
            localStorage.setItem('chess_saved', JSON.stringify({ board, whiteToMove, aiColor, playerColor, gameActive, whiteTimeLeft, blackTimeLeft, isDailyChallenge }));
        }
        function loadGame() {
            const s = localStorage.getItem('chess_saved');
            if (!s) return false;
            try {
                const d = JSON.parse(s);
                board = d.board; whiteToMove = d.whiteToMove; aiColor = d.aiColor;
                playerColor = d.playerColor; gameActive = d.gameActive;
                whiteTimeLeft = d.whiteTimeLeft; blackTimeLeft = d.blackTimeLeft;
                isDailyChallenge = d.isDailyChallenge || false; return true;
            } catch(e) { return false; }
        }

        function makeAIMove() {
            if (!gameActive || postGamePending || whiteToMove !== (aiColor === 'w')) return;
            thinkingOverlay.style.display = 'flex';
            const boardCopy = board.map(r => r.map(c => c ? { ...c } : null));
            if (aiWorker) aiWorker.postMessage({ board: boardCopy, aiColor, depth: 5 });
            else setTimeout(() => { thinkingOverlay.style.display = 'none'; }, 100);
        }

        // ==================== RENDER & INTERACTION ====================
        function render() {
            boardEl.innerHTML = '';
            let kingInCheckPos = null;
            if (kingInCheck) {
                const col = whiteToMove ? 'w' : 'b';
                for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                    const p=board[r][c]; if(p&&p.type==='k'&&p.color===col){kingInCheckPos={r,c};break;}
                }
            }
            for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                const sq = document.createElement('div');
                sq.className = 'square '+((r+c)%2?'sq-dark':'sq-light');
                sq.dataset.r = r; sq.dataset.c = c;
                if (kingInCheckPos && kingInCheckPos.r===r && kingInCheckPos.c===c) sq.classList.add('check');
                if (legalMoves.some(m=>m.r===r&&m.c===c)) sq.classList.add('move-dot');
                if (selected && selected.r===r && selected.c===c) sq.classList.add('highlight');
                const piece = board[r][c];
                if (piece) {
                    const img = document.createElement('img');
                    img.src = getPieceImg(piece.type, piece.color);
                    img.className = 'piece'; img.draggable = true;
                    if (gameActive && whiteToMove !== (aiColor==='w')) {
                        img.addEventListener('click', e => { e.stopPropagation(); handleClick(r,c); });
                    }
                    sq.appendChild(img);
                }
                if (gameActive && whiteToMove !== (aiColor==='w')) sq.addEventListener('click', () => handleClick(r,c));
                boardEl.appendChild(sq);
            }
            gameStatusEl.textContent = gameActive ? `${whiteToMove?'White':'Black'}'s turn` : '';
            updateTimerDisplay();
        }

        function handleClick(r, c) {
            if (!gameActive || postGamePending || whiteToMove === (aiColor==='w')) return;
            if (selected && legalMoves.some(m=>m.r===r&&m.c===c)) {
                movePiece(selected.r, selected.c, r, c);
                selected = null; legalMoves = [];
                render();
                if (gameActive && !postGamePending && whiteToMove === (aiColor==='w')) setTimeout(makeAIMove, 250);
                return;
            }
            const p = board[r][c];
            if (p && p.color === (whiteToMove?'w':'b')) {
                selected = {r,c}; legalMoves = getLegalMoves(r,c);
            } else { selected = null; legalMoves = []; }
            render();
        }

        function movePiece(sr, sc, tr, tc) {
            const captured = board[tr][tc];
            board[tr][tc] = board[sr][sc]; board[sr][sc] = null;
            whiteToMove = !whiteToMove;
            if (captured) { sfxCapture(); haptic('heavy'); } else { sfxMove(); haptic('light'); }
            const piece = board[tr][tc];
            if (piece && piece.type === 'p' && (tr === 0 || tr === 7)) piece.type = 'q';
            checkGameState();
            if (kingInCheck) sfxCheck();
            saveGame();
        }

        function getLegalMoves(r, c) {
            return getMovesSync(board, r, c).filter(m => {
                const orig = board[m.r][m.c], piece = board[r][c];
                board[m.r][m.c] = piece; board[r][c] = null;
                const inCheck = isKingInCheckSync(board, piece.color);
                board[r][c] = piece; board[m.r][m.c] = orig;
                return !inCheck;
            });
        }

        function checkGameState() {
            const color = whiteToMove ? 'w' : 'b';
            kingInCheck = isKingInCheckSync(board, color);
            const hasMoves = getAllLegalMovesSync(board, color).length > 0;
            if (!hasMoves) {
                // *** FIX: Debounce – καθυστέρηση 500ms πριν το modal ***
                postGamePending = true;
                const winner = kingInCheck ? (color === 'w' ? 'Black' : 'White') : null;
                const resultType = kingInCheck ? 'checkmate' : 'stalemate';
                if (kingInCheck) {
                    gameStatusEl.innerHTML = `<span class="status-mate">Checkmate! ${winner} wins!</span>`;
                    sfxMate();
                } else {
                    gameStatusEl.textContent = "Stalemate! It's a draw";
                }
                render();
                setTimeout(() => {
                    gameActive = false;
                    clearInterval(timerInterval);
                    showPostGame(winner, resultType);
                    postGamePending = false;
                }, 500);
            } else if (kingInCheck) {
                gameStatusEl.innerHTML = `<span class="status-check">${color==='w'?'White':'Black'} is in check!</span>`;
            } else {
                gameStatusEl.textContent = `${whiteToMove?'White':'Black'}'s turn`;
            }
        }

        // ==================== SYNC HELPERS (για γρήγορη πρόσβαση) ====================
        function getMovesSync(b, r, c) {
            const p = b[r][c]; if (!p) return [];
            const m = [], col = p.color, d = col === 'w' ? -1 : 1;
            const ib = (rr,cc) => rr>=0&&rr<8&&cc>=0&&cc<8;
            const em = (rr,cc) => ib(rr,cc) && !b[rr][cc];
            const en = (rr,cc) => ib(rr,cc) && b[rr][cc] && b[rr][cc].color !== col;
            if (p.type==='p') {
                if (em(r+d,c)) m.push({r:r+d,c});
                if ((col==='w'&&r===6||col==='b'&&r===1) && em(r+d,c) && em(r+2*d,c)) m.push({r:r+2*d,c});
                [-1,1].forEach(dc => { if (en(r+d,c+dc)) m.push({r:r+d,c:c+dc}); });
            }
            if (p.type==='n') {
                [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr,dc]) => {
                    const rr=r+dr, cc=c+dc;
                    if (ib(rr,cc) && (!b[rr][cc] || en(rr,cc))) m.push({r:rr,c:cc});
                });
            }
            if (['b','r','q'].includes(p.type)) {
                const dirs = [];
                if (['b','q'].includes(p.type)) dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
                if (['r','q'].includes(p.type)) dirs.push([-1,0],[1,0],[0,-1],[0,1]);
                dirs.forEach(([dr,dc]) => {
                    let rr=r+dr, cc=c+dc;
                    while (ib(rr,cc)) {
                        if (!b[rr][cc]) m.push({r:rr,c:cc});
                        else { if (en(rr,cc)) m.push({r:rr,c:cc}); break; }
                        rr+=dr; cc+=dc;
                    }
                });
            }
            if (p.type==='k') {
                for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
                    if (dr||dc) { const rr=r+dr, cc=c+dc; if (ib(rr,cc) && (!b[rr][cc]||en(rr,cc))) m.push({r:rr,c:cc}); }
                }
            }
            return m;
        }
        function isKingInCheckSync(b, col) {
            let kp = null;
            for (let r=0;r<8;r++) for (let c=0;c<8;c++) { const p=b[r][c]; if(p&&p.type==='k'&&p.color===col){kp={r,c};break;} }
            if (!kp) return false;
            for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                const p=b[r][c];
                if (p && p.color!==col && getMovesSync(b,r,c).some(m=>m.r===kp.r&&m.c===kp.c)) return true;
            }
            return false;
        }
        function getAllLegalMovesSync(b, col) {
            const moves = [];
            for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                if (b[r][c] && b[r][c].color === col) {
                    getMovesSync(b,r,c).filter(m => {
                        const orig = b[m.r][m.c], piece = b[r][c];
                        b[m.r][m.c] = piece; b[r][c] = null;
                        const ck = isKingInCheckSync(b, piece.color);
                        b[r][c] = piece; b[m.r][m.c] = orig;
                        return !ck;
                    }).forEach(to => moves.push({from:{r,c},to}));
                }
            }
            return moves;
        }
        function getPieceImg(t, c) {
            const map = { pw:'4/45/Chess_plt45.svg', pb:'c/c7/Chess_pdt45.svg', rw:'7/72/Chess_rlt45.svg', rb:'f/ff/Chess_rdt45.svg', nw:'7/70/Chess_nlt45.svg', nb:'e/ef/Chess_ndt45.svg', bw:'b/b1/Chess_blt45.svg', bb:'9/98/Chess_bdt45.svg', qw:'1/15/Chess_qlt45.svg', qb:'4/47/Chess_qdt45.svg', kw:'4/42/Chess_klt45.svg', kb:'f/f0/Chess_kdt45.svg' };
            return `https://upload.wikimedia.org/wikipedia/commons/${map[t+c]}`;
        }

        // ==================== POST-GAME ====================
        function showPostGame(winner, resultType) {
            gameActive = false; clearInterval(timerInterval);
            localStorage.removeItem('chess_saved'); hideMainButton();
            let baseScore = 0, title = '', message = '';
            const isPlayerWin = winner && ((playerColor==='w'&&winner==='White')||(playerColor==='b'&&winner==='Black'));

            if (resultType === 'checkmate') {
                baseScore = isPlayerWin ? 100 : 0;
                title = isPlayerWin ? '🎉 You Win!' : '😞 AI Wins';
                message = isPlayerWin ? 'Checkmate! You defeated the AI!' : 'The AI checkmated you.';
            } else if (resultType === 'stalemate') {
                baseScore = 25; title = '🤝 Draw'; message = 'Stalemate.';
            } else if (resultType === 'timeout') {
                baseScore = isPlayerWin ? 75 : 0;
                title = isPlayerWin ? '⏰ You Win on Time!' : '⏰ Time Out';
            } else if (resultType === 'resign') {
                baseScore = 0; title = '🏳️ Resigned';
            } else if (resultType === 'daily_fail') {
                baseScore = 0; title = '📅 Challenge Failed';
            }

            // Win streak
            if (isPlayerWin && resultType === 'checkmate') {
                const streak = getWinStreak() + 1; setWinStreak(streak);
                updateLeaderboard(streak);
                addTotalWin();
                addDailyWin();
                if (streak >= 5) { baseScore = Math.floor(baseScore * 2); message += ` 🔥 ${streak}x Streak! (2x)`; }
                else if (streak >= 3) { baseScore = Math.floor(baseScore * 1.5); message += ` ⚡ ${streak}x Streak! (1.5x)`; }
            } else if (!isPlayerWin && resultType !== 'stalemate') {
                setWinStreak(0);
            }

            document.getElementById('postGameTitle').textContent = title;
            document.getElementById('postGameMessage').textContent = message;
            document.getElementById('streakInfo').innerHTML = getWinStreak() >= 2 ? `<span class="streak-badge">🔥 ${getWinStreak()} Win Streak</span>` : '';
            const levelUpInfo = document.getElementById('levelUpInfo');
            levelUpInfo.style.display = 'none';
            const prevLevel = getLevel().name;
            if (isPlayerWin) {
                const newLevel = getLevel().name;
                if (prevLevel !== newLevel) {
                    levelUpInfo.textContent = `⬆️ Level Up: ${newLevel}!`;
                    levelUpInfo.style.display = 'block';
                }
            }
            updateDailyUI(); updateLevelUI(); updateStreakUI();
            postGameModal.style.display = 'flex';
            if (baseScore > 0) sendScoreToBackend(baseScore, resultType);
        }

        // ==================== EVENT LISTENERS ====================
        document.querySelectorAll('.color-btn').forEach(b => b.addEventListener('click', () => {
            document.querySelectorAll('.color-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }));
        document.getElementById('startGameBtn').addEventListener('click', () => {
            setupModal.style.display = 'none';
            initGame(document.querySelector('.color-btn.active').dataset.color);
        });
        document.getElementById('resumeGameBtn').addEventListener('click', () => {
            if (loadGame()) {
                setupModal.style.display = 'none';
                startTimer(); updateTimerDisplay(); render();
                if (gameActive && whiteToMove === (aiColor==='w')) setTimeout(makeAIMove, 400);
                setupMainButton('🏳️ Resign', () => {
                    gameActive = false; clearInterval(timerInterval);
                    showPostGame(playerColor==='w'?'Black':'White', 'resign');
                });
            }
        });
        document.getElementById('dailyChallengeBtn').addEventListener('click', () => {
            setupModal.style.display = 'none'; loadDailyChallenge();
        });
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            postGameModal.style.display = 'none'; setupModal.style.display = 'flex'; checkSaved();
        });
        document.getElementById('menuBtn').addEventListener('click', () => {
            postGameModal.style.display = 'none'; setupModal.style.display = 'flex'; checkSaved();
        });
        document.getElementById('leaderboardBtn').addEventListener('click', showLeaderboard);
        document.getElementById('closeLbBtn').addEventListener('click', () => {
            document.getElementById('leaderboardModal').style.display = 'none';
        });
        function checkSaved() {
            const has = !!localStorage.getItem('chess_saved');
            savedGameInfo.style.display = has ? 'block' : 'none';
            resumeGameBtn.style.display = has ? 'block' : 'none';
        }

        // ==================== INIT ====================
        window.addEventListener('DOMContentLoaded', () => {
            initAudio(); initWorker();
            updateLevelUI(); updateStreakUI(); updateDailyUI();
            setupModal.style.display = 'flex'; checkSaved();
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.setHeaderColor('#1e3c72');
            }
        });
        window.addEventListener('message', e => {
            if (e.data?.type === 'setUserId') { userId = e.data.userId; localStorage.setItem('franklymadear_userId', userId); }
        });
    </script>
</body>
</html>
