<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Deluxe Pro</title>
    <link rel="icon" type="image/png" sizes="32x32" href="index.png">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src='//libtl.com/sdk.js' data-zone='11108267' data-sdk='show_11108267'></script>
    <style>
        :root {
            --board-size: min(95vw, 95vh, 800px);
            --square-size: calc(var(--board-size) / 8);
            --piece-size: calc(var(--square-size) * 0.85);
            --dot-size: calc(var(--square-size) * 0.25);
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 10px;
            font-family: "Segoe UI", sans-serif; overflow-x: hidden;
        }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1400px; gap: 10px; }
        .board-container {
            display: flex; flex-direction: column; align-items: center;
            background: #3a2e16; padding: 12px; border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.4); width: var(--board-size);
        }
        .board {
            width: var(--board-size); height: var(--board-size);
            display: grid; grid-template-columns: repeat(8, 1fr);
            border: 5px solid #3a2e16; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .square {
            position: relative; width: var(--square-size); height: var(--square-size);
            display: flex; align-items: center; justify-content: center;
        }
        .sq-light { background: #f0d9b5; } .sq-dark { background: #b58863; }
        .piece {
            width: var(--piece-size); height: var(--piece-size);
            cursor: grab; transition: transform 0.1s; user-select: none;
            -webkit-user-select: none; -webkit-touch-callout: none;
        }
        .piece:active { cursor: grabbing; transform: scale(1.1); }
        .highlight { box-shadow: inset 0 0 0 4px #ffcb2e; }
        .move-dot::after {
            content: ''; position: absolute;
            width: var(--dot-size); height: var(--dot-size);
            border-radius: 50%; background: rgba(0,0,0,0.25);
        }
        .check { box-shadow: inset 0 0 0 4px #ff0000; animation: checkPulse 0.8s infinite; }
        @keyframes checkPulse {
            0%,100% { box-shadow: inset 0 0 0 4px #ff0000; }
            50% { box-shadow: inset 0 0 0 8px #ff4444; }
        }
        .game-info {
            color: white; margin: 5px 0; font-size: 14px; text-align: center;
            display: flex; justify-content: space-between; width: 100%; gap: 10px;
        }
        .timer {
            color: #ffcb2e; font-weight: bold; font-size: 16px;
            background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 8px;
        }
        .timer.low { color: #ff4444; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center;
            align-items: center; z-index: 100;
        }
        .modal-content {
            background: #3a2e16; padding: 20px; border-radius: 15px;
            max-width: 90%; width: 450px; text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 3px solid #d19a4c;
        }
        .modal h2 { color: #ffcb2e; margin-top: 0; }
        .modal-options { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
        .modal-btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: #5d4037; color: white; font-weight: bold; cursor: pointer;
            font-size: 15px; transition: all 0.2s;
        }
        .modal-btn.active { background: #d19a4c; }
        .modal-btn:hover { opacity: 0.9; }
        .start-btn { background: #4CAF50; font-size: 18px; margin-top: 10px; }
        .status-check { color: #ff6b6b; font-weight: bold; }
        .status-mate { color: #ff0000; font-weight: bold; font-size: 1.2em; }
        .thinking {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 25px;
            border-radius: 10px; font-size: 18px; z-index: 200; display: none;
        }
        .streak-badge {
            display: inline-block; background: gold; color: #000;
            padding: 2px 10px; border-radius: 20px; font-weight: bold; font-size: 14px;
        }
        @media (max-width: 768px) {
            .game-info { font-size: 12px; }
            .timer { font-size: 14px; padding: 2px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="board-container">
            <div class="game-info">
                <span id="gameStatus">White's turn</span>
                <span class="timer" id="whiteTime">5:00</span>
                <span style="color:#fff;">vs</span>
                <span class="timer" id="blackTime">5:00</span>
            </div>
            <div id="board" class="board"></div>
        </div>
    </div>

    <!-- Setup Modal -->
    <div class="modal" id="setupModal">
        <div class="modal-content">
            <h2>♕ Chess vs AI ♛</h2>
            <p style="color:#fff;">Extreme Difficulty • 5 min each</p>
            <div class="modal-options">
                <h3 style="color:#ffcb2e;margin:5px 0;">Choose Your Color</h3>
                <button class="modal-btn color-btn active" data-color="white">⚪ White</button>
                <button class="modal-btn color-btn" data-color="black">⚫ Black</button>
                <button class="modal-btn color-btn" data-color="random">🎲 Random</button>
            </div>
            <p id="savedGameInfo" style="color:#4CAF50;display:none;">↩️ Saved game found!</p>
            <button class="modal-btn start-btn" id="startGameBtn">New Game</button>
            <button class="modal-btn" id="resumeGameBtn" style="display:none;background:#2196F3;">Resume Saved Game</button>
            <button class="modal-btn" id="dailyChallengeBtn" style="background:#9C27B0;">📅 Daily Challenge</button>
        </div>
    </div>

    <!-- Post-Game Modal -->
    <div class="modal" id="postGameModal">
        <div class="modal-content">
            <h2 id="postGameTitle">🎉</h2>
            <p id="postGameMessage"></p>
            <p id="streakInfo"></p>
            <button class="modal-btn" id="playAgainBtn" style="background:#4CAF50;">New Game</button>
            <button class="modal-btn" id="menuBtn">Menu</button>
        </div>
    </div>

    <div class="thinking" id="thinkingIndicator">🤔 AI is thinking...</div>

    <script>
        // ========== CONFIGURATION ==========
        const API_ENDPOINT = "https://franklymadear-games.hf.space";
        const API_KEY = "m0n3t4g_s3cur3_k3y_2026";
        const TIME_CONTROL = 300; // 5 λεπτά σε δευτερόλεπτα

        // ========== USER ID ==========
        let userId = localStorage.getItem('franklymadear_userId');
        if (!userId && window.Telegram?.WebApp?.initDataUnsafe?.user) {
            userId = 'tg_' + window.Telegram.WebApp.initDataUnsafe.user.id;
            localStorage.setItem('franklymadear_userId', userId);
        }
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
            localStorage.setItem('franklymadear_userId', userId);
        }

        // ========== API ==========
        async function apiCall(method, path, body = null) {
            const headers = { 'Content-Type': 'application/json', 'X-API-Key': API_KEY };
            const res = await fetch(API_ENDPOINT + path, { method, headers, body: body ? JSON.stringify(body) : null });
            if (!res.ok) throw new Error((await res.json()).detail || 'Request failed');
            return res.json();
        }

        async function sendScoreToBackend(score, gameResult) {
            if (!userId) return;
            try {
                await apiCall('POST', '/add-points', { userId, game: 'Chess', points: score });
                await apiCall('POST', '/missions/update', { userId, game: 'chess', score, playtime: 1, words: 0 });
                if (window.parent !== window) {
                    if (gameResult === 'checkmate') {
                        window.parent.postMessage({ type: 'updateMission', game: 'chess', result: 'win' }, '*');
                    }
                    window.parent.postMessage({ type: 'gameScore', game: 'Chess', score }, '*');
                }
            } catch(e) { console.warn('API error:', e); }
        }

        // ========== AUDIO ==========
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(freq, duration, type = 'sine', vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function soundMove() { playTone(600, 0.1); }
        function soundCapture() { playTone(800, 0.15, 'triangle'); }
        function soundCheck() { playTone(1200, 0.15); setTimeout(()=>playTone(900, 0.15), 100); }
        function soundMate() {
            [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=>setTimeout(()=>playTone(f, 0.3, 'sine', 0.2), i*120));
        }
        function haptic(type = 'medium') {
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred(type);
            }
        }

        // ========== TELEGRAM MAIN BUTTON ==========
        function setupMainButton(text, callback) {
            if (window.Telegram?.WebApp?.MainButton) {
                const mb = window.Telegram.WebApp.MainButton;
                mb.setText(text);
                mb.show();
                mb.onClick(callback);
                return mb;
            }
            return null;
        }
        function hideMainButton() {
            if (window.Telegram?.WebApp?.MainButton) window.Telegram.WebApp.MainButton.hide();
        }

        // ========== DOM ==========
        const boardEl = document.getElementById('board');
        const gameStatusEl = document.getElementById('gameStatus');
        const whiteTimeEl = document.getElementById('whiteTime');
        const blackTimeEl = document.getElementById('blackTime');
        const thinkingEl = document.getElementById('thinkingIndicator');
        const setupModal = document.getElementById('setupModal');
        const postGameModal = document.getElementById('postGameModal');
        const savedGameInfo = document.getElementById('savedGameInfo');
        const resumeGameBtn = document.getElementById('resumeGameBtn');

        // ========== GAME STATE ==========
        const START_POSITION = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];
        const PIECE_VALUES = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };
        const PAWN_TABLE = [
            [ 0, 0, 0, 0, 0, 0, 0, 0],
            [50,50,50,50,50,50,50,50],
            [10,10,20,30,30,20,10,10],
            [ 5, 5,10,25,25,10, 5, 5],
            [ 0, 0, 0,20,20, 0, 0, 0],
            [ 5,-5,-10,0,0,-10,-5, 5],
            [ 5,10,10,-20,-20,10,10, 5],
            [ 0, 0, 0, 0, 0, 0, 0, 0]
        ];
        const KNIGHT_TABLE = [
            [-50,-40,-30,-30,-30,-30,-40,-50],
            [-40,-20, 0, 0, 0, 0,-20,-40],
            [-30, 0,10,15,15,10, 0,-30],
            [-30, 5,15,20,20,15, 5,-30],
            [-30, 0,15,20,20,15, 0,-30],
            [-30, 5,10,15,15,10, 5,-30],
            [-40,-20, 0, 5, 5, 0,-20,-40],
            [-50,-40,-30,-30,-30,-30,-40,-50]
        ];
        const BISHOP_TABLE = [
            [-20,-10,-10,-10,-10,-10,-10,-20],
            [-10, 0, 0, 0, 0, 0, 0,-10],
            [-10, 0, 5,10,10, 5, 0,-10],
            [-10, 5, 5,10,10, 5, 5,-10],
            [-10, 0,10,10,10,10, 0,-10],
            [-10,10,10,10,10,10,10,-10],
            [-10, 5, 0, 0, 0, 0, 5,-10],
            [-20,-10,-10,-10,-10,-10,-10,-20]
        ];

        let board = [];
        let whiteToMove = true;
        let selected = null;
        let legalMoves = [];
        let gameActive = false;
        let aiColor = 'b';
        let playerColor = 'w';
        let kingInCheck = false;
        let whiteTimeLeft = TIME_CONTROL;
        let blackTimeLeft = TIME_CONTROL;
        let timerInterval = null;
        let isDailyChallenge = false;
        let winStreak = parseInt(localStorage.getItem('chess_streak') || '0');

        // ========== WEB WORKER (AI) ==========
        let aiWorker = null;
        function initWorker() {
            const workerCode = `
                const VALUES = { p:100, n:320, b:330, r:500, q:900, k:20000 };
                const PAWN_TABLE = ${JSON.stringify(PAWN_TABLE)};
                const KNIGHT_TABLE = ${JSON.stringify(KNIGHT_TABLE)};
                const BISHOP_TABLE = ${JSON.stringify(BISHOP_TABLE)};

                function getMoves(board, r, c) {
                    const p = board[r][c]; if (!p) return [];
                    const moves = []; const color = p.color;
                    const dir = color==='w'?-1:1;
                    const inB = (rr,cc) => rr>=0&&rr<8&&cc>=0&&cc<8;
                    const empty = (rr,cc) => inB(rr,cc)&&!board[rr][cc];
                    const enemy = (rr,cc) => inB(rr,cc)&&board[rr][cc]&&board[rr][cc].color!==color;

                    if (p.type==='p') {
                        if (empty(r+dir,c)) moves.push({r:r+dir,c});
                        if ((color==='w'&&r===6||color==='b'&&r===1)&&empty(r+dir,c)&&empty(r+2*dir,c)) moves.push({r:r+2*dir,c});
                        [-1,1].forEach(dc=>{if(enemy(r+dir,c+dc))moves.push({r:r+dir,c:c+dc});});
                    }
                    if (p.type==='n') {
                        [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr,dc])=>{
                            const rr=r+dr,cc=c+dc;
                            if(inB(rr,cc)&&(!board[rr][cc]||enemy(rr,cc)))moves.push({r:rr,c:cc});
                        });
                    }
                    if (['b','r','q'].includes(p.type)) {
                        const dirs=[];
                        if(['b','q'].includes(p.type))dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
                        if(['r','q'].includes(p.type))dirs.push([-1,0],[1,0],[0,-1],[0,1]);
                        dirs.forEach(([dr,dc])=>{
                            let rr=r+dr,cc=c+dc;
                            while(inB(rr,cc)){
                                if(!board[rr][cc])moves.push({r:rr,c:cc});
                                else{if(enemy(rr,cc))moves.push({r:rr,c:cc});break;}
                                rr+=dr;cc+=dc;
                            }
                        });
                    }
                    if (p.type==='k') {
                        for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
                            if(dr||dc){const rr=r+dr,cc=c+dc;if(inB(rr,cc)&&(!board[rr][cc]||enemy(rr,cc)))moves.push({r:rr,c:cc});}
                        }
                    }
                    return moves;
                }

                function isKingInCheck(board, color) {
                    let kingPos = null;
                    for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                        const p = board[r][c];
                        if (p&&p.type==='k'&&p.color===color) { kingPos={r,c}; break; }
                    }
                    if (!kingPos) return false;
                    for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                        const p = board[r][c];
                        if (p&&p.color!==color) {
                            const moves = getMoves(board, r, c);
                            if (moves.some(m=>m.r===kingPos.r&&m.c===kingPos.c)) return true;
                        }
                    }
                    return false;
                }

                function getLegalMoves(board, r, c) {
                    const moves = getMoves(board, r, c);
                    return moves.filter(move => {
                        const orig = board[move.r][move.c];
                        const piece = board[r][c];
                        board[move.r][move.c] = piece; board[r][c] = null;
                        const inCheck = isKingInCheck(board, piece.color);
                        board[r][c] = piece; board[move.r][move.c] = orig;
                        return !inCheck;
                    });
                }

                function getAllLegalMoves(board, color) {
                    const moves = [];
                    for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                        if (board[r][c]&&board[r][c].color===color) {
                            getLegalMoves(board,r,c).forEach(to=>moves.push({from:{r,c},to}));
                        }
                    }
                    return moves;
                }

                function evaluateBoard(board, aiColor) {
                    let score = 0;
                    for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                        const p = board[r][c]; if (!p) continue;
                        let val = VALUES[p.type];
                        const row = p.color==='w'?r:7-r;
                        if (p.type==='p') val += PAWN_TABLE[row][c]*0.3;
                        else if (p.type==='n') val += KNIGHT_TABLE[row][c]*0.3;
                        else if (p.type==='b') val += BISHOP_TABLE[row][c]*0.3;
                        score += p.color===aiColor ? val : -val;
                    }
                    return score + Math.random()*10-5;
                }

                function minimax(board, depth, alpha, beta, isMax, aiColor) {
                    const color = isMax ? aiColor : (aiColor==='w'?'b':'w');
                    if (depth===0) return evaluateBoard(board, aiColor);
                    const moves = getAllLegalMoves(board, color);
                    if (moves.length===0) {
                        return isKingInCheck(board,color) ? (isMax?-99999:99999) : 0;
                    }
                    // Move ordering: captures first
                    moves.sort((a,b)=>{
                        const ca=board[a.to.r][a.to.c]?VALUES[board[a.to.r][a.to.c].type]:0;
                        const cb=board[b.to.r][b.to.c]?VALUES[board[b.to.r][b.to.c].type]:0;
                        return cb-ca;
                    });
                    if (isMax) {
                        let best = -Infinity;
                        for (const m of moves) {
                            const orig=board[m.to.r][m.to.c], piece=board[m.from.r][m.from.c];
                            board[m.to.r][m.to.c]=piece; board[m.from.r][m.from.c]=null;
                            const val = minimax(board, depth-1, alpha, beta, false, aiColor);
                            board[m.from.r][m.from.c]=piece; board[m.to.r][m.to.c]=orig;
                            best = Math.max(best, val);
                            alpha = Math.max(alpha, val);
                            if (beta<=alpha) break;
                        }
                        return best;
                    } else {
                        let best = Infinity;
                        for (const m of moves) {
                            const orig=board[m.to.r][m.to.c], piece=board[m.from.r][m.from.c];
                            board[m.to.r][m.to.c]=piece; board[m.from.r][m.from.c]=null;
                            const val = minimax(board, depth-1, alpha, beta, true, aiColor);
                            board[m.from.r][m.from.c]=piece; board[m.to.r][m.to.c]=orig;
                            best = Math.min(best, val);
                            beta = Math.min(beta, val);
                            if (beta<=alpha) break;
                        }
                        return best;
                    }
                }

                self.onmessage = function(e) {
                    const { board, aiColor, depth } = e.data;
                    const moves = getAllLegalMoves(board, aiColor);
                    if (moves.length===0) { self.postMessage(null); return; }

                    moves.sort((a,b)=>{
                        const ca=board[a.to.r][a.to.c]?VALUES[board[a.to.r][a.to.c].type]:0;
                        const cb=board[b.to.r][b.to.c]?VALUES[board[b.to.r][b.to.c].type]:0;
                        return cb-ca;
                    });

                    let bestScore = -Infinity, bestMoves = [];
                    for (const m of moves) {
                        const orig=board[m.to.r][m.to.c], piece=board[m.from.r][m.from.c];
                        board[m.to.r][m.to.c]=piece; board[m.from.r][m.from.c]=null;
                        const score = minimax(board, depth-1, -Infinity, Infinity, false, aiColor);
                        board[m.from.r][m.from.c]=piece; board[m.to.r][m.to.c]=orig;
                        if (score>bestScore) { bestScore=score; bestMoves=[m]; }
                        else if (score===bestScore) bestMoves.push(m);
                    }
                    self.postMessage(bestMoves[Math.floor(Math.random()*bestMoves.length)]);
                };
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            aiWorker = new Worker(URL.createObjectURL(blob));
            aiWorker.onmessage = function(e) {
                const move = e.data;
                thinkingEl.style.display = 'none';
                if (move && gameActive) {
                    movePiece(move.from.r, move.from.c, move.to.r, move.to.c);
                    render();
                }
            };
        }

        function makeAIMove() {
            if (!gameActive || whiteToMove !== (aiColor==='w')) return;
            thinkingEl.style.display = 'block';
            const boardCopy = board.map(r=>r.map(c=>c?{...c}:null));
            if (aiWorker) {
                aiWorker.postMessage({ board: boardCopy, aiColor, depth: 5 });
            } else {
                // Fallback χωρίς worker (βάθος 3)
                setTimeout(() => {
                    const move = findBestMoveSync(boardCopy, aiColor, 3);
                    thinkingEl.style.display = 'none';
                    if (move && gameActive) {
                        movePiece(move.from.r, move.from.c, move.to.r, move.to.c);
                        render();
                    }
                }, 100);
            }
        }

        function findBestMoveSync(board, color, depth) {
            const moves = getAllLegalMovesSync(board, color);
            if (!moves.length) return null;
            moves.sort((a,b)=>{
                const ca=board[a.to.r][a.to.c]?PIECE_VALUES[board[a.to.r][a.to.c].type]:0;
                const cb=board[b.to.r][b.to.c]?PIECE_VALUES[board[b.to.r][b.to.c].type]:0;
                return cb-ca;
            });
            let best = -Infinity, bestMoves = [];
            for (const m of moves) {
                const orig=board[m.to.r][m.to.c], piece=board[m.from.r][m.from.c];
                board[m.to.r][m.to.c]=piece; board[m.from.r][m.from.c]=null;
                const s = minimaxSync(board, depth-1, -Infinity, Infinity, false, color);
                board[m.from.r][m.from.c]=piece; board[m.to.r][m.to.c]=orig;
                if (s>best) { best=s; bestMoves=[m]; }
                else if (s===best) bestMoves.push(m);
            }
            return bestMoves[Math.floor(Math.random()*bestMoves.length)];
        }

        function minimaxSync(board, depth, alpha, beta, isMax, aiColor) {
            const color = isMax ? aiColor : (aiColor==='w'?'b':'w');
            if (depth===0) return evaluateBoardSync(board, aiColor);
            const moves = getAllLegalMovesSync(board, color);
            if (!moves.length) return isKingInCheckSync(board,color)?(isMax?-99999:99999):0;
            if (isMax) {
                let best = -Infinity;
                for (const m of moves) {
                    const orig=board[m.to.r][m.to.c], piece=board[m.from.r][m.from.c];
                    board[m.to.r][m.to.c]=piece; board[m.from.r][m.from.c]=null;
                    best = Math.max(best, minimaxSync(board,depth-1,alpha,beta,false,aiColor));
                    board[m.from.r][m.from.c]=piece; board[m.to.r][m.to.c]=orig;
                    alpha=Math.max(alpha,best); if(beta<=alpha)break;
                }
                return best;
            } else {
                let best = Infinity;
                for (const m of moves) {
                    const orig=board[m.to.r][m.to.c], piece=board[m.from.r][m.from.c];
                    board[m.to.r][m.to.c]=piece; board[m.from.r][m.from.c]=null;
                    best = Math.min(best, minimaxSync(board,depth-1,alpha,beta,true,aiColor));
                    board[m.from.r][m.from.c]=piece; board[m.to.r][m.to.c]=orig;
                    beta=Math.min(beta,best); if(beta<=alpha)break;
                }
                return best;
            }
        }

        function evaluateBoardSync(board, aiColor) {
            let s=0;
            for(let r=0;r<8;r++)for(let c=0;c<8;c++){
                const p=board[r][c];if(!p)continue;
                s+=p.color===aiColor?PIECE_VALUES[p.type]:-PIECE_VALUES[p.type];
            }
            return s+Math.random()*10-5;
        }

        function getAllLegalMovesSync(board,color){
            const m=[];
            for(let r=0;r<8;r++)for(let c=0;c<8;c++){
                if(board[r][c]&&board[r][c].color===color){
                    getLegalMovesSync(board,r,c).forEach(to=>m.push({from:{r,c},to}));
                }
            }
            return m;
        }

        function getLegalMovesSync(board,r,c){
            return getMovesSync(board,r,c).filter(move=>{
                const orig=board[move.r][move.c],p=board[r][c];
                board[move.r][move.c]=p;board[r][c]=null;
                const ck=isKingInCheckSync(board,p.color);
                board[r][c]=p;board[move.r][move.c]=orig;
                return !ck;
            });
        }

        function getMovesSync(board,r,c){
            const p=board[r][c];if(!p)return[];
            const m=[],color=p.color,dir=color==='w'?-1:1;
            const inB=(rr,cc)=>rr>=0&&rr<8&&cc>=0&&cc<8;
            const empty=(rr,cc)=>inB(rr,cc)&&!board[rr][cc];
            const enemy=(rr,cc)=>inB(rr,cc)&&board[rr][cc]&&board[rr][cc].color!==color;
            if(p.type==='p'){
                if(empty(r+dir,c))m.push({r:r+dir,c});
                if((color==='w'&&r===6||color==='b'&&r===1)&&empty(r+dir,c)&&empty(r+2*dir,c))m.push({r:r+2*dir,c});
                [-1,1].forEach(dc=>{if(enemy(r+dir,c+dc))m.push({r:r+dir,c:c+dc});});
            }
            if(p.type==='n'){
                [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr,dc])=>{
                    const rr=r+dr,cc=c+dc;
                    if(inB(rr,cc)&&(!board[rr][cc]||enemy(rr,cc)))m.push({r:rr,c:cc});
                });
            }
            if(['b','r','q'].includes(p.type)){
                const dirs=[];
                if(['b','q'].includes(p.type))dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
                if(['r','q'].includes(p.type))dirs.push([-1,0],[1,0],[0,-1],[0,1]);
                dirs.forEach(([dr,dc])=>{
                    let rr=r+dr,cc=c+dc;
                    while(inB(rr,cc)){
                        if(!board[rr][cc])m.push({r:rr,c:cc});
                        else{if(enemy(rr,cc))m.push({r:rr,c:cc});break;}
                        rr+=dr;cc+=dc;
                    }
                });
            }
            if(p.type==='k'){
                for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
                    if(dr||dc){const rr=r+dr,cc=c+dc;if(inB(rr,cc)&&(!board[rr][cc]||enemy(rr,cc)))m.push({r:rr,c:cc});}
                }
            }
            return m;
        }

        function isKingInCheckSync(board,color){
            let kp=null;
            for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=board[r][c];if(p&&p.type==='k'&&p.color===color){kp={r,c};break;}}
            if(!kp)return false;
            for(let r=0;r<8;r++)for(let c=0;c<8;c++){
                const p=board[r][c];
                if(p&&p.color!==color&&getMovesSync(board,r,c).some(m=>m.r===kp.r&&m.c===kp.c))return true;
            }
            return false;
        }

        // ========== GAME LOGIC ==========
        function initGame(colorChoice) {
            initAudio();
            if (colorChoice === 'random') colorChoice = Math.random() < 0.5 ? 'white' : 'black';
            playerColor = colorChoice === 'white' ? 'w' : 'b';
            aiColor = playerColor === 'w' ? 'b' : 'w';

            board = START_POSITION.map(r => r.map(ch => ch ? { type: ch.toLowerCase(), color: ch === ch.toUpperCase() ? 'w' : 'b' } : null));
            whiteToMove = true;
            selected = null;
            legalMoves = [];
            gameActive = true;
            kingInCheck = false;
            whiteTimeLeft = TIME_CONTROL;
            blackTimeLeft = TIME_CONTROL;
            isDailyChallenge = false;
            clearInterval(timerInterval);
            startTimer();
            updateTimerDisplay();
            render();

            if (aiColor === 'w') setTimeout(makeAIMove, 300);

            setupMainButton('Resign', () => {
                gameActive = false;
                clearInterval(timerInterval);
                const winner = playerColor === 'w' ? 'Black' : 'White';
                showPostGame(winner, 'resign');
            });
        }

        function loadDailyChallenge() {
            initAudio();
            // Προκαθορισμένα puzzles (FEN)
            const puzzles = [
                { fen: 'r1bqkb1r/pppp1ppp/2n2n2/4p2Q/2B1P3/8/PPPP1PPP/RNB1K1NR w KQkq - 0 1', solution: 'h5f7', desc: 'Mate in 1' },
                { fen: 'r1bqk2r/pppp1ppp/2n2n2/2b1p3/2B1P3/3P1N2/PPP2PPP/RNBQK2R w KQkq - 0 1', solution: 'd1b3', desc: 'Mate in 2' },
                { fen: 'rnbqkbnr/ppp2ppp/3p4/4p3/2B1P3/5Q2/PPPP1PPP/RNB1K1NR w KQkq - 0 1', solution: 'f3f7', desc: 'Mate in 1' },
                { fen: 'r1bqkb1r/pppp1ppp/2n5/4p3/2B1n3/5N2/PPPP1PPP/RNBQK2R w KQkq - 0 1', solution: 'd1d8', desc: 'Mate in 1' },
                { fen: 'rnb1kbnr/pppp1ppp/8/4p3/5PPq/8/PPPPP2P/RNBQKBNR w KQkq - 0 1', solution: 'd1e2', desc: 'Defend & Mate in 2' }
            ];
            const today = new Date().toDateString();
            const index = today.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % puzzles.length;
            const puzzle = puzzles[index];

            // Ξεκίνησε με το puzzle (απλοποιημένο: ο παίκτης είναι White, AI Black)
            playerColor = 'w';
            aiColor = 'b';
            board = START_POSITION.map(r => r.map(ch => ch ? { type: ch.toLowerCase(), color: ch === ch.toUpperCase() ? 'w' : 'b' } : null));
            whiteToMove = true;
            selected = null;
            legalMoves = [];
            gameActive = true;
            kingInCheck = false;
            whiteTimeLeft = TIME_CONTROL;
            blackTimeLeft = TIME_CONTROL;
            isDailyChallenge = true;
            clearInterval(timerInterval);
            startTimer();
            updateTimerDisplay();
            gameStatusEl.textContent = `📅 Daily Challenge: ${puzzle.desc}`;
            render();
            setupMainButton('Give Up', () => {
                gameActive = false;
                clearInterval(timerInterval);
                showPostGame('AI', 'daily_fail');
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                if (whiteToMove) {
                    whiteTimeLeft--;
                    if (whiteTimeLeft <= 0) { gameActive = false; showPostGame('Black', 'timeout'); }
                } else {
                    blackTimeLeft--;
                    if (blackTimeLeft <= 0) { gameActive = false; showPostGame('White', 'timeout'); }
                }
                updateTimerDisplay();
                saveGame();
            }, 1000);
        }

        function updateTimerDisplay() {
            const format = (s) => {
                const m = Math.floor(s / 60), sec = s % 60;
                return `${m}:${sec.toString().padStart(2, '0')}`;
            };
            whiteTimeEl.textContent = format(Math.max(0, whiteTimeLeft));
            blackTimeEl.textContent = format(Math.max(0, blackTimeLeft));
            whiteTimeEl.classList.toggle('low', whiteTimeLeft < 30);
            blackTimeEl.classList.toggle('low', blackTimeLeft < 30);
        }

        function saveGame() {
            if (!gameActive) { localStorage.removeItem('chess_saved'); return; }
            const state = { board, whiteToMove, aiColor, playerColor, gameActive, whiteTimeLeft, blackTimeLeft, isDailyChallenge };
            localStorage.setItem('chess_saved', JSON.stringify(state));
        }

        function loadGame() {
            const saved = localStorage.getItem('chess_saved');
            if (!saved) return false;
            try {
                const state = JSON.parse(saved);
                board = state.board; whiteToMove = state.whiteToMove;
                aiColor = state.aiColor; playerColor = state.playerColor;
                gameActive = state.gameActive; whiteTimeLeft = state.whiteTimeLeft;
                blackTimeLeft = state.blackTimeLeft; isDailyChallenge = state.isDailyChallenge || false;
                return true;
            } catch (e) { return false; }
        }

        // ========== RENDER ==========
        function render() {
            boardEl.innerHTML = '';
            let kingInCheckPos = null;
            if (kingInCheck) {
                const color = whiteToMove ? 'w' : 'b';
                for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                    const p = board[r][c];
                    if (p && p.type === 'k' && p.color === color) { kingInCheckPos = { r, c }; break; }
                }
            }
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = 'square ' + ((r + c) % 2 ? 'sq-dark' : 'sq-light');
                    sq.dataset.r = r; sq.dataset.c = c;
                    if (kingInCheckPos && kingInCheckPos.r === r && kingInCheckPos.c === c) sq.classList.add('check');
                    const isLegal = legalMoves.some(m => m.r === r && m.c === c);
                    if (isLegal) sq.classList.add('move-dot');
                    if (selected && selected.r === r && selected.c === c) sq.classList.add('highlight');
                    const piece = board[r][c];
                    if (piece) {
                        const img = document.createElement('img');
                        img.src = getPieceImg(piece.type, piece.color);
                        img.className = 'piece';
                        img.draggable = true;
                        if (gameActive && whiteToMove !== (aiColor === 'w')) {
                            img.addEventListener('click', (e) => { e.stopPropagation(); handleClick(r, c); });
                        }
                        sq.appendChild(img);
                    }
                    if (gameActive && whiteToMove !== (aiColor === 'w')) {
                        sq.addEventListener('click', () => handleClick(r, c));
                    }
                    boardEl.appendChild(sq);
                }
            }
            gameStatusEl.textContent = gameActive
                ? `${whiteToMove ? 'White' : 'Black'}'s turn${isDailyChallenge ? ' (Daily Challenge)' : ''}`
                : '';
            updateTimerDisplay();
        }

        function handleClick(r, c) {
            if (!gameActive || whiteToMove === (aiColor === 'w')) return;
            if (selected && legalMoves.some(m => m.r === r && m.c === c)) {
                movePiece(selected.r, selected.c, r, c);
                selected = null; legalMoves = [];
                render();
                if (gameActive && whiteToMove === (aiColor === 'w')) setTimeout(makeAIMove, 200);
                return;
            }
            const p = board[r][c];
            if (p && p.color === (whiteToMove ? 'w' : 'b')) {
                selected = { r, c };
                legalMoves = getLegalMoves(r, c);
            } else { selected = null; legalMoves = []; }
            render();
        }

        function movePiece(sr, sc, tr, tc) {
            const captured = board[tr][tc];
            board[tr][tc] = board[sr][sc]; board[sr][sc] = null;
            whiteToMove = !whiteToMove;
            if (captured) { soundCapture(); haptic('heavy'); }
            else { soundMove(); haptic('light'); }
            // Promotion
            const piece = board[tr][tc];
            if (piece && piece.type === 'p' && (tr === 0 || tr === 7)) {
                piece.type = 'q'; // Auto-promote to queen
            }
            checkGameState();
            if (kingInCheck) soundCheck();
            saveGame();
        }

        function getLegalMoves(r, c) {
            return getMovesSync(board, r, c).filter(move => {
                const orig = board[move.r][move.c], piece = board[r][c];
                board[move.r][move.c] = piece; board[r][c] = null;
                const inCheck = isKingInCheckSync(board, piece.color);
                board[r][c] = piece; board[move.r][move.c] = orig;
                return !inCheck;
            });
        }

        function checkGameState() {
            const color = whiteToMove ? 'w' : 'b';
            kingInCheck = isKingInCheckSync(board, color);
            const hasMoves = getAllLegalMovesSync(board, color).length > 0;
            if (!hasMoves) {
                gameActive = false;
                clearInterval(timerInterval);
                if (kingInCheck) {
                    const winner = color === 'w' ? 'Black' : 'White';
                    gameStatusEl.innerHTML = `<span class="status-mate">Checkmate! ${winner} wins!</span>`;
                    soundMate();
                    showPostGame(winner, 'checkmate');
                } else {
                    gameStatusEl.textContent = "Stalemate! It's a draw";
                    showPostGame(null, 'stalemate');
                }
            } else if (kingInCheck) {
                gameStatusEl.innerHTML = `<span class="status-check">${color === 'w' ? 'White' : 'Black'} is in check!</span>`;
            } else {
                gameStatusEl.textContent = `${whiteToMove ? 'White' : 'Black'}'s turn`;
            }
        }

        function getPieceImg(type, color) {
            const map = {
                pw: '4/45/Chess_plt45.svg', pb: 'c/c7/Chess_pdt45.svg',
                rw: '7/72/Chess_rlt45.svg', rb: 'f/ff/Chess_rdt45.svg',
                nw: '7/70/Chess_nlt45.svg', nb: 'e/ef/Chess_ndt45.svg',
                bw: 'b/b1/Chess_blt45.svg', bb: '9/98/Chess_bdt45.svg',
                qw: '1/15/Chess_qlt45.svg', qb: '4/47/Chess_qdt45.svg',
                kw: '4/42/Chess_klt45.svg', kb: 'f/f0/Chess_kdt45.svg'
            };
            return `https://upload.wikimedia.org/wikipedia/commons/${map[type + color]}`;
        }

        // ========== WIN STREAKS & POST-GAME ==========
        function showPostGame(winner, resultType) {
            gameActive = false;
            clearInterval(timerInterval);
            localStorage.removeItem('chess_saved');
            hideMainButton();

            const isPlayerWin = winner && ((playerColor === 'w' && winner === 'White') || (playerColor === 'b' && winner === 'Black'));
            let baseScore = 0;
            let title = '', message = '';

            if (resultType === 'checkmate') {
                baseScore = isPlayerWin ? 100 : 0;
                title = isPlayerWin ? '🎉 You Win!' : '😞 AI Wins';
                message = isPlayerWin ? 'Checkmate! You defeated the AI!' : 'The AI checkmated you.';
            } else if (resultType === 'stalemate') {
                baseScore = 25;
                title = '🤝 Draw';
                message = 'The game ended in a stalemate.';
            } else if (resultType === 'timeout') {
                baseScore = isPlayerWin ? 75 : 0;
                title = isPlayerWin ? '⏰ You Win on Time!' : '⏰ Time Out';
                message = isPlayerWin ? 'The AI ran out of time!' : 'You ran out of time.';
            } else if (resultType === 'resign') {
                baseScore = 0;
                title = '🏳️ Resigned';
                message = 'You resigned the game.';
            } else if (resultType === 'daily_fail') {
                baseScore = 0;
                title = '📅 Challenge Failed';
                message = 'Better luck tomorrow!';
            }

            // Win Streak multiplier
            if (isPlayerWin && resultType === 'checkmate') {
                winStreak++;
                localStorage.setItem('chess_streak', winStreak);
                if (winStreak >= 5) {
                    baseScore = Math.floor(baseScore * 2);
                    message += ` 🔥 ${winStreak}x Win Streak! (2x points)`;
                } else if (winStreak >= 3) {
                    baseScore = Math.floor(baseScore * 1.5);
                    message += ` ⚡ ${winStreak}x Win Streak! (1.5x points)`;
                }
            } else if (!isPlayerWin) {
                winStreak = 0;
                localStorage.setItem('chess_streak', winStreak);
            }

            document.getElementById('postGameTitle').textContent = title;
            document.getElementById('postGameMessage').textContent = message;
            document.getElementById('streakInfo').textContent = winStreak > 1 ? `Win Streak: ${winStreak} 🔥` : '';
            document.getElementById('streakInfo').innerHTML = winStreak > 1
                ? `<span class="streak-badge">🔥 ${winStreak} Win Streak</span>` : '';
            postGameModal.style.display = 'flex';

            if (baseScore > 0) {
                sendScoreToBackend(baseScore, resultType === 'checkmate' ? 'checkmate' : 'other');
            }
        }

        // ========== EVENT LISTENERS ==========
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        document.getElementById('startGameBtn').addEventListener('click', () => {
            const selectedColor = document.querySelector('.color-btn.active').dataset.color;
            setupModal.style.display = 'none';
            initGame(selectedColor);
        });

        document.getElementById('resumeGameBtn').addEventListener('click', () => {
            if (loadGame()) {
                setupModal.style.display = 'none';
                startTimer();
                updateTimerDisplay();
                render();
                if (gameActive && whiteToMove === (aiColor === 'w')) setTimeout(makeAIMove, 300);
                setupMainButton('Resign', () => {
                    gameActive = false;
                    clearInterval(timerInterval);
                    showPostGame(playerColor === 'w' ? 'Black' : 'White', 'resign');
                });
            }
        });

        document.getElementById('dailyChallengeBtn').addEventListener('click', () => {
            setupModal.style.display = 'none';
            loadDailyChallenge();
        });

        document.getElementById('playAgainBtn').addEventListener('click', () => {
            postGameModal.style.display = 'none';
            setupModal.style.display = 'flex';
            checkSavedGame();
        });

        document.getElementById('menuBtn').addEventListener('click', () => {
            postGameModal.style.display = 'none';
            setupModal.style.display = 'flex';
            checkSavedGame();
        });

        function checkSavedGame() {
            const hasSave = !!localStorage.getItem('chess_saved');
            savedGameInfo.style.display = hasSave ? 'block' : 'none';
            resumeGameBtn.style.display = hasSave ? 'block' : 'none';
        }

        // ========== INIT ==========
        window.addEventListener('DOMContentLoaded', () => {
            initAudio();
            initWorker();
            setupModal.style.display = 'flex';
            checkSavedGame();

            // Αν υπάρχει Telegram WebApp, ενημέρωσε το χρώμα
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.setHeaderColor('#1e3c72');
                window.Telegram.WebApp.setBackgroundColor('#1e3c72');
            }
        });

        window.addEventListener('message', (event) => {
            if (event.data?.type === 'setUserId') {
                userId = event.data.userId;
                localStorage.setItem('franklymadear_userId', userId);
            }
        });
    </script>
