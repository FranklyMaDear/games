<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chess Deluxe Pro - AI Chess Game</title>
    
    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="index.png">
    <link rel="icon" type="image/png" sizes="32x32" href="index.png">
    <link rel="icon" type="image/png" sizes="16x16" href="index.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#1e3c72">
    
    <!-- Open Graph for Reddit & Social Media -->
    <meta property="og:title" content="Chess Deluxe Pro - Play Chess Online">
    <meta property="og:description" content="Play chess online against a smart AI or a friend! Beautiful graphics, multiple difficulty levels, and smooth gameplay.">
    <meta property="og:image" content="index.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <meta property="og:type" content="website">
    
    <style>
        * {
            box-sizing: border-box;
            touch-action: manipulation;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .board-container {
            background: #3a2e16;
            padding: 16px;
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            width: min(95vw, 95vh, 700px);
        }
        
        h1 {
            color: #ffd966;
            text-align: center;
            margin: 0 0 8px 0;
            font-size: clamp(20px, 6vw, 28px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
        
        .game-info {
            background: rgba(0,0,0,0.6);
            color: white;
            text-align: center;
            padding: 8px 12px;
            border-radius: 40px;
            margin: 10px 0;
            font-weight: bold;
            font-size: clamp(14px, 4vw, 18px);
            backdrop-filter: blur(4px);
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            aspect-ratio: 1 / 1;
            border: 4px solid #c9a87b;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        
        .sq-light { background-color: #f0d9b5; }
        .sq-dark { background-color: #b58863; }
        
        .piece {
            width: 85%;
            height: 85%;
            cursor: grab;
            transition: transform 0.1s;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }
        .piece:active { cursor: grabbing; transform: scale(1.05); }
        
        .highlight {
            box-shadow: inset 0 0 0 4px #ffcc33, inset 0 0 0 8px rgba(255,204,51,0.3);
        }
        
        .move-dot::after {
            content: '';
            position: absolute;
            width: 22%;
            height: 22%;
            background: rgba(0,0,0,0.35);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .square { position: relative; }
        
        .check {
            box-shadow: inset 0 0 0 4px #e63946, inset 0 0 0 8px rgba(230,57,70,0.3);
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        
        button {
            background: #d4a373;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            min-width: 110px;
        }
        
        button:active { transform: scale(0.96); background: #b8834a; }
        
        /* MODALS */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(6px);
        }
        
        .modal-content {
            background: #2c2416;
            padding: 24px;
            border-radius: 32px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 2px solid #e6b17e;
            color: white;
        }
        
        .modal h2 { color: #ffcd7e; margin-top: 0; }
        
        .modal-options, .difficulty-selector {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        
        .modal-btn {
            background: #4a6fa5;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 60px;
        }
        
        .start-btn { background: #2e7d32; font-size: 18px; }
        .start-btn:hover { background: #1b5e20; }
        .difficulty-btn.active, .game-mode-btn.active {
            background: #d99e4c;
            box-shadow: 0 0 6px gold;
        }
        
        /* SMALL THINKING INDICATOR */
        .thinking-tiny {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(8px);
            color: #ffdb8e;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: bold;
            z-index: 150;
            display: none;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
            border: 1px solid #ffb347;
            white-space: nowrap;
        }
        
        .thinking-tiny span {
            display: inline-block;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .promotion-options {
            display: flex;
            gap: 12px;
            background: #3a2e16;
            padding: 20px;
            border-radius: 32px;
        }
        
        .promotion-piece {
            width: 60px;
            height: 60px;
            background: #5d4037;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .promotion-piece img { width: 80%; height: 80%; }
        .promotion-piece:hover { background: #d19a4c; transform: scale(1.05);}
        
        .post-game-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
        .status-mate, .status-check { animation: pulse 0.9s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } }
        
        @media (max-width: 550px) {
            .promotion-piece { width: 55px; height: 55px; }
            button { min-width: 90px; padding: 6px 12px; font-size: 12px; }
            .thinking-tiny { font-size: 12px; padding: 4px 12px; bottom: 15px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="board-container">
        <h1>♛ CHESS DELUXE PRO ♚</h1>
        <div class="game-info" id="gameInfo">White to move</div>
        <div id="board" class="board"></div>
        <div class="controls">
            <button id="resetBtn">🔄 New Game</button>
            <button id="flipBtn">🪞 Flip Board</button>
            <button id="aiBtn">🤖 VS AI</button>
        </div>
    </div>
</div>

<!-- Tiny Thinking Indicator -->
<div id="tinyThinking" class="thinking-tiny">
    <span>🧠</span> AI is thinking... <span>⚡</span>
</div>

<!-- Welcome Modal -->
<div id="welcomeModal" class="modal">
    <div class="modal-content">
        <h2>♜ Choose Mode ♞</h2>
        <div class="modal-options">
            <button class="modal-btn game-mode-btn active" data-mode="twoPlayers">👥 Two Players</button>
            <button class="modal-btn game-mode-btn" data-mode="vsAI">🤖 Play vs AI</button>
        </div>
        <div id="difficultySelector" style="display: none;">
            <h3>🎲 Difficulty</h3>
            <button class="modal-btn difficulty-btn" data-depth="1">🍃 Easy (Random)</button>
            <button class="modal-btn difficulty-btn" data-depth="2">🌙 Medium</button>
            <button class="modal-btn difficulty-btn active" data-depth="3">🔥 Hard (Smart)</button>
        </div>
        <button class="modal-btn start-btn" id="startGameBtn">▶ START GAME</button>
    </div>
</div>

<!-- Post Game Modal -->
<div id="postGameModal" class="modal">
    <div class="modal-content">
        <h2 id="postGameTitle">🎉 Game Over</h2>
        <p id="postGameMessage" style="font-size: 18px; margin: 15px 0;"></p>
        <div class="post-game-buttons">
            <button id="playAgainBtn" class="modal-btn" style="background:#4caf50;">♻️ New Game</button>
            <button id="mainMenuBtn" class="modal-btn" style="background:#8b5a2b;">🏠 Menu</button>
        </div>
    </div>
</div>

<!-- Promotion Modal -->
<div id="promotionModal" class="modal">
    <div class="promotion-options" id="promotionOptions"></div>
</div>

<script>
    // ---------- DOM elements ----------
    const boardEl = document.getElementById("board");
    const gameInfoEl = document.getElementById("gameInfo");
    const tinyThink = document.getElementById("tinyThinking");
    const welcomeModal = document.getElementById("welcomeModal");
    const postModal = document.getElementById("postGameModal");
    const promotionModal = document.getElementById("promotionModal");
    const promoContainer = document.getElementById("promotionOptions");
    
    // Game State
    let board = [];
    let whiteTurn = true;
    let selectedSquare = null;
    let legalMovesList = [];
    let flipped = false;
    let isVsAI = false;
    let aiColor = 'b';   // AI plays black by default, but will randomize on new game
    let gameActive = true;
    let aiDifficulty = 3;   // 1=easy(random), 2=medium, 3=hard
    let kingInCheckFlag = false;
    let pendingPromotion = null;
    
    // ----- Initial Board Setup -----
    const START_BOARD = [
        ['r','n','b','q','k','b','n','r'],
        ['p','p','p','p','p','p','p','p'],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ['P','P','P','P','P','P','P','P'],
        ['R','N','B','Q','K','B','N','R']
    ];
    
    const PIECE_VAL = { 'p':10, 'n':32, 'b':32, 'r':55, 'q':95, 'k':999 };
    
    // Helper: get piece image URL (Wikimedia)
    function pieceImg(type, color) {
        const code = {
            'pw':'4/45/Chess_plt45.svg','pb':'c/c7/Chess_pdt45.svg',
            'rw':'7/72/Chess_rlt45.svg','rb':'f/ff/Chess_rdt45.svg',
            'nw':'7/70/Chess_nlt45.svg','nb':'e/ef/Chess_ndt45.svg',
            'bw':'b/b1/Chess_blt45.svg','bb':'9/98/Chess_bdt45.svg',
            'qw':'1/15/Chess_qlt45.svg','qb':'4/47/Chess_qdt45.svg',
            'kw':'4/42/Chess_klt45.svg','kb':'f/f0/Chess_kdt45.svg'
        };
        return `https://upload.wikimedia.org/wikipedia/commons/${code[type+color]}`;
    }
    
    // Copy fresh board
    function initBoardData() {
        let newBoard = [];
        for(let r=0; r<8; r++) {
            newBoard[r] = [];
            for(let c=0; c<8; c++) {
                let ch = START_BOARD[r][c];
                if(!ch) newBoard[r][c] = null;
                else {
                    let color = (ch === ch.toUpperCase()) ? 'w' : 'b';
                    let type = ch.toLowerCase();
                    newBoard[r][c] = { type, color };
                }
            }
        }
        return newBoard;
    }
    
    // --- Move Generation & Validation (core)---
    function inBounds(r,c) { return r>=0 && r<8 && c>=0 && c<8; }
    
    function getMovesWithoutCheck(r,c) {
        let piece = board[r][c];
        if(!piece) return [];
        let color = piece.color;
        let type = piece.type;
        let moves = [];
        let dir = (color === 'w') ? -1 : 1;
        
        // pawn
        if(type === 'p') {
            if(inBounds(r+dir, c) && !board[r+dir][c]) moves.push({r:r+dir, c});
            if(((color === 'w' && r===6) || (color === 'b' && r===1)) && !board[r+dir][c] && !board[r+2*dir][c])
                moves.push({r:r+2*dir, c});
            [-1,1].forEach(dc => {
                let nr = r+dir, nc = c+dc;
                if(inBounds(nr,nc) && board[nr][nc] && board[nr][nc].color !== color)
                    moves.push({r:nr, c:nc});
            });
        }
        // knight
        if(type === 'n') {
            let offsets = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
            offsets.forEach(([dr,dc]) => {
                let nr=r+dr, nc=c+dc;
                if(inBounds(nr,nc) && (!board[nr][nc] || board[nr][nc].color !== color))
                    moves.push({r:nr,c:nc});
            });
        }
        // bishop, rook, queen
        if(['b','r','q'].includes(type)) {
            let dirs = [];
            if(['b','q'].includes(type)) dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
            if(['r','q'].includes(type)) dirs.push([-1,0],[1,0],[0,-1],[0,1]);
            dirs.forEach(([dr,dc]) => {
                let nr=r+dr, nc=c+dc;
                while(inBounds(nr,nc)) {
                    if(!board[nr][nc]) moves.push({r:nr,c:nc});
                    else {
                        if(board[nr][nc].color !== color) moves.push({r:nr,c:nc});
                        break;
                    }
                    nr+=dr; nc+=dc;
                }
            });
        }
        // king
        if(type === 'k') {
            for(let dr=-1; dr<=1; dr++) {
                for(let dc=-1; dc<=1; dc++) {
                    if(dr===0 && dc===0) continue;
                    let nr=r+dr, nc=c+dc;
                    if(inBounds(nr,nc) && (!board[nr][nc] || board[nr][nc].color !== color))
                        moves.push({r:nr,c:nc});
                }
            }
        }
        return moves;
    }
    
    function isKingInCheck(color) {
        let kingPos = null;
        for(let i=0;i<8;i++) for(let j=0;j<8;j++) {
            let p = board[i][j];
            if(p && p.type==='k' && p.color===color) { kingPos={r:i,c:j}; break; }
        }
        if(!kingPos) return false;
        for(let i=0;i<8;i++) {
            for(let j=0;j<8;j++) {
                let p = board[i][j];
                if(p && p.color !== color) {
                    let moves = getMovesWithoutCheck(i,j);
                    if(moves.some(m => m.r===kingPos.r && m.c===kingPos.c)) return true;
                }
            }
        }
        return false;
    }
    
    function getLegalMoves(r,c) {
        let piece = board[r][c];
        if(!piece) return [];
        let raw = getMovesWithoutCheck(r,c);
        let legal = [];
        for(let move of raw) {
            let oldTarget = board[move.r][move.c];
            let movingPiece = board[r][c];
            board[move.r][move.c] = movingPiece;
            board[r][c] = null;
            let inCheck = isKingInCheck(movingPiece.color);
            board[r][c] = movingPiece;
            board[move.r][move.c] = oldTarget;
            if(!inCheck) legal.push(move);
        }
        return legal;
    }
    
    function hasAnyLegalMove(color) {
        for(let i=0;i<8;i++) for(let j=0;j<8;j++) {
            let p = board[i][j];
            if(p && p.color === color && getLegalMoves(i,j).length > 0) return true;
        }
        return false;
    }
    
    // Apply move, handle promotion later
    function applyMove(sr,sc,tr,tc) {
        let movingPiece = board[sr][sc];
        let captured = board[tr][tc];
        board[tr][tc] = movingPiece;
        board[sr][sc] = null;
        
        // promotion check
        if(movingPiece.type === 'p' && (tr===0 || tr===7)) {
            pendingPromotion = {r:tr, c:tc, color: movingPiece.color};
            return false; // pause, wait for promotion
        }
        return true;
    }
    
    function finalizePromotion(pieceType) {
        if(!pendingPromotion) return;
        let {r,c,color} = pendingPromotion;
        board[r][c].type = pieceType;
        pendingPromotion = null;
        afterMoveFinish();
    }
    
    function afterMoveFinish() {
        whiteTurn = !whiteTurn;
        kingInCheckFlag = isKingInCheck(whiteTurn ? 'w' : 'b');
        let hasMoves = hasAnyLegalMove(whiteTurn ? 'w' : 'b');
        if(!hasMoves) {
            gameActive = false;
            if(kingInCheckFlag) {
                let winner = whiteTurn ? "Black" : "White";
                gameInfoEl.innerHTML = `<span class="status-mate">🏆 CHECKMATE! ${winner} wins! 🏆</span>`;
                showPostGame(winner, "checkmate");
            } else {
                gameInfoEl.innerHTML = `<span class="status-mate">♾️ STALEMATE - DRAW ♾️</span>`;
                showPostGame(null, "stalemate");
            }
        } else if(kingInCheckFlag) {
            let turn = whiteTurn ? "White" : "Black";
            gameInfoEl.innerHTML = `<span class="status-check">⚠️ ${turn} is in CHECK! ⚠️</span>`;
        } else {
            updateGameInfoText();
        }
        renderBoard();
    }
    
    function updateGameInfoText() {
        if(!gameActive) return;
        let txt = whiteTurn ? "⚪ White to move" : "⚫ Black to move";
        if(isVsAI && !gameActive) return;
        if(isVsAI) txt += `  (🤖 AI: ${aiColor==='w' ? 'White' : 'Black'})`;
        gameInfoEl.textContent = txt;
    }
    
    // --- AI with improved difficulty (Easy=random, Medium=material+random, Hard=aggressive captures)---
    function getAIMove() {
        let movesList = [];
        for(let r=0;r<8;r++) {
            for(let c=0;c<8;c++) {
                let p = board[r][c];
                if(p && p.color === aiColor) {
                    let moves = getLegalMoves(r,c);
                    for(let mv of moves) {
                        movesList.push({from:{r,c}, to:mv});
                    }
                }
            }
        }
        if(movesList.length === 0) return null;
        
        if(aiDifficulty === 1) {   // EASY: totally random
            return movesList[Math.floor(Math.random() * movesList.length)];
        }
        
        // Medium & Hard: evaluate capture value + piece-square (heuristic)
        let bestScore = -Infinity;
        let bestMoves = [];
        
        for(let mv of movesList) {
            let targetPiece = board[mv.to.r][mv.to.c];
            let movingPiece = board[mv.from.r][mv.from.c];
            let score = 0;
            // Capture priority
            if(targetPiece) {
                let targetVal = PIECE_VAL[targetPiece.type] || 0;
                let movingVal = PIECE_VAL[movingPiece.type] || 0;
                score = targetVal * 10 - movingVal * 0.5;
            } else {
                score = (Math.random() * 2 - 1); // small randomness to avoid perfect repetition
            }
            // central control small bias (medium/hard)
            if(aiDifficulty >= 2) {
                let centerDist = Math.abs(mv.to.r-3.5) + Math.abs(mv.to.c-3.5);
                score += (7 - centerDist) * 0.8;
            }
            // extra depth for hard: simulate capture check bonus
            if(aiDifficulty === 3 && targetPiece) {
                // Hard mode loves capturing high-value pieces
                score += (PIECE_VAL[targetPiece.type] || 0) * 2;
            }
            
            if(score > bestScore) {
                bestScore = score;
                bestMoves = [mv];
            } else if(Math.abs(score - bestScore) < 0.5) {
                bestMoves.push(mv);
            }
        }
        if(bestMoves.length === 0) return movesList[0];
        return bestMoves[Math.floor(Math.random() * bestMoves.length)];
    }
    
    async function makeAIMove() {
        if(!gameActive || !isVsAI || whiteTurn !== (aiColor === 'w')) return;
        tinyThink.style.display = "flex";
        // slight delay for better UX
        await new Promise(r => setTimeout(r, 280));
        let aiMove = getAIMove();
        if(aiMove) {
            let complete = applyMove(aiMove.from.r, aiMove.from.c, aiMove.to.r, aiMove.to.c);
            if(complete) {
                afterMoveFinish();
            } else {
                // promotion case: auto-choose queen for AI (best)
                if(pendingPromotion) {
                    finalizePromotion('q');
                    afterMoveFinish();
                }
            }
            renderBoard();
        }
        tinyThink.style.display = "none";
    }
    
    // --- UI rendering ---
    function renderBoard() {
        boardEl.innerHTML = "";
        let rows = [0,1,2,3,4,5,6,7];
        if(flipped) rows.reverse();
        let currentCheckColor = (kingInCheckFlag && gameActive) ? (whiteTurn ? 'w' : 'b') : null;
        let kingPos = null;
        if(currentCheckColor) {
            for(let i=0;i<8;i++) for(let j=0;j<8;j++) {
                let p = board[i][j];
                if(p && p.type==='k' && p.color===currentCheckColor) { kingPos={r:i,c:j}; break; }
            }
        }
        
        for(let r of rows) {
            let cols = flipped ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];
            for(let c of cols) {
                let sq = document.createElement("div");
                sq.className = `square ${((r+c)%2 === 0) ? 'sq-dark' : 'sq-light'}`;
                sq.dataset.r = r; sq.dataset.c = c;
                let isSelected = (selectedSquare && selectedSquare.r === r && selectedSquare.c === c);
                let isLegalMove = legalMovesList.some(m => m.r === r && m.c === c);
                if(isSelected) sq.classList.add("highlight");
                if(isLegalMove) sq.classList.add("move-dot");
                if(kingPos && kingPos.r === r && kingPos.c === c) sq.classList.add("check");
                
                let piece = board[r][c];
                if(piece) {
                    let img = document.createElement("img");
                    img.src = pieceImg(piece.type, piece.color);
                    img.className = "piece";
                    img.draggable = false;
                    sq.appendChild(img);
                }
                let interactive = gameActive && !(isVsAI && whiteTurn === (aiColor === 'w'));
                if(interactive) {
                    sq.addEventListener("click", (function(row,col){ return function(){ onSquareClick(row,col); }; })(r,c));
                }
                boardEl.appendChild(sq);
            }
        }
        if(isVsAI && gameActive && whiteTurn === (aiColor === 'w') && !pendingPromotion) {
            makeAIMove();
        }
    }
    
    async function onSquareClick(r,c) {
        if(!gameActive) return;
        if(isVsAI && whiteTurn === (aiColor === 'w')) return;
        if(pendingPromotion) return; 
        if(selectedSquare && legalMovesList.some(m => m.r === r && m.c === c)) {
            // move
            let complete = applyMove(selectedSquare.r, selectedSquare.c, r, c);
            if(complete) {
                afterMoveFinish();
            } else {
                // promotion waiting, show modal
                renderBoard(); 
                showPromotionModal(pendingPromotion.color);
            }
            selectedSquare = null; legalMovesList = [];
            renderBoard();
            return;
        }
        let p = board[r][c];
        if(p && p.color === (whiteTurn ? 'w' : 'b')) {
            selectedSquare = {r,c};
            legalMovesList = getLegalMoves(r,c);
        } else {
            selectedSquare = null;
            legalMovesList = [];
        }
        renderBoard();
    }
    
    function showPromotionModal(color) {
        promoContainer.innerHTML = "";
        let pieces = ['q','r','b','n'];
        pieces.forEach(type => {
            let div = document.createElement("div");
            div.className = "promotion-piece";
            let img = document.createElement("img");
            img.src = pieceImg(type, color);
            div.appendChild(img);
            div.onclick = () => {
                finalizePromotion(type);
                promotionModal.style.display = 'none';
                afterMoveFinish();
                renderBoard();
            };
            promoContainer.appendChild(div);
        });
        promotionModal.style.display = 'flex';
    }
    
    function showPostGame(winner, type) {
        let title = type === "checkmate" ? "🏆 CHECKMATE 🏆" : "♾️ STALEMATE ♾️";
        let msg = type === "checkmate" ? `${winner} wins by checkmate!` : "Game ended in a draw. Well played!";
        document.getElementById("postGameTitle").innerText = title;
        document.getElementById("postGameMessage").innerText = msg;
        postModal.style.display = 'flex';
    }
    
    // --- Game initialization ---
    function startGame() {
        board = initBoardData();
        whiteTurn = true;
        selectedSquare = null;
        legalMovesList = [];
        gameActive = true;
        kingInCheckFlag = false;
        pendingPromotion = null;
        if(isVsAI) {
            aiColor = Math.random() < 0.5 ? 'b' : 'w';
        }
        updateGameInfoText();
        renderBoard();
    }
    
    // --- Event listeners & UI ---
    document.getElementById("resetBtn").onclick = () => welcomeModal.style.display = 'flex';
    document.getElementById("flipBtn").onclick = () => { flipped = !flipped; renderBoard(); };
    document.getElementById("aiBtn").onclick = () => welcomeModal.style.display = 'flex';
    document.getElementById("startGameBtn").onclick = () => {
        welcomeModal.style.display = 'none';
        startGame();
    };
    document.getElementById("playAgainBtn").onclick = () => {
        postModal.style.display = 'none';
        welcomeModal.style.display = 'flex';
    };
    document.getElementById("mainMenuBtn").onclick = () => {
        postModal.style.display = 'none';
        welcomeModal.style.display = 'flex';
    };
    
    // Mode and difficulty
    document.querySelectorAll(".game-mode-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".game-mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            isVsAI = (btn.dataset.mode === "vsAI");
            let diffDiv = document.getElementById("difficultySelector");
            diffDiv.style.display = isVsAI ? "flex" : "none";
        };
    });
    document.querySelectorAll(".difficulty-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".difficulty-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            aiDifficulty = parseInt(btn.dataset.depth);
        };
    });
    // set default difficulty to hard (3)
    aiDifficulty = 3;
    window.onload = () => { welcomeModal.style.display = 'flex'; };
</script>
</body>
</html>
